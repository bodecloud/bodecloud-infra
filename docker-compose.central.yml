version: '3.8'

x-common-env: &common-env
  TZ: ${TZ:-America/Chicago}
  PUID: ${PUID:-1001}
  PGID: ${PGID:-989}
  UMASK: ${UMASK:-002}

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-logging: &common-logging
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"

services:
  consul-server:
    image: hashicorp/consul:latest
    container_name: consul-server
    hostname: ${CONSUL_SERVER_HOSTNAME:-consul-server}
    networks:
      centralnet:
        ipv4_address: ${CONSUL_SERVER_IPV4_ADDRESS:-10.58.0.10}
    ports:
      - "${CONSUL_SERVER_HTTP_PORT:-8500}:8500"  # HTTP API and Web UI
      - "${CONSUL_SERVER_DNS_PORT:-8600}:8600/tcp"  # DNS Interface
      - "${CONSUL_SERVER_DNS_PORT:-8600}:8600/udp"  # DNS Interface
      - "${CONSUL_SERVER_SERF_LAN_PORT:-8301}:8301/tcp"  # LAN gossip protocol
      - "${CONSUL_SERVER_SERF_LAN_PORT:-8301}:8301/udp"  # LAN gossip protocol
      - "${CONSUL_SERVER_SERF_WAN_PORT:-8302}:8302/tcp"  # WAN gossip protocol
      - "${CONSUL_SERVER_SERF_WAN_PORT:-8302}:8302/udp"  # WAN gossip protocol
      - "${CONSUL_SERVER_SERVER_PORT:-8300}:8300"  # Server RPC
    volumes:
      - ${CONFIG_PATH:-./configs}/consul/server/data:/consul/data
      - ${CONFIG_PATH:-./configs}/consul/server/config:/consul/config
    environment:
      <<: *common-env
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_CLIENT_INTERFACE: eth0
    command: >
      agent -server -ui 
      -bootstrap-expect=1 
      -node=consul-server
      -client=0.0.0.0
      -data-dir=/consul/data
      -config-dir=/consul/config
      -retry-join=consul-server
      -domain=consul
    <<: [*resource-limits, *common-logging]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  central-traefik:
    depends_on:
      consul-server:
        condition: service_healthy
      traefik-error-pages:
        condition: service_started
    image: traefik:latest
    container_name: central-traefik
    hostname: ${CENTRAL_TRAEFIK_HOSTNAME:-central-traefik}
    networks:
      centralnet:
        ipv4_address: ${CENTRAL_TRAEFIK_IPV4_ADDRESS:-10.58.0.20}
    ports:
      - "80:80"  # HTTP
      - "443:443"  # HTTPS
      - "${CENTRAL_TRAEFIK_API_PORT:-8099}:8080"  # Dashboard
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - ${CERTS_PATH:-./certs}:/certs
      - ${CONFIG_PATH:-./configs}/central-traefik/config:/config
      - ${CONFIG_PATH:-./configs}/central-traefik/plugins-local:/plugins-local
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    environment:
      <<: *common-env
      CONSUL_HTTP_ADDR: "consul-server:8500"
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL}
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-}
    <<: [*resource-limits, *common-logging]
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.central-traefik.middlewares: ipallowlist-private@file
      traefik.http.routers.central-traefik.rule: Host(`central-traefik.${DOMAIN}`) || Host(`central-traefik.${DUCKDNS_DOMAIN}`) || Host(`central-traefik.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.central-traefik.loadbalancer.server.port: 8080
      homepage.group: Network
      homepage.name: Central Traefik
      homepage.icon: traefik.png
      homepage.href: https://central-traefik.${DOMAIN}/
      homepage.description: Centralized reverse proxy and load balancer for multi-host services.
    command: --configFile=/config/traefik.yaml
    restart: always

  traefik-error-pages:
    image: httpd:alpine
    container_name: central-traefik-error-pages
    hostname: ${CENTRAL_TRAEFIK_ERROR_PAGES_HOSTNAME:-central-error-pages}
    networks:
      centralnet:
    volumes:
      - ${CONFIG_PATH:-./configs}/central-traefik/error-pages:/usr/local/apache2/htdocs/:ro
    restart: always

networks:
  centralnet:
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: ${CENTRALNET_SUBNET:-10.58.0.0/16}
          gateway: ${CENTRALNET_GATEWAY:-10.58.0.1}
          ip_range: ${CENTRALNET_IP_RANGE:-10.58.0.0/16}
    driver_opts:
      com.docker.network.bridge.name: centralnet 