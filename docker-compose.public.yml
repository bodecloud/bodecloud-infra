x-common-env: &common-env
  PGID: ${PGID:-988} # 'docker' Group ID
  PUID: ${PUID:-1002} # A non-root user ID
  TZ: ${TZ:-America/Chicago} # Your Timezone

x-resource-limits: &resource-limits
  cpu_shares: 1024 # CPU share weight (relative, 2-262144). Higher = more CPU *if competing*.
  #  mem_limit: 512m        # Max RAM usage (e.g., 64m, 1g). Exceeding = container kill.
  #  mem_reservation: 325m  # Soft RAM limit (e.g., 32m, 512m).  Best effort, not guaranteed.
  #  mem_swappiness: 30      # Swap usage (0-100). 0 = off. Higher = more swap, may slow down container.
  #memswap_limit: 1024m    # Max RAM + Swap.  Usually same as mem_limit.
  labels:
    autoheal: "true"

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 1024M
#    reservations:
#     cpus: '0.05'
#    memory:  256M

x-swarm-worker-priority: &swarm-worker-priority
  placement:
    preferences:
      - spread: node.labels.worker_priority

x-swarm-manager-only: &swarm-manager-only
  placement:
    constraints:
      - node.role == manager

x-calibre-web-labels: &calibre-web-labels
  traefik.enable: "true"
  traefik.http.services.calibre-web.loadbalancer.server.port: 8080

x-kavita-labels: &kavita-labels
  traefik.enable: "true"
  traefik.http.services.kavita.loadbalancer.server.port: 5000

x-opengist-labels: &opengist-labels
  traefik.enable: "true"
  traefik.http.services.opengist.loadbalancer.server.port: 6157

x-posterr-labels: &posterr-labels
  traefik.enable: "true"
  traefik.http.services.posterr.loadbalancer.server.port: 3000

x-speedtest-labels: &speedtest-labels
  traefik.enable: "true"
  traefik.http.services.speedtest.loadbalancer.server.port: 80

services:
  audiobookshelf:
    # 🔹🔹 Audiobookshelf 🔹🔹  # https://github.com/advplyr/audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf
    container_name: audiobookshelf
    hostname: audiobookshelf
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    ports:
      - ${AUDIOBOOKSHELF_PORT:-13378}:80
    volumes:
      - ${ROOT_DIR:-.}/configs/audiobookshelf/audiobooks:/audiobooks
      - ${ROOT_DIR:-.}/configs/audiobookshelf/config:/config
      - ${ROOT_DIR:-.}/configs/audiobookshelf/metadata:/metadata
    environment:
      <<: *common-env
      AUDIOBOOKSHELF_UID: ${PUID:-1002}
      AUDIOBOOKSHELF_GID: ${PGID:-988}
      AUDIOBOOKSHELF_TZ: ${TZ:-America/Chicago}
    <<: *resource-limits
    labels:
      traefik.enable: "true"
      traefik.http.services.audiobookshelf.loadbalancer.server.port: ${AUDIOBOOKSHELF_PORT:-13378}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        traefik.enable: "true"
        traefik.http.services.audiobookshelf.loadbalancer.server.port: ${AUDIOBOOKSHELF_PORT:-13378}
    restart: unless-stopped

  calibre-web:
    # 🔹🔹 Calibre Web 🔹🔹
    image: linuxserver/calibre-web
    container_name: calibre-web
    hostname: calibre-web
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    ports:
      - ${CALIBRE_WEB_PORT:-8083}:8083
    volumes:
      - ${ROOT_DIR:-.}/configs/calibre-web:/config
      - ${ROOT_DIR:-.}/data/media/books:/books
    environment:
      <<: *common-env
      DOCKER_MODS: linuxserver/mods:universal-calibre
      OAUTHLIB_RELAX_TOKEN_SCOPE: ${OAUTHLIB_RELAX_TOKEN_SCOPE:-1}
    labels:
      <<: *calibre-web-labels
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *calibre-web-labels
    restart: unless-stopped

  kavita:
    # 🔹🔹 Kavita 🔹🔹
    # free and open source web based Comic and Book Server.
    image: jvmilazz0/kavita
    container_name: kavita
    hostname: kavita
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    ports:
      - ${KAVITA_PORT:-5002}:5000
    volumes:
      - ${ROOT_DIR:-.}/data/media/books:/media/books
      - ${ROOT_DIR:-.}/data/media/comics:/media/comics
      - ${ROOT_DIR:-.}/data/media/manga:/media/manga
      - ${ROOT_DIR:-.}/configs/kavita/config:/kavita/config
    environment:
      <<: *common-env
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: ${KAVITA_DOTNET_SYSTEM_GLOBALIZATION_INVARIANT:-true}
    labels:
      <<: *kavita-labels
      homepage.group: E-books & Comics
      homepage.name: Kavita Reader
      homepage.icon: kavita.png
      homepage.href: https://kavita.${DOMAIN}/
      homepage.description: A fast and feature rich server to manage and read your digital books, comics, and manga with a modern web interface.
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *kavita-labels
    restart: unless-stopped

  # Opengist
  opengist:
    # 🔹🔹 Opengist 🔹🔹  # https://github.com/thomiceli/opengist
    # Self-hosted Pastebin powered by Git
    image: ghcr.io/thomiceli/opengist:1
    container_name: opengist
    hostname: opengist
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    ports:
      - ${OPENGIST_HTTP_PORT:-6157}:6157 # HTTP port
      - ${OPENGIST_SSH_PORT:-2222}:2222 # SSH port, can be removed if you don't use SSH
    volumes:
      - ${ROOT_DIR:-.}/configs/opengist:/opengist
    environment:
      <<: *common-env
      CONFIG: |
        log-level: ${OPENGIST_LOG_LEVEL:-info}
        ssh.git-enabled: ${OPENGIST_SSH_GIT_ENABLED:-false}
        disable-signup: ${OPENGIST_DISABLE_SIGNUP:-false}  # You may wish to change this to true after you sign up the first time.
    <<: *resource-limits
    labels:
      <<: *opengist-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *opengist-labels
    healthcheck:
      test: curl -fSs http://localhost:6157 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped

  posterr:
    # default password: raidisnotabackup
    # Media display software for Plex, Sonarr, Radarr, and Readarr. (Just like the display screens in movie theatre foyers)
    image: petersem/posterr
    container_name: posterr
    hostname: posterr
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    environment:
      <<: *common-env
      hostIP: ${HOST_IP:-0.0.0.0}
      BASEPATH: ${ROOT_DIR:-.}
    volumes:
      - ${ROOT_DIR:-.}/configs/posterr/config:/usr/src/app/config
      - ${ROOT_DIR:-.}/configs/posterr/custom:/usr/src/app/public/custom
    ports:
      - ${POSTERR_PORT:-9876}:3000
    <<: *resource-limits
    labels:
      <<: *posterr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *posterr-labels
    restart: always

  speedtest:
    # 🔹🔹 Speedtest 🔹🔹
    image: linuxserver/speedtest-tracker
    container_name: speedtest
    hostname: speedtest
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - traefik_public
    ports:
      - ${SPEEDTEST_TRACKER_PORT:-8765}:80
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/speedtest-tracker:/config
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL} # Email of the initial admin user. Note: Only effective during initial setup.
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME} # Name of the initial admin user. Note: Only effective during initial setup.
      ADMIN_PASSWORD: ${SPEEDTEST_TRACKER_ADMIN_PASSWORD} # Password of the initial admin user. Note: Only effective during initial setup.
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60} # Number of requests per minute to the API. Default: 60
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY} # Key used to encrypt and decrypt data. You can generate a key at https://speedtest-tracker.dev.
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker} # Used to define the application's name in the dashboard and in notifications.
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}} # Application timezone should be set if your database does not use UTC as its default timezone.
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-} # URL used for links in emails and notifications.
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-} # URL used for assets, needed when using a reverse proxy.
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true} # Begin the dashboard axis charts at zero. Default: true
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i} # Set the formatting of timestamps in charts.
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl} # Width of the content section of each page. Can be set to any value found in the Filament docs. Default: 7xl
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s} # Set the formatting of timestamps in tables and notifications.
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}} # Display timestamps in your local time.
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0} # Set the value to greater than zero to prune stored results. This value should be represented in days.
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true} # Enables the public dashboard for guest (unauthenticated) users. Default: false
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-} # Comma separated list of server IDs that should not be used when running speedtests.
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-} # Set the network interface to use for the test. This need to be the network interface available inside the container
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-6 */2 * * *} # Cron expression used to run speedtests on a scheduled basis.
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-} # Comma separated list of server IDs to randomly use for speedtest.
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-} # A comma separated list of public IP addresses where tests will be skipped when present.
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900} # Set the Download Threshold. Note: Only effective during initial setup.
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true} # Enable the thresholds. Note: Only effective during initial setup.
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25} # Set the Ping Threshold. Note: Only effective during initial setup.
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900} # Set the Upload Threshold. Note: Only effective during initial setup.
    labels:
      <<: *speedtest-labels
      homepage.group: Network Monitoring
      homepage.name: Speedtest
      homepage.icon: speedtest.png
      homepage.href: https://speedtest.${DOMAIN}
      homepage.description: Regularly tests your internet speed and tracks performance over time, helping you monitor your connection quality.
      homepage.widget.type: speedtest
      homepage.widget.url: https://speedtest.${DOMAIN}
      homepage.widget.fields: '["download", "upload", "ping", "speedtest"]'
    deploy:
      <<: *common-deploy
      labels:
        <<: *speedtest-labels
    healthcheck:
      test: curl -fSs http://localhost:80 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
