site_name: bolabaden Infrastructure Knowledgebase
site_description: Evidence-heavy docs for bolabaden.org — a Compose-first, multi-node Docker stack chasing wrong-node survival without fake HA language.
site_author: bolabaden
docs_dir: knowledgebase
site_dir: /tmp/mkdocs-site
# Keep non-site artifacts out of the rendered Knowledgebase.
# Patterns are evaluated relative to docs_dir (knowledgebase).
exclude_docs: |
  source-archive/**
  docs/**
  infra/**
  AGENTS.md
  CONTRIBUTING.md
  DOCKER_SECRETS_README.md
  README.md
  alt_design.md

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Dream, Runtime, Proof:
    - Reading Paths and Retrieval Routes: reading-paths.md
    - User Intent and Dream: research/user-intent-and-dream.md
    - Operator Contract and Success Criteria: architecture/operator-contract.md
    - Instruction Surfaces and Authority: architecture/instruction-surfaces-and-authority.md
    - Current Compose Runtime: architecture/current-compose-runtime.md
    - Proof Matrix and Drill Catalog: operations/proof-matrix-and-drills.md

  - Request-Time Truth:
    - Request Path and Failure Walkthrough: architecture/request-path-and-failure-walkthrough.md
    - HA, Failover, and Routing: architecture/ha-failover-routing.md
    - Current-State Registry and Peer Eligibility: architecture/current-state-registry-and-peer-eligibility.md
    - Ingress and Failover Evidence: research/ingress-and-failover-evidence.md
    - Stateful HA and Data: architecture/stateful-ha-and-data.md
    - Stateful HA Evidence: research/stateful-ha-evidence.md

  - Runtime and Authority:
    - Problem and Goals: architecture/problem-and-goals.md
    - Compose Fragment Map: architecture/compose-fragment-map.md
    - Compose-first Architecture: architecture/compose-first-architecture.md
    - Design Tensions and Contradictions: architecture/design-tensions-and-contradictions.md
    - Failure Model and Maturity: architecture/failure-model-and-maturity.md

  - Hidden Burden and Promotion:
    - The Missing Middle Layer: architecture/missing-middle-layer.md
    - Capability Gaps and Roadmap: architecture/capability-gaps-and-roadmap.md
    - Operator Questions and Honest Answers: operations/operator-questions-and-honest-answers.md
    - Decision Paths and Promotion Rules: operations/decision-paths-and-promotion-rules.md
    - DevOps Runbook: operations/devops-runbook.md
    - Source Assimilation Index: operations/source-assimilation-index.md
    - Curated Site Source Map: operations/curated-site-source-map.md

  - Futures, Tradeoffs, and Plans:
    - Orchestration Options: architecture/orchestration-options.md
    - Orchestrator Tradeoffs Evidence: research/orchestrator-tradeoffs-evidence.md
    - Orchestration Research 2026: research/orchestration-research-2026.md
    - Infrastructure Master Plan: research/infrastructure-master-plan.md
    - Multi-node Philosophy: research/plan-infrastructure-unification.md
    - OpenSVC Ingress HA: research/osvc-ingress-ha.md
    - OpenSVC Cluster Bootstrap: research/opensvc-cluster-bootstrap.md
    - Garden and k3s Exploration: research/garden-k3s-exploration-evidence.md
    - Nomad Exploration: research/nomad-exploration-evidence.md
    - Stateful HA Plan: research/stateful-ha-plan.md

  - Evidence and Reconstruction:
    - Evidence Ledger: research/evidence-ledger.md
    - Archive Pressure Patterns: research/archive-pressure-patterns.md

  - CUE Blueprint:
    - Unified Orchestration Blueprint: UNIFIED_ORCHESTRATION_BLUEPRINT.md
    - Bootstrap Protocol: CUE_BOOTSTRAP_PROTOCOL.md
    - Compose Spec Extensions: CUE_SPEC_EXTENSIONS.md
