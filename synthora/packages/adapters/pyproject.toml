[project]
name = "synthora-adapters"
version = "0.1.0"
description = "Synthora provider abstractions: LLMs, search engines, search strategies, MCP bridge"
requires-python = ">=3.11"
dependencies = [
    "synthora-core",
    "httpx>=0.27",
    "langchain-core>=0.3",
    "langchain-openai>=0.2",
    "langchain-ollama>=0.2",
]

[tool.uv.sources]
synthora-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthora"]
