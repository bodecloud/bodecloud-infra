      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      PUID: "1001"
      TZ: America/Chicago
      UMASK: "002"
    expose:
      - "5432"
    hostname: zilean-postgres
    healthcheck:
      test:
