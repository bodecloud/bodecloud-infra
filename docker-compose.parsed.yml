      - type: bind
        source: /home/ubuntu/my-media-stack/configs/zilean/tmp
        target: /app/tmp
        bind:
          create_host_path: true
      - type: bind
        source: /home/ubuntu/my-media-stack/configs/zilean/tmp2
        target: /tmp
        bind:
          create_host_path: true
  zilean-postgres:
    container_name: zilean-postgres
    environment:
