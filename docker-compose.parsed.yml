    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.description: Whoami is a simple web service that returns the client's IP address and hostname.
      homepage.group: Web Services
      homepage.href: https://whoami.bolabaden.org
      homepage.icon: whoami.png
      homepage.name: Whoami
      traefik.enable: "true"
      traefik.http.routers.whoami.middlewares: tinyauth
      traefik.http.routers.whoami.rule: Host(`whoami.bolabaden.org`) || Host(`whoami.bolabaden.duckdns.org`) || Host(`whoami.micklethefickle.duckdns.org`)
    networks:
      publicnet:
        ipv4_address: 10.76.128.81
    restart: always
  zilean:
    container_name: zilean
