  code-demo:
    container_name: code
    deploy:
      resources:
        limits:
          cpus: 0.2
          memory: "536870912"
    environment:
      CODESERVER_PASSWORD: ubuntu
      CODESERVER_SUDO_PASSWORD: h4L0m4St3R327
