        required: true
    environment:
      Zilean__Database__ConnectionString: Host=zilean-postgres;Port=5432;Database=zilean;Username=postgres;Password=postgres;Include Error Detail=true;Timeout=30;CommandTimeout=3600
      Zilean__Dmm_ScrapeSchedule: 32 * * * *
      Zilean__EnableDashboard: "true"
      Zilean__Imdb__UseAllCores: "true"
      Zilean__Imdb__UseLucene: "true"
      Zilean__Parsing__BatchSize: "100000"
    expose:
      - "8181"
    hostname: zilean
    healthcheck:
      test:
        - CMD-SHELL
        - curl --connect-timeout 10 --silent --show-error --fail http://127.0.0.1:8181/healthchecks/ping || exit 1
      timeout: 1m0s
      interval: 30s
      retries: 10
    image: ipromknight/zilean:latest
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.group: Media Management
      homepage.href: https://zilean.bolabaden.org/
      homepage.icon: zilean.png
      homepage.name: Zilean
      traefik.enable: "true"
      traefik.http.routers.zilean.rule: Host(`zilean.bolabaden.org`) || Host(`zilean.bolabaden.duckdns.org`) || Host(`zilean.micklethefickle.duckdns.org`) || Host(`zilean.localhost`)
      traefik.http.services.zilean.loadbalancer.server.port: "8181"
    networks:
      publicnet:
        ipv4_address: 10.76.128.32
