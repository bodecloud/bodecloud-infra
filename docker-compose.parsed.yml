      PGID: "988"
      PUID: "1001"
      TZ: America/Chicago
      UMASK: "002"
    hostname: code
    image: linuxserver/code-server:latest
    labels:
      deunhealth.restart.on.unhealthy: "true"
      homepage.description: A web-based IDE for coding, editing, and debugging code, with support for multiple languages and frameworks.
      homepage.group: Development
      homepage.href: https://code.bolabaden.org/
      homepage.icon: code-server.png
      homepage.name: Code Server
      traefik.enable: "true"
      traefik.http.routers.code.rule: Host(`code.bolabaden.org`) || Host(`code.bolabaden.duckdns.org`) || Host(`code.micklethefickle.duckdns.org`)
      traefik.http.services.code.loadbalancer.server.port: "8443"
    networks:
      publicnet:
        ipv4_address: 10.76.128.80
    restart: always
    volumes:
      - type: bind
        source: /home/ubuntu/my-media-stack/configs/code-server/demo/config
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: /home/ubuntu/my-media-stack/configs/code-server/demo/workspace
        target: /workspace
        bind:
          create_host_path: true
