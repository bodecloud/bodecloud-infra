
containers:
  stremio:
    # 🔹🔹 Stremio 🔹🔹
    # Stream Movies/TV over debrid instantly.
#    depends_on:
#      gluetun-premiumize-us:
#        condition: service_healthy
    build:
      context: ${SRC_PATH:-./src}/stremio/stremio-docker
      dockerfile: Dockerfile
    #image: tsaridas/stremio-docker:latest
    #image: tsaridas/stremio-docker:nightly
    #image: ghcr.io/tsaridas/stremio-docker:development
    image: th3w1zard1/stremio-docker:latest
    container_name: stremio
#    network_mode: service:gluetun-premiumize-us
    hostname: stremio
    networks:
      - publicnet
    ports:
#      - 8080:8080   # Stremio WebUI
      - 11470:11470  # HTTP Streaming Server
      - 12470:12470  # HTTPS Streaming Server
    extra_hosts:
      - host.docker.internal:172.17.0.1
      - jackett:${GLUETUN_PREMIUMIZE_NL_IPV4_ADDRESS:-10.76.128.99}
      - prowlarr:${GLUETUN_PREMIUMIZE_NL_IPV4_ADDRESS:-10.76.128.99}
      - byparr:${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}
      - flaresolverr:${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}
    volumes:
      - ${CONFIG_PATH:-./configs}/stremio/root/.stremio-server:/root/.stremio-server
#      - ${CONFIG_PATH:-./configs}/stremio/srv/stremio-server:/srv/stremio-server
    <<: [*common-logging, *resource-limits]
    environment:
#      IPADDRESS: 0.0.0.0
      IPADDRESS: 149.130.221.93
#     SERVER_URL: "https://0-0-0-0.519b6502d940.stremio.rocks:12470/"
#      SERVER_URL: "https://stremio.${DOMAIN}:12470/"
#      SERVER_URL: "https://149-130-221-93.519b6502d940.stremio.rocks:12470/"
      SERVER_URL: "https://stremio.${DOMAIN}"
#      WEBUI_LOCATION: "https://app.strem.io/shell-v4.4/"  # Where the streaming server will redirect to. Defaults to "https://app.strem.io/shell-v4.4/"
      WEBUI_LOCATION: "https://stremio-web.${DOMAIN}/"
#      WEBUI_LOCATION: "https://stremio-web.${DOMAIN}/shell/"
      NO_CORS: 0
      CASTING_DISABLED: 1
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"

      # Common headers middleware for all routes
      traefik.http.middlewares.stremio-headers.headers.customRequestHeaders.Host: "{{ .Host }}"
      traefik.http.middlewares.stremio-headers.headers.customRequestHeaders.X-Forwarded-Scheme: "{{ .Scheme }}"
      traefik.http.middlewares.stremio-headers.headers.customRequestHeaders.X-Forwarded-Proto: "{{ .Scheme }}"
      traefik.http.middlewares.stremio-headers.headers.customRequestHeaders.X-Forwarded-For: "{{ .ClientIP }}"
      traefik.http.middlewares.stremio-headers.headers.customRequestHeaders.X-Real-IP: "{{ .ClientIP }}"

      # Stremio HTTPS security headers
      traefik.http.middlewares.stremio-security.headers.stsSeconds: 63072000
      traefik.http.middlewares.stremio-security.headers.stsPreload: true
      
      # Main specific routes to port 11470 - matches each location block
      
      # Route 1: Main endpoints
      traefik.http.routers.stremio-endpoints.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/(hlsv2|casting|local-addon|proxy|rar|zip|settings|create|removeAll|samples|probe|subtitlesTracks|opensubHash|subtitles|network-info|device-info|get-https|hwaccel-profiler|status|exec|stream)`)"
      traefik.http.routers.stremio-endpoints.service: "stremio-api"
      traefik.http.routers.stremio-endpoints.middlewares: "stremio-headers"
      traefik.http.routers.stremio-endpoints.entrypoints: "websecure"
      traefik.http.routers.stremio-endpoints.tls: "true"
      
      # Route 2: Stats/create/remove/destroy endpoints
      traefik.http.routers.stremio-actions.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/([^/]+)/(stats\\.json|create|remove|destroy)`)"
      traefik.http.routers.stremio-actions.service: "stremio-api"
      traefik.http.routers.stremio-actions.middlewares: "stremio-headers"
      traefik.http.routers.stremio-actions.entrypoints: "websecure"
      traefik.http.routers.stremio-actions.tls: "true"
      
      # Route 3: Content endpoints
      traefik.http.routers.stremio-content.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/([^/]+)/([^/]+)/(stats\\.json|hls\\.m3u8|master\\.m3u8|stream\\.m3u8|dlna|thumb\\.jpg)`)"
      traefik.http.routers.stremio-content.service: "stremio-api"
      traefik.http.routers.stremio-content.middlewares: "stremio-headers"
      traefik.http.routers.stremio-content.entrypoints: "websecure"
      traefik.http.routers.stremio-content.tls: "true"
      
      # Route 4: Streaming playlists
      traefik.http.routers.stremio-playlists.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/([^/]+)/([^/]+)/(stream-q-[^/]+\\.m3u8|stream-[^/]+\\.m3u8|subs-[^/]+\\.m3u8)`)"
      traefik.http.routers.stremio-playlists.service: "stremio-api"
      traefik.http.routers.stremio-playlists.middlewares: "stremio-headers"
      traefik.http.routers.stremio-playlists.entrypoints: "websecure"
      traefik.http.routers.stremio-playlists.tls: "true"
      
      # Route 5: Streaming segments
      traefik.http.routers.stremio-segments.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/([^/]+)/([^/]+)/(stream-q-[^/]+|stream-[^/]+)/[^/]+\\.(ts|mp4)`)"
      traefik.http.routers.stremio-segments.service: "stremio-api"
      traefik.http.routers.stremio-segments.middlewares: "stremio-headers"
      traefik.http.routers.stremio-segments.entrypoints: "websecure"
      traefik.http.routers.stremio-segments.tls: "true"
      
      # Route 6: YouTube integration
      traefik.http.routers.stremio-youtube.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/yt/([^/]+)(\\.(json|js))?$`)"
      traefik.http.routers.stremio-youtube.service: "stremio-api"
      traefik.http.routers.stremio-youtube.middlewares: "stremio-headers"
      traefik.http.routers.stremio-youtube.entrypoints: "websecure"
      traefik.http.routers.stremio-youtube.tls: "true"
      
      # Route 7: Root endpoints
      traefik.http.routers.stremio-root.rule: "Host(`stremio.${DOMAIN}`) && PathRegexp(`^/(thumb\\.jpg|stats\\.json)$`)"
      traefik.http.routers.stremio-root.service: "stremio-api"
      traefik.http.routers.stremio-root.middlewares: "stremio-headers"
      traefik.http.routers.stremio-root.entrypoints: "websecure"
      traefik.http.routers.stremio-root.tls: "true"
      
      # Route 8: Comet addon - this would need the stremio-comet service defined elsewhere
      traefik.http.routers.stremio-comet.rule: "Host(`stremio.${DOMAIN}`) && PathPrefix(`/comet`)"
      traefik.http.routers.stremio-comet.service: "stremio-comet-service@file"
      traefik.http.routers.stremio-comet.middlewares: "stremio-headers"
      traefik.http.routers.stremio-comet.entrypoints: "websecure"
      traefik.http.routers.stremio-comet.tls: "true"
      
      # Route 9: Main web UI catch-all (lowest priority)
      traefik.http.routers.stremio-web-ui.rule: "Host(`stremio.${DOMAIN}`)"
      traefik.http.routers.stremio-web-ui.service: "stremio-web-ui"
      traefik.http.routers.stremio-web-ui.middlewares: "stremio-headers,stremio-security"
      traefik.http.routers.stremio-web-ui.entrypoints: "websecure"
      traefik.http.routers.stremio-web-ui.tls: "true"
      traefik.http.routers.stremio-web-ui.priority: 1
      
      # HTTP to HTTPS redirect
      traefik.http.routers.stremio-http-redirect.rule: "Host(`stremio.${DOMAIN}`)"
      traefik.http.routers.stremio-http-redirect.entrypoints: "web"
      traefik.http.routers.stremio-http-redirect.middlewares: "https-redirect"
      traefik.http.routers.stremio-http-redirect.service: "noop@internal"
      
      # Middleware for HTTP to HTTPS redirect
      traefik.http.middlewares.https-redirect.redirectscheme.scheme: "https"
      traefik.http.middlewares.https-redirect.redirectscheme.permanent: "true"