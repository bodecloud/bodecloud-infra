      DB_USERNAME: ${MIDARR_DB_USERNAME:-ubuntu}
      DB_PASSWORD: ${MIDARR_DB_PASSWORD:-docker}
      DB_DATABASE: ${MIDARR_DB_DATABASE:-midarr}
      DB_HOSTNAME: ${MIDARR_DB_HOSTNAME:-midarr-postgres}

      # Admin account
      SETUP_ADMIN_EMAIL: ${MIDARR_SETUP_ADMIN_EMAIL:-boden.crouch@gmail.com}
      SETUP_ADMIN_NAME: ${MIDARR_SETUP_ADMIN_NAME:-admin}
      SETUP_ADMIN_PASSWORD: ${MIDARR_SETUP_ADMIN_PASSWORD:-h4L0m4St3R327} # minimum length 12

      # Radarr integration
      RADARR_BASE_URL: radarr:${RADARR_PORT:-7878}
      RADARR_API_KEY: ${RADARR_API_KEY}

      # Sonarr integration
      SONARR_BASE_URL: sonarr:${SONARR_PORT:-8989}
      SONARR_API_KEY: ${SONARR_API_KEY}
      APP_MAILER_FROM: ${MIDARR_APP_MAILER_FROM:-boden.crouch@gmail.com}
      SENDGRID_API_KEY: ${MIDARR_SENDGRID_API_KEY}
      OAUTH_CLIENT_ID: ${MIDARR_OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${MIDARR_OAUTH_CLIENT_SECRET}
      OAUTH_ISSUER_URL: ${MIDARR_OAUTH_ISSUER_URL}
      OAUTH_AUTHORIZE_URL: ${MIDARR_OAUTH_AUTHORIZE_URL}
      OAUTH_TOKEN_URL: ${MIDARR_OAUTH_TOKEN_URL}
      OAUTH_REDIRECT_URI: ${MIDARR_OAUTH_REDIRECT_URI}
      OAUTH_USER_URL: ${MIDARR_OAUTH_USER_URL}
    labels:
      <<: *midarr-labels
      homepage.group: Backend Media Management
      homepage.name: Midarr
      homepage.icon: midarr.png
      homepage.href: https://midarr.${DOMAIN}
      homepage.description: A modern, easy to use download automation for torrents and usenet.
    healthcheck:
      test: curl -fs http://localhost:4000 > /dev/null || exit 1
      interval: ${MIDARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${MIDARR_HEALTHCHECK_TIMEOUT:-15s}
      start_period: ${MIDARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  midarr-postgres:
    image: postgres:17.4
    container_name: midarr-postgres
    hostname: midarr-postgres
    networks:
      - infranet
    ports:
      - ${MIDARR_POSTGRES_PORT:-5428}:5432
    volumes:
      - ${CONFIG_PATH:-./configs}/midarr/db/data:/var/lib/postgresql/data
      - ${CONFIG_PATH:-./configs}/midarr/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_USER: ${MIDARR_DB_USERNAME:-ubuntu}
      POSTGRES_PASSWORD: ${MIDARR_DB_PASSWORD:-docker}
      POSTGRES_DB: ${MIDARR_DB_DATABASE:-midarr}
    healthcheck:
      test: "exit 0"
    restart: unless-stopped

  moviematch: # http://localhost:2001 or https://bolabaden.org:2001 or https://moviematch.bolabaden.org or https://bolabaden.org/moviematch
    # 🔹🔹 Moviematch 🔹🔹
    # Allows two or more people to select movies to watch on Plex.
    depends_on:
      - plex
    image: lukechannings/moviematch
    container_name: moviematch
    hostname: moviematch
    networks:
      - infranet
    ports:
      - ${MOVIEMATCH_PORT:-2001}:8000
    <<: [*common-uidgid, *resource-limits]
    environment:
      <<: *common-env
      LIBRARY_FILTER: "${MOVIEMATCH_LIBRARY_FILTER:-}"
      PLEX_TOKEN: "${PLEX_TOKEN}" # see instructions here: https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/
      PLEX_URL: "http://plex:${PLEX_PORT:-32400}"
    labels:
      <<: *moviematch-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *moviematch-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  overseerr:
    # 🔹🔹 Overseerr 🔹🔹
    depends_on:
      - plex
    image: linuxserver/overseerr
    container_name: overseerr
    hostname: overseerr
    networks:
      - infranet
    ports:
      - "${OVERSEERR_PORT:-5050}:5055"
    volumes:
      - ${CONFIG_PATH:-./configs}/overseerr/config:/config
    <<: [*common-uidgid, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *overseerr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *overseerr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  plex:
    # 🔹🔹 Plex Media Server 🔹🔹
    image: plexinc/pms-docker
    container_name: plex
    hostname: plex
    networks:
      - infranet
      - default
    ports:
      - ${PLEX_PORT:-32400}:32400/tcp
      - ${PLEX_DLNA_PORT:-1900}:1900/udp
      - ${PLEX_PORT2:-8324}:8324/tcp
      - ${PLEX_PORT3:-32410}:32410/udp
      - ${PLEX_PORT4:-32412}:32412/udp
      - ${PLEX_PORT5:-32413}:32413/udp
      - ${PLEX_PORT6:-32414}:32414/udp
      - ${PLEX_PORT7:-32469}:32469/tcp
    # Uncomment below line if you have an embedded intel GPU
    #devices:
    #  - /dev/dri:/dev/dri
    volumes:
      - "${DATA_DIR:-./data}/media/anime:/media/anime"
      - "${DATA_DIR:-./data}/media/movies:/media/movies"
      - "${DATA_DIR:-./data}/media/music:/media/music"
      - "${DATA_DIR:-./data}/media/music/videos:/media/music/videos"
      - "${DATA_DIR:-./data}/media/tv:/media/tv"
      - "${CONFIG_PATH:-./configs}/plex:/config"
      - "${CONFIG_PATH:-./configs}/plex/config/osx-config:/config/Library/Application Support/Plex Media Server"
    <<: *resource-limits
    environment:
      <<: *common-env
      PLEX_CLAIM: ${PLEX_CLAIM}
    labels:
      <<: *plex-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
      labels:
        <<: *plex-labels
    restart: unless-stopped

  plexist:
    # 🔹🔹 Plexist 🔹🔹
    # Sync your Plex library to Spotify, Deezer, and more.
    image: gyarbij/plexist
    container_name: plexist
    hostname: plexist
    <<: [*common-uidgid, *resource-limits]
    environment:
      <<: *common-env
      PLEX_URL: "${PLEX_URL}" # URL for the Plex server
      PLEX_TOKEN: "${PLEX_TOKEN}" # see instructions here: https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/
      WRITE_MISSING_AS_CSV: "${PLEXIST_WRITE_MISSING_AS_CSV:-0}" # <1 or 0>, Default 0, 1 = writes missing tracks to a csv
      ADD_PLAYLIST_POSTER: "${PLEXIST_ADD_PLAYLIST_POSTER:-1}" # <1 or 0>, Default 1, 1 = add poster for each playlist
      ADD_PLAYLIST_DESCRIPTION: "${PLEXIST_ADD_PLAYLIST_DESCRIPTION:-1}" # <1 or 0>, Default 1, 1 = add description for each playlist
      APPEND_INSTEAD_OF_SYNC: "${PLEXIST_APPEND_INSTEAD_OF_SYNC:-0}" # <0 or 1>, Default 0, 1 = Sync tracks, 0 = Append only
      SECONDS_TO_WAIT: "${PLEXIST_SECONDS_TO_WAIT:-84000}" # Seconds to wait between syncs
      SPOTIFY_CLIENT_ID: "${PLEXIST_SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${PLEXIST_SPOTIFY_CLIENT_SECRET}"
      SPOTIFY_USER_ID: "${PLEXIST_SPOTIFY_USER_ID}"
      DEEZER_USER_ID: "${PLEXIST_DEEZER_USER_ID}"
      DEEZER_PLAYLIST_ID: "${PLEXIST_DEEZER_PLAYLIST_ID}" # Deezer playlist IDs space separated
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  prefetcharr-jellyfin:
    # 🔹🔹 Prefetcharr 🔹🔹  https://github.com/phueber/prefetcharr
    # Let Sonarr fetch the next season of a show you are watching on Jellyfin.
    image: phueber/prefetcharr
    container_name: prefetcharr-jellyfin
    hostname: prefetcharr-jellyfin
    volumes:
      - ${CONFIG_PATH:-./configs}/prefetcharr/jellyfin/log:${PREFETCHARR_JELLYFIN_INTERNAL_LOG_DIR:-/log}
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      MEDIA_SERVER_TYPE: jellyfin # `jellyfin`, `emby` or `plex`
      INTERVAL: ${PREFETCHARR_JELLYFIN_INTERVAL:-900} # Polling interval in seconds
      LOG_DIR: ${PREFETCHARR_JELLYFIN_INTERNAL_LOG_DIR:-/log}
      MEDIA_SERVER_API_KEY: ${JELLYFIN_API_KEY}
      MEDIA_SERVER_URL: http://host.docker.internal:${JELLYFIN_PORT:-8096}
      REMAINING_EPISODES: ${PREFETCHARR_JELLYFIN_REMAINING_EPISODES:-3} # The last <NUM> episodes trigger a search
      RUST_LOG: ${PREFETCHARR_JELLYFIN_LOG_LEVEL:-debug}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_URL: https://sonarr.${DOMAIN}
      # Optional: Only monitor sessions for specific user IDs or names
      # - USERS=john,12345,alex
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  prefetcharr-plex:
    # 🔹🔹 Prefetcharr 🔹🔹
    # Let Sonarr fetch the next season of a show you are watching on Plex.
    image: phueber/prefetcharr
    container_name: prefetcharr-plex
    hostname: prefetcharr-plex
    networks:
      - infranet
    volumes:
      - ${CONFIG_PATH:-./configs}/prefetcharr/plex/log:${PREFETCHARR_PLEX_INTERNAL_LOG_DIR:-/log}
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      MEDIA_SERVER_TYPE: plex # `jellyfin`, `emby` or `plex`
      INTERVAL: ${PREFETCHARR_PLEX_INTERVAL:-900} # 15 minutes
      LOG_DIR: ${PREFETCHARR_PLEX_INTERNAL_LOG_DIR:-/log}
      MEDIA_SERVER_API_KEY: ${PLEX_TOKEN}
      MEDIA_SERVER_URL: https://plex.${DOMAIN}
      REMAINING_EPISODES: ${PREFETCHARR_PLEX_REMAINING_EPISODES:-3} # The last <NUM> episodes trigger a search
      RUST_LOG: ${PREFETCHARR_PLEX_LOG_LEVEL:-debug}
      RADARR_API_KEY: ${RADARR_API_KEY}
      RADARR_URL: https://radarr.${DOMAIN}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_URL: https://sonarr.${DOMAIN}
      # Optional: Only monitor sessions for specific user IDs or names
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  prometheus:
    # 🔹🔹 Prometheus 🔹🔹  https://github.com/prometheus/prometheus
    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    <<: *resource-limits
    networks:
      - infranet
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ${CONFIG_PATH:-./configs}/prometheus:${PROMETHEUS_INTERNAL_CONFIG_PATH:-/etc/prometheus}
      - ${CONFIG_PATH:-./configs}/prometheus/console_libraries:${PROMETHEUS_INTERNAL_WEB_CONSOLE_LIBRARIES:-/etc/prometheus/console_libraries}
      - ${CONFIG_PATH:-./configs}/prometheus/consoles:${PROMETHEUS_INTERNAL_WEB_CONSOLE_TEMPLATES:-/etc/prometheus/consoles}
    command: [
        "--config.file=${PROMETHEUS_INTERNAL_CONFIG_PATH:-/etc/prometheus}/prometheus.yml", # Specifies the path to the Prometheus configuration file
        "--storage.tsdb.retention.size=${PROMETHEUS_STORAGE_TSDB_RETENTION_SIZE:-1GB}", # Sets the maximum size of the time series database to 1GB
        "--web.console.libraries=${PROMETHEUS_INTERNAL_WEB_CONSOLE_LIBRARIES:-/etc/prometheus/console_libraries}", # Path to console libraries for the web UI
        "--web.console.templates=${PROMETHEUS_INTERNAL_WEB_CONSOLE_TEMPLATES:-/etc/prometheus/consoles}", # Path to console templates for the web UI
        "--web.enable-lifecycle", # Enables lifecycle management for the web interface (e.g., for graceful shutdown)
      ]
    labels:
      <<: *prometheus-labels
    environment:
      <<: *common-env
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *prometheus-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  prowlarr:
    # 🔹🔹 Prowlarr 🔹🔹
    image: linuxserver/prowlarr
    container_name: prowlarr
    network_mode: service:gluetun-openvpn
    volumes:
      - ${CONFIG_PATH:-./configs}/prowlarr/config:/config
    <<: *common-logging
    environment:
      <<: *common-env
    labels:
      <<: *prowlarr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *prowlarr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  qbittorrent:
    # 🔹🔹 qBittorrent 🔹🔹
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    hostname: qbittorrent
    <<: [*common-uidgid, *common-logging]
    networks:
      - infranet
    ports:
      - ${QB_WEBUI_PORT:-8084}:${QB_WEBUI_PORT:-8084}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}/udp
    volumes:
      - ${DATA_PATH:-./data}/downloads:/downloads
      - ${DATA_PATH:-./data}/downloads/incomplete:/downloads/incomplete
      - ${CONFIG_PATH:-./configs}/qbittorrent/config:/config
      - ${CONFIG_PATH:-./configs}/qbittorrent/scripts:/scripts
    environment:
      <<: *common-env
      TORRENTING_PORT: ${QB_TORRENTING_PORT:-6881}
      WEBUI_PORT: ${QB_WEBUI_PORT:-8084}
    labels:
      <<: *qbittorrent-labels
      homepage.group: Download Clients
      homepage.name: qBittorrent Downloader
      homepage.icon: qbittorrent.png
      homepage.href: https://qbittorrent.${DOMAIN}
      homepage.description: A user-friendly torrent client for downloading and managing files via BitTorrent, offering a clean interface and powerful features.
      homepage.weight: 2
      homepage.widget.type: qbittorrent
      homepage.widget.url: https://qbittorrent.${DOMAIN}
      homepage.widget.username: ${QBITTORRENT_USERNAME:-admin}
      homepage.widget.password: ${QBITTORRENT_PASSWORD:-adminadmin}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *qbittorrent-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  radarr:
    # 🔹🔹 Radarr 🔹🔹
    image: linuxserver/radarr
    container_name: radarr
    hostname: ${RADARR_HOSTNAME:-radarr}
    networks:
      - infranet
    ports:
      - ${RADARR_PORT:-7878}:7878
    volumes:
      - ${DATA_PATH:-./data}/media/movies:/movies
      - ${DATA_PATH:-./data}/downloads/movies:/downloads/movies
      - ${DATA_PATH:-./data}/downloads/complete:/downloads/complete
      - ${DATA_PATH:-./data}/downloads/incomplete:/downloads/incomplete
      - ${CONFIG_PATH:-./configs}/radarr/config:/config
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *radarr-labels
      homepage.group: Movie Management
      homepage.name: Radarr Movies
      homepage.icon: radarr.png
      homepage.href: https://radarr.${DOMAIN}
      homepage.description: Automates your movie downloads, finding and adding new releases to your collection as they become available.
      homepage.weight: 1
      homepage.widget.type: radarr
      homepage.widget.url: https://radarr.${DOMAIN}
      homepage.widget.key: ${RADARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *radarr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test: curl -fs http://localhost:7878 > /dev/null || exit 1
      interval: ${RADARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${RADARR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${RADARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${RADARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  readarr:
    # 🔹🔹 Readarr 🔹🔹
    image: linuxserver/readarr:develop
    container_name: readarr
    hostname: readarr
    networks:
      - infranet
    ports:
      - ${READARR_PORT:-8787}:8787
    volumes:
      - ${CONFIG_PATH:-./configs}/readarr/config:/config
      - ${DATA_PATH:-./data}/media/books:/books
      - ${DATA_PATH:-./data}/media/comics:/comics
      - ${DATA_PATH:-./data}/media/manga:/manga
      - ${DATA_PATH:-./data}/downloads:/downloads
      - ${DATA_PATH:-./data}/downloads/complete:/downloads/complete
      - ${DATA_PATH:-./data}/downloads/incomplete:/downloads/incomplete
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *readarr-labels
      homepage.group: E-books & Comics
      homepage.name: Readarr
      homepage.icon: readarr.png
      homepage.href: https://readarr.${DOMAIN}
      homepage.description: Manages and automates the downloading of ebooks and audiobooks, ensuring your digital library is always up-to-date.
      homepage.weight: 5
      homepage.widget.type: readarr
      homepage.widget.url: https://readarr.${DOMAIN}
      homepage.widget.key: ${READARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *readarr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test: curl -fs http://localhost:8787 > /dev/null || exit 1
      interval: ${READARR_HEALTHCHECK_INTERVAL:-5s}
      timeout: ${READARR_HEALTHCHECK_TIMEOUT:-4s}
      retries: ${READARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${READARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  recyclarr:
    # 🔹🔹 Recyclarr 🔹🔹  # https://github.com/recyclarr/recyclarr
    # command-line application that will automatically synchronize recommended settings from the TRaSH guides to your Sonarr/Radarr instances.
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    hostname: recyclarr
    networks:
      - infranet
    ports:
      - ${RECYCLARR_PORT:-32888}:32888
    init: true
    volumes:
      - ${CONFIG_PATH:-./configs}/recyclarr:/config
    <<: *resource-limits
    environment:
      <<: *common-env
      TINI_SUBREAPER: "true"
      RADARR_API_KEY: ${RADARR_API_KEY}
      RADARR_BASE_URL: https://radarr.${DOMAIN}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_BASE_URL: https://sonarr.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  redis:
    #image: redis:alpine
    image: docker.io/library/redis:alpine
    container_name: redis
    hostname: ${REDIS_HOSTNAME:-redis}
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
    networks:
      - infranet
    ports:
      - ${REDIS_PORT:-6379}:6379
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${CONFIG_PATH:-./configs}/redis:/data
    command: --save ${REDIS_SAVE:-60 1} --loglevel ${REDIS_LOGLEVEL:-warning}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: ${REDIS_HEALTHCHECK_START_PERIOD:-20s}
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-30s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
    restart: unless-stopped

  requestrr:
    image: thomst08/requestrr
    container_name: requestrr
    hostname: requestrr
    networks:
      - infranet
    ports:
      - ${REQUESTRR_PORT:-4545}:4545
    volumes:
      - ${CONFIG_PATH:-./configs}/requestrr/config:/root/config
    <<: *resource-limits
    environment:
      <<: *common-env
    labels:
      <<: *requestrr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *requestrr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  searxng:
    # 🔹🔹 SearxNG 🔹🔹  # https://hub.docker.com/r/searxng/searxng
    # SearxNG is a privacy-respecting, hackable, open-source metasearch engine.
    image: docker.io/searxng/searxng
    container_name: searxng
