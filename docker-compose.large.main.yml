    volumes:
      - ${DATA_PATH:-./data}/media/anime:/anime
      - ${DATA_PATH:-./data}/media/tv:/tv
      - ${DATA_PATH:-./data}/downloads/anime:/downloads/anime
      - ${DATA_PATH:-./data}/downloads/tv:/downloads/tv
      - ${CONFIG_PATH:-./configs}/sonarr/config:/config
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *sonarr-labels
      homepage.group: TV Management
      homepage.name: Sonarr TV
      homepage.icon: sonarr.png
      homepage.href: https://sonarr.${DOMAIN}
      homepage.description: Manages your TV show downloads, automatically finding and adding new episodes as they air, keeping your library organized.
      homepage.weight: 0
      homepage.widget.type: sonarr
      homepage.widget.url: https://sonarr.${DOMAIN}
      homepage.widget.key: ${SONARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *sonarr-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test: curl -fs http://localhost:8989 > /dev/null || exit 1
      interval: ${SONARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${SONARR_HEALTHCHECK_TIMEOUT:-15s}
      start_period: ${SONARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: always

  speedtest:
    # 🔹🔹 Speedtest 🔹🔹
    image: linuxserver/speedtest-tracker
    container_name: speedtest
    hostname: speedtest
    networks:
      - infranet
      - traefik_public
    ports:
      - ${SPEEDTEST_TRACKER_PORT:-8765}:80
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${CONFIG_PATH:-./configs}/speedtest-tracker/config:/config
      - ${CERTS_PATH:-./certs}/speedtest-tracker/keys:/config/keys
    <<: *resource-limits
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL} # Email of the initial admin user. Note: Only effective during initial setup.
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME} # Name of the initial admin user. Note: Only effective during initial setup.
      ADMIN_PASSWORD: ${SPEEDTEST_TRACKER_ADMIN_PASSWORD:-b00tstr4p} # Password of the initial admin user. Note: Only effective during initial setup.
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60} # Number of requests per minute to the API. Default: 60
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY} # Key used to encrypt and decrypt data. You can generate a key at https://speedtest-tracker.dev.
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker} # Used to define the application's name in the dashboard and in notifications.
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}} # Application timezone should be set if your database does not use UTC as its  timezone.
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-} # URL used for links in emails and notifications.
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-} # URL used for assets, needed when using a reverse proxy.
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true} # Begin the dashboard axis charts at zero. Default: true
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i} # Set the formatting of timestamps in charts.
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl} # Width of the content section of each page. Can be set to any value found in the Filament docs. Default: 7xl
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s} # Set the formatting of timestamps in tables and notifications.
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}} # Display timestamps in your local time.
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0} # Set the value to greater than zero to prune stored results. This value should be represented in days.
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true} # Enables the public dashboard for guest (unauthenticated) users. Default: false
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-} # Comma separated list of server IDs that should not be used when running speedtests.
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-} # Set the network interface to use for the test. This need to be the network interface available inside the container
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-0 * * * *} # Cron expression used to run speedtests on a scheduled basis.
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-} # Comma separated list of server IDs to randomly use for speedtest.
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-} # A comma separated list of public IP addresses where tests will be skipped when present.
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900} # Set the Download Threshold. Note: Only effective during initial setup.
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true} # Enable the thresholds. Note: Only effective during initial setup.
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25} # Set the Ping Threshold. Note: Only effective during initial setup.
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900} # Set the Upload Threshold. Note: Only effective during initial setup.
    labels:
      <<: *speedtest-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *speedtest-labels
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test: curl -fs http://localhost:80 > /dev/null || exit 1
      start_period: ${SPEEDTEST_TRACKER_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${SPEEDTEST_TRACKER_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${SPEEDTEST_TRACKER_HEALTHCHECK_INTERVAL:-30s}
    restart: unless-stopped

  suggestarr:
    # 🔹🔹 Suggestarr 🔹🔹
    # Suggestarr is a tool that helps you manage your media library by suggesting new content to add to it.
    depends_on:
      suggestarr-postgres:
        condition: service_healthy
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    hostname: suggestarr
    networks:
      - infranet
    ports:
      - ${SUGGESTARR_PORT:-5003}:5000
    volumes:
      # touch ${CONFIG_PATH:-./configs}/suggestarr/config.yaml
      - ${CONFIG_PATH:-./configs}/suggestarr:/app/config/config_files
    <<: *resource-limits
    environment:
      <<: *common-env
      CRON_TIMES: ${SUGGESTARR_CRON_TIMES:-0 0 * * *}
      DB_HOST: ${SUGGESTARR_DB_HOST:-suggestarr-postgres}
      DB_NAME: ${SUGGESTARR_DB_NAME:-suggestarr}
      DB_PASSWORD: ${SUGGESTARR_DB_PASSWORD:-suggestarr}
      DB_PORT: ${SUGGESTARR_DB_PORT:-5434}
      DB_TYPE: ${SUGGESTARR_DB_TYPE:-postgres}
      DB_USER: ${SUGGESTARR_DB_USER:-suggestarr}
      TMDB_API_KEY: ${TMDB_API_KEY}
      JELLYFIN_API_URL: ${SUGGESTARR_JELLYFIN_API_URL:-http://jellyfin:8096}
      JELLYFIN_TOKEN: ${JELLYFIN_API_KEY}
      PLEX_TOKEN: ${PLEX_TOKEN}
      SEER_TOKEN: ${SEER_TOKEN}
      PLEX_API_URL: ${SUGGESTARR_PLEX_API_URL:-http://plex:32400}
      FILTER_GENRES_EXCLUDE: ${SUGGESTARR_FILTER_GENRES_EXCLUDE:-[]}
      FILTER_INCLUDE_NO_RATING: ${SUGGESTARR_FILTER_INCLUDE_NO_RATING:-true}
      FILTER_LANGUAGE: ${SUGGESTARR_FILTER_LANGUAGE:-en}
      FILTER_NUM_SEASONS: ${SUGGESTARR_FILTER_NUM_SEASONS:-}
      FILTER_REGION_PROVIDER: ${SUGGESTARR_FILTER_REGION_PROVIDER:-}
      FILTER_RELEASE_YEAR: ${SUGGESTARR_FILTER_RELEASE_YEAR:-}
      FILTER_STREAMING_SERVICES: ${SUGGESTARR_FILTER_STREAMING_SERVICES:-[]}
      FILTER_TMDB_MIN_VOTES: ${SUGGESTARR_FILTER_TMDB_MIN_VOTES:-}
      FILTER_TMDB_THRESHOLD: ${SUGGESTARR_FILTER_TMDB_THRESHOLD:-}
      HONOR_JELLYSEER_DISCOVERY: ${SUGGESTARR_HONOR_JELLYSEER_DISCOVERY:-false}
      JELLYFIN_LIBRARIES: ${SUGGESTARR_JELLYFIN_LIBRARIES:-[]}
      MAX_CONTENT_CHECKS: ${SUGGESTARR_MAX_CONTENT_CHECKS:-10}
      MAX_SIMILAR_MOVIE: ${SUGGESTARR_MAX_SIMILAR_MOVIE:-5}
      MAX_SIMILAR_TV: ${SUGGESTARR_MAX_SIMILAR_TV:-2}
      PLEX_LIBRARIES: ${SUGGESTARR_PLEX_LIBRARIES:-[]}
      SEARCH_SIZE: ${SUGGESTARR_SEARCH_SIZE:-20}
      SEER_API_URL: ${SUGGESTARR_SEER_API_URL:-}
      SEER_SESSION_TOKEN: ${SUGGESTARR_SEER_SESSION_TOKEN:-}
      SEER_USER_NAME: ${SEER_USERNAME:-}
      SEER_USER_PSW: ${SEER_PASSWORD:-}
      SELECTED_SERVICE: ${SUGGESTARR_SELECTED_SERVICE:-}
      SELECTED_USERS: ${SUGGESTARR_SELECTED_USERS:-[]}
      SUBPATH: ${SUGGESTARR_SUBPATH:-}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  suggestarr-postgres:
    image: postgres:17.4
    container_name: suggestarr-postgres
    hostname: suggestarr-postgres
    networks:
      - infranet
    ports:
      - ${SUGGESTARR_POSTGRES_PORT:-5434}:5432
    volumes:
      - ${CONFIG_PATH:-./configs}/suggestarr/db/data:/var/lib/postgresql/data
      - ${CONFIG_PATH:-./configs}/suggestarr/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_USER: ${SUGGESTARR_DB_USER:-suggestarr}
      POSTGRES_PASSWORD: ${SUGGESTARR_DB_PASSWORD:-suggestarr}
      POSTGRES_DB: ${SUGGESTARR_DB_NAME:-suggestarr}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -d ${SUGGESTARR_DB_NAME:-suggestarr} -U ${SUGGESTARR_DB_USER:-suggestarr}",
        ]
      interval: ${SUGGESTARR_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${SUGGESTARR_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${SUGGESTARR_HEALTHCHECK_RETRIES:-5}
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale
    container_name: tailscale
    hostname: tailscale
    <<: *resource-limits
    networks:
      - infranet
    ports:
      - "${TS_SOCKS5_PORT:-1055}:1055/tcp"
      - "${TS_SOCKS5_PORT:-1055}:1055/udp"
      - "${TS_PORT:-41641}:41641/tcp"
      - "${TS_PORT:-41641}:41641/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${CONFIG_PATH:-./configs}/tailscale/state:${TS_STATE_DIR:-/var/lib/tailscale}
    environment:
      <<: *common-env
      TS_ACCEPT_DNS: "${TS_ACCEPT_DNS:-false}" # Accept DNS configuration from the admin console. Not accepted by default.
      TS_AUTH_ONCE: "${TS_AUTH_ONCE:-false}" # Attempt to log in only if not already logged in. False by default, to forcibly log in every time the container starts.
      TS_AUTHKEY: "${TS_AUTHKEY}" # An auth key used to authenticate the container. This is equivalent to what you'd pass to tailscale login --auth-key=.
      TS_DEST_IP: "${TS_DEST_IP:-}" # Proxy all incoming Tailscale traffic to the specified destination IP.
      TS_ENABLE_HEALTH_CHECK: "${TS_ENABLE_HEALTH_CHECK:-true}" # Set to true to enable an unauthenticated /healthz endpoint at the address specified by TS_LOCAL_ADDR_PORT.
      TS_ENABLE_METRICS: "${TS_ENABLE_METRICS:-true}" # Set to true to enable an unauthenticated /metrics endpoint at the address specified by TS_LOCAL_ADDR_PORT.
      TS_EXTRA_ARGS: "${TS_EXTRA_ARGS:-}" # Any other flags to pass in to the Tailscale CLI in a tailscale up command.
      TS_HOSTNAME: "${TS_HOSTNAME:-alphabox}" # Use the specified hostname for the node. This is equivalent to tailscale set --hostname=.
      TS_KUBE_SECRET: "${TS_KUBE_SECRET:-}" # If running in Kubernetes, the Kubernetes secret name where Tailscale state is stored. The default is tailscale.
      TS_LOCAL_ADDR_PORT: "${TS_LOCAL_ADDR_PORT:-}" # Specifies the [<addr>]:<port> on which to serve local metrics and health check HTTP endpoints if enabled through TS_ENABLE_METRICS or TS_ENABLE_HEALTH_CHECK.
      TS_OUTBOUND_HTTP_PROXY_LISTEN: "${TS_OUTBOUND_HTTP_PROXY_LISTEN:-}" # Set an address and port for the HTTP proxy. This will be passed to tailscaled --outbound-http-proxy-listen=.
      TS_ROUTES: "${TS_ROUTES:-172.24.0.0/16}" # Advertise subnet routes. This is equivalent to tailscale set --advertise-routes=.
      TS_SERVE_CONFIG: "${TS_SERVE_CONFIG:-}" # Accepts a JSON file to programmatically configure Serve and Funnel functionality.
      TS_SOCKET: "${TS_SOCKET:-/var/run/tailscale/tailscaled.sock}" # Unix socket path used by the Tailscale binary, where the tailscaled LocalAPI socket is created.
      TS_SOCKS5_SERVER: "${TS_SOCKS5_SERVER:-:1055}" # Set an address and port for the SOCKS5 proxy. This will be passed to tailscaled --socks5-server=.
      TS_STATE_DIR: "${TS_STATE_DIR:-/var/lib/tailscale}" # Directory where the state of tailscaled is stored. This needs to persist across container restarts.
      TS_TAILSCALED_EXTRA_ARGS: "${TS_TAILSCALED_EXTRA_ARGS:-}" # Any other flags to pass in to tailscaled.
      TS_USERSPACE: "${TS_USERSPACE:-false}" # Enable userspace networking, instead of kernel networking. Enabled by default.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
    restart: unless-stopped

  tautulli:
    # 🔹🔹 Tautulli 🔹🔹
    # Monitor your Plex Media Server
    depends_on:
      - plex
    image: tautulli/tautulli
    container_name: tautulli
    hostname: tautulli
    networks:
      - infranet
    ports:
      - ${TAUTULLI_PORT:-8181}:8181
    volumes:
      - "${CONFIG_PATH:-./configs}/tautulli:/config:rw"
      - "${CONFIG_PATH:-./configs}/plex/config/osx-config/Logs:/logs:ro"
    environment:
      <<: *common-env
    labels:
      <<: *tautulli-labels
      homepage.group: Media Monitoring
      homepage.name: Tautulli
      homepage.icon: tautulli.png
      homepage.href: https://tautulli.${DOMAIN}
      homepage.description: Monitor your Plex Media Server
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
      labels:
        <<: *tautulli-labels
    restart: unless-stopped

  tdarr:
    # 🔹🔹 Tdarr 🔹🔹  # https://github.com/haveagitgat/tdarr
    # Library Optimizer
    # use this one with arm:
    # image: ghcr.io/haveagitgat/tdarr:2.35.02@sha256:14a86431d9d86070915d8ff444e6d56ec4e5fb78b0bd664e07d67e5f3b93e839
    image: ghcr.io/haveagitgat/tdarr
    container_name: tdarr
    hostname: tdarr
    networks:
      - infranet
    ports:
      - ${TDARR_WEBUI_PORT:-8265}:${TDARR_WEBUI_PORT:-8265} # WebUI port
      - ${TDARR_SERVER_PORT:-8266}:${TDARR_SERVER_PORT:-8266} # Server port
    <<: [*common-uidgid, *resource-limits]
    volumes:
      - ${CONFIG_PATH:-./configs}/tdarr/configs:/app/configs
      - ${CONFIG_PATH:-./configs}/tdarr/logs:/app/logs
      - ${CONFIG_PATH:-./configs}/tdarr/server:/app/server
      - ${CONFIG_PATH:-./configs}/tdarr/transcode_cache:/temp
      - ${DATA_DIR:-./data}/media/anime:/media/anime
      - ${DATA_DIR:-./data}/media/movies:/media/movies
      - ${DATA_DIR:-./data}/media/tv:/media/tv
    #      devices:
    #      - driver: nvidia
    #        count: all
    #        capabilities: [gpu]
    environment:
      <<: *common-env
      UMASK_SET: 002
      ffmpegVersion: ${TDARR_FFMPEG_VERSION:-6}
      inContainer: ${TDARR_IN_CONTAINER:-"true"}
      internalNode: ${TDARR_INTERNAL_NODE:-"true"}
      nodeName: ${TDARR_NODE_NAME:-MyInternalNode}
      serverIP: ${TDARR_SERVER_IP:-0.0.0.0}
      serverPort: ${TDARR_SERVER_PORT:-8266}
      webUIPort: ${TDARR_WEBUI_PORT:-8265}
      #NVIDIA_DRIVER_CAPABILITIES: all
      #NVIDIA_VISIBLE_DEVICES: all
    labels:
      <<: *tdarr-labels
      homepage.group: Media Processing
      homepage.name: Tdarr
      homepage.icon: tdarr.png
      homepage.href: https://tdarr.${DOMAIN}
      homepage.description: Transcodes and processes your media files, ensuring they are optimized for playback on various devices and platforms.
      homepage.weight: 1
      homepage.widget.type: tdarr
      homepage.widget.url: https://tdarr.${DOMAIN}
      homepage.widget.key: ${TDARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
      labels:
        <<: *tdarr-labels
    restart: unless-stopped

  tor:
    # 🔹🔹 Tor 🔹🔹
    # TOR is a tool for anonymizing your internet connection.
    image: dperson/torproxy #based on https://github.com/dperson/torproxy
    hostname: tor
    container_name: tor
    restart: always
    networks:
      - tor_network
    ports:
      - "${TOR_HTTP_PORT:-8118}:8118" # HTTP proxy
      - "${TOR_SOCKS5_PORT:-9050}:9050" # SOCKS5 proxy
    environment:
      <<: *common-env
      BW: "${TOR_BW:-100}" # Set a TOR relay bandwidth limit in KB, IE 50
      EXITNODE: "${TOR_EXITNODE:-1}" # Allow TOR traffic to access the internet from your IP. To enable, set to 1. To disable, set to 0.
      LOCATION: "${TOR_LOCATION:-CST6CDT}" # Configure the country to use for exit node selection
      PASSWORD: "${TOR_PASSWORD:-tor}" # Configure HashedControlPassword for control port
      SERVICE: "${TOR_SERVICE:-80;hostname:80}" # Configure hidden service, IE '80;hostname:80'
      TORUSER: "${TOR_USER:-tor}" # If set use named user instead of 'tor' (for example root)
    <<: *resource-limits
    labels:
      <<: *tor-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority

  # Multiple DNS challenge provider are not supported with Traefik,
  # but you can use CNAME to handle that. For example, if you have example.org (account foo) and
  # example.com (account bar) you can create a CNAME on example.org called _acme-challenge.example.org
  # pointing to challenge.example.com. This way, you can obtain certificates for example.org with the bar account.
  traefik:
    # 🔹🔹 Traefik 🔹🔹
    image: traefik:latest
    container_name: traefik
    hostname: traefik
    networks:
      - infranet
      - traefik_public2
    ports:
      # Listen on port 80, default for HTTP, necessary to redirect to HTTPS
      - ${TRAEFIK_WEB_PORT:-80}:${TRAEFIK_WEB_PORT:-80}
      # Listen on port 443, default for HTTPS
      - ${TRAEFIK_WEBSECURE_PORT:-443}:${TRAEFIK_WEBSECURE_PORT:-443}
      # Listen on port 8099, default for the Traefik API and Dashboard
      - ${TRAEFIK_DASHBOARD_PORT:-8099}:${TRAEFIK_DASHBOARD_PORT:-8099}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ${CONFIG_PATH:-./configs}/traefik/config:/config
      - ${CONFIG_PATH:-./configs}/traefik/config:/etc/traefik
      - ${CERTS_PATH:-./certs}:/certs
    #      - /etc/localtime:/etc/localtime:ro
    <<: *common-uidgid
    environment:
      <<: *common-env
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL} # Email address used for Letsencrypt registration.
      # CNAME are supported (and sometimes even encouraged), but there are a few cases where they can be problematic.
      # If needed, CNAME support can be disabled with the following environment variable:
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false} # Disable CNAME support for DNS challenges. (Default: false)
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-} # ZeroSSL API key.
    command:
      - --accessLog=true # Enable the access log, with HTTP requests
      - --api # Enable api/dashboard. When set to true, its sub option api.dashboard is also set to true.
      - --api.dashboard=true # Enable dashboard (default: false)
      - --api.debug=false # Enable additional endpoints for debugging and profiling (default: false)
      - --api.disableDashboardAd=true # Disable the advertisement from the dashboard (default: false)
      - --api.insecure=true # Enable the API and the dashboard on the entryPoint named traefik (default: false)
      - --entrypoints.web.address=:${TRAEFIK_WEB_PORT:-80}
      - --entrypoints.web.asDefault=true # Adds this EntryPoint to the list of default EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.web.http.redirections.entrypoint.scheme=https # The redirection target scheme (optional, default: https)
      - --entrypoints.web.http.redirections.entrypoint.to=websecure # The redirection target entry point.
      - --entrypoints.web.observability.accessLogs=true
      - --entrypoints.web.observability.metrics=true
      - --entrypoints.web.observability.tracing=true
      - --entrypoints.websecure.address=:${TRAEFIK_WEBSECURE_PORT:-443}
      - --entrypoints.websecure.asDefault=true # Adds this EntryPoint to the list of default EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.websecure.http.tls.certResolver=myresolver
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}
      - --entrypoints.websecure.http.tls.domains[1].main=${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}
      - --entrypoints.websecure.http.tls.domains[1].sans=*.${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}
      - --entrypoints.websecure.http.tls=true
      - --certificatesresolvers.myresolver.acme.caServer=https://acme.zerossl.com/v2/DV90 # Let's Encrypt has a limit: 5 certs generated a week. Use staging when breaking things (specifically https://acme-staging-v02.api.letsencrypt.org/directory). see https://doc.traefik.io/traefik/https/acme/#caserver
      - --certificatesresolvers.myresolver.acme.certificatesDuration=2160 # The certificates' duration in hours, exclusively used to determine renewal dates. (Default: 2160)
      - --certificatesresolvers.myresolver.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.myresolver.acme.dnsChallenge=true # Use the DNS challenges instead of HTTP/TLS challenges. (Default: false)
      - --certificatesresolvers.myresolver.acme.eab.hmacEncoded=${TRAEFIK_ACME_EAB_HMAC_ENCODED} # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Base64 encoded HMAC key from External CA.
      - --certificatesresolvers.myresolver.acme.eab.kid=${TRAEFIK_ACME_EAB_KID} # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Key identifier from External CA.
      - --certificatesresolvers.myresolver.acme.email=${ACME_RESOLVER_EMAIL} # Email address used for registration.
      - --certificatesresolvers.myresolver.acme.httpChallenge.entryPoint=web
      - --certificatesresolvers.myresolver.acme.httpChallenge=true # Activate HTTP-01 Challenge. (Default: false)
      - --certificatesresolvers.myresolver.acme.storage=/certs/acme.json # Storage to use. (Default: acme.json)
      - --certificatesresolvers.myresolver.acme.tlsChallenge=true # Use the TLS-ALPN-01 challenge to generate and renew ACME certificates by provisioning a TLS certificate.  As described on the Let's Encrypt community forum, when using the TLS-ALPN-01 challenge, Traefik must be reachable by Let's Encrypt through port 443.
      - --global.checkNewVersion=true # Periodically check if a new version has been released. (Default: true)
      - --global.sendAnonymousUsage=false # Periodically send anonymous usage statistics. If the option is not specified, it will be disabled by default. (Default: false)
      - --log # Enable the Traefik log, for configurations and errors
      - --log.level=INFO # Log level. (Default: INFO)
      - --ping.terminatingStatusCode=503 # Terminating status code (Default: 503)
      - --ping=true # Enable the ping endpoint. (Default: true)
      - --providers.docker.allowEmptyServices=true # Instructs the provider to create any servers load balancer defined for Docker containers regardless of the healthiness of the corresponding containers. (default: false)
      - --providers.docker.defaultRule=Host(`${DOMAIN}`) || Host(`{{ .ContainerName }}.${DOMAIN}`) || Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`{{ .ContainerName }}.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`${TS_HOSTNAME}.${TS_BASE_DOMAIN}`) || Host(`{{ .ContainerName }}.${TS_HOSTNAME}.${TS_BASE_DOMAIN}`) # Default rule. (Default: Host(`{{ normalize .Name }}`)
      - --providers.docker.endpoint=unix:///var/run/docker.sock # Docker server endpoint. Can be a TCP or a Unix socket endpoint. (Default: unix:///var/run/docker.sock)
      - --providers.docker.exposedByDefault=false # Don't expose services by default, only the ones that have the label "traefik.expose=true"
      - --providers.docker.network=infranet # Default Docker network used.
      - --providers.docker=true # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.file.directory=/configs
      # Plugins
      ##########################################
      # - --experimental.localplugins.<your-plugin-name>  # Local plugins configuration. (Default: false)
      # - --experimental.localplugins.<your-plugin-name>.modulename=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_MODULE_NAME:-github.com/Miromani4/traefik-plugin-AdminAPI_WebUI}  # Plugin's module name.
      # - --experimental.localplugins.<your-plugin-name>.settings=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS:-}  # Plugin's settings (works only for wasm plugins).
      # - --experimental.localplugins.<your-plugin-name>.settings.envs=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS_ENVS:-}  # Environment variables to forward to the wasm guest.
      # - --experimental.localplugins.<your-plugin-name>.settings.mounts=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS_MOUNTS:-}  # Directory to mount to the wasm guest.
      # A plugin to block abusive clients based on IP address.
      # - --experimental.plugins.fail2ban.modulename=github.com/tomMoulard/fail2ban
      # - --experimental.plugins.fail2ban.version=v0.8.3
      # A free and open-source software to start workloads on demand and stop them after a period of inactivity.
