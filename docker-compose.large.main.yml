      #UN_CMDHOOK_0_EVENTS_0: ${UN_CMDHOOK_0_EVENTS_0:-1}  # list of event ids to include, 0 == all. Example: 1,2,3,4
      #UN_CMDHOOK_0_EVENTS_1: ${UN_CMDHOOK_0_EVENTS_1:-4}  # 1 = download started, 2 = download finished, 3 = extraction started
      #UN_CMDHOOK_0_EVENTS_2: ${UN_CMDHOOK_0_EVENTS_2:-7}  # 4 = extraction finished, 5 = download failed, 6 = extraction failed
      #UN_CMDHOOK_0_EXCLUDE_0: ${UN_CMDHOOK_0_EXCLUDE_0:-}  # list of apps to
      #UN_CMDHOOK_0_EXCLUDE_1: ${UN_CMDHOOK_0_EXCLUDE_1:-}  # exclude, Example: radarr, lidarr
      #UN_CMDHOOK_0_NAME: ${UN_CMDHOOK_0_NAME:-}  # Provide an optional name for logging.
      #UN_CMDHOOK_0_SHELL: ${UN_CMDHOOK_0_SHELL:-false}  # Runs the command inside /bin/sh ('nix) or cmd.exe (Windows).
      #UN_CMDHOOK_0_SILENT: ${UN_CMDHOOK_0_SILENT:-false}  # Hides command output from logs.
      #UN_CMDHOOK_0_TIMEOUT: ${UN_CMDHOOK_0_TIMEOUT:-10s}  # You can adjust how long to wait for a server response.
    labels:
      <<: *unpackerr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  watchlistarr:
    # 🔹🔹 Watchlistarr 🔹🔹
    # Sync's Plex watchlists with Sonarr and Radarr
    depends_on:
      - plex
    image: nylonee/watchlistarr
    container_name: watchlistarr
    hostname: watchlistarr
    networks:
      - infranet
    volumes:
      - ${CONFIG_PATH:-./configs}/watchlistarr/config:/app/config
    <<: [*common-uidgid, *resource-limits]
    environment:
      <<: *common-env
      ALLOW_CONTINUING_SHOW_DELETING: "${ALLOW_CONTINUING_SHOW_DELETING:-false}"
      ALLOW_ENDED_SHOW_DELETING: "${ALLOW_ENDED_SHOW_DELETING:-false}"
      ALLOW_MOVIE_DELETING: "${ALLOW_MOVIE_DELETING:-false}"
      DELETE_DAYS: "${WATCHLISTARR_DELETE_DAYS:-7}"
      DELETE_FILES: "${WATCHLISTARR_DELETE_FILES:-true}"
      DELETE_INTERVAL_DAYS: "${DELETE_INTERVAL_DAYS:-7}"
      LOG_LEVEL: "${WATCHLISTARR_LOG_LEVEL:-DEBUG}"
      PLEX_TOKEN: "${PLEX_TOKEN}" # see instructions here: https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/
      PLEX_WATCHLIST_URL_1: "${PLEX_WATCHLIST_URL_1:-}"
      PLEX_WATCHLIST_URL_2: "${PLEX_WATCHLIST_URL_2:-}"
      RADARR_API_KEY: "${RADARR_API_KEY}"
      RADARR_BASE_URL: "http://radarr:${RADARR_PORT:-7878}"
      RADARR_BYPASS_IGNORED: "${RADARR_BYPASS_IGNORED:-false}"
      RADARR_QUALITY_PROFILE: "${RADARR_QUALITY_PROFILE:-}"
      RADARR_ROOT_FOLDER: "${RADARR_ROOT_FOLDER:-}"
      RADARR_TAGS: "${RADARR_TAGS:-}"
      REFRESH_INTERVAL_SECONDS: "${REFRESH_INTERVAL_SECONDS:-10}"
      SKIP_FRIEND_SYNC: "${WATCHLISTARR_SKIP_FRIEND_SYNC:-false}"
      SONARR_API_KEY: "${SONARR_API_KEY}"
      SONARR_BASE_URL: "http://sonarr:${SONARR_PORT:-8989}"
      SONARR_BYPASS_IGNORED: "${SONARR_BYPASS_IGNORED:-false}"
      SONARR_QUALITY_PROFILE: "${SONARR_QUALITY_PROFILE:-}"
      SONARR_ROOT_FOLDER: "${SONARR_ROOT_FOLDER:-}"
      SONARR_SEASON_MONITORING: "${SONARR_SEASON_MONITORING:-}"
      SONARR_TAGS: "${SONARR_TAGS:-}"
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    restart: unless-stopped

  wizarr:
    # 🔹🔹 Wizarr 🔹🔹  # https://github.com/wizarrrr/wizarr
    # Advanced user invitation and management system for Jellyfin and Plex.
    image: ghcr.io/wizarrrr/wizarr
    container_name: wizarr
    hostname: wizarr
    networks:
      - infranet
    ports:
      - ${WIZARR_PORT:-5690}:5690
    volumes:
      - "${CONFIG_PATH:-./configs}/wizarr:/data/database"
    <<: [*common-uidgid, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *wizarr-labels
      homepage.group: User Management
      homepage.name: Wizarr
      homepage.icon: wizarr.png
      homepage.href: https://wizarr.${DOMAIN}
      homepage.description: Advanced user invitation and management system for Jellyfin and Plex.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
      labels:
        <<: *wizarr-labels
    restart: unless-stopped

  whisparr:
    # 🔹🔹 Whisparr 🔹🔹  https://github.com/thespad/whisparr
    # Whisparr is a fork of Sonarr for managing and downloading adult content.
    image: ghcr.io/thespad/whisparr
    container_name: whisparr
    hostname: whisparr
    networks:
      - infranet
    ports:
      - ${WHISPARR_PORT:-6969}:6969
    volumes:
      - ${CONFIG_PATH:-./configs}/whisparr/config:/config
      - ${DATA_PATH:-./data}/downloads/xxx:/downloads/xxx
      - ${DATA_PATH:-./data}/downloads/complete:/downloads/complete
      - ${DATA_PATH:-./data}/downloads/incomplete:/downloads/incomplete
      - ${DATA_PATH:-./data}/media/xxx:/xxx
    <<: [*resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *whisparr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *preferences-worker-priority
    healthcheck:
      test: curl -fs http://localhost:6969 > /dev/null || exit 1
      interval: ${WHISPARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${WHISPARR_HEALTHCHECK_TIMEOUT:-15s}
      start_period: ${WHISPARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

networks:
  infranet: # docker network create -d bridge -o parent=${TAILSCALE_INTERFACE_NAME:-tailscale0} --subnet ${TAILSCALE_SUBNET:-172.19.0.0/16} --ip-range ${TAILSCALE_IP_RANGE:-172.19.0.0/16} --gateway ${TAILSCALE_HOST_IP:-172.19.0.1} infranet
    name: infranet
    driver: bridge
    driver_opts:
      parent: tailscale0
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
          ip_range: 172.25.0.0/16
  traefik_public:
    driver: bridge
    name: traefik_public
    ipam:
      config:
        - subnet: ${TRAEFIK_SUBNET:-192.168.100.0/24}
          gateway: ${TRAEFIK_GATEWAY:-192.168.100.1}
          ip_range: ${TRAEFIK_IP_RANGE:-192.168.100.0/25}
  gluenet:
    driver: bridge
    name: gluenet
    ipam:
      config:
        - subnet: ${GLUETUN_FIREWALL_OUTBOUND_SUBNETS:-192.51.0.0/16}
          gateway: ${GLUETUN_GATEWAY:-192.51.0.1}
          ip_range: ${GLUETUN_IP_RANGE:-192.51.4.0/24}
  tor_network:
    driver: bridge
    ipam:
      config:
        - subnet: "${TOR_SUBNET:-103.0.0.0/16}"
  auth-net:
    name: auth-net
    driver: overlay

