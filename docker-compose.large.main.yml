x-common-env: &common-env
  TZ: ${TZ:-America/Chicago}
  PUID: ${PUID:-1001}
  PGID: ${PGID:-988}
  UMASK: ${UMASK:-002}

x-common-uidgid: &common-uidgid
  user: ${PUID:-1001}:${PGID:-988}

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-logging: &common-logging
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"

x-common-options: &common-options
  restart: unless-stopped
  stdin_open: true
  tty: true

x-dns-servers: &dns-servers
  dns:
    - ${DNS_SERVER1:-1.0.0.1}
    - ${DNS_SERVER2:-1.1.1.1}

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 512M

x-constraints-storage-only: &constraints-storage-only
  constraints:
    - node.labels.storage == true

x-constraints-manager-only: &constraints-manager-only
  constraints:
    - node.role == manager

x-preferences-worker-priority: &preferences-worker-priority
  preferences:
    - spread: node.labels.worker_priority

