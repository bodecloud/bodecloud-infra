  lidarr:
    # 🔹🔹 Lidarr 🔹🔹
    image: linuxserver/lidarr
    container_name: lidarr
    hostname: lidarr
    networks:
      - infranet
      - traefik_public
    ports:
      - ${LIDARR_PORT:-8686}:8686
    volumes:
      - ${DATA_PATH:-./data}/downloads/bazarr:/downloads
      - ${DATA_PATH:-./data}/downloads/complete:/downloads/complete
      - ${DATA_PATH:-./data}/downloads/incomplete:/downloads/incomplete
      - ${DATA_PATH:-./data}/media/music:/media/music
      - ${CONFIG_PATH:-./configs}/lidarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *lidarr-labels
      homepage.group: Music Management
      homepage.name: Lidarr Music
      homepage.icon: lidarr.png
      homepage.href: https://lidarr.${DOMAIN}
      homepage.description: Helps you automatically download and organize your music collection, ensuring correct metadata and album art.
      homepage.weight: 2
      homepage.widget.type: lidarr
      homepage.widget.url: https://lidarr.${DOMAIN}
      homepage.widget.key: ${LIDARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      mode: replicated
      replicas: 1
      placement:
        <<: *constraints-manager-only
      labels:
        <<: *lidarr-labels
    healthcheck:
      test: curl -fs http://localhost:8686 > /dev/null || exit 1
      interval: ${LIDARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${LIDARR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${LIDARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${LIDARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  midarr:
