apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-brunner56-rclonefm-deployment.fullname" . }}-brunner56-rclonefm
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-brunner56-rclonefm-deployment.labels" . | nindent 4 }}
  annotations:
    configmap.reloader.stakater.com/reload: elfbot-all,elfbot-rclonefm,rclonefm-config
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Rclonefm.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Rclonefm.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.brunner56Rclonefm.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: rclonefm
    {{- include "chart-brunner56-rclonefm-deployment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: rclonefm
      {{- include "chart-brunner56-rclonefm-deployment.selectorLabels" . | nindent 8 }}
      annotations:
        kubernetes.io/egress-bandwidth: 40M
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
      - command:
        - /rclonefm.sh
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Rclonefm.brunner56Rclonefm.image.repository }}:{{ .Values.brunner56Rclonefm.brunner56Rclonefm.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Rclonefm.brunner56Rclonefm.imagePullPolicy
          }}
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        name: brunner56-rclonefm
        ports:
        - containerPort: 5573
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        resources: {{- toYaml .Values.brunner56Rclonefm.brunner56Rclonefm.resources | nindent
          10 }}
        securityContext: {{- toYaml .Values.brunner56Rclonefm.brunner56Rclonefm.containerSecurityContext
          | nindent 10 }}
        startupProbe:
          failureThreshold: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /backup
          name: backup
        - mountPath: /home/elfie/.cache
          name: cache
        - mountPath: /config/
          name: config
          subPath: rclone
        - mountPath: /elfbot
          name: elfbot
        - mountPath: /storage/rclone
          name: rclone
        - mountPath: /rclone-remote-storage
          name: rclone-remote-storage
          subPath: rclone-remote-storage
        - mountPath: /var/lib/rclonefm/js/settings.js
          name: rclonefm-config
          subPath: settings.js
        - mountPath: /storage/realdebrid-zurg
          name: rclonemountrealdebridzurg
        - mountPath: /storage/symlinks
          name: symlinks
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      initContainers:
      - command:
        - /bin/bash
        - -c
        - "set -e\n\n# Allows us to use app.elfhosted.com/name, but fall back to app.kubernetes.io/name
          if the former doesn't exist\nif [[ -z \"$ELF_APP_NAME\" ]]; then\n  ELF_APP_NAME=$K8S_APP_NAME\nfi\n\n#
          look for commands - we match specific names in order of least-destructive\nTIMESTAMP_NOW=$(date
          +%s)\nif [[ -f /etc/elfbot/pause ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)\n
          \ TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n  if [[ $TIMESTAMP_DIFF
          -lt 600 ]]; then\n    COMMAND=pause\n  fi\nfi\n\n# If no command is set, then
          move onto the next possibility\nif [[ -f /etc/elfbot/backup && -z \"$COMMAND\"
          ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n
          \ if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=backup\n  fi\nfi\n\n# If
          no command is set, then move onto the next possibility\nif [[ -f /etc/elfbot/reset
          && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n
          \ if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=reset\n  fi\nfi\n\ncase
          $COMMAND in\n\n  \"pause\")\n    echo \"Recent pause command found, sleeping 5m..\"\n
          \   sleep 300\n    ;;\n\n  \"reset\")\n\n    # Safety check - if /config/homer
          exists, we've not mounted /config properly and are about to wipe out EVERYTHING\n
          \   if [ -e \"/config/homer\" ]; then\n        echo \"The path /config/homer exists.
          Exiting.\"\n        exit 1\n    fi      \n    echo \"Recent reset command found,
          resetting\"\n    rm -rf /config/*\n    ;;\n\n  \"backup\")\n    echo \"Recent
          backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}\"\n
          \   TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\\n' -1)\n    cp -rfp /config /storage/backup/$ELF_APP_NAME-$TIMESTAMP\n
          \   ;;\n\nesac\n\nif [[ ! -f /config/i-am-bootstrapped ]]\nthen\n  echo \"Bootstrapping
          from goldilocks config...\"\n  s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/*
          /config/\n  touch /config/i-am-bootstrapped\nfi\n"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: access-key-id
              name: b2-elfhosted-config-ro
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: secret-key
              name: b2-elfhosted-config-ro
        - name: S3_ENDPOINT_URL
          value: {{ quote .Values.brunner56Rclonefm.bootstrap.env.s3EndpointUrl }}
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Rclonefm.bootstrap.image.repository }}:{{ .Values.brunner56Rclonefm.bootstrap.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Rclonefm.bootstrap.imagePullPolicy }}
        name: bootstrap
        resources: {{- toYaml .Values.brunner56Rclonefm.bootstrap.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.brunner56Rclonefm.bootstrap.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/elfbot
          name: elfbot
        - mountPath: /storage/backup
          name: backup
        - mountPath: /config
          name: config
          subPath: rclone
        - mountPath: /tmp
          name: tmp
      - command:
        - /bin/bash
        - -c
        - |
          set -x
          set -e
      
          # add local remote if it doesn't exist
          grep -q '/storage' /config/rclone.conf || cat /rclone-remote-storage >> /config/rclone.conf
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Rclonefm.setup.image.repository }}:{{ .Values.brunner56Rclonefm.setup.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Rclonefm.setup.imagePullPolicy }}
        name: setup
        resources: {{- toYaml .Values.brunner56Rclonefm.setup.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.brunner56Rclonefm.setup.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
          subPath: rclone
        - mountPath: /tmp
          name: tmp
        - mountPath: /rclone-remote-storage
          name: rclone-remote-storage
          subPath: rclone-remote-storage
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Rclonefm.podSecurityContext | nindent
        8 }}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: backup
      - emptyDir:
          sizeLimit: 1Gi
        name: cache
      - name: config
        persistentVolumeClaim:
          claimName: config
      - configMap:
          defaultMode: 420
          name: elfbot-rclonefm
          optional: true
        name: elfbot
      - name: rclone
        persistentVolumeClaim:
          claimName: rclone
      - configMap:
          defaultMode: 420
          name: rclonefm-config
        name: rclone-remote-storage
      - configMap:
          defaultMode: 420
          name: rclonefm-config
        name: rclonefm-config
      - name: rclonemountrealdebridzurg
        persistentVolumeClaim:
          claimName: realdebrid-zurg
      - name: symlinks
        persistentVolumeClaim:
          claimName: symlinks
      - name: tmp
