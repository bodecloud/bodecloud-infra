apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-notifiarr-config-configmap.fullname" . }}-notifiarr-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-notifiarr-config-configmap.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  notifiarr.conf: {{ .Values.notifiarrConfig.notifiarrConf | toYaml | indent 1 }}
