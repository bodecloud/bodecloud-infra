apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart-storagehub-service.fullname" . }}-storagehub
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-storagehub-service.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  type: {{ .Values.storagehub.type }}
  selector:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/name: storagehub
    {{- include "chart-storagehub-service.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.storagehub.ports | toYaml | nindent 2 }}
