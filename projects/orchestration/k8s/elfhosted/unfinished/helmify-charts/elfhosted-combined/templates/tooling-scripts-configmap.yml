apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-tooling-scripts
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  clean-up-dns-on-termination.sh: {{ .Values.toolingScripts.cleanUpDnsOnTerminationSh
    | toYaml | indent 1 }}
  cloudflare-scripts.sh: {{ .Values.toolingScripts.cloudflareScriptsSh | toYaml |
    indent 1 }}
  update-dns-on-init.sh: {{ .Values.toolingScripts.updateDnsOnInitSh | toYaml | indent
    1 }}
