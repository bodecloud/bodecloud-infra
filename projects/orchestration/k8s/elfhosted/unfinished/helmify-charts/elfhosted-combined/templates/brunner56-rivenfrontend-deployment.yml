apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-brunner56-rivenfrontend
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
  annotations:
    configmap.reloader.stakater.com/reload: elfbot-all,elfbot-rivenfrontend,riven-frontend-env,riven-frontend-config
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Rivenfrontend.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Rivenfrontend.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.brunner56Rivenfrontend.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: rivenfrontend
    {{- include "elfhosted-combined.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.elfhosted.com/name: riven-frontend
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: rivenfrontend
      {{- include "elfhosted-combined.selectorLabels" . | nindent 8 }}
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
      - env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - configMapRef:
            name: {{ include "elfhosted-combined.fullname" . }}-riven-frontend-env
        - configMapRef:
            name: elfbot-rivenfrontend
            optional: true
        image: '{{ .Values.brunner56Rivenfrontend.brunner56Rivenfrontend.image.repository
          }}:{{ .Values.brunner56Rivenfrontend.brunner56Rivenfrontend.image.tag | default
          .Chart.AppVersion }}'
        imagePullPolicy: {{ .Values.brunner56Rivenfrontend.brunner56Rivenfrontend.imagePullPolicy
          }}
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 3000
          timeoutSeconds: 1
        name: brunner56-rivenfrontend
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 3000
          timeoutSeconds: 1
        resources: {{- toYaml .Values.brunner56Rivenfrontend.brunner56Rivenfrontend.resources
          | nindent 10 }}
        securityContext: {{- toYaml .Values.brunner56Rivenfrontend.brunner56Rivenfrontend.containerSecurityContext
          | nindent 10 }}
        startupProbe:
          failureThreshold: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 3000
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /riven/config
          name: config
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Rivenfrontend.podSecurityContext | nindent
        8 }}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: {{ include "elfhosted-combined.fullname" . }}-riven-frontend-config
        name: config
      - name: tmp
