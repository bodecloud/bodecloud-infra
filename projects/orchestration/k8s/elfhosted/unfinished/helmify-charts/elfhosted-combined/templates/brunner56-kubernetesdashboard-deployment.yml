apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-brunner56-kubernetesdashboard
  labels:
    app.kubernetes.io/component: kubernetes-dashboard
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Kubernetesdashboard.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Kubernetesdashboard.revisionHistoryLimit
    }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.brunner56Kubernetesdashboard.strategy.rollingUpdate.maxSurge
        }}
      maxUnavailable: {{ .Values.brunner56Kubernetesdashboard.strategy.rollingUpdate.maxUnavailable
        }}
    type: {{ .Values.brunner56Kubernetesdashboard.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/component: kubernetes-dashboard
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: kubernetesdashboard
    {{- include "elfhosted-combined.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kubernetes-dashboard
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: kubernetesdashboard
        app.kubernetes.io/version: 2.6.1
        helm.sh/chart: kubernetesdashboard-5.10.0
      {{- include "elfhosted-combined.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - args: {{- toYaml .Values.brunner56Kubernetesdashboard.kubernetesdashboard.args
          | nindent 8 }}
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: '{{ .Values.brunner56Kubernetesdashboard.kubernetesdashboard.image.repository
          }}:{{ .Values.brunner56Kubernetesdashboard.kubernetesdashboard.image.tag | default
          .Chart.AppVersion }}'
        imagePullPolicy: {{ .Values.brunner56Kubernetesdashboard.kubernetesdashboard.imagePullPolicy
          }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9090
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 30
        name: kubernetesdashboard
        ports:
        - containerPort: 9090
          name: http
          protocol: TCP
        resources: {{- toYaml .Values.brunner56Kubernetesdashboard.kubernetesdashboard.resources
          | nindent 10 }}
        securityContext: {{- toYaml .Values.brunner56Kubernetesdashboard.kubernetesdashboard.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /certs
          name: kubernetes-dashboard-certs
        - mountPath: /tmp
          name: tmp-volume
      - env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: '{{ .Values.brunner56Kubernetesdashboard.dashboardMetricsScraper.image.repository
          }}:{{ .Values.brunner56Kubernetesdashboard.dashboardMetricsScraper.image.tag |
          default .Chart.AppVersion }}'
        imagePullPolicy: {{ .Values.brunner56Kubernetesdashboard.dashboardMetricsScraper.imagePullPolicy
          }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 30
        name: dashboard-metrics-scraper
        ports:
        - containerPort: 8000
          protocol: TCP
        resources: {}
        securityContext: {{- toYaml .Values.brunner56Kubernetesdashboard.dashboardMetricsScraper.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      dnsPolicy: ClusterFirst
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Kubernetesdashboard.podSecurityContext
        | nindent 8 }}
      serviceAccount: kubernetes-dashboard
      serviceAccountName: {{ include "elfhosted-combined.fullname" . }}-kubernetes-dashboard
      terminationGracePeriodSeconds: 30
      volumes:
      - name: kubernetes-dashboard-certs
        secret:
          defaultMode: 420
          secretName: brunner56-kubernetesdashboard-certs
      - name: tmp-volume
