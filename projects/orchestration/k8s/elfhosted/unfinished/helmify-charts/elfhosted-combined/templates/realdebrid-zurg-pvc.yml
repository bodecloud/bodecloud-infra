apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-realdebrid-zurg
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
    velero.io/exclude-from-backup: "true"
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.pvc.realdebridZurg.storageRequest | quote }}
  selector:
    matchLabels:
      name: rclone-brunner56-realdebrid-zurg
  storageClassName: {{ .Values.pvc.realdebridZurg.storageClass | quote }}
