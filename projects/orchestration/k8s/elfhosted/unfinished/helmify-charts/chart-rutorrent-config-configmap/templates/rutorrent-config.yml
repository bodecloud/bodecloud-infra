apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-rutorrent-config-configmap.fullname" . }}-rutorrent-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-rutorrent-config-configmap.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  .rtlocal.rc-elfhosted: {{ .Values.rutorrentConfig.RtlocalRcElfhosted | toYaml |
    indent 1 }}
  .rtorrent.rc-elfhosted: {{ .Values.rutorrentConfig.RtorrentRcElfhosted | toYaml
    | indent 1 }}
  02-wait-for-vpn.sh: {{ .Values.rutorrentConfig.02WaitForVpnSh | toYaml | indent
    1 }}
  03-set-inbound-port.sh: {{ .Values.rutorrentConfig.03SetInboundPortSh | toYaml
    | indent 1 }}
  05-apply-elfhosted-config.sh: {{ .Values.rutorrentConfig.05ApplyElfhostedConfigSh
    | toYaml | indent 1 }}
