apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart-zurg-service.fullname" . }}-zurg
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
    zilean.elfhosted.com/scrape: "true"
  {{- include "chart-zurg-service.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  type: {{ .Values.zurg.type }}
  selector:
    app.elfhosted.com/name: zurg
    app.kubernetes.io/instance: brunner56
    {{- include "chart-zurg-service.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.zurg.ports | toYaml | nindent 2 }}
