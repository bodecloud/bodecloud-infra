apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart-brunner56-traefikforwardauth-service.fullname" . }}-brunner56-traefikforwardauth
  labels:
    app.kubernetes.io/service: brunner56-traefikforwardauth
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-brunner56-traefikforwardauth-service.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  type: {{ .Values.brunner56Traefikforwardauth.type }}
  selector:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/name: traefikforwardauth
    {{- include "chart-brunner56-traefikforwardauth-service.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.brunner56Traefikforwardauth.ports | toYaml | nindent 2 }}
