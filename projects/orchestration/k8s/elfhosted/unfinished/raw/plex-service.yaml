kind: Service
apiVersion: v1
metadata:
  name: plex
  namespace: my-media-stack
  labels:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: plex
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  ports:
  - name: http
    protocol: TCP
    port: 32400
    targetPort: 32400
  - name: speed
    protocol: TCP
    port: 3002
    targetPort: 3002
  - name: tinyproxy
    protocol: TCP
    port: 8888
    targetPort: 8888
  selector:
    app.elfhosted.com/name: plex
    app.kubernetes.io/instance: brunner56
  clusterIP: 10.43.21.211
  clusterIPs:
  - 10.43.21.211
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Local
