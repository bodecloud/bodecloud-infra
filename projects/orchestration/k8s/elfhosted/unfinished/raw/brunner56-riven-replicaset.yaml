spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: riven
      pod-template-hash: 868c95c48c
  template:
    metadata:
      creationTimestamp: '2025-05-29T17:12:59Z'
      labels:
        app.elfhosted.com/name: riven
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: riven
        pod-template-hash: 868c95c48c
    spec:
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: backup
        - name: config
          persistentVolumeClaim:
            claimName: config
        - name: dev-shm
          emptyDir: {}
        - name: elfbot
          configMap:
            name: elfbot-riven
            defaultMode: 420
            optional: true
        - name: logs
          persistentVolumeClaim:
            claimName: logs
        - name: rclone
          persistentVolumeClaim:
            claimName: rclone
        - name: rclonemountrealdebridzurg
          persistentVolumeClaim:
            claimName: realdebrid-zurg
        - name: setup
          configMap:
            name: riven-setup
            defaultMode: 420
        - name: symlinks
          persistentVolumeClaim:
            claimName: symlinks
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: bootstrap
          image: >-
            alpine/k8s:1.29.1
          command:
            - /bin/bash
            - '-c'
            - >
              set -e


              # Allows us to use app.elfhosted.com/name, but fall back to
              app.kubernetes.io/name if the former doesn't exist

              if [[ -z "$ELF_APP_NAME" ]]; then
                ELF_APP_NAME=$K8S_APP_NAME
              fi


              # look for commands - we match specific names in order of
              least-destructive

              TIMESTAMP_NOW=$(date +%s)

              if [[ -f /etc/elfbot/pause ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=pause
                fi
              fi


              # If no command is set, then move onto the next possibility

              if [[ -f /etc/elfbot/backup && -z "$COMMAND" ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=backup
                fi
              fi


              # If no command is set, then move onto the next possibility

              if [[ -f /etc/elfbot/reset && -z "$COMMAND" ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=reset
                fi
              fi


              case $COMMAND in

                "pause")
                  echo "Recent pause command found, sleeping 5m.."
                  sleep 300
                  ;;

                "reset")

                  # Safety check - if /config/homer exists, we've not mounted /config properly and are about to wipe out EVERYTHING
                  if [ -e "/config/homer" ]; then
                      echo "The path /config/homer exists. Exiting."
                      exit 1
                  fi      
                  echo "Recent reset command found, resetting"
                  rm -rf /config/*
                  ;;

                "backup")
                  echo "Recent backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}"
                  TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\n' -1)
                  cp -rfp /config /storage/backup/$ELF_APP_NAME-$TIMESTAMP
                  ;;

              esac


              if [[ ! -f /config/i-am-bootstrapped ]]

              then
                echo "Bootstrapping from goldilocks config..."
                s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/* /config/
                touch /config/i-am-bootstrapped
              fi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: b2-elfhosted-config-ro
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: b2-elfhosted-config-ro
                  key: secret-key
            - name: S3_ENDPOINT_URL
              value: https://s3.us-west-000.backblazeb2.com
            - name: K8S_APP_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/name']
            - name: ELF_APP_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.elfhosted.com/name']
          resources:
            limits:
              cpu: '1'
              memory: 4Gi
            requests:
              cpu: '0'
              memory: 1Mi
          volumeMounts:
            - name: elfbot
              mountPath: /etc/elfbot
            - name: backup
              mountPath: /storage/backup
            - name: config
              mountPath: /config
              subPath: riven
            - name: tmp
              mountPath: /tmp
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsUser: 568
            runAsGroup: 568
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
        - name: setup
          image: >-
            alpine/k8s:1.29.1
          command:
            - /bin/bash
            - '-c'
            - >
              # run the setup script from the configmap, so that we can make
              templated changes

              bash /setup/setup.sh
          resources: {}
          volumeMounts:
            - name: symlinks
              mountPath: /storage/symlinks
            - name: config
              mountPath: /config
              subPath: riven
            - name: setup
              mountPath: /setup/
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
        - name: setup-postgres
          image: >-
            alpine/k8s:1.29.1
          command:
            - /bin/bash
            - '-c'
            - |
              set -x
              set -e

              mkdir -p /config/postgresql/database
              mkdir -p /config/postgresql/backups
              chown elfie:elfie /config -R
          resources: {}
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: riven
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: brunner56-riven
          image: >-
            ghcr.io/elfhosted/riven:v0.21.21@sha256:bf1a9cab579d5eaac0ed72e20584b139547db7c38753a03b3756151af5e0ac13
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: riven-env
            - configMapRef:
                name: elfbot-riven
                optional: true
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: '0'
              memory: 20Mi
          volumeMounts:
            - name: backup
              mountPath: /backup
            - name: config
              mountPath: /riven/data
              subPath: riven
            - name: dev-shm
              mountPath: /dev-shm
            - name: elfbot
              mountPath: /elfbot
            - name: logs
              mountPath: /riven/data/logs
              subPath: riven
            - name: rclone
              mountPath: /storage/rclone
            - name: rclonemountrealdebridzurg
              mountPath: /storage/realdebrid-zurg
            - name: setup
              mountPath: /setup
            - name: symlinks
              mountPath: /storage/symlinks
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 3001
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3001
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 3001
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
        - name: database
          image: postgres:17-alpine
          args:
            - '-c'
            - shared_buffers=500MB
            - '-c'
            - work_mem=4MB
            - '-c'
            - effective_cache_size=1GB
            - '-c'
            - max_connections=310
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: riven
            - name: POSTGRES_USER
              value: postgres
          resources:
            limits:
              cpu: 500m
              memory: 8Gi
            requests:
              cpu: '0'
              memory: 1Mi
          volumeMounts:
            - name: config
              mountPath: /var/lib/postgresql/data
              subPath: riven/postgresql/database
            - name: dev-shm
              mountPath: /dev/shm
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.elfhosted.com/role
                    operator: In
                    values:
                      - nodefinder
              topologyKey: kubernetes.io/hostname
      schedulerName: default-scheduler
      priorityClassName: tenant-normal
      enableServiceLinks: false
status:
  replicas: 1
  fullyLabeledReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
  observedGeneration: 1
