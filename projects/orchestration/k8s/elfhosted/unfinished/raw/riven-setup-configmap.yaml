kind: ConfigMap
apiVersion: v1
metadata:
  name: riven-setup
  namespace: my-media-stack
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  setup.sh: |
    #!/bin/bash

    # make symlink directories if they don't exist, to make onboarding simpler
    mkdir -p /storage/symlinks/movies
    mkdir -p /storage/symlinks/shows

    # Enforce API key
    contents="$(jq '.api_key="1nMZNC0Cg6UP7sblvFirUi9Sad4ga84u"' /config/settings.json)" && \
      echo -E "${contents}" > /config/settings.json
