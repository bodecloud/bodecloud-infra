  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: kubernetes-dashboard
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: kubernetesdashboard
      pod-template-hash: 7c7d46f5f4
  template:
    metadata:
      creationTimestamp: '2025-05-29T17:12:59Z'
      labels:
        app.kubernetes.io/component: kubernetes-dashboard
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: kubernetesdashboard
        app.kubernetes.io/version: 2.6.1
        helm.sh/chart: kubernetesdashboard-5.10.0
        pod-template-hash: 7c7d46f5f4
    spec:
      volumes:
        - name: kubernetes-dashboard-certs
          secret:
            secretName: brunner56-kubernetesdashboard-certs
            defaultMode: 420
        - name: tmp-volume
          emptyDir: {}
      containers:
        - name: kubernetesdashboard
          image: kubernetesui/dashboard:v2.6.1
          args:
            - '--namespace=bolabaden'
            - '--sidecar-host=http://127.0.0.1:8000'
            - '--enable-skip-login'
            - '--enable-insecure-login'
            - >-
              --system-banner=Built</A> with ❤️ by <A
              HREF="https://funkypenguin.co.nz">@funkypenguin</A> and friends
              (<I><A HREF="https://chat.funkypenguin.co.nz">join us!</A></I>)
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          resources:
            limits:
              cpu: '1'
              memory: 256Mi
            requests:
              cpu: '0'
              memory: 64Mi
          volumeMounts:
            - name: kubernetes-dashboard-certs
              mountPath: /certs
            - name: tmp-volume
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsGroup: 2001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
        - name: dashboard-metrics-scraper
          image: kubernetesui/metrics-scraper:v1.0.9
          ports:
            - containerPort: 8000
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsGroup: 2001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: kubernetes-dashboard
      serviceAccount: kubernetes-dashboard
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      schedulerName: default-scheduler
      priorityClassName: tenant-normal
