        defaultMode: 493
    - name: elfterm-state
      emptyDir:
        sizeLimit: 1Gi
    - name: logs
      persistentVolumeClaim:
        claimName: logs
    - name: rclone
      persistentVolumeClaim:
        claimName: rclone
    - name: rclonemountrealdebridzurg
      persistentVolumeClaim:
        claimName: realdebrid-zurg
    - name: recyclarr-config
      configMap:
        name: recyclarr-config
        defaultMode: 420
    - name: symlinks
      persistentVolumeClaim:
        claimName: symlinks
    - name: tmp
      emptyDir: {}
    - name: kube-api-access-m8z2d
      projected:
        sources:
          - serviceAccountToken:
              expirationSeconds: 3607
              path: token
          - configMap:
              name: kube-root-ca.crt
              items:
                - key: ca.crt
                  path: ca.crt
          - downwardAPI:
              items:
                - path: namespace
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace
        defaultMode: 420
  initContainers:
    - name: copy-recyclarr-example-config
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - |
          set -x
          set -e
          # If we don't already have an example config, create one
          if [ ! -f /config/recyclarr.yaml ];
          then
            cp /bootstrap/recyclarr.yaml /config/
          fi
      resources: {}
      volumeMounts:
        - name: config
          mountPath: /config/
          subPath: recyclarr
        - name: recyclarr-config
          mountPath: /bootstrap/
        - name: kube-api-access-m8z2d
          readOnly: true
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    - name: setup
      image: >-
        ghcr.io/elfhosted/filebrowser:2.23.0@sha256:296e3a3d08c5ca07a26350358fa2e58a597a41adb253a65bba27b557f36383e5
      command:
        - /bin/bash
        - '-c'
        - >
          set -x

          set -e


          # Delete tmp db if necessary

          if [ -f /tmp/filebrowser.db ]

          then
            rm /tmp/filebrowser.db
          fi



          /filebrowser config init \
            --disable-preview-resize \
            --disable-thumbnails \
            --disable-type-detection-by-header \
            --branding.name="brunner56, by ElfHosted 🧝 " \
            --branding.files=/branding \
            --branding.disableExternal \
            --auth.method=noauth \
            --lockPassword \
            --database /tmp/filebrowser.db \
            --root /storage \
            --cache-dir /tmp

          # allow zip, unzip, rar, unrar, ls, pwd, cd, mv

          /filebrowser config set --database /tmp/filebrowser.db --commands
          zip,unzip,rar,unrar,ls,pwd,cd,mv,cp,ln,find,echo,grep,cat,touch,tar,gzip,rm,tree,du,mlocate,updatedb,locate,elfbot,Elfbot

          # /filebrowser config set --database /tmp/filebrowser.db --shell
          'vstat -c'


          # now tell filebrowser about the user (who gets authenticated via the
          proxy)

          /filebrowser users add 1 bogus --database /tmp/filebrowser.db
      resources:
        limits:
          cpu: '1'
          memory: 4Gi
        requests:
          cpu: '0'
          memory: 1Mi
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: dummy-storage
          mountPath: /storage
        - name: kube-api-access-m8z2d
          readOnly: true
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
  containers:
    - name: brunner56-filebrowser
      image: >-
        ghcr.io/elfhosted/filebrowser:2.23.0@sha256:296e3a3d08c5ca07a26350358fa2e58a597a41adb253a65bba27b557f36383e5
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      envFrom:
        - configMapRef:
            name: filebrowser-env
      env:
        - name: TZ
          value: UTC
      resources:
        limits:
          cpu: '1'
          memory: 1Gi
        requests:
          cpu: '0'
          memory: 6Mi
      volumeMounts:
        - name: backup
          mountPath: /storage/backup
        - name: config
          mountPath: /storage/config
        - name: dummy-storage
          mountPath: /dummy-storage
        - name: elfbot
          mountPath: /elfbot
        - name: elfbot-script
          mountPath: /usr/local/bin/elfbot
          subPath: elfbot
        - name: elfbot-script-ucfirst
          mountPath: /usr/local/bin/Elfbot
          subPath: elfbot
        - name: elfterm-state
          mountPath: /home/elfie/.local/state
        - name: logs
          mountPath: /storage/logs
        - name: rclone
          mountPath: /storage/rclone
        - name: rclonemountrealdebridzurg
          mountPath: /storage/realdebrid-zurg
        - name: recyclarr-config
          mountPath: /recyclarr-config
        - name: symlinks
          mountPath: /storage/symlinks
        - name: tmp
          mountPath: /tmp
        - name: kube-api-access-m8z2d
          readOnly: true
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      livenessProbe:
        tcpSocket:
          port: 8080
        timeoutSeconds: 1
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      readinessProbe:
        tcpSocket:
          port: 8080
        timeoutSeconds: 1
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      startupProbe:
        tcpSocket:
          port: 8080
        timeoutSeconds: 1
        periodSeconds: 5
        successThreshold: 1
        failureThreshold: 30
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    - name: elfbot
      image: >-
        alpine/k8s:1.29.1
      command:
        - /usr/bin/dumb-init
        - /bin/bash
        - '-c'
        - |
          # respond to creation or modification, but not deletion
          inotifywait -m -e create -e modify --format "%f" /elfbot \
            | while read APP
              do
                # if we are force-killing the pod, then don't bother with the configmap
                if (cat /elfbot/$APP | grep -q forcerestart); then
                  echo "forcerestart requested, deleting $APP pod with --force.."
                  kubectl delete pod -l app.kubernetes.io/name=$APP --force
                  kubectl delete pod -l app.elfhosted.com/name=$APP --force
                else

                  # put the contents of the file into the configmap which will trigger the restart
                  echo command received for ${APP} : [$(cat /elfbot/$APP)]
                  # create the configmap if it doesn't exist, since reloader only looks at _changes_ to configmaps
                  if ! $(kubectl get configmap -n bolabaden elfbot-${APP} 2>&1 >/dev/null); then
                      kubectl create configmap -n bolabaden elfbot-${APP} --from-literal=elfbot_last_action=$(date +%s)
                      sleep 10s
                  fi

                  # If we were passed a key=value string in /etc/elfbot, then split it
                  COMMAND=$(cat /elfbot/$APP)

                  # We separate key and value with an '=', but sometimes the value may contain __another__ '=' (like Plex preferences)
                  sep='='
                  case $COMMAND in
                    # If we are separated by an =
                    (*"$sep"*)
                      KEY=${COMMAND%%"$sep"*}
                      VALUE=${COMMAND#*"$sep"}
                      ;;
                    # if not, we are a simple command like "backup"
                    (*)
                      KEY=$COMMAND
                      VALUE=$(date +%s)
                      ;;
                  esac


                  # patch the configmap with the latest key/value
                  kubectl patch configmap -n bolabaden elfbot-${APP} -p "{\"data\":{\"${KEY}\":\"${VALUE}\"}}"
                fi
              done
      resources:
        limits:
          cpu: '1'
          memory: 4Gi
        requests:
          cpu: '0'
          memory: 1Mi
      volumeMounts:
        - name: elfbot
          mountPath: /elfbot
        - name: kube-api-access-m8z2d
          readOnly: true
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
