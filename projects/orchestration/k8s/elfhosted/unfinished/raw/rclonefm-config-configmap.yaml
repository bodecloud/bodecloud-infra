kind: ConfigMap
apiVersion: v1
metadata:
  name: rclonefm-config
  namespace: my-media-stack
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  rclone-remote-storage: |
    [storage]
    type = alias
    remote = /storage

  settings.js: |
    export const guiVersion = "0.4.0";
    export const rcloneSettings = {
        host: "https://brunner56-rclonefm.elfhosted.com",
        // null if --rc-no-auth, otherwise what is set in --rc-user
        user: null,
        // null if --rc-no-auth, otherwise what is set in --rc-pass
        pass: null,
        // null if there is no login_token in URL query parameters,
        // otherwise is set from there and takes over user/pass
        loginToken: null
    };
    export const asyncOperations = [
        "/sync/copy",
        "/sync/move",
        "/operations/purge",
        "/operations/copyfile",
        "/operations/movefile",
        "/operations/deletefile"
    ];
    export const remotes = {
        "storage": {
            "startingFolder": "/storage",
            "canQueryDisk": true,
            "pathToQueryDisk": ""
        }
    };
    export const userSettings = {
        timerRefreshEnabled: true,
        timerRefreshView: 2,
        timerRefreshViewInterval: undefined,
        timerProcessQueue: 5,
        timerProcessQueueInterval: undefined
    };
