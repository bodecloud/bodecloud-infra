kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: volsync-rd-symlinks-cache
  namespace: my-media-stack
  labels:
    app.kubernetes.io/created-by: volsync
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
  volumeMode: Filesystem
