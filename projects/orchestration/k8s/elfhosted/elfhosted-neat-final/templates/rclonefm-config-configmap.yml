apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elfhosted-neat-final.fullname" . }}-rclonefm-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-neat-final.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  rclone-remote-storage: {{ .Values.rclonefmConfig.rcloneRemoteStorage | toYaml |
    indent 1 }}
  settings.js: {{ .Values.rclonefmConfig.settingsJs | toYaml | indent 1 }}
