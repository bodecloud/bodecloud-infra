apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elfhosted-neat-final.fullname" . }}-brunner56-homer
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-neat-final.labels" . | nindent 4 }}
  annotations:
    configmap.reloader.stakater.com/reload: homer-config, elfbot-homer
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Homer.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Homer.revisionHistoryLimit }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.brunner56Homer.strategy.rollingUpdate.maxSurge | quote }}
      maxUnavailable: {{ .Values.brunner56Homer.strategy.rollingUpdate.maxUnavailable
        }}
    type: {{ .Values.brunner56Homer.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: homer
    {{- include "elfhosted-neat-final.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.elfhosted.com/role: nodefinder
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: homer
      {{- include "elfhosted-neat-final.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - /bin/bash
        - /usr/local/bin/disk_usage.sh
        env:
        - name: TZ
          value: {{ quote .Values.brunner56Homer.brunner56Homer.env.tz }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Homer.brunner56Homer.image.repository }}:{{ .Values.brunner56Homer.brunner56Homer.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Homer.brunner56Homer.imagePullPolicy }}
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 1
        name: brunner56-homer
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 1
        resources: {{- toYaml .Values.brunner56Homer.brunner56Homer.resources | nindent
          10 }}
        securityContext: {{- toYaml .Values.brunner56Homer.brunner56Homer.containerSecurityContext
          | nindent 10 }}
        startupProbe:
          failureThreshold: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 8080
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /backup
          name: backup
        - mountPath: /config
          name: config
        - mountPath: /config-yml
          name: config-yml
          subPath: config.yml
        - mountPath: /custom-css
          name: custom-css
          subPath: custom-css
        - mountPath: /usr/local/bin/disk_usage.sh
          name: disk-usage
          subPath: disk_usage.sh
        - mountPath: /gatus-config
          name: gatus-config
        - mountPath: /logs
          name: logs
        - mountPath: /www/assets/message
          name: message
        - mountPath: /storage/rclone
          name: rclone
        - mountPath: /storage/realdebrid-zurg
          name: rclonemountrealdebridzurg
        - mountPath: /storage/symlinks
          name: symlinks
        - mountPath: /tmp
          name: tmp
      - env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Homer.ui.image.repository }}:{{ .Values.brunner56Homer.ui.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Homer.ui.imagePullPolicy }}
        name: ui
        resources: {{- toYaml .Values.brunner56Homer.ui.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.brunner56Homer.ui.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /www/assets/config.yml
          name: config-yml
          subPath: config.yml
        - mountPath: /www/assets/custom.css
          name: custom-css
          subPath: custom.css
        - mountPath: /www/assets/message
          name: message
        - mountPath: /www/assets/backgrounds
          name: config
          readOnly: true
          subPath: homer/backgrounds
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Homer.podSecurityContext | nindent 8
        }}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-backup
      - name: config
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-config
      - configMap:
          defaultMode: 420
          name: {{ include "elfhosted-neat-final.fullname" . }}-homer-config
        name: config-yml
      - configMap:
          defaultMode: 420
          name: {{ include "elfhosted-neat-final.fullname" . }}-homer-config
        name: custom-css
      - configMap:
          defaultMode: 420
          name: {{ include "elfhosted-neat-final.fullname" . }}-homer-config
        name: disk-usage
      - configMap:
          defaultMode: 420
          name: {{ include "elfhosted-neat-final.fullname" . }}-gatus-config
        name: gatus-config
      - name: logs
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-logs
      - name: message
      - name: rclone
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-rclone
      - name: rclonemountrealdebridzurg
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-realdebrid-zurg
      - name: symlinks
        persistentVolumeClaim:
          claimName: {{ include "elfhosted-neat-final.fullname" . }}-symlinks
      - name: tmp
