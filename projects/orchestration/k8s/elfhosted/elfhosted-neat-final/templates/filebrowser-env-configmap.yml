apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elfhosted-neat-final.fullname" . }}-filebrowser-env
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-neat-final.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  FB_ADDRESS: {{ .Values.filebrowserEnv.fbAddress | quote }}
  FB_CONFIG: {{ .Values.filebrowserEnv.fbConfig | quote }}
  FB_DATABASE: {{ .Values.filebrowserEnv.fbDatabase | quote }}
  RADARR_API_KEY: {{ .Values.filebrowserEnv.radarrApiKey | quote }}
  RADARR4K_API_KEY: {{ .Values.filebrowserEnv.radarr4KApiKey | quote }}
  S6_READ_ONLY_ROOT: {{ .Values.filebrowserEnv.s6ReadOnlyRoot | quote }}
  SONARR_API_KEY: {{ .Values.filebrowserEnv.sonarrApiKey | quote }}
  SONARR4K_API_KEY: {{ .Values.filebrowserEnv.sonarr4KApiKey | quote }}
