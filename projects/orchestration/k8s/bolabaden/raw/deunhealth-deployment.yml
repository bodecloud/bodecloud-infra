#! deunhealth-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deunhealth
  namespace: my-media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deunhealth
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: deunhealth
    spec:
      restartPolicy: Always
      containers:
        - name: deunhealth
          image: qmcgaw/deunhealth
          imagePullPolicy: IfNotPresent
          env:
            - name: HEALTH_SERVER_ADDRESS
              value: "127.0.0.1:9999"
            - name: LOG_LEVEL
              value: "debug"
            - name: PGID
              value: "988"
            - name: PUID
              value: "1001"
            - name: TZ
              value: "America/Chicago"
            - name: UMASK
              value: "002"
          volumeMounts:
            - name: var-run-docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: var-run-docker-sock
          hostPath:
            path: /var/run/docker.sock
