              value: "0 0 6 * * *"
          ports:
            - name: watchtower-8080
              containerPort: 8080
          volumeMounts:
            - name: var-run-docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: var-run-docker-sock
          hostPath:
            path: /var/run/docker.sock
