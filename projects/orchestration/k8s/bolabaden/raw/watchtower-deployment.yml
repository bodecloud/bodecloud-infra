apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchtower
  namespace: my-media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchtower
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: watchtower
    spec:
      restartPolicy: Always
