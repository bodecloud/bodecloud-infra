#! prowlarr-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: prowlarr
    namespace: bolabaden
    labels:
        com.docker.compose.project: bolabaden
        com.docker.compose.service: prowlarr
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: bolabaden
            com.docker.compose.service: prowlarr
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: bolabaden
                com.docker.compose.service: prowlarr
        spec:
            restartPolicy: Always
            containers:
                - name: prowlarr
                  image: linuxserver/prowlarr
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: PGID
                      value: "988"
                    - name: PUID
                      value: "1002"
                    - name: TZ
                      value: "America/Chicago"
                    - name: UMASK
                      value: "022"
                  livenessProbe:
                    exec:
                        command:
                            - /bin/sh
                            - -c
                            - curl -fs http://localhost:9696/api/v1/system/status || exit 1
                    periodSeconds: 30
                    initialDelaySeconds: 120
                    timeoutSeconds: 10
                    failureThreshold: 3
                  ports:
                    - name: prowlarr-9696
                      containerPort: 9696
                  volumeMounts:
                    - name: config
                      mountPath: /config
            volumes:
                - name: config
                  hostPath:
                    path: G:/Stuff/bolabaden/configs/prowlarr/config
