---
# Stateless VPN Gateway System with Automatic Failover
# Only ONE VPN gateway runs at a time, others are for failover
# Completely stateless with dynamic hostname resolution

apiVersion: v1
kind: Namespace
metadata:
  name: vpn-gateway
  labels:
    name: vpn-gateway

---
# ConfigMap with hostname resolution and failover logic
apiVersion: v1
kind: ConfigMap
metadata:
  name: vpn-failover-config
  namespace: vpn-gateway
data:
  # Dynamic hostname resolver for Premiumize
  resolve-premiumize.sh: |
    #!/bin/bash
    set -euo pipefail
    
    COUNTRY="$1"
    HOSTNAME="vpn-${COUNTRY}.premiumize.me"
    CONFIG_FILE="/gluetun/premiumize-${COUNTRY}.ovpn"
    AUTH_FILE="/gluetun/auth.conf"
    
    echo "=== Dynamic VPN Configuration for Premiumize ${COUNTRY^^} ==="
    echo "Hostname: $HOSTNAME"
    
    # Resolve hostname with retries
    echo "Resolving $HOSTNAME..."
    IP=""
    for i in {1..10}; do
      if IP=$(getent hosts "$HOSTNAME" | awk '{print $1}' | head -1); then
        if [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "✓ Resolved $HOSTNAME -> $IP (attempt $i)"
          break
        fi
      fi
      echo "Resolution attempt $i failed, retrying in 2s..."
      sleep 2
    done
    
    if [[ -z "$IP" ]]; then
      echo "❌ Failed to resolve $HOSTNAME after 10 attempts"
      exit 1
    fi
    
    # Create OpenVPN config with resolved IP
    cat > "$CONFIG_FILE" << EOF
    remote $IP 1194
    verify-x509-name CN=$HOSTNAME
    client
    dev tun
    proto udp
    cipher AES-256-CBC
    resolv-retry infinite
    nobind
    persist-key
    persist-tun
    auth-user-pass /gluetun/auth.conf
    verb 3
    auth SHA256
    key-direction 1
    <ca>
    -----BEGIN CERTIFICATE-----
    MIIFJTCCAw2gAwIBAgIRAPAmbQRNE+PBqvFyFG8GOSIwDQYJKoZIhvcNAQELBQAw
    LDEYMBYGA1UECgwPU2VjdXJlIFNlcnZpY2VzMRAwDgYDVQQDDAdSb290IFgxMB4X
    DTIxMDEwNDE1MjEwM1oXDTQwMTIzMDE1MjEwM1owLDEYMBYGA1UECgwPU2VjdXJl
    IFNlcnZpY2VzMRAwDgYDVQQDDAdSb290IFgxMIICIjANBgkqhkiG9w0BAQEFAAOC
