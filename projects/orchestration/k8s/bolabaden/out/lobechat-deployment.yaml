apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    homepage.description: A chatbot for your applications.
    homepage.group: AI
    homepage.href: https://lobechat.bolabaden.org/
    homepage.icon: lobechat.png
    homepage.name: Lobe Chat
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.lobechat.middlewares: nginx-auth@file
    traefik.http.routers.lobechat.rule: Host(`lobechat.bolabaden.org`) || Host(`lobechat.bolabaden.duckdns.org`) || Host(`lobechat.micklethefickle.duckdns.org`) || Host(`lobechat.micklethefickle.bolabaden.org`) || Host(`lobechat.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.services.lobechat.loadbalancer.server.port: "3210"
  labels:
    io.kompose.service: lobechat
  name: lobechat
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: lobechat
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        homepage.description: A chatbot for your applications.
        homepage.group: AI
        homepage.href: https://lobechat.bolabaden.org/
        homepage.icon: lobechat.png
        homepage.name: Lobe Chat
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.lobechat.middlewares: nginx-auth@file
        traefik.http.routers.lobechat.rule: Host(`lobechat.bolabaden.org`) || Host(`lobechat.bolabaden.duckdns.org`) || Host(`lobechat.micklethefickle.duckdns.org`) || Host(`lobechat.micklethefickle.bolabaden.org`) || Host(`lobechat.micklethefickle.bolabaden.duckdns.org`)
        traefik.http.services.lobechat.loadbalancer.server.port: "3210"
      labels:
        io.kompose.service: lobechat
    spec:
      containers:
        - env:
            - name: ACCESS_CODE
              value: brunner56
          envFrom:
            - configMapRef:
                name: env
          image: lobehub/lobe-chat:latest
          livenessProbe:
            exec:
              command:
                - wget -qO- http://127.0.0.1:3210 || exit 1
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 10
          name: lobechat
          ports:
            - containerPort: 3210
              protocol: TCP
          volumeMounts:
            - mountPath: /configs/lobechat/host_config
              name: lobechat-cm0
      hostname: lobechat
      restartPolicy: Always
      volumes:
        - configMap:
            name: lobechat-cm0
          name: lobechat-cm0
