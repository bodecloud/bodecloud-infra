apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    homepage.description: Whoami service with multiple auth examples - nginx auth (API key OR IP OR TinyAuth), direct access, and TinyAuth only.
    homepage.group: Web Services
    homepage.href: https://whoami-nginx.bolabaden.org
    homepage.icon: whoami.png
    homepage.name: Whoami
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.whoami-nginx.middlewares: nginx-auth@file
    traefik.http.routers.whoami-nginx.rule: Host(`whoami-nginx.bolabaden.org`) || Host(`whoami-nginx.bolabaden.duckdns.org`) || Host(`whoami-nginx.micklethefickle.duckdns.org`) || Host(`whoami-nginx.micklethefickle.bolabaden.org`) || Host(`whoami-nginx.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.routers.whoami.rule: Host(`whoami.bolabaden.org`) || Host(`whoami.bolabaden.duckdns.org`) || Host(`whoami.micklethefickle.duckdns.org`) || Host(`whoami.micklethefickle.bolabaden.org`) || Host(`whoami.micklethefickle.bolabaden.duckdns.org`)
  labels:
    io.kompose.service: whoami
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: whoami
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        homepage.description: Whoami service with multiple auth examples - nginx auth (API key OR IP OR TinyAuth), direct access, and TinyAuth only.
        homepage.group: Web Services
        homepage.href: https://whoami-nginx.bolabaden.org
        homepage.icon: whoami.png
        homepage.name: Whoami
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.whoami-nginx.middlewares: nginx-auth@file
        traefik.http.routers.whoami-nginx.rule: Host(`whoami-nginx.bolabaden.org`) || Host(`whoami-nginx.bolabaden.duckdns.org`) || Host(`whoami-nginx.micklethefickle.duckdns.org`) || Host(`whoami-nginx.micklethefickle.bolabaden.org`) || Host(`whoami-nginx.micklethefickle.bolabaden.duckdns.org`)
        traefik.http.routers.whoami.rule: Host(`whoami.bolabaden.org`) || Host(`whoami.bolabaden.duckdns.org`) || Host(`whoami.micklethefickle.duckdns.org`) || Host(`whoami.micklethefickle.bolabaden.org`) || Host(`whoami.micklethefickle.bolabaden.duckdns.org`)
      labels:
        io.kompose.service: whoami
    spec:
      containers:
        - image: traefik/whoami:latest
          name: whoami
      hostname: whoami
      restartPolicy: Always
