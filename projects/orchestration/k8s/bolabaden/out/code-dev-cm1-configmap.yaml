  README_COMPOSE_BRIDGE.md: "# Standalone Docker Compose Bridge\n\nThis is a standalone implementation of Docker Compose Bridge functionality that allows you to convert Docker Compose files to Kubernetes manifests, Helm charts, or other formats without requiring the official Docker Compose CLI with bridge support.\n\n## Features\n\n- **1:1 functionality** with Docker Compose Bridge command\n- Convert Compose files to Kubernetes manifests (default)\n- Support for Helm chart generation\n- Custom transformation support\n- Secrets and configs content loading\n- Image inspection for exposed ports\n- Multiple compose file support\n- Project name specification\n\n## Prerequisites\n\n- Python 3.7+\n- Docker Engine running\n- Docker Python SDK\n- PyYAML\n\n## Installation\n\n1. **Install Python dependencies:**\n   ```bash\n   pip install -r requirements.txt\n   ```\n\n2. **Make scripts executable:**\n   ```bash\n   chmod +x compose_bridge.sh standalone_compose_bridge.py\n   ```\n\n## Usage\n\n### Using the Bash Wrapper (Recommended)\n\n```bash\n# Convert compose file to Kubernetes manifests\n./compose_bridge.sh convert -f docker-compose.yml\n\n# Convert with custom output directory\n./compose_bridge.sh convert -f docker-compose.yml -o k8s-output/\n\n# Convert using Helm transformation\n./compose_bridge.sh convert -f docker-compose.yml -t docker/compose-bridge-helm\n\n# Convert multiple compose files\n./compose_bridge.sh convert -f docker-compose.yml -f docker-compose.override.yml\n\n# List available transformations\n./compose_bridge.sh transformations list\n\n# Create custom transformation\n./compose_bridge.sh transformations create my-custom-transform\n```\n\n### Using Python Script Directly\n\n```bash\n# Convert compose file\npython3 standalone_compose_bridge.py convert -f docker-compose.yml -o output/\n\n# List transformations\npython3 standalone_compose_bridge.py transformations list\n\n# Create transformation\npython3 standalone_compose_bridge.py transformations create my-transform\n```\n\n## Command Reference\n\n### Convert Command\n\n```bash\ncompose_bridge.sh convert [OPTIONS]\n```\n\n**Options:**\n- `-f, --file FILE`: Compose file (required, can be used multiple times)\n- `-o, --output DIR`: Output directory (default: out)\n- `-t, --transformation T`: Transformation to use (default: docker/compose-bridge-kubernetes)\n- `--templates DIR`: Directory containing transformation templates\n- `-p, --project-name NAME`: Project name\n\n### Transformations Command\n\n```bash\ncompose_bridge.sh transformations SUBCOMMAND [OPTIONS]\n```\n\n**Subcommands:**\n- `list`: List available transformation images\n- `create PATH`: Create new transformation template\n  - `-f, --from IMAGE`: Source transformation to copy from\n\n## Available Transformations\n\n- `docker/compose-bridge-kubernetes` (default) - Kubernetes manifests\n- `docker/compose-bridge-helm` - Helm charts\n- Custom transformations (create your own)\n\n## How It Works\n\nThe implementation follows the same architecture as Docker Compose Bridge:\n\n1. **Resolve Compose Model**: Uses `docker compose config` to get the fully resolved model\n2. **Load Additional Resources**: \n   - Loads content from secret files\n   - Loads content from config files  \n   - Inspects Docker images for exposed ports\n3. **Run Transformations**: Executes transformation Docker containers with:\n   - Input: `/in/compose.yaml` (resolved model)\n   - Output: `/out/` (generated manifests)\n   - Templates: `/templates/` (optional custom templates)\n\n## Example Workflow\n\n1. **Prepare your compose file:**\n   ```yaml\n   # docker-compose.yml\n   services:\n     web:\n       image: nginx\n       ports:\n         - \"80:80\"\n     redis:\n       image: redis\n   ```\n\n2. **Convert to Kubernetes:**\n   ```bash\n   ./compose_bridge.sh convert -f docker-compose.yml -o k8s/\n   ```\n\n3. **Check generated files:**\n   ```bash\n   ls k8s/\n   # Output: deployments, services, configmaps, etc.\n   ```\n\n4. **Deploy to Kubernetes:**\n   ```bash\n   kubectl apply -f k8s/\n   ```\n\n## Troubleshooting\n\n### Common Issues\n\n1. **Docker connection error:**\n   - Ensure Docker daemon is running\n   - Check Docker socket permissions\n\n2. **Transformation image not found:**\n   - The script will automatically pull the image\n   - Ensure internet connectivity\n\n3. **Python dependencies missing:**\n   ```bash\n   pip install docker PyYAML\n   ```\n\n4. **Permission denied:**\n   ```bash\n   chmod +x compose_bridge.sh standalone_compose_bridge.py\n   ```\n\n### Debug Mode\n\nFor debugging, you can modify the Python script to add verbose logging:\n\n```python\nimport logging\nlogging.basicConfig(level=logging.DEBUG)\n```\n\n## Comparison with Official Bridge\n\n| Feature | Official Bridge | This Implementation |\n|---------|----------------|-------------------|\n| Kubernetes conversion | ✅ | ✅ |\n| Helm conversion | ✅ | ✅ |\n| Custom transformations | ✅ | ✅ |\n| Secrets/configs loading | ✅ | ✅ |\n| Image inspection | ✅ | ✅ |\n| Multiple compose files | ✅ | ✅ |\n| Project naming | ✅ | ✅ |\n| Template customization | ✅ | ✅ |\n\n## Contributing\n\nThis implementation aims to be 1:1 compatible with Docker Compose Bridge. If you find any discrepancies or issues:\n\n1. Check the official Docker Compose Bridge documentation\n2. Compare with expected behavior\n3. Submit issues with detailed reproduction steps\n\n## License\n\nThis implementation follows the same principles as Docker Compose and is provided as-is for educational and practical use.\n"
  RESOURCE_LIMITS.md: |
    # Deployment Resource Guidelines

    For a single-node cluster with 4 CPU cores and 24GB memory:

    1. Critical media services (Plex, Jellyfin):
       - CPU: 200m-500m requests, 1000m-2000m limits
       - Memory: 256Mi-512Mi requests, 1Gi-2Gi limits

    2. *arr services (Sonarr, Radarr, etc):
       - CPU: 10m-50m requests, 200m limits
       - Memory: 64Mi requests, 256Mi limits

    3. Helper services (homer, wizarr, etc):
       - CPU: 10m requests, 100m limits
       - Memory: 64Mi requests, 128Mi limits

    4. Avoid running duplicate services (e.g., don't run both Jellyfin and Plex if one will suffice)

    5. Set reasonable replica counts - typically 1 for each service
  REVERSE_PROXY_TESTS.md: "# Testing\n\n## List of test URLs\n\n- <http://100.118.110.60:8096>  # Tailscale IP\n- <http://micklethefickle.noodlefish-pound.ts.net:8096>  # Tailscale Hostname\n- <http://jellyfin.micklethefickle.noodlefish-pound.ts.net>  # Tailscale Hostname\n- <https://jellyfin.micklethefickle.noodlefish-pound.ts.net>  # Tailscale Hostname\n- <http://170.9.243.8:8096>  # Public IP\n- <http://bolabaden.duckdns.org:8096>  # Public Legacy DuckDNS\n- <http://bolabaden.org:8096>  # Public Cloudflare Main Domain\n- <http://jellyfin.bolabaden.org>  # Public Cloudflare Main Domain\n- <https://jellyfin.bolabaden.org>  # Public Cloudflare Main Domain\n\n## Reverse Proxy Test Results\n\n### Raw Tailscale IP Tests\n\n| URL | Status |\n|-----|--------|\n| <http://100.118.110.60:7878>   | Passed! |\n| <http://100.118.110.60:8096>   | Passed! |\n\n### Raw Public IP Tests\n\n| URL | Status |\n|-----|--------|\n| <http://170.9.243.8:7878>    | Passed! |\n| <http://170.9.243.8:8096>    | Passed! |\n\n### HTTP Tailscale Domain Test\n\n| URL | Status |\n|-----|--------|\n| <http://micklethefickle.noodlefish-pound.ts.net:7878>          | ERR_NAME_NOT_RESOLVED |\n| <http://micklethefickle.noodlefish-pound.ts.net:8096>          | ERR_NAME_NOT_RESOLVED |\n| <http://radarr.micklethefickle.noodlefish-pound.ts.net:80>     | ERR_NAME_NOT_RESOLVED |\n| <http://jellyfin.micklethefickle.noodlefish-pound.ts.net:80>     | ERR_NAME_NOT_RESOLVED |\n| <https://radarr.micklethefickle.noodlefish-pound.ts.net:443>   | ERR_NAME_NOT_RESOLVED |\n| <https://jellyfin.micklethefickle.noodlefish-pound.ts.net:443>   | ERR_NAME_NOT_RESOLVED |\n\n### HTTP Cloudflare Main Domain Test\n\n| URL | Status |\n|-----|--------|\n| <http://micklethefickle.org:7878>          | ERR_CONNECTION_TIMED_OUT |\n| <http://radarr.micklethefickle.org:80>     | ERR_NAME_NOT_RESOLVED (browse warns Not Secure) |\n| <http://jellyfin.micklethefickle.org:80>     | ERR_NAME_NOT_RESOLVED (browse warns Not Secure) |\n| <https:/