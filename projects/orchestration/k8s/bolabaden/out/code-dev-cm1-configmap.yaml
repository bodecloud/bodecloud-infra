  USAGE_EXAMPLES.md: "# Standalone Docker Compose Bridge - Usage Examples\n\nThis document provides practical examples of using the standalone Docker Compose Bridge implementation.\n\n## Quick Start\n\n### 1. Basic Conversion to Kubernetes\n\n```bash\n# Convert a simple compose file to Kubernetes manifests\n./compose_bridge.sh convert -f test-compose.yml -o k8s-output/\n\n# Or using Python directly\npython3 standalone_compose_bridge.py convert -f test-compose.yml -o k8s-output/\n```\n\n### 2. Convert to Helm Charts\n\n```bash\n# Convert to Helm chart format\n./compose_bridge.sh convert -f test-compose.yml -o helm-output/ -t docker/compose-bridge-helm\n```\n\n### 3. Multiple Compose Files\n\n```bash\n# Merge multiple compose files before conversion\n./compose_bridge.sh convert \\\n  -f docker-compose.yml \\\n  -f docker-compose.override.yml \\\n  -f docker-compose.prod.yml \\\n  -o production-k8s/\n```\n\n## Advanced Examples\n\n### 1. Custom Project Name\n\n```bash\n# Specify a custom project name for the Kubernetes namespace\n./compose_bridge.sh convert \\\n  -f docker-compose.yml \\\n  -o k8s/ \\\n  -p my-awesome-app\n```\n\n### 2. Using Custom Templates\n\n```bash\n# First, create a custom transformation template\n./compose_bridge.sh transformations create my-custom-transform\n\n# Edit the templates in my-custom-transform/templates/\n# Then build your custom transformation image\ncd my-custom-transform\ndocker build -t my-company/my-transform .\n\n# Use your custom transformation\n./compose_bridge.sh convert \\\n  -f docker-compose.yml \\\n  -o custom-output/ \\\n  -t my-company/my-transform\n```\n\n### 3. Working with Secrets and Configs\n\nCreate a compose file with secrets and configs:\n\n```yaml\n# docker-compose-with-secrets.yml\nservices:\n  app:\n    image: nginx\n    configs:\n      - source: app-config\n        target: /etc/nginx/nginx.conf\n    secrets:\n      - app-secret\n      \nconfigs:\n  app-config:\n    file: ./nginx.conf\n    \nsecrets:\n  app-secret:\n    file: ./secret.txt\n```\n\nCreate the required files:\n```bash\n# Create config file\necho \"server { listen 80; }\" > nginx.conf\n\n# Create secret file  \necho \"my-secret-value\" > secret.txt\n\n# Convert (secrets and configs will be loaded automatically)\n./compose_bridge.sh convert -f docker-compose-with-secrets.yml -o output/\n```\n\n## Transformation Management\n\n### 1. List Available Transformations\n\n```bash\n./compose_bridge.sh transformations list\n```\n\n### 2. Create Custom Transformation\n\n```bash\n# Create from default Kubernetes transformation\n./compose_bridge.sh transformations create my-k8s-transform\n\n# Create from Helm transformation\n./compose_bridge.sh transformations create my-helm-transform -f docker/compose-bridge-helm\n\n# Customize templates in my-k8s-transform/templates/\n# Build and use\ncd my-k8s-transform\ndocker build -t my-company/k8s-transform .\n```\n\n## Integration Examples\n\n### 1. CI/CD Pipeline Integration\n\n```bash\n#!/bin/bash\n# ci-deploy.sh\n\nset -e\n\n# Convert compose to k8s\n./compose_bridge.sh convert \\\n  -f docker-compose.yml \\\n  -f docker-compose.prod.yml \\\n  -o k8s-manifests/ \\\n  -p \"${CI_PROJECT_NAME}\"\n\n# Apply to cluster\nkubectl apply -f k8s-manifests/\n\n# Wait for deployment\nkubectl wait --for=condition=available deployment --all -n \"${CI_PROJECT_NAME}\"\n```\n\n### 2. GitOps Workflow\n\n```bash\n#!/bin/bash\n# gitops-convert.sh\n\n# Convert for different environments\nenvironments=(\"dev\" \"staging\" \"prod\")\n\nfor env in \"${environments[@]}\"; do\n  echo \"Converting for $env environment...\"\n  \n  ./compose_bridge.sh convert \\\n    -f docker-compose.yml \\\n    -f \"docker-compose.$env.yml\" \\\n    -o \"k8s/$env/\" \\\n    -p \"myapp-$env\"\n    \n  # Commit to GitOps repo\n  git add \"k8s/$env/\"\n  git commit -m \"Update $env manifests\"\ndone\n\ngit push origin main\n```\n\n### 3. Development Workflow\n\n```bash\n#!/bin/bash\n# dev-workflow.sh\n\n# Start development environment\ndocker compose up -d\n\n# Convert to k8s for testing\n./compose_bridge.sh convert \\\n  -f docker-compose.yml \\\n  -f docker-compose.dev.yml \\\n  -o k8s-dev/ \\\n  -p myapp-dev\n\n# Test in local k8s (minikube/kind)\nkubectl apply -f k8s-dev/\n\n# Verify deployment\nkubectl get pods -n myapp-dev\n```\n\n## Comparison with Official Bridge\n\n### Command Equivalents\n\n| Official Bridge | Standalone Implementation |\n|----------------|---------------------------|\n| `docker compose bridge convert` | `./compose_bridge.sh convert` |\n| `docker compose bridge transformations list` | `./compose_bridge.sh transformations list` |\n| `docker compose bridge transformations create` | `./compose_bridge.sh transformations create` |\n\n### Feature Parity\n\n```bash\n# All these work identically:\n\n# Basic conversion\ndocker compose bridge convert -f compose.yml -o out/\n./compose_bridge.sh convert -f compose.yml -o out/\n\n# With transformations\ndocker compose bridge convert -f compose.yml -t docker/compose-bridge-helm -o out/\n./compose_bridge.sh convert -f compose.yml -t docker/compose-bridge-helm -o out/\n\n# Multiple files\ndocker compose bridge convert -f compose.yml -f override.yml -o out/\n./compose_bridge.sh convert -f compose.yml -f override.yml -o out/\n\n# Custom project name\ndocker compose bridge convert -f compose.yml -p myproject -o out/\n./compose_bridge.sh convert -f compose.yml -p myproject -o out/\n```\n\n## Troubleshooting Examples\n\n### 1. Debug Mode\n\n```bash\n# Add debug logging to Python script\nexport PYTHONPATH=.\npython3 -c \"\nimport logging\nlogging.basicConfig(level=logging.DEBUG)\nfrom standalone_compose_bridge import ComposeBridge\nbridge = ComposeBridge()\nbridge.convert(['test-compose.yml'], 'debug-output/')\n\"\n```\n\n### 2. Manual Transformation Testing\n\n```bash\n# Test transformation manually\ndocker run --rm \\\n  -v $(pwd)/test-compose.yml:/in/compose.yaml:ro \\\n  -v $(pwd)/manual-output:/out \\\n  -e LICENSE_AGREEMENT=true \\\n  docker/compose-bridge-kubernetes\n```\n\n### 3. Validate Generated Manifests\n\n```bash\n# Convert and validate\n./compose_bridge.sh convert -f docker-compose.yml -o k8s/\n\n# Validate Kubernetes manifests\nkubectl apply --dry-run=client -f k8s/\n\n# Check with kubeval (if installed)\nkubeval k8s/*.yaml\n```\n\n## Tips and Best Practices\n\n### 1. Resource Management\n\n```bash\n# Clean up after conversion\n./compose_bridge.sh convert -f compose.yml -o temp-k8s/\nkubectl apply -f temp-k8s/\nrm -rf temp-k8s/\n```\n\n### 2. Version Control\n\n```bash\n# Keep generated manifests in version control\n./compose_bridge.sh convert -f docker-compose.yml -o manifests/\ngit add manifests/\ngit commit -m \"Update Kubernetes manifests\"\n```\n\n### 3. Environment-Specific Conversions\n\n```bash\n# Use environment-specific compose files\nfor env in dev staging prod; do\n  ./compose_bridge.sh convert \\\n    -f docker-compose.yml \\\n    -f \"docker-compose.$env.yml\" \\\n    -o \"k8s/$env/\" \\\n    -p \"myapp-$env\"\ndone\n```\n\nThis standalone implementation provides complete feature parity with the official Docker Compose Bridge, allowing you to use the same commands and workflows regardless of your Docker Compose installation.\n"
