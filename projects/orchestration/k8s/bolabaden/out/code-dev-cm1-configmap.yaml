    # Requirements for Standalone Docker Compose Bridge
    docker>=6.0.0
    PyYAML>=6.0
    pathlib>=1.0.1
  standalone_compose_bridge.py: |
    #!/usr/bin/env python3
    """
    Standalone Docker Compose Bridge Implementation

    This script replicates the functionality of Docker Compose Bridge command
    to convert Docker Compose files to Kubernetes manifests or other formats.

    Usage:
        python standalone_compose_bridge.py convert -f docker-compose.yml -o output/
        python standalone_compose_bridge.py convert -f docker-compose.yml -o output/ -t docker/compose-bridge-helm
        python standalone_compose_bridge.py transformations list
    """

    from __future__ import annotations

    import argparse
    import os
    import shutil
    import subprocess
    import sys
    import tempfile
    from pathlib import Path
    from typing import TYPE_CHECKING, Any

    import docker  # pyright: ignore[reportMissingModuleSource]
    import docker.errors  # pyright: ignore[reportMissingModuleSource]
    import yaml  # pyright: ignore[reportMissingModuleSource]

    if TYPE_CHECKING:
        from docker.models.containers import Container  # pyright: ignore[reportMissingModuleSource]


    class ComposeBridgeError(Exception):
        """Custom exception for Compose Bridge errors"""

        pass


    class ComposeBridge:
        def __init__(self):
            self.docker_client: docker.DockerClient = docker.from_env()
            self.default_transformer: str = "docker/compose-bridge-kubernetes"

        def resolve_compose_model(
            self,
            compose_files: list[str],
            project_name: str | None = None,
        ) -> dict[str, Any]:
            """Resolve the Compose model using docker compose config."""
            cmd: list[str] = ["docker", "compose"]

            # Add compose files
            for compose_file in compose_files:
                cmd.extend(["-f", compose_file])

            # Add project name if specified
            if project_name:
                cmd.extend(["-p", project_name])

            cmd.append("config")

            try:
                result: subprocess.CompletedProcess[str] = subprocess.run(
                    cmd,
                    capture_output=True,
                    text=True,
                    check=True,
                )
                return yaml.safe_load(result.stdout)
            except subprocess.CalledProcessError as e:
                raise ComposeBridgeError(f"Failed to resolve compose model: {e.stderr}. ({e.__class__.__name__}: {e})")

        def load_additional_resources(self, model: dict[str, Any]) -> dict[str, Any]:
            """Load additional resources like secrets, configs, and inspect images."""
            # Load secrets content
            if "secrets" in model:
                for name, secret in model["secrets"].items():
                    if not secret.get("external", False):
                        if "file" in secret:
                            try:
                                with open(secret["file"], "r", encoding="utf-8") as f:
                                    secret["content"] = f.read()
                            except FileNotFoundError as e:
                                print(f"Warning: Secret file '{secret['file']}' not found! ({e.__class__.__name__}: {e})")
                        elif "environment" in secret:
                            secret["content"] = os.getenv(secret["environment"], "")

            # Load configs content
            if "configs" in model:
                for name, config in model["configs"].items():
                    if not config.get("external", False):
                        if "file" in config:
                            try:
                                with open(config["file"], "r", encoding="utf-8") as f:
                                    config["content"] = f.read()
                            except FileNotFoundError as e:
                                print(f"Warning: Config file '{config['file']}' not found! ({e.__class__.__name__}: {e})")
                        elif "environment" in config:
                            config["content"] = os.getenv(config["environment"], "")

            # Inspect images and get exposed ports
            if "services" in model:
                for service_name, service in model["services"].items():
                    if "image" in service:
                        try:
                            image_info = self.docker_client.api.inspect_image(service["image"])
                            exposed_ports = set()

                            # Add existing expose ports
                            if "expose" in service:
                                exposed_ports.update(str(port) for port in service["expose"])

                            # Add ports from image config
                            if image_info.get("Config", {}).get("ExposedPorts"):
                                for port in image_info["Config"]["ExposedPorts"].keys():
                                    port_num = port.split("/")[0]
                                    exposed_ports.add(port_num)

                            # Add published ports
                            if "ports" in service:
                                for port_mapping in service["ports"]:
                                    if isinstance(port_mapping, dict):
                                        exposed_ports.add(str(port_mapping.get("target", "")))
                                    elif isinstance(port_mapping, str):
                                        if ":" in port_mapping:
                                            target_port = port_mapping.split(":")[-1]
                                            exposed_ports.add(target_port)

                            service["expose"] = sorted(list(exposed_ports))

                        except Exception as e:
                            print(f"Warning: Could not inspect image {service['image']}: {e.__class__.__name__}: {e}")

            return model

        def convert(
            self,
            compose_files: list[str],
            output_dir: str,
            transformations: list[str] | None = None,
            templates_dir: str | None = None,
            project_name: str | None = None,
        ):
            """Convert Compose files using transformations."""
            if not transformations:
                transformations = [self.default_transformer]

            # Resolve the compose model
            print("Resolving Compose model...")
            model = self.resolve_compose_model(compose_files, project_name)

            # Load additional resources
            print("Loading additional resources...")
            model = self.load_additional_resources(model)

            # Create output directory
            output_path = Path(output_dir)
            output_path.mkdir(parents=True, exist_ok=True)

            # Create temporary directory for input
            with tempfile.TemporaryDirectory() as temp_dir:
                temp_path = Path(temp_dir)

                # Write resolved compose.yaml
                compose_yaml_path = temp_path / "compose.yaml"
                with open(compose_yaml_path, "w", encoding="utf-8") as f:
                    yaml.dump(model, f, default_flow_style=False)

                # Run transformations
                for transformation in transformations:
                    print(f"Running transformation: '{transformation}'")
                    self._run_transformation(
                        transformation,
                        temp_path,
                        output_path,
                        templates_dir,
                    )

            print(f"Conversion completed. Output written to: '{output_dir}'")

        def _run_transformation(
            self,
            transformation: str,
            input_dir: Path,
            output_dir: Path,
            templates_dir: str | None = None,
        ):
            """Run a single transformation container."""
            try:
                # Pull the transformation image
                print(f"Pulling transformation image: '{transformation}'")
                self.docker_client.images.pull(transformation)

                # Prepare volume mounts using bind format
                volume_binds = [
                    f"{input_dir}:/in:ro",
                    f"{output_dir}:/out:rw",
                ]

                if templates_dir:
                    templates_path = Path(templates_dir).resolve()
                    volume_binds.append(f"{templates_path}:/templates:ro")

                # Run the transformation container
                print("Running transformation container...")
                _container = self.docker_client.containers.run(
                    transformation,
                    environment=["LICENSE_AGREEMENT=true"],
                    volumes=volume_binds,
                    remove=True,
                    detach=False,
                )

            except docker.errors.ImageNotFound as e:
                raise ComposeBridgeError(f"Transformation image not found: {transformation} ({e.__class__.__name__}: {e})")
            except docker.errors.ContainerError as e:
                raise ComposeBridgeError(f"Failed to run transformation {transformation}: Command '{e.command}' in image '{transformation}' returned non-zero exit status {e.exit_status}: {e.stderr}. ({e.__class__.__name__}: {e})")
            except docker.errors.APIError as e:
                raise ComposeBridgeError(f"Docker API error running transformation {transformation}: {e.__class__.__name__}: {e}")
            except Exception as e:
                raise ComposeBridgeError(f"Failed to run transformation {transformation}: {e.__class__.__name__}: {e}")

        def list_transformations(self):
            """List available transformation images."""
            try:
                images = self.docker_client.images.list(
                    filters={"label": "com.docker.compose.bridge=transformation"}
                )

                if not images:
                    print("No transformation images found.")
                    return

                print("Available transformations:")
                print(f"{'IMAGE ID':<12} {'REPOSITORY':<30} {'TAG':<15} {'SIZE':<10}")
                print("-" * 70)

                for image in images:
                    image_id = image.short_id.replace("sha256:", "")
                    repo_tags = (image.tags[0].split(":") if image.tags else ["<none>", "<none>"])
                    repo = repo_tags[0] if len(repo_tags) > 0 else "<none>"
                    tag = repo_tags[1] if len(repo_tags) > 1 else "<none>"
                    size = self._human_size(image.attrs.get("Size", 0))

                    print(f"{image_id:<12} {repo:<30} {tag:<15} {size}")

            except Exception as e:
                raise ComposeBridgeError(f"Failed to list transformations: {e.__class__.__name__}: {e}")

        def create_transformation(
            self,
            dest_path: str,
            from_transformation: str | None = None,
        ):
            """Create a new transformation template."""
            if not from_transformation:
                from_transformation = self.default_transformer

            dest = Path(dest_path)
            if dest.exists():
                raise ComposeBridgeError(f"Destination path already exists: '{dest_path}'")

            try:
                # Create destination directory
                dest.mkdir(parents=True)
                templates_dir = dest / "templates"
                templates_dir.mkdir()

                print(f"Extracting templates from {from_transformation}...")

                # Create a temporary container to extract templates
                container: Container = self.docker_client.containers.create(
                    from_transformation,
                    detach=True,
                )

                try:
                    # Extract templates from container
                    archive, _ = container.get_archive("/templates")

                    # Extract archive to templates directory
                    import io
                    import tarfile

                    tar_stream = io.BytesIO()
                    for chunk in archive:
                        tar_stream.write(chunk)
                    tar_stream.seek(0)

                    with tarfile.open(fileobj=tar_stream, mode="r") as tar:
                        tar.extractall(path=dest)

                    # Create Dockerfile
                    dockerfile_content: str = """FROM docker/compose-bridge-transformer
    LABEL com.docker.compose.bridge=transformation
    COPY templates /templates
    """
                    with open(dest / "Dockerfile", "w", encoding="utf-8") as f:
                        f.write(dockerfile_content)

                    print(f"Transformation template created in: {dest_path}")

                finally:
                    container.remove()

            except Exception as e:
                # Clean up on error
                if dest.exists():
                    shutil.rmtree(dest)
                raise ComposeBridgeError(f"Failed to create transformation: '{dest_path}' ({e.__class__.__name__}: {e})")

        def _human_size(self, size_bytes: int) -> str:
            """Convert bytes to human readable format."""
            if size_bytes == 0:
                return "0B"

            size_names: list[str] = ["B", "KB", "MB", "GB", "TB"]
            i: int = 0
            while size_bytes >= 1024 and i < len(size_names) - 1:
                size_bytes = int(size_bytes / 1024)
                i += 1

            return f"{size_bytes:.1f}{size_names[i]}"


    def main():
        parser: argparse.ArgumentParser = argparse.ArgumentParser(description="Standalone Docker Compose Bridge - Convert Compose files to other formats")
        subparsers = parser.add_subparsers(
            dest="command",
            help="Available commands",
        )

        # Convert command
        convert_parser: argparse.ArgumentParser = subparsers.add_parser(
            "convert",
            help="Convert Compose files",
        )
        convert_parser.add_argument(
            "-f",
            "--file",
            action="append",
            required=True,
            help="Compose file (can be used multiple times)",
        )
        convert_parser.add_argument(
            "-o",
            "--output",
            default="out",
            help="Output directory (default: out)",
        )
        convert_parser.add_argument(
            "-t",
            "--transformation",
            action="append",
            help="Transformation to use (default: docker/compose-bridge-kubernetes)",
        )
        convert_parser.add_argument(
            "--templates",
            help="Directory containing transformation templates",
        )
        convert_parser.add_argument("-p", "--project-name", help="Project name")

        # Transformations command
        trans_parser: argparse.ArgumentParser = subparsers.add_parser(
            "transformations",
            help="Manage transformations",
        )
        trans_subparsers = trans_parser.add_subparsers(dest="trans_command")

        # List transformations
        trans_subparsers.add_parser(
            "list",
            help="List available transformations",
        )

        # Create transformation
        create_parser: argparse.ArgumentParser = trans_subparsers.add_parser(
            "create",
            help="Create new transformation",
        )
        create_parser.add_argument(
            "path",
            help="Destination path for new transformation",
        )
        create_parser.add_argument(
            "-f",
            "--from",
            dest="from_transformation",
            help="Source transformation to copy from",
        )

        args = parser.parse_args()

        if not args.command:
            parser.print_help()
            return 1

        try:
            bridge: ComposeBridge = ComposeBridge()

            if args.command == "convert":
                bridge.convert(
                    compose_files=args.file,
                    output_dir=args.output,
                    transformations=args.transformation,
                    templates_dir=args.templates,
                    project_name=args.project_name,
                )

            elif args.command == "transformations":
                if args.trans_command == "list":
                    bridge.list_transformations()
                elif args.trans_command == "create":
                    bridge.create_transformation(args.path, args.from_transformation)
                else:
                    trans_parser.print_help()
                    return 1

            return 0

        except ComposeBridgeError as e:
            print(f"Error: {e.__class__.__name__}: {e}", file=sys.stderr)
            return 1
        except KeyboardInterrupt:
            print("\nOperation cancelled by user", file=sys.stderr)
            return 1
        except Exception as e:
            print(f"Unexpected error: {e.__class__.__name__}: {e}", file=sys.stderr)
            return 1


    if __name__ == "__main__":
        sys.exit(main())
