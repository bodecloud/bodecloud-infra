  compose_bridge.sh: "#!/bin/bash\n\n# Standalone Docker Compose Bridge - Bash Wrapper\n# This script provides a bash interface to the Docker Compose Bridge functionality\n\nset -euo pipefail\n\nSCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\"\nPYTHON_SCRIPT=\"$SCRIPT_DIR/standalone_compose_bridge.py\"\n\n# Check if Python script exists\nif [[ ! -f \"$PYTHON_SCRIPT\" ]]; then\n    echo \"Error: Python script not found at $PYTHON_SCRIPT\" >&2\n    exit 1\nfi\n\n# Check if Python 3 is available\nif ! command -v python3 &> /dev/null; then\n    echo \"Error: python3 is required but not installed\" >&2\n    exit 1\nfi\n\n# Check if required Python packages are available\ncheck_dependencies() {\n    local missing_deps=()\n    \n    if ! python3 -c \"import docker\" 2>/dev/null; then\n        missing_deps+=(\"docker\")\n    fi\n    \n    if ! python3 -c \"import yaml\" 2>/dev/null; then\n        missing_deps+=(\"pyyaml\")\n    fi\n    \n    if [[ ${#missing_deps[@]} -gt 0 ]]; then\n        echo \"Error: Missing required Python packages: ${missing_deps[*]}\" >&2\n        echo \"Install them with: pip install ${missing_deps[*]}\" >&2\n        exit 1\n    fi\n}\n\n# Show usage information\nshow_usage() {\n    cat << 'USAGE'\nStandalone Docker Compose Bridge - Convert Compose files to other formats\n\nUSAGE:\n    compose_bridge.sh convert -f <compose-file> [OPTIONS]\n    compose_bridge.sh transformations list\n    compose_bridge.sh transformations create <path> [OPTIONS]\n\nCOMMANDS:\n    convert                 Convert Compose files to target format\n    transformations         Manage transformation images\n\nCONVERT OPTIONS:\n    -f, --file FILE         Compose file (required, can be used multiple times)\n    -o, --output DIR        Output directory (default: out)\n    -t, --transformation T  Transformation to use (default: docker/compose-bridge-kubernetes)\n    --templates DIR         Directory containing transformation templates\n    -p, --project-name NAME Project name\n\nTRANSFORMATIONS OPTIONS:\n    list                    List available transformation images\n    create PATH             Create new transformation template\n        -f, --from IMAGE    Source transformation to copy from\n\nEXAMPLES:\n    # Convert a compose file to Kubernetes manifests\n    compose_bridge.sh convert -f docker-compose.yml\n\n    # Convert with custom output directory\n    compose_bridge.sh convert -f docker-compose.yml -o k8s-manifests/\n\n    # Convert using Helm transformation\n    compose_bridge.sh convert -f docker-compose.yml -t docker/compose-bridge-helm\n\n    # Convert multiple compose files\n    compose_bridge.sh convert -f docker-compose.yml -f docker-compose.override.yml\n\n    # List available transformations\n    compose_bridge.sh transformations list\n\n    # Create custom transformation\n    compose_bridge.sh transformations create my-custom-transform\n\nUSAGE\n}\n\n# Main function\nmain() {\n    # Check dependencies first\n    check_dependencies\n    \n    # If no arguments provided, show usage\n    if [[ $# -eq 0 ]]; then\n        show_usage\n        exit 1\n    fi\n    \n    # Execute the Python script with all arguments\n    python3 \"$PYTHON_SCRIPT\" \"$@\"\n}\n\n# Execute main function with all arguments\nmain \"$@\"\n"
  docker-compose.yml: "x-common-env: &common-env\n  TZ: ${TZ:-America/Chicago}\n  PUID: ${PUID:-1002}\n  PGID: ${PGID:-988}\n  UMASK: ${UMASK:-002}\n\nx-common-uidgid: &common-uidgid\n  user: ${PUID:-1002}:${PGID:-988}\n\nx-resource-limits: &resource-limits\n  labels:\n    autoheal: \"true\"\n\nx-common-logging: &common-logging\n  logging:\n    driver: \"local\"\n    options:\n      max-file: \"5\"\n      max-size: \"10m\"\n\nx-common-hostname-aliases: &common-hostname-aliases\n  - host.docker.internal:host-gateway  # doesn't exist with docker desktop, let's create it.\n# Tailscale\n  - boden-iphone:100.97.148.14\n  - beatapostapita:100.99.45.35\n  - micklethefickle:100.72.149.123\n  - micklethefickle3:100.72.149.123\n  - wizard:100.119.187.62\n  - wizard-pc:100.119.187.62\n# Warp\n  - warp:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - tailscale-warp:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - aiostreams:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - comet:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - jackett:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - jackettio:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - localhost:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - mediafusion:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - prowlarr:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio-jackett:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio-web:${WARP_IPV4_ADDRESS:-10.76.128.97}\n# Warp2\n  - warp2:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n  - stremthru:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n  - gptr:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n\nx-gluetun-hosts-workaround: &gluetun-hosts-workaround\n  - host.docker.internal:host-gateway  # doesn't exist with docker desktop, let's create it.\n# Tailscale\n  - boden-iphone:100.97.148.14\n  - beatapostapita:100.99.45.35\n  - micklethefickle:100.72.149.123\n  - micklethefickle3:100.72.149.123\n  - wizard:100.119.187.62\n  - wizard-pc:100.119.187.62\n# Warp\n  - warp:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - tailscale-warp:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - aiostreams:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - comet:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - jackett:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - jackettio:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - localhost:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - mediafusion:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - prowlarr:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio-jackett:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - stremio-web:${WARP_IPV4_ADDRESS:-10.76.128.97}\n  - mediaflow-proxy:${WARP_IPV4_ADDRESS:-10.76.128.97}\n# Warp2\n  - warp2:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n  - stremthru:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n  - gptr:${WARP2_IPV4_ADDRESS:-10.76.128.98}\n# Docker containers:\n  - dash:${DASH_IPV4_ADDRESS:-10.76.128.23}\n  - gpt-researcher:${GPT_RESEARCHER_IPV4_ADDRESS:-10.76.128.43}\n#  - gptr:${GPT_RESEARCHER_IPV4_ADDRESS:-10.76.128.43}\n  - lobechat:${LOBECHAT_IPV4_ADDRESS:-10.76.128.46}\n  - mongodb:${MONGODB_IPV4_ADDRESS:-10.76.0.50}\n  - code-demo:${CODE_DEMO_IPV4_ADDRESS:-10.76.128.80}\n  - whoami:${WHOAMI_IPV4_ADDRESS:-10.76.128.81}\n  - tinyauth:${TINYAUTH_IPV4_ADDRESS:-10.76.128.82}\n  - watchtower:${WATCHTOWER_IPV4_ADDRESS:-10.76.128.83}\n  - error-pages:${TRAEFIK_ERROR_PAGES_IPV4_ADDRESS:-10.76.128.84}\n  - traefik:${TRAEFIK_IPV4_ADDRESS:-10.76.128.85}\n  - speedtest:${SPEEDTEST_IPV4_ADDRESS:-10.76.128.86}\n  - redis:${REDIS_IPV4_ADDRESS:-10.76.128.87}\n  - homepage:${HOMEPAGE_IPV4_ADDRESS:-10.76.128.88}\n  - dozzle:${DOZZLE_IPV4_ADDRESS:-10.76.128.89}\n  - searxng:${SEARXNG_IPV4_ADDRESS:-10.76.128.90}\n  - code-dev:${CODE_DEV_IPV4_ADDRESS:-10.76.128.92}\n  - code:${CODE_DEMO_IPV4_ADDRESS:-10.76.128.96}\n  - byparr:${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}\n  - flaresolverr:${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}\n  - nginx-auth:${NGINX_AUTH_IPV4_ADDRESS:-10.76.128.94}\n  - stremthru-redis:${STREMTHRU_REDIS_IPV4_ADDRESS:-10.76.128.95}\n\nservices:\n  mongodb:\n    image: mongo:latest\n    container_name: mongodb\n    hostname: ${MONGODB_HOSTNAME:-mongodb}\n    extra_hosts: *common-hostname-aliases\n    networks:\n      publicnet:\n        ipv4_address: ${MONGODB_IPV4_ADDRESS:-10.76.0.50}\n    expose:\n      - 27017\n    volumes:\n      - ${CONFIG_PATH:-./configs}/mongodb/data:/data/db\n    environment:\n      <<: *common-env\n    healthcheck:\n      test: [\"CMD-SHELL\", \"mongosh 127.0.0.1:27017/test --quiet --eval 'db.runCommand(\\\"ping\\\").ok' > /dev/null 2>&1 || exit 1\"]\n      interval: 10s\n      timeout: 10s\n      retries: 5\n      start_period: 40s\n    labels:\n      deunhealth.restart.on.unhealthy: \"true\"\n      traefik.enable: \"true\"\n      traefik.http.routers.mongodb.middlewares: nginx-auth@file\n      traefik.http.routers.mongodb.rule: Host(`mongodb.${DOMAIN}`) || Host(`mongodb.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`mongodb.${TS_HOSTNAME}.duckdns.org`)\n      traefik.http.services.mongodb.loadbalancer.server.port: 27017\n    restart: always\n\n  redis:\n    image: redis:latest\n    container_name: redis\n    hostname: redis\n    extra_hosts: *common-hostname-aliases\n    networks:\n      publicnet:\n        ipv4_address: ${REDIS_IPV4_ADDRESS:-10.76.128.87}\n    expose:\n      - 6379\n    volumes:\n      - ${CONFIG_PATH:-./configs}/redis:/data\n    command: redis-server --appendonly yes --save 60 1\n    labels:\n      deunhealth.restart.on.unhealthy: \"true\"\n      traefik.enable: \"true\"\n      traefik.http.routers.redis.middlewares: nginx-auth@file\n      traefik.http.routers.redis.rule: Host(`redis.${DOMAIN}`) || Host(`redis.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`redis.${TS_HOSTNAME}.duckdns.org`)\n      traefik.http.services.redis.loadbalancer.server.port: 6379\n    healthcheck:\n      test: [\"CMD-SHELL\", \"redis-cli ping > /dev/null 2>&1 || exit 1\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    restart: always\n  searxng:\n    # \U0001F539\U0001F539 SearxNG \U0001F539\U0001F539  # https://hub.docker.com/r/searxng/searxng\n    # SearxNG is a privacy-respecting, hackable, open-source metasearch engine.\n    image: searxng/searxng:latest\n    container_name: searxng\n    hostname: ${SEARXNG_HOSTNAME:-searxng}\n    extra_hosts: *common-hostname-aliases\n    networks:\n      publicnet:\n        ipv4_address: ${SEARXNG_IPV4_ADDRESS:-10.76.128.90}\n    expose:\n      - 8080\n    volumes:\n      # touch ${CONFIG_PATH:-./configs}/searxng/limiter.toml\n      - ${CONFIG_PATH:-./configs}/searxng:/etc/searxng\n    environment:\n      <<: *common-env\n      SEARXNG_BASE_URL: ${SEARXNG_URL:-http://${SEARXNG_HOSTNAME:-searxng}:8080}\n    labels:\n      deunhealth.restart.on.unhealthy: \"true\"\n      homepage.group: Search\n      homepage.name: SearxNG\n      homepage.icon: searxng.png\n      homepage.href: https://searxng.${DOMAIN}/\n    healthcheck:\n      test: [\"CMD-SHELL\", \"wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n    restart: always\n  warp2:\n    # \U0001F539\U0001F539 Cloudflare WARP \U0001F539\U0001F539\n    # Cloudflare WARP is a VPN service that allows you to bypass censorship and access the internet privately.\n    # Use this for all services that don't need listening ports exposed\n    image: caomingjun/warp:latest\n    container_name: warp2\n    extra_hosts: *gluetun-hosts-workaround\n    networks:\n      publicnet:\n        ipv4_address: ${WARP2_IPV4_ADDRESS:-10.76.128.98}\n    # add removed rule back (https://github.com/opencontainers/runc/pull/3468)\n    device_cgroup_rules:\n      - 'c 10:200 rwm'\n    expose:\n      - 3000  # gptr (nginx) \n      - 3001  # gptr (nextjs)\n      - 8000  # gptr (uvicorn backend)\n    ports:\n      - 8000:8000  # gptr (uvicorn backend)\n    environment:\n      - WARP_SLEEP=2\n      - WARP_LICENSE_KEY=eyJhIjoiZTRlYjNkYmViMTJiZWFhY2MxNzcwNDEyMzE3OTA0NTQiLCJ0IjoiM2ExODhhOTMtYzQwNC00Zjg5LTg4NzItOThlMDkxNjNiYzAzIiwicyI6Ill6SmpNVFl5WmpNdE9EYzROUzAwWlRrMUxUazFORFl0TWpnd1lXWXhZVEpsT1dNMiJ9\n      # - WARP_ENABLE_NAT=1 # enable nat\n      - TUNNEL_TOKEN=eyJhIjoiZTRlYjNkYmViMTJiZWFhY2MxNzcwNDEyMzE3OTA0NTQiLCJ0IjoiM2ExODhhOTMtYzQwNC00Zjg5LTg4NzItOThlMDkxNjNiYzAzIiwicyI6Ill6SmpNVFl5WmpNdE9EYzROUzAwWlRrMUxUazFORFl0TWpnd1lXWXhZVEpsT1dNMiJ9\n    cap_add:\n      # Docker already have them, these are for podman users\n      - MKNOD\n      - AUDIT_WRITE\n      # additional required cap for warp, both for podman and docker\n      - NET_ADMIN\n    sysctls:\n      - net.ipv6.conf.all.disable_ipv6=1\n      - net.ipv4.conf.all.src_valid_mark=1\n      # uncomment for nat\n      # - net.ipv4.ip_forward=1\n      # - net.ipv6.conf.all.forwarding=1\n      # - net.ipv6.conf.all.accept_ra=2\n    volumes:\n      - ${CONFIG_PATH:-./configs}/warp2/data:/var/lib/cloudflare-warp\n    labels:\n      deunhealth.restart.on.unhealthy: \"true\"\n      traefik.enable: \"true\"\n      # AI ResearchWizard\n      traefik.http.routers.gptr.service: gptr\n      traefik.http.routers.gptr.rule: Host(`${DOMAIN}`) || Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`${TS_HOSTNAME}.duckdns.org`) || Host(`${TS_HOSTNAME}.${DOMAIN}`) || Host(`${TS_HOSTNAME}.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`gptr.${DOMAIN}`) || Host(`gptr.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`gptr.${TS_HOSTNAME}.duckdns.org`) || Host(`gptr.${TS_HOSTNAME}.${DOMAIN}`) || Host(`gptr.${TS_HOSTNAME}.${DUCKDNS_SUBDOMAIN}.duckdns.org`)\n      traefik.http.services.gptr.loadbalancer.server.port: 3000\n      traefik.http.routers.gptr-legacy.service: gptr-legacy\n      traefik.http.routers.gptr-legacy.rule: Host(`gptr-legacy.${DOMAIN}`) || Host(`gptr-legacy.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`gptr-legacy.${TS_HOSTNAME}.duckdns.org`) || Host(`gptr-legacy.${TS_HOSTNAME}.${DOMAIN}`) || Host(`gptr-legacy.${TS_HOSTNAME}.${DUCKDNS_SUBDOMAIN}`)\n      traefik.http.services.gptr-legacy.loadbalancer.server.port: 8000\n    restart: always\n  warp:\n    # \U0001F539\U0001F539 Cloudflare WARP \U0001F539\U0001F539\n    # Cloudflare WARP is a VPN service that allows you to bypass censorship and access the internet privately.\n    # Use this for all services that don't need listening ports exposed\n    image: caomingjun/warp:latest\n    container_name: warp\n    extra_hosts: *gluetun-hosts-workaround\n    networks:\n      publicnet:\n        ipv4_address: ${WARP_IPV4_ADDRESS:-10.76.128.97}\n    # add removed rule back (https://github.com/opencontainers/runc/pull/3468)\n    device_cgroup_rules:\n      - 'c 10:200 rwm'\n    expose:\n      - 443\n      - 1080  # WARP SOCKS5 Proxy\n      - 3128  # warp-fetch-proxy\n      - 8080   # Stremio WebUI\n      - 11470  # Stremio HTTP Streaming Server\n      - 12470  # Stremio HTTPS Streaming Server\n      - ${COMET_PORT:-2020}  # Comet\n      - 3000  # Stremio-Jackett\n      - ${AIOSTREAMS_PORT:-3005}  # AIOStreams\n      - 4000  # Jackettio\n      - 8000  # MediaFusion\n      - 9117  # Jackett\n      - 9696  # Prowlarr\n    ports:\n      - 1080:1080  # WARP SOCKS5 Proxy\n      - 11470:11470  # Stremio HTTP Streaming Server (HTTP)\n      - 12470:12470  # Stremio HTTPS Streaming Server (HTTPS)\n      - 443:443/udp\n      - 9696:9696  # Prowlarr\n    environment:\n      - WARP_SLEEP=2\n      - WARP_LICENSE_KEY=eyJhIjoiZTRlYjNkYmViMTJiZWFhY2MxNzcwNDEyMzE3OTA0NTQiLCJ0IjoiM2ExODhhOTMtYzQwNC00Zjg5LTg4NzItOThlMDkxNjNiYzAzIiwicyI6Ill6SmpNVFl5WmpNdE9EYzROUzAwWlRrMUxUazFORFl0TWpnd1lXWXhZVEpsT1dNMiJ9\n      # - WARP_ENABLE_NAT=1 # enable nat\n      - TUNNEL_TOKEN=eyJhIjoiZTRlYjNkYmViMTJiZWFhY2MxNzcwNDEyMzE3OTA0NTQiLCJ0IjoiM2ExODhhOTMtYzQwNC00Zjg5LTg4NzItOThlMDkxNjNiYzAzIiwicyI6Ill6SmpNVFl5WmpNdE9EYzROUzAwWlRrMUxUazFORFl0TWpnd1lXWXhZVEpsT1dNMiJ9\n    cap_add:\n      # Docker already have them, these are for podman users\n      - MKNOD\n      - AUDIT_WRITE\n      # additional required cap for warp, both for podman and docker\n      - NET_ADMIN\n    sysctls:\n      - net.ipv6.conf.all.disable_ipv6=1\n      - net.i