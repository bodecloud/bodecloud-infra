apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.flaresolverr.middlewares: nginx-auth@file
    traefik.http.routers.flaresolverr.rule: Host(`flaresolverr.bolabaden.org`) || Host( `flaresolverr.bolabaden.duckdns.org`) || Host(`flaresolverr.micklethefickle.duckdns.org`) || Host(`flaresolverr.micklethefickle.bolabaden.org`) || Host(`flaresolverr.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.services.flaresolverr.loadbalancer.server.port: "8191"
  labels:
    io.kompose.service: flaresolverr
  name: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: flaresolverr
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.flaresolverr.middlewares: nginx-auth@file
        traefik.http.routers.flaresolverr.rule: Host(`flaresolverr.bolabaden.org`) || Host( `flaresolverr.bolabaden.duckdns.org`) || Host(`flaresolverr.micklethefickle.duckdns.org`) || Host(`flaresolverr.micklethefickle.bolabaden.org`) || Host(`flaresolverr.micklethefickle.bolabaden.duckdns.org`)
        traefik.http.services.flaresolverr.loadbalancer.server.port: "8191"
      labels:
        io.kompose.service: flaresolverr
    spec:
      containers:
        - env:
            - name: BROWSER_TIMEOUT
              value: "120000"
            - name: CAPTCHA_SOLVER
              value: none
            - name: HEADLESS
              value: "true"
            - name: HOST
              value: 0.0.0.0
            - name: LOG_HTML
              value: "false"
            - name: LOG_LEVEL
              value: info
            - name: PGID
              value: "988"
            - name: PORT
              value: "8191"
            - name: PROMETHEUS_ENABLED
              value: "false"
            - name: PROMETHEUS_PORT
              value: "9090"
            - name: PUID
              value: "1001"
            - name: TEST_URL
              value: https://www.google.com
            - name: TZ
              value: America/Chicago
            - name: UMASK
              value: "002"
          image: ghcr.io/flaresolverr/flaresolverr:latest
          livenessProbe:
            exec:
              command:
                - curl -f http://127.0.0.1:8191/health > /dev/null 2>&1 || exit 1
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
          name: flaresolverr
          ports:
            - containerPort: 8191
              protocol: TCP
      hostname: flaresolverr
      restartPolicy: Always
