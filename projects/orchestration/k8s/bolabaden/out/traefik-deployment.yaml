apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.traefik.middlewares: nginx-auth@file
    traefik.http.routers.traefik.rule: Host(`traefik.bolabaden.org`) || Host(`traefik.bolabaden.duckdns.org`) || Host(`traefik.micklethefickle.duckdns.org`) || Host(`traefik.micklethefickle.bolabaden.org`) || Host(`traefik.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.services.traefik.loadbalancer.server.port: "8080"
  labels:
    io.kompose.service: traefik
  name: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: traefik
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.traefik.middlewares: nginx-auth@file
        traefik.http.routers.traefik.rule: Host(`traefik.bolabaden.org`) || Host(`traefik.bolabaden.duckdns.org`) || Host(`traefik.micklethefickle.duckdns.org`) || Host(`traefik.micklethefickle.bolabaden.org`) || Host(`traefik.micklethefickle.bolabaden.duckdns.org`)
        traefik.http.services.traefik.loadbalancer.server.port: "8080"
      labels:
        io.kompose.service: traefik
    spec:
      containers:
        - args:
            - --accesslog=true
            - --api.dashboard=true
            - --api.debug=false
            - --api.disableDashboardAd=true
            - --api.insecure=true
            - --certificatesresolvers.letsencrypt.acme.caServer=https://acme-v02.api.letsencrypt.org/directory
            - --certificatesresolvers.letsencrypt.acme.dnsChallenge.provider=duckdns
            - --certificatesresolvers.letsencrypt.acme.dnsChallenge.resolvers=8.8.8.8,8.8.4.4
            - --certificatesresolvers.letsencrypt.acme.dnsChallenge=true
            - --certificatesresolvers.letsencrypt.acme.email=boden.crouch@gmail.com
            - --certificatesresolvers.letsencrypt.acme.httpChallenge.entryPoint=web
            - --certificatesresolvers.letsencrypt.acme.httpChallenge=true
            - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
            - --certificatesresolvers.letsencrypt.acme.tlsChallenge=true
            - --entrypoints.web.address=:80
            - --entrypoints.web.forwardedHeaders.trustedIPs=127.0.0.1/32,::1/128,172.17.0.0/12,10.76.0.0/16,100.64.0.0/10
            - --entrypoints.web.http.redirections.entryPoint.scheme=https
            - --entrypoints.web.http.redirections.entryPoint.to=websecure
            - --entrypoints.websecure.address=:443
            - --entrypoints.websecure.forwardedHeaders.trustedIPs=127.0.0.1/32,::1/128,172.17.0.0/12,10.76.0.0/16,100.64.0.0/10
            - --entrypoints.websecure.http.tls.certResolver=letsencrypt
            - --entrypoints.websecure.http.tls.domains[0].main=bolabaden.org
            - --entrypoints.websecure.http.tls.domains[0].sans=*.bolabaden.org
            - --entrypoints.websecure.http.tls=true
            - --global.checkNewVersion=true
            - --global.sendAnonymousUsage=false
            - --log.level=DEBUG
            - --ping.terminatingStatusCode=503
            - --ping=true
            - --providers.docker.defaultRule=Host(`{{ .ContainerName }}.bolabaden.org`) || Host(`{{ .ContainerName }}.bolabaden.duckdns.org`) || Host(`{{ .ContainerName }}.micklethefickle.duckdns.org`) || Host(`{{ .ContainerName }}.micklethefickle.bolabaden.org`) || Host(`{{ .ContainerName }}.micklethefickle.bolabaden.duckdns.org`)
            - --providers.docker.exposedByDefault=false
            - --providers.docker.network=publicnet
            - --providers.docker=true
            - --providers.file.directory=/config
            - --providers.file.watch=true
            - --serversTransport.insecureSkipVerify=true
          env:
            - name: CLOUDFLARE_DNS_API_TOKEN
              value: fp6tjZWb66p1rCyZBM9k0hxrE0n0Y7XctSTwP52I
            - name: CLOUDFLARE_EMAIL
              value: boden.crouch@gmail.com
            - name: CLOUDFLARE_ZONE_API_TOKEN
              value: fp6tjZWb66p1rCyZBM9k0hxrE0n0Y7XctSTwP52I
            - name: DUCKDNS_TOKEN
              value: 2c18769a-2889-4648-a70c-2fe44dd10f20
            - name: LETS_ENCRYPT_EMAIL
              value: boden.crouch@gmail.com
            - name: PGID
              value: "988"
            - name: PUID
              value: "1001"
            - name: TZ
              value: America/Chicago
            - name: UMASK
              value: "002"
          image: traefik:latest
          name: traefik
          ports:
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - mountPath: /certs
              name: traefik-cm1
      hostname: traefik
      restartPolicy: Always
      volumes:
        - configMap:
            name: traefik-cm1
          name: traefik-cm1
