apiVersion: v1
kind: Service
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    homepage.group: System Monitoring
    homepage.href: https://dozzle.bolabaden.org/
    homepage.icon: dozzle.png
    homepage.name: Dozzle
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.dozzle.middlewares: nginx-auth@file
    traefik.http.routers.dozzle.rule: Host(`dozzle.bolabaden.org`) || Host(`dozzle.bolabaden.duckdns.org`) || Host(`dozzle.micklethefickle.duckdns.org`) || Host(`dozzle.micklethefickle.bolabaden.org`) || Host(`dozzle.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.services.dozzle.loadbalancer.server.port: "8080"
  labels:
    io.kompose.service: dozzle
  name: dozzle
spec:
  ports:
    - name: "8080"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: dozzle
