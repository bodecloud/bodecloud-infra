    traefik.http.routers.gptr.service: gptr
    traefik.http.services.gptr-legacy.loadbalancer.server.port: "8000"
    traefik.http.services.gptr.loadbalancer.server.port: "3000"
  labels:
    io.kompose.service: warp2
  name: warp2
