    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.gptr-legacy.rule: Host(`gptr-legacy.bolabaden.org`) || Host(`gptr-legacy.bolabaden.duckdns.org`) || Host(`gptr-legacy.micklethefickle.duckdns.org`) || Host(`gptr-legacy.micklethefickle.bolabaden.org`) || Host(`gptr-legacy.micklethefickle.bolabaden`)
