apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f compose/docker-compose.networks-inline.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: gluetun-premiumize-us
  name: gluetun-premiumize-us
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gluetun-premiumize-us
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f compose/docker-compose.networks-inline.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.service: gluetun-premiumize-us
    spec:
      containers:
        - env:
            - name: DNS_ADDRESS
              value: 127.0.0.1
            - name: DOT_IPV6
              value: "off"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.76.0.0/16,172.17.0.0/16,100.72.149.123/32
            - name: OPENVPN_CIPHERS
              value: AES-256-CBC
            - name: OPENVPN_CUSTOM_CONFIG
              value: /etc/openvpn/target.ovpn
            - name: OPENVPN_FLAGS
              value: --auth-user-pass /config/auth.conf
            - name: OPENVPN_IPV6
              value: "off"
            - name: VERSION_INFORMATION
              value: "on"
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: openvpn
          image: ghcr.io/qdm12/gluetun
          name: gluetun-premiumize-us
          ports:
            - containerPort: 8000
              protocol: TCP
            - containerPort: 8001
              protocol: TCP
            - containerPort: 9999
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - mountPath: /config/auth.conf
              name: premiumize-auth
              subPath: auth.conf
            - mountPath: /etc/openvpn/premiumize-ca.pem
              name: premiumize-ca
              subPath: premiumize-ca.pem
            - mountPath: /etc/openvpn/target.ovpn
              name: vpn-us.premiumize.me
              subPath: target.ovpn
      restartPolicy: Always
      volumes:
        - configMap:
            defaultMode: 384
            items:
              - key: auth.conf
                path: auth.conf
            name: premiumize-auth
          name: premiumize-auth
        - configMap:
            defaultMode: 384
            items:
              - key: premiumize-ca.pem
                path: premiumize-ca.pem
            name: premiumize-ca
          name: premiumize-ca
        - configMap:
            defaultMode: 384
            items:
              - key: target.ovpn
                path: target.ovpn
            name: vpn-us.premiumize.me
          name: vpn-us.premiumize.me
