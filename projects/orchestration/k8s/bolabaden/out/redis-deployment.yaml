apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.redis.middlewares: nginx-auth@file
    traefik.http.routers.redis.rule: Host(`redis.bolabaden.org`) || Host(`redis.bolabaden.duckdns.org`) || Host(`redis.micklethefickle.duckdns.org`)
    traefik.http.services.redis.loadbalancer.server.port: "6379"
  labels:
    io.kompose.service: redis
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: redis
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.redis.middlewares: nginx-auth@file
        traefik.http.routers.redis.rule: Host(`redis.bolabaden.org`) || Host(`redis.bolabaden.duckdns.org`) || Host(`redis.micklethefickle.duckdns.org`)
        traefik.http.services.redis.loadbalancer.server.port: "6379"
      labels:
        io.kompose.service: redis
    spec:
      containers:
        - args:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1"
          image: redis:latest
          livenessProbe:
            exec:
              command:
                - redis-cli ping > /dev/null 2>&1 || exit 1
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 5
          name: redis
          ports:
            - containerPort: 6379
              protocol: TCP
      hostname: redis
      restartPolicy: Always
