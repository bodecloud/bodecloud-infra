apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.mongodb.middlewares: nginx-auth@file
    traefik.http.routers.mongodb.rule: Host(`mongodb.bolabaden.org`) || Host(`mongodb.bolabaden.duckdns.org`) || Host(`mongodb.micklethefickle.duckdns.org`)
    traefik.http.services.mongodb.loadbalancer.server.port: "27017"
  labels:
    io.kompose.service: mongodb
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mongodb
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.mongodb.middlewares: nginx-auth@file
        traefik.http.routers.mongodb.rule: Host(`mongodb.bolabaden.org`) || Host(`mongodb.bolabaden.duckdns.org`) || Host(`mongodb.micklethefickle.duckdns.org`)
        traefik.http.services.mongodb.loadbalancer.server.port: "27017"
      labels:
        io.kompose.service: mongodb
    spec:
      containers:
        - env:
            - name: PGID
              value: "988"
            - name: PUID
              value: "1001"
            - name: TZ
              value: America/Chicago
            - name: UMASK
              value: "002"
          image: mongo:latest
          livenessProbe:
            exec:
              command:
                - mongosh 127.0.0.1:27017/test --quiet --eval 'db.runCommand("ping").ok' > /dev/null 2>&1 || exit 1
            failureThreshold: 5
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 10
          name: mongodb
          ports:
            - containerPort: 27017
              protocol: TCP
      hostname: mongodb
      restartPolicy: Always
