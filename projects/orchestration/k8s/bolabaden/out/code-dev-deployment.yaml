apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deunhealth.restart.on.unhealthy: "true"
    kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
    traefik.enable: "true"
    traefik.http.routers.code-dev.middlewares: nginx-auth@file
    traefik.http.routers.code-dev.rule: Host(`code-dev.bolabaden.org`) || Host(`code-dev.bolabaden.duckdns.org`) || Host(`code-dev.micklethefickle.duckdns.org`) || Host(`code-dev.micklethefickle.bolabaden.org`) || Host(`code-dev.micklethefickle.bolabaden.duckdns.org`)
    traefik.http.services.code-dev.loadbalancer.server.port: "8443"
  labels:
    io.kompose.service: code-dev
  name: code-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: code-dev
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        deunhealth.restart.on.unhealthy: "true"
        kompose.cmd: kompose -f docker-compose.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
        traefik.enable: "true"
        traefik.http.routers.code-dev.middlewares: nginx-auth@file
        traefik.http.routers.code-dev.rule: Host(`code-dev.bolabaden.org`) || Host(`code-dev.bolabaden.duckdns.org`) || Host(`code-dev.micklethefickle.duckdns.org`) || Host(`code-dev.micklethefickle.bolabaden.org`) || Host(`code-dev.micklethefickle.bolabaden.duckdns.org`)
        traefik.http.services.code-dev.loadbalancer.server.port: "8443"
      labels:
        io.kompose.service: code-dev
    spec:
      containers:
        - env:
            - name: CODESERVER_DEFAULT_WORKSPACE
              value: /workspace
            - name: CODESERVER_PASSWORD
              value: ubuntu
            - name: CODESERVER_SUDO_PASSWORD
              value: h4L0m4St3R327
            - name: DEFAULT_WORKSPACE
              value: /workspace
            - name: PASSWORD
              value: ubuntu
            - name: PGID
              value: "988"
            - name: PUID
              value: "1001"
            - name: SUDO_PASSWORD
              value: h4L0m4St3R327
            - name: TZ
              value: America/Chicago
            - name: UMASK
              value: "002"
          image: linuxserver/code-server:latest
          name: code-dev
          ports:
            - containerPort: 8443
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: code-dev-cm0
            - mountPath: /workspace
              name: code-dev-cm1
      hostname: code-dev
      restartPolicy: Always
      volumes:
        - configMap:
            name: code-dev-cm0
          name: code-dev-cm0
        - configMap:
            name: code-dev-cm1
          name: code-dev-cm1
