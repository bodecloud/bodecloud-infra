apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f compose/docker-compose.networks-inline.yml convert -o k8s/out
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: i2p
  name: i2p
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: i2p
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f compose/docker-compose.networks-inline.yml convert -o k8s/out
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.service: i2p
    spec:
      containers:
        - env:
            - name: EXT_PORT
              value: "7661"
          image: ghcr.io/purplei2p/i2pd
          name: i2p
          ports:
            - containerPort: 7658
              protocol: TCP
          volumeMounts:
            - mountPath: /i2p/.i2p
              name: i2p-claim0
            - mountPath: /i2psnark
              name: i2p-claim1
      hostname: i2p
      restartPolicy: Always
      volumes:
        - name: i2p-claim0
          persistentVolumeClaim:
            claimName: i2p-claim0
        - name: i2p-claim1
          persistentVolumeClaim:
            claimName: i2p-claim1
