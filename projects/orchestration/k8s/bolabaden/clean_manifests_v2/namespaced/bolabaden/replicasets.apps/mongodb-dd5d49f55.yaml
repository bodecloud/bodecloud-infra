apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: mongodb
    pod-template-hash: dd5d49f55
  name: mongodb-dd5d49f55
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
      pod-template-hash: dd5d49f55
  template:
    metadata:
      labels:
        app: mongodb
        pod-template-hash: dd5d49f55
    spec:
      containers:
      - args:
        - --bind_ip_all
        command:
        - mongod
        env:
        - name: PGID
          value: "988"
        - name: PUID
          value: "1001"
        - name: TZ
          value: America/Chicago
        - name: UMASK
          value: "002"
        image: mongo:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mongosh 127.0.0.1:27017/test --quiet --eval 'db.runCommand("ping").ok'
              > /dev/null 2>&1 || exit 1
          failureThreshold: 5
          initialDelaySeconds: 40
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        name: mongodb
        ports:
        - containerPort: 27017
          name: mongodb-27017
          protocol: TCP
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data/db
          name: data-db
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/mongodb/data
          type: ""
        name: data-db
  availableReplicas: 1
  fullyLabeledReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
