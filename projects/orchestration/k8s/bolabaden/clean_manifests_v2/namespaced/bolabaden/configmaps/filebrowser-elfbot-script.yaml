      get replicationsource $RS --template=\\\\{\\\\{.status.lastManualSync}})\\n
      \                   \\n                    # Print progress and wait for 10
      seconds\\n                    echo -n '\U0001F4BE'\\n                    sleep
      10\\n                done\\n\\n                if [ \\\"$LAST_MANUAL_SYNC\\\"
      == \\\"$MANUAL\\\" ]; then\\n                    echo \\\"✅ Done!\\\"\\n                fi\\n\\n
      \           done\\n            exit 0\\n        fi\\n\\n        if [[ \\\"$2\\\"
      == \\\"all\\\" ]]; then\\n            APPS=$(ls /storage/config)\\n            echo
      \\\"Backing up multiple apps, restarting each with a 1 min delay, this may take
      a while...\\\"\\n            SLEEP=1m\\n        else\\n            APPS=$2 #
      if we're just backing up one app\\n            SLEEP=0s\\n        fi  \\n\\n
      \       for APP in $APPS\\n        do\\n            if [[ \\\"$APP\\\" == \\\"filebrowser\\\"
      ]]; then\\n                echo \\\"skipping filebrowser (we're using it right
      now!)...\\\"\\n            else\\n                FREE_SPACE=$(df -P /storage/backup
      | awk 'NR==2 {print $4}')\\n                NEEDED_SPACE=$(du -s /storage/config/$APP
      | cut -f1)\\n\\n                if [[ \\\"$FREE_SPACE\\\" -lt \\\"$NEEDED_SPACE\\\"
      ]]; then\\n                    echo \\\"Error - not enough free space for backup.
      We need $NEEDED_SPACE bytes, but we only have $FREE_SPACE remaining :(\\\"\\n
      \               else\\n                    TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\\\\n'
      -1)\\n                    echo backup \\u003e /elfbot/$APP\\n                    echo
      \\\"restarting $APP, backup will be saved as /storage/backup/$APP-$TIMESTAMP
      ...\\\"\\n                    sleep $SLEEP\\n                fi\\n            fi\\n
      \       done\\n        ;;       \\n\\n    \\\"claim\\\")\\n        if [[ \\\"$#\\\"
      -lt 3 ]]; then  \\n            echo plex claim token missing, get one from https://www.plex.tv/claim/\\n
      \           exit 1\\n        fi       \\n        if [[ ! \\\"$3\\\" =~ \\\"claim-\\\"
      ]]; then  \\n            echo plex claim token invalid, get one from https://www.plex.tv/claim/\\n
      \           exit 1\\n        fi   \\n        if [[ \\\"$2\\\" = \\\"plex\\\"
      ]]; then\\n\\n            echo \\\"Attempting to claim Plex with claim [$3],
      and triggering a restart...\\\"\\n            echo PLEX_CLAIM=$3 \\u003e /elfbot/plex\\n
      \       else\\n            echo \\\"this command is only for claiming plex\\\"\\n
      \       fi\\n        ;;     \\n\\n    \\\"recyclarr\\\")\\n\\n        if [[
      \\\"$#\\\" -lt 2 ]]; then\\n            # Just echo the recyclarr options\\n
      \           recyclarr\\n            exit 0\\n        fi\\n\\n        echo \\\"This
      may take a while...\\\"\\n        HOME=/storage/config/recyclarr/ RECYCLARR_APP_DATA=/storage/config/recyclarr/
      $@\\n        ;;                          \\n\\n    \\\"blackhole\\\")\\n\\n
      \       if [[ \\\"$#\\\" -lt 2 ]]; then\\n            echo \\\"ERROR: target
      missing - example : 'elfbot blackhole radarr'\\\"\\n            exit 1\\n        fi\\n
      \       ITEMPATH=\\\"$(pwd)\\\"\\n\\n        # Never symlink ourselves!\\n        if
      [[ $ITEMPATH == *\\\"/storage/symlinks\\\"* ]]; then\\n            echo \\\"ERROR:
      Can't symlink a source in /storage/symlinks (#deathbysymlink)\\\"\\n            exit
      1\\n        fi\\n\\n        # Get ready to create symlinks\\n\\n        TARGET=/storage/symlinks/blackhole/$2\\n
      \       CACHE=/storage/symlinks/blackhole/.symlink_cache\\n\\n        echo \\\"Symlinking
      new items in $ITEMPATH to $TARGET... \\\"\\n        mkdir -p $TARGET\\n        mkdir
      -p $CACHE\\n\\n        ls \\\"${ITEMPATH}/\\\" | while read -r ITEM\\n        do\\n
      \           # symlink to target only if cache doesn't already exist\\n            #
      so that if a user moves a file out of the TARGET folder while importing, we
      don't recreate it\\n            ln -s \\\"${ITEMPATH}/${ITEM}\\\" \\\"$CACHE/\\\"
      2\\u003e /dev/null\\n            if [[ $? -eq 0 ]]; then\\n                cp
      -rs \\\"${ITEMPATH}/${ITEM}\\\" \\\"$TARGET/\\\" 2\\u003e /dev/null\\n            echo
      \\\"[created symlink] $TARGET/${ITEM}\\\"\\n            else\\n            echo
      \\\"[already exists, skipped] $CACHE/${DIR}${ITEM}\\\"\\n            fi\\n        done\\n\\n
      \       echo \\\"Done! \U0001F389\\\"\\n\\n        ;;\\n\\n    \\\"elfstorage\\\")\\n\\n
      \       if [[ \\\"$2\\\" == \\\"report\\\" ]]; then\\n            TIMESTAMP=$(printf
      '%(%Y-%m-%d--%H-%M)T\\\\n' -1)\\n            echo \\\"Generating elfstorage
      report, this may take ~5 min...\\\"\\n\\n            tree --du -hF -s  /storage/elfstorage/
