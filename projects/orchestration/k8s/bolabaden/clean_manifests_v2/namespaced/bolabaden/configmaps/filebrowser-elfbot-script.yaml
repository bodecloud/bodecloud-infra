      /storage/symlinks/blackhole/\\u003capp\\u003e/ for automated import\\\"\\n    echo
      \\\"elfbot symlink \\u003cstorage-mount\\u003e                : import remotely-mounted,
      read-only media as symlinks, or generate a report\\\"\\n    echo \\\"elfbot
      symlink report-broken                  : generate a report on all broken symlinks
      found under /storage/symlinks\\\"\\n    echo \\\"elfbot symlink delete-broken
      \                 : delete (without confirmation!) all broken symlinks found
      under /storage/symlinks\\\"\\n    # echo \\\"elfbot recyclarr \\u003ccommand\\u003e
      \                   : run recyclarr (using config files in /storage/filebrowser/recyclarr)\\\"
      \\n\\n    echo\\nfi\\n\\ncase $1 in\\n\\n    \\\"restart\\\")\\n\\n        if
      [[ \\\"$3\\\" == \\\"--force\\\" \\u0026\\u0026 \\\"$4\\\" != \\\"--yesiamsure\\\"
      ]]; then\\n            echo force-killing a healthy pod can result in data loss!
      add \\\\'--yesiamsure\\\\' after your restart --force command to force-kill\\n
      \           exit 1\\n        elif [[ \\\"$3\\\" == \\\"--force\\\" ]]; then\\n
      \           echo \\\"force-restarting $2, data loss may occur (but sometimes
      there's no other way)...\\\"\\n            echo forcerestart \\u003e /elfbot/$2\\n
      \       else             \\n            echo \\\"restarting $2...\\\"\\n            echo
      restart \\u003e /elfbot/$2\\n        fi\\n        ;;\\n\\n    \\\"pause\\\")\\n\\n
      \       echo \\\"pausing $2 for 5 min...\\\"\\n        echo pause \\u003e /elfbot/$2\\n
      \       ;;     \\n\\n    \\\"env\\\")\\n\\n        if [[ \\\"$#\\\" -lt 3 ]];
      then  \\n            echo syntax is \\\"elfbot env \\u003capp\\u003e KEY=VALUE\\\"\\n
      \           exit 1\\n        fi\\n        echo \\\"adding $3 to env for $2,
      triggering a restart...\\\"\\n        echo $3 \\u003e /elfbot/$2\\n        ;;
      \                       \\n\\n    \\\"reset\\\")\\n\\n        if [[ \\\"$3\\\"
      != \\\"--yesiamsure\\\" ]]; then\\n            echo potentially dangerous! add
      \\\\'--yesiamsure\\\\' after your reset command to force\\n            exit
      1\\n        fi\\n        if [[ \\\"$2\\\" == \\\"all\\\" ]]; then\\n\\n            echo
      \\\"This command will irrecoverably reset ALL of your app's data. If you didn't
      mean to do this, hit CTRL-C within the next 10s to abort..\\\"\\n            sleep
      10s\\n            # Get all pods in the current namespace\\n            pods=$(kubectl
      get pods -o jsonpath='{.items[*].metadata.name}')\\n\\n            # Iterate
      through each pod, find their labels, and use these to trigger a reset\\n            for
      pod in $pods; do\\n            # Extract the value of the 'app.elfhosted.com/name'
      label\\n            elfhosted_label=$(kubectl get pod $pod -o jsonpath='{.metadata.labels.app\\\\.elfhosted\\\\.com/name}'
      2\\u003e/dev/null)\\n            \\n            if [[ -z \\\"$elfhosted_label\\\"
      ]]; then\\n\\n                # If 'app.elfhosted.com/name' doesn't exist, extract
      'app.kubernetes.io/name' instead\\n                kubernetes_label=$(kubectl
      get pod $pod -o jsonpath='{.metadata.labels.app\\\\.kubernetes\\\\.io/name}'
      2\\u003e/dev/null)\\n\\n                # provided a label was found...\\n                if
      [[ -z \\\"$kubernetes_label\\\" ]]; then\\n                    echo \\\"resetting
      $kubernetes_label... \U0001F5D1️\\\"\\n                    sleep 5s\\n                    echo
      reset \\u003e /elfbot/$kubernetes_label\\n                fi\\n            elif
      [[ \\\"$elfhosted_label\\\" != \\\"filebrowser\\\" ]]; then\\n                echo
      \\\"resetting $elfhosted_label... \U0001F5D1️\\\"\\n                sleep 5s\\n
      \               echo reset \\u003e /elfbot/$elfhosted_label            \\n            fi\\n
      \           done\\n\\n            exit 0\\n\\n        else               \\n
      \           echo reset \\u003e /elfbot/$2\\n            echo \\\"resetting $2...
      \U0001F5D1️\\\"\\n        fi\\n        ;;\\n\\n    \\\"backup\\\")   \\n\\n
      \       if [[ \\\"$2\\\" == \\\"symlinks\\\" ]]; then\\n            TIMESTAMP=$(printf
      '%(%Y-%m-%d--%H-%M)T\\\\n' -1)\\n            echo \\\"Backing up all symlinks
      to /storage/backup/symlinks-$TIMESTAMP.tar.gz\\\"\\n            tar -C /storage/symlinks
      -czf /storage/backup/symlinks-$TIMESTAMP.tar.gz .\\n            BACKUP_SIZE=$(du
      -sh /storage/backup/symlinks-$TIMESTAMP.tar.gz | awk '{print $1}')\\n            echo
      \\\"Done! (yes, it really was that fast!) - total size \U0001F52C $BACKUP_SIZE
      \\\"\\n            exit 0\\n        fi\\n\\n        if [[ \\\"$2\\\" == \\\"offsite\\\"
      ]]; then\\n            for RS in $(kubectl get replicationsource -o=name | cut
      -f2 -d/); do\\n\\n                echo \\\"$(date '+%H:%M:%S') Triggering manual
      backup of $RS...\\\"\\n                MANUAL=$(date +%s)\\n                kubectl
      patch replicationsource $RS --type merge -p '{\\\"spec\\\":{\\\"restic\\\":{\\\"unlock\\\":\\\"'$MANUAL'\\\"}}}'
      \\u003e /dev/null 2\\u003e\\u00261 \\u0026\\n                kubectl patch replicationsource
      $RS --type merge -p '{\\\"spec\\\":{\\\"trigger\\\":{\\\"manual\\\":\\\"'$MANUAL'\\\"}}}'
      \\u003e /dev/null 2\\u003e\\u00261 \\u0026\\n\\n                LAST_MANUAL_SYNC=\\\"\\\"\\n\\n
      \               while [ \\\"$LAST_MANUAL_SYNC\\\" != \\\"$MANUAL\\\" ]; do\\n
