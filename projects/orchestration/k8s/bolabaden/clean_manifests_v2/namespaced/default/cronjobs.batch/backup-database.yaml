apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"labels":{"app.kubernetes.io/component":"cronjob","app.kubernetes.io/instance":"myprecious","app.kubernetes.io/name":"backup-database"},"name":"backup-database","namespace":"default"},"spec":{"jobTemplate":{"spec":{"template":{"spec":{"containers":[{"args":["-c","pg_dumpall -h postgresql -U postgres \u003e /backup/database-$(date +%Y%m%d-%H%M%S).sql"],"command":["/bin/bash"],"image":"postgres:15-alpine","name":"backup-database","resources":{"limits":{"cpu":"500m","memory":"1Gi"},"requests":{"cpu":"100m","memory":"256Mi"}}}],"restartPolicy":"OnFailure"}}}},"schedule":"0 3 * * *"}}
  labels:
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/instance: myprecious
    app.kubernetes.io/name: backup-database
  name: backup-database
  namespace: default
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
    spec:
      template:
        metadata:
        spec:
          containers:
          - args:
            - -c
            - pg_dumpall -h postgresql -U postgres > /backup/database-$(date +%Y%m%d-%H%M%S).sql
            command:
            - /bin/bash
            image: postgres:15-alpine
            imagePullPolicy: IfNotPresent
            name: backup-database
            resources:
              limits:
                cpu: 500m
                memory: 1Gi
              requests:
                cpu: 100m
                memory: 256Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
  schedule: 0 3 * * *
  successfulJobsHistoryLimit: 3
  suspend: false
