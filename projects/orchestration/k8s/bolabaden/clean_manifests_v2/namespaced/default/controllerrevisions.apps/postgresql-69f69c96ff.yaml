apiVersion: apps/v1
data:
  spec:
    template:
      $patch: replace
      metadata:
        labels:
          app.elfhosted.com/name: postgresql
          app.kubernetes.io/instance: myprecious
          app.kubernetes.io/name: postgresql
      spec:
        containers:
        - env:
          - name: POSTGRES_DB
            value: myprecious
          - name: POSTGRES_USER
            value: postgres
          - name: POSTGRES_PASSWORD
            value: your-postgres-password
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            tcpSocket:
              port: 5432
            timeoutSeconds: 10
          name: postgresql
          ports:
          - containerPort: 5432
            name: main
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 5432
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /var/lib/postgresql/data
            name: postgresql-data
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
