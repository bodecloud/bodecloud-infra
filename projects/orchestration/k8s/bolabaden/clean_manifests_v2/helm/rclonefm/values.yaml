# Default values for rclonefm
# This is a YAML-formatted file.

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "local-path"

# RcloneFM application image configuration
image:
  repository: ghcr.io/elfhosted/rclonefm
  tag: "latest"
  pullPolicy: IfNotPresent

# Ubuntu image for bootstrap
ubuntu:
  image:
    repository: ubuntu
    tag: "20.04"
    pullPolicy: IfNotPresent

# Number of replicas
replicaCount: 1

# Service account
serviceAccount:
  create: false
  name: "default"
  automount: false
  annotations: {}

# Security context for the pod
securityContext:
  runAsUser: 568
  runAsGroup: 568
  fsGroup: 568
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Container security contexts
containerSecurityContext:
  rclonefm:
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
      
  bootstrap:
    capabilities:
      drop:
        - ALL
    runAsUser: 568
    runAsGroup: 568
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

# Environment variables from ConfigMaps
envFrom:
  - configMapRef:
      name: rclonefm-env
  - configMapRef:
      name: elfbot-rclonefm
      optional: true

# Resources for containers
resources:
  rclonefm:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: "0"
      memory: 64Mi
      
  bootstrap:
    limits:
      cpu: "1"
      memory: 4Gi
    requests:
      cpu: "0"
      memory: 1Mi

# Service configuration
service:
  type: ClusterIP
  port: 5572
  targetPort: 5572
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rclonefm.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Persistence configuration
persistence:
  backup:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    
  config:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    
  rclone:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    
  symlinks:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    
  realdebridZurg:
    enabled: true
    size: 100Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}

# ConfigMaps configuration
configMaps:
  rclonefmEnv:
    enabled: true
    data: {}
    
  elfbotRclonefm:
    enabled: true
    data: {}
    
  rclonefmConfig:
    enabled: true
    data:
      rclone.conf: |
        # Rclone configuration
        # Add your remote configurations here
        
      config.json: |
        {
          "listen": ":5572",
          "serve": "http",
          "user": "",
          "pass": "",
          "realm": "rclone",
          "htpasswd": "",
          "ssl_cert": "",
          "ssl_key": "",
          "client_ca": "",
          "htpasswd": "",
          "template": ""
        }

# Bootstrap configuration
bootstrap:
  enabled: true
  env:
    S3_ENDPOINT_URL: "https://s3.us-west-000.backblazeb2.com"
  secretRefs:
    - name: b2-elfhosted-config-ro
      keys:
        - access-key-id
        - secret-key

# Health probes
livenessProbe:
  tcpSocket:
    port: 5572
  timeoutSeconds: 1
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 5572
  timeoutSeconds: 1
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  tcpSocket:
    port: 5572
  timeoutSeconds: 1
  periodSeconds: 5
  successThreshold: 1
  failureThreshold: 30

# Node selector and affinity
nodeSelector: {}

affinity: {}

tolerations: []

# Priority class
priorityClassName: "tenant-normal"

# Annotations for configmap reloader
annotations:
  configmap.reloader.stakater.com/reload: "elfbot-all,elfbot-rclonefm,rclonefm-config"
  kubernetes.io/egress-bandwidth: "40M"

# Enable service links
enableServiceLinks: false

# Deployment strategy
strategy:
  type: Recreate

# Revision history limit
revisionHistoryLimit: 3

# Progress deadline
progressDeadlineSeconds: 600

# Volume configuration
volumes:
  cache:
    enabled: true
    sizeLimit: "1Gi"
  tmp:
    enabled: true

# RcloneFM specific configuration
rclonefm:
  # Configuration file path
  configPath: "/config/rclone"
  
  # Port
  port: 5572
  
  # Host
  host: "0.0.0.0"
  
  # Remote storage path
  remoteStoragePath: "/rclone-remote-storage" 