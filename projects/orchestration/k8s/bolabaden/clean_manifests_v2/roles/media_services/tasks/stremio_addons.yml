---
- name: Deploy Comet addon
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: comet
        namespace: my-media-stack
        labels:
          app: comet
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: comet
        template:
          metadata:
            labels:
              app: comet
          spec:
            containers:
              - name: comet
                image: g0ldyy/comet:latest
                ports:
                  - containerPort: 8000
                env:
                  - name: FASTAPI_HOST
                    value: "0.0.0.0"
                  - name: FASTAPI_PORT
                    value: "8000"
                resources:
                  requests:
                    memory: 256Mi
                    cpu: 100m
                  limits:
                    memory: 512Mi
                    cpu: 500m
  when: media_stack.services.comet

- name: Create Comet service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: comet
        namespace: my-media-stack
      spec:
        selector:
          app: comet
        ports:
          - port: 8000
            targetPort: 8000
  when: media_stack.services.comet

- name: Deploy AIOStreams addon
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: aiostreams
        namespace: my-media-stack
        labels:
          app: aiostreams
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: aiostreams
        template:
          metadata:
            labels:
              app: aiostreams
          spec:
            containers:
              - name: aiostreams
                image: ghcr.io/aiostreams/aiostreams:latest
                ports:
                  - containerPort: 8080
                env:
                  - name: PORT
                    value: "8080"
                resources:
                  requests:
                    memory: 256Mi
                    cpu: 100m
                  limits:
                    memory: 512Mi
                    cpu: 500m
  when: media_stack.services.aiostreams

- name: Create AIOStreams service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: aiostreams
        namespace: my-media-stack
      spec:
        selector:
          app: aiostreams
        ports:
          - port: 8080
            targetPort: 8080
  when: media_stack.services.aiostreams

- name: Deploy MediaFusion addon
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mediafusion
        namespace: my-media-stack
        labels:
          app: mediafusion
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: mediafusion
        template:
          metadata:
            labels:
              app: mediafusion
          spec:
            containers:
              - name: mediafusion
                image: mhdzumair/mediafusion:latest
                ports:
                  - containerPort: 8000
                env:
                  - name: HOST
                    value: "0.0.0.0"
                  - name: PORT
                    value: "8000"
                resources:
                  requests:
                    memory: 512Mi
                    cpu: 200m
                  limits:
                    memory: 1Gi
                    cpu: 1000m
  when: media_stack.services.mediafusion

- name: Create MediaFusion service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: mediafusion
        namespace: my-media-stack
      spec:
        selector:
          app: mediafusion
        ports:
          - port: 8000
            targetPort: 8000
  when: media_stack.services.mediafusion

- name: Deploy Stremio Jackett addon
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stremio-jackett
        namespace: my-media-stack
        labels:
          app: stremio-jackett
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: stremio-jackett
        template:
          metadata:
            labels:
              app: stremio-jackett
          spec:
            containers:
              - name: stremio-jackett
                image: sleeyax/stremio-jackett-addon:latest
                ports:
                  - containerPort: 7000
                env:
                  - name: PORT
                    value: "7000"
                  - name: JACKETT_URL
                    value: "http://jackett.my-media-stack.svc.cluster.local:9117"
                resources:
                  requests:
                    memory: 128Mi
                    cpu: 50m
                  limits:
                    memory: 256Mi
                    cpu: 200m
  when: media_stack.services.stremio_jackett

- name: Create Stremio Jackett service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: stremio-jackett
        namespace: my-media-stack
      spec:
        selector:
          app: stremio-jackett
        ports:
          - port: 7000
            targetPort: 7000
  when: media_stack.services.stremio_jackett
