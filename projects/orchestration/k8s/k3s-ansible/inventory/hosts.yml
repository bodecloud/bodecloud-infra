---
# Standard k3s-ansible inventory file
k3s_cluster:
  children:
    server:
      hosts:
        beatapostapita:
          ansible_host: "100.99.45.35"
          external_ip: "207.211.189.95"
          node_labels:
            - "node-role.kubernetes.io/master=true"
            - "node-role.kubernetes.io/control-plane=true"

    agent:
      hosts:
        baden:
          ansible_host: "100.93.120.11"
          node_labels:
            - "node-role.kubernetes.io/worker=true"

        cloudserver:
          ansible_host: "100.95.154.8"
          node_labels:
            - "node-role.kubernetes.io/worker=true"

        micklethefickle:
          ansible_host: "100.125.162.37"
          node_labels:
            - "node-role.kubernetes.io/worker=true"

        wizard-pc:
          ansible_host: "100.74.62.44"
          node_labels:
            - "node-role.kubernetes.io/worker=true"

  vars:
    # Ansible configuration
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_python_interpreter: /usr/bin/python3

    # K3s version
    k3s_version: "v1.33.0+k3s1"

    # Optional settings - generate one with: openssl rand -hex 32
    # If not specified, k3s-ansible will auto-generate one
    # k3s_token: "e96353e53c085c131e7f7d7d7e0845bf4895519a7e1899aebc5b3c6a40c6ff6a"

    # Network configuration
    k3s_flannel_backend: "vxlan"
    k3s_cluster_cidr: "10.42.0.0/16"
    k3s_service_cidr: "10.43.0.0/16"
    k3s_cluster_dns: "10.43.0.10"

    # Optional: External database configuration (when using HA with external database)
    # use_external_database: false
    # datastore_endpoint: ""

    # K3s server config options
    k3s_server_args:
      - "--disable=traefik" # We'll install our own ingress
      - "--disable=servicelb" # We'll use metallb instead
      - "--flannel-backend={{ k3s_flannel_backend }}"
      - "--cluster-cidr={{ k3s_cluster_cidr }}"
      - "--service-cidr={{ k3s_service_cidr }}"
      - "--cluster-dns={{ k3s_cluster_dns }}"
      - "--write-kubeconfig-mode=644"

    # Storage paths (can be updated to match your environment)
    config_path: "/home/ubuntu/my-media-stack/configs"
    data_path: "/home/ubuntu/my-media-stack/data"
    secrets_path: "/home/ubuntu/my-media-stack/secrets"
