  deunhealth:
    # 🔹🔹 DeUnhealth 🔹🔹
    # Restart unhealthy containers marked with `deunhealth.restart.on.unhealthy=true` label
    # Receive Docker events as stream instead of polling periodically
    # Doesn't need network! (more secure)
    # Compatible with amd64, 386, arm64, arm32v7, arm32v6, ppc64le, s390x and riscv64 CPU architectures
    # Since Docker is written in Go, the program is also written in Go and uses the official Docker Go API⁠
    # https://hub.docker.com/r/qmcgaw/deunhealth/tags  https://hub.docker.com/r/qmcgaw/deunhealth
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env # for TZ env var.
      LOG_LEVEL: ${DEUNHEALTH_LOG_LEVEL:-debug} # debug, info, warning, error
      HEALTH_SERVER_ADDRESS: ${DEUNHEALTH_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999} # Internal health http server listening address. Nothing to do with restarting unhealthy containers.
    restart: always

  dozzle:
    # 🔹🔹 Dozzle 🔹🔹
    image: amir20/dozzle
    container_name: dozzle
    hostname: dozzle
    networks:
      - publicnet
#    ports:
#      - ${DOZZLE_PORT:-9997}:8080
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
    <<: [*common-logging, *resource-limits]
    labels:
      traefik.enable: "true"
      traefik.http.routers.dozzle.rule: Host(`dozzle.${DOMAIN}`) || Host(`dozzle.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.dozzle.loadbalancer.server.port: 8080
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN}/
      homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    restart: always

  flaresolverr:
    # 🔹🔹 Flaresolverr 🔹🔹  # https://github.com/flaresolverr/flaresolverr
    #image: ghcr.io/flaresolverr/flaresolverr
    image: ghcr.io/thephaseless/byparr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    networks:
      publicnet:
        ipv4_address: ${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}
    expose:
      - ${FLARESOLVERR_PORT:-8191}
    <<: *common-logging
    environment:
      <<: *common-env
      # FlareSolverr Environment Variables
      # Verbosity of the logging. Use LOG_LEVEL=debug for more information.
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      # Only for debugging. If true all HTML that passes through the proxy will be logged to the console in debug level.
      LOG_HTML: ${FLARESOLVERR_LOG_HTML:-false}
      # Captcha solving method. It is used when a captcha is encountered.
      # Note: none of the captcha solvers work with the current version of Flaresolverr.
      CAPTCHA_SOLVER: ${FLARESOLVERR_CAPTCHA_SOLVER:-none}
      # Listening port. You don't need to change this if you are running on Docker.
      PORT: ${FLARESOLVERR_PORT:-8191}
      # Listening interface. You don't need to change this if you are running on Docker.
      HOST: ${FLARESOLVERR_HOST:-0.0.0.0}
      # Only for debugging. To run the web browser in headless mode or visible.
      HEADLESS: ${FLARESOLVERR_HEADLESS:-true}
      # If you are experiencing errors/timeouts because your system is slow, you can try to increase this value.
      BROWSER_TIMEOUT: ${FLARESOLVERR_BROWSER_TIMEOUT:-120000}
      # FlareSolverr makes a request on start to make sure the web browser is working.
      TEST_URL: ${FLARESOLVERR_TEST_URL:-https://www.google.com}
      # Enable Prometheus exporter
      PROMETHEUS_ENABLED: ${FLARESOLVERR_PROMETHEUS_ENABLED:-true}
      # Listening port for Prometheus exporter
      PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
#    labels:
#      traefik.enable: "true"
#      traefik.http.routers.flaresolverr.rule: Host(`flaresolverr.${DOMAIN}`) || Host( `flaresolverr.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/flaresolverr`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/flaresolverr`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/flaresolverr`))
#      traefik.http.services.flaresolverr.loadbalancer.server.port: 8191
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${FLARESOLVERR_PORT:-8191}/health || exit 1"]
      interval: ${FLARESOLVERR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${FLARESOLVERR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${FLARESOLVERR_HEALTHCHECK_RETRIES:-3}
      start_period: ${FLARESOLVERR_HEALTHCHECK_START_PERIOD:-60s}
    restart: always

