  gotify:
    image: ghcr.io/gotify/server
    container_name: gotify
    hostname: gotify
    networks:
      - gotify-network
#    ports:
#      - "${GOTIFY_EXTERNAL_PORT:-8075}:${GOTIFY_SERVER_PORT:-80}" # Maps the container port to host port
    volumes:
      - ${CONFIG_PATH:-./configs}/gotify/data:/app/data # For persistent storage
    environment:
      - GOTIFY_SERVER_PORT=${GOTIFY_SERVER_PORT:-80} # Matches GOTIFY_SERVER_EXPOSE from build args
      - TZ=${TZ:-America/Chicago} # Timezone setting, adjust as needed
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${GOTIFY_SERVER_PORT:-80}/health"]
      interval: ${GOTIFY_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${GOTIFY_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${GOTIFY_HEALTHCHECK_RETRIES:-3}
    labels:
      traefik.enable: "true"
      traefik.http.routers.gotify.rule: Host(`gotify.${DOMAIN}`) || Host(`gotify.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.gotify.loadbalancer.server.port: ${GOTIFY_SERVER_PORT:-80}
      homepage.group: Notifications
      homepage.name: Gotify
      homepage.icon: gotify.png
      homepage.href: https://gotify.${DOMAIN}
      homepage.description: Gotify is a simple server for sending and receiving messages, notifications, and events.
      homepage.weight: 1
      homepage.widget.type: gotify
      homepage.widget.url: https://gotify.${DOMAIN}
      homepage.widget.key: ${GOTIFY_CLIENT_TOKEN}
    restart: always

  homepage:
    # 🔹🔹 Homepage 🔹🔹  # https://github.com/gethomepage/homepage
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    hostname: homepage
    networks:
      - publicnet
#    ports:
#      - ${HOMEPAGE_PORT:-3000}:3000
    volumes:
      # DO NOT create a bind mount to the entire /app/public/ directory.
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
      - ${CONFIG_PATH:-./configs}/homepage:/app/config
    <<: [*common-logging, *resource-limits]
    environment:
      TZ: ${TZ:-America/Chicago}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-*}
      HOMEPAGE_VAR_TITLE: ${HOMEPAGE_VAR_TITLE:-Bolabaden}
      HOMEPAGE_VAR_SEARCH_PROVIDER: ${HOMEPAGE_VAR_SEARCH_PROVIDER:-google}
      HOMEPAGE_VAR_HEADER_STYLE: ${HOMEPAGE_VAR_HEADER_STYLE:-}
      HOMEPAGE_VAR_WEATHER_CITY: ${HOMEPAGE_VAR_WEATHER_CITY:-Chicago}
      HOMEPAGE_VAR_WEATHER_LAT: ${HOMEPAGE_VAR_WEATHER_LAT:-41.8781}
      HOMEPAGE_VAR_WEATHER_LONG: ${HOMEPAGE_VAR_WEATHER_LONG:--87.6298}
      #      HOMEPAGE_VAR_WEATHER_TIME: ${HOMEPAGE_VAR_WEATHER_TIME:-}
      HOMEPAGE_VAR_WEATHER_UNIT: ${HOMEPAGE_VAR_WEATHER_UNIT:-fahrenheit}
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.rule: Host(`homepage.${DOMAIN}`) || Host(`homepage.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/homepage`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/homepage`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/homepage`))
      traefik.http.services.homepage.loadbalancer.server.port: 3000
    restart: always

  jackett:
    # 🔹🔹 Jackett 🔹🔹
    depends_on:
      flaresolverr:
        condition: service_healthy
      gluetun-premiumize:
        condition: service_healthy
    image: linuxserver/jackett
    container_name: jackett
    network_mode: service:gluetun-premiumize
    <<: [*common-uidgid, *common-logging, *resource-limits]
    volumes:
      - ${CONFIG_PATH:-./configs}/jackett/config:/config
    environment:
      <<: *common-env
    labels:
      homepage.group: Source Aggregator
      homepage.name: Jackett Indexer
      homepage.icon: jackett.png
      homepage.href: https://jackett.${DOMAIN}/
      homepage.description: Connects your download applications with various source providers and indexers, making it easier to find and download content through your download clients.
      homepage.weight: 1
      homepage.widget.type: jackett
      homepage.widget.url: http://gluetun-premiumize:${JACKETT_PORT:-9117}
      homepage.widget.key: ${JACKETT_API_KEY}
    healthcheck:
      test: curl -fs http://127.0.0.1:9117/api/v2.0/indexers/all/results/torznab?t=indexers&apikey=${JACKETT_API_KEY} || exit 1
      interval: ${JACKETT_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${JACKETT_HEALTHCHECK_TIMEOUT:-10s}
      start_period: ${JACKETT_HEALTHCHECK_START_PERIOD:-60s}
