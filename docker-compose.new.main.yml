    labels:
      #traefik.enable: "true"
      #traefik.http.routers.mediaflow-proxy.rule: Host(`mediaflow-proxy.${DOMAIN}`) || Host(`mediaflow-proxy.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      #traefik.http.services.mediaflow-proxy.loadbalancer.server.port: ${MEDIAFLOW_PROXY_PORT:-8888}
      homepage.group: Stremio Addons
      homepage.name: MediaFlow Proxy
      homepage.icon: mediaflow.png
      homepage.href: https://mediaflow-proxy.${DOMAIN}/

  # Multiple DNS challenge provider are not supported with Traefik,
  # but you can use CNAME to handle that. For example, if you have example.org (account foo) and
  # example.com (account bar) you can create a CNAME on example.org called _acme-challenge.example.org
  # pointing to challenge.example.com. This way, you can obtain certificates for example.org with the bar account.
  traefik:
    # 🔹🔹 Traefik 🔹🔹
    depends_on:
      - traefik-error-pages
    image: traefik:latest
    container_name: traefik
    hostname: traefik
    networks:
      - publicnet
    ports:
      # Listen on port 80, default for HTTP, necessary to redirect to HTTPS
      - ${TRAEFIK_WEB_PORT:-80}:${TRAEFIK_WEB_PORT:-80}
      # Listen on port 443, default for HTTPS
      - ${TRAEFIK_WEBSECURE_PORT:-443}:${TRAEFIK_WEBSECURE_PORT:-443}
      # Listen on port 8099 for the Traefik API and Dashboard
      - ${TRAEFIK_DASHBOARD_PORT:-8099}:8080
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - ${CERTS_PATH:-./certs}:/certs
      - ${CONFIG_PATH:-./configs}/traefik/config:/config
      - ${CONFIG_PATH:-./configs}/traefik/etc/traefik:/etc/traefik
      - ${CONFIG_PATH:-./configs}/traefik/plugins-local:/plugins-local
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    #      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL} # Email address used for Letsencrypt registration.
      # CNAME are supported (and sometimes even encouraged), but there are a few cases where they can be problematic.
      # If needed, CNAME support can be disabled with the following environment variable:
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false} # Disable CNAME support for DNS challenges. (Default: false)
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-} # ZeroSSL API key.
    command: --configFile=/config/traefik.yaml
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: Host(`traefik.${DOMAIN}`) || Host(`traefik.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.traefik.loadbalancer.server.port: 8080
    restart: always

  traefik-error-pages:
    # 🔹🔹 Traefik Error Pages 🔹🔹
    # Serves static HTML error pages used by Traefik's error middleware
    image: httpd:alpine
    container_name: traefik-error-pages
    hostname: error-pages
    networks:
      - publicnet
    volumes:
      # Mount the directory containing error HTML files (e.g., 404.html, 5xx.html)
      - ${CONFIG_PATH:-./configs}/traefik/error-pages:/usr/local/apache2/htdocs/:ro
    restart: always

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  whisparr:
    # 🔹🔹 Whisparr 🔹🔹  https://github.com/thespad/whisparr
    # Whisparr is a fork of Sonarr for managing and downloading adult content.
    image: ghcr.io/thespad/whisparr
    container_name: whisparr
    hostname: whisparr
    networks:
      publicnet:
        ipv4_address: ${WHISPARR_IPV4_ADDRESS:-10.76.4.6}
    ports:
      - ${WHISPARR_PORT:-6969}:6969
    volumes:
      - ${CONFIG_PATH:-./configs}/whisparr/config:/config
      - ${DATA_PATH:-./data}/downloads/xxx:/downloads/xxx
      - ${DATA_PATH:-./data}/media/xxx:/xxx
    <<: [*resource-limits]
    environment:
      <<: *common-env
    labels:
      caddy: whisparr.${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 6969}}"
      traefik.enable: "true"
      traefik.http.routers.whisparr.rule: Host(`whisparr.${DOMAIN}`) || Host(`whisparr.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.whisparr.loadbalancer.server.port: 6969
    healthcheck:
      test: curl -fs http://localhost:6969 > /dev/null || exit 1
      interval: ${WHISPARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${WHISPARR_HEALTHCHECK_TIMEOUT:-15s}
      start_period: ${WHISPARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: always

  wizarr:
    # 🔹🔹 Wizarr 🔹🔹  # https://github.com/wizarrrr/wizarr
    # Advanced user invitation and management system for Jellyfin and Plex.
    image: ghcr.io/wizarrrr/wizarr
    container_name: wizarr
    hostname: wizarr
    networks:
      - publicnet
    ports:
      - ${WIZARR_PORT:-5690}:5690
    volumes:
      - "${CONFIG_PATH:-./configs}/wizarr:/data/database"
    <<: *resource-limits
    environment:
      <<: *common-env
    labels:
      caddy: wizarr.${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5690}}"
      traefik.enable: "true"
      traefik.http.routers.wizarr.rule: Host(`wizarr.${DOMAIN}`) || Host(`wizarr.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.wizarr.loadbalancer.server.port: 5690
      homepage.group: User Management
      homepage.name: Wizarr
      homepage.icon: wizarr.png
      homepage.href: https://wizarr.${DOMAIN}/
      homepage.description: Advanced user invitation and management system for Jellyfin and Plex.
    restart: always

  zerotier:
    image: zyclonite/zerotier
    container_name: zerotier
    network_mode: host
    cap_add:
      - NET_ADMIN
    # SYS_ADMIN is needed because NET_ADMIN does not include
    # the ioctl() required to put /dev/net/tun in tap mode.
    # This appears to be a bug in Linux's capability model but it would have to be fixed upstream.
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - '/var/lib/zerotier-one:/var/lib/zerotier-one'

