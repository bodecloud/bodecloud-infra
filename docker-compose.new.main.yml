x-common-env: &common-env
  TZ: ${TZ:-America/Chicago}
  PUID: ${PUID:-1001}
  PGID: ${PGID:-988}
  UMASK: ${UMASK:-002}

x-common-uidgid: &common-uidgid
  user: ${PUID:-1001}:${PGID:-988}

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-logging: &common-logging
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"


services:
  autobrr:
    # 🔹🔹 Autobrr 🔹🔹  # https://github.com/autobrr/autobrr
    # Modern, easy to use download automation for torrents and usenet.
    image: ghcr.io/autobrr/autobrr
    container_name: autobrr
    network_mode: service:gluetun-premiumize
#    hostname: autobrr
#    networks:
#      - publicnet
#    ports:
#      - ${AUTOBRR__PORT:-7474}:${AUTOBRR__PORT:-7474}
    volumes:
      - ${CONFIG_PATH:-./configs}/autobrr/config:/config
      - ${CONFIG_PATH:-./configs}/autobrr/logs:/logs
      - ${DATA_PATH:-./data}:/data
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
      AUTOBRR__BASE_URL: ${AUTOBRR__BASE_URL:-}
      AUTOBRR__CHECK_FOR_UPDATES: ${AUTOBRR__CHECK_FOR_UPDATES:-true}
      AUTOBRR__CUSTOM_DEFINITIONS: ${AUTOBRR__CUSTOM_DEFINITIONS:-}
      AUTOBRR__DATABASE_TYPE: ${AUTOBRR__DATABASE_TYPE:-sqlite}
      AUTOBRR__HOST: ${AUTOBRR__HOST:-0.0.0.0}
      AUTOBRR__LOG_LEVEL: ${AUTOBRR__LOG_LEVEL:-info}
      AUTOBRR__LOG_MAX_BACKUPS: ${AUTOBRR__LOG_MAX_BACKUPS:-8}
      AUTOBRR__LOG_MAX_SIZE: ${AUTOBRR__LOG_MAX_SIZE:-2}
      AUTOBRR__LOG_PATH: ${AUTOBRR__LOG_PATH:-logs/autobrr.log}
      AUTOBRR__METRICS_BASIC_AUTH_USERS: ${AUTOBRR__METRICS_BASIC_AUTH_USERS:-}
      AUTOBRR__METRICS_ENABLED: ${AUTOBRR__METRICS_ENABLED:-false}
      AUTOBRR__METRICS_HOST: ${AUTOBRR__METRICS_HOST:-0.0.0.0}
      AUTOBRR__METRICS_PORT: ${AUTOBRR__METRICS_PORT:-9092}
      AUTOBRR__OIDC_CLIENT_ID: ${AUTOBRR__OIDC_CLIENT_ID:-}
      AUTOBRR__OIDC_CLIENT_SECRET: ${AUTOBRR__OIDC_CLIENT_SECRET:-}
      AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN: ${AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN:-false}
      AUTOBRR__OIDC_ENABLED: ${AUTOBRR__OIDC_ENABLED:-false}
      AUTOBRR__OIDC_ISSUER: ${AUTOBRR__OIDC_ISSUER:-}
      AUTOBRR__OIDC_REDIRECT_URL: ${AUTOBRR__OIDC_REDIRECT_URL:-}
      AUTOBRR__PORT: ${AUTOBRR__PORT:-7474}
      AUTOBRR__POSTGRES_DATABASE: ${AUTOBRR__POSTGRES_DATABASE:-autobrr}
      AUTOBRR__POSTGRES_EXTRA_PARAMS: ${AUTOBRR__POSTGRES_EXTRA_PARAMS:-}
      AUTOBRR__POSTGRES_HOST: ${AUTOBRR__POSTGRES_HOST:-postgres}
      AUTOBRR__POSTGRES_PASS: ${AUTOBRR__POSTGRES_PASS:-autobrr}
      AUTOBRR__POSTGRES_PORT: ${AUTOBRR__POSTGRES_PORT:-5430}
      AUTOBRR__POSTGRES_SSLMODE: ${AUTOBRR__POSTGRES_SSLMODE:-disable}
      AUTOBRR__POSTGRES_USER: ${AUTOBRR__POSTGRES_USER:-autobrr}
      AUTOBRR__SESSION_SECRET: ${AUTOBRR__SESSION_SECRET:-}
    labels:
      traefik.enable: "true"
      traefik.http.routers.autobrr.rule: Host(`autobrr.${DOMAIN}`) || Host(`autobrr.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.autobrr.loadbalancer.server.port: 7474
      homepage.group: Source Aggregator
      homepage.name: Autobrr
      homepage.icon: autobrr.png
      homepage.href: https://autobrr.${DOMAIN}/
      homepage.description: Redefines download automation for torrents and Usenet
      homepage.type: autobrr
      homepage.url: http://gluetun-premiumize:${AUTOBRR__PORT:-7474}
      homepage.key: ${AUTOBRR__API_KEY}
    restart: always

  bazarr:
    # 🔹🔹 Bazarr 🔹🔹
    image: linuxserver/bazarr
    container_name: bazarr
    hostname: bazarr
    networks:
      - publicnet
#    ports:
#      - ${BAZARR_PORT:-6767}:6767
    volumes:
      - ${CONFIG_PATH:-./configs}/bazarr/config:/config
      - ${DATA_PATH:-./data}/downloads/bazarr:/downloads
      - ${DATA_PATH:-./data}/media/anime:/media/anime
      - ${DATA_PATH:-./data}/media/movies:/media/movies
      - ${DATA_PATH:-./data}/media/tv:/media/tv
    environment:
      <<: *common-env
    labels:
      traefik.enable: "true"
      traefik.http.routers.bazarr.rule: Host(`bazarr.${DOMAIN}`) || Host(`bazarr.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/bazarr`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/bazarr`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/bazarr`))
      traefik.http.services.bazarr.loadbalancer.server.port: 6767
      homepage.group: Media Management
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: https://bazarr.${DOMAIN}/
      homepage.description: Companion application to Sonarr and Radarr for automatic subtitle downloading and management in multiple languages.
      homepage.type: bazarr
      homepage.url: https://bazarr.${DOMAIN}
      homepage.key: ${BAZARR_API_KEY}
    healthcheck:
      test: curl -fs http://127.0.0.1:6767
      interval: ${BAZARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${BAZARR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${BAZARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${BAZARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: always

  bazarr-exporter:
    # 🔹🔹 Bazarr Exporter 🔹🔹
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: bazarr-exporter
    hostname: bazarr-exporter
    networks:
      - publicnet
    ports:
      - ${BAZARR_EXPORTER_PORT:-9712}:${BAZARR_EXPORTER_PORT:-9712}
    environment:
      <<: *common-env
      PORT: ${BAZARR_EXPORTER_PORT:-9712}
      URL: "http://bazarr:6767"
      APIKEY: ${BAZARR_API_KEY}
    command: ["bazarr"]
    restart: always

  cadvisor:
    # 🔹🔹 Cadvisor 🔹🔹  # https://github.com/google/cadvisor
    depends_on:
      - prometheus
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    hostname: cadvisor
    networks:
      - publicnet
#    ports:
#      - ${CADVISOR_PORT:-8071}:8080
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    <<: [*common-logging, *resource-limits]
    labels:
      traefik.enable: "true"
      traefik.http.routers.cadvisor.rule: Host(`cadvisor.${DOMAIN}`) || Host(`cadvisor.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/cadvisor`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/cadvisor`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/cadvisor`))
      traefik.http.services.cadvisor.loadbalancer.server.port: 8080
      homepage.group: System Monitoring
      homepage.name: Cadvisor
      homepage.icon: cadvisor.png
      homepage.href: https://cadvisor.${DOMAIN}/
      homepage.description: A tool for monitoring and visualizing resource usage and performance metrics of Docker containers.
    restart: always

  checkrr:
    # 🔹🔹 Checkrr 🔹🔹  https://github.com/aetaric/checkrr
    # Scan your library files for corrupt media and replace the files via sonarr and radarr
    image: aetaric/checkrr:3.4.0
    container_name: checkrr
    hostname: checkrr
    networks:
      - publicnet
#    ports:
#      - ${CHECKRR_PORT:-8585}:8585
    volumes:
      #      - ${CONFIG_PATH:-./configs}/certs:/certs
      - ${CONFIG_PATH:-./configs}/checkrr/config/checkrr.db:/checkrr.db
      - ${CONFIG_PATH:-./configs}/checkrr/config/checkrr.yaml:/checkrr.yaml
      - ${CONFIG_PATH:-./configs}/checkrr/logs:/logs
      - ${DATA_PATH:-./data}/media:/media
    environment:
      <<: *common-env
      GIN_MODE: release
    labels:
      traefik.enable: "true"
      traefik.http.routers.checkrr.rule: Host(`checkrr.${DOMAIN}`) || Host(`checkrr.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/checkrr`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/checkrr`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/checkrr`))
      traefik.http.services.checkrr.loadbalancer.server.port: 8585
      homepage.group: System Monitoring
      homepage.name: Checkrr
      homepage.icon: checkrr.png
      homepage.href: https://checkrr.${DOMAIN}/
      homepage.description: A comprehensive system monitoring tool that checks the health and status of your various services and applications.
    restart: always

  code-demo:
    # 🔹🔹 Code Server 🔹🔹
    image: linuxserver/code-server:latest
    container_name: code
    hostname: code
    <<: [*common-logging, *resource-limits]
    networks:
      - publicnet
#    ports:
#      - ${CODESERVER_DEMO_PORT:-8443}:8443
    volumes:
      - ${CONFIG_PATH:-./configs}/code-server/demo/config:/config
      - ${CONFIG_PATH:-./configs}/code-server/demo/workspace:/workspace
    env_file:
      - ${CONFIG_PATH:-./configs}/code-server/host_config/.env
    environment:
      <<: *common-env
    labels:
      traefik.enable: "true"
      traefik.http.routers.code.rule: Host(`code.${DOMAIN}`) || Host(`code.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/code`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/code`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/code`))
      traefik.http.services.code.loadbalancer.server.port: 8443
      homepage.group: Development
      homepage.name: Code Server
      homepage.icon: code-server.png
      homepage.href: https://code.${DOMAIN}/
      homepage.description: A web-based IDE for coding, editing, and debugging code, with support for multiple languages and frameworks.
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512m
    restart: always

  code-dev:
    # 🔹🔹 Code Server 🔹🔹
    image: linuxserver/code-server:latest
    container_name: code-dev
    hostname: code-dev
    <<: [*common-logging, *resource-limits]
    networks:
      - publicnet
#    ports:
#      - ${CODESERVER_DEV_PORT:-8441}:8443
    volumes:
      - ${CONFIG_PATH:-./configs}/code-server/dev/config:/config
      - ${CONFIG_PATH:-./configs}/code-server/dev/workspace:/workspace
      - ${ROOT_DIR:-.}:/workspace
    env_file:
      - ${CONFIG_PATH:-./configs}/code-server/host_config/.env
    environment:
      <<: *common-env
    labels:
      traefik.enable: "true"
      traefik.http.routers.code-dev.rule: Host(`code-dev.${DOMAIN}`) || Host(`code-dev.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/code-dev`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/code-dev`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/code-dev`))
      traefik.http.services.code-dev.loadbalancer.server.port: 8441
    deploy:
      resources:
        limits:
          cpus: '1.1'
          memory: 1024m
    restart: always

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    hostname: crowdsec
    networks:
      - publicnet
    expose: 
      - ${CROWDSEC_METRICS_PORT:-6060}
      - 8080
    environment:
      <<: *common-env
      # Configuration file location
      CONFIG_FILE: ${CROWDSEC_CONFIG_FILE:-/etc/crowdsec/config.yaml}
      # Disable the agent, run a LAPI-only container
      DISABLE_AGENT: ${CROWDSEC_DISABLE_AGENT:-false}
      # Disable LAPI, run an agent-only container
      DISABLE_LOCAL_API: ${CROWDSEC_DISABLE_LOCAL_API:-false}
      # Disable online API registration for signal sharing
      DISABLE_ONLINE_API: ${CROWDSEC_DISABLE_ONLINE_API:-false}
      # Don't run the service, only test the configuration
      TEST_MODE: ${CROWDSEC_TEST_MODE:-false}
      # The LAPI URL, change when DISABLE_LOCAL_API is true
      LOCAL_API_URL: ${CROWDSEC_LOCAL_API_URL:-http://0.0.0.0:8080}
      # Directory for plugins
      PLUGIN_DIR: ${CROWDSEC_PLUGIN_DIR:-/usr/local/lib/crowdsec/plugins/}
      # Port to expose Prometheus metrics
      METRICS_PORT: ${CROWDSEC_METRICS_PORT:-6060}
      # Enable Write-Ahead Logging with SQLite
      USE_WAL: ${CROWDSEC_USE_WAL:-false}
      # Name for the local agent (running in the container with LAPI)
      CUSTOM_HOSTNAME: ${CROWDSEC_CUSTOM_HOSTNAME:-localhost}
      # Path for capi_whitelists.yaml
      CAPI_WHITELISTS_PATH: ${CROWDSEC_CAPI_WHITELISTS_PATH:-}
      # Labels.type for file in time-machine
      TYPE: ${CROWDSEC_TYPE:-}
      # Process a single source in time-machine
      DSN: ${CROWDSEC_DSN:-}
      # Register a bouncer with the name TRAEFIK
      BOUNCER_KEY_TRAEFIK: ${CROWDSEC_BOUNCER_API_KEY}
      # Enroll key retrieved from the console to enroll the instance
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY:-}
      # Set an instance name for the console
      ENROLL_INSTANCE_NAME: ${CROWDSEC_ENROLL_INSTANCE_NAME:-}
      # Tags of the enrolled instance, for search and filter
      ENROLL_TAGS: ${CROWDSEC_ENROLL_TAGS:-}
      # Agent username
      AGENT_USERNAME: ${CROWDSEC_AGENT_USERNAME:-}
      # Agent password
      AGENT_PASSWORD: ${CROWDSEC_AGENT_PASSWORD:-}
      # Enable TLS encryption
      USE_TLS: ${CROWDSEC_USE_TLS:-false}
      # CA certificate bundle (for self-signed certificates)
      CACERT_FILE: ${CROWDSEC_CACERT_FILE:-}
      # Skip LAPI certificate validation
      INSECURE_SKIP_VERIFY: ${CROWDSEC_INSECURE_SKIP_VERIFY:-}
      # LAPI TLS Certificate path
      LAPI_CERT_FILE: ${CROWDSEC_LAPI_CERT_FILE:-}
      # LAPI TLS Key path
      LAPI_KEY_FILE: ${CROWDSEC_LAPI_KEY_FILE:-}
      # Client TLS Certificate path
      CLIENT_CERT_FILE: ${CROWDSEC_CLIENT_CERT_FILE:-}
      # Client TLS Key path
      CLIENT_KEY_FILE: ${CROWDSEC_CLIENT_KEY_FILE:-}
      # OU values allowed for agents, separated by comma
      AGENTS_ALLOWED_OU: ${CROWDSEC_AGENTS_ALLOWED_OU:-agent-ou}
      # OU values allowed for bouncers, separated by comma
      BOUNCERS_ALLOWED_OU: ${CROWDSEC_BOUNCERS_ALLOWED_OU:-bouncer-ou}
      # Skip hub update/upgrade when the container starts
      NO_HUB_UPGRADE: ${CROWDSEC_NO_HUB_UPGRADE:-false}
      # Collections to install, separated by space
      COLLECTIONS: ${CROWDSEC_COLLECTIONS:-crowdsecurity/traefik}
      # Parsers to install, separated by space
      PARSERS: ${CROWDSEC_PARSERS:-}
      # Scenarios to install, separated by space
      SCENARIOS: ${CROWDSEC_SCENARIOS:-}
      # Postoverflows to install, separated by space
      POSTOVERFLOWS: ${CROWDSEC_POSTOVERFLOWS:-}
      # Context files to install, separated by space
      CONTEXTS: ${CROWDSEC_CONTEXTS:-}
      # Appsec configs files to install, separated by space
      APPSEC_CONFIGS: ${CROWDSEC_APPSEC_CONFIGS:-}
      # Appsec rules files to install, separated by space
      APPSEC_RULES: ${CROWDSEC_APPSEC_RULES:-}
      # Collections to remove, separated by space
      DISABLE_COLLECTIONS: ${CROWDSEC_DISABLE_COLLECTIONS:-}
      # Parsers to remove, separated by space
      DISABLE_PARSERS: ${CROWDSEC_DISABLE_PARSERS:-}
      # Scenarios to remove, separated by space
      DISABLE_SCENARIOS: ${CROWDSEC_DISABLE_SCENARIOS:-}
      # Postoverflows to remove, separated by space
      DISABLE_POSTOVERFLOWS: ${CROWDSEC_DISABLE_POSTOVERFLOWS:-}
      # Context files to remove, separated by space
      DISABLE_CONTEXTS: ${CROWDSEC_DISABLE_CONTEXTS:-}
      # Appsec configs files to remove, separated by space
      DISABLE_APPSEC_CONFIGS: ${CROWDSEC_DISABLE_APPSEC_CONFIGS:-}
      # Appsec rules files to remove, separated by space
      DISABLE_APPSEC_RULES: ${CROWDSEC_DISABLE_APPSEC_RULES:-}
      # Force log levels for the container log
      LEVEL_FATAL: ${CROWDSEC_LEVEL_FATAL:-false}
      LEVEL_ERROR: ${CROWDSEC_LEVEL_ERROR:-false}
      LEVEL_WARN: ${CROWDSEC_LEVEL_WARN:-false}
      LEVEL_INFO: ${CROWDSEC_LEVEL_INFO:-false}
      LEVEL_DEBUG: ${CROWDSEC_LEVEL_DEBUG:-false}
      LEVEL_TRACE: ${CROWDSEC_LEVEL_TRACE:-false}
      # Used during functional tests
      CI_TESTING: ${CROWDSEC_CI_TESTING:-false}
      # Trace the entrypoint
      DEBUG: ${CROWDSEC_DEBUG:-false}
    volumes:
      - ${CONFIG_PATH:-./configs}/crowdsec/data:/var/lib/crowdsec/data
      - ${CONFIG_PATH:-./configs}/crowdsec/etc/crowdsec:/etc/crowdsec
      - ${CONFIG_PATH:-./configs}/crowdsec/plugins:/usr/local/lib/crowdsec/plugins/
      - ${CONFIG_PATH:-./configs}/crowdsec/logs:/var/log
    labels:
      traefik.enable: "true"
      traefik.http.routers.crowdsec.rule: Host(`crowdsec.${DOMAIN}`) || Host(`crowdsec.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || (Host(`${DOMAIN}`) && PathPrefix(`/crowdsec`)) || (Host(`${DUCKDNS_SUBDOMAIN}.duckdns.org`) && PathPrefix(`/crowdsec`)) || (Host(`${TS_DOMAIN}`) && PathPrefix(`/crowdsec`))
      traefik.http.services.crowdsec.loadbalancer.server.port: 8080
      homepage.group: Security
      homepage.name: Crowdsec
      homepage.icon: crowdsec.png
      homepage.href: https://crowdsec.${DOMAIN}/
      homepage.description: CrowdSec is an open-source, behavioral, intrusion detection system.
      homepage.widget.type: crowdsec
      homepage.widget.url: http://crowdsec:8080
      homepage.widget.username: localhost # machine_id in crowdsec
      homepage.widget.password: password
    restart: always

  ddns-updater:
    image: qmcgaw/ddns-updater
    container_name: ddns-updater
    hostname: ddns-updater
    networks:
      - publicnet
    ports:
      - ${DDNS_UPDATER_PORT:-7998}:7998
      - ${DDNS_UPDATER_PORT2:-8073}:8000
    volumes:
      - ${CONFIG_PATH:-./configs}/ddns-updater/updater/data:/updater/data
    environment:
      - CONFIG_FILEPATH=${DDNS_UPDATER_CONFIG_FILEPATH:-/updater/data/config.json}
      - PERIOD=${DDNS_UPDATER_PERIOD:-5m}
      - UPDATE_COOLDOWN_PERIOD=${DDNS_UPDATER_UPDATE_COOLDOWN_PERIOD:-5m}
      - PUBLICIP_FETCHERS=${DDNS_UPDATER_PUBLICIP_FETCHERS:-all}
      - PUBLICIP_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIP_HTTP_PROVIDERS:-all}
      - PUBLICIPV4_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIPV4_HTTP_PROVIDERS:-all}
      - PUBLICIPV6_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIPV6_HTTP_PROVIDERS:-all}
      - PUBLICIP_DNS_PROVIDERS=${DDNS_UPDATER_PUBLICIP_DNS_PROVIDERS:-all}
      - PUBLICIP_DNS_TIMEOUT=${DDNS_UPDATER_PUBLICIP_DNS_TIMEOUT:-3s}
      - HTTP_TIMEOUT=${DDNS_UPDATER_HTTP_TIMEOUT:-10s}

      # Web UI
      - LISTENING_ADDRESS=0.0.0.0:7998
      - ROOT_URL=${DDNS_UPDATER_ROOT_URL:-/}

      # Backup
      - BACKUP_PERIOD=${DDNS_UPDATER_BACKUP_PERIOD:-1h} # 0 to disable
      - BACKUP_DIRECTORY=${DDNS_UPDATER_BACKUP_DIRECTORY:-/updater/data}

      # Other
      - LOG_LEVEL=${DDNS_UPDATER_LOG_LEVEL:-info}
      - LOG_CALLER=${DDNS_UPDATER_LOG_CALLER:-hidden}
      - SHOUTRRR_ADDRESSES=${DDNS_UPDATER_SHOUTRRR_ADDRESSES:-}
    restart: always

  decluttarr:
    # 🔹🔹 Decluttarr 🔹🔹  https://github.com/manimatter/decluttarr
    # Watches radarr, sonarr, lidarr, readarr and whisparr download queues and removes downloads if they become stalled or no longer needed.
    depends_on:
      - lidarr
      - qbittorrent
      - radarr
      - readarr
      - sonarr
      - whisparr
    image: ghcr.io/manimatter/decluttarr
    container_name: decluttarr
    hostname: decluttarr
    networks:
      - publicnet
    <<: *resource-limits
    environment:
      <<: *common-env
      TEST_RUN: ${DECLUTTARR_TEST_RUN:-false}
      SSL_VERIFICATION: ${DECLUTTARR_SSL_VERIFICATION:-false}
      FAILED_IMPORT_MESSAGE_PATTERNS: '["Not a Custom Format upgrade for existing", "Not an upgrade for existing"]' # TODO: add more patterns
      IGNORED_DOWNLOAD_CLIENTS: '["emulerr"]'
      LOG_LEVEL: ${DECLUTTARR_LOG_LEVEL:-VERBOSE}
      MIN_DOWNLOAD_SPEED: ${DECLUTTARR_MIN_DOWNLOAD_SPEED:-100} # 100 KB/s
      NO_STALLED_REMOVAL_QBIT_TAG: ${DECLUTTARR_NO_STALLED_REMOVAL_QBIT_TAG:-Don't Kill}
      PERMITTED_ATTEMPTS: ${DECLUTTARR_PERMITTED_ATTEMPTS:-3}
      LIDARR_KEY: ${LIDARR_API_KEY}
      LIDARR_URL: http://lidarr:${LIDARR_PORT:-8686}
      # FIXME: radarr doesn't seem to work, but strangely the radarr service itself works?
      #RADARR_KEY: ${RADARR_API_KEY}
      #RADARR_URL: http://radarr:${RADARR_PORT:-7878}
      READARR_KEY: ${READARR_API_KEY}
      READARR_URL: http://readarr:${READARR_PORT:-8787}
      SONARR_KEY: ${SONARR_API_KEY}
      SONARR_URL: http://sonarr:${SONARR_PORT:-8989}
      WHISPARR_URL: http://whisparr:${WHISPARR_PORT:-6969}
      WHISPARR_KEY: ${WHISPARR_API_KEY}
      QBITTORRENT_URL: http://gluetun-premiumize:${QBITTORRENT_PORT:-8084}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      REMOVE_TIMER: 10
      REMOVE_FAILED: True
      REMOVE_FAILED_IMPORTS: True
      REMOVE_METADATA_MISSING: True
      REMOVE_MISSING_FILES: True
      REMOVE_ORPHANS: True
      REMOVE_SLOW: True
      REMOVE_STALLED: True
      REMOVE_UNMONITORED: True
      RUN_PERIODIC_RESCANS: '{
        "RADARR": {"MISSING": true, "CUTOFF_UNMET": true, "MAX_CONCURRENT_SCANS": 3, "MIN_DAYS_BEFORE_RESCAN": 1},
        "SONARR": {"MISSING": true, "CUTOFF_UNMET": true, "MAX_CONCURRENT_SCANS": 3, "MIN_DAYS_BEFORE_RESCAN": 1}
        }'
    restart: always

  deluge:
    # 🔹🔹 Deluge 🔹🔹
    depends_on:
      - gluetun-premiumize
    image: linuxserver/deluge
