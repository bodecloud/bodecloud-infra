#cloud-config

# This cloud-init configuration can be used with:
# - Google Cloud (GCP)
# - Amazon Web Services (AWS)
# - Oracle Cloud Infrastructure (OCI)
# - Azure
# - Any other cloud provider that supports cloud-init

# Set the hostname
hostname: k3s-node-${NODE_ID}

# Update packages and install prerequisites
package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - jq
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - nfs-common
  - open-iscsi
  - iptables
  - socat
  - conntrack
  - ipset

# Configure system settings
write_files:
  - path: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      vm.max_map_count = 262144
    permissions: '0644'

  # K3s server configuration (for master nodes)
  - path: /etc/rancher/k3s/config.yaml
    content: |
      # K3s Configuration - ONLY USED IF NODE_TYPE=server
      cluster-name: bolabaden
      disable:
      - "traefik"
      - "servicelb"
      - "flannel"
      flannel-backend: none
      kube-controller-manager-arg:
      - "bind-address=0.0.0.0"
      kube-scheduler-arg:
      - "bind-address=0.0.0.0"
      kubelet-arg:
      - "max-pods=250"
      node-ip: $PRIVATE_IP
      advertise-address: $PRIVATE_IP
      tls-san:
      - $PRIVATE_IP
      - $PUBLIC_IP
      etcd-expose-metrics: true
    permissions: '0644'

  # Setup script that will run on first boot
  - path: /usr/local/bin/setup-k3s.sh
    content: |
      #!/bin/bash
      set -e

      # Configuration parameters - REPLACE THESE WITH YOUR VALUES
      MASTER_IP="${MASTER_IP:-REPLACE_MASTER_IP}"
      NODE_TOKEN="${NODE_TOKEN:-REPLACE_NODE_TOKEN}"
      NODE_TYPE="${NODE_TYPE:-agent}" # server or agent
      K3S_VERSION="v1.28.6+k3s2"
      
      # Apply sysctl settings
      sysctl --system
      
      # Enable and start iscsid for Longhorn
      systemctl enable iscsid
      systemctl start iscsid
      
      # Get the primary IP address
      PRIVATE_IP=$(hostname -I | awk '{print $1}')
      PUBLIC_IP=$(curl -s ifconfig.me)
      
      # Update the config file with actual IPs
      if [ "$NODE_TYPE" == "server" ]; then
        sed -i "s/\$PRIVATE_IP/$PRIVATE_IP/g" /etc/rancher/k3s/config.yaml
        sed -i "s/\$PUBLIC_IP/$PUBLIC_IP/g" /etc/rancher/k3s/config.yaml
      fi
      
      # Install K3s
      if [ "$NODE_TYPE" == "server" ]; then
        # Install as master node
        echo "Installing K3s server node..."
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=${K3S_VERSION} sh -
        
        # Wait for K3s to be ready
        until kubectl get nodes; do
          echo "Waiting for K3s to start..."
          sleep 5
        done
        
        # Get node token for future worker nodes
        NODE_TOKEN=$(cat /var/lib/rancher/k3s/server/node-token)
        echo "Node token for joining workers: ${NODE_TOKEN}"
        echo "Master node IP: ${PRIVATE_IP}"
        
        # Configure kubectl
        mkdir -p /home/ubuntu/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube
        chmod 600 /home/ubuntu/.kube/config
        echo "export KUBECONFIG=/home/ubuntu/.kube/config" >> /home/ubuntu/.bashrc
        
        # Install Helm
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        
        # Install Cilium
        helm repo add cilium https://helm.cilium.io/
        helm repo update
        helm install cilium cilium/cilium --version 1.14.4 \
          --namespace kube-system \
          --set kubeProxyReplacement=strict \
          --set k8sServiceHost=${PRIVATE_IP} \
          --set k8sServicePort=6443
        
        # Install MetalLB
        METALLB_VERSION=$(curl -s https://api.github.com/repos/metallb/metallb/releases/latest | grep "tag_name" | cut -d '"' -f 4)
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/${METALLB_VERSION}/config/manifests/metallb-native.yaml
        
        # Wait for MetalLB to be ready
        echo "Waiting for MetalLB to be ready..."
        sleep 30
        
        # Get the node's IP range for MetalLB
        IP_PREFIX=$(echo $PRIVATE_IP | cut -d. -f1-3)
        
        # Create MetalLB configuration
        cat > /tmp/metallb-config.yaml << EOF
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: first-pool
        namespace: metallb-system
      spec:
        addresses:
        - ${IP_PREFIX}.200-${IP_PREFIX}.250
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: l2-advert
        namespace: metallb-system
      spec:
        ipAddressPools:
        - first-pool
      EOF
        
        # Apply MetalLB configuration
        kubectl apply -f /tmp/metallb-config.yaml
        
        # Install Traefik
        helm repo add traefik https://traefik.github.io/charts
        helm repo update
        
        # Create values file for Traefik
        cat > /tmp/traefik-values.yaml << EOF
      deployment:
        replicas: 1
      ingressRoute:
        dashboard:
          enabled: true
      ports:
        web:
          redirectTo: websecure
        websecure:
          tls:
            enabled: true
      service:
        enabled: true
        type: LoadBalancer
      persistence:
        enabled: true
        size: 128Mi
      additionalArguments:
        - "--api.dashboard=true"
        - "--providers.kubernetesingress.ingressclass=traefik"
        - "--log.level=INFO"
      EOF
        
        helm install traefik traefik/traefik -n kube-system -f /tmp/traefik-values.yaml
        
        # Install Longhorn
        LONGHORN_VERSION=$(curl -s https://api.github.com/repos/longhorn/longhorn/releases/latest | grep "tag_name" | cut -d '"' -f 4)
        kubectl apply -f https://raw.githubusercontent.com/longhorn/longhorn/${LONGHORN_VERSION}/deploy/longhorn.yaml
        
        # Install Flux
        # Install Flux CLI
        curl -s https://fluxcd.io/install.sh | bash
        
        # Bootstrap Flux
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        flux install --components=source-controller,kustomize-controller,helm-controller,notification-controller
        
        echo "Master node setup complete!"
      else
        # Install as worker node
        echo "Installing K3s agent node..."
        curl -sfL https://get.k3s.io | K3S_URL=https://${MASTER_IP}:6443 K3S_TOKEN=${NODE_TOKEN} INSTALL_K3S_VERSION=${K3S_VERSION} sh -
        echo "Worker node joined the cluster successfully!"
      fi
      
      echo "K3s installation completed successfully!"
    permissions: '0755'

# Run commands on first boot
runcmd:
  # Create directories
  - mkdir -p /etc/rancher/k3s
  # Apply sysctl settings
  - sysctl --system
  # Enable and start iscsid
  - systemctl enable iscsid
  - systemctl start iscsid
  # Execute the setup script
  - /usr/local/bin/setup-k3s.sh
  # Remove the setup script after execution
  - rm /usr/local/bin/setup-k3s.sh

# Add Ubuntu user to docker group
system_info:
  default_user:
    groups: [sudo]

# Final message
final_message: "The system is finally up, after $UPTIME seconds" 