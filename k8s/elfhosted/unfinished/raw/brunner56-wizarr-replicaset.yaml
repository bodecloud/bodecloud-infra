spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: wizarr
      pod-template-hash: 6fc585764f
  template:
    metadata:
      creationTimestamp: '2025-05-29T17:12:59Z'
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: wizarr
        pod-template-hash: 6fc585764f
    spec:
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: backup
        - name: cache
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: config
        - name: elfbot
          configMap:
            name: elfbot-wizarr
            defaultMode: 420
            optional: true
        - name: tmp
          emptyDir: {}
        - name: wizarr-steps
          emptyDir: {}
        - name: wizarr-steps-jellyfin
          configMap:
            name: wizarr-steps-jellyfin
            defaultMode: 420
        - name: wizarr-steps-plex
          configMap:
            name: wizarr-steps-plex
            defaultMode: 420
      initContainers:
        - name: bootstrap
          image: >-
            alpine/k8s:1.29.1
          command:
            - /bin/bash
            - '-c'
            - >
              set -e


              # Allows us to use app.elfhosted.com/name, but fall back to
              app.kubernetes.io/name if the former doesn't exist

              if [[ -z "$ELF_APP_NAME" ]]; then
                ELF_APP_NAME=$K8S_APP_NAME
              fi


              # look for commands - we match specific names in order of
              least-destructive

              TIMESTAMP_NOW=$(date +%s)

              if [[ -f /etc/elfbot/pause ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=pause
                fi
              fi


              # If no command is set, then move onto the next possibility

              if [[ -f /etc/elfbot/backup && -z "$COMMAND" ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=backup
                fi
              fi


              # If no command is set, then move onto the next possibility

              if [[ -f /etc/elfbot/reset && -z "$COMMAND" ]]; then
                TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)
                TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
                if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
                  COMMAND=reset
                fi
              fi


              case $COMMAND in

                "pause")
                  echo "Recent pause command found, sleeping 5m.."
                  sleep 300
                  ;;

                "reset")

                  # Safety check - if /config/homer exists, we've not mounted /config properly and are about to wipe out EVERYTHING
                  if [ -e "/config/homer" ]; then
                      echo "The path /config/homer exists. Exiting."
                      exit 1
                  fi      
                  echo "Recent reset command found, resetting"
                  rm -rf /config/*
                  ;;

                "backup")
                  echo "Recent backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}"
                  TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\n' -1)
                  cp -rfp /config /storage/backup/$ELF_APP_NAME-$TIMESTAMP
                  ;;

              esac


              if [[ ! -f /config/i-am-bootstrapped ]]

              then
                echo "Bootstrapping from goldilocks config..."
                s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/* /config/
                touch /config/i-am-bootstrapped
              fi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: b2-elfhosted-config-ro
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: b2-elfhosted-config-ro
                  key: secret-key
            - name: S3_ENDPOINT_URL
              value: https://s3.us-west-000.backblazeb2.com
            - name: K8S_APP_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/name']
            - name: ELF_APP_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.elfhosted.com/name']
          resources:
            limits:
              cpu: '1'
              memory: 4Gi
            requests:
              cpu: '0'
              memory: 1Mi
          volumeMounts:
            - name: elfbot
              mountPath: /etc/elfbot
            - name: backup
              mountPath: /storage/backup
            - name: config
              mountPath: /config
              subPath: wizarr
            - name: tmp
              mountPath: /tmp
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsUser: 568
            runAsGroup: 568
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: brunner56-wizarr
          image: >-
            ghcr.io/elfhosted/wizarr:2025.5.d@sha256:58c2e28b6fbe604b6a6b4478944ff5071b6700d1a81a58708b70359c58e325ca
          ports:
            - name: http
              containerPort: 5690
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wizarr-env
            - configMapRef:
                name: elfbot-wizarr
                optional: true
          resources:
            limits:
              cpu: '1'
              memory: 1Gi
            requests:
              cpu: '0'
              memory: 128Mi
          volumeMounts:
            - name: backup
              mountPath: /backup
            - name: cache
              mountPath: /home/elfie/.cache
            - name: config
              mountPath: /data/database
              subPath: wizarr
            - name: elfbot
              mountPath: /elfbot
            - name: tmp
              mountPath: /tmp
            - name: wizarr-steps
              mountPath: /data/wizard_steps
            - name: wizarr-steps-jellyfin
              mountPath: /opt/default_wizard_steps/jellyfin
            - name: wizarr-steps-plex
              mountPath: /opt/default_wizard_steps/plex
          livenessProbe:
            tcpSocket:
              port: 5690
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 5690
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 5690
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.elfhosted.com/role
                    operator: In
                    values:
                      - nodefinder
              topologyKey: kubernetes.io/hostname
      schedulerName: default-scheduler
      priorityClassName: tenant-normal
      enableServiceLinks: false
status:
  replicas: 1
  fullyLabeledReplicas: 1
  readyReplicas: 1
  availableReplicas: 1
  observedGeneration: 1
