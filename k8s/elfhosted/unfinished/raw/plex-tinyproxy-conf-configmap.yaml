kind: ConfigMap
apiVersion: v1
metadata:
  name: plex-tinyproxy-conf
  namespace: my-media-stack
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  tinyproxy.conf: |
    Port 8888

    Listen 0.0.0.0

    # Allow all connections

    Allow 0.0.0.0/0

    Timeout 600

    DisableViaHeader yes

    ReversePath "/" "http://localhost:32400/"

    # ReverseBaseURL "https://brunner56-plex.elfhosted.com"

    # ReverseMagic Yes

    ReverseOnly Yes

    # Anonymous "Host"

    # Anonymous "Authorization"

    # Anonymous "Cookie"

    # Anonymous "X-Forwarded-Proto"
