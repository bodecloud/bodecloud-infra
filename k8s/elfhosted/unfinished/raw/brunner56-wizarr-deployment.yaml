kind: Deployment
apiVersion: apps/v1
metadata:
  name: brunner56-wizarr
  namespace: my-media-stack
  labels:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: wizarr
    helm.sh/chart: wizarr-0.2.1
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    configmap.reloader.stakater.com/reload: elfbot-all,elfbot-wizarr
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: wizarr
  template:
    metadata:
      creationTimestamp: '2025-05-29T17:12:59Z'
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: wizarr
    spec:
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: backup
      - name: cache
        emptyDir: {}
      - name: config
        persistentVolumeClaim:
          claimName: config
      - name: elfbot
        configMap:
          name: elfbot-wizarr
          defaultMode: 420
          optional: true
      - name: tmp
        emptyDir: {}
      - name: wizarr-steps
        emptyDir: {}
      - name: wizarr-steps-jellyfin
        configMap:
          name: wizarr-steps-jellyfin
          defaultMode: 420
      - name: wizarr-steps-plex
        configMap:
          name: wizarr-steps-plex
          defaultMode: 420
      initContainers:
      - name: bootstrap
        image: alpine/k8s:1.29.1
        command:
        - /bin/bash
        - -c
        - "set -e\n\n# Allows us to use app.elfhosted.com/name, but fall back to app.kubernetes.io/name\
          \ if the former doesn't exist\nif [[ -z \"$ELF_APP_NAME\" ]]; then\n  ELF_APP_NAME=$K8S_APP_NAME\n\
          fi\n\n# look for commands - we match specific names in order of least-destructive\n\
          TIMESTAMP_NOW=$(date +%s)\nif [[ -f /etc/elfbot/pause ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/pause)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=pause\n  fi\nfi\n\
          \n# If no command is set, then move onto the next possibility\nif [[ -f\
          \ /etc/elfbot/backup && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/backup)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=backup\n  fi\nfi\n\
          \n# If no command is set, then move onto the next possibility\nif [[ -f\
          \ /etc/elfbot/reset && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/reset)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=reset\n  fi\nfi\n\
          \ncase $COMMAND in\n\n  \"pause\")\n    echo \"Recent pause command found,\
          \ sleeping 5m..\"\n    sleep 300\n    ;;\n\n  \"reset\")\n\n    # Safety\
          \ check - if /config/homer exists, we've not mounted /config properly and\
          \ are about to wipe out EVERYTHING\n    if [ -e \"/config/homer\" ]; then\n\
          \        echo \"The path /config/homer exists. Exiting.\"\n        exit\
          \ 1\n    fi      \n    echo \"Recent reset command found, resetting\"\n\
          \    rm -rf /config/*\n    ;;\n\n  \"backup\")\n    echo \"Recent backup\
          \ command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}\"\
          \n    TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\\n' -1)\n    cp -rfp /config\
          \ /storage/backup/$ELF_APP_NAME-$TIMESTAMP\n    ;;\n\nesac\n\nif [[ ! -f\
          \ /config/i-am-bootstrapped ]]\nthen\n  echo \"Bootstrapping from goldilocks\
          \ config...\"\n  s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/*\
          \ /config/\n  touch /config/i-am-bootstrapped\nfi\n"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: secret-key
        - name: S3_ENDPOINT_URL
          value: https://s3.us-west-000.backblazeb2.com
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
        resources:
          limits:
            cpu: '1'
            memory: 4Gi
          requests:
            cpu: '0'
            memory: 1Mi
        volumeMounts:
        - name: elfbot
          mountPath: /etc/elfbot
        - name: backup
          mountPath: /storage/backup
        - name: config
          mountPath: /config
          subPath: wizarr
        - name: tmp
          mountPath: /tmp
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 568
          runAsGroup: 568
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
      containers:
      - name: brunner56-wizarr
        image: ghcr.io/elfhosted/wizarr:2025.5.d@sha256:58c2e28b6fbe604b6a6b4478944ff5071b6700d1a81a58708b70359c58e325ca
        ports:
        - name: http
          containerPort: 5690
          protocol: TCP
        envFrom:
        - configMapRef:
            name: wizarr-env
        - configMapRef:
            name: elfbot-wizarr
            optional: true
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: '0'
            memory: 128Mi
        volumeMounts:
        - name: backup
          mountPath: /backup
        - name: cache
          mountPath: /home/elfie/.cache
        - name: config
          mountPath: /data/database
          subPath: wizarr
        - name: elfbot
          mountPath: /elfbot
        - name: tmp
          mountPath: /tmp
        - name: wizarr-steps
          mountPath: /data/wizard_steps
        - name: wizarr-steps-jellyfin
          mountPath: /opt/default_wizard_steps/jellyfin
        - name: wizarr-steps-plex
          mountPath: /opt/default_wizard_steps/plex
        livenessProbe:
          tcpSocket:
            port: 5690
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5690
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 5690
          timeoutSeconds: 1
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      schedulerName: default-scheduler
      priorityClassName: tenant-normal
      enableServiceLinks: false
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
