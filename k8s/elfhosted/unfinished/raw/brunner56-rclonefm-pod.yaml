spec:
  volumes:
    - name: backup
      persistentVolumeClaim:
        claimName: backup
    - name: cache
      emptyDir:
        sizeLimit: 1Gi
    - name: config
      persistentVolumeClaim:
        claimName: config
    - name: elfbot
      configMap:
        name: elfbot-rclonefm
        defaultMode: 420
        optional: true
    - name: rclone
      persistentVolumeClaim:
        claimName: rclone
    - name: rclone-remote-storage
      configMap:
        name: rclonefm-config
        defaultMode: 420
    - name: rclonefm-config
      configMap:
        name: rclonefm-config
        defaultMode: 420
    - name: rclonemountrealdebridzurg
      persistentVolumeClaim:
        claimName: realdebrid-zurg
    - name: symlinks
      persistentVolumeClaim:
        claimName: symlinks
    - name: tmp
      emptyDir: {}
  initContainers:
    - name: bootstrap
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - >
          set -e


          # Allows us to use app.elfhosted.com/name, but fall back to
          app.kubernetes.io/name if the former doesn't exist

          if [[ -z "$ELF_APP_NAME" ]]; then
            ELF_APP_NAME=$K8S_APP_NAME
          fi


          # look for commands - we match specific names in order of
          least-destructive

          TIMESTAMP_NOW=$(date +%s)

          if [[ -f /etc/elfbot/pause ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=pause
            fi
          fi


          # If no command is set, then move onto the next possibility

          if [[ -f /etc/elfbot/backup && -z "$COMMAND" ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=backup
            fi
          fi


          # If no command is set, then move onto the next possibility

          if [[ -f /etc/elfbot/reset && -z "$COMMAND" ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=reset
            fi
          fi


          case $COMMAND in

            "pause")
              echo "Recent pause command found, sleeping 5m.."
              sleep 300
              ;;

            "reset")

              # Safety check - if /config/homer exists, we've not mounted /config properly and are about to wipe out EVERYTHING
              if [ -e "/config/homer" ]; then
                  echo "The path /config/homer exists. Exiting."
                  exit 1
              fi      
              echo "Recent reset command found, resetting"
              rm -rf /config/*
              ;;

            "backup")
              echo "Recent backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}"
              TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\n' -1)
              cp -rfp /config /storage/backup/$ELF_APP_NAME-$TIMESTAMP
              ;;

          esac


          if [[ ! -f /config/i-am-bootstrapped ]]

          then
            echo "Bootstrapping from goldilocks config..."
            s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/* /config/
            touch /config/i-am-bootstrapped
          fi
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: secret-key
        - name: S3_ENDPOINT_URL
          value: https://s3.us-west-000.backblazeb2.com
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
      resources:
        limits:
          cpu: '1'
          memory: 4Gi
        requests:
          cpu: '0'
          memory: 1Mi
      volumeMounts:
        - name: elfbot
          mountPath: /etc/elfbot
        - name: backup
          mountPath: /storage/backup
        - name: config
          mountPath: /config
          subPath: rclone
        - name: tmp
          mountPath: /tmp
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    - name: setup
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - >
          set -x

          set -e


          # add local remote if it doesn't exist

          grep -q '/storage' /config/rclone.conf || cat /rclone-remote-storage
          >> /config/rclone.conf
      resources:
        limits:
          cpu: '1'
          memory: 4Gi
        requests:
          cpu: '0'
          memory: 1Mi
      volumeMounts:
        - name: config
          mountPath: /config
          subPath: rclone
        - name: tmp
          mountPath: /tmp
        - name: rclone-remote-storage
          mountPath: /rclone-remote-storage
          subPath: rclone-remote-storage
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
