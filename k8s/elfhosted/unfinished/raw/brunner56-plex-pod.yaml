spec:
  volumes:
    - name: backup
      persistentVolumeClaim:
        claimName: backup
    - name: config
      persistentVolumeClaim:
        claimName: config
    - name: elfbot
      configMap:
        name: elfbot-plex
        defaultMode: 420
        optional: true
    - name: phototranscoder
      emptyDir:
        sizeLimit: 50Gi
    - name: rclone
      persistentVolumeClaim:
        claimName: rclone
    - name: rclonemountrealdebridzurg
      persistentVolumeClaim:
        claimName: realdebrid-zurg
    - name: render-device
      hostPath:
        path: /dev/dri/renderD128
        type: ''
    - name: shared
      emptyDir: {}
    - name: symlinks
      persistentVolumeClaim:
        claimName: symlinks
    - name: tinyproxy-conf
      configMap:
        name: plex-tinyproxy-conf
        defaultMode: 420
    - name: tmp
      emptyDir: {}
    - name: transcode
      persistentVolumeClaim:
        claimName: transcode-1g
  initContainers:
    - name: bootstrap
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - >
          set -e


          # Allows us to use app.elfhosted.com/name, but fall back to
          app.kubernetes.io/name if the former doesn't exist

          if [[ -z "$ELF_APP_NAME" ]]; then
            ELF_APP_NAME=$K8S_APP_NAME
          fi


          # look for commands - we match specific names in order of
          least-destructive

          TIMESTAMP_NOW=$(date +%s)

          if [[ -f /etc/elfbot/pause ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=pause
            fi
          fi


          # If no command is set, then move onto the next possibility

          if [[ -f /etc/elfbot/backup && -z "$COMMAND" ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=backup
            fi
          fi


          # If no command is set, then move onto the next possibility

          if [[ -f /etc/elfbot/reset && -z "$COMMAND" ]]; then
            TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)
            TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))
            if [[ $TIMESTAMP_DIFF -lt 600 ]]; then
              COMMAND=reset
            fi
          fi


          case $COMMAND in

            "pause")
              echo "Recent pause command found, sleeping 5m.."
              sleep 300
              ;;

            "reset")

              # Safety check - if /config/homer exists, we've not mounted /config properly and are about to wipe out EVERYTHING
              if [ -e "/config/homer" ]; then
                  echo "The path /config/homer exists. Exiting."
                  exit 1
              fi      
              echo "Recent reset command found, resetting"
              rm -rf /config/*
              ;;

            "backup")
              echo "Recent backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}"
              TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\n' -1)
              cp -rfp /config /storage/backup/$ELF_APP_NAME-$TIMESTAMP
              ;;

          esac


          if [[ ! -f /config/i-am-bootstrapped ]]

          then
            echo "Bootstrapping from goldilocks config..."
            s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/* /config/
            touch /config/i-am-bootstrapped
          fi
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: secret-key
        - name: S3_ENDPOINT_URL
          value: https://s3.us-west-000.backblazeb2.com
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
      resources:
        limits:
          cpu: '1'
          memory: 4Gi
        requests:
          cpu: '0'
          memory: 1Mi
      volumeMounts:
        - name: elfbot
          mountPath: /etc/elfbot
        - name: backup
          mountPath: /storage/backup
        - name: config
          mountPath: /config
          subPath: plex
        - name: tmp
          mountPath: /tmp
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    - name: restart-with-debridav
      image: >-
        ghcr.io/elfhosted/debridav:0.9.5@sha256:1e596ddb97a7e6a4827b1dfc0718992b0c432416841a8a4c3dd3cd7491850c3c
      command:
        - /bin/bash
        - '-c'
        - >
          echo "This pod only exists to cause a restart when debridav is
          updated"        
      resources: {}
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
    - name: restart-with-decypharr
      image: >-
        ghcr.io/elfhosted/decypharr-beta:rolling@sha256:b310afa9976f950ab62d7ec20801b46cb9a28176121d1c275424d780825ca4ee
      command:
        - /bin/bash
        - '-c'
        - >
          echo "This pod only exists to cause a restart when decypharr is
          updated"
      resources: {}
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
    - name: restart-with-zurg
      image: >-
        ghcr.io/elfhosted/zurg-rc:2025.05.14.0031-nightly@sha256:513bcc2be2a9fb8b8df7fc458f76747bebcc884776bfbfd4393e16d61b2c1227
      command:
        - /bin/bash
        - '-c'
        - |
          echo "This pod only exists to cause a restart when zurg is updated"
      resources: {}
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
    - name: setup
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - >
          set -x

          set -e


          # Clean up wasteful temporary media storage (Plex will just
          re-download these)

          if [ -d "/config/Library/Application Support/Plex Media
          Server/Cache/PhotoTranscoder" ]; then
            rm -rf "/config/Library/Application Support/Plex Media Server/Cache/PhotoTranscoder"
            ln -s /phototranscoder '/config/Library/Application Support/Plex Media Server/Cache/PhotoTranscoder'
          fi
      resources: {}
      volumeMounts:
        - name: config
          mountPath: /config
          subPath: plex
        - name: phototranscoder
          mountPath: /phototranscoder
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 568
        runAsGroup: 568
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    - name: setup-warp
      image: >-
        alpine/k8s:1.29.1
      command:
        - /bin/bash
        - '-c'
        - >
          set -x

          set -e


          cd /shared


          # Create cloudflare account

          wgcf register --accept-tos


          # Create gluetun config

          wgcf generate -p /shared/wg0.conf


          # grab the values from the profile and put them into env vars for
          gluetun to consume

          echo "export WIREGUARD_PRIVATE_KEY=$(grep PrivateKey /shared/wg0.conf
          | cut -f3 -d' ')" > /shared/env

          echo "export WIREGUARD_PUBLIC_KEY=$(grep PublicKey /shared/wg0.conf |
          cut -f3 -d' ')" >> /shared/env

          echo "export WIREGUARD_ADDRESSES=$(grep Address /shared/wg0.conf |
          grep '/32' | cut -f3 -d' ')" >> /shared/env


          echo "export VPN_ENDPOINT_IP=$(dig +short dig +short
          engage.cloudflareclient.com)" >> /shared/env
      resources: {}
      volumeMounts:
        - name: shared
          mountPath: /shared
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
      imagePullPolicy: IfNotPresent
      securityContext:
