kind: ConfigMap
apiVersion: v1
metadata:
  name: samba-config
  namespace: my-media-stack
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  config.yml: |
    auth:
      - user: brunner56
        group: brunner56
        uid: 568
        gid: 568
        password: brunner56

    global:
      - "force user = brunner56"
      - "force group = brunner56"
    share:
      - name: symlinks
        comment: symlinks
        path: /samba/symlinks-block
        browsable: yes
        readonly: no
        guestok: no
        veto: no
        recycle: no