kind: ConfigMap
apiVersion: v1
metadata:
  name: mattermost-backup
  namespace: my-media-stack
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  daily: |
    #!/bin/sh

    now=$(date +"%s_%Y-%m-%d")

    /usr/bin/mysqldump --opt -h ${MYSQL_HOST} -u ${MYSQL_USER} -p${MYSQL_PASSWORD}
    ${MYSQL_DATABASE} > "/backup/${now}_${MYSQL_DATABASE}.sql"
