kind: Deployment
apiVersion: apps/v1
metadata:
  name: brunner56-rclonefm
  namespace: my-media-stack
  labels:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rclonefm
    helm.sh/chart: rclonefm-0.2.1
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  annotations:
    configmap.reloader.stakater.com/reload: elfbot-all,elfbot-rclonefm,rclonefm-config
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: rclonefm
  template:
    metadata:
      creationTimestamp: '2025-05-29T17:12:59Z'
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: rclonefm
      annotations:
        kubernetes.io/egress-bandwidth: 40M
    spec:
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: backup
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      - name: config
        persistentVolumeClaim:
          claimName: config
      - name: elfbot
        configMap:
          name: elfbot-rclonefm
          defaultMode: 420
          optional: true
      - name: rclone
        persistentVolumeClaim:
          claimName: rclone
      - name: rclone-remote-storage
        configMap:
          name: rclonefm-config
          defaultMode: 420
      - name: rclonefm-config
        configMap:
          name: rclonefm-config
          defaultMode: 420
      - name: rclonemountrealdebridzurg
        persistentVolumeClaim:
          claimName: realdebrid-zurg
      - name: symlinks
        persistentVolumeClaim:
          claimName: symlinks
      - name: tmp
        emptyDir: {}
      initContainers:
      - name: bootstrap
        image: alpine/k8s:1.29.1
        command:
        - /bin/bash
        - -c
        - "set -e\n\n# Allows us to use app.elfhosted.com/name, but fall back to app.kubernetes.io/name\
          \ if the former doesn't exist\nif [[ -z \"$ELF_APP_NAME\" ]]; then\n  ELF_APP_NAME=$K8S_APP_NAME\n\
          fi\n\n# look for commands - we match specific names in order of least-destructive\n\
          TIMESTAMP_NOW=$(date +%s)\nif [[ -f /etc/elfbot/pause ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/pause)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=pause\n  fi\nfi\n\
          \n# If no command is set, then move onto the next possibility\nif [[ -f\
          \ /etc/elfbot/backup && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/backup)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=backup\n  fi\nfi\n\
          \n# If no command is set, then move onto the next possibility\nif [[ -f\
          \ /etc/elfbot/reset && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat\
          \ /etc/elfbot/reset)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n\
          \  if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=reset\n  fi\nfi\n\
          \ncase $COMMAND in\n\n  \"pause\")\n    echo \"Recent pause command found,\
          \ sleeping 5m..\"\n    sleep 300\n    ;;\n\n  \"reset\")\n\n    # Safety\
          \ check - if /config/homer exists, we've not mounted /config properly and\
          \ are about to wipe out EVERYTHING\n    if [ -e \"/config/homer\" ]; then\n\
          \        echo \"The path /config/homer exists. Exiting.\"\n        exit\
          \ 1\n    fi      \n    echo \"Recent reset command found, resetting\"\n\
          \    rm -rf /config/*\n    ;;\n\n  \"backup\")\n    echo \"Recent backup\
          \ command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}\"\
          \n    TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\\n' -1)\n    cp -rfp /config\
          \ /storage/backup/$ELF_APP_NAME-$TIMESTAMP\n    ;;\n\nesac\n\nif [[ ! -f\
          \ /config/i-am-bootstrapped ]]\nthen\n  echo \"Bootstrapping from goldilocks\
          \ config...\"\n  s5cmd sync s3://elfhosted-config/goldilocks/$ELF_APP_NAME/*\
          \ /config/\n  touch /config/i-am-bootstrapped\nfi\n"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: b2-elfhosted-config-ro
              key: secret-key
        - name: S3_ENDPOINT_URL
          value: https://s3.us-west-000.backblazeb2.com
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
        resources:
          limits:
            cpu: '1'
            memory: 4Gi
          requests:
            cpu: '0'
            memory: 1Mi
        volumeMounts:
        - name: elfbot
          mountPath: /etc/elfbot
        - name: backup
          mountPath: /storage/backup
        - name: config
          mountPath: /config
          subPath: rclone
        - name: tmp
          mountPath: /tmp
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 568
          runAsGroup: 568
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
      - name: setup
        image: alpine/k8s:1.29.1
        command:
        - /bin/bash
        - -c
        - 'set -x

          set -e


          # add local remote if it doesn''t exist

          grep -q ''/storage'' /config/rclone.conf || cat /rclone-remote-storage >>
          /config/rclone.conf

          '
        resources:
          limits:
            cpu: '1'
            memory: 4Gi
          requests:
            cpu: '0'
            memory: 1Mi
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: rclone
        - name: tmp
          mountPath: /tmp
        - name: rclone-remote-storage
          mountPath: /rclone-remote-storage
          subPath: rclone-remote-storage
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 568
          runAsGroup: 568
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
      containers:
      - name: brunner56-rclonefm
        image: ghcr.io/elfhosted/rclone:1.69.3@sha256:9396f8c3a649dba9f91169a62142c9f3e6da00974bda573d864b62c07f78234e
        command:
        - /rclonefm.sh
        ports:
        - name: http
          containerPort: 5573
          protocol: TCP
        resources:
          limits:
            cpu: 150m
            memory: 512Mi
          requests:
            cpu: '0'
            memory: 60Mi
        volumeMounts:
        - name: backup
          mountPath: /backup
        - name: cache
          mountPath: /home/elfie/.cache
        - name: config
          mountPath: /config/
          subPath: rclone
        - name: elfbot
          mountPath: /elfbot
        - name: rclone
          mountPath: /storage/rclone
        - name: rclone-remote-storage
          mountPath: /rclone-remote-storage
          subPath: rclone-remote-storage
        - name: rclonefm-config
          mountPath: /var/lib/rclonefm/js/settings.js
          subPath: settings.js
        - name: rclonemountrealdebridzurg
          mountPath: /storage/realdebrid-zurg
        - name: symlinks
          mountPath: /storage/symlinks
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      schedulerName: default-scheduler
      priorityClassName: tenant-normal
      enableServiceLinks: false
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
