apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-brunner56-starter-deployment.fullname" . }}-brunner56-starter
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-brunner56-starter-deployment.labels" . | nindent 4 }}
  annotations:
    configmap.reloader.stakater.com/reload: tooling-scripts
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Starter.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Starter.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.brunner56Starter.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: starter
    {{- include "chart-brunner56-starter-deployment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: starter
      {{- include "chart-brunner56-starter-deployment.selectorLabels" . | nindent 8 }}
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: true
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          echo "This pod simple reserves contended resources for a tenant"
      
          sleep infinity
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.brunner56Starter.brunner56Starter.image.repository }}:{{ .Values.brunner56Starter.brunner56Starter.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Starter.brunner56Starter.imagePullPolicy }}
        name: brunner56-starter
        resources: {{- toYaml .Values.brunner56Starter.brunner56Starter.resources | nindent
          10 }}
        securityContext: {{- toYaml .Values.brunner56Starter.brunner56Starter.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /tooling-scripts
          name: tooling-scripts
      - command:
        - /usr/bin/dumb-init
        - /bin/bash
        - -c
        - /tooling-scripts/clean-up-dns-on-termination.sh
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: ELF_TENANT_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/instance']
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - secretRef:
            name: cloudflare-api-token
        image: {{ .Values.brunner56Starter.cleanUpDns.image.repository }}:{{ .Values.brunner56Starter.cleanUpDns.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Starter.cleanUpDns.imagePullPolicy }}
        name: clean-up-dns
        resources: {}
        securityContext: {{- toYaml .Values.brunner56Starter.cleanUpDns.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tooling-scripts
          name: tooling-scripts
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      initContainers:
      - command:
        - /usr/bin/dumb-init
        - /bin/bash
        - -c
        - /tooling-scripts/update-dns-on-init.sh
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: ELF_TENANT_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/instance']
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - secretRef:
            name: cloudflare-api-token
        image: {{ .Values.brunner56Starter.updateDns.image.repository }}:{{ .Values.brunner56Starter.updateDns.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.brunner56Starter.updateDns.imagePullPolicy }}
        name: update-dns
        resources: {}
        securityContext: {{- toYaml .Values.brunner56Starter.updateDns.containerSecurityContext
          | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tooling-scripts
          name: tooling-scripts
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Starter.podSecurityContext | nindent
        8 }}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config
      - configMap:
          defaultMode: 493
          name: tooling-scripts
        name: tooling-scripts
