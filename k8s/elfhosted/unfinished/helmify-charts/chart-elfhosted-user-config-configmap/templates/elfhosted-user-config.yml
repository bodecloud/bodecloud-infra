apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-elfhosted-user-config-configmap.fullname" . }}-elfhosted-user-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-elfhosted-user-config-configmap.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  USERID: {{ .Values.elfhostedUserConfig.userid | quote }}
  USERNAME: {{ .Values.elfhostedUserConfig.username | quote }}
  WEBDAV_PASSWORD: {{ .Values.elfhostedUserConfig.webdavPassword | quote }}
  WEBDAV_USERNAME: {{ .Values.elfhostedUserConfig.webdavUsername | quote }}
