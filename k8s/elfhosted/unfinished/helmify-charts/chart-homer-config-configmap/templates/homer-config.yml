apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-homer-config-configmap.fullname" . }}-homer-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-homer-config-configmap.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  config.yml: {{ .Values.homerConfig.configYml | toYaml | indent 1 }}
  custom.css: {{ .Values.homerConfig.customCss | toYaml | indent 1 }}
  disk_usage.sh: {{ .Values.homerConfig.diskUsageSh | toYaml | indent 1 }}
