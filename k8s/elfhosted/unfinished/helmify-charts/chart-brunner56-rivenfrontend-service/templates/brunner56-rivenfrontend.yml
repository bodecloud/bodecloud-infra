apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart-brunner56-rivenfrontend-service.fullname" . }}-brunner56-rivenfrontend
  labels:
    app.kubernetes.io/service: brunner56-rivenfrontend
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "chart-brunner56-rivenfrontend-service.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  type: {{ .Values.brunner56Rivenfrontend.type }}
  selector:
    app.kubernetes.io/instance: brunner56
    app.kubernetes.io/name: rivenfrontend
    {{- include "chart-brunner56-rivenfrontend-service.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.brunner56Rivenfrontend.ports | toYaml | nindent 2 }}
