apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-volsync-rs-symlinks-cache
  labels:
    app.kubernetes.io/created-by: volsync
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.pvc.volsyncRsSymlinksCache.storageRequest | quote }}
  storageClassName: {{ .Values.pvc.volsyncRsSymlinksCache.storageClass | quote }}
