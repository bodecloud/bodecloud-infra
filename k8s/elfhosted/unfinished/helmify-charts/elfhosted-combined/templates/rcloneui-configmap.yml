apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-rcloneui-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
data:
  TZ: {{ .Values.rcloneuiConfig.tz | quote }}
  config.yaml: {{ .Values.rcloneuiConfig.configYaml | toYaml | indent 1 }}
