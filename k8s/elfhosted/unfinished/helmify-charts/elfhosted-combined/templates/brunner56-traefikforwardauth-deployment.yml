apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elfhosted-combined.fullname" . }}-brunner56-traefikforwardauth
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-combined.labels" . | nindent 4 }}
  annotations:
    configmap.reloader.stakater.com/reload: traefik-forward-auth-config
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
spec:
  replicas: {{ .Values.brunner56Traefikforwardauth.replicas }}
  revisionHistoryLimit: {{ .Values.brunner56Traefikforwardauth.revisionHistoryLimit
    }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.brunner56Traefikforwardauth.strategy.rollingUpdate.maxSurge
        | quote }}
      maxUnavailable: {{ .Values.brunner56Traefikforwardauth.strategy.rollingUpdate.maxUnavailable
        | quote }}
    type: {{ .Values.brunner56Traefikforwardauth.strategy.type | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: traefikforwardauth
    {{- include "elfhosted-combined.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: traefikforwardauth
      {{- include "elfhosted-combined.selectorLabels" . | nindent 8 }}
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
      - env:
        - name: SECRET
          valueFrom:
            secretKeyRef:
              key: secret
              name: {{ include "elfhosted-combined.fullname" . }}-brunner56-traefikforwardauth
        - name: TZ
          value: {{ quote .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.env.tz
            }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - configMapRef:
            name: {{ include "elfhosted-combined.fullname" . }}-traefik-forward-auth-config
        image: '{{ .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.image.repository
          }}:{{ .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.image.tag
          | default .Chart.AppVersion }}'
        imagePullPolicy: {{ .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.imagePullPolicy
          }}
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 4181
          timeoutSeconds: 1
        name: brunner56-traefikforwardauth
        ports:
        - containerPort: 4181
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 4181
          timeoutSeconds: 1
        resources: {{- toYaml .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.resources
          | nindent 10 }}
        securityContext: {{- toYaml .Values.brunner56Traefikforwardauth.brunner56Traefikforwardauth.containerSecurityContext
          | nindent 10 }}
        startupProbe:
          failureThreshold: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 4181
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {{- toYaml .Values.brunner56Traefikforwardauth.podSecurityContext
        | nindent 8 }}
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
