    \       subtitle: \"Manage Plex / Emby / Jellyfin Accounts / Invites\"\n        tag:
    \"public\"\n        tagstyle: \"is-danger\"\n        url: \"https://brunner56-wizarr.elfhosted.com\"\n
    \       target: \"_blank\" # optional html tag target attribute\n      - name:
    \"Riven\"\n        icon: \"fas fa-mountain\"\n        subtitle: \"All-in-one Debrid
