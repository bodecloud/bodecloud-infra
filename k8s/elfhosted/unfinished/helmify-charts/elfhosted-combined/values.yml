    \       logo: \"assets/png/real-debrid.png\"\n        subtitle: \"Manage RealDebrid
    Mount\"\n        tag: \"protected\"\n        tagstyle: \"is-success\"\n        url:
    \"https://brunner56-zurg.elfhosted.com/http/\"\n        target: \"_blank\" # optional
