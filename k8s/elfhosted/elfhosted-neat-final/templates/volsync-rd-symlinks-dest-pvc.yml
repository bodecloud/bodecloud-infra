apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "elfhosted-neat-final.fullname" . }}-volsync-rd-symlinks-dest
  labels:
    app.kubernetes.io/created-by: volsync
  {{- include "elfhosted-neat-final.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.pvc.volsyncRdSymlinksDest.storageRequest | quote }}
  storageClassName: {{ .Values.pvc.volsyncRdSymlinksDest.storageClass | quote }}
