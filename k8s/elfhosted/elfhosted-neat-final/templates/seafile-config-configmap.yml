apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elfhosted-neat-final.fullname" . }}-seafile-config
  labels:
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: my-media-stack
  {{- include "elfhosted-neat-final.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: my-media-stack
data:
  SEAFILE_ADMIN_EMAIL: {{ .Values.seafileConfig.seafileAdminEmail | quote }}
  ccnet.conf: {{ .Values.seafileConfig.ccnetConf | toYaml | indent 1 }}
