apiVersion: v1
data:
  failover-controller.sh: |
    #!/bin/bash
    set -euo pipefail

    # VPN Gateway priority
    VPN_GATEWAYS=(
      "gluetun-premiumize-us:8888:http"
      "gluetun-premiumize-nl:8888:http"
      "gluetun-premiumize-gb:8888:http"
      "gluetun-premiumize-de:8888:http"
      "gluetun-premiumize-ca:8888:http"
      "gluetun-airvpn:8888:http"
      "warp-gateway:1080:socks5"
    )
    # Function
    to test gateway connectivity
    test_gateway() {
      local gateway_info="$1"
      IFS=':' read -r gateway port type <<< "$gateway_info"
      local proxy_url
      if [[ "$type" == "socks5" ]]; then
        proxy_url="socks5://${gateway}.vpn-gateway.svc.cluster.local:${port}"
      else
        proxy_url="http://${gateway}.vpn-gateway.svc.cluster.local:${port}"
      fi
      timeout 10 curl -s --max-time 5 --proxy "$proxy_url" http://httpbin.org/ip >/dev/null 2>&1
      return $?
    }
    # Function to get current active gateway
    get_active_gateway() {
      for gateway_info in "${VPN_GATEWAYS[@]}"; do
        IFS=':' read -r gateway port type <<< "$gateway_info"
        local replicas=$(kubectl get deployment "$gateway" -n vpn-gateway -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
        if [[ "$replicas" -gt 0 ]]; then
          echo "$gateway_info"
          return
        fi
      done
      echo ""
    }
    # Main failover logic
    while true; do
      echo "=== VPN Gateway Failover Check $(date) ==="
      new_gateway_found=false
      for gateway_info in "${VPN_GATEWAYS[@]}"; do
        IFS=':' read -r gateway port type <<< "$gateway_info"
        echo "Testing failover candidate: $gateway"
        # Scale up the candidate
        scale_deployment "$gateway" 1
        # Wait for pod to be ready
        echo "Waiting for $gateway to be ready..."
        kubectl wait --for=condition=ready pod -l app="$gateway" -n vpn-gateway --timeout=120s >/dev/null 2>&1 || continue
        # Test the gateway
        sleep 10  # Give it a moment to fully initialize
        if test_gateway "$gateway_info"; then
          echo "✅ Failover successful to $gateway"
          new_gateway_found=true
          break
        else
          echo "✗ $gateway failed health check, trying next"
          scale_deployment "$gateway" 0
        fi
      done
      if [[ "$new_gateway_found" == false ]]; then
        echo "❌ All VPN gateways failed! No connectivity available."
      fi
      echo "=== End Failover Check ==="
      sleep 30
    done
    # Function to scale deployment
    scale_deployment() {
      local deployment="$1"
      local replicas="$2"
      kubectl scale deployment "$deployment" --replicas="$replicas" -n vpn-gateway >/dev/null 2>&1 || true
    }
    # Function to get current active gateway
    get_active_gateway() {
      for gateway_info in "${VPN_GATEWAYS[@]}"; do
        IFS=':' read -r gateway port type <<< "$gateway_info"
        local replicas=$(kubectl get deployment "$gateway" -n vpn-gateway -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
        if [[ "$replicas" -gt 0 ]]; then
          echo "$gateway_info"
          return
        fi
      done
      echo ""
    }
    # Main failover logic
    while true; do
      echo "=== VPN Gateway Failover Check $(date) ==="
      current_active=$(get_active_gateway)
      if [[ -n "$current_active" ]]; then
        IFS=':' read -r current_gateway current_port current_type <<< "$current_active"
        echo "Current active gateway: $current_gateway"
        # Test current gateway
        if test_gateway "$current_active"; then
          echo "✓ Current gateway $current_gateway is healthy"
          sleep 30
          continue
        else
          echo "✗ Current gateway $current_gateway is unhealthy, initiating failover"
          scale_deployment "$current_gateway" 0
        fi
      else
        echo "No active gateway found, starting failover"
      fi
      # Find next working gateway
      new_gateway_found=false
      for gateway_info in "${VPN_GATEWAYS[@]}"; do
        IFS=':' read -r gateway port type <<< "$gateway_info"
        echo "Testing failover candidate: $gateway"
        # Scale up the candidate
        scale_deployment "$gateway" 1
        # Wait for pod to be ready
        echo "Waiting for $gateway to be ready..."
        kubectl wait --for=condition=ready pod -l app="$gateway" -n vpn-gateway --timeout=120s >/dev/null 2>&1 || continue
        # Test the gateway
        sleep 10  # Give it a moment to fully initialize
        if test_gateway "$gateway_info"; then
          echo "✅ Failover successful to $gateway"
          new_gateway_found=true
          break
        else
          echo "✗ $gateway failed health check, trying next"
          scale_deployment "$gateway" 0
        fi
      done
      if [[ "$new_gateway_found" == false ]]; then
        echo "❌ All VPN gateways failed! No connectivity available."
      fi
      echo "=== End Failover Check ==="
      sleep 30
    done
    # Function to scale deployment
    scale_deployment() {
      local deployment="$1"
      local replicas="$2"
      kubectl scale deployment "$deployment" --replicas="$replicas" -n vpn-gateway >/dev/null 2>&1 || true
    }

  resolve-premiumize.sh: |
    #!/bin/bash
    set -euo pipefail

    COUNTRY="$1"
    HOSTNAME="vpn-${COUNTRY}.premiumize.me"
    CONFIG_FILE="/gluetun/premiumize-${COUNTRY}.ovpn"
    AUTH_FILE="/gluetun/auth.conf"

    echo "=== Dynamic VPN Configuration for Premiumize ${COUNTRY^^} ==="
    echo "Hostname: $HOSTNAME"

    # Resolve hostname with retries
    echo "Resolving $HOSTNAME..."
    IP=""
    for i in {1..10}; do
      if IP=$(getent hosts "$HOSTNAME" | awk '{print $1}' | head -1); then
        if [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "✓ Resolved $HOSTNAME -> $IP (attempt $i)"
          break
        fi
      fi
      echo "Resolution attempt $i failed, retrying in 2s..."
      sleep 2
    done

    if [[ -z "$IP" ]]; then
      echo "❌ Failed to resolve $HOSTNAME after 10 attempts"
      exit 1
    fi

    # Create OpenVPN config with resolved IP
    cat > "$CONFIG_FILE" << EOF
    remote $IP 1194
    verify-x509-name CN=$HOSTNAME
    client
    dev tun
    proto udp
    cipher AES-256-CBC
    resolv-retry infinite
    nobind
    persist-key
    persist-tun
    auth-user-pass /gluetun/auth.conf
    verb 3
    auth SHA256
    key-direction 1
    <ca>
    -----BEGIN CERTIFICATE-----
