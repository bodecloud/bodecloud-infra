    # Create auth file
    echo "117274388" > "$AUTH_FILE"
    echo "6i6zgswm35baj3ur" >> "$AUTH_FILE"

    echo "✅ Configuration complete for ${COUNTRY^^}"
    echo "   Config: $CONFIG_FILE"
    echo "   Remote: $IP (resolved from $HOSTNAME)"
