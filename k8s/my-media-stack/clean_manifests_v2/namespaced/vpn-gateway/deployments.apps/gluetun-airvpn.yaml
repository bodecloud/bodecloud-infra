  labels:
    app: gluetun-airvpn
    component: vpn-gateway
    priority: "2"
  name: gluetun-airvpn
  namespace: vpn-gateway
spec:
  progressDeadlineSeconds: 600
  replicas: 0
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gluetun-airvpn
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gluetun-airvpn
        component: vpn-gateway
    spec:
      containers:
      - env:
        - name: VPN_SERVICE_PROVIDER
          value: airvpn
        - name: OPENVPN_CIPHERS
          value: aes-256-gcm
        - name: SERVER_COUNTRIES
          value: United States
        - name: HTTP_PROXY
          value: "on"
        - name: HTTP_PROXY_ADDRESS
          value: 0.0.0.0:8888
        - name: SHADOWSOCKS
          value: "on"
        - name: SHADOWSOCKS_ADDRESS
          value: 0.0.0.0:8388
        - name: HEALTH_SERVER_ADDRESS
          value: 0.0.0.0:9999
        image: ghcr.io/qdm12/gluetun:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: gluetun
        ports:
        - containerPort: 8888
          name: http-proxy
          protocol: TCP
        - containerPort: 8388
          name: shadowsocks
          protocol: TCP
        - containerPort: 9999
          name: health
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
      - command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          # Start DHCP server for VXLAN clients
          cat > /tmp/dnsmasq.conf << EOF
          interface=vxlan0
          bind-interfaces
          dhcp-range=${VXLAN_IP_NETWORK}.${VXLAN_GATEWAY_FIRST_DYNAMIC_IP},${VXLAN_IP_NETWORK}.254,12h
          dhcp-option=3,${VXLAN_IP_NETWORK}.1
          dhcp-option=6,${VXLAN_IP_NETWORK}.1
          server=10.96.0.10
          EOF
          # Start dnsmasq for DHCP and DNS
          dnsmasq --conf-file=/tmp/dnsmasq.conf
          --no-daemon &
          # Health monitoring
          while true; do
            if ip link show tun0 >/dev/null 2>&1; then
              if timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1; then
                echo "$(date): VPN Gateway healthy - tun0 connected"
              else
                echo "$(date): VPN Gateway unhealthy - no external connectivity"
              fi
            else
              echo "$(date): VPN Gateway unhealthy - tun0 not found"
            fi
          sleep 30
          done
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        name: gateway-sidecar
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          # Enable IP forwarding
          echo 1 > /proc/sys/net/ipv4/ip_forward
          # Create VXLAN interface
          VXLAN_GATEWAY_IP="${VXLAN_IP_NETWORK}.1"
          ip link add vxlan0 type vxlan id $VXLAN_ID dev eth0 dstport $VXLAN_PORT || true
          ip addr add ${VXLAN_GATEWAY_IP}/24 dev vxlan0 || true
          ip link set up dev vxlan0
          ip link set mtu $VPN_INTERFACE_MTU dev vxlan0 || true
          # Set routing rules
          ip rule add from all lookup main suppress_prefixlength 0 preference 50 || true
          # Configure iptables for NAT and forwarding
          iptables -t nat -A POSTROUTING -j MASQUERADE || true
          iptables -A INPUT -i eth0 -p udp --dport=$VXLAN_PORT -j ACCEPT || true
          iptables -A INPUT -i vxlan0 -p udp --sport=68 --dport=67 -j ACCEPT || true
          echo "Gateway init complete"
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        name: gateway-init
        resources: {}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: "1"
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 493
          name: pod-gateway-config
        name: config
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/gluetun/airvpn
          type: DirectoryOrCreate
        name: gluetun-config
  conditions:
  - lastTransitionTime: "2025-06-14T17:40:43Z"
