    reason: NewReplicaSetAvailable
    type: Progressing
  - lastTransitionTime: "2025-06-14T22:30:31Z"
    lastUpdateTime: "2025-06-14T22:30:31Z"
    message: Deployment has minimum availability.
    reason: MinimumReplicasAvailable
    type: Available
  observedGeneration: 24
