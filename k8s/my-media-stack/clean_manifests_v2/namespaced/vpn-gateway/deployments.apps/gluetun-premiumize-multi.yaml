apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gluetun-premiumize-multi
    component: vpn-gateway
  name: gluetun-premiumize-multi
  namespace: vpn-gateway
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gluetun-premiumize-multi
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gluetun-premiumize-multi
        component: vpn-gateway
    spec:
      containers:
      - name: gluetun
        image: ghcr.io/qdm12/gluetun:latest
        imagePullPolicy: Always
        env:
        - name: VPN_SERVICE_PROVIDER
          value: custom
        - name: VPN_TYPE
          value: openvpn
        - name: OPENVPN_CUSTOM_CONFIG
          value: /gluetun/current.ovpn
        - name: HTTP_PROXY
          value: "on"
        - name: HTTP_PROXY_ADDRESS
          value: 0.0.0.0:8888
        - name: SHADOWSOCKS
          value: "on"
        - name: SHADOWSOCKS_ADDRESS
          value: 0.0.0.0:8388
        - name: HEALTH_SERVER_ADDRESS
          value: 0.0.0.0:9999
        - name: VPN_COUNTRY_PRIORITY
          value: "nl,de,fr,gb,us,ca,ch,be,au,cz,es,fi,gr,it,jp,pl,sg"
        - name: VPN_RECONNECT_DELAY
          value: "60"
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        ports:
        - containerPort: 8888
          name: http-proxy
          protocol: TCP
        - containerPort: 8388
          name: shadowsocks
          protocol: TCP
        - containerPort: 9999
          name: health
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
      - name: gateway-sidecar
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          
          # Start DHCP server for VXLAN clients
          cat > /tmp/dnsmasq.conf << EOF
          interface=vxlan0
          bind-interfaces
          dhcp-range=${VXLAN_IP_NETWORK}.${VXLAN_GATEWAY_FIRST_DYNAMIC_IP},${VXLAN_IP_NETWORK}.254,12h
          dhcp-option=3,${VXLAN_IP_NETWORK}.1
          dhcp-option=6,${VXLAN_IP_NETWORK}.1
          server=10.96.0.10
          EOF
          
          # Start dnsmasq for DHCP and DNS
          dnsmasq --conf-file=/tmp/dnsmasq.conf --no-daemon &
          
          # Health monitoring
          while true; do
            if ip link show tun0 >/dev/null 2>&1; then
              if timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1; then
                echo "$(date): VPN Gateway healthy - tun0 connected"
              else
                echo "$(date): VPN Gateway unhealthy - no external connectivity"
              fi
            else
              echo "$(date): VPN Gateway unhealthy - tun0 not found"
            fi
            sleep 30
          done
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /config
          name: config
      - name: vpn-failover-manager
        image: alpine:latest
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        - |
          # Install required packages
          apk add --no-cache bind-tools curl bash jq

          # Auth credentials
          USERNAME="117274388"
          PASSWORD="6i6zgswm35baj3ur"
          
          # Get country priority list from environment variable
          IFS=',' read -ra COUNTRY_PRIORITY <<< "${VPN_COUNTRY_PRIORITY}"
          RECONNECT_DELAY=${VPN_RECONNECT_DELAY:-60}
          
          # Function to create OpenVPN config for a country
          create_config() {
            local country=$1
            local hostname="vpn-${country}.premiumize.me"
            local config_file="/gluetun/vpn-${country}.premiumize.me.ovpn"
            local auth_file="/gluetun/auth.conf"
            
            echo "=== Resolving $hostname ==="
            
            # Resolve hostname with retries
            local ip=""
            for i in $(seq 1 5); do
                if ip=$(dig +short $hostname | head -1); then
                    if echo "$ip" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                        echo "✓ Resolved $hostname -> $ip (attempt $i)"
                        break
                    fi
                fi
                echo "Resolution attempt $i failed, retrying in 2s..."
                sleep 2
            done
            
            if [ -z "$ip" ]; then
                echo "❌ Failed to resolve $hostname after 5 attempts"
                return 1
            fi
            
            # Create OpenVPN config
            cat > "$config_file" << EOF
          remote $ip 1194
          verify-x509-name CN=$hostname
          client
          dev tun
          proto udp
          cipher AES-256-CBC
          resolv-retry infinite
          nobind
          persist-key
          persist-tun
          auth-user-pass /gluetun/auth.conf
          verb 3
          auth SHA256
          key-direction 1
          <ca>
          -----BEGIN CERTIFICATE-----
          MIIFJTCCAw2gAwIBAgIRAPAmbQRNE+PBqvFyFG8GOSIwDQYJKoZIhvcNAQELBQAw
          LDEYMBYGA1UECgwPU2VjdXJlIFNlcnZpY2VzMRAwDgYDVQQDDAdSb290IFgxMB4X
          DTIxMDEwNDE1MjEwM1oXDTQwMTIzMDE1MjEwM1owLDEYMBYGA1UECgwPU2VjdXJl
          IFNlcnZpY2VzMRAwDgYDVQQDDAdSb290IFgxMIICIjANBgkqhkiG9w0BAQEFAAOC
          Ag8AMIICCgKCAgEAvuhFcbO0Y5SXBr+h/XU1sPXo/OSjN4W32jzVZ3jmkqA2nH5D
          dI5XYHYB9JkW23K37zOlvOWj9J3HiV6WYk0uqQ3cpqDMnIpi1MJCtSRxiaD7LTNO
          XrvLpsREq9Vf+lN+zxFxhINv3W4jUyfx5zIjPyjY+vFgH5G56b12EeLKFLYUWwgF
          9vTicXJvlV1h+TJVF8wZ5DugrgNZhSZ6QZzda0Zdu1dCwZOafd1GGDWPubgZ8enF
          b9gWPGZmS59ZvlLsLQmtLvCEegELzRR5G/OI1CIntcImcKO9ZDdWP+HmqJ4Ss7Ng
          0g5xQVx9VgMxwpHw4h/tMV8q1vQQZJXJHdoDRQr5RzVnMjq90FFMd3nfX1B6cheH
          cBq31J84ifxcO2vIz/eK/6zNyynuj2+99Yz7MsYI+sfGznngglpYo9u3xNkRfRPP
          TA/tXAzrGRqlHmJmMStfutIfHxea4jJCGOeb5eUETQ1kXf5sMSdf0+Ya64h9Kcxw
          afMzU8qUAMk4ei+jTEAuUQ25Jq0orFc5D2Pv7RbU9CCzIML2KqqWTThKSSVQbW0x
          ufQDxcFZKSKL03484zVPBDMQ65enBUC+9Or9YKT0S0F1IdOX4EUGpqzQAocHFF3u
          G1zYz5cjYq2xHRBZAYs6SQH6f16bPrk66uA2B/vZJm5L9Kzni5q46IGsCUsCAwEA
          AaNCMEAwDgYDVR0PAQH/BAQDAgEGMA8GA1UdEwEB/wQFMAMBAf8wHQYDVR0OBBYE
          FETGtuYkU3IlxCvmtkAzpP5Xuf+DMA0GCSqGSIb3DQEBCwUAA4ICAQBdTlQtxa6a
          PXaZpzsi5gLGrDUhnoTF5cVvt9vYa6c7IaAuYIUMGN1WiwHUL0g1udxi7iC3oBzM
          Mc6shYMijEMG9SvC0RJOky1BCPbKdlsRDQbYLgjN5X1fEDDu1cR/vInt/K6vTcLf
          1ud6VFgDv8uYG1X9GVs6foAqjYTLt1A99cwHtyCZRxrBLyjgE8S2U07FDpakqlMo
          j4S1lgvw4EuEN54Yo55wLv9J0pZ1w9LEpZ4VdEVzLmwYMPG25Ow7HFZDK7j0TZkA
          ByvxUvNGWDk5MS71BtWzhrmmPh9kN3HobkfOllqUsE03QaLggg+pe+OYNdIlCBRz
          9QJeMtGP7afdBZ5UUL8df0fWL0adUzk1N/1kvAmbvccNu7tej/4LLVv9j1aQtI76
          iEXh0WIWTAOz9IsQyP21PhxG01Y3ScIrbOsP+IX+RL/VK4yfTZ2jICj7js8vm6ut
          qw3FPyZgeZuBe0gk0cF4vPuFacS23PkEFXbVnt4h40xKwR5ezGshS5I36nXowTdh
          uJPLnZaLGjsiFpprztwwDZkDLu5uT6YhT/M6Kb0V3s3a2W1N90eNjo5WEe/poCgr
          1+NVJNJQ71s3kodfghA/t1iivJEl58scVLxxJXyhCK+k5IPAB0syq2cR4AKnr/fe
          9WFpWZc7lKeI4rwzGej+kMCQ6ujinVPyRA==
          -----END CERTIFICATE-----
          </ca>
          EOF
            
            # Create auth file (same for all countries)
            echo "$USERNAME" > "$auth_file"
            echo "$PASSWORD" >> "$auth_file"
            
            echo "✅ Configuration complete for ${country^^}"
            return 0
          }
          
          # Function to check if VPN is working
          check_vpn() {
            if ip link show tun0 >/dev/null 2>&1; then
              if timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1; then
                return 0  # VPN is working
              fi
            fi
            return 1  # VPN is not working
          }
          
          # Create auth file (same for all countries)
          echo "$USERNAME" > "/gluetun/auth.conf"
          echo "$PASSWORD" >> "/gluetun/auth.conf"
          
          # Generate configs for all countries in priority list
          for country in "${COUNTRY_PRIORITY[@]}"; do
            create_config "$country" || echo "Failed to create config for $country"
          done
          
          # Initial VPN setup - start with highest priority
          current_index=0
          current_country="${COUNTRY_PRIORITY[$current_index]}"
          cp "/gluetun/vpn-${current_country}.premiumize.me.ovpn" /gluetun/current.ovpn
          echo "Initial VPN setup using country: ${current_country^^}"
          
          # Monitor and failover loop
          while true; do
            sleep 30
            
            # Check if current VPN is working
            if check_vpn; then
              echo "$(date): VPN connection to ${current_country^^} is working"
            else
              echo "$(date): VPN connection to ${current_country^^} is down, trying next server..."
              
              # Try next country in priority list
              current_index=$((current_index + 1))
              if [ $current_index -ge ${#COUNTRY_PRIORITY[@]} ]; then
                current_index=0  # Wrap around to beginning
                echo "Tried all countries, starting over from beginning"
              fi
              
              current_country="${COUNTRY_PRIORITY[$current_index]}"
              echo "Switching to ${current_country^^}"
              
              # Update the current.ovpn symlink
              cp "/gluetun/vpn-${current_country}.premiumize.me.ovpn" /gluetun/current.ovpn
              
              # Signal gluetun to reconnect (by touching a file it watches)
              touch /tmp/gluetun_restart
              
              # Wait for reconnection attempt
              echo "Waiting ${RECONNECT_DELAY}s for reconnection..."
              sleep $RECONNECT_DELAY
            fi
          done
        env:
        - name: VPN_COUNTRY_PRIORITY
          value: "nl,de,fr,gb,us,ca,ch,be,au,cz,es,fi,gr,it,jp,pl,sg"
        - name: VPN_RECONNECT_DELAY
          value: "60"
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
      initContainers:
      - name: gateway-init
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          
          # Enable IP forwarding
          echo 1 > /proc/sys/net/ipv4/ip_forward
          
          # Create VXLAN interface
          VXLAN_GATEWAY_IP="${VXLAN_IP_NETWORK}.1"
          ip link add vxlan0 type vxlan id $VXLAN_ID dev eth0 dstport $VXLAN_PORT || true
          ip addr add ${VXLAN_GATEWAY_IP}/24 dev vxlan0 || true
          ip link set up dev vxlan0
          ip link set mtu $VPN_INTERFACE_MTU dev vxlan0 || true
          
          # Set routing rules
          ip rule add from all lookup main suppress_prefixlength 0 preference 50 || true
          
          # Configure iptables for NAT and forwarding
          iptables -t nat -A POSTROUTING -j MASQUERADE || true
          iptables -A INPUT -i eth0 -p udp --dport=$VXLAN_PORT -j ACCEPT || true
          iptables -A INPUT -i vxlan0 -p udp --sport=68 --dport=67 -j ACCEPT || true
          
          echo "Gateway init complete"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        volumeMounts:
        - mountPath: /config
          name: config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: "1"
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config
        configMap:
          defaultMode: 493
          name: pod-gateway-config
      - name: gluetun-config
        emptyDir: {}
