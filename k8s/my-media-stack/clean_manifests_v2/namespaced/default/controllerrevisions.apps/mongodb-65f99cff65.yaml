apiVersion: apps/v1
data:
  spec:
    template:
      $patch: replace
      metadata:
        labels:
          app.elfhosted.com/name: mongodb
          app.kubernetes.io/instance: myprecious
          app.kubernetes.io/name: mongodb
      spec:
        containers:
        - env:
          - name: MONGO_INITDB_ROOT_USERNAME
            value: mongodb
          - name: MONGO_INITDB_ROOT_PASSWORD
            value: your-mongodb-password
          - name: MONGO_INITDB_DATABASE
            value: myprecious
          image: mongo:7
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            tcpSocket:
              port: 27017
            timeoutSeconds: 10
          name: mongodb
          ports:
          - containerPort: 27017
            name: main
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 27017
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /data/db
            name: mongodb-data
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
kind: ControllerRevision
