  PLEX_PREFERENCE_16: ButlerEndHour=10
  PLEX_PREFERENCE_17: ButlerTaskDeepMediaAnalysis=0
  PLEX_PREFERENCE_18: ButlerTaskUpgradeMediaAnalysis=0
  WAIT_FOR_VPN: "true"
