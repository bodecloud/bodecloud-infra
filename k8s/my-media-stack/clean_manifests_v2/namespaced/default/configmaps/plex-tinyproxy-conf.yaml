apiVersion: v1
data:
  tinyproxy.conf: |-
    User tinyproxy
    Group tinyproxy
    Port 8888
    Listen 0.0.0.0
    Timeout 600
    DefaultErrorFile "/usr/share/tinyproxy/default.html"
    StatFile "/usr/share/tinyproxy/stats.html"
    Logfile "/var/log/tinyproxy/tinyproxy.log"
    LogLevel Info
    PidFile "/var/run/tinyproxy/tinyproxy.pid"
    MaxClients 100
    MinSpareServers 5
    MaxSpareServers 20
    StartServers 10
    MaxRequestsPerChild 0
    Allow 127.0.0.1
    Allow 10.0.0.0/8
    Allow 172.16.0.0/12
    Allow 192.168.0.0/16
    ViaProxyName "tinyproxy"
    ConnectPort 443
    ConnectPort 563
kind: ConfigMap
metadata:
  annotations:
