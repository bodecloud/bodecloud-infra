apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: ddns-updater
    pod-template-hash: 5b7596c84c
  name: ddns-updater-5b7596c84c
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: ddns-updater
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddns-updater
      pod-template-hash: 5b7596c84c
  template:
    metadata:
      labels:
        app: ddns-updater
        pod-template-hash: 5b7596c84c
    spec:
      containers:
      - env:
        - name: PUID
          value: "1001"
        - name: PGID
          value: "988"
        - name: BACKUP_DIRECTORY
          value: /updater/data
        - name: BACKUP_PERIOD
          value: 1h
        - name: CONFIG_FILEPATH
          value: /updater/data/config.json
        - name: HTTP_TIMEOUT
          value: 10s
        - name: LISTENING_ADDRESS
          value: 0.0.0.0:7998
        - name: LOG_CALLER
          value: hidden
        - name: LOG_LEVEL
          value: info
        - name: PERIOD
          value: 5m
        - name: PUBLICIPV4_HTTP_PROVIDERS
          value: all
        - name: PUBLICIPV6_HTTP_PROVIDERS
          value: all
        - name: PUBLICIP_DNS_PROVIDERS
          value: all
        - name: PUBLICIP_DNS_TIMEOUT
          value: 3s
        - name: PUBLICIP_FETCHERS
          value: all
        - name: PUBLICIP_HTTP_PROVIDERS
          value: all
        - name: ROOT_URL
          value: /
        - name: SHOUTRRR_ADDRESSES
        - name: UPDATE_COOLDOWN_PERIOD
          value: 5m
        image: qmcgaw/ddns-updater
        imagePullPolicy: IfNotPresent
        name: ddns-updater
        ports:
        - containerPort: 8000
          name: ddns-8000
          protocol: TCP
        - containerPort: 7998
          name: ddns-7998
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /updater/data
          name: updater-data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/ddns-updater/updater/data
          type: ""
        name: updater-data
  fullyLabeledReplicas: 1
  observedGeneration: 1
  replicas: 1
