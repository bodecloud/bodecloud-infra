apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: jackett
    pod-template-hash: 56755c4f59
  name: jackett-56755c4f59
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: jackett
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jackett
      pod-template-hash: 56755c4f59
  template:
    metadata:
      labels:
        app: jackett
        pod-template-hash: 56755c4f59
    spec:
      containers:
      - env:
        - name: PGID
          value: "988"
        - name: PUID
          value: "1002"
        - name: TZ
          value: America/Chicago
        - name: UMASK
          value: "022"
        image: linuxserver/jackett
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -fs http://127.0.0.1:9117/api/v2.0/indexers/all/results/torznab?t=indexers&apikey=nnx0n84pcj7umynyd2pbid2nl1zzuemz
              || exit 1
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        name: jackett
        ports:
        - containerPort: 9117
          name: jackett-9117
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          runAsGroup: 988
          runAsUser: 1002
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/jackett/config
          type: ""
        name: config
  availableReplicas: 1
  fullyLabeledReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
