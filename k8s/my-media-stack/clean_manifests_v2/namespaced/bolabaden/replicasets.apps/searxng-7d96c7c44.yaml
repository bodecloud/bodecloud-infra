apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: searxng
    pod-template-hash: 7d96c7c44
  name: searxng-7d96c7c44
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
      pod-template-hash: 7d96c7c44
  template:
    metadata:
      labels:
        app: searxng
        pod-template-hash: 7d96c7c44
    spec:
      containers:
      - env:
        - name: PGID
          value: "988"
        - name: PUID
          value: "1001"
        - name: SEARXNG_BASE_URL
          value: http://searxng:8080
        - name: TZ
          value: America/Chicago
        - name: UMASK
          value: "002"
        image: searxng/searxng:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit
              1
          failureThreshold: 3
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        name: searxng
        ports:
        - containerPort: 8080
          name: searxng-8080
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/searxng
          name: etc-searxng
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/searxng
          type: ""
        name: etc-searxng
  availableReplicas: 1
  fullyLabeledReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
