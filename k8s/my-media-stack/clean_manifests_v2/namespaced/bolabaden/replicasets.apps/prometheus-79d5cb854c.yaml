apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: prometheus
    pod-template-hash: 79d5cb854c
  name: prometheus-79d5cb854c
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
      pod-template-hash: 79d5cb854c
  template:
    metadata:
      labels:
        app: prometheus
        pod-template-hash: 79d5cb854c
    spec:
      containers:
      - args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.retention.size=1GB
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --web.enable-lifecycle
        env:
        - name: PGID
          value: "988"
        - name: PUID
          value: "1002"
        - name: TZ
          value: America/Chicago
        - name: UMASK
          value: "022"
        image: prom/prometheus
        imagePullPolicy: IfNotPresent
        name: prometheus
        ports:
        - containerPort: 9090
          name: prometheus-9090
          protocol: TCP
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/prometheus
          name: etc-prometheus
        - mountPath: /etc/prometheus/console_libraries
          name: etc-prometheus-console-libraries
        - mountPath: /etc/prometheus/consoles
          name: etc-prometheus-consoles
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/prometheus
          type: ""
        name: etc-prometheus
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/prometheus/console_libraries
          type: ""
        name: etc-prometheus-console-libraries
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/prometheus/consoles
          type: ""
        name: etc-prometheus-consoles
  availableReplicas: 1
  fullyLabeledReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
