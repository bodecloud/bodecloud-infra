---
all:
  children:
    k3s_cluster:
      children:
        master:
          hosts:
            beatapostapita:
              ansible_host: "100.99.45.35"
              external_ip: "207.211.189.95"
              k3s_node_role: master
              k3s_server: true
              tailscale_hostname: "beatapostapita"

        agents:
          hosts:
            baden:
              ansible_host: "100.93.120.11"
              k3s_node_role: agent
              k3s_server: false
              tailscale_hostname: "baden"

            cloudserver:
              ansible_host: "100.95.154.8"
              k3s_node_role: agent
              k3s_server: false
              tailscale_hostname: "cloudserver"

            micklethefickle:
              ansible_host: "100.125.162.37"
              k3s_node_role: agent
              k3s_server: false
              tailscale_hostname: "micklethefickle"

            wizard-pc:
              ansible_host: "100.74.62.44"
              k3s_node_role: agent
              k3s_server: false
              tailscale_hostname: "wizard-pc"

  vars:
    # Ansible configuration
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_python_interpreter: /usr/bin/python3

    # Load cluster configuration from centralized config file
    # This file contains all environment-specific values
    cluster_config_file: "{{ playbook_dir }}/cluster-config.yml"

    # Import environment variables from .env file
    env_file: "{{ playbook_dir }}/../../.env"

    # K3s Configuration - these will be overridden by cluster config
    k3s_version: "v1.33.0+k3s1"
    k3s_token: "e96353e53c085c131e7f7d7d7e0845bf4895519a7e1899aebc5b3c6a40c6ff6a"
    k3s_datastore_endpoint: ""
    k3s_server_location: "/var/lib/rancher/k3s"
    k3s_cluster_cidr: "10.42.0.0/16"
    k3s_service_cidr: "10.43.0.0/16"
    k3s_cluster_dns: "10.43.0.10"

    # K3s server args for master node
    k3s_server_args:
      - "--write-kubeconfig-mode=644"
      - "--cluster-cidr={{ k3s_cluster_cidr }}"
      - "--service-cidr={{ k3s_service_cidr }}"
      - "--cluster-dns={{ k3s_cluster_dns }}"
      - "--bind-address=0.0.0.0"
      - "--advertise-address={{ hostvars[inventory_hostname]['ansible_host'] }}"
      - "--node-external-ip={{ hostvars[inventory_hostname]['external_ip'] | default(hostvars[inventory_hostname]['ansible_host']) }}"
      - "--disable=traefik"
      - "--disable=servicelb"
      - "--flannel-backend=vxlan"

    # K3s agent args for worker nodes
    k3s_agent_args:
      - "--node-external-ip={{ hostvars[inventory_hostname]['ansible_host'] }}"

    # Infrastructure Configuration
    infrastructure:
      timezone: "America/Chicago"
      puid: 1001
      pgid: 989
      umask: "002"

      # Storage paths
      root_dir: "/home/ubuntu/my-media-stack"
      config_path: "/home/ubuntu/my-media-stack/configs"
      data_path: "/home/ubuntu/my-media-stack/data"
      secrets_path: "/home/ubuntu/my-media-stack/secrets"

    # Deployment flags - services to deploy on the cluster
    deploy_services:
      # Core infrastructure (always enabled)
      traefik: true
      cert_manager: true
      vpn_gateway: true

      # Networking
      pod_gateway: true
      metallb: true

      # Storage
      longhorn: false

      # Media services
      plex: true
      jellyfin: false
      tautulli: true

      # Servarr stack
      sonarr: true
      radarr: true
      prowlarr: true
      bazarr: true
      lidarr: false
      readarr: false

      # Download clients
      qbittorrent: false
      sabnzbd: false

      # Stremio addons
      comet: true
      mediafusion: true
      torrentio: true
      zilean: true

      # Utilities
      homepage: true
      speedtest_tracker: true

      # Development
      code_server: false

      # AI/LLM
      lobechat: false

      # Monitoring
      grafana: false
      prometheus: false

      # Databases
      redis: true
      mongodb: true
      postgresql: false
