- apiVersion: v1
  data:
    inject.py: "#!/usr/bin/env python3\nimport json\nimport base64\nimport random\nfrom
      http.server import HTTPServer, BaseHTTPRequestHandler\nimport ssl\n\n# VPN Gateway
      endpoints\nVPN_GATEWAYS = [\n    \"http://gluetun-airvpn.vpn-gateway.svc.cluster.local:8888\",\n
      \   \"http://gluetun-premiumize-nl.vpn-gateway.svc.cluster.local:8888\", \n
      \   \"http://gluetun-premiumize-us.vpn-gateway.svc.cluster.local:8888\",\n    \"socks5://warp-gateway.vpn-gateway.svc.cluster.local:1080\"\n]\n\n#
      Namespaces that should use VPN (all except system namespaces)\nEXCLUDED_NAMESPACES
      = {\n    \"kube-system\", \"kube-public\", \"kube-node-lease\", \n    \"vpn-gateway\",
      \"metallb-system\", \"cert-manager\"\n}\n\nclass ProxyInjectorHandler(BaseHTTPRequestHandler):\n
      \   def do_GET(self):\n        # Health check endpoint\n        self.send_response(200)\n
      \       self.send_header('Content-Type', 'text/plain')\n        self.end_headers()\n
      \       self.wfile.write(b'OK')\n        \n    def do_POST(self):\n        content_length
      = int(self.headers['Content-Length'])\n        body = self.rfile.read(content_length)\n
      \       \n        try:\n            admission_review = json.loads(body.decode('utf-8'))\n
      \           response = self.mutate(admission_review)\n            \n            self.send_response(200)\n
      \           self.send_header('Content-Type', 'application/json')\n            self.end_headers()\n
      \           self.wfile.write(json.dumps(response).encode('utf-8'))\n            \n
      \       except Exception as e:\n            print(f\"Error processing admission
      review: {e}\")\n            self.send_response(500)\n            self.end_headers()\n\n
      \   def mutate(self, admission_review):\n        request = admission_review[\"request\"]\n
      \       pod = request[\"object\"]\n        namespace = pod.get(\"metadata\",
      {}).get(\"namespace\", \"default\")\n        \n        # Skip system namespaces\n
