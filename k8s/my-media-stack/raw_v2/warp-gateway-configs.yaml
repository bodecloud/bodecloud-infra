  data:
    controller.py: "#!/usr/bin/env python3\nimport asyncio\nimport aiohttp\nimport
      logging\nimport json\nimport os\nfrom kubernetes import client, config\nfrom
      kubernetes.client.rest import ApiException\n\nlogging.basicConfig(level=logging.INFO)\nlogger
      = logging.getLogger(__name__)\n\nclass VPNGatewayController:\n    def __init__(self):\n
      \       config.load_incluster_config()\n        self.v1 = client.CoreV1Api()\n
      \       self.apps_v1 = client.AppsV1Api()\n        self.namespace = \"vpn-gateway\"\n
      \       \n        # VPN Gateway priority order (first = highest priority)\n
      \       self.vpn_gateways = [\n            {\"name\": \"gluetun-premiumize-us\",
      \"priority\": 1, \"type\": \"premiumize\", \"country\": \"us\"},\n            {\"name\":
      \"gluetun-premiumize-nl\", \"priority\": 2, \"type\": \"premiumize\", \"country\":
      \"nl\"},\n            {\"name\": \"gluetun-premiumize-gb\", \"priority\": 3,
      \"type\": \"premiumize\", \"country\": \"gb\"},\n            {\"name\": \"gluetun-premiumize-de\",
      \"priority\": 4, \"type\": \"premiumize\", \"country\": \"de\"},\n            {\"name\":
      \"gluetun-premiumize-ca\", \"priority\": 5, \"type\": \"premiumize\", \"country\":
      \"ca\"},\n            {\"name\": \"gluetun-airvpn\", \"priority\": 6, \"type\":
      \"airvpn\", \"country\": \"us\"},\n            {\"name\": \"warp-gateway\",
      \"priority\": 7, \"type\": \"warp\", \"country\": \"us\"}\n        ]\n        \n
      \       self.active_gateway = None\n        self.standby_gateway = None\n\n
      \   async def check_gateway_health(self, gateway_name):\n        \"\"\"Check
      if a VPN gateway is healthy\"\"\"\n        try:\n            # Try to get pod
      IP\n            pods = self.v1.list_namespaced_pod(\n                namespace=self.namespace,\n
      \               label_selector=f\"app={gateway_name}\"\n            )\n            \n
      \           if not pods.items:\n                return False\n            \n
      \           pod = pods.items[0]\n            if pod.status.phase != \"Running\":\n
      \               return False\n            \n            pod_ip = pod.status.pod_ip\n
      \           if not pod_ip:\n                return False\n            \n            #
      Determine gateway type and test appropriate connectivity\n            if gateway_name
      == \"warp-gateway\":\n                # WARP uses SOCKS5 on port 1080 - test
      with direct connection\n                import socket\n                try:\n
      \                   sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n
      \                   sock.settimeout(5)\n                    result = sock.connect_ex((pod_ip,
      1080))\n                    sock.close()\n                    if result == 0:\n
      \                       logger.info(f\"Gateway {gateway_name} healthy - SOCKS5
      port accessible\")\n                        return True\n                    else:\n
      \                       logger.warning(f\"Gateway {gateway_name} SOCKS5 port
      not accessible\")\n                        return False\n                except
      Exception as e:\n                    logger.warning(f\"Gateway {gateway_name}
      SOCKS5 test failed: {e}\")\n                    return False\n            else:\n
      \               # Gluetun gateways use HTTP proxy on port 8888\n                async
      with aiohttp.ClientSession() as session:\n                    proxy_url = f\"http://{pod_ip}:8888\"\n
      \                   try:\n                        async with session.get(\n
      \                           \"http://httpbin.org/ip\",\n                            proxy=proxy_url,\n
      \                           timeout=aiohttp.ClientTimeout(total=10)\n                        )
      as response:\n                            if response.status == 200:\n                                data
      = await response.json()\n                                logger.info(f\"Gateway
      {gateway_name} healthy - IP: {data.get('origin')}\")\n                                return
      True\n                    except Exception as e:\n                        logger.warning(f\"Gateway
      {gateway_name} health check failed: {e}\")\n                        return False\n
      \                   \n        except Exception as e:\n            logger.error(f\"Error
      checking gateway {gateway_name}: {e}\")\n            return False\n        \n
      \       return False\n\n    async def scale_deployment(self, deployment_name,
      replicas):\n        \"\"\"Scale a deployment to specified replica count\"\"\"\n
      \       try:\n            # Get current deployment\n            deployment =
      self.apps_v1.read_namespaced_deployment(\n                name=deployment_name,\n
      \               namespace=self.namespace\n            )\n            \n            #
      Update replica count\n            deployment.spec.replicas = replicas\n            \n
      \           # Apply the update\n            self.apps_v1.patch_namespaced_deployment(\n
      \               name=deployment_name,\n                namespace=self.namespace,\n
      \               body=deployment\n            )\n            \n            logger.info(f\"Scaled
      {deployment_name} to {replicas} replicas\")\n            return True\n            \n
      \       except ApiException as e:\n            logger.error(f\"Error scaling
      {deployment_name}: {e}\")\n            return False\n\n    async def update_active_gateway_config(self,
      gateway_name):\n        \"\"\"Update ConfigMap to set active gateway\"\"\"\n
      \       try:\n            # Get current ConfigMap\n            cm = self.v1.read_namespaced_config_map(\n
      \               name=\"pod-gateway-config\",\n                namespace=self.namespace\n
      \           )\n            \n            # Update settings.sh with new active
      gateway\n            settings = cm.data[\"settings.sh\"]\n            updated_settings
      = settings.replace(\n                'GATEWAY_NAME=\"${ACTIVE_VPN_GATEWAY:-gluetun-premiumize-us}\"',\n
      \               f'GATEWAY_NAME=\"{gateway_name}\"'\n            )\n            \n
      \           cm.data[\"settings.sh\"] = updated_settings\n            \n            #
      Apply the update\n            self.v1.patch_namespaced_config_map(\n                name=\"pod-gateway-config\",\n
      \               namespace=self.namespace,\n                body=cm\n            )\n
      \           \n            logger.info(f\"Updated active gateway config to: {gateway_name}\")\n
      \           return True\n            \n        except ApiException as e:\n            logger.error(f\"Error
      updating gateway config: {e}\")\n            return False\n\n    async def ensure_gateway_running(self,
      gateway_info):\n        \"\"\"Ensure a gateway is running and healthy\"\"\"\n
      \       gateway_name = gateway_info[\"name\"]\n        \n        # Scale up
      the deployment\n        await self.scale_deployment(gateway_name, 1)\n        \n
      \       # Determine max attempts based on gateway type\n        if gateway_info[\"type\"]
      == \"warp\":\n            max_attempts = 15  # Give WARP more time to start\n
      \           wait_time = 10\n        else:\n            max_attempts = 6   #
      Fail fast on gluetun containers (1 minute max)\n            wait_time = 10\n
      \       \n        # Wait for pod to be ready\n        for attempt in range(max_attempts):\n
      \           await asyncio.sleep(wait_time)\n            \n            if await
      self.check_gateway_health(gateway_name):\n                logger.info(f\"Gateway
      {gateway_name} is ready and healthy\")\n                return True\n                \n
      \           logger.info(f\"Waiting for {gateway_name} to be ready... (attempt
      {attempt + 1}/{max_attempts})\")\n        \n        logger.error(f\"Gateway
      {gateway_name} failed to become healthy after {max_attempts} attempts\")\n        return
      False\n\n    async def failover_to_next_gateway(self):\n        \"\"\"Perform
      failover to the next available gateway\"\"\"\n        logger.info(\"Starting
      VPN gateway failover...\")\n        \n        # Scale down current active gateway
      if it exists\n        if self.active_gateway:\n            await self.scale_deployment(self.active_gateway[\"name\"],
      0)\n            self.active_gateway = None\n        \n        # Try each gateway
      in priority order\n        for gateway_info in self.vpn_gateways:\n            gateway_name
      = gateway_info[\"name\"]\n            logger.info(f\"Attempting failover to
      {gateway_name}\")\n            \n            if await self.ensure_gateway_running(gateway_info):\n
      \               # Update active gateway\n                self.active_gateway
      = gateway_info\n                await self.update_active_gateway_config(gateway_name)\n
      \               \n                # Set up standby gateway (next in priority)\n
      \               await self.setup_standby_gateway()\n                \n                logger.info(f\"✅
      Failover successful to {gateway_name}\")\n                return True\n            else:\n
      \               # Scale down failed gateway\n                await self.scale_deployment(gateway_name,
      0)\n        \n        logger.error(\"❌ All VPN gateways failed! No connectivity
      available.\")\n        return False\n\n    async def setup_standby_gateway(self):\n
      \       \"\"\"Set up standby gateway (next in priority after active)\"\"\"\n
      \       if not self.active_gateway:\n            return\n        \n        active_priority
      = self.active_gateway[\"priority\"]\n        \n        # Find next gateway in
      priority order\n        for gateway_info in self.vpn_gateways:\n            if
