#cloud-config
# =============================================================================
# Cloud-Init Configuration for K3s Agent Node
# =============================================================================
# This file sets up a K3s agent node with Tailscale networking
# Replace the variables with actual values from your .env file
# Customize the hostname for each agent node
# =============================================================================

# hostname will be automatically set by Oracle Cloud

# Update packages
package_update: true
package_upgrade: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - unattended-upgrades

# Create ubuntu user with sudo access
users:
  - name: ubuntu
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-rsa 

# Configure SSH
ssh_authorized_keys:
  - ssh-rsa 

# Configure UFW firewall
runcmd:
  # Basic system setup
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable tailscaled
  - systemctl start tailscaled

  # Connect to Tailscale (replace with your auth key)
  - tailscale up --authkey=tskey-auth-kQKGfRkbkK11CNTRL-qSFbfpn4ayYrvCtaHzcXyY3YG6gLE29WP --hostname=$(hostname) --accept-routes

  # Wait for Tailscale to establish connection
  - sleep 10

  # Get master node IP (replace 100.99.45.35 with actual master Tailscale IP)
  - export K3S_URL=https://100.99.45.35:6443
  - export K3S_TOKEN=e96353e53c085c131e7f7d7d7e0845bf4895519a7e1899aebc5b3c6a40c6ff6a

  # Install K3s agent
  - >
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.33.0+k3s1 sh -s - agent
    --server=$K3S_URL
    --token=$K3S_TOKEN
    --node-external-ip=$(tailscale ip -4)

  # Wait for K3s agent to be ready
  - sleep 30
  - systemctl enable k3s-agent
  - systemctl start k3s-agent

  # Create ssh directory for ubuntu user
  - mkdir -p /home/ubuntu/.ssh
  - chown ubuntu:ubuntu /home/ubuntu/.ssh
  - chmod 700 /home/ubuntu/.ssh

# Set timezone
timezone: America/Chicago

# Configure automatic security updates
write_files:
  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# Final message
final_message: |
  K3s agent node setup complete!

  Node: AGENT_HOSTNAME
  Tailscale IP: Run 'tailscale ip -4' to get IP
  K3s Status: Check master node with 'kubectl get nodes'

  This node should now be visible in the K3s cluster.
  Run the deployment script from the master node to complete setup.
