---
- name: Set kubeconfig for cert-manager tasks
  set_fact:
    ansible_env: "{{ ansible_env | combine({'KUBECONFIG': kubeconfig}) }}"

- name: Check if cert-manager is already installed
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: cert-manager
    kubeconfig: "{{ kubeconfig }}"
  register: cert_manager_ns

- name: Install cert-manager
  block:
    - name: Add cert-manager CRDs
      kubernetes.core.k8s:
        src: https://github.com/cert-manager/cert-manager/releases/download/v1.13.3/cert-manager.crds.yaml
        state: present
        kubeconfig: "{{ kubeconfig }}"

    - name: Create cert-manager namespace
      kubernetes.core.k8s:
        name: cert-manager
        api_version: v1
        kind: Namespace
        state: present
        kubeconfig: "{{ kubeconfig }}"

    - name: Install cert-manager
      kubernetes.core.k8s:
        src: https://github.com/cert-manager/cert-manager/releases/download/v1.13.3/cert-manager.yaml
        state: present
        kubeconfig: "{{ kubeconfig }}"

  when: cert_manager_ns.resources | length == 0

- name: Wait for cert-manager to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
    kubeconfig: "{{ kubeconfig }}"

- name: Create Cloudflare API token secret
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudflare-api-token-secret
        namespace: cert-manager
      type: Opaque
      data:
        api-token: "{{ cloudflare_dns_api_token | b64encode }}"
    state: present
    kubeconfig: "{{ kubeconfig }}"

- name: Create self-signed ClusterIssuer
  kubernetes.core.k8s:
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: selfsigned-issuer
        labels:
          app: cert-manager-setup
      spec:
        selfSigned: {}
    state: present
    kubeconfig: "{{ kubeconfig }}"

- name: Create Let's Encrypt staging ClusterIssuer
  kubernetes.core.k8s:
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
        labels:
          app: cert-manager-setup
      spec:
        acme:
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          email: "{{ cert_manager_email }}"
          privateKeySecretRef:
            name: letsencrypt-staging
          solvers:
            - dns01:
                cloudflare:
                  apiTokenSecretRef:
                    name: cloudflare-api-token-secret
                    key: api-token
    state: present
    kubeconfig: "{{ kubeconfig }}"

- name: Create Let's Encrypt production ClusterIssuer
  kubernetes.core.k8s:
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
        labels:
          app: cert-manager-setup
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: "{{ cert_manager_email }}"
          privateKeySecretRef:
            name: letsencrypt-prod
          solvers:
            - dns01:
                cloudflare:
                  apiTokenSecretRef:
                    name: cloudflare-api-token-secret
                    key: api-token
    state: present
    kubeconfig: "{{ kubeconfig }}"

- name: Create VPN Gateway namespace for certificates
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: vpn-gateway
    state: present
    kubeconfig: "{{ kubeconfig }}"

- name: Create certificate for proxy injector
  kubernetes.core.k8s:
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: proxy-injector-cert
        namespace: vpn-gateway
        labels:
          app: cert-manager-setup
      spec:
        secretName: proxy-injector-certs
        issuerRef:
          name: selfsigned-issuer
          kind: ClusterIssuer
        dnsNames:
          - proxy-injector.vpn-gateway.svc
          - proxy-injector.vpn-gateway.svc.cluster.local
    state: present
    kubeconfig: "{{ kubeconfig }}"
