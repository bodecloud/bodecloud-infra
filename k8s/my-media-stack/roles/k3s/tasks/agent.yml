---
- name: Check if K3s agent is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download K3s binary
  get_url:
    url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
    dest: /usr/local/bin/k3s
    mode: "0755"
    owner: root
    group: root
  when: not k3s_binary.stat.exists

- name: Create K3s configuration directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Get master node token and URL
  set_fact:
    k3s_master_token: "{{ hostvars[groups['master'][0]]['k3s_token'] }}"
    k3s_server_url: "{{ hostvars[groups['master'][0]]['k3s_master_url'] }}"

- name: Create K3s agent configuration file
  template:
    src: k3s-agent-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  notify: restart k3s-agent

- name: Create K3s agent service file
  template:
    src: k3s-agent.service.j2
    dest: /etc/systemd/system/k3s-agent.service
    mode: "0644"
  notify:
    - reload systemd
    - restart k3s-agent

- name: Start and enable K3s agent service
  systemd:
    name: k3s-agent
    state: started
    enabled: true
    daemon_reload: true

- name: Create kubectl symlink
  file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
