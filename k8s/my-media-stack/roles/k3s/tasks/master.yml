---
- name: Check if K3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Check if K3s service is running
  systemd:
    name: k3s
  register: k3s_service
  failed_when: false

- name: Download K3s binary
  get_url:
    url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
    dest: /usr/local/bin/k3s
    mode: "0755"
    owner: root
    group: root
  when: not k3s_binary.stat.exists

- name: Create K3s configuration directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Create K3s configuration file
  template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  notify: restart k3s

- name: Create K3s service file
  template:
    src: k3s.service.j2
    dest: /etc/systemd/system/k3s.service
    mode: "0644"
  notify:
    - reload systemd
    - restart k3s

- name: Start and enable K3s service
  systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for K3s to be ready
  wait_for:
    port: 6443
    timeout: 300

- name: Create kubectl symlink
  file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link

- name: Set up kubeconfig for root
  file:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /root/.kube/config
    state: link
    force: true

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy kubeconfig for ubuntu user
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0644"
    remote_src: true

- name: Get node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token

- name: Set node token fact
  set_fact:
    k3s_token: "{{ k3s_node_token.content | b64decode | trim }}"

- name: Store master IP for agents
  set_fact:
    k3s_master_url: "https://{{ node_tailscale_ip }}:6443"
