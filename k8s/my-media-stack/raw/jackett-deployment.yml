apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: my-media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jackett
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jackett
    spec:
      restartPolicy: Always
      containers:
        - name: jackett
          image: linuxserver/jackett
          imagePullPolicy: IfNotPresent
          env:
            - name: PGID
              value: "988"
            - name: PUID
              value: "1002"
            - name: TZ
              value: "America/Chicago"
