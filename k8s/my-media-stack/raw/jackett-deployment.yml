            periodSeconds: 30
            initialDelaySeconds: 60
            timeoutSeconds: 10
          ports:
            - name: jackett-9117
              containerPort: 9117
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: config
          hostPath:
            path: /home/ubuntu/my-media-stack/configs/jackett/config
