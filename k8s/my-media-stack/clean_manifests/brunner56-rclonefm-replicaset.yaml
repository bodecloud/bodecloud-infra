spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: rclonefm
      pod-template-hash: 67987b9d57
  template:
    metadata:
      annotations:
        kubernetes.io/egress-bandwidth: 40M
      creationTimestamp: "2025-05-29T17:12:59Z"
      labels:
        app.kubernetes.io/instance: brunner56
        app.kubernetes.io/name: rclonefm
        pod-template-hash: 67987b9d57
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.elfhosted.com/role
                operator: In
                values:
                - nodefinder
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
      - command:
        - /rclonefm.sh
        image: ghcr.io/elfhosted/rclone:1.69.3@sha256:9396f8c3a649dba9f91169a62142c9f3e6da00974bda573d864b62c07f78234e
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        name: brunner56-rclonefm
        ports:
        - containerPort: 5573
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 150m
            memory: 512Mi
          requests:
            cpu: "0"
            memory: 60Mi
        securityContext:
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 30
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: 5573
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /backup
          name: backup
        - mountPath: /home/elfie/.cache
          name: cache
        - mountPath: /config/
          name: config
          subPath: rclone
        - mountPath: /elfbot
          name: elfbot
        - mountPath: /storage/rclone
          name: rclone
        - mountPath: /rclone-remote-storage
          name: rclone-remote-storage
          subPath: rclone-remote-storage
        - mountPath: /var/lib/rclonefm/js/settings.js
          name: rclonefm-config
          subPath: settings.js
        - mountPath: /storage/realdebrid-zurg
          name: rclonemountrealdebridzurg
        - mountPath: /storage/symlinks
          name: symlinks
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      initContainers:
      - command:
        - /bin/bash
        - -c
        - "set -e\n\n# Allows us to use app.elfhosted.com/name, but fall back to app.kubernetes.io/name
          if the former doesn't exist\nif [[ -z \"$ELF_APP_NAME\" ]]; then\n  ELF_APP_NAME=$K8S_APP_NAME\nfi\n\n#
          look for commands - we match specific names in order of least-destructive\nTIMESTAMP_NOW=$(date
          +%s)\nif [[ -f /etc/elfbot/pause ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/pause)\n
          \ TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n  if [[ $TIMESTAMP_DIFF
          -lt 600 ]]; then\n    COMMAND=pause\n  fi\nfi\n\n# If no command is set,
          then move onto the next possibility\nif [[ -f /etc/elfbot/backup && -z \"$COMMAND\"
          ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/backup)\n  TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n
          \ if [[ $TIMESTAMP_DIFF -lt 600 ]]; then\n    COMMAND=backup\n  fi\nfi\n\n#
          If no command is set, then move onto the next possibility\nif [[ -f /etc/elfbot/reset
          && -z \"$COMMAND\" ]]; then\n  TIMESTAMP_COMMAND=$(cat /etc/elfbot/reset)\n
          \ TIMESTAMP_DIFF=$((TIMESTAMP_NOW-TIMESTAMP_COMMAND))\n  if [[ $TIMESTAMP_DIFF
          -lt 600 ]]; then\n    COMMAND=reset\n  fi\nfi\n\ncase $COMMAND in\n\n  \"pause\")\n
          \   echo \"Recent pause command found, sleeping 5m..\"\n    sleep 300\n
          \   ;;\n\n  \"reset\")\n\n    # Safety check - if /config/homer exists,
          we've not mounted /config properly and are about to wipe out EVERYTHING\n
          \   if [ -e \"/config/homer\" ]; then\n        echo \"The path /config/homer
          exists. Exiting.\"\n        exit 1\n    fi      \n    echo \"Recent reset
          command found, resetting\"\n    rm -rf /config/*\n    ;;\n\n  \"backup\")\n
          \   echo \"Recent backup command found, backing up to /storage/backup/${ELF_APP_NAME}-${TIMESTAMP}\"\n
          \   TIMESTAMP=$(printf '%(%Y-%m-%d--%H-%M)T\\n' -1)\n    cp -rfp /config
          /storage/backup/$ELF_APP_NAME-$TIMESTAMP\n    ;;\n\nesac\n\nif [[ ! -f /config/i-am-bootstrapped
          ]]\nthen\n  echo \"Bootstrapping from goldilocks config...\"\n  s5cmd sync
          s3://elfhosted-config/goldilocks/$ELF_APP_NAME/* /config/\n  touch /config/i-am-bootstrapped\nfi\n"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: access-key-id
              name: b2-elfhosted-config-ro
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: secret-key
              name: b2-elfhosted-config-ro
        - name: S3_ENDPOINT_URL
          value: https://s3.us-west-000.backblazeb2.com
        - name: K8S_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/name']
        - name: ELF_APP_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.elfhosted.com/name']
        image: alpine/k8s:1.29.1
        imagePullPolicy: IfNotPresent
        name: bootstrap
        resources:
          limits:
            cpu: "1"
            memory: 4Gi
          requests:
            cpu: "0"
            memory: 1Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 568
          runAsUser: 568
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/elfbot
          name: elfbot
        - mountPath: /storage/backup
          name: backup
        - mountPath: /config
          name: config
          subPath: rclone
        - mountPath: /tmp
          name: tmp
      - command:
        - /bin/bash
        - -c
        - |
          set -x
          set -e

          # add local remote if it doesn't exist
          grep -q '/storage' /config/rclone.conf || cat /rclone-remote-storage >> /config/rclone.conf
        image: alpine/k8s:1.29.1
        imagePullPolicy: IfNotPresent
        name: setup
        resources:
          limits:
            cpu: "1"
            memory: 4Gi
          requests:
            cpu: "0"
            memory: 1Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 568
          runAsUser: 568
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
          subPath: rclone
        - mountPath: /tmp
          name: tmp
        - mountPath: /rclone-remote-storage
          name: rclone-remote-storage
          subPath: rclone-remote-storage
      priorityClassName: tenant-normal
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 568
        runAsUser: 568
        seccompProfile:
          type: RuntimeDefault
      serviceAccount: default
      serviceAccountName: default
      terminationGracePeriodSeconds: 30
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: backup
      - emptyDir:
          sizeLimit: 1Gi
        name: cache
      - name: config
        persistentVolumeClaim:
          claimName: config
      - configMap:
          defaultMode: 420
          name: elfbot-rclonefm
          optional: true
        name: elfbot
      - name: rclone
        persistentVolumeClaim:
          claimName: rclone
      - configMap:
          defaultMode: 420
          name: rclonefm-config
        name: rclone-remote-storage
      - configMap:
          defaultMode: 420
          name: rclonefm-config
        name: rclonefm-config
      - name: rclonemountrealdebridzurg
        persistentVolumeClaim:
          claimName: realdebrid-zurg
      - name: symlinks
        persistentVolumeClaim:
          claimName: symlinks
      - name: tmp
