apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    configmap.reloader.stakater.com/reload: elfbot-all,elfbot-rclonefm,rclonefm-config
    deployment.kubernetes.io/desired-replicas: "1"
