{{- if and .Values.smtp.enabled (not .Values.envFrom) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gatus.fullname" . }}-smtp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.smtp.host }}
  SMTP_HOST: {{ .Values.smtp.host | b64enc }}
  {{- end }}
  {{- if .Values.smtp.username }}
  SMTP_USERNAME: {{ .Values.smtp.username | b64enc }}
  {{- end }}
  {{- if .Values.smtp.password }}
  SMTP_PASSWORD: {{ .Values.smtp.password | b64enc }}
  {{- end }}
  {{- if .Values.smtp.to }}
  SMTP_TO: {{ .Values.smtp.to | b64enc }}
  {{- end }}
{{- end }}

{{- if .Values.secrets.gatusSmtpConfig.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gatus-smtp-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatus.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.gatusSmtpConfig.data }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}