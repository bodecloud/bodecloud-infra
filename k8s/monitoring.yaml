apiVersion: apps/v1
kind: Deployment
metadata:
  name: dozzle
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dozzle
  template:
    metadata:
      labels:
        app: dozzle
    spec:
      containers:
      - name: dozzle
        image: amir20/dozzle:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DOZZLE_NO_ANALYTICS
          value: "true"
        - name: DOZZLE_LEVEL
          value: "info"
        - name: DOZZLE_TAILSIZE
          value: "300"
        - name: DOZZLE_FILTER
          value: "status=running"
        - name: DOZZLE_ENABLE_ACTIONS
          value: "true"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: dozzle
  namespace: monitoring
spec:
  selector:
    app: dozzle
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "UTC"
        - name: LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: homepage-config
          mountPath: /app/config
        - name: homepage-images
          mountPath: /app/public/images
        - name: docker-sock
          mountPath: /var/run/docker.sock
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: homepage-config
        persistentVolumeClaim:
          claimName: homepage-config-pvc
      - name: homepage-images
        persistentVolumeClaim:
          claimName: homepage-images-pvc
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: monitoring
spec:
  selector:
    app: homepage
  ports:
  - name: http
    port: 3000
    targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-tracker
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-tracker
  template:
    metadata:
      labels:
        app: speedtest-tracker
    spec:
      containers:
      - name: speedtest-tracker
        image: lscr.io/linuxserver/speedtest-tracker:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "UTC"
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: speedtest-app-key
        - name: APP_URL
          value: "https://speedtest.example.com"
        - name: DB_CONNECTION
          value: "sqlite"
        - name: SPEEDTEST_SCHEDULE
          value: "0 */6 * * *"
        - name: SPEEDTEST_SERVERS
          value: ""
        - name: PRUNE_RESULTS_OLDER_THAN
          value: "365"
        volumeMounts:
        - name: speedtest-config
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: speedtest-config
        persistentVolumeClaim:
          claimName: speedtest-tracker-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest-tracker
  namespace: monitoring
spec:
  selector:
    app: speedtest-tracker
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server-main
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server-main
  template:
    metadata:
      labels:
        app: code-server-main
    spec:
      containers:
      - name: code-server
        image: lscr.io/linuxserver/code-server:latest
        ports:
        - containerPort: 8443
          name: https
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "UTC"
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: code-server-password
        - name: HASHED_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: code-server-hashed-password
        - name: SUDO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: code-server-sudo-password
        - name: SUDO_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: monitoring-secrets
              key: code-server-sudo-password-hash
        - name: PROXY_DOMAIN
          value: "code.example.com"
        - name: DEFAULT_WORKSPACE
          value: "/config/workspace"
        volumeMounts:
        - name: code-server-config
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: code-server-config
        persistentVolumeClaim:
          claimName: code-server-main-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: code-server-main
  namespace: monitoring
spec:
  selector:
    app: code-server-main
  ports:
  - name: https
    port: 8443
    targetPort: 8443
---
