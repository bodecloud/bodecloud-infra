apiVersion: v1
kind: Secret
metadata:
  name: vpn-secrets
  namespace: default
type: Opaque
stringData:
  # AirVPN Wireguard
  airvpn-wireguard-private-key: "your-airvpn-wireguard-private-key"
  
  # Premiumize NL Wireguard
  premiumize-nl-public-key: "your-premiumize-nl-public-key"
  premiumize-nl-private-key: "your-premiumize-nl-private-key"
  
  # Premiumize US Wireguard
  premiumize-us-public-key: "your-premiumize-us-public-key"
  premiumize-us-private-key: "your-premiumize-us-private-key"
  
  # HTTP Proxy credentials
  httpproxy-user: "proxy-user"
  httpproxy-password: "proxy-password"
  
  # Shadowsocks password
  shadowsocks-password: "shadowsocks-password"

---
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-secrets
  namespace: default
type: Opaque
stringData:
  auth-key: "your-tailscale-auth-key"

---
apiVersion: v1
