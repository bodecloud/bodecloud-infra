# Default values for vpn-gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/qdm12/gluetun
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  sysctls:
    - name: net.ipv6.conf.all.disable_ipv6
      value: "1"

securityContext:
  capabilities:
    add:
      - NET_ADMIN
  privileged: true

service:
  type: ClusterIP
  port: 8888

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# vpn gateway controller configuration
vpnController:
  enabled: true
  image:
    repository: python
    tag: "3.11-slim"

  config:
    # Schedule to run the controller
    schedule: "*/5 * * * *"

    vpn_gateways:
      - name: "vpn-gateway-premiumize-us"
        priority: 1
        type: "premiumize"
        country: "us"
      - name: "vpn-gateway-premiumize-nl"
        priority: 2
        type: "premiumize"
        country: "nl"
      - name: "vpn-gateway-premiumize-pl"
        priority: 2
        type: "premiumize"
        country: "pl"
      - name: "vpn-gateway-premiumize-sg"
        priority: 2
        type: "premiumize"
        country: "sg"
      - name: "vpn-gateway-premiumize-gb"
        priority: 3
        type: "premiumize"
        country: "gb"
      - name: "vpn-gateway-premiumize-it"
        priority: 3
        type: "premiumize"
        country: "it"
      - name: "vpn-gateway-premiumize-jp"
        priority: 3
        type: "premiumize"
        country: "jp"
      - name: "vpn-gateway-premiumize-fr"
        priority: 4
        type: "premiumize"
        country: "fr"
      - name: "vpn-gateway-premiumize-ca"
        priority: 5
        type: "premiumize"
        country: "ca"
      - name: "vpn-gateway-premiumize-at"
        priority: 5
        type: "premiumize"
        country: "at"
      - name: "vpn-gateway-premiumize-au"
        priority: 5
        type: "premiumize"
        country: "au"
      - name: "vpn-gateway-premiumize-be"
        priority: 5
        type: "premiumize"
        country: "be"
      - name: "vpn-gateway-premiumize-ch"
        priority: 5
        type: "premiumize"
        country: "ch"
      - name: "vpn-gateway-premiumize-cz"
        priority: 5
        type: "premiumize"
        country: "cz"
      - name: "vpn-gateway-premiumize-de"
        priority: 5
        type: "premiumize"
        country: "de"
      - name: "vpn-gateway-premiumize-es"
        priority: 5
        type: "premiumize"
        country: "es"
      - name: "vpn-gateway-premiumize-fi"
        priority: 5
        type: "premiumize"
        country: "fi"

# Premiumize VPN configurations
premiumize:
  # List of countries to create deployments for
  countries:
    - "at"
    - "au"
    - "be"
    - "ca"
    - "ch"
    - "cz"
    - "de"
    - "es"
    - "fi"
    - "fr"
    - "gb"
    - "it"
    - "jp"
    - "nl"
    - "pl"
    - "sg"
    - "us"

