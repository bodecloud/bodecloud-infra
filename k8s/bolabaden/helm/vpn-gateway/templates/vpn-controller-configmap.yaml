{{- if .Values.vpnController.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vpn-gateway.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vpn-gateway.labels" . | nindent 4 }}
data:
  controller.py: |
    #!/usr/bin/env python3
    import asyncio
    import aiohttp
    import logging
    import json
    import os
    from kubernetes import client, config
    from kubernetes.client.rest import ApiException

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    class VPNGatewayController:
        def __init__(self):
            config.load_incluster_config()
            self.v1 = client.CoreV1Api()
            self.apps_v1 = client.AppsV1Api()
            self.namespace = "{{ .Release.Namespace }}"
            self.release_name = os.environ.get("RELEASE_NAME")
            
            # Base definitions for VPN gateways, names will be prefixed with the release name
            self.base_vpn_gateways = {{ .Values.vpnController.config.vpn_gateways | toJson }}
            self.vpn_gateways = []
            for gw in self.base_vpn_gateways:
                gw['name'] = f"{self.release_name}-{gw['name']}"
                self.vpn_gateways.append(gw)

            self.active_gateway = None
            self.standby_gateway = None

        async def check_gateway_health(self, gateway_name):
            """Check if a VPN gateway is healthy"""
            try:
                # Try to get pod IP
                pods = self.v1.list_namespaced_pod(
                    namespace=self.namespace,
                    label_selector=f"app={gateway_name}"
                )
                
                if not pods.items:
                    return False
                
                pod = pods.items[0]
                if pod.status.phase != "Running":
                    return False
                
                pod_ip = pod.status.pod_ip
                if not pod_ip:
                    return False
                
                # Gluetun gateways use HTTP proxy on port 8888
                async with aiohttp.ClientSession() as session:
                    proxy_url = f"http://{pod_ip}:8888"
                    try:
                        async with session.get(
                            "http://httpbin.org/ip",
                            proxy=proxy_url,
                            timeout=aiohttp.ClientTimeout(total=10)
                        ) as response:
                            if response.status == 200:
                                data = await response.json()
                                logger.info(f"Gateway {gateway_name} healthy - IP: {data.get('origin')}")
                                return True
                    except Exception as e:
                        logger.warning(f"Gateway {gateway_name} health check failed: {e}")
                        return False
                        
            except Exception as e:
                logger.error(f"Error checking gateway {gateway_name}: {e}")
                return False
            
            return False

        async def scale_deployment(self, deployment_name, replicas):
            """Scale a deployment to specified replica count"""
            try:
                # Get current deployment
                deployment = self.apps_v1.read_namespaced_deployment(
                    name=deployment_name,
                    namespace=self.namespace
                )
                
                # Update replica count
                deployment.spec.replicas = replicas
                
                # Apply the update
                self.apps_v1.patch_namespaced_deployment(
                    name=deployment_name,
                    namespace=self.namespace,
                    body=deployment
                )
                
                logger.info(f"Scaled {deployment_name} to {replicas} replicas")
                return True
                
            except ApiException as e:
                if e.status == 404:
                    logger.warning(f"Deployment {deployment_name} not found, cannot scale.")
                else:
                    logger.error(f"Error scaling {deployment_name}: {e}")
                return False

        async def update_active_gateway_config(self, gateway_name):
            """Update ConfigMap to set active gateway"""
            try:
                # Get current ConfigMap
                cm = self.v1.read_namespaced_config_map(
                    name="{{ include "vpn-gateway.fullname" . }}-pod-gateway-config",
                    namespace=self.namespace
                )
                
                # Update settings.sh with new active gateway
                settings = cm.data["settings.sh"]
                updated_settings = settings.replace(
                    'GATEWAY_NAME="${ACTIVE_VPN_GATEWAY:-gluetun-premiumize-us}"',
                    f'GATEWAY_NAME="{gateway_name}"'
                )
                
                cm.data["settings.sh"] = updated_settings
                
                # Apply the update
                self.v1.patch_namespaced_config_map(
                    name="{{ include "vpn-gateway.fullname" . }}-pod-gateway-config",
                    namespace=self.namespace,
                    body=cm
                )
                
                logger.info(f"Updated active gateway config to: {gateway_name}")
                return True
                
            except ApiException as e:
                logger.error(f"Error updating gateway config: {e}")
                return False

        async def ensure_gateway_running(self, gateway_info):
            """Ensure a gateway is running and healthy"""
            gateway_name = gateway_info["name"]
            
            # Scale up the deployment
            await self.scale_deployment(gateway_name, 1)
            
            max_attempts = 6
            wait_time = 10
            
            # Wait for pod to be ready
            for attempt in range(max_attempts):
                await asyncio.sleep(wait_time)
                
                if await self.check_gateway_health(gateway_name):
                    logger.info(f"Gateway {gateway_name} is ready and healthy")
                    return True
                    
                logger.info(f"Waiting for {gateway_name} to be ready... (attempt {attempt + 1}/{max_attempts})")
            
            logger.error(f"Gateway {gateway_name} failed to become healthy after {max_attempts} attempts")
            return False

        async def failover_to_next_gateway(self):
            """Perform failover to the next available gateway"""
            logger.info("Starting VPN gateway failover...")
            
            # Scale down current active gateway if it exists
            if self.active_gateway:
                await self.scale_deployment(self.active_gateway["name"], 0)
                self.active_gateway = None
            
            # Try each gateway in priority order
            sorted_gateways = sorted(self.vpn_gateways, key=lambda x: x['priority'])
            for gateway_info in sorted_gateways:
                gateway_name = gateway_info["name"]
                logger.info(f"Attempting failover to {gateway_name}")
                
                if await self.ensure_gateway_running(gateway_info):
                    # Update active gateway
                    self.active_gateway = gateway_info
                    await self.update_active_gateway_config(gateway_name)
                    
                    logger.info(f"✅ Failover successful to {gateway_name}")
                    return True
                else:
                    # Scale down failed gateway
                    await self.scale_deployment(gateway_name, 0)
            
            logger.error("❌ All VPN gateways failed! No connectivity available.")
            return False

        async def monitor_and_failover(self):
            """Main monitoring loop"""
            logger.info("Starting VPN Gateway Controller")
            
            if not await self.failover_to_next_gateway():
                logger.error("Failed to start any VPN gateway!")
                # a small backoff before retrying
                await asyncio.sleep(60)

            while True:
                try:
                    if self.active_gateway:
                        gateway_name = self.active_gateway["name"]
                        
                        if await self.check_gateway_health(gateway_name):
                            logger.info(f"Active gateway {gateway_name} is healthy")
                        else:
                            logger.warning(f"Active gateway {gateway_name} is unhealthy, initiating failover")
                            await self.failover_to_next_gateway()
                    else:
                        logger.warning("No active gateway, starting failover")
                        await self.failover_to_next_gateway()
                    
                    await asyncio.sleep(30)
                    
                except Exception as e:
                    logger.error(f"Error in monitoring loop: {e}")
                    await asyncio.sleep(10)

    if __name__ == "__main__":
        controller = VPNGatewayController()
        asyncio.run(controller.monitor_and_failover())
{{- end }} 