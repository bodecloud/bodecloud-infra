{{- if .Values.networkPolicy.create }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vpn-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vpn-gateway.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- end }}
