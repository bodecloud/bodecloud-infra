apiVersion: v2
name: media-stack
description: Complete media stack with Stremio, AI services, and monitoring
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: mongodb
    version: "13.18.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: redis
    version: "18.1.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "12.12.10"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

keywords:
  - media
  - stremio
  - ai
  - monitoring
  - vpn

maintainers:
  - name: media-stack-team
    email: admin@bolabaden.org 