apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "homer.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- end }}
  {{- if .Values.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "homer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "homer.selectorLabels" . | nindent 8 }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "homer.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      volumes:
        {{- if .Values.persistence.backup.enabled }}
        - name: backup
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-backup
        {{- end }}
        {{- if .Values.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-config
        {{- end }}
        {{- if .Values.configMaps.homerConfig.enabled }}
        - name: config-yml
          configMap:
            name: {{ include "homer.fullname" . }}-config
            defaultMode: 420
        - name: custom-css
          configMap:
            name: {{ include "homer.fullname" . }}-config
            defaultMode: 420
        - name: disk-usage
          configMap:
            name: {{ include "homer.fullname" . }}-config
            defaultMode: 420
        {{- end }}
        {{- if .Values.configMaps.gatusConfig.enabled }}
        - name: gatus-config
          configMap:
            name: {{ include "homer.fullname" . }}-gatus-config
            defaultMode: 420
        {{- end }}
        {{- if .Values.persistence.logs.enabled }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-logs
        {{- end }}
        {{- if .Values.volumes.message.enabled }}
        - name: message
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.rclone.enabled }}
        - name: rclone
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-rclone
        {{- end }}
        {{- if .Values.persistence.realdebridZurg.enabled }}
        - name: rclonemountrealdebridzurg
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-realdebrid-zurg
        {{- end }}
        {{- if .Values.persistence.symlinks.enabled }}
        - name: symlinks
          persistentVolumeClaim:
            claimName: {{ include "homer.fullname" . }}-symlinks
        {{- end }}
        {{- if .Values.volumes.tmp.enabled }}
        - name: tmp
          emptyDir: {}
        {{- end }}
      
      containers:
        {{/* Disk Usage Monitoring Container */}}
        {{- if .Values.diskUsage.enabled }}
        - name: {{ include "homer.fullname" . }}
          image: {{ include "homer.ubuntuImage" . }}:{{ .Values.ubuntu.image.tag }}
          imagePullPolicy: {{ .Values.ubuntu.image.pullPolicy }}
          command:
            - /bin/bash
            - {{ .Values.diskUsage.script }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.resources.diskUsage }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.backup.enabled }}
            - name: backup
              mountPath: /backup
            {{- end }}
            {{- if .Values.persistence.config.enabled }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.configMaps.homerConfig.enabled }}
            - name: config-yml
              mountPath: /config-yml
              subPath: config.yml
            - name: custom-css
              mountPath: /custom-css
              subPath: custom.css
            - name: disk-usage
              mountPath: {{ .Values.diskUsage.script }}
              subPath: disk_usage.sh
            {{- end }}
            {{- if .Values.configMaps.gatusConfig.enabled }}
            - name: gatus-config
              mountPath: /gatus-config
            {{- end }}
            {{- if .Values.persistence.logs.enabled }}
            - name: logs
              mountPath: /logs
            {{- end }}
            {{- if .Values.volumes.message.enabled }}
            - name: message
              mountPath: /www/assets/message
            {{- end }}
            {{- if .Values.persistence.rclone.enabled }}
            - name: rclone
              mountPath: /storage/rclone
            {{- end }}
            {{- if .Values.persistence.realdebridZurg.enabled }}
            - name: rclonemountrealdebridzurg
              mountPath: /storage/realdebrid-zurg
            {{- end }}
            {{- if .Values.persistence.symlinks.enabled }}
            - name: symlinks
              mountPath: /storage/symlinks
            {{- end }}
            {{- if .Values.volumes.tmp.enabled }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.containerSecurityContext.diskUsage }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        
        {{/* Homer UI Container */}}
        - name: ui
          image: {{ include "homer.image" . }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.resources.homer }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.configMaps.homerConfig.enabled }}
            - name: config-yml
              mountPath: /www/assets/config.yml
              subPath: config.yml
            - name: custom-css
              mountPath: /www/assets/custom.css
              subPath: custom.css
            {{- end }}
            {{- if .Values.volumes.message.enabled }}
            - name: message
              mountPath: /www/assets/message
            {{- end }}
            {{- if .Values.persistence.config.enabled }}
            - name: config
              readOnly: true
              mountPath: /www/assets/backgrounds
              subPath: homer/backgrounds
            {{- end }}
          {{- with .Values.containerSecurityContext.homer }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler 