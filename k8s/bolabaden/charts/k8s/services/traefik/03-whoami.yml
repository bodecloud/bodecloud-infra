kind: Deployment
apiVersion: apps/v1
metadata:
  name: whoami
  labels:
    app: whoami

spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      hostname: whoami
      containers:
        - name: whoami
          image: traefik/whoami:latest
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          ports:
            - name: web
              containerPort: 80
          env:
            - name: DOMAIN
              value: "bolabaden.org"
            - name: DUCKDNS_DOMAIN
              value: "bolabaden.duckdns.org"
            - name: TS_HOSTNAME
              value: "micklethefickle" 