apiVersion: apps/v1
kind: Deployment
metadata:
  name: stremio
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stremio
  template:
    metadata:
      labels:
        app: stremio
    spec:
      containers:
      - name: stremio
        image: tsaridas/stremio-docker:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 11470
          name: stremio
        env:
        - name: NO_CORS
          value: "1"
        - name: CASTING_DISABLED
          value: "1"
        volumeMounts:
        - name: stremio-data
          mountPath: /root/.stremio-server
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: stremio-data
        persistentVolumeClaim:
          claimName: stremio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: stremio
  namespace: media-stack
spec:
  selector:
    app: stremio
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: stremio
    port: 11470
    targetPort: 11470
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
      - name: flaresolverr
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
        - containerPort: 8191
          name: http
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_HTML
          value: "false"
        - name: CAPTCHA_SOLVER
          value: "none"
        - name: TZ
          value: "UTC"
        livenessProbe:
          httpGet:
            path: /
            port: 8191
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8191
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media-stack
spec:
  selector:
    app: flaresolverr
  ports:
  - name: http
    port: 8191
    targetPort: 8191
