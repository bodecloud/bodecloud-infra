---
# =============================================================================
# MEDIA STACK K3S DEPLOYMENT PLAYBOOK
# =============================================================================
# This playbook deploys a complete K3s-based media stack with VPN gateways,
# certificate management, and various media services.
# Assumes K3s and Tailscale are already installed and configured.
# =============================================================================

- name: Load Environment and Cluster Configuration
  hosts: localhost
  gather_facts: false
  tasks:
    # Load environment variables from .env file
    - name: Load environment variables
      shell: |
        set -a
        source {{ playbook_dir }}/../../.env
        env | grep -E '^[A-Z_]+=.*$' | head -50
      register: env_vars
      changed_when: false
      tags: always

    - name: Set environment facts
      set_fact:
        env: "{{ dict(env_vars.stdout_lines | map('regex_replace', '^([^=]+)=(.*)$', '\\1:\\2') | map('split', ':') | list) }}"
      tags: always

    - name: Load cluster configuration
      include_vars:
        file: "{{ playbook_dir }}/cluster-config.yml"
        name: config
      tags: always

    - name: Set global configuration facts
      set_fact:
        cluster: "{{ config.cluster }}"
        certificates: "{{ config.certificates }}"
        vpn: "{{ config.vpn }}"
        storage: "{{ config.storage }}"
        media_services: "{{ config.media_services }}"
        servarr: "{{ config.servarr }}"
        download_clients: "{{ config.download_clients }}"
        stremio: "{{ config.stremio }}"
        auth: "{{ config.auth }}"
        api_keys: "{{ config.api_keys }}"
      tags: always

- name: Verify K3s and Tailscale Prerequisites
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Check if K3s is installed
      command: k3s --version
      register: k3s_check
      failed_when: false
      changed_when: false

    - name: Check if Tailscale is running
      command: tailscale status
      register: tailscale_check
      failed_when: false
      changed_when: false

    - name: Verify K3s is installed
      fail:
        msg: "K3s is not installed on {{ inventory_hostname }}. Please install K3s first via cloud-init."
      when: k3s_check.rc != 0

    - name: Verify Tailscale is running
      fail:
        msg: "Tailscale is not running on {{ inventory_hostname }}. Please install and configure Tailscale first via cloud-init."
      when: tailscale_check.rc != 0

    - name: Display node status
      debug:
        msg: |
          Node: {{ inventory_hostname }} ({{ ansible_host }})
          K3s Version: {{ k3s_check.stdout.split()[2] if k3s_check.rc == 0 else 'Not installed' }}
          Tailscale Status: {{ 'Running' if tailscale_check.rc == 0 else 'Not running' }}
          Node Role: {{ k3s_node_role }}

- name: Ensure K3s Cluster is Running
  hosts: master
  gather_facts: false
  become: true
  tasks:
    - name: Check K3s server status
      command: systemctl is-active k3s
      register: k3s_service_check
      failed_when: false
      changed_when: false

    - name: Start K3s server if not running
      systemd:
        name: k3s
        state: started
        enabled: true
      when: k3s_service_check.stdout != "active"

    - name: Wait for K3s server to be ready
      wait_for:
        port: 6443
        host: "{{ ansible_host }}"
        timeout: 300

    - name: Get kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/kubeconfig"
        flat: true
      delegate_to: "{{ groups['master'][0] }}"
      run_once: true

    - name: Update kubeconfig server address
      lineinfile:
        path: "{{ playbook_dir }}/kubeconfig"
        regexp: '^\s+server:.*'
        line: "    server: https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443"
      delegate_to: localhost
      run_once: true

- name: Ensure K3s Agents are Connected
  hosts: agents
  gather_facts: false
  become: true
  tasks:
    - name: Check K3s agent status
      command: systemctl is-active k3s-agent
      register: k3s_agent_check
      failed_when: false
      changed_when: false

    - name: Start K3s agent if not running
      systemd:
        name: k3s-agent
        state: started
        enabled: true
      when: k3s_agent_check.stdout != "active"

- name: Deploy Certificate Manager
  hosts: master
  gather_facts: false
  become: true
  run_once: true
  roles:
    - role: cert_manager
  vars:
    cert_manager_email: "{{ certificates.acme.email }}"
    cloudflare_email: "{{ certificates.cloudflare.email }}"
    cloudflare_api_key: "{{ certificates.cloudflare.api_key }}"
    cloudflare_dns_api_token: "{{ certificates.cloudflare.dns_api_token }}"
    cloudflare_zone_id: "{{ certificates.cloudflare.zone_id }}"
    domain: "{{ cluster.domain }}"
    kubeconfig: "{{ playbook_dir }}/kubeconfig"
  when: deploy_services.cert_manager | default(true)
  tags:
    - cert-manager
    - infrastructure

- name: Deploy VPN Gateway Infrastructure
  hosts: master
  gather_facts: false
  become: true
  run_once: true
  roles:
    - role: vpn_gateway
  vars:
    domain: "{{ cluster.domain }}"
    premiumize_customer_id: "{{ vpn.providers.premiumize.customer_id }}"
    premiumize_api_key: "{{ vpn.providers.premiumize.api_key }}"
    premiumize_countries: "{{ vpn.providers.premiumize.countries }}"
    realdebrid_api_key: "{{ vpn.providers.realdebrid.api_key }}"
    warp_enabled: "{{ vpn.providers.warp.enabled }}"
    config_path: "{{ storage.config_path }}"
    kubeconfig: "{{ playbook_dir }}/kubeconfig"
  when: deploy_services.vpn_gateway | default(true)
  tags:
    - vpn-gateway
    - infrastructure

- name: Deploy Pod Gateway (VPN-aware routing)
  hosts: master
  gather_facts: false
  become: true
  run_once: true
  roles:
    - role: cluster_proxy_injector
  vars:
    domain: "{{ cluster.domain }}"
    config_path: "{{ storage.config_path }}"
    kubeconfig: "{{ playbook_dir }}/kubeconfig"
  when: deploy_services.pod_gateway | default(true)
  tags:
    - pod-gateway
    - infrastructure

- name: Deploy Core Media Stack Services
  hosts: master
  gather_facts: false
  become: true
  run_once: true
  roles:
    - role: media_stack_core
  vars:
    domain: "{{ cluster.domain }}"
    timezone: "{{ cluster.timezone }}"
    puid: "{{ storage.puid }}"
    pgid: "{{ storage.pgid }}"
    config_path: "{{ storage.config_path }}"
    data_path: "{{ storage.data_path }}"
    kubeconfig: "{{ playbook_dir }}/kubeconfig"

    # Service deployment flags
    deploy_services: "{{ deploy_services }}"

    # Media services
    plex_config: "{{ media_services.plex }}"
    jellyfin_config: "{{ media_services.jellyfin }}"
    tautulli_config: "{{ media_services.tautulli }}"

    # Servarr services
    sonarr_config: "{{ servarr.sonarr }}"
    radarr_config: "{{ servarr.radarr }}"
    prowlarr_config: "{{ servarr.prowlarr }}"
    bazarr_config: "{{ servarr.bazarr }}"
    lidarr_config: "{{ servarr.lidarr }}"
    readarr_config: "{{ servarr.readarr }}"

    # Download clients
    qbittorrent_config: "{{ download_clients.qbittorrent }}"
    sabnzbd_config: "{{ download_clients.sabnzbd }}"

    # Stremio addons
    comet_config: "{{ stremio.comet }}"
    mediafusion_config: "{{ stremio.mediafusion }}"
    torrentio_config: "{{ stremio.torrentio }}"
    zilean_config: "{{ stremio.zilean }}"

    # Authentication
    oauth_secret: "{{ auth.oauth_secret }}"
    sudo_password: "{{ auth.sudo_password }}"
    auth_secret: "{{ auth.auth_secret }}"

    # External APIs
    tmdb_api_key: "{{ api_keys.tmdb }}"
    openai_api_key: "{{ api_keys.openai }}"
    anthropic_api_key: "{{ api_keys.anthropic }}"
    tavily_api_key: "{{ api_keys.tavily }}"
    firecrawl_api_key: "{{ api_keys.firecrawl }}"
  tags:
    - media-services
    - applications

- name: Verify Deployment Status
  hosts: master
  gather_facts: false
  become: true
  run_once: true
  tasks:
    - name: Check cluster nodes
      command: kubectl get nodes --kubeconfig={{ playbook_dir }}/kubeconfig
      register: cluster_nodes
      changed_when: false

    - name: Check running pods
      command: kubectl get pods --all-namespaces --kubeconfig={{ playbook_dir }}/kubeconfig
      register: cluster_pods
      changed_when: false

    - name: Display cluster status
      debug:
        msg: |
          =============================================================================
          KUBERNETES CLUSTER DEPLOYMENT COMPLETE
          =============================================================================

          Cluster Nodes:
          {{ cluster_nodes.stdout }}

          Kubeconfig saved to: {{ playbook_dir }}/kubeconfig

          To access your cluster:
          export KUBECONFIG={{ playbook_dir }}/kubeconfig
          kubectl get nodes

          Domain: {{ cluster.domain }}
          Tailscale Network: {{ cluster.tailscale.base_domain }}

          =============================================================================

- name: Create Access Instructions
  hosts: localhost
  gather_facts: false
  run_once: true
  tasks:
    - name: Create README with access instructions
      copy:
        dest: "{{ playbook_dir }}/CLUSTER_ACCESS.md"
        content: |
          # Media Stack Kubernetes Cluster Access

          ## Cluster Information
          - **Domain**: {{ cluster.domain }}
          - **Tailscale Network**: {{ cluster.tailscale.base_domain }}
          - **K3s Version**: {{ cluster.k3s.version }}
          - **Cluster CIDR**: {{ cluster.k3s.cluster_cidr }}
          - **Service CIDR**: {{ cluster.k3s.service_cidr }}

          ## Nodes
          ### Master Node
          - **Hostname**: {{ cluster.tailscale.master.hostname }}
          - **Tailscale IP**: {{ cluster.tailscale.master.tailscale_ip }}
          - **External IP**: {{ cluster.tailscale.master.external_ip }}

          ### Agent Nodes
          {% for agent in cluster.tailscale.agents %}
          - **{{ agent.hostname }}**: {{ agent.tailscale_ip }}
          {% endfor %}

          ## Access Instructions

          ### Kubectl Access
          ```bash
          export KUBECONFIG={{ playbook_dir }}/kubeconfig
          kubectl get nodes
          kubectl get pods --all-namespaces
          ```

          ### SSH Access
          ```bash
          # Master node
          ssh ubuntu@{{ cluster.tailscale.master.tailscale_ip }}

          # Agent nodes
          {% for agent in cluster.tailscale.agents %}
          ssh ubuntu@{{ agent.tailscale_ip }}  # {{ agent.hostname }}
          {% endfor %}
          ```

          ### Service URLs
          All services are accessible via `https://service.{{ cluster.domain }}`

          ## Deployment Summary
          - Deployed on: {{ ansible_date_time.iso8601 }}
          - Configuration: {{ playbook_dir }}/cluster-config.yml
          - Environment: {{ playbook_dir }}/../../.env
      tags: always
