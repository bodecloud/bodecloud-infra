apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: infrastructure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions
  - networking.k8s.io
  resources:
  - ingresses
  - ingressclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions
  - networking.k8s.io
  resources:
  - ingresses/status
  verbs:
  - update
- apiGroups:
  - traefik.containo.us
  resources:
  - middlewares
  - middlewaretcps
  - ingressroutes
  - traefikservices
  - ingressroutetcps
  - ingressrouteudps
  - tlsoptions
  - tlsstores
  - serverstransports
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
- kind: ServiceAccount
  name: traefik
  namespace: infrastructure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: infrastructure
data:
  traefik.yml: |
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    
    api:
      dashboard: true
      debug: true
      insecure: false
    
    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entrypoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
        http:
          tls:
            options: default
      traefik:
        address: ":8080"
    
    providers:
      kubernetes:
        endpoints:
        - "https://kubernetes.default.svc:443"
        token: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        certAuthFilePath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        namespaces:
        - "infrastructure"
        - "media-stack"
        - "monitoring"
        - "vpn"
        - "stremio-addons"
      kubernetesIngress:
        endpoints:
        - "https://kubernetes.default.svc:443"
        token: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        certAuthFilePath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        namespaces:
        - "infrastructure"
        - "media-stack"
        - "monitoring"
        - "vpn"
        - "stremio-addons"
    
    certificatesResolvers:
      letsencrypt:
        acme:
          email: boden.crouch@gmail.com
          storage: /data/acme.json
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "1.0.0.1:53"
          # Uncomment for staging
          # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
    
    log:
      level: INFO
      format: json
    
    accessLog:
      format: json
    
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addServicesLabels: true
    
    ping: {}
---
# TinyAuth Middleware
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: tinyauth
  namespace: infrastructure
spec:
  forwardAuth:
    address: http://tinyauth.infrastructure.svc.cluster.local:3000/api/auth/traefik
---
# CORS Headers for Stremio
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: headers-add-cors-for-stremio
  namespace: infrastructure
spec:
  headers:
    customRequestHeaders:
      Access-Control-Allow-Origin: "*"
      Access-Control-Allow-Methods: "GET,POST,OPTIONS,DELETE,PUT"
      Access-Control-Allow-Headers: "Content-Type,Authorization"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
      - name: traefik
        image: traefik:v3.1
        args:
        - --configfile=/config/traefik.yml
        ports:
        - name: web
          containerPort: 80
        - name: websecure
          containerPort: 443
        - name: traefik
          containerPort: 8080
        env:
        - name: CLOUDFLARE_API_KEY
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: CLOUDFLARE_API_KEY
        - name: CLOUDFLARE_EMAIL
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: CLOUDFLARE_EMAIL
        - name: DUCKDNS_TOKEN
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: DUCKDNS_TOKEN
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
      volumes:
      - name: config
        configMap:
          name: traefik-config
      - name: data
        persistentVolumeClaim:
          claimName: traefik-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: infrastructure
spec:
  selector:
    app: traefik
  ports:
  - name: web
    port: 80
    targetPort: 80
  - name: websecure
    port: 443
    targetPort: 443
  - name: traefik
    port: 8080
    targetPort: 8080
  type: LoadBalancer
---
# Traefik Error Pages
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-error-pages
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik-error-pages
  template:
    metadata:
      labels:
        app: traefik-error-pages
    spec:
      containers:
      - name: httpd
        image: httpd:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: error-pages
          mountPath: /usr/local/apache2/htdocs/
          readOnly: true
      volumes:
      - name: error-pages
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: traefik-error-pages
  namespace: infrastructure
spec:
  selector:
    app: traefik-error-pages
  ports:
  - port: 80
    targetPort: 80
---
# Infrastructure Services Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrastructure-ingress
  namespace: infrastructure
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: infrastructure-tinyauth@kubernetescrd
spec:
  tls:
  - hosts:
    - traefik.bolabaden.org
    - crowdsec.bolabaden.org
    - auth.bolabaden.org
    secretName: infrastructure-tls
  rules:
  - host: traefik.bolabaden.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: traefik
            port:
              number: 8080
  - host: crowdsec.bolabaden.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crowdsec
            port:
              number: 8080
  - host: auth.bolabaden.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tinyauth
            port:
              number: 3000
---
