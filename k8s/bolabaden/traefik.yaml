metadata:
  name: vpn-services-ingress
  namespace: vpn
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  tls:
  - hosts:
    - jackett.bolabaden.org
    - stremio.bolabaden.org
    - stremio-web.bolabaden.org
    - stremio-fallback.bolabaden.org
    secretName: vpn-gluetun-tls
  rules:
  - host: jackett.bolabaden.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gluetun-premiumize-nl
            port:
