---
# Main playbook for k3s deployment using the official k3s-ansible approach
# Based on https://github.com/k3s-io/k3s-ansible

- name: Preflight checks
  hosts: k3s_cluster
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - name: Check if server nodes are odd
      assert:
        that:
          - (groups.server | length) is odd
          - (groups.server | length) >= 1
        msg: "There must be an odd number of control nodes (servers): 1, 3, 5, etc. Current count: {{ groups.server | length }}"
      run_once: true
      when:
        - groups.server is defined
        - groups.server | length > 1
        - not use_external_database | default(false)

    - name: Check that the inventory is set correctly
      assert:
        that:
          - inventory_hostname in groups.k3s_cluster
        msg: "Node {{ inventory_hostname }} is not part of k3s_cluster group"

    - name: Print node information
      debug:
        msg: "Node: {{ inventory_hostname }} ({{ ansible_host }})"

- name: Download k3s binary
  hosts: k3s_cluster
  gather_facts: true
  tasks:
    - name: Download k3s binary
      get_url:
        url: https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s
        checksum: "sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-amd64.txt"
        dest: /usr/local/bin/k3s
        owner: root
        group: root
        mode: 0755
      when: ansible_architecture == "x86_64"
      register: k3s_download
      retries: 3
      delay: 5
      until: k3s_download is succeeded
      become: true

    - name: Download k3s binary for arm64
      get_url:
        url: https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s-arm64
        checksum: "sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-arm64.txt"
        dest: /usr/local/bin/k3s
        owner: root
        group: root
        mode: 0755
      when: ansible_architecture == "aarch64"
      register: k3s_download
      retries: 3
      delay: 5
      until: k3s_download is succeeded
      become: true

- name: Install k3s server nodes
  hosts: server
  become: true
  tasks:
    - name: Set up the first server node
      when: inventory_hostname == groups['server'][0]
      block:
        - name: Generate token if not provided
          when: k3s_token is not defined
          block:
            - name: Generate token
              shell: "tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 48"
              register: k3s_token_generated
              changed_when: false

            - name: Set token fact
              set_fact:
                k3s_token: "{{ k3s_token_generated.stdout }}"
                k3s_token_facts_written: true

            - name: Create k3s config directory
              file:
                path: /etc/rancher/k3s
                state: directory
                mode: 0755

            - name: Write token to file
              copy:
                content: "{{ k3s_token }}"
                dest: /etc/rancher/k3s/token
                mode: 0600
              when: k3s_token_facts_written is defined

        - name: Create k3s service file for first server
          template:
            src: "../templates/k3s-server.service.j2"
            dest: "/etc/systemd/system/k3s.service"
            owner: root
            group: root
            mode: 0644
          vars:
            server_init_args: "server --token={{ k3s_token | default('') }} {{ k3s_server_args | join(' ') }}"

        - name: Enable and check k3s service for first server
          systemd:
            name: k3s
            daemon_reload: yes
            state: started
            enabled: yes

        - name: Wait for k3s to be ready
          wait_for:
            path: /var/lib/rancher/k3s/server/node-token
            state: present
            delay: 5
            timeout: 300

    - name: Retrieve the token from the first server node
      when:
        - inventory_hostname != groups['server'][0]
        - k3s_token is not defined
      block:
        - name: Retrieve token from the first server
          slurp:
            src: /etc/rancher/k3s/token
          register: k3s_token_first_server
          delegate_to: "{{ groups['server'][0] }}"

        - name: Set token fact
          set_fact:
            k3s_token: "{{ k3s_token_first_server.content | b64decode }}"

    - name: Set up additional server nodes
      when: inventory_hostname != groups['server'][0]
      block:
        - name: Create k3s service file for additional servers
          template:
            src: "../templates/k3s-server.service.j2"
            dest: "/etc/systemd/system/k3s.service"
            owner: root
            group: root
            mode: 0644
          vars:
            server_init_args: "server --token={{ k3s_token }} --server https://{{ hostvars[groups['server'][0]]['ansible_host'] }}:6443 {{ k3s_server_args | join(' ') }}"

        - name: Enable and check k3s service for additional servers
          systemd:
            name: k3s
            daemon_reload: yes
            state: started
            enabled: yes

    - name: Verify the server nodes
      when: inventory_hostname == groups['server'][0]
      block:
        - name: Create directory for kube config
          file:
            path: "/home/{{ ansible_user }}/.kube"
            state: directory
            owner: "{{ ansible_user }}"
            mode: 0755

        - name: Copy config file to user home directory
          copy:
            src: /etc/rancher/k3s/k3s.yaml
            dest: "/home/{{ ansible_user }}/.kube/config"
            remote_src: yes
            owner: "{{ ansible_user }}"
            mode: 0644

        - name: Update kubeconfig server setting
          replace:
            path: "/home/{{ ansible_user }}/.kube/config"
            regexp: "https://127.0.0.1:6443"
            replace: "https://{{ ansible_host }}:6443"

        - name: Wait for node to be ready
          command: k3s kubectl wait --for=condition=Ready node/{{ inventory_hostname }}
          register: node_ready
          retries: 10
          delay: 10
          until: node_ready.rc == 0
          changed_when: false

        - name: Get nodes
          command: k3s kubectl get nodes -o wide
          register: nodes
          changed_when: false

        - name: Display nodes
          debug:
            var: nodes.stdout_lines

- name: Install k3s agent nodes
  hosts: agent
  become: true
  tasks:
    - name: Retrieve token from server
      slurp:
        src: /etc/rancher/k3s/token
      register: k3s_token_agent
      delegate_to: "{{ groups['server'][0] }}"
      when: k3s_token is not defined

    - name: Store token
      set_fact:
        k3s_token: "{{ k3s_token_agent.content | b64decode }}"
      when: k3s_token is not defined and k3s_token_agent is defined

    - name: Create k3s service file for agent
      template:
        src: "../templates/k3s-agent.service.j2"
        dest: "/etc/systemd/system/k3s-agent.service"
        owner: root
        group: root
        mode: 0644
      vars:
        server_init_args: "--server https://{{ hostvars[groups['server'][0]]['ansible_host'] }}:6443 --token={{ k3s_token }}"

    - name: Enable and check k3s-agent service
      systemd:
        name: k3s-agent
        daemon_reload: yes
        state: started
        enabled: yes

- name: Verify installation
  hosts: server[0]
  become: true
  tasks:
    - name: Wait for all nodes to be ready
      command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
      register: nodes_ready
      retries: 5
      delay: 10
      until: nodes_ready.rc == 0
      changed_when: false

    - name: Get all resources in kube-system
      command: k3s kubectl get all -n kube-system
      register: kube_resources
      changed_when: false

    - name: Display kube-system resources
      debug:
        var: kube_resources.stdout_lines

    - name: Copy kubeconfig for user access
      fetch:
        src: "/home/{{ ansible_user }}/.kube/config"
        dest: "../kubeconfig"
        flat: yes

    - name: Kubeconfig message
      debug:
        msg: "Kubeconfig has been downloaded to k3s-ansible/kubeconfig. You can use it with 'export KUBECONFIG=./k3s-ansible/kubeconfig'"
