---
# =============================================================================
# KUBERNETES CONFIGURATION GENERATOR
# =============================================================================
# This playbook generates Kubernetes ConfigMaps and Secrets from the
# centralized cluster configuration file.
# =============================================================================

- name: Generate Kubernetes Configuration
  hosts: localhost
  gather_facts: false
  vars:
    config_namespace: "media-stack-config"

  tasks:
    - name: Load cluster configuration
      include_vars:
        file: "{{ playbook_dir }}/cluster-config.yml"
        name: config

    - name: Create namespace for configuration
      kubernetes.core.k8s:
        name: "{{ config_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Create cluster configuration ConfigMap
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cluster-config
            namespace: "{{ config_namespace }}"
          data:
            # Cluster information
            CLUSTER_NAME: "{{ config.cluster.name }}"
            DOMAIN: "{{ config.cluster.domain }}"
            SUBDOMAIN: "{{ config.cluster.subdomain }}"
            TIMEZONE: "{{ config.cluster.timezone }}"

            # Tailscale configuration
            TS_BASE_DOMAIN: "{{ config.cluster.tailscale.base_domain }}"
            TS_HOSTNAME: "{{ config.cluster.tailscale.hostname }}"

            # Storage configuration
            CONFIG_PATH: "{{ config.storage.config_path }}"
            DATA_PATH: "{{ config.storage.data_path }}"
            SECRETS_PATH: "{{ config.storage.secrets_path }}"
            PUID: "{{ config.storage.puid | string }}"
            PGID: "{{ config.storage.pgid | string }}"
            UMASK: "{{ config.storage.umask }}"

            # Service URLs
            PLEX_URL: "{{ config.media_services.plex.url }}"
            JELLYFIN_URL: "{{ config.media_services.jellyfin.url }}"
            TAUTULLI_URL: "{{ config.media_services.tautulli.url }}"
            SONARR_URL: "{{ config.servarr.sonarr.url }}"
            RADARR_URL: "{{ config.servarr.radarr.url }}"
            PROWLARR_URL: "{{ config.servarr.prowlarr.url }}"
            BAZARR_URL: "{{ config.servarr.bazarr.url }}"
            LIDARR_URL: "{{ config.servarr.lidarr.url }}"
            READARR_URL: "{{ config.servarr.readarr.url }}"
            WHISPARR_URL: "{{ config.servarr.whisparr.url }}"
            SABNZBD_URL: "{{ config.download_clients.sabnzbd.url }}"
            JACKETT_URL: "{{ config.indexers.jackett.url }}"
            COMET_URL: "{{ config.stremio.comet.url }}"
            MEDIAFUSION_URL: "{{ config.stremio.mediafusion.url }}"
            TORRENTIO_URL: "{{ config.stremio.torrentio.url }}"
            ZILEAN_URL: "{{ config.stremio.zilean.url }}"
            MEDIAFLOW_PROXY_URL: "{{ config.stremio.mediaflow_proxy.url }}"

            # Stremio configuration
            COMET_ADDON_ID: "{{ config.stremio.comet.addon_id }}"
            COMET_ADDON_NAME: "{{ config.stremio.comet.addon_name }}"
            MEDIAFUSION_MONGO_URI: "{{ config.stremio.mediafusion.mongo_uri }}"

            # VPN configuration
            PREMIUMIZE_CUSTOMER_ID: "{{ config.vpn.providers.premiumize.customer_id }}"
            PREMIUMIZE_COUNTRIES: "{{ config.vpn.providers.premiumize.countries | join(',') }}"
            WARP_ENABLED: "{{ config.vpn.providers.warp.enabled | string }}"
            REALDEBRID_ENABLED: "{{ config.vpn.providers.realdebrid.enabled | string }}"

            # Service deployment flags
            DEPLOY_PLEX: "{{ config.services.plex | string }}"
            DEPLOY_JELLYFIN: "{{ config.services.jellyfin | string }}"
            DEPLOY_TAUTULLI: "{{ config.services.tautulli | string }}"
            DEPLOY_SONARR: "{{ config.services.sonarr | string }}"
            DEPLOY_RADARR: "{{ config.services.radarr | string }}"
            DEPLOY_PROWLARR: "{{ config.services.prowlarr | string }}"
            DEPLOY_BAZARR: "{{ config.services.bazarr | string }}"
            DEPLOY_LIDARR: "{{ config.services.lidarr | string }}"
            DEPLOY_READARR: "{{ config.services.readarr | string }}"
            DEPLOY_WHISPARR: "{{ config.services.whisparr | string }}"
            DEPLOY_QBITTORRENT: "{{ config.services.qbittorrent | string }}"
            DEPLOY_SABNZBD: "{{ config.services.sabnzbd | string }}"
            DEPLOY_COMET: "{{ config.services.comet | string }}"
            DEPLOY_AIOSTREAMS: "{{ config.services.aiostreams | string }}"
            DEPLOY_MEDIAFUSION: "{{ config.services.mediafusion | string }}"
            DEPLOY_TORRENTIO: "{{ config.services.torrentio | string }}"
            DEPLOY_ZILEAN: "{{ config.services.zilean | string }}"
            DEPLOY_MEDIAFLOW_PROXY: "{{ config.services.mediaflow_proxy | string }}"
            DEPLOY_JACKETT: "{{ config.services.jackett | string }}"
            DEPLOY_HOMEPAGE: "{{ config.services.homepage | string }}"
            DEPLOY_DOZZLE: "{{ config.services.dozzle | string }}"
            DEPLOY_WATCHTOWER: "{{ config.services.watchtower | string }}"
            DEPLOY_SPEEDTEST_TRACKER: "{{ config.services.speedtest_tracker | string }}"
            DEPLOY_TINYAUTH: "{{ config.services.tinyauth | string }}"
            DEPLOY_CODE_SERVER: "{{ config.services.code_server | string }}"
            DEPLOY_LOBECHAT: "{{ config.services.lobechat | string }}"
            DEPLOY_SEARXNG: "{{ config.services.searxng | string }}"
            DEPLOY_GRAFANA: "{{ config.services.grafana | string }}"
            DEPLOY_PROMETHEUS: "{{ config.services.prometheus | string }}"
            DEPLOY_REDIS: "{{ config.services.redis | string }}"
            DEPLOY_MONGODB: "{{ config.services.mongodb | string }}"

    - name: Create secrets ConfigMap (non-sensitive configuration)
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: app-config
            namespace: "{{ config_namespace }}"
          data:
            # User credentials (non-sensitive)
            QBITTORRENT_USERNAME: "{{ config.download_clients.qbittorrent.username }}"
            GRAFANA_USERNAME: "{{ config.monitoring.grafana.username }}"
            SPEEDTEST_TRACKER_ADMIN_NAME: "{{ config.monitoring.speedtest_tracker.admin_name }}"
            SPEEDTEST_TRACKER_ADMIN_EMAIL: "{{ config.monitoring.speedtest_tracker.admin_email }}"
            CODE_SERVER_DEFAULT_WORKSPACE: "{{ config.development.code_server.default_workspace }}"

            # Certificate configuration
            CERT_MANAGER_EMAIL: "{{ config.certificates.acme.email }}"
            CLOUDFLARE_EMAIL: "{{ config.certificates.cloudflare.email }}"
            DUCKDNS_DOMAIN: "{{ config.certificates.duckdns.domain }}"

    - name: Create API keys and sensitive data Secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: api-keys
            namespace: "{{ config_namespace }}"
          type: Opaque
          stringData:
            # VPN API keys
            PREMIUMIZE_API_KEY: "{{ config.vpn.providers.premiumize.api_key }}"
            REALDEBRID_API_KEY: "{{ config.vpn.providers.realdebrid.api_key }}"

            # Tailscale
            TS_AUTHKEY: "{{ config.cluster.tailscale.authkey }}"

            # Certificate API keys
            CLOUDFLARE_API_KEY: "{{ config.certificates.cloudflare.api_key }}"
            CLOUDFLARE_DNS_API_TOKEN: "{{ config.certificates.cloudflare.dns_api_token }}"
            CLOUDFLARE_ZONE_ID: "{{ config.certificates.cloudflare.zone_id }}"
            CLOUDFLARE_ZONE_API_TOKEN: "{{ config.certificates.cloudflare.zone_api_token }}"
            DUCKDNS_TOKEN: "{{ config.certificates.duckdns.token }}"

            # Media service API keys
            PLEX_TOKEN: "{{ config.media_services.plex.token }}"
            PLEX_CLAIM: "{{ config.media_services.plex.claim }}"
            PLEX_SERVER_MACHINE_ID: "{{ config.media_services.plex.server_machine_id }}"
            PLEX_MOVIE_LIBRARY_ID: "{{ config.media_services.plex.movie_library_id }}"
            PLEX_TV_LIBRARY_ID: "{{ config.media_services.plex.tv_library_id }}"
            JELLYFIN_API_KEY: "{{ config.media_services.jellyfin.api_key }}"
            TAUTULLI_API_KEY: "{{ config.media_services.tautulli.api_key }}"

            # Servarr API keys
            SONARR_API_KEY: "{{ config.servarr.sonarr.api_key }}"
            RADARR_API_KEY: "{{ config.servarr.radarr.api_key }}"
            PROWLARR_API_KEY: "{{ config.servarr.prowlarr.api_key }}"
            BAZARR_API_KEY: "{{ config.servarr.bazarr.api_key }}"
            LIDARR_API_KEY: "{{ config.servarr.lidarr.api_key }}"
            READARR_API_KEY: "{{ config.servarr.readarr.api_key }}"
            WHISPARR_API_KEY: "{{ config.servarr.whisparr.api_key }}"
            SABNZBD_API_KEY: "{{ config.download_clients.sabnzbd.api_key }}"
            JACKETT_API_KEY: "{{ config.indexers.jackett.api_key }}"

            # Stremio API keys and secrets
            AIOSTREAMS_API_KEY: "{{ config.stremio.aiostreams.api_key }}"
            COMET_DATABASE_URL: "{{ config.stremio.comet.database_url }}"
            COMET_DASHBOARD_PASSWORD: "{{ config.stremio.comet.dashboard_password }}"
            COMET_PROXY_PASSWORD: "{{ config.stremio.comet.proxy_password }}"
            MEDIAFUSION_SECRET_KEY: "{{ config.stremio.mediafusion.secret_key }}"
            MEDIAFUSION_API_PASSWORD: "{{ config.stremio.mediafusion.api_password }}"
            MEDIAFLOW_PROXY_API_PASSWORD: "{{ config.stremio.mediaflow_proxy.api_password }}"

            # Authentication secrets
            TINYAUTH_SECRET: "{{ config.auth.tinyauth.secret }}"
            TINYAUTH_USERS: "{{ config.auth.tinyauth.users }}"
            OAUTH_SECRET: "{{ config.auth.oauth.secret }}"
            AUTH_SECRET: "{{ config.auth.auth_secret }}"

            # External API keys
            TMDB_API_KEY: "{{ config.external_apis.tmdb.api_key }}"
            TMDB_ACCESS_TOKEN: "{{ config.external_apis.tmdb.access_token }}"
            OPENAI_API_KEY: "{{ config.external_apis.openai.api_key }}"
            TAVILY_API_KEY: "{{ config.external_apis.tavily.api_key }}"
            FIRECRAWL_API_KEY: "{{ config.external_apis.firecrawl.api_key }}"

            # Application passwords
            QBITTORRENT_PASSWORD: "{{ config.download_clients.qbittorrent.password }}"
            GRAFANA_PASSWORD: "{{ config.monitoring.grafana.password }}"
            SPEEDTEST_TRACKER_ADMIN_PASSWORD: "{{ config.monitoring.speedtest_tracker.admin_password }}"
            SPEEDTEST_TRACKER_API_TOKEN: "{{ config.monitoring.speedtest_tracker.api_token }}"
            SPEEDTEST_TRACKER_APP_KEY: "{{ config.monitoring.speedtest_tracker.app_key }}"
            CODE_SERVER_PASSWORD: "{{ config.development.code_server.password }}"
            CODE_SERVER_SUDO_PASSWORD: "{{ config.development.code_server.sudo_password }}"

    - name: Create node configuration ConfigMap
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: node-config
            namespace: "{{ config_namespace }}"
          data:
            # Master node
            MASTER_HOSTNAME: "{{ config.cluster.tailscale.nodes.master.hostname }}"
            MASTER_TAILSCALE_IP: "{{ config.cluster.tailscale.nodes.master.tailscale_ip }}"
            MASTER_EXTERNAL_IP: "{{ config.cluster.tailscale.nodes.master.external_ip }}"

            # Agent nodes (JSON format for easy parsing)
            AGENT_NODES: |
              {{ config.cluster.tailscale.nodes.agents | to_nice_json }}

            # K3s configuration
            K3S_VERSION: "{{ config.cluster.k3s.version }}"
            K3S_CLUSTER_CIDR: "{{ config.cluster.k3s.cluster_cidr }}"
            K3S_SERVICE_CIDR: "{{ config.cluster.k3s.service_cidr }}"

    - name: Create K3s token Secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: k3s-token
            namespace: "{{ config_namespace }}"
          type: Opaque
          stringData:
            K3S_TOKEN: "{{ config.cluster.k3s.token }}"

    - name: Display configuration summary
      debug:
        msg: |
          =============================================================================
          KUBERNETES CONFIGURATION GENERATED
          =============================================================================

          ConfigMaps created in namespace '{{ config_namespace }}':
          - cluster-config: General cluster configuration
          - app-config: Application configuration (non-sensitive)
          - node-config: Node and network configuration

          Secrets created in namespace '{{ config_namespace }}':
          - api-keys: API keys and sensitive configuration
          - k3s-token: K3s cluster token

          To use these in your deployments, reference them like:

          envFrom:
            - configMapRef:
                name: cluster-config
            - configMapRef:
                name: app-config
            - secretRef:
                name: api-keys

          Or for specific values:

          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: DOMAIN
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: PLEX_TOKEN
          =============================================================================
