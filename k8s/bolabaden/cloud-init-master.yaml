#cloud-config
# =============================================================================
# Cloud-Init Configuration for K3s Master Node
# =============================================================================
# This file sets up a K3s master node with Tailscale networking
# Replace the variables with actual values from your .env file
# =============================================================================

hostname: beatapostapita

# Update packages
package_update: true
package_upgrade: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - unattended-upgrades

# Create ubuntu user with sudo access
users:
  - name: ubuntu
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7... # Add your SSH public key here

# Configure SSH
ssh_authorized_keys:
  - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7... # Add your SSH public key here

# Configure UFW firewall
runcmd:
  # Basic system setup
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable tailscaled
  - systemctl start tailscaled

  # Connect to Tailscale (replace with your auth key)
  - tailscale up --authkey=tskey-auth-kQKGfRkbkK11CNTRL-qSFbfpn4ayYrvCtaHzcXyY3YG6gLE29WP --hostname=beatapostapita --accept-routes

  # Install K3s server
  - >
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.33.0+k3s1 sh -s - server
    --write-kubeconfig-mode=644
    --cluster-cidr=10.42.0.0/16
    --service-cidr=10.43.0.0/16
    --cluster-dns=10.43.0.10
    --bind-address=0.0.0.0
    --advertise-address=$(tailscale ip -4)
    --node-external-ip=$(curl -s http://checkip.amazonaws.com/)
    --disable=traefik
    --disable=servicelb
    --flannel-backend=vxlan
    --token=e96353e53c085c131e7f7d7d7e0845bf4895519a7e1899aebc5b3c6a40c6ff6a

  # Wait for K3s to be ready
  - sleep 30
  - systemctl enable k3s
  - systemctl start k3s

  # Set up kubectl for ubuntu user
  - mkdir -p /home/ubuntu/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
  - chown ubuntu:ubuntu /home/ubuntu/.kube/config
  - chmod 600 /home/ubuntu/.kube/config

  # Create ssh directory for ubuntu user
  - mkdir -p /home/ubuntu/.ssh
  - chown ubuntu:ubuntu /home/ubuntu/.ssh
  - chmod 700 /home/ubuntu/.ssh

# Set timezone
timezone: America/Chicago

# Configure automatic security updates
write_files:
  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# Final message
final_message: |
  K3s master node setup complete!

  Node: beatapostapita
  Tailscale IP: Run 'tailscale ip -4' to get IP
  K3s Status: Run 'kubectl get nodes' to check cluster

  Next steps:
  1. Note the Tailscale IP address
  2. Set up agent nodes with the same token
  3. Run the deployment script from your local machine
