---
- name: Create VPN gateway namespace
  kubernetes.core.k8s:
    name: vpn-gateway
    api_version: v1
    kind: Namespace
    state: present

- name: Deploy pod-gateway configuration
  kubernetes.core.k8s:
    definition: "{{ item }}"
    state: present
  loop: "{{ pod_gateway_configs }}"

- name: Generate VPN gateway deployments
  template:
    src: vpn-gateway-deployment.yml.j2
    dest: "/tmp/vpn-gateway-{{ item }}.yml"
  loop: "{{ vpn_providers.premiumize.countries }}"
  when: vpn_providers.premiumize is defined

- name: Deploy VPN gateways
  kubernetes.core.k8s:
    src: "/tmp/vpn-gateway-{{ item }}.yml"
    state: present
  loop: "{{ vpn_providers.premiumize.countries }}"
  when: vpn_providers.premiumize is defined

- name: Deploy WARP gateway
  kubernetes.core.k8s:
    definition: "{{ warp_gateway_config }}"
    state: present
  when: vpn_providers.warp.enabled

- name: Deploy VPN failover controller
  kubernetes.core.k8s:
    definition: "{{ vpn_failover_controller }}"
    state: present

- name: Wait for VPN system to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: vpn-failover-controller
    namespace: vpn-gateway
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Test VPN connectivity
  include_tasks: test_vpn.yml
