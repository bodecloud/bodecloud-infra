---
# Pod-gateway configuration
pod_gateway_configs:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: pod-gateway-config
      namespace: vpn-gateway
    data:
      settings.sh: |
        #!/bin/bash
        # Pod-gateway settings
        export VXLAN_ID=42
        export VXLAN_IP_NETWORK="172.16.1"
        export VXLAN_GATEWAY_FIRST_DYNAMIC_IP=20
        export VPN_INTERFACE_MTU=1500
        export VXLAN_PORT=4789

  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: pod-gateway
      namespace: vpn-gateway

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: pod-gateway
    rules:
      - apiGroups: [""]
        resources: ["pods", "services", "endpoints"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["deployments", "replicasets"]
        verbs: ["get", "list", "watch"]

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: pod-gateway
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: pod-gateway
    subjects:
      - kind: ServiceAccount
        name: pod-gateway
        namespace: vpn-gateway

# WARP gateway configuration
warp_gateway_config:
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: warp-gateway
    namespace: vpn-gateway
    labels:
      app: warp-gateway
      component: vpn-gateway
      priority: "10"
  spec:
    replicas: 0
    selector:
      matchLabels:
        app: warp-gateway
    template:
      metadata:
        labels:
          app: warp-gateway
          component: vpn-gateway
      spec:
        containers:
          - name: warp
            image: caomingjun/warp:latest
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
              privileged: true
            env:
              - name: WARP_SLEEP
                value: "2"
            ports:
              - containerPort: 1080
                name: socks5
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 128Mi
                cpu: 100m

# VPN failover controller
vpn_failover_controller:
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: vpn-failover-controller
    namespace: vpn-gateway
    labels:
      app: vpn-failover-controller
      component: vpn-gateway
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: vpn-failover-controller
    template:
      metadata:
        labels:
          app: vpn-failover-controller
          component: vpn-gateway
      spec:
        serviceAccountName: vpn-failover-sa
        containers:
          - name: failover-controller
            image: python:3.9-alpine
            command:
              - python3
              - -c
              - |
                import time
                import subprocess
                import json
                import requests
                from urllib.parse import urlparse

                # VPN Gateway priority order
                VPN_GATEWAYS = [
                    "gluetun-premiumize-us:8888:http",
                    "gluetun-premiumize-nl:8888:http", 
                    "gluetun-premiumize-gb:8888:http",
                    "gluetun-premiumize-de:8888:http",
                    "gluetun-premiumize-ca:8888:http",
                    "warp-gateway:1080:socks5"
                ]

                def test_gateway(gateway_info):
                    gateway, port, gw_type = gateway_info.split(':')
                    try:
                        if gw_type == "socks5":
                            proxy_url = f"socks5://{gateway}.vpn-gateway.svc.cluster.local:{port}"
                        else:
                            proxy_url = f"http://{gateway}.vpn-gateway.svc.cluster.local:{port}"
                        
                        result = subprocess.run([
                            'curl', '-s', '--max-time', '5', '--proxy', proxy_url, 
                            'http://httpbin.org/ip'
                        ], capture_output=True, timeout=10)
                        return result.returncode == 0
                    except:
                        return False

                def scale_deployment(deployment, replicas):
                    try:
                        subprocess.run([
                            'kubectl', 'scale', 'deployment', deployment, 
                            f'--replicas={replicas}', '-n', 'vpn-gateway'
                        ], check=True, capture_output=True)
                        return True
                    except:
                        return False

                def get_active_gateway():
                    for gateway_info in VPN_GATEWAYS:
                        gateway = gateway_info.split(':')[0]
                        try:
                            result = subprocess.run([
                                'kubectl', 'get', 'deployment', gateway, '-n', 'vpn-gateway',
                                '-o', 'jsonpath={.spec.replicas}'
                            ], capture_output=True, text=True)
                            if result.returncode == 0 and int(result.stdout.strip() or "0") > 0:
                                return gateway_info
                        except:
                            continue
                    return None

                # Main failover loop
                while True:
                    print(f"=== VPN Gateway Failover Check {time.strftime('%Y-%m-%d %H:%M:%S')} ===")
                    
                    current_active = get_active_gateway()
                    
                    if current_active:
                        current_gateway = current_active.split(':')[0]
                        print(f"Current active gateway: {current_gateway}")
                        
                        if test_gateway(current_active):
                            print(f"✓ Current gateway {current_gateway} is healthy")
                            time.sleep(30)
                            continue
                        else:
                            print(f"✗ Current gateway {current_gateway} is unhealthy, initiating failover")
                            scale_deployment(current_gateway, 0)
                    else:
                        print("No active gateway found, starting failover")
                    
                    # Find next working gateway
                    new_gateway_found = False
                    for gateway_info in VPN_GATEWAYS:
                        gateway = gateway_info.split(':')[0]
                        print(f"Testing failover candidate: {gateway}")
                        
                        if scale_deployment(gateway, 1):
                            time.sleep(30)  # Wait for pod to be ready
                            if test_gateway(gateway_info):
                                print(f"✅ Failover successful to {gateway}")
                                new_gateway_found = True
                                break
                            else:
                                print(f"✗ {gateway} failed health check, trying next")
                                scale_deployment(gateway, 0)
                    
                    if not new_gateway_found:
                        print("❌ All VPN gateways failed! No connectivity available.")
                    
                    time.sleep(30)
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 128Mi
                cpu: 100m
