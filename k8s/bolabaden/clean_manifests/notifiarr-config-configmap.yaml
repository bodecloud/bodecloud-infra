apiVersion: v1
data:
  notifiarr.conf: "###############################################\n# Notifiarr Client
    Example Configuration File #\n# Created by Notifiarr v0.4.4   @ 232801T0734 #\n###############################################\n\n##
    This API key must be copied from your notifiarr.com account.\napi_key = \"api-key-from-notifiarr.com\"\n\n##
    Setting a UI password enables the human accessible web GUI. Must be at least 9
    characters.\n## The default username is admin; change it by setting ui_password
    to \"username:password\"\n## Set to \"webauth\" to disable the login form and
    use only proxy authentication. See upstreams, below.\n## Your auth proxy must
    pass the x-webauth-user header if you set this to \"webauth\".\n## You may also
    set a custom auth header by setting to \"webauth:<header>\" e.g. \"webauth:remote-user\"\n##
    Disable auth by setting this to \"noauth\". Not recommended. Requires \"upstreams\"
    being set.\nui_password = \"webauth\"\n\n## The ip:port to listen on for incoming
    HTTP requests. 0.0.0.0 means all/any IP and is recommended!\n## You may use \"127.0.0.1:5454\"
    to listen only on localhost; good if using a local proxy.\n## This is used to
    receive Plex webhooks and Media Request commands.\n##\nbind_addr = \"0.0.0.0:5454\"\n\n##
    This application can update itself on Windows systems.\n## Set this to \"daily\"
    to check GitHub every day for updates.\n## You may also set it to a Go duration
    like \"12h\" or \"72h\".\n## THIS ONLY WORKS ON WINDOWS\nauto_update = \"off\"\n\n##
    Quiet makes the app not log anything to output.\n## Recommend setting log files
    if you make the app quiet.\n## This is always true on Windows and macOS app.\n##
    Log files are automatically written on those platforms.\n##\nquiet = false\n\n##
    Debug prints more data and json payloads. This increases application memory usage.\ndebug
    = false\nmax_body = 0 # maximum body size for debug logs. 0 = no limit.\n\nhost_id
    = \"brunner56-notifiarr.elfhosted.com\"\n\n## All API paths start with /api. This
    does not affect incoming /plex webhooks.\n## Change it to /somethingelse/api by
    setting urlbase to \"/somethingelse\"\n##\nurlbase = \"/\"\n\n## Allowed upstream
    networks. Networks here are allowed to send two special headers:\n## (1) x-forwarded-for
    (2) x-webauth-user\n## The first header sets the IPs in logs.\n## The second header
    allows an auth proxy to set a logged-in username. Be careful.\n##\n## Set this
    to your reverse proxy server's IP or network. If you leave off the mask,\n## then
    /32 or /128 is assumed depending on IP version. Empty by default. Example:\n##\nupstreams
    = [ \"10.2.0.0/15\" ] # for ElfHosted's Traefik pods\n## If you provide a cert
    and key file (pem) paths, this app will listen with SSL/TLS.\n## Uncomment both
    lines and add valid file paths. Make sure this app can read them.\n##\n#ssl_key_file
    \ = '/path/to/cert.key'\n#ssl_cert_file = '/path/to/cert.key'\n\n## If you set
    these, logs will be written to these files.\n## If blank on windows or macOS,
    log file paths are chosen for you.\nlog_file = '/tmp/notifiarr.log'\nhttp_log
    = '/tmp/notifiarr.http.log'\n##\n## Set this to the number of megabytes to rotate
    files.\nlog_file_mb = 100\n##\n## How many files to keep? 0 = all.\nlog_files
    = 5\n##\n## Unix file mode for new log files. Umask also affects this.\n## Missing,
    blank or 0 uses default of 0600. Permissive is 0644. Ignored by Windows.\nfile_mode
    = \"0600\"\n\n## Web server and website timeout.\n##\ntimeout = \"1m\"\n\n## This
    application can integrate with apt on Debian-based OSes.\n## Set apt to true to
    enable this integration. A true setting causes\n## notifiarr to relay apt package
    install/update hooks to notifiarr.com.\n##\napt = false\n\n## Setting serial to
    true makes the app use fewer threads when polling apps.\n## This spreads CPU usage
    out and uses a bit less memory.\nserial = false\n\n## Retries controls how many
    times to retry requests to notifiarr.com.\n## Sometimes cloudflare returns a 521,
    and this mitigates those problems.\n## Setting this to 0 will take the default
    of 4. Use 1 to disable retrying.\nretries = 4\n\n##################\n# Starr Settings
    #\n##################\n\n## The API keys are specific to the app. Get it from
    Settings -> General.\n## Configurations for unused apps are harmless. Set URL
    and API key for\n## apps you have and want to make requests to using Media Bot.\n##
    See the Service Checks section below for information about setting the names.\n##\n##
    Examples follow. UNCOMMENT (REMOVE #), AT MINIMUM: [[header]], url, api_key\n##
    Setting any application timeout to \"-1s\" will disable that application.\n\n[[lidarr]]\nname
    \    = \"Lidarr | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \     = \"http://lidarr:8686/\"\napi_key  = \"0e68e28531a249659737513d3102bfe9\"\n\n\n[[prowlarr]]\nname
    \    = \"Prowlarr | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \     = \"http://prowlarr:9696/\"\napi_key  = \"c53bc3bd17c645c3a457e5342a02cd66\"\n\n\n[[radarr]]\nname
    \     = \"Radarr | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \      = \"http://radarr:7878/\"\napi_key   = \"041776c8d5f74bf295aa486d9d51c33a\"\n\n[[radarr]]\nname
    \     = \"Radarr 4K | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \      = \"http://radarr4k:7878/\"\napi_key   = \"7da5d4ba79804527b78a78b68c7a0781\"\n\n[[readarr]]\nname
    \     = \"Readarr | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \      = \"http://readarr:8787/\"\napi_key   = \"74b033ff59964011b8a32c014fdb9b68\"\n\n[[readarr]]\nname
    \     = \"Readarr Audio | ElfHosted\" # Set a name to enable checks of your service.\nurl
    \      = \"http://readarraudio:8787/\"\napi_key   = \"8496cefe2c6b46ee921e18caddf6a943\"
    \   \n\n[[sonarr]]\nname      = \"Sonarr | ElfHosted\"  # Set a name to enable
    checks of your service.\nurl       = \"http://sonarr:8989/\"\napi_key   = \"a6f1c7d07fab4be49c5c1cb545f85a76\"\n\n[[sonarr]]\nname
    \     = \"Sonarr 4K | ElfHosted\"  # Set a name to enable checks of your service.\nurl
    \      = \"http://sonarr4k:8989/\"\napi_key   = \"e4f93c115169484bbed19821f7ac8e49\"\n\n#
    Download Client Configs (below) are used for dashboard state and service checks.\n\n[[deluge]]\nname
    \    = \"Deluge | ElfHosted\"  # Set a name to enable checks of your service.\nurl
    \     = \"http://deluge:8112/\"\npassword = \"deluge\" \n\n[[qbit]]\nname     =
    \"Qbittorrent | ElfHosted\"  # Set a name to enable checks of your service.\nurl
    \     = \"http://qbittorrent:8080/\"\nuser     = \"\"\npass     = \"\"\n\n[[rtorrent]]\nname
    \    = \"ruTorrent | ElfHosted\"  # Set a name to enable checks of your service.\nurl
    \     = \"http://rutorrent:8080/plugins/rpc/rpc.php\"\nuser     = \"\"\npass     =
    \"\"\n\n[[nzbget]]\nname     = \"NZBGet | ElfHosted\"  # Set a name to enable
    checks of your service.\nurl      = \"http://nzbget:6789/\"\nuser     = \"\"\npass
    \    = \"\"\n\n\n[[sabnzbd]]\nname     = \"SABnzbd | ElfHosted\"  # Set a name
    to enable checks of this application.\nurl      = \"http://sabnzbd:8080/\"\napi_key
    \ = \"8flkbru7ncdps3dzzgk48q2msz41m4on\"\n\n\n#################\n# Plex Settings
    #\n#################\n\n## Find your token: https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/\n##\n#[plex]\n#url
    \    = \"http://localhost:32400/\" # Your plex URL\n#token   = \"\" # your plex
    token; get this from a web inspector\n\n#####################\n# Tautulli Settings
    #\n#####################\n\n# Enables email=>username map. Set a name to enable
    service checks.\n# Must uncomment [tautulli], 'api_key' and 'url' at a minimum.\n\n#[tautulli]\n#
    \ name    = \"\" # only set a name to enable service checks.\n#  url     = \"http://localhost:8181/\"
    # Your Tautulli URL\n#  api_key = \"\" # your tautulli api key; get this from
    settings\n\n##################\n# MySQL Snapshot #\n##################\n\n# Enables
    MySQL process list in snapshot output.\n# Adding a name to a server enables TCP
    service checks.\n# Example Grant:\n# GRANT PROCESS ON *.* to 'notifiarr'@'localhost'\n\n#[[snapshot.mysql]]\n#name
    = \"\" # only set a name to enable service checks.\n#host = \"localhost:3306\"\n#user
    = \"notifiarr\"\n#pass = \"password\"\n\n###################\n# Nvidia Snapshot
    #\n###################\n\n# The app will automatically collect Nvidia data if
    nvidia-smi is present.\n# Use the settings below to disable Nvidia GPU collection,
    or restrict collection to only specific Bus IDs.\n# SMI Path is found automatically
    if left blank. Set it to path to nvidia-smi (nvidia-smi.exe on Windows).\n\n[snapshot.nvidia]\ndisabled
    = true\nsmi_path = ''''''\nbus_ids  = []\n\n##################\n# Service Checks
    #\n##################\n\n## This application performs service checks on configured
    services at the specified interval.\n## The service states are sent to Notifiarr.com.
    Failed services generate a notification.\n## Setting names on Starr apps (above)
    enables service checks for that app.\n## Setting the Interval to \"-1s\" (Disabled
    in UI) will disable service checks on that named instance.\n## Use the [[service]]
    directive to add more service checks. Example below.\n\n[services]\n  disabled
    = true  # Setting this to true disables all service checking routines.\n  parallel
    = 1     # How many services to check concurrently. 1 should be enough.\n  interval
    = \"10m\" # How often to send service states to Notifiarr.com. Minimum = 5m.\n
    \ log_file = '/tmp/notifiarr.services.log'    # Service Check logs go to the app
    log by default. Change that by setting a services.log file here.\n\n## Uncomment
    the following section to create a service check on a URL or IP:port.\n## You may
    include as many [[service]] sections as you have services to check.\n## Do not
    add Radarr, Sonarr, Readarr, Prowlarr, or Lidarr here! Add a name to enable their
    checks.\n##\n## Example with comments follows.\n#[[service]]\n#  name     = \"MyServer\"
    \         # name must be unique\n#  type     = \"http\"              # type can
    be \"http\" or \"tcp\"\n#  check    = 'http://127.0.0.1/'  # url for 'http', host/IP:port
    for 'tcp'\n#  expect   = \"200\"               # return code to expect (for http
    only)\n#  timeout  = \"10s\"               # how long to wait for tcp or http
    checks.\n#  interval = \"5m\"                # how often to check this service.\n\n##
    Another example. Remember to uncomment [[service]] if you use this!\n##\n#[[service]]\n#
    \ name    = \"Bazarr\"\n#  type    = \"http\"\n#  check   = 'http://10.1.1.2:6767/series/'\n#
    \ expect  = \"200\"\n#  timeout = \"10s\"\n\n\n######################\n# File
    & Log Watcher #\n######################\n\n## Tail a log file, regex match lines,
    and send notifications.\n## Example:\n\n#[[watch_file]]\n#  path  = '/var/log/system.log'\n#
    \ skip  = '''error'''\n#  regex = '''[Ee]rror'''\n#  poll  = false\n#  pipe  =
    false\n#  must_exist = false\n#  log_match  = true\n\n\n\n###################\n#
    Custom Commands #\n###################\n\n## Run and trigger custom commands.\n##
    Commands may have required arguments thet can be passed in when the command is
    run.\n## These use the format ({regex}) - a regular expression wrapped by curly
    braces and parens.\n## The example below allows a user to run any combination
    of ls -la on /usr, /home, or /tmp:\n## command = \"/bin/ls ({-la|-al|-l|-a}) ({/usr|/home|/tmp})\"\n##\n##
    Full Example (remove the leading # hashes to use it):\n\n#[[command]]\n#  name
    \   = 'some-name-for-logs'\n#  command = '/var/log/system.log'\n#  shell   = false\n#
    \ log     = true\n#  notify  = true\n#  timeout = \"10s\"\n"
kind: ConfigMap
metadata:
  annotations:
    meta.helm.sh/release-name: brunner56
    meta.helm.sh/release-namespace: bolabaden
  labels:
    app.kubernetes.io/managed-by: Helm
    helm.toolkit.fluxcd.io/name: brunner56
    helm.toolkit.fluxcd.io/namespace: bolabaden
  name: notifiarr-config
  namespace: bolabaden
