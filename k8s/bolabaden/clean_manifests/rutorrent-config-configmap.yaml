apiVersion: v1
data:
  .rtlocal.rc-elfhosted: "# Launch as a daemon\nsystem.daemon.set = true\n\n # madvise\npieces.preload.type.set
    = 1 \npieces.memory.max.set = 4096M\n\nnetwork.send_buffer.size.set = 16M\nnetwork.receive_buffer.size.set
    = 48M\n\n# Initialize plugins\nexecute2 = {sh,-c,/usr/bin/php /var/www/rutorrent/php/initplugins.php
    rtorrent &}\n\n# system is stable, reduce session save from 20min to 12h\nschedule2
    = session_save, 1200, 43200, ((session.save))\n\n# reduce fragmentation\nsystem.file.allocate
    = 1\n\nmethod.insert = get_port_range, simple|private, \"execute.capture=ash,-c,\\\"cat
    /port-range/port-range.txt\\\"\"\nnetwork.port_range.set = \"$cat=$get_port_range=\"\n"
  .rtorrent.rc-elfhosted: "\n# Instance layout\nmethod.insert = cfg.basedir, private|const|string,
    (cat,\"/data/rtorrent/\")\nmethod.insert = cfg.download, private|const|string,
    (cat,\"/storage/elfstorage/downloads/\")\nmethod.insert = cfg.download_complete,
    private|const|string, (cat,(cfg.download),\"completed/\")\nmethod.insert = cfg.download_temp,
    private|const|string, (cat,\"/tmp/\")\nmethod.insert = cfg.logs, private|const|string,
    (cat,(cfg.basedir),\"log/\")\nmethod.insert = cfg.session, private|const|string,
    (cat,(cfg.basedir),\".session/\")\nmethod.insert = cfg.watch, private|const|string,
    (cat,(cfg.basedir),\"watch/\")\nmethod.insert = cfg.rundir, private|const|string,
    (cat,\"/var/run/rtorrent/\")\n\n# Gets the full path of data of a torrent (it's
    a workaround for the possibly empty 'd.base_path' attribute)\nmethod.insert =
    d.data_path, simple, \"if=(d.is_multi_file), (cat,(d.directory),/), (cat,(d.directory),/,(d.name))\"\n\n#
    Default directory to save the downloaded torrents\n# We used this when we downloaded
    to /tmp\n# directory.default.set = (cat,(cfg.download_temp))\n\ndirectory.default.set
    = (cat,(cfg.download_complete))\n\n# Default session directory\nsession.path.set
    = (cat,(cfg.session))\n\n# PID file\nexecute.nothrow = sh,-c,(cat,\"echo >\",(cfg.rundir),\"rtorrent.pid\",\"
    \",(system.pid))\n\n# SCGI socket and make it group-writable and secure\nnetwork.scgi.open_local
    = (cat, (cfg.rundir), \"scgi.socket\")\nschedule2 = scgi_permission, 0, 0, (cat,\"execute.nothrow=chmod,\\\"g+w,o=\\\",\",(cfg.rundir),\"scgi.socket\")\n\n#
    Listening port for incoming peer traffic\n# network.port_range.set = 50000-50000\n#
    network.port_random.set = no\n\n# UDP port to use for DHT\n# dht.port.set = 6881\n\n#
    XMLRPC size limit\nnetwork.xmlrpc.size_limit.set = 1M\n\n# Logging\n## levels
    = critical error warn notice info debug\n## groups = connection_* dht_* peer_*
    rpc_* storage_* thread_* tracker_* torrent_*\nlog.open_file = \"log\",(cat,(cfg.logs),\"rtorrent.log\")\nlog.open_file
    = \"debug-log\",(cat,(cfg.logs),\"rtorrent-debug.log\")\nlog.add_output = \"info\",\"log\"\nlog.add_output
    = \"debug\",\"debug-log\"\nlog.add_output = \"rpc_events\",\"log\"\n#log.execute
    = (cat,(cfg.logs),\"execute.log\")\n#log.xmlrpc = (cat,(cfg.logs),\"xmlrpc.log\")\n\n\n\n####
    Originally from .rtorrent.rc\n\n# Maximum and minimum number of peers to connect
    to per torrent\nthrottle.min_peers.normal.set = 1\nthrottle.max_peers.normal.set
    = 100\n\n# Same as above but for seeding completed torrents (-1 = same as downloading)\nthrottle.min_peers.seed.set
    = 1\nthrottle.max_peers.seed.set = 5\n\n# Maximum number of simultanious uploads
    per torrent\nthrottle.max_uploads.set = 15\n\n# Global upload and download rate
    in KiB. \"0\" for unlimited\nthrottle.global_down.max_rate.set_kb = 0\nthrottle.global_up.max_rate.set_kb
    = 0\n\n# Enable DHT support for trackerless torrents or when all trackers are
    down\n# May be set to \"disable\" (completely disable DHT), \"off\" (do not start
    DHT),\n# \"auto\" (start and stop DHT as needed), or \"on\" (start DHT immediately)\ndht.mode.set
    = disable\n\n# Enable peer exchange (for torrents not marked private)\nprotocol.pex.set
    = no\n\n# Check hash for finished torrents. Might be usefull until the bug is\n#
    fixed that causes lack of diskspace not to be properly reported\npieces.hash.on_completion.set
    = no\n\n# Set whether the client should try to connect to UDP trackers\ntrackers.use_udp.set
    = yes\n\n# Set the max amount of memory address space used to mapping file chunks.
    This refers to memory mapping, not\n# physical memory allocation. Default: 1GB
    (max_memory_usage)\n# This may also be set using ulimit -m where 3/4 will be allocated
    to file chunks\n\n# Alternative calls to bind and ip that should handle dynamic
    ip's\n#schedule2 = ip_tick,0,1800,ip=rakshasa\n#schedule2 = bind_tick,0,1800,bind=rakshasa\n\n#
    Encryption options, set to none (default) or any combination of the following:\n#
    allow_incoming, try_outgoing, require, require_RC4, enable_retry, prefer_plaintext\nprotocol.encryption.set
    = allow_incoming,try_outgoing,enable_retry\n\n# Set the umask for this process,
    which is applied to all files created by the program\nsystem.umask.set = 0022\n\n#
    Add a preferred filename encoding to the list\nencoding.add = UTF-8\n\n# Watch
    a directory for new torrents, and stop those that have been deleted\nschedule2
    = watch_directory, 1, 1, (cat,\"load.start=\",(cfg.watch),\"*.torrent\")\nschedule2
    = untied_directory, 5, 5, (cat,\"stop_untied=\",(cfg.watch),\"*.torrent\")\n\n#
    Close torrents when diskspace is low\nschedule2 = monitor_diskspace, 15, 60, ((close_low_diskspace,1000M))\n\n#
    Move finished (no need Autotools/Automove plugin on ruTorrent)\n# method.insert
    = d.get_finished_dir, simple, \"cat=$cfg.download_complete=,$d.custom1=\"\n# method.insert
    = d.move_to_complete, simple, \"d.directory.set=$argument.1=; execute=mkdir,-p,$argument.1=;
    execute=mv,-u,$argument.0=,$argument.1=; d.save_full_session=\"\n# method.set_key
    = event.download.finished,move_complete,\"d.move_to_complete=$d.data_path=,$d.get_finished_dir=\"\n\n#
    Erase data when torrent deleted (no need erasedata plugin on ruTorrent)\n# method.set_key
    = event.download.erased,delete_erased,\"execute=rm,-rf,--,$d.data_path=\"   \n"
  02-wait-for-vpn.sh: "#!/usr/bin/env bash\n\necho \"Waiting for VPN to be connected...\"\nwhile
    ! grep -s -q \"connected\" /shared/vpnstatus; do\n    # Also account for gluetun-style
    http controller\n    if (/usr/local/bin/curl -s http://localhost:8042/v1/openvpn/status
    | grep -q running); then\n        break\n    fi    \n    echo \"VPN not connected\"\n
    \   sleep 2\ndone\necho \"VPN Connected, starting application...\"\n"
  03-set-inbound-port.sh: |
    #!/usr/bin/env bash

    # If we have been given a port by pia/gluetun, prepare for it before starting
    PORT_FILE=/data/rtorrent/forwarded-port
    PORT_FILE_OVERRIDE=/data/rtorrent/forwarded-port-override

    # Apply the port
    if [[ -f "$PORT_FILE_OVERRIDE" ]]; then
        echo -n $(cat $PORT_FILE_OVERRIDE)-$(cat $PORT_FILE_OVERRIDE) > /port-range/port-range.txt

    elif [[ -f "$PORT_FILE" ]]; then
        echo -n $(cat $PORT_FILE)-$(cat $PORT_FILE) > /port-range/port-range.txt
        mv $PORT_FILE ${PORT_FILE}-previous
    else
        sleep 1m # failsafe incase it took a while to create the file, give us one last chance
        if [[ -f "$PORT_FILE" ]]; then
          echo -n $(cat $PORT_FILE)-$(cat $PORT_FILE) > /port-range/port-range.txt
          mv $PORT_FILE ${PORT_FILE}-previous
        else
          echo -n 1234-1234 > /port-range/port-range.txt
        fi
    fi
  05-apply-elfhosted-config.sh: |
    #!/bin/bash
    cp /.rtlocal.rc-elfhosted /etc/rtorrent/.rtlocal.rc
    cp /.rtorrent.rc-elfhosted /data/rtorrent/.rtorrent.rc
