    helm.toolkit.fluxcd.io/namespace: bolabaden
  name: brunner56-rivenfrontend
  namespace: bolabaden
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: brunner56
      app.kubernetes.io/name: rivenfrontend
  strategy:
    type: Recreate
  template:
    metadata:
