apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"labels":{"app.kubernetes.io/component":"cronjob","app.kubernetes.io/instance":"myprecious","app.kubernetes.io/name":"backup-config"},"name":"backup-config","namespace":"default"},"spec":{"jobTemplate":{"spec":{"template":{"spec":{"containers":[{"args":["-c","echo \"Backing up config...\" \u0026\u0026 tar -czf /backup/config-$(date +%Y%m%d-%H%M%S).tar.gz -C /config ."],"command":["/bin/bash"],"image":"filebrowser/filebrowser:v2.31.2","name":"backup-config","resources":{"limits":{"cpu":"500m","memory":"1Gi"},"requests":{"cpu":"100m","memory":"256Mi"}}}],"restartPolicy":"OnFailure"}}}},"schedule":"0 2 * * *"}}
  labels:
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/instance: myprecious
    app.kubernetes.io/name: backup-config
  name: backup-config
  namespace: default
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
    spec:
      template:
        metadata:
        spec:
          containers:
          - args:
            - -c
            - echo "Backing up config..." && tar -czf /backup/config-$(date +%Y%m%d-%H%M%S).tar.gz
              -C /config .
            command:
            - /bin/bash
            image: filebrowser/filebrowser:v2.31.2
