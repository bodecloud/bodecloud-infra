apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: nginx-auth
    pod-template-hash: 9bd77d666
  name: nginx-auth-9bd77d666
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: nginx-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-auth
      pod-template-hash: 9bd77d666
  template:
    metadata:
      labels:
        app: nginx-auth
        pod-template-hash: 9bd77d666
    spec:
      containers:
      - env:
        - name: PGID
          value: "988"
        - name: PUID
          value: "1002"
        - name: TZ
          value: America/Chicago
        - name: UMASK
          value: "002"
        image: nginx:alpine
