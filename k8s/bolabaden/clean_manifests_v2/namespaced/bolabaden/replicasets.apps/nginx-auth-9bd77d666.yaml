        ports:
        - containerPort: 80
          name: nginx-auth-80
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-conf
          readOnly: true
          subPath: nginx.conf
        - mountPath: /etc/nginx/auth
          name: auth-config
          readOnly: true
        - mountPath: /var/cache/nginx
          name: cache
        - mountPath: /var/log/nginx
          name: logs
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/nginx-middlewares/nginx.conf
          type: File
        name: nginx-conf
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/nginx-middlewares/auth
          type: DirectoryOrCreate
        name: auth-config
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/nginx-middlewares/cache
          type: DirectoryOrCreate
        name: cache
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/nginx-middlewares/logs
          type: DirectoryOrCreate
        name: logs
  fullyLabeledReplicas: 1
  observedGeneration: 1
  replicas: 1
