apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "1"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: homepage
    pod-template-hash: 6f79d4cf9c
  name: homepage-6f79d4cf9c
  namespace: bolabaden
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
      pod-template-hash: 6f79d4cf9c
  template:
    metadata:
      labels:
        app: homepage
        pod-template-hash: 6f79d4cf9c
    spec:
      containers:
      - env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: '*'
        - name: HOMEPAGE_VAR_HEADER_STYLE
        - name: HOMEPAGE_VAR_SEARCH_PROVIDER
          value: google
        - name: HOMEPAGE_VAR_TITLE
          value: my-media-stack
        - name: HOMEPAGE_VAR_WEATHER_CITY
          value: Chicago
        - name: HOMEPAGE_VAR_WEATHER_LAT
          value: "41.8781"
        - name: HOMEPAGE_VAR_WEATHER_LONG
          value: "-87.6298"
        - name: HOMEPAGE_VAR_WEATHER_UNIT
          value: fahrenheit
        - name: TZ
          value: America/Chicago
        image: ghcr.io/gethomepage/homepage
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1
          failureThreshold: 3
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 15
        name: homepage
        ports:
        - containerPort: 3000
          name: homepage-3000
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/run/docker.sock
          name: var-run-docker-sock
        - mountPath: /app/config
          name: app-config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /var/run/docker.sock
          type: ""
        name: var-run-docker-sock
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/homepage
          type: ""
        name: app-config
  availableReplicas: 1
  fullyLabeledReplicas: 1
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
