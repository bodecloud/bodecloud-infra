apiVersion: v1
data:
  01_download.md: "---\ntitle: \"Join & download Plex\"\nrequire: true\n---\n\nYou're
    in! \U0001F389\n\nGreat news! You've been granted access to brunner56's **ElfHosted
    Plex Server**! \U0001F973\n"
  02_about.md: "---\ntitle: \"What is Plex?\"\n---\n\n## ℹ️ What's Plex?\n\nPlex lets
    people share their film and TV libraries with friends.\n\nYou're here because
    brunner56's invited you to theirs! \U0001F4FA\n\n## \U0001F37F How do I watch
    stuff?\n\nSearch your phone, tablet, computer or smart-TV's app store for \"Plex\",
    or [download on this device](https://www.plex.tv/en-gb/media-server-downloads/#plex-app){target=_blank
    .btn}.\n\nSign in, search, push play. That’s it!\n"
  03_requests.md: "---\ntitle:  \"Automatic requests\"\nrequires: [overseerr_url]\n---\n\n#\"Request
    mooar content \U0001F64B‍♀️\n\nCan’t find what you want to watch? Make a request
    — robots will grab the film or episode automatically and add it to the library.\n\n[Make
    a request]({{ overseerr_url }}){:target=_blank .btn}\n"
  04_discord.md: |
    ---
    title:  "Discord community"
    requires: [discord_id]
    ---

    <iframe src="https://discord.com/widget?id={{ discord_id }}&theme=dark"
            width="350" height="500"
            allowtransparency="true" frameborder="0"
            sandbox="allow-popups allow-same-origin allow-scripts"></iframe>
  05_tips.md: "---\ntitle: \"Tips for the best experience\"\n---\n\n## \U0001F39E
    Get the best quality\n\nPlex sometimes defaults to low quality or shows its own
    adverts first. \"\n      \"Here’s how to fix that:\n\n1. **Disable trailers &
    extras** – Settings → Experience → untick *Show cinematic trailers*  \n2. **Force
    original quality** – Settings → Playback → set *Automatic* to *Original*  \n3.
    **Use a wired connection** if you’re on a smart-TV for stutter-free 4K.\n4. **Read
    the [Plex Guide](https://plexguide.com/){target=_blank .btn}** to learn more\n\n*Happy
    viewing!* \U0001F37F\n"
  06_elfhosted.md: "---\ntitle: \"Get ElfHosted!\"\n---\n\n## \U0001F39E Want your
    **own** Plex?\n\nReady to take it to the next level?\n\nGet your **own** Plex
    Server with a [ElfHosted bundle](https://store.elfhosted.com/product-category/streaming-bundles/){target=_blank
    .btn}, $1 7-day trials available!\n\nRock on! \U0001F918\n"
