apiVersion: apps/v1
data:
  spec:
    template:
      $patch: replace
      metadata:
        labels:
          app: pod-gateway
          component: vpn-gateway
      spec:
        containers:
        - command:
          - /bin/bash
          - -c
          - |
            echo "=== Setting up Pod-Gateway on node $NODE_NAME ==="
            source /config/settings.sh
            POD_CIDR=$(cat /host/proc/1/root/var/lib/kubelet/config.yaml | grep clusterCIDR | awk '{print $2}' || echo "10.244.0.0/16")
            iptables -t mangle -A OUTPUT -s $POD_CIDR -j MARK --set-mark 42 || true
            ip rule add fwmark 42 table 100 || true
            while true; do
              ACTIVE_GATEWAY=$(kubectl get configmap pod-gateway-config -n vpn-gateway -o jsonpath='{.data.settings.sh}' | grep GATEWAY_NAME | cut -d'"' -f2)
              if [[ -n "$ACTIVE_GATEWAY" ]]; then
                GATEWAY_IP=$(dig +short $ACTIVE_GATEWAY.vpn-gateway.svc.cluster.local)
                if [[ -n "$GATEWAY_IP" ]]; then
                  ip route replace default via $GATEWAY_IP table 100 || true
                  echo "$(date): Updated routing to gateway $ACTIVE_GATEWAY ($GATEWAY_IP)"
                fi
              fi
              sleep 30
            done
          env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: spec.nodeName
          image: ghcr.io/k8s-at-home/pod-gateway:latest
          imagePullPolicy: Always
          name: pod-gateway
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            capabilities:
              add:
              - NET_ADMIN
              - NET_RAW
              - SYS_MODULE
            privileged: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /config
            name: config
          - mountPath: /lib/modules
            name: lib-modules
            readOnly: true
          - mountPath: /host/proc
            name: proc
            readOnly: true
        dnsPolicy: ClusterFirst
        hostNetwork: true
        hostPID: true
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
        tolerations:
        - operator: Exists
        volumes:
        - configMap:
            defaultMode: 420
            name: pod-gateway-config
          name: config
        - hostPath:
            path: /lib/modules
            type: ""
          name: lib-modules
        - hostPath:
            path: /proc
            type: ""
          name: proc
