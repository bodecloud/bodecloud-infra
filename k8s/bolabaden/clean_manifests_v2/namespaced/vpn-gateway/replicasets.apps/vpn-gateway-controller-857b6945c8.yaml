apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "1"
    deployment.kubernetes.io/max-replicas: "2"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: vpn-gateway-controller
    component: vpn-gateway
    pod-template-hash: 857b6945c8
  name: vpn-gateway-controller-857b6945c8
  namespace: vpn-gateway
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: vpn-gateway-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-gateway-controller
      pod-template-hash: 857b6945c8
  template:
    metadata:
      labels:
        app: vpn-gateway-controller
        component: vpn-gateway
        pod-template-hash: 857b6945c8
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          pip install kubernetes aiohttp
          python /config/controller.py
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        name: controller
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: vpn-gateway-controller-sa
      serviceAccountName: vpn-gateway-controller-sa
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 493
          name: vpn-controller-config
        name: config
  fullyLabeledReplicas: 1
  observedGeneration: 1
  replicas: 1
