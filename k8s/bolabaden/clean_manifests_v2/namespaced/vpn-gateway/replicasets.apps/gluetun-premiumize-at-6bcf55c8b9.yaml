apiVersion: apps/v1
kind: ReplicaSet
metadata:
  annotations:
    deployment.kubernetes.io/desired-replicas: "0"
    deployment.kubernetes.io/max-replicas: "0"
    deployment.kubernetes.io/revision: "1"
  labels:
    app: gluetun-premiumize-at
    component: vpn-gateway
    pod-template-hash: 6bcf55c8b9
  name: gluetun-premiumize-at-6bcf55c8b9
  namespace: vpn-gateway
  ownerReferences:
  - apiVersion: apps/v1
    blockOwnerDeletion: true
    controller: true
    kind: Deployment
    name: gluetun-premiumize-at
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gluetun-premiumize-at
      pod-template-hash: 6bcf55c8b9
  template:
    metadata:
      labels:
        app: gluetun-premiumize-at
        component: vpn-gateway
        pod-template-hash: 6bcf55c8b9
    spec:
      containers:
      - env:
        - name: VPN_SERVICE_PROVIDER
          value: custom
        - name: VPN_TYPE
          value: openvpn
        - name: OPENVPN_CUSTOM_CONFIG
          value: /gluetun/premiumize-at.ovpn
        - name: HTTP_PROXY
          value: "on"
        - name: HTTP_PROXY_ADDRESS
          value: 0.0.0.0:8888
        - name: SHADOWSOCKS
          value: "on"
        - name: SHADOWSOCKS_ADDRESS
          value: 0.0.0.0:8388
        - name: HEALTH_SERVER_ADDRESS
          value: 0.0.0.0:9999
        image: ghcr.io/qdm12/gluetun:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: gluetun
        ports:
        - containerPort: 8888
          name: http-proxy
          protocol: TCP
        - containerPort: 8388
          name: shadowsocks
          protocol: TCP
        - containerPort: 9999
          name: health
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 9999
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
      - command:
        - /bin/bash
        - -c
        - "\n                                source /config/settings.sh\n                                \n
          \                               # Start DHCP server for VXLAN clients\n
          \                               cat > /tmp/dnsmasq.conf << EOF\n                                interface=vxlan0\n
          \                               bind-interfaces\n                                dhcp-range=${VXLAN_IP_NETWORK}.${VXLAN_GATEWAY_FIRST_DYNAMIC_IP},${VXLAN_IP_NETWORK}.254,12h\n
          \                               dhcp-option=3,${VXLAN_IP_NETWORK}.1\n                                dhcp-option=6,${VXLAN_IP_NETWORK}.1\n
          \                               server=10.96.0.10\n                                EOF\n
          \                               \n                                # Start
          dnsmasq for DHCP and DNS\n                                dnsmasq --conf-file=/tmp/dnsmasq.conf
          --no-daemon &\n                                \n                                #
          Health monitoring\n                                while true; do\n                                  if
          ip link show tun0 >/dev/null 2>&1; then\n                                    if
          timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1;
          then\n                                      echo \"$(date): VPN Gateway
          healthy - tun0 connected\"\n                                    else\n                                      echo
          \"$(date): VPN Gateway unhealthy - no external connectivity\"\n                                    fi\n
          \                                 else\n                                    echo
          \"$(date): VPN Gateway unhealthy - tun0 not found\"\n                                  fi\n
          \                                 sleep 30\n                                done\n
          \                               "
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        name: gateway-sidecar
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - /bin/sh
        - -c
        - "\n                                apk add --no-cache bind-tools\n                                \n
          \                               COUNTRY=\"at\"\n                                HOSTNAME=\"vpn-${COUNTRY}.premiumize.me\"\n
          \                               CONFIG_FILE=\"/gluetun/premiumize-${COUNTRY}.ovpn\"\n
          \                               AUTH_FILE=\"/gluetun/auth.conf\"\n                                \n
          \                               echo \"=== Resolving $HOSTNAME ===\"\n                                \n
          \                               # Resolve hostname with retries\n                                IP=\"\"\n
          \                               for i in $(seq 1 10); do\n                                    if
          IP=$(dig +short $HOSTNAME | head -1); then\n                                        if
          echo \"$IP\" | grep -E '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$'; then\n                                            echo
          \"✓ Resolved $HOSTNAME -> $IP (attempt $i)\"\n                                            break\n
          \                                       fi\n                                    fi\n
          \                                   echo \"Resolution attempt $i failed,
          retrying in 2s...\"\n                                    sleep 2\n                                done\n
          \                               \n                                if [ -z
          \"$IP\" ]; then\n                                    echo \"❌ Failed to
          resolve $HOSTNAME after 10 attempts\"\n                                    exit
          1\n                                fi\n                                \n
          \                               # Create OpenVPN config\n                                cat
          > \"$CONFIG_FILE\" << 'EOF'\n                                remote $IP
          1194\n                                verify-x509-name CN=$HOSTNAME\n                                client\n
          \                               dev tun\n                                proto
          udp\n                                cipher AES-256-CBC\n                                resolv-retry
          infinite\n                                nobind\n                                persist-key\n
          \                               persist-tun\n                                auth-user-pass
          /gluetun/auth.conf\n                                verb 3\n                                auth
          SHA256\n                                key-direction 1\n                                <ca>\n
          \                               -----BEGIN CERTIFICATE-----\n                                MIIFqzCCA5OgAwIBAgIJAKZ7D5Kv2XSUMA0GCSqGSIb3DQEBCwUAMGwxCzAJBgNV\n
          \                               BAYTAkRFMRAwDgYDVQQIDAdCYXZhcmlhMQ8wDQYDVQQHDAZNdW5pY2gxEzARBgNV\n
          \                               BAoMClByZW1pdW1pemUxJTAjBgNVBAMMHFByZW1pdW1pemUgQ2VydGlmaWNhdGUg\n
          \                               QXV0aG9yaXR5MB4XDTE5MDkxOTE0NDUwNFoXDTI5MDkxNjE0NDUwNFowbDELMAkG\n
          \                               A1UEBhMCREUxEDAOBgNVBAgMB0JhdmFyaWExDzANBgNVBAcMBk11bmljaDETMBEG\n
          \                               A1UECgwKUHJlbWl1bWl6ZTElMCMGA1UEAwwcUHJlbWl1bWl6ZSBDZXJ0aWZpY2F0\n
          \                               ZSBBdXRob3JpdHkwggIiMA0GCSqGSIb3DQEBAQUAA4ICDwAwggIKAoICAQDMsJwI\n
          \                               -----END CERTIFICATE-----\n                                </ca>\n
          \                               <tls-auth>\n                                -----BEGIN
          OpenVPN Static key V1-----\n                                # Add your actual
          tls-auth key here\n                                -----END OpenVPN Static
          key V1-----\n                                </tls-auth>\n                                EOF\n
          \                               \n                                # Replace
          placeholders\n                                sed -i \"s/\\$IP/$IP/g\" \"$CONFIG_FILE\"\n
          \                               sed -i \"s/\\$HOSTNAME/$HOSTNAME/g\" \"$CONFIG_FILE\"\n
          \                               \n                                # Create
          auth file\n                                echo \"117274388\" > \"$AUTH_FILE\"\n
          \                               echo \"6i6zgswm35baj3ur\" >> \"$AUTH_FILE\"\n
          \                               \n                                echo \"✅
          Configuration complete for AT\"\n                                "
        image: alpine:latest
        imagePullPolicy: Always
        name: hostname-resolver
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /gluetun
          name: gluetun-config
      - command:
        - /bin/bash
        - -c
        - "\n                                source /config/settings.sh\n                                \n
          \                               # Enable IP forwarding\n                                echo
          1 > /proc/sys/net/ipv4/ip_forward\n                                \n                                #
          Create VXLAN interface\n                                VXLAN_GATEWAY_IP=\"${VXLAN_IP_NETWORK}.1\"\n
          \                               ip link add vxlan0 type vxlan id $VXLAN_ID
          dev eth0 dstport $VXLAN_PORT || true\n                                ip
          addr add ${VXLAN_GATEWAY_IP}/24 dev vxlan0 || true\n                                ip
          link set up dev vxlan0\n                                ip link set mtu
          $VPN_INTERFACE_MTU dev vxlan0 || true\n                                \n
          \                               # Set routing rules\n                                ip
          rule add from all lookup main suppress_prefixlength 0 preference 50 || true\n
          \                               \n                                # Configure
          iptables for NAT and forwarding\n                                iptables
          -t nat -A POSTROUTING -j MASQUERADE || true\n                                iptables
          -A INPUT -i eth0 -p udp --dport=$VXLAN_PORT -j ACCEPT || true\n                                iptables
          -A INPUT -i vxlan0 -p udp --sport=68 --dport=67 -j ACCEPT || true\n                                \n
          \                               echo \"Gateway init complete\"\n                                "
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        imagePullPolicy: Always
        name: gateway-init
        resources: {}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: config
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: "1"
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 493
          name: pod-gateway-config
        name: config
      - hostPath:
          path: /home/ubuntu/my-media-stack/configs/gluetun/premiumize/at
          type: DirectoryOrCreate
        name: gluetun-config
  observedGeneration: 1
  replicas: 0
