g loop\"\"\"\n        logger.info(\"Starting VPN Gateway Controller\")\n        \n        # Initial setup - start with highest priority gateway\n        if not await self.failover_to_next_gateway():\n            logger.error(\"Failed to start any VPN gateway!\")\n            return\n        \n        # Main monitoring loop\n        while True:\n            try:\n                # Check active gateway health\n                if self.active_gateway:\n                    gateway_name = self.active_gateway[\"name\"]\n                    \n                    if await self.check_gateway_health(gateway_name):\n                        logger.info(f\"Active gateway {gateway_name} is healthy\")\n                    else:\n                        logger.warning(f\"Active gateway {gateway_name} is unhealthy, initiating failover\")\n                        \n                        # Try standby first if available\n                        if self.standby_gateway and await self.check_gateway_health(self.standby_gateway[\"name\"]):\n                            logger.info(f\"Promoting standby gateway {self.standby_gateway['name']} to active\")\n                            \n                            # Scale down old active\n                            await self.scale_deployment(self.active_gateway[\"name\"], 0)\n                            \n                            # Promote standby to active\n                            self.active_gateway = self.standby_gateway\n                            self.standby_gateway = None\n                            await self.update_active_gateway_config(self.active_gateway[\"name\"])\n                            \n                            # Set up new standby\n                            await self.setup_standby_gateway()\n                        else:\n                            # Full failover\n                            await self.failover_to_next_gateway()\n                else:\n                    logger.warning(\"No active gate