apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-gateway-controller
  namespace: default
  labels:
    helm.sh/chart: vpn-gateway-0.1.0
    app.kubernetes.io/name: vpn-gateway
    app.kubernetes.io/instance: vpn-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vpn-gateway-controller
      app.kubernetes.io/instance: vpn-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpn-gateway-controller
        app.kubernetes.io/instance: vpn-gateway
    spec:
      serviceAccountName: vpn-gateway-controller
      containers:
        - name: controller
          image: "python:3.11-slim"
          command: ["/bin/sh", "-c"]
          args:
            - "pip install kubernetes aiohttp && python /app/controller.py"
          env:
            - name: RELEASE_NAME
              value: vpn-gateway
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: vpn-gateway-controller
