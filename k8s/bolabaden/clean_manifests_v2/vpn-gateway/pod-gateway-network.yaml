apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pod-gateway-network
  namespace: vpn-gateway
  labels:
    app: pod-gateway-network
    component: vpn-gateway
spec:
  selector:
    matchLabels:
      app: pod-gateway-network
  template:
    metadata:
      labels:
        app: pod-gateway-network
        component: vpn-gateway
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: network-controller
          image: ghcr.io/k8s-at-home/pod-gateway:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_MODULE
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          command:
            - /bin/bash
            - -c
            - |
              # Node-level pod-gateway setup
              echo "=== Setting up Pod-Gateway Network on node $NODE_NAME ==="
              
              # Enable IP forwarding
              echo 1 > /proc/sys/net/ipv4/ip_forward
              
              # Get pod CIDR for this node
              POD_CIDR=$(cat /host/proc/1/root/var/lib/kubelet/config.yaml | grep clusterCIDR | awk '{print $2}' || echo "10.244.0.0/16")
              
              # Set up VXLAN tunnel
              VXLAN_ID="42"
              VXLAN_PORT="4789"
              
              # Create VXLAN interface if it doesn't exist
              if ! ip link show vxlan0 &>/dev/null; then
                ip link add vxlan0 type vxlan id $VXLAN_ID dstport $VXLAN_PORT
                ip link set up dev vxlan0
                ip link set mtu 1420 dev vxlan0
              fi
              
              # Set up iptables rules to capture pod egress traffic
              iptables -t mangle -F OUTPUT || true
              iptables -t mangle -A OUTPUT -s $POD_CIDR -j MARK --set-mark 42 || true
              
              # Route marked packets through VXLAN tunnel
              ip rule del fwmark 42 table 100 &>/dev/null || true
              ip rule add fwmark 42 table 100 || true
              
              # Monitor for active gateway changes and update routing
              while true; do
                # Get VPN gateway service IP
                GATEWAY_IP=$(getent hosts vpn-gateway.vpn-gateway.svc.cluster.local | awk '{print $1}' || echo "")
                
                if [[ -n "$GATEWAY_IP" ]]; then
                  # Update routing table to send marked traffic to gateway
                  ip route replace default via $GATEWAY_IP table 100 2>/dev/null || true
                  echo "✅ $(date): Updated routing to VPN gateway ($GATEWAY_IP)"
                else
                  echo "❌ $(date): Could not resolve VPN gateway"
                fi
                
                sleep 30
              done
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: proc
          hostPath:
            path: /proc 