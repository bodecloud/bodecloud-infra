apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: vpn-gateway
  namespace: vpn-gateway
  labels:
    # Avoid variable substitution of shell variables bellow
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  interval: 5m
  chart:
    spec:
      chart: pod-gateway
      version: 6.5.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: angelnu-helm-charts
        namespace: flux-system
  #See https://github.com/angelnu/helm-charts/blob/main/charts/apps/pod-gateway/values.yaml
  values:

    image:
      repository: ghcr.io/angelnu/pod-gateway
      # Use stable version instead of dev
      tag: latest
    webhook:
      image:
        repository: ghcr.io/angelnu/gateway-admision-controller
        pullPolicy: Always
        tag: v3.6.0
    addons:
      vpn:
        enabled: true
        type: gluetun
        gluetun:
          image:
            repository: docker.io/qmcgaw/gluetun
            tag: latest@sha256:183c74263a07f4c931979140ac99ff4fbc44dcb1ca5b055856ef580b0fafdf1c

        env:
        - name: VPN_SERVICE_PROVIDER
          value: custom
        - name: VPN_TYPE
          value: openvpn
        - name: VPN_INTERFACE
          value: tun0
        - name: FIREWALL
          value: "off"
        - name: DOT
          value: "off"
        - name: OPENVPN_CUSTOM_CONFIG
          value: /gluetun/custom.ovpn
        - name: HTTP_PROXY
          value: "on"
        - name: HTTP_PROXY_ADDRESS
          value: "0.0.0.0:8888"
        - name: SHADOWSOCKS
          value: "on"
        - name: SHADOWSOCKS_ADDRESS
          value: "0.0.0.0:8388"
        - name: HEALTH_SERVER_ADDRESS
          value: "0.0.0.0:9999"
        
        envFrom:
          - secretRef:
              name: vpn-credentials
              
        volumeMounts:
        - name: vpn-configs
          mountPath: /gluetun/configs
        - name: vpn-status
          mountPath: /gluetun/status
        
        volumes:
        - name: vpn-configs
          configMap:
            name: vpn-configs
        - name: vpn-status
          configMap:
            name: vpn-status

        livenessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        networkPolicy:
          enabled: true

          egress:
            - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
              ports:
              # VPN traffic
              - port: &vpn_port 1194
                protocol: UDP
            - to:
              - ipBlock:
                  cidr: 10.0.0.0/8

    routed_namespaces:
    - vpn
    - vpn-gateway
    
    settings:
      # -- If using a VPN, interface name created by it
      VPN_INTERFACE: tun0
      # -- Prevent non VPN traffic to leave the gateway
      VPN_BLOCK_OTHER_TRAFFIC: true
      # -- If VPN_BLOCK_OTHER_TRAFFIC is true, allow VPN traffic over this port
      VPN_TRAFFIC_PORT: *vpn_port
      # -- Traffic to these IPs will be send through the K8S gateway
      VPN_LOCAL_CIDRS: "10.0.0.0/8 192.168.0.0/16"
      # -- VXLAN ID to use for the Wireguard network
      VXLAN_ID: "42"
      # -- VXLAN port to use
      VXLAN_PORT: "4789"
      # -- The IP range to use for the VXLAN
      VXLAN_IP_NETWORK: "172.16.1"
      # -- The IP address of the first client
      VXLAN_GATEWAY_FIRST_DYNAMIC_IP: "20"
      # -- MTU to set on the VPN interface
      VPN_INTERFACE_MTU: "1420"
      # -- DNS settings
      DNS_LOCAL_CIDRS: "cluster.local svc.cluster.local"
    
    # -- settings to expose ports, usually through a VPN provider.
    # NOTE: if you change it you will need to manually restart the gateway POD
    publicPorts:
    - hostname: qbittorrent
      IP: 10
      ports:
      - type: udp
        port: 18289
      - type: tcp
        port: 18289
    
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: http-proxy
          port: 8888
          protocol: TCP
        - name: shadowsocks
          port: 8388
          protocol: TCP
        - name: health
          port: 9999
          protocol: TCP
