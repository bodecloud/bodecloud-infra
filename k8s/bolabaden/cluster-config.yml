---
# =============================================================================
# DYNAMIC MEDIA STACK CLUSTER CONFIGURATION
# =============================================================================
# This configuration pulls values from environment variables to avoid hardcoding
# =============================================================================

# =============================================================================
# CLUSTER INFRASTRUCTURE
# =============================================================================
cluster:
  name: "{{ lookup('env', 'SUBDOMAIN') | default('media-stack') }}"
  domain: "{{ lookup('env', 'DOMAIN') | default('example.com') }}"
  subdomain: "{{ lookup('env', 'SUBDOMAIN') | default('media') }}"
  timezone: "{{ lookup('env', 'TZ') | default('UTC') }}"

  # Tailscale network configuration
  tailscale:
    base_domain: "{{ lookup('env', 'TS_BASE_DOMAIN') | default('ts.net') }}"
    hostname: "{{ lookup('env', 'TS_HOSTNAME') | default('master') }}"
    authkey: "{{ lookup('env', 'TS_AUTHKEY') }}"

    # Node configuration - master node
    master:
      hostname: "beatapostapita"
      tailscale_ip: "100.99.45.35"
      external_ip: "207.211.189.95"

    # Agent nodes
    agents:
      - hostname: "baden"
        tailscale_ip: "100.93.120.11"
      - hostname: "cloudserver"
        tailscale_ip: "100.95.154.8"
      - hostname: "micklethefickle"
        tailscale_ip: "100.125.162.37"
      - hostname: "wizard-pc"
        tailscale_ip: "100.74.62.44"

  # K3s configuration
  k3s:
    version: "{{ lookup('env', 'K8S_VERSION') | default('v1.28.5+k3s1') }}"
    token: "e96353e53c085c131e7f7d7d7e0845bf4895519a7e1899aebc5b3c6a40c6ff6a"
    cluster_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    cluster_dns: "10.43.0.10"

# =============================================================================
# CERTIFICATES & DNS
# =============================================================================
certificates:
  acme:
    email: "{{ lookup('env', 'EMAIL') | default('admin@example.com') }}"
    resolver: "letsencrypt"

  # Cloudflare DNS configuration
  cloudflare:
    email: "{{ lookup('env', 'CF_EMAIL') }}"
    api_key: "{{ lookup('env', 'CF_API_KEY') }}"
    dns_api_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"
    zone_id: "{{ lookup('env', 'CF_ZONE_ID') }}"
    zone_api_token: "{{ lookup('env', 'CF_ZONE_API_TOKEN') }}"

  # DuckDNS configuration
  duckdns:
    domain: "{{ lookup('env', 'DUCKDNS_DOMAIN') }}"
    token: "{{ lookup('env', 'DUCKDNS_TOKEN') }}"

# =============================================================================
# VPN PROVIDERS
# =============================================================================
vpn:
  providers:
    premiumize:
      enabled: true
      customer_id: "{{ lookup('env', 'PREMIUMIZE_CUSTOMER_ID') }}"
      api_key: "{{ lookup('env', 'PREMIUMIZE_API_KEY') }}"
      countries:
        - "us"
        - "nl"
        - "gb"
        - "de"
        - "ca"
        - "at"
        - "au"
        - "be"
        - "ch"
        - "cz"
        - "es"
        - "fi"
        - "fr"
        - "gr"
        - "it"
        - "jp"
        - "pl"
        - "sg"

    realdebrid:
      enabled: true
      api_key: "{{ lookup('env', 'REAL_DEBRID_API_KEY') }}"

    warp:
      enabled: true

# =============================================================================
# STORAGE & PATHS
# =============================================================================
storage:
  config_path: "{{ lookup('env', 'CONFIG_PATH') | default('/home/ubuntu/my-media-stack/configs') }}"
  data_path: "{{ lookup('env', 'DATA_PATH') | default('/home/ubuntu/my-media-stack/data') }}"
  secrets_path: "{{ lookup('env', 'SECRETS_DIR') | default('/home/ubuntu/my-media-stack/secrets') }}"
  root_dir: "{{ lookup('env', 'ROOT_DIR') | default('/home/ubuntu/my-media-stack') }}"

  # User/Group configuration
  puid: "{{ lookup('env', 'PUID') | default('1000') }}"
  pgid: "{{ lookup('env', 'PGID') | default('1000') }}"
  umask: "{{ lookup('env', 'UMASK') | default('002') }}"

# =============================================================================
# MEDIA SERVICES CONFIGURATION
# =============================================================================
media_services:
  # Plex configuration
  plex:
    enabled: true
    url: "{{ lookup('env', 'PLEX_URL') }}"
    token: "{{ lookup('env', 'PLEX_TOKEN') }}"
    claim: "{{ lookup('env', 'PLEX_CLAIM') }}"
    server_machine_id: "{{ lookup('env', 'PLEX_SERVER_MACHINE_ID') }}"
    movie_library_id: "{{ lookup('env', 'PLEX_SERVER_MOVIE_LIBRARY_ID') }}"
    tv_library_id: "{{ lookup('env', 'PLEX_SERVER_TV_SHOW_LIBRARY_ID') }}"

  # Jellyfin configuration
  jellyfin:
    enabled: false
    url: "{{ lookup('env', 'JELLYFIN_URL') }}"
    api_key: "{{ lookup('env', 'JELLYFIN_API_KEY') }}"

  # Tautulli configuration
  tautulli:
    enabled: true
    url: "{{ lookup('env', 'TAUTULLI_HOST') }}"
    api_key: "{{ lookup('env', 'TAUTULLI_API_KEY') }}"

# =============================================================================
# SERVARR SERVICES (*ARR STACK)
# =============================================================================
servarr:
  # Sonarr configuration
  sonarr:
    enabled: true
    url: "{{ lookup('env', 'SONARR_URL') }}"
    api_key: "{{ lookup('env', 'SONARR_API_KEY') }}"
    root_folder: "/mnt/media/tv"

  # Radarr configuration
  radarr:
    enabled: true
    url: "{{ lookup('env', 'RADARR_URL') }}"
    api_key: "{{ lookup('env', 'RADARR_API_KEY') }}"
    root_folder: "/mnt/media/movies"

  # Prowlarr configuration
  prowlarr:
    enabled: true
    url: "{{ lookup('env', 'PROWLARR_URL') }}"
    api_key: "{{ lookup('env', 'PROWLARR_API_KEY') }}"

  # Bazarr configuration
  bazarr:
    enabled: true
    url: "{{ lookup('env', 'BAZARR_URL') }}"
    api_key: "{{ lookup('env', 'BAZARR_API_KEY') }}"

  # Lidarr configuration
  lidarr:
    enabled: false
    url: "{{ lookup('env', 'LIDARR_URL') }}"
    api_key: "{{ lookup('env', 'LIDARR_API_KEY') }}"

  # Readarr configuration
  readarr:
    enabled: false
    url: "{{ lookup('env', 'READARR_URL') }}"
    api_key: "{{ lookup('env', 'READARR_API_KEY') }}"

# =============================================================================
# DOWNLOAD CLIENTS
# =============================================================================
download_clients:
  # SABnzbd configuration
  sabnzbd:
    enabled: false
    url: "{{ lookup('env', 'SABNZBD_URL') }}"
    api_key: "{{ lookup('env', 'SABNZBD_API_KEY') }}"

  # Transmission configuration
  transmission:
    enabled: false

  # QBittorrent configuration
  qbittorrent:
    enabled: false
    username: "{{ lookup('env', 'QBITTORRENT_USERNAME') }}"
    password: "{{ lookup('env', 'QBITTORRENT_PASSWORD') }}"

# =============================================================================
# STREMIO ADDONS CONFIGURATION
# =============================================================================
stremio:
  # Comet configuration
  comet:
    enabled: true
    url: "{{ lookup('env', 'COMET_URL') }}"
    addon_id: "{{ lookup('env', 'COMET_ADDON_ID') }}"
    addon_name: "{{ lookup('env', 'COMET_ADDON_NAME') }}"
    database_url: "{{ lookup('env', 'COMET_DATABASE_URL') }}"
    dashboard_password: "{{ lookup('env', 'COMET_DASHBOARD_ADMIN_PASSWORD') }}"

  # MediaFusion configuration
  mediafusion:
    enabled: true
    url: "{{ lookup('env', 'MEDIAFUSION_HOST_URL') }}"
    mongo_uri: "{{ lookup('env', 'MEDIAFUSION_MONGO_URI') }}"
    secret_key: "{{ lookup('env', 'MEDIAFUSION_SECRET_KEY') }}"
    api_password: "{{ lookup('env', 'MEDIAFUSION_API_PASSWORD') }}"

  # Torrentio configuration
  torrentio:
    enabled: true
    url: "{{ lookup('env', 'TORRENTIO_URL') }}"

  # Zilean configuration
  zilean:
    enabled: true
    url: "{{ lookup('env', 'ZILEAN_URL') }}"

# =============================================================================
# AUTHENTICATION & SECURITY
# =============================================================================
auth:
  # OAuth configuration
  oauth_secret: "{{ lookup('env', 'OAUTH_SECRET') }}"

  # Basic auth passwords
  sudo_password: "{{ lookup('env', 'SUDO_PASSWORD') }}"

  # JWT secrets
  auth_secret: "{{ lookup('env', 'AUTH_SECRET') }}"

# =============================================================================
# EXTERNAL API KEYS
# =============================================================================
api_keys:
  tmdb: "{{ lookup('env', 'TMDB_API_KEY') }}"
  openai: "{{ lookup('env', 'OPENAI_API_KEY') }}"
  anthropic: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"
  tavily: "{{ lookup('env', 'TAVILY_API_KEY') }}"
  firecrawl: "{{ lookup('env', 'FIRECRAWL_API_KEY') }}"
