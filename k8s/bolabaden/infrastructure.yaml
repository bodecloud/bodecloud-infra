apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: TZ
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: TZ
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
        livenessProbe:
          exec:
            command:
            - mongosh
            - 127.0.0.1:27017/test
            - --quiet
            - --eval
            - 'db.runCommand("ping").ok'
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - mongosh
            - 127.0.0.1:27017/test
            - --quiet
            - --eval
            - 'db.runCommand("ping").ok'
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: infrastructure
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: infrastructure
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyauth
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyauth
  template:
    metadata:
      labels:
        app: tinyauth
    spec:
      containers:
      - name: tinyauth
        image: ghcr.io/steveiliop56/tinyauth:v3
        ports:
        - containerPort: 3000
        env:
        - name: SECRET
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: TINYAUTH_SECRET
        - name: APP_URL
          value: "https://auth.bolabaden.org"
        - name: USERS
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: TINYAUTH_USERS
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: GOOGLE_CLIENT_SECRET
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: GITHUB_CLIENT_ID
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: GITHUB_CLIENT_SECRET
        - name: SESSION_EXPIRY
          value: "604800"
        - name: COOKIE_SECURE
          value: "true"
        - name: APP_TITLE
          value: "Bolabaden"
        - name: LOGIN_MAX_RETRIES
          value: "5"
        - name: LOGIN_TIMEOUT
          value: "300"
        - name: OAUTH_AUTO_REDIRECT
          value: "none"
        volumeMounts:
        - name: tinyauth-storage
          mountPath: /data
      volumes:
      - name: tinyauth-storage
        persistentVolumeClaim:
          claimName: tinyauth-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tinyauth
  namespace: infrastructure
spec:
  selector:
    app: tinyauth
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec
  template:
    metadata:
      labels:
        app: crowdsec
    spec:
      containers:
      - name: crowdsec
        image: crowdsecurity/crowdsec:latest
        ports:
        - containerPort: 6060
        - containerPort: 8080
        env:
        - name: TZ
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: TZ
        - name: CONFIG_FILE
          value: "/etc/crowdsec/config.yaml"
        - name: DISABLE_AGENT
          value: "false"
        - name: DISABLE_LOCAL_API
          value: "false"
        - name: DISABLE_ONLINE_API
          value: "false"
        - name: TEST_MODE
          value: "false"
        - name: LOCAL_API_URL
          value: "http://0.0.0.0:8080"
        - name: PLUGIN_DIR
          value: "/usr/local/lib/crowdsec/plugins/"
        - name: METRICS_PORT
          value: "6060"
        - name: USE_WAL
          value: "false"
        - name: CUSTOM_HOSTNAME
          value: "localhost"
        - name: BOUNCER_KEY_TRAEFIK
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: CROWDSEC_BOUNCER_API_KEY
        - name: COLLECTIONS
          value: "crowdsecurity/traefik"
        volumeMounts:
        - name: crowdsec-storage
          mountPath: /var/lib/crowdsec/data
        - name: crowdsec-config
          mountPath: /etc/crowdsec
        - name: crowdsec-plugins
          mountPath: /usr/local/lib/crowdsec/plugins/
        - name: crowdsec-logs
          mountPath: /var/log
      volumes:
      - name: crowdsec-storage
        persistentVolumeClaim:
          claimName: crowdsec-data-pvc
      - name: crowdsec-config
        emptyDir: {}
      - name: crowdsec-plugins
        emptyDir: {}
      - name: crowdsec-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec
  namespace: infrastructure
spec:
  selector:
    app: crowdsec
  ports:
  - name: metrics
    port: 6060
    targetPort: 6060
  - name: api
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchtower
  namespace: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchtower
  template:
    metadata:
      labels:
        app: watchtower
    spec:
      serviceAccountName: watchtower
      containers:
      - name: watchtower
        image: containrrr/watchtower:latest
        env:
        - name: TZ
          valueFrom:
            secretKeyRef:
              name: media-stack-secrets
              key: TZ
        - name: WATCHTOWER_CLEANUP
          value: "true"
        - name: WATCHTOWER_SCHEDULE
          value: "0 0 6 * * *"
        - name: WATCHTOWER_NOTIFICATION_REPORT
          value: "true"
        volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
          readOnly: true
      volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: watchtower
  namespace: infrastructure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: watchtower
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: watchtower
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: watchtower
subjects:
- kind: ServiceAccount
  name: watchtower
  namespace: infrastructure 