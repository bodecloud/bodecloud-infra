---
# TinyAuth service
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tinyauth-ingressroute
  namespace: my-media-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`tinyauth.beatapostapita.duckdns.org`)"
      kind: Rule
      services:
        - name: tinyauth
          port: 3000
  tls:
    certResolver: beatapostapita_duckdns_letsencrypt

---
# TinyAuth HTTP redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tinyauth-redirect
  namespace: my-media-stack
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`tinyauth.beatapostapita.duckdns.org`)"
      kind: Rule
      services:
        - name: tinyauth
          port: 3000
      middlewares:
        - name: redirect-to-https
          namespace: my-media-stack

---
# HTTPS redirect middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: my-media-stack
spec:
  redirectScheme:
    scheme: https
    permanent: true 