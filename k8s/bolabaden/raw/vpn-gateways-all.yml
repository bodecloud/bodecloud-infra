              fi
            else
              echo "$(date): VPN Gateway unhealthy - tun0 not found"
            fi
            sleep 30
          done
        volumeMounts:
        - name: config
          mountPath: /config
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 100m
      volumes:
      - name: config
        configMap:
          name: pod-gateway-config
          defaultMode: 493
      - name: gluetun-config
