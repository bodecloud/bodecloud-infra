# Generated VPN Gateway Deployments for Pod-Gateway System
# This file contains all VPN gateway deployments and services

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun-premiumize-at
  namespace: vpn-gateway
  labels:
    app: gluetun-premiumize-at
    component: vpn-gateway
    priority: '19'
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gluetun-premiumize-at
  template:
    metadata:
      labels:
        app: gluetun-premiumize-at
        component: vpn-gateway
    spec:
      initContainers:
      - name: hostname-resolver
        image: alpine:latest
        command: 
        - /bin/sh
        - -c
        - |
          apk add --no-cache bind-tools
          
          COUNTRY="at"
          HOSTNAME="vpn-${COUNTRY}.premiumize.me"
          CONFIG_FILE="/gluetun/premiumize-${COUNTRY}.ovpn"
          AUTH_FILE="/gluetun/auth.conf"
          
          echo "=== Resolving $HOSTNAME ==="
          
          # Resolve hostname with retries
          IP=""
          for i in $(seq 1 10); do
            if IP=$(dig +short $HOSTNAME | head -1); then
              if echo "$IP" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "✓ Resolved $HOSTNAME -> $IP (attempt $i)"
                break
              fi
            fi
            echo "Resolution attempt $i failed, retrying in 2s..."
            sleep 2
          done
          
          if [ -z "$IP" ]; then
            echo "✖ Failed to resolve $HOSTNAME after 10 attempts"
            exit 1
          fi
          
          # Create OpenVPN config
          cat > "$CONFIG_FILE" << 'EOF'
          remote $IP 1194
          verify-x509-name CN=$HOSTNAME
          client
          dev tun
          proto udp
          cipher AES-256-CBC
          resolv-retry infinite
          nobind
          persist-key
          persist-tun
          auth-user-pass /gluetun/auth.conf
          verb 3
          auth SHA256
          key-direction 1
