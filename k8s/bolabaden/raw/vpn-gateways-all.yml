metadata:
  name: gluetun-airvpn
  namespace: vpn-gateway
  labels:
    app: gluetun-airvpn
    component: vpn-gateway
    priority: '2'
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gluetun-airvpn
  template:
    metadata:
      labels:
        app: gluetun-airvpn
        component: vpn-gateway
    spec:
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: '1'
      initContainers:
      - name: gateway-init
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          # Enable IP forwarding
          echo 1 > /proc/sys/net/ipv4/ip_forward
          # Create VXLAN interface
          VXLAN_GATEWAY_IP="${VXLAN_IP_NETWORK}.1"
          ip link add vxlan0 type vxlan id $VXLAN_ID dev eth0 dstport $VXLAN_PORT || true
          ip addr add ${VXLAN_GATEWAY_IP}/24 dev vxlan0 || true
          ip link set up dev vxlan0
          ip link set mtu $VPN_INTERFACE_MTU dev vxlan0 || true
          # Set routing rules
          ip rule add from all lookup main suppress_prefixlength 0 preference 50 || true
          # Configure iptables for NAT and forwarding
          iptables -t nat -A POSTROUTING -j MASQUERADE || true
          iptables -A INPUT -i eth0 -p udp --dport=$VXLAN_PORT -j ACCEPT || true
          iptables -A INPUT -i vxlan0 -p udp --sport=68 --dport=67 -j ACCEPT || true
          echo "✅ Gateway init complete"
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: gluetun
        image: ghcr.io/qdm12/gluetun:latest
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        env:
        - name: VPN_SERVICE_PROVIDER
          value: airvpn
        - name: OPENVPN_CIPHERS
          value: aes-256-gcm
        - name: SERVER_COUNTRIES
          value: United States
        - name: HTTP_PROXY
          value: 'on'
        - name: HTTP_PROXY_ADDRESS
          value: 0.0.0.0:8888
        - name: SHADOWSOCKS
          value: 'on'
        - name: SHADOWSOCKS_ADDRESS
          value: 0.0.0.0:8388
        - name: HEALTH_SERVER_ADDRESS
          value: 0.0.0.0:9999
        ports:
        - containerPort: 8888
          name: http-proxy
        - containerPort: 8388
          name: shadowsocks
        - containerPort: 9999
          name: health
        volumeMounts:
        - name: gluetun-config
          mountPath: /gluetun
        livenessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 300m
      - name: gateway-sidecar
        image: ghcr.io/k8s-at-home/pod-gateway:latest
        command:
        - /bin/bash
        - -c
        - |
          source /config/settings.sh
          # Start DHCP server for VXLAN clients
          cat > /tmp/dnsmasq.conf << EOF
          interface=vxlan0
          bind-interfaces
          dhcp-range=${VXLAN_IP_NETWORK}.${VXLAN_GATEWAY_FIRST_DYNAMIC_IP},${VXLAN_IP_NETWORK}.254,12h
          dhcp-option=3,${VXLAN_IP_NETWORK}.1
          dhcp-option=6,${VXLAN_IP_NETWORK}.1
          server=10.96.0.10
          # Start dnsmasq for DHCP and DNS
          dnsmasq --conf-file=/tmp/dnsmasq.conf --no-daemon &
          # Health monitoring
          while true; do
            if ip link show tun0 >/dev/null 2>&1; then
              if timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1; then
                echo "$(date): VPN Gateway healthy - tun0 connected"
              elif timeout 5 curl -s --interface tun0 http://httpbin.org/ip >/dev/null 2>&1; then
                echo "$(date): VPN Gateway unhealthy - no external connectivity"
              else
                echo "$(date): VPN Gateway unhealthy - tun0 not found"
              fi
            fi
            sleep 30
          done
          echo "✅ Gateway sidecar complete"
        volumeMounts:
        - name: config
          mountPath: /config
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 100m
      volumes:
      - name: config
        configMap:
          name: pod-gateway-config
          defaultMode: 493
      - name: gluetun-config
        hostPath:
          path: /home/ubuntu/my-media-stack/configs/gluetun/airvpn
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: gluetun-airvpn
  namespace: vpn-gateway
  labels:
    app: gluetun-airvpn
    component: vpn-gateway
spec:
  selector:
    app: gluetun-airvpn
  ports:
  - name: http-proxy
    port: 8888
    targetPort: 8888
  - name: shadowsocks
    port: 8388
    targetPort: 8388
  - name: health
    port: 9999
    targetPort: 9999

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warp-gateway
  namespace: vpn-gateway
  labels:
    app: warp-gateway
    component: vpn-gateway
    priority: '20'
spec:
  replicas: 0
  selector:
    matchLabels:
      app: warp-gateway
  template:
    metadata:
      labels:
        app: warp-gateway
        component: vpn-gateway
    spec:
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: '1'
        - name: net.ipv4.conf.all.src_valid_mark
          value: '1'
      containers:
      - name: warp
        image: caomingjun/warp:latest
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - MKNOD
            - AUDIT_WRITE
          privileged: true
        env:
        - name: WARP_SLEEP
          value: '2'
        - name: WARP_LICENSE_KEY
          value: eyJhIjoiZTRlYjNkYmViMTJiZWFhY2MxNzcwNDEyMzE3OTA0NTQiLCJ0IjoiM2ExODhhOTMtYzQwNC00Zjg5LTg4NzItOThlMDkxNjNiYzAzIiwicyI6Ill6SmpNVFl5WmpNdE9EYzROUzAwWlRrMUxUazFORFl0TWpnd1lXWXhZVEpsT1dNMiJ9
        ports:
        - containerPort: 1080
          name: socks5-proxy
        - containerPort: 3128
          name: http-proxy
        volumeMounts:
        - name: warp-data
          mountPath: /var/lib/cloudflare-warp
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -s --max-time 5 --proxy socks5://127.0.0.1:1080 http://httpbin.org/ip >/dev/null
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -s --max-time 5 --proxy socks5://127.0.0.1:1080 http://httpbin.org/ip >/dev/null
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 300m
      volumes:
      - name: warp-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: warp-gateway
  namespace: vpn-gateway
  labels:
    app: warp-gateway
    component: vpn-gateway
spec:
  selector:
    app: warp-gateway
  ports:
  - name: socks5-proxy
    port: 1080
    targetPort: 1080
  - name: http-proxy
    port: 3128
    targetPort: 3128
