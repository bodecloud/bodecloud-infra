#! homepage-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: homepage
    namespace: bolabaden
    labels:
        com.docker.compose.project: bolabaden
        com.docker.compose.service: homepage
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: bolabaden
            com.docker.compose.service: homepage
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: bolabaden
                com.docker.compose.service: homepage
                com.docker.compose.network.publicnet: "true"
        spec:
            restartPolicy: Always
            containers:
                - name: homepage
                  image: ghcr.io/gethomepage/homepage
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: HOMEPAGE_ALLOWED_HOSTS
                      value: "*"
                    - name: HOMEPAGE_VAR_HEADER_STYLE
                      value: ""
                    - name: HOMEPAGE_VAR_SEARCH_PROVIDER
                      value: "google"
                    - name: HOMEPAGE_VAR_TITLE
                      value: "Bolabaden"
                    - name: HOMEPAGE_VAR_WEATHER_CITY
                      value: "Chicago"
                    - name: HOMEPAGE_VAR_WEATHER_LAT
                      value: "41.8781"
                    - name: HOMEPAGE_VAR_WEATHER_LONG
                      value: "-87.6298"
                    - name: HOMEPAGE_VAR_WEATHER_UNIT
                      value: "fahrenheit"
                    - name: TZ
                      value: "America/Chicago"
                  ports:
                    - name: homepage-3000
                      containerPort: 3000
                  volumeMounts:
                    - name: var-run-docker-sock
                      mountPath: /var/run/docker.sock
                    - name: app-config
                      mountPath: /app/config
            volumes:
                - name: var-run-docker-sock
                  hostPath:
                    path: /var/run/docker.sock
                - name: app-config
                  hostPath:
                    path: G:/Stuff/bolabaden/configs/homepage
