#! flaresolverr-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: flaresolverr
    namespace: bolabaden
    labels:
        com.docker.compose.project: bolabaden
        com.docker.compose.service: flaresolverr
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: bolabaden
            com.docker.compose.service: flaresolverr
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: bolabaden
                com.docker.compose.service: flaresolverr
                com.docker.compose.network.publicnet: "true"
        spec:
            restartPolicy: Always
            containers:
                - name: flaresolverr
                  image: ghcr.io/thephaseless/byparr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: BROWSER_TIMEOUT
                      value: "120000"
                    - name: HEADLESS
                      value: "true"
                    - name: HOST
                      value: "0.0.0.0"
                    - name: LOG_HTML
                      value: "false"
                    - name: LOG_LEVEL
                      value: "info"
                    - name: PGID
                      value: "988"
                    - name: PORT
                      value: "8191"
                    - name: PROMETHEUS_ENABLED
                      value: "true"
                    - name: PROMETHEUS_PORT
                      value: "9090"
                    - name: PUID
                      value: "1002"
                    - name: TEST_URL
                      value: "https://www.google.com"
                    - name: TZ
                      value: "America/Chicago"
                    - name: UMASK
                      value: "022"
                  livenessProbe:
                    exec:
                        command:
                            - /bin/sh
                            - -c
                            - curl -f http://localhost:8191/health || exit 1
                    periodSeconds: 30
                    initialDelaySeconds: 60
                    timeoutSeconds: 15
                    failureThreshold: 3
                  ports:
                    - name: flaresolve-8191
                      containerPort: 8191
