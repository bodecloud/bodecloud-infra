metadata:
    name: deunhealth
    namespace: bolabaden
    labels:
        com.docker.compose.project: bolabaden
        com.docker.compose.service: deunhealth
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: bolabaden
            com.docker.compose.service: deunhealth
    strategy:
        type: Recreate
    template:
