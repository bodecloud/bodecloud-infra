configs:
  gethomepage-custom.css:
    content: |
      /* Custom CSS for ${DOMAIN} - ${TS_HOSTNAME} */
      :root {
        --bb-bg: #0b0b0c;
        --bb-card: rgba(255,255,255,0.05);
        --bb-border: rgba(255,255,255,0.08);
        --bb-text: rgba(255,255,255,0.92);
        --bb-muted: rgba(255,255,255,0.6);
        --bb-primary: #6EE7F9;
        --bb-accent: #A78BFA;
      }

      body {
        background: radial-gradient(1200px 800px at 10% -10%, rgba(167,139,250,0.15), transparent),
                    radial-gradient(1200px 800px at 110% 10%, rgba(110,231,249,0.12), transparent),
                    var(--bb-bg) !important;
        color: var(--bb-text) !important;
      }

      a { color: var(--bb-primary) !important; }
      a:hover { color: #8EEAFB !important; }

      .card, .item, .quicklaunch, .services-group, .service {
        background: var(--bb-card) !important;
        border: 1px solid var(--bb-border) !important;
        backdrop-filter: blur(8px);
      }

      .header, .navbar, .searchbar, .footer {
        background: rgba(12,12,14,0.6) !important;
        border-bottom: 1px solid var(--bb-border) !important;
        backdrop-filter: blur(8px);
      }
  gethomepage-custom.js:
    content: |
      /* Custom JavaScript for Bolabaden */
      ;(function(){
        // Ensure external links open in new tabs
        document.addEventListener('click', (e) => {
          const a = e.target.closest('a');
          if (!a) return;
          const isExternal = a.hostname && a.hostname !== window.location.hostname
          if (isExternal) {
            a.setAttribute('target', '_blank')
            a.setAttribute('rel', 'noopener noreferrer')
          }
        })
      })();
  gethomepage-docker.yaml:
    content: |
      ---
      # For configuration options and examples, please see:
      # https://gethomepage.dev/configs/docker/

      my-docker:
        socket: /var/run/docker.sock
      #  host: dockerproxy
      #  port: 2375
  gethomepage-widgets.yaml:
    content: |
      ---
      # For configuration options and examples, please see:
      # https://gethomepage.dev/configs/info-widgets/

      - resources:
        cpu: true
        memory: true
        disk: /

      - search:
        provider: duckduckgo
        target: _blank
  gethomepage-settings.yaml:
    content: |
      ---
      # For configuration options and examples, please see:
      # https://gethomepage.dev/configs/settings/

      providers:
        openweathermap: openweathermapapikey
        weatherapi: weatherapiapikey
  gethomepage-bookmarks.yaml:
    content: |
      ---
      # For configuration options and examples, please see:
      # https://gethomepage.dev/configs/bookmarks

      - Developer:
        - Github:
          - abbr: GH
            href: https://github.com/bolabaden

      - Portfolio:
        - ${DOMAIN}:
          - abbr: BO
            href: https://${DOMAIN}/
        - LinkedIn:
          - abbr: LI
            href: https://www.linkedin.com/in/boden-crouch-555897193/

      - Entertainment:
        - Homer:
          - abbr: HM
            href: https://homer.${DOMAIN}/

      - Social:
        - Reddit:
          - abbr: RE
            href: https://reddit.com/

  prometheus.yml:
    content: |
      # yaml-language-server: $$schema=https://raw.githubusercontent.com/prometheus/prometheus/main/docs/prometheus-monitoring-dashboard.json

      # my global config
      global:
        scrape_interval:     15s # By default, scrape targets every 15 seconds.
        evaluation_interval: 15s # By default, scrape targets every 15 seconds.
        # scrape_timeout is set to the global default (10s).
        # Attach these labels to any time series or alerts when communicating with
        # external systems (federation, remote storage, Alertmanager).
        external_labels:
            monitor: 'my-project'
      # Load and evaluate rules in this file every 'evaluation_interval' seconds.
      rule_files:
        - 'alert.rules'
        # - "first.rules"
        # - "second.rules"
      # alert
      # alerting:
      #   alertmanagers:
      #   - scheme: http
      #     static_configs:
      #     - targets:
      #       - "alertmanager:9093"
      # A scrape configuration containing exactly one endpoint to scrape:
      # Here it's Prometheus itself.
      scrape_configs:
        - job_name: 'traefik'
          # Override the global default and scrape targets from this job every 5 seconds.
          scrape_interval: 5s
          dns_sd_configs:
          - names:
            - 'tasks.traefik'
            type: 'A'
            port: 8080
        - job_name: 'envoy_failover_proxy'
          metrics_path: /stats/prometheus
          scheme: https
          static_configs:
            - targets: ['failover-proxy-admin.${DOMAIN}']   # hostname only
  alert.rules:
    content: |
      # yaml-language-server: $$schema=https://raw.githubusercontent.com/prometheus/prometheus/main/docs/prometheus-monitoring-dashboard.json

      groups:
        - name: bolabaden
          rules:

          # Alert for any instance that is unreachable for >2 minutes.
          - alert: service_down
            expr: up == 0
            for: 2m
            labels:
              severity: page
            annotations:
              summary: "Instance {{ $$labels.instance }} down"
              description: "{{ $$labels.instance }} of job {{ $$labels.job }} has been down for more than 2 minutes."

          - alert: high_load
            expr: node_load1 > 0.5
            for: 2m
            labels:
              severity: page
            annotations:
              summary: "Instance {{ $$labels.instance }} under high load"
              description: "{{ $$labels.instance }} of job {{ $$labels.job }} is under high load."

  #######################################################################################
  # Mattermost Backup Configuration
  #######################################################################################
  mattermost-backup-daily.sh:
    content: |
      #!/bin/sh
      now=$$(date +"%s_%Y-%m-%d")
      /usr/bin/mysqldump --opt -h $${MYSQL_HOST} -u $${MYSQL_USER} -p $${MYSQL_PASSWORD} $${MYSQL_DATABASE} > "/backup/$${now}_$${MYSQL_DATABASE}.sql"

  # Backup configuration script
  backup-configs.sh:
    content: |
      #!/bin/bash
      # Backup configuration files

      BACKUP_DIR="${BACKUP_PATH:-/mnt/local/backups}/$$(date +%Y%m%d_%H%M%S)"
      CONFIG_PATH="${CONFIG_PATH:-./configs}"
      echo "Config path: $${CONFIG_PATH}"

      echo "Creating backup directory: ${BACKUP_DIR}"
      mkdir -p "$${BACKUP_DIR}"

      echo "Backing up configuration files..."
      if [ -d "$${CONFIG_PATH}" ]; then
        cp -rv "$${CONFIG_PATH}" "$${BACKUP_DIR}/"
        echo "Backup completed: $${BACKUP_DIR}"
      else
        echo "Config directory not found: $${CONFIG_PATH}"
        exit 1
      fi

      # Keep only last 7 days of backups
      find "$${BACKUP_PATH}" -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true

      echo "Backup process complete"


services:
  hedgedoc:
    depends_on:
      - hedgedoc-db
    image: quay.io/hedgedoc/hedgedoc:latest
    container_name: hedgedoc
    hostname: hedgedoc
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - 3000
    environment:
      CMD_DB_URL: postgres://${HEGEDOC_DB_USER:-hedgedoc}:${HEGEDOC_DB_PASSWORD:-password}@hedgedoc-db:${HEGEDOC_DB_PORT:-5432}/${HEGEDOC_DB_NAME:-hedgedoc}
      CMD_DOMAIN: hedgedoc.${DOMAIN}
      CMD_URL_ADDPORT: false
      CMD_PROTOCOL_USESSL: true
      CMD_SESSION_SECRET: "discolor-subtitle-seducing-result-ceramics"  # Define secret
      CMD_ALLOW_EMAIL_REGISTER: "true"  # Allow registration
      CMD_EMAIL: "true"  # Allow login; only guest notes
      # ------- OAUTH SSO -------
      # see https://docs.goauthentik.io/integrations/services/hedgedoc/
      #- CMD_ALLOW_ANONYMOUS_EDITS=False
      #- CMD_OAUTH2_USER_PROFILE_URL=https://authentik.${DOMAIN}/application/o/userinfo/
      #- CMD_OAUTH2_USER_PROFILE_USERNAME_ATTR=preferred_username
      #- CMD_OAUTH2_USER_PROFILE_DISPLAY_NAME_ATTR=name
      #- CMD_OAUTH2_USER_PROFILE_EMAIL_ATTR=email
      #- CMD_OAUTH2_TOKEN_URL=https://authentik.${DOMAIN}/application/o/token/
      #- CMD_OAUTH2_AUTHORIZATION_URL=https://authentik.${DOMAIN}/application/o/authorize/
      #- CMD_OAUTH2_CLIENT_ID=<ID>
      #- CMD_OAUTH2_CLIENT_SECRET=<SECRET>
      #- CMD_OAUTH2_PROVIDERNAME=Authentik
      #- CMD_OAUTH2_SCOPE=openid email profile
    volumes:
      - ${CONFIG_PATH:-./configs}/hedgedoc/uploads:/hedgedoc/public/uploads
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.add-hedgedoc-metrics-prefix.addPrefix.prefix: /metrics
      traefik.http.routers.hedgedoc-direct.service: hedgedoc@docker
      traefik.http.routers.hedgedoc-direct.rule: Host(`hedgedoc.${DOMAIN}`) || Host(`hedgedoc.${TS_HOSTNAME}.${DOMAIN}`)
      traefik.http.services.hedgedoc.loadbalancer.server.port: 3000
      # Hedgedoc Homepage rendering
      homepage.group: Dashboards
      homepage.name: Hedgedoc
      homepage.icon: hedgedoc.png
      homepage.href: https://hedgedoc.${DOMAIN}/
      homepage.description: Collaborative, open-source note-taking platform
    restart: always

  hedgedoc-db:
    image: docker.io/postgres:16.3-alpine
    container_name: hedgedoc-db
    hostname: hedgedoc-db
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - ${HEGEDOC_DB_PORT:-5432}
    volumes:
      - ${CONFIG_PATH:-./configs}/hedgedoc/database:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${HEGEDOC_DB_USER:-hedgedoc}
      POSTGRES_PASSWORD: ${HEGEDOC_DB_PASSWORD:-password}
      POSTGRES_DB: ${HEGEDOC_DB_NAME:-hedgedoc}
      POSTGRES_PORT: ${HEGEDOC_DB_PORT:-5432}
    restart: always

  mongodb:
    # 🔹🔹 MongoDB 🔹🔹
    image: docker.io/mongo:latest
    container_name: mongodb
    hostname: ${MONGODB_HOSTNAME:-mongodb}
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - 27017
    volumes:
      - ${CONFIG_PATH:-./configs}/mongodb/data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh 127.0.0.1:27017/test --quiet --eval 'db.runCommand(\"ping\").ok' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: always

  searxng:
    # 🔹🔹 SearxNG 🔹🔹  # https://hub.docker.com/r/searxng/searxng
    # SearxNG is a privacy-respecting, hackable, open-source metasearch engine.
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    hostname: searxng
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    volumes:
      # touch ${CONFIG_PATH:-./configs}/searxng/limiter.toml
      - ${CONFIG_PATH:-./configs}/searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_INTERNAL_URL:-http://searxng:8080}
    labels:
      traefik.enable: "true"
      traefik.http.routers.searxng.rule: 'Host(`searxng.${DOMAIN}`) || Host(`searxng.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.routers.searxng.service: searxng@docker
      traefik.http.services.searxng.loadbalancer.server.port: 8080
      homepage.group: Search
      homepage.name: SearxNG
      homepage.icon: searxng.png
      homepage.href: https://searxng.${DOMAIN}/
      homepage.description: Privacy-focused metasearch that aggregates results from many sources without tracking
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  ip-checker-warp:
    build:
      dockerfile_inline: |
        FROM alpine:latest
        RUN apk add --no-cache curl
        CMD ["/bin/sh", "-c", "while true; do echo \"$(date): $(curl -s ifconfig.me)\"; sleep 60; done"]
    container_name: ip-checker-warp
    hostname: ip-checker-warp
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - warp-network
    command: "/bin/sh -c 'while true; do echo \"$(date): $(curl -s ifconfig.me)\"; sleep 60; done'"
    restart: no
  code-server:
    # 🔹🔹 Code Server 🔹🔹
    image: docker.io/linuxserver/code-server:latest
    container_name: code-server
    hostname: code-server
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    volumes:
      - ${CONFIG_PATH:-./configs}/code-server/dev/config:/config
      - ${CONFIG_PATH:-./configs}/code-server/dev/workspace:/workspace
      - ${ROOT_PATH:-.}:/workspace
    user: ${PUID:-1001}:${PGID:-988}
    environment:
      <<: *common-env
      PASSWORD: ${SUDO_PASSWORD}
      SUDO_PASSWORD: ${SUDO_PASSWORD}
      DEFAULT_WORKSPACE: ${CODESERVER_DEFAULT_WORKSPACE:-/workspace}
    labels:
      traefik.enable: "true"
      traefik.http.routers.code-server.rule: Host(`code-server.${DOMAIN}`) || Host(`code-server.${TS_HOSTNAME}.${DOMAIN}`)
      traefik.http.routers.code-server.service: code-server@docker
      traefik.http.services.code-server.loadBalancer.server.port: 8443
      # Homepage definitions for code-server
      homepage.group: Infrastructure
      homepage.name: Code Dev
      homepage.icon: code-server.png
      homepage.href: https://code-server.${DOMAIN}/
      homepage.description: In-browser VS Code environment for editing and managing code on this server
    cpu_shares: 10
    mem_reservation: 200M
    deploy:
      resources:
        reservations:
          cpus: 0.15
          memory: 200M
        limits:
          cpus: 2
          memory: 4G
    restart: always

  init_prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: init_prometheus
    hostname: init_prometheus
    extra_hosts:
      - host.docker.internal:host-gateway
    user: root
    entrypoint: /bin/sh -c "chown -R 65534:65534 /prometheus"
    volumes:
      - ${CONFIG_PATH:-./configs}/prometheus/data:/prometheus
    restart: "no"

  prometheus:
    depends_on:
      init_prometheus:
        condition: service_completed_successfully
    image: docker.io/prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    networks:
      - publicnet
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${CONFIG_PATH:-./configs}/prometheus/data:/prometheus
    configs:
      - source: prometheus.yml
        target: /etc/prometheus/prometheus.yml
        mode: 0777
      - source: alert.rules
        target: /etc/prometheus/alert.rules
        mode: 0777
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    labels:
      traefik.enable: "true"
      traefik.http.routers.prometheus-direct.service: prometheus@docker
      traefik.http.routers.prometheus-direct.rule: 'Host(`prometheus.${DOMAIN}`) || Host(`prometheus.${TS_HOSTNAME}.${DOMAIN}`)'  #  || HostRegexp(`^(www\.)?prometheus\.${DOMAIN}$`) || HostRegexp(`^(www\.)?prometheus\.${TS_HOSTNAME}\.${DOMAIN}$`)
      traefik.http.routers.prometheus-direct.middlewares: nginx-auth@docker
      traefik.http.services.prometheus.loadbalancer.server.port: 9090
    restart: always

  bolabaden-nextjs:
    # 🔹🔹 bolabaden nextJS main website with integrated auth 🔹🔹
    build:
      context: ${SRC_PATH:-./src}/website/bolabaden-site
      dockerfile: Dockerfile
    image: docker.io/th3w1zard1/bolabaden-nextjs:latest
    container_name: bolabaden-nextjs
    hostname: bolabaden-nextjs
    networks:
      warp-network:
        gw_priority: 1
      publicnet: {}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${CONFIG_PATH:-./configs}/tinyauth:/data
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: ${BOLABADEN_NEXTJS_PORT:-3000}
      HOSTNAME: ${BOLABADEN_NEXTJS_HOSTNAME:-0.0.0.0}
      # NextAuth.js Configuration (compatible with TinyAuth)
      SECRET: ${TINYAUTH_SECRET?}
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${TINYAUTH_SECRET?}
      APP_URL: https://auth.${DOMAIN}
      USERS: ${TINYAUTH_USERS}
      # Google OAuth Configuration
      GOOGLE_CLIENT_ID: ${TINYAUTH_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${TINYAUTH_GOOGLE_CLIENT_SECRET}
      # GitHub OAuth Configuration
      GITHUB_CLIENT_ID: ${TINYAUTH_GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${TINYAUTH_GITHUB_CLIENT_SECRET}
      # Additional settings (TinyAuth compatible)
      SESSION_EXPIRY: ${TINYAUTH_SESSION_EXPIRY:-604800} # 2 weeks session expiry
      COOKIE_SECURE: ${TINYAUTH_COOKIE_SECURE:-true} # Send cookie only with HTTPS
      APP_TITLE: ${TINYAUTH_APP_TITLE:-Bolabaden} # Customize login page title
      NEXT_PUBLIC_APP_TITLE: ${TINYAUTH_APP_TITLE:-Bolabaden} # For client-side access
      LOGIN_MAX_RETRIES: ${TINYAUTH_LOGIN_MAX_RETRIES:-15} # Maximum login attempts before account lockout
      LOGIN_TIMEOUT: ${TINYAUTH_LOGIN_TIMEOUT:-300} # Lock account for 5 minutes after too many failed attempts
      OAUTH_AUTO_REDIRECT: ${TINYAUTH_OAUTH_AUTO_REDIRECT:-none} # Options: none, github, google, or credentials
      OAUTH_WHITELIST: ${TINYAUTH_OAUTH_WHITELIST:-boden.crouch@gmail.com} # e.g. user1,user2,/^admin.*/
      # User level configuration
      ADMIN_ACCOUNTS: ${TINYAUTH_ADMIN_ACCOUNTS:-boden.crouch@gmail.com} # Comma-separated list of admin emails
      OWNER_ACCOUNTS: ${TINYAUTH_OWNER_ACCOUNTS:-boden.crouch@gmail.com} # Comma-separated list of owner emails
      # Stripe Payment Integration
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_VERIFIED: ${STRIPE_PRICE_VERIFIED}
      STRIPE_PRICE_MODERATOR: ${STRIPE_PRICE_MODERATOR}
      STRIPE_PRICE_ADMIN: ${STRIPE_PRICE_ADMIN}
      NEXT_PUBLIC_STRIPE_PRICE_VERIFIED: ${STRIPE_PRICE_VERIFIED}
      NEXT_PUBLIC_STRIPE_PRICE_MODERATOR: ${STRIPE_PRICE_MODERATOR}
      NEXT_PUBLIC_STRIPE_PRICE_ADMIN: ${STRIPE_PRICE_ADMIN}
      # Proxy upstream configurations (for iframe embedding)
      PROXY_GRAFANA_UPSTREAM: http://grafana:3000
      PROXY_PROMETHEUS_UPSTREAM: http://prometheus:9090
      PROXY_HOMEPAGE_UPSTREAM: http://homepage:3000
      PROXY_DASHY_UPSTREAM: http://dashy:80
      PROXY_HOMER_UPSTREAM: http://homer:8080
      # Traefik middleware generation
      TRAEFIK_MIDDLEWARE_DIR: /data/traefik/middlewares
      # For Next.js API to fetch live metrics and containers
      PROMETHEUS_URL: http://prometheus:9090
      DOCKER_PROXY_URL: http://dockerproxy:2375
      DOMAIN: ${DOMAIN}
    labels:
      traefik.enable: "true"
      # Error pages
      traefik.http.middlewares.bolabaden-error-pages.errors.status: 400-599
      traefik.http.middlewares.bolabaden-error-pages.errors.service: bolabaden-nextjs@docker
      traefik.http.middlewares.bolabaden-error-pages.errors.query: /api/error/{status}
      # Router for bolabaden-nextjs
      traefik.http.routers.bolabaden-nextjs.service: bolabaden-nextjs@docker
      traefik.http.routers.bolabaden-nextjs.rule: 'Host(`${DOMAIN}`) || Host(`${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.routers.bolabaden-nextjs.middlewares: bolabaden-error-pages@docker
      # bolabaden-nextjs Service definition
      traefik.http.services.bolabaden-nextjs.loadbalancer.server.port: ${BOLABADEN_NEXTJS_PORT:-3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-3000} > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
    restart: always

  dozzle:
    # 🔹🔹 Dozzle 🔹🔹
    image: docker.io/amir20/dozzle:latest
    container_name: dozzle
    hostname: dozzle
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - 8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
    labels:
      traefik.enable: "true"
      # Router for dozzle
      traefik.http.routers.dozzle.service: dozzle@docker
      traefik.http.routers.dozzle.rule: 'Host(`dozzle.${DOMAIN}`) || Host(`dozzle.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.routers.dozzle.middlewares: nginx-auth@docker
      # Service definition for dozzle
      traefik.http.services.dozzle.loadbalancer.server.port: 8080
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN}/
      homepage.description: Real-time web UI for viewing Docker container logs across the host
    restart: always

  homepage:
    # 🔹🔹 Homepage 🔹🔹  # https://github.com/gethomepage/homepage
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    hostname: homepage
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    configs:
      - source: gethomepage-custom.css
        target: /app/config/custom.css
        mode: 0777
      - source: gethomepage-custom.js
        target: /app/config/custom.js
        mode: 0777
      - source: gethomepage-docker.yaml
        target: /app/config/docker.yaml
        mode: 0777
      - source: gethomepage-widgets.yaml
        target: /app/config/widgets.yaml
        mode: 0777
      - source: gethomepage-settings.yaml
        target: /app/config/settings.yaml
        mode: 0777
      - source: gethomepage-bookmarks.yaml
        target: /app/config/bookmarks.yaml
        mode: 0777
    volumes:
      # DO NOT create a bind mount to the entire /app/public/ directory.
      - /var/run/docker.sock:/var/run/docker.sock:z  # we don't need this since we use the proxy
      - ${CONFIG_PATH:-./configs}/homepage:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_TITLE: "Bolabaden"
      HOMEPAGE_VAR_SEARCH_PROVIDER: "duckduckgo"
      HOMEPAGE_VAR_HEADER_STYLE: "glass"
      HOMEPAGE_VAR_THEME: "dark"
      HOMEPAGE_CUSTOM_CSS: "/app/config/custom.css"
      HOMEPAGE_CUSTOM_JS: "/app/config/custom.js"
      HOMEPAGE_VAR_WEATHER_CITY: "Iowa City"
      HOMEPAGE_VAR_WEATHER_LAT: 41.6611
      HOMEPAGE_VAR_WEATHER_LONG: -91.5302
      #      HOMEPAGE_VAR_WEATHER_TIME: ""
      HOMEPAGE_VAR_WEATHER_UNIT: fahrenheit
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.service: homepage@docker
      traefik.http.routers.homepage.rule: 'Host(`homepage.${DOMAIN}`) || Host(`homepage.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.homepage.loadbalancer.server.port: 3000
    healthcheck:  # docker exec homepage ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
    cpu_shares: 10
    mem_reservation: 128M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 128M
        limits:
          cpus: 0.25 # deliberately hobble the CPU in favor of GPU transcoding
          memory: 1G
    restart: always

  watchtower:
    # 🔹🔹 Watchtower 🔹🔹
    image: docker.io/containrrr/watchtower:latest
    container_name: watchtower
    hostname: watchtower
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
#      - ${CONFIG_PATH:-./configs}/watchtower/data:/data
    environment:
      WATCHTOWER_CLEANUP: ${WATCHTOWER_CLEANUP:-true}
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE:-0 0 6 * * *} # Run at 6am daily
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
      WATCHTOWER_NOTIFICATION_REPORT: ${WATCHTOWER_NOTIFICATION_REPORT:-true}
      WATCHTOWER_DEBUG: ${WATCHTOWER_DEBUG:-true}
      WATCHTOWER_LOG_LEVEL: ${WATCHTOWER_LOG_LEVEL:-debug}
      WATCHTOWER_NOTIFICATION_TEMPLATE: |
        {{- if .Report -}}
          {{- with .Report -}}
            {{- if ( or .Updated .Failed ) -}}
        {{len .Scanned}} Scanned, {{len .Updated}} Updated, {{len .Failed}} Failed
              {{- range .Updated}}
        - {{.Name}} ({{.ImageName}}): {{.CurrentImageID.ShortID}} updated to {{.LatestImageID.ShortID}}
              {{- end -}}
              {{- range .Skipped}}
        - {{.Name}} ({{.ImageName}}): {{.State}}: {{.Error}}
              {{- end -}}
              {{- range .Failed}}
        - {{.Name}} ({{.ImageName}}): {{.State}}: {{.Error}}
              {{- end -}}
            {{- end -}}
          {{- end -}}
        {{- else -}}
          {{range .Entries -}}{{.Message}}{{"\n"}}{{- end -}}
        {{- end -}}
    restart: always

  dockerproxy:
    # 🔹🔹 Docker Socket Proxy 🔹🔹
    image: docker.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    hostname: dockerproxy
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    privileged: true
    ports:
        - 127.0.0.1:2375:2375
    volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  redis:
    # 🔹🔹 Redis 🔹🔹
    # NOTE: If you want to use Valkey (open source) instead of Redis (source available),
    # uncomment the Valkey statement and comment out the Redis statement.
    # Using Valkey with Firecrawl is untested and not guaranteed to work. Use with caution.
    image: docker.io/redis:alpine
    # image: valkey/valkey:alpine
    container_name: redis
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - backend
      - publicnet
    expose:
      - ${REDIS_PORT:-6379}
    volumes:
      - ${CONFIG_PATH:-./configs}/redis:/data
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    command: redis-server --appendonly yes --save 60 1 --bind 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpu_shares: 10
    mem_reservation: 200M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 200M
        limits:
          cpus: 0.5
          memory: 4G
    restart: always

  gptr:
    build:
      context: projects/genai/gpt-researcher
      #context: https://github.com/bolabaden/ai-researchwizard.git#master  # :/frontend/nextjs
      dockerfile: Dockerfile.fullstack
    image: docker.io/th3w1zard1/gpt-researcher:latest
    container_name: gptr
    hostname: gptr
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - 3000  # Nginx-proxied access to GPTR.
      - 3001  # Internal NextJS GPTR site
      - 8000  # Static GPTR
      - 8080  # MCP Server Port
    volumes:
      - ${CONFIG_PATH:-./configs}/gptr/logs:/usr/src/app/logs
      - ${CONFIG_PATH:-./configs}/gptr/outputs:/usr/src/app/outputs
      - ${CONFIG_PATH:-./configs}/gptr/reports:/usr/src/app/reports
    stdin_open: true
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      FIRE_CRAWL_API_KEY: ${FIRE_CRAWL_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GLAMA_API_KEY: ${GLAMA_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_ACCESS_TOKEN: ${HUGGINGFACE_ACCESS_TOKEN}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRALAI_API_KEY: ${MISTRALAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      PERPLEXITYAI_API_KEY: ${PERPLEXITYAI_API_KEY}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY}
      REVID_API_KEY: ${REVID_API_KEY}
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY}
      SEARCH1API_KEY: ${SEARCH1API_KEY}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      TOGETHERAI_API_KEY: ${TOGETHERAI_API_KEY}
      UNIFY_API_KEY: ${UNIFY_API_KEY}
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY}
      UPSTAGEAI_API_KEY: ${UPSTAGEAI_API_KEY}
      YOU_API_KEY: ${YOU_API_KEY}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      LOGGING_LEVEL: ${GPTR_LOGGING_LEVEL:-DEBUG}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      NEXT_PUBLIC_GPTR_API_URL: https://gptr.${DOMAIN}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
    labels:
      traefik.enable: "true"
      traefik.http.routers.gptr-nextjs.service: gptr-nextjs@docker
      traefik.http.routers.gptr-nextjs.rule: 'Host(`gptr-nextjs.${DOMAIN}`) || Host(`gptr-nextjs.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.gptr-nextjs.loadbalancer.server.port: 3000
      traefik.http.routers.gptr-legacy.service: gptr-legacy@docker
      traefik.http.routers.gptr-legacy.rule: 'Host(`gptr.${DOMAIN}`) || Host(`gptr.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.gptr-legacy.loadbalancer.server.port: 8000
      traefik.http.routers.gptr-mcp.service: gptr-mcp@docker
      traefik.http.routers.gptr-mcp.rule: 'Host(`gptr-mcp.${DOMAIN}`) || Host(`gptr-mcp.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.gptr-mcp.loadbalancer.server.port: 8080
      homepage.group: AI
      homepage.name: AI Research Wizard
      homepage.description: Full-stack AI research and scraping toolkit with Next.js UI is a web scraper and researcher that uses AI to help you find information quickly.
      homepage.icon: gptr.png
      homepage.href: https://gptr.${DOMAIN}/
    healthcheck:  # docker exec gptr ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test: ["CMD-SHELL", "(wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 && wget -qO- http://127.0.0.1:8000 > /dev/null 2>&1) || exit 1"]  # && (wget -qO- http://127.0.0.1:8080 > /dev/null 2>&1) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
    restart: always

  portainer:
    image: 'docker.io/portainer/portainer-ce:latest'
    container_name: portainer
    hostname: portainer
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - 8000
      - 9000
      - 9443
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - '${CONFIG_PATH:-./configs}/portainer/data:/data'
    labels:
      traefik.enable: "true"
      traefik.http.routers.portainer.service: portainer@docker
      traefik.http.routers.portainer.rule: 'Host(`portainer.${DOMAIN}`) || Host(`portainer.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.portainer.loadbalancer.server.port: 9000
    restart: always

networks:
  publicnet:  # https://docs.docker.com/engine/network/drivers/bridge/#differences-between-user-defined-bridges-and-the-default-bridge
    external: true  # docker network create --driver=bridge --attachable publicnet --subnet=${PUBLICNET_SUBNET:-10.76.0.0/16} --gateway=${PUBLICNET_GATEWAY:-10.76.0.1} --ip-range=${PUBLICNET_IP_RANGE:-10.76.0.0/16} -o com.docker.network.bridge.name=br_publicnet
    attachable: true
    # uncomment below part of publicnet if you aren't creating it externally.
    driver_opts:
      com.docker.network.bridge.name: "br_publicnet"
    ipam:
      config:
        - subnet: ${PUBLICNET_SUBNET:-10.76.0.0/16}
          gateway: ${PUBLICNET_GATEWAY:-10.76.0.1}
          ip_range: ${PUBLICNET_IP_RANGE:-10.76.0.0/16}
  warp-network:
    external: true
    attachable: true
    driver_opts:
      com.docker.network.bridge.name: "br_warp-network"
  backend:
    attachable: true
    driver_opts:
      com.docker.network.bridge.name: "br_backend"

volumes:
  portainer_data:
