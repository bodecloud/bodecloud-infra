services:
  traefik:
    depends_on:
      - traefik-error-pages
    image: traefik:latest
    hostname: ${TRAEFIK_HOSTNAME:-traefik}
    networks:
      - overlay_publicnet
    ports:
      - ${TRAEFIK_WEB_PORT:-80}:${TRAEFIK_WEB_PORT:-80}
      - ${TRAEFIK_WEBSECURE_PORT:-443}:${TRAEFIK_WEBSECURE_PORT:-443}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - ${TS_SOCKET:-/var/run/tailscale/tailscaled.sock}:/var/run/tailscale/tailscaled.sock
      - ${CERTS_PATH:-./certs}:/certs
      - ${CONFIG_PATH:-./configs}/traefik/config:/config
      - ${CONFIG_PATH:-./configs}/traefik/etc/traefik:/etc/traefik
      - ${CONFIG_PATH:-./configs}/traefik/plugins-local:/plugins-local
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      TZ: America/Chicago
      PUID: 1001
      PGID: 989
      UMASK: 002
      DO_AUTH_TOKEN: dop_v1_7a0e8e88a3783a6d3044038a3b0734e9174cb2761812805edc22913a119d7859
      CLOUDFLARE_EMAIL: boden.crouch@gmail.com
      CLOUDFLARE_DNS_API_TOKEN: fp6tjZWb66p1rCyZBM9k0hxrE0n0Y7XctSTwP52I
      CLOUDFLARE_ZONE_API_TOKEN: fp6tjZWb66p1rCyZBM9k0hxrE0n0Y7XctSTwP52I
      LETS_ENCRYPT_EMAIL: boden.crouch@gmail.com
      LEGO_DISABLE_CNAME_SUPPORT: "false"
      DUCKDNS_TOKEN: 2c18769a-2889-4648-a70c-2fe44dd10f20
      ZEROSSL_API_KEY: c04746f32a98d6915aea626941916bd7
    command: --configFile=/config/traefik.yaml
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: Host(`traefik.${DOMAIN}`) || Host(`traefik.${DUCKDNS_DOMAIN}`) || Host(`traefik.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.traefik.loadbalancer.server.port: 8080
    healthcheck: # docker exec traefik ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080 > /dev/null || exit 1",
        ]
      start_period: ${TRAEFIK_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${TRAEFIK_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${TRAEFIK_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  traefik-error-pages:
    image: httpd:alpine
    hostname: ${TRAEFIK_ERROR_PAGES_HOSTNAME:-error-pages}
    networks:
      - overlay_publicnet
    volumes:
      - ${CONFIG_PATH:-./configs}/traefik/error-pages:/usr/local/apache2/htdocs/:ro
    healthcheck: # docker exec traefik-error-pages ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        ["CMD-SHELL", "wget -q -O - http://127.0.0.1:80 > /dev/null || exit 1"]
      start_period: ${TRAEFIK_ERROR_PAGES_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${TRAEFIK_ERROR_PAGES_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${TRAEFIK_ERROR_PAGES_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    hostname: ${CROWDSEC_HOSTNAME:-crowdsec}
    networks:
      - overlay_publicnet
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      CONFIG_FILE: ${CROWDSEC_CONFIG_FILE:-/etc/crowdsec/config.yaml}
      DISABLE_AGENT: ${CROWDSEC_DISABLE_AGENT:-false}
      DISABLE_LOCAL_API: ${CROWDSEC_DISABLE_LOCAL_API:-false}
      DISABLE_ONLINE_API: ${CROWDSEC_DISABLE_ONLINE_API:-false}
      TEST_MODE: ${CROWDSEC_TEST_MODE:-false}
      LOCAL_API_URL: ${CROWDSEC_LOCAL_API_URL:-http://0.0.0.0:${CROWDSEC_LOCAL_API_PORT:-8080}}
      PLUGIN_DIR: ${CROWDSEC_PLUGIN_DIR:-/usr/local/lib/crowdsec/plugins/}
      METRICS_PORT: ${CROWDSEC_METRICS_PORT:-6060}
      USE_WAL: ${CROWDSEC_USE_WAL:-false}
      CUSTOM_HOSTNAME: ${CROWDSEC_CUSTOM_HOSTNAME:-localhost}
      CAPI_WHITELISTS_PATH: ${CROWDSEC_CAPI_WHITELISTS_PATH:-}
      TYPE: ${CROWDSEC_TYPE:-}
      DSN: ${CROWDSEC_DSN:-}
      BOUNCER_KEY_TRAEFIK: ${CROWDSEC_BOUNCER_API_KEY}
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY:-}
      ENROLL_INSTANCE_NAME: ${CROWDSEC_ENROLL_INSTANCE_NAME:-}
      ENROLL_TAGS: ${CROWDSEC_ENROLL_TAGS:-}
      AGENT_USERNAME: ${CROWDSEC_AGENT_USERNAME:-}
      AGENT_PASSWORD: ${CROWDSEC_AGENT_PASSWORD:-}
      USE_TLS: ${CROWDSEC_USE_TLS:-false}
      CACERT_FILE: ${CROWDSEC_CACERT_FILE:-}
      INSECURE_SKIP_VERIFY: ${CROWDSEC_INSECURE_SKIP_VERIFY:-}
      LAPI_CERT_FILE: ${CROWDSEC_LAPI_CERT_FILE:-}
      LAPI_KEY_FILE: ${CROWDSEC_LAPI_KEY_FILE:-}
      CLIENT_CERT_FILE: ${CROWDSEC_CLIENT_CERT_FILE:-}
      CLIENT_KEY_FILE: ${CROWDSEC_CLIENT_KEY_FILE:-}
      AGENTS_ALLOWED_OU: ${CROWDSEC_AGENTS_ALLOWED_OU:-agent-ou}
      BOUNCERS_ALLOWED_OU: ${CROWDSEC_BOUNCERS_ALLOWED_OU:-bouncer-ou}
      NO_HUB_UPGRADE: ${CROWDSEC_NO_HUB_UPGRADE:-false}
      COLLECTIONS: ${CROWDSEC_COLLECTIONS:-crowdsecurity/traefik}
      PARSERS: ${CROWDSEC_PARSERS:-}
      SCENARIOS: ${CROWDSEC_SCENARIOS:-}
      POSTOVERFLOWS: ${CROWDSEC_POSTOVERFLOWS:-}
      CONTEXTS: ${CROWDSEC_CONTEXTS:-}
      APPSEC_CONFIGS: ${CROWDSEC_APPSEC_CONFIGS:-}
      APPSEC_RULES: ${CROWDSEC_APPSEC_RULES:-}
      DISABLE_COLLECTIONS: ${CROWDSEC_DISABLE_COLLECTIONS:-}
      DISABLE_PARSERS: ${CROWDSEC_DISABLE_PARSERS:-}
      DISABLE_SCENARIOS: ${CROWDSEC_DISABLE_SCENARIOS:-}
      DISABLE_POSTOVERFLOWS: ${CROWDSEC_DISABLE_POSTOVERFLOWS:-}
      DISABLE_CONTEXTS: ${CROWDSEC_DISABLE_CONTEXTS:-}
      DISABLE_APPSEC_CONFIGS: ${CROWDSEC_DISABLE_APPSEC_CONFIGS:-}
      DISABLE_APPSEC_RULES: ${CROWDSEC_DISABLE_APPSEC_RULES:-}
      LEVEL_FATAL: ${CROWDSEC_LEVEL_FATAL:-false}
      LEVEL_ERROR: ${CROWDSEC_LEVEL_ERROR:-false}
      LEVEL_WARN: ${CROWDSEC_LEVEL_WARN:-false}
      LEVEL_INFO: ${CROWDSEC_LEVEL_INFO:-false}
      LEVEL_DEBUG: ${CROWDSEC_LEVEL_DEBUG:-false}
      LEVEL_TRACE: ${CROWDSEC_LEVEL_TRACE:-false}
      CI_TESTING: ${CROWDSEC_CI_TESTING:-false}
      DEBUG: ${CROWDSEC_DEBUG:-false}
    volumes:
      - ${CONFIG_PATH:-./configs}/crowdsec/data:/var/lib/crowdsec/data
      - ${CONFIG_PATH:-./configs}/crowdsec/etc/crowdsec:/etc/crowdsec
      - ${CONFIG_PATH:-./configs}/crowdsec/plugins:/usr/local/lib/crowdsec/plugins/
      - ${CONFIG_PATH:-./configs}/crowdsec/logs:/var/log
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.crowdsec.rule: Host(`crowdsec.${DOMAIN}`) || Host(`crowdsec.${DUCKDNS_DOMAIN}`) || Host(`crowdsec.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.crowdsec.loadbalancer.server.port: ${CROWDSEC_LOCAL_API_PORT:-8080}
      homepage.group: Security
      homepage.name: Crowdsec
      homepage.icon: crowdsec.png
      homepage.href: https://crowdsec.${DOMAIN}/
      homepage.description: CrowdSec is an open-source, behavioral, intrusion detection system.
      homepage.widget.type: crowdsec
      homepage.widget.url: http://crowdsec:${CROWDSEC_LOCAL_API_PORT:-8080}
      homepage.widget.username: localhost
      homepage.widget.password: password
    healthcheck: # docker exec crowdsec ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:${CROWDSEC_LOCAL_API_PORT:-8080} > /dev/null || exit 1",
        ]
      start_period: ${CROWDSEC_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${CROWDSEC_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${CROWDSEC_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  dns-manager:
    image: marlburrow/cloudflare-dns-swarm:latest
    environment:
      CLOUDFLARE_TOKEN: ${CLOUDFLARE_API_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_DELAY: ${RETRY_DELAY:-300000}
      IP_CHECK_INTERVAL: ${IP_CHECK_INTERVAL:-3600000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
  deunhealth:
    image: qmcgaw/deunhealth
    network_mode: none
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      LOG_LEVEL: ${DEUNHEALTH_LOG_LEVEL:-debug}
      HEALTH_SERVER_ADDRESS: ${DEUNHEALTH_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}
    restart: always
  dozzle:
    image: amir20/dozzle
    networks:
      - overlay_publicnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_MODE=swarm
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.dozzle.rule: Host(`dozzle.${DOMAIN}`) || Host(`dozzle.${DUCKDNS_DOMAIN}`)
      traefik.http.services.dozzle.loadbalancer.server.port: 8080
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN}/
      homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    restart: always
  homepage:
    image: ghcr.io/gethomepage/homepage
    hostname: ${HOMEPAGE_HOSTNAME:-homepage}
    networks:
      - overlay_publicnet
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
      - ${CONFIG_PATH:-./configs}/homepage:/app/config
    environment:
      TZ: ${TZ:-America/Chicago}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-*}
      HOMEPAGE_VAR_TITLE: ${HOMEPAGE_VAR_TITLE:-Bolabaden}
      HOMEPAGE_VAR_SEARCH_PROVIDER: ${HOMEPAGE_VAR_SEARCH_PROVIDER:-google}
      HOMEPAGE_VAR_HEADER_STYLE: ${HOMEPAGE_VAR_HEADER_STYLE:-}
      HOMEPAGE_VAR_WEATHER_CITY: ${HOMEPAGE_VAR_WEATHER_CITY:-Chicago}
      HOMEPAGE_VAR_WEATHER_LAT: ${HOMEPAGE_VAR_WEATHER_LAT:-41.8781}
      HOMEPAGE_VAR_WEATHER_LONG: ${HOMEPAGE_VAR_WEATHER_LONG:--87.6298}
      HOMEPAGE_VAR_WEATHER_UNIT: ${HOMEPAGE_VAR_WEATHER_UNIT:-fahrenheit}
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.homepage.rule: Host(`homepage.${DOMAIN}`) || Host(`homepage.${DUCKDNS_DOMAIN}`) || Host(`homepage.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.homepage.loadbalancer.server.port: 3000
    healthcheck: # docker exec homepage ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:3000 > /dev/null || exit 1",
        ]
      start_period: ${HOMEPAGE_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${HOMEPAGE_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${HOMEPAGE_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    hostname: ${NETALERTX_HOSTNAME:-netalertx}
    network_mode: host
    privileged: true
    volumes:
      - ${CONFIG_PATH:-./configs}/netalertx/config:/app/config
      - ${CONFIG_PATH:-./configs}/netalertx/db:/app/db
      - type: tmpfs
        target: /app/api
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      PORT: 20211
    labels:
      traefik.enable: "true"
      traefik.http.routers.netalertx.rule: Host(`netalertx.${DOMAIN}`) || Host(`netalertx.${DUCKDNS_DOMAIN}`) || Host(`netalertx.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.routers.netalertx.middlewares: netalertx-stripprefix
      traefik.http.middlewares.netalertx-stripprefix.stripprefix.prefixes: /netalertx
      traefik.http.services.netalertx.loadbalancer.server.port: 20211
      homepage.group: Alerts
      homepage.name: Netalertx
      homepage.icon: netalertx.png
      homepage.href: https://netalertx.${DOMAIN}
      homepage.description: Netalertx is a tool for monitoring your network and alerting you when something is wrong.
      homepage.widget.type: netalertx
      homepage.widget.url: https://netalertx.${DOMAIN}
      homepage.widget.key: ${NETALERTX_API_KEY}
    healthcheck: # docker exec netalertx ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        ["CMD-SHELL", "curl -fs http://127.0.0.1:20211 > /dev/null || exit 1"]
      start_period: ${NETALERTX_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${NETALERTX_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${NETALERTX_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  speedtest:
    image: linuxserver/speedtest-tracker
    hostname: ${SPEEDTEST_TRACKER_HOSTNAME:-speedtest}
    networks:
      - overlay_publicnet
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${CONFIG_PATH:-./configs}/speedtest-tracker/config:/config
      - ${CERTS_PATH:-./certs}/speedtest-tracker/keys:/config/keys
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL}
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME}
      ADMIN_PASSWORD: ${SPEEDTEST_TRACKER_ADMIN_PASSWORD:-b00tstr4p}
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60}
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY}
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker}
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}}
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-}
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-}
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true}
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i}
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl}
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s}
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}}
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0}
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true}
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-}
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-}
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-0 * * * *}
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-}
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-}
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900}
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true}
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25}
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900}
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.speedtest.rule: Host(`speedtest.${DOMAIN}`) || Host(`speedtest.${DUCKDNS_DOMAIN}`) || Host(`speedtest.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.speedtest.loadbalancer.server.port: 80
      homepage.group: Network Monitoring
      homepage.name: Speedtest
      homepage.icon: speedtest.png
      homepage.href: https://speedtest.${DOMAIN}/
      homepage.description: Regularly tests your internet speed and tracks performance over time, helping you monitor your connection quality.
      homepage.widget.type: speedtest
      homepage.widget.url: https://speedtest.${DOMAIN}
      homepage.widget.fields: '["download", "upload", "ping", "speedtest"]'
    healthcheck: # docker exec speedtest ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:80 > /dev/null || exit 1"]
      start_period: ${SPEEDTEST_TRACKER_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${SPEEDTEST_TRACKER_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${SPEEDTEST_TRACKER_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  cadvisor:
    depends_on:
      - prometheus
    image: gcr.io/cadvisor/cadvisor
    hostname: ${CADVISOR_HOSTNAME:-cadvisor}
    networks:
      - overlay_publicnet
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.cadvisor.rule: Host(`cadvisor.${DOMAIN}`) || Host(`cadvisor.${DUCKDNS_DOMAIN}`) || Host(`cadvisor.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.cadvisor.loadbalancer.server.port: 8080
      homepage.group: System Monitoring
      homepage.name: Cadvisor
      homepage.icon: cadvisor.png
      homepage.href: https://cadvisor.${DOMAIN}/
      homepage.description: A tool for monitoring and visualizing resource usage and performance metrics of Docker containers.
    healthcheck: # docker exec cadvisor ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080 > /dev/null || exit 1",
        ]
      start_period: ${CADVISOR_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${CADVISOR_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${CADVISOR_HEALTHCHECK_INTERVAL:-30s}
    restart: always
  flaresolverr:
    image: ghcr.io/thephaseless/byparr:latest
    hostname: flaresolverr
    networks:
      overlay_publicnet:
        ipv4_address: ${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      LOG_HTML: ${FLARESOLVERR_LOG_HTML:-false}
      PORT: ${FLARESOLVERR_PORT:-8191}
      HOST: ${FLARESOLVERR_HOST:-0.0.0.0}
      HEADLESS: ${FLARESOLVERR_HEADLESS:-true}
      BROWSER_TIMEOUT: ${FLARESOLVERR_BROWSER_TIMEOUT:-120000}
      TEST_URL: ${FLARESOLVERR_TEST_URL:-https://www.google.com}
      PROMETHEUS_ENABLED: ${FLARESOLVERR_PROMETHEUS_ENABLED:-true}
      PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:${FLARESOLVERR_PORT:-8191}/health || exit 1",
        ]
      interval: ${FLARESOLVERR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${FLARESOLVERR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${FLARESOLVERR_HEALTHCHECK_RETRIES:-3}
      start_period: ${FLARESOLVERR_HEALTHCHECK_START_PERIOD:-60s}
    restart: always
  gluetun-airvpn:
    image: ghcr.io/qdm12/gluetun
    hostname: ${GLUETUN_AIRVPN_HOSTNAME:-gluetun-airvpn}
    networks:
      overlay_publicnet:
        ipv4_address: ${GLUETUN_AIRVPN_IPV4_ADDRESS:-10.76.89.128}
    extra_hosts:
      - host.docker.internal:172.17.0.1
      - flaresolverr:${FLARESOLVERR_IPV4_ADDRESS:-10.76.128.93}
      - iphone172:100.97.148.14
      - jellyfin:${JELLYFIN_IPV4_ADDRESS:-10.76.4.20}
      - lidarr:${LIDARR_IPV4_ADDRESS:-10.76.4.2}
      - micklethefickle:100.72.149.123
      - micklethefickle3:100.72.149.123
      - radarr:${RADARR_IPV4_ADDRESS:-10.76.4.3}
      - readarr:${READARR_IPV4_ADDRESS:-10.76.4.4}
      - sonarr:${SONARR_IPV4_ADDRESS:-10.76.4.5}
      - whisparr:${WHISPARR_IPV4_ADDRESS:-10.76.4.6}
      - wizard:100.119.187.62
      - wizard-pc:100.119.187.62
      - gluetun-airvpn:${GLUETUN_AIRVPN_IPV4_ADDRESS:-10.76.89.128}
      - gluetun-premiumize-at:${GLUETUN_PREMIUMIZE_AT_IPV4_ADDRESS:-10.76.128.115}
      - gluetun-premiumize-au:${GLUETUN_PREMIUMIZE_AU_IPV4_ADDRESS:-10.76.128.114}
      - gluetun-premiumize-be:${GLUETUN_PREMIUMIZE_BE_IPV4_ADDRESS:-10.76.128.113}
