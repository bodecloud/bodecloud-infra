      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7000 || exit 1"]
      interval: ${TORRENTIO_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${TORRENTIO_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${TORRENTIO_HEALTHCHECK_RETRIES:-3}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
      labels:
        deunhealth.restart.on.unhealthy: "true"
        traefik.enable: "true"
        traefik.http.routers.torrentio.rule: Host(`torrentio.${DOMAIN}`) || Host(`torrentio.${DUCKDNS_DOMAIN}`) || Host(`torrentio.${TS_SUBDOMAIN}.duckdns.org`)
        traefik.http.services.torrentio.loadbalancer.server.port: 7000
        homepage.group: Media
        homepage.name: Torrentio
        homepage.icon: torrentio.png
        homepage.href: https://torrentio.${DOMAIN}/
    restart: always
  torrentio-mongodb:
    image: mongo:latest
    hostname: ${TORRENTIO_MONGODB_HOSTNAME:-torrentio-mongodb}
    networks:
      - overlay_publicnet
    ports:
      - "27017:27017"
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      MONGO_INITDB_ROOT_USERNAME: ${TORRENTIO_MONGODB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${TORRENTIO_MONGODB_ROOT_PASSWORD:-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --eval ''db.runCommand("ping").ok'' localhost:27017 --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} || exit 1',
        ]
      interval: ${TORRENTIO_MONGODB_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${TORRENTIO_MONGODB_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${TORRENTIO_MONGODB_HEALTHCHECK_RETRIES:-5}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
    restart: always
  torrentio-postgres:
    image: postgres:17.4
    hostname: ${TORRENTIO_POSTGRES_HOSTNAME:-torrentio-postgres}
    networks:
      - overlay_publicnet
    volumes:
      - ${CONFIG_PATH:-./configs}/stremio/addons/torrentio/pgdata:${TORRENTIO_PGDATA:-/var/lib/postgresql/data/pgdata}
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      PGDATA: ${TORRENTIO_PGDATA:-/var/lib/postgresql/data/pgdata}
      POSTGRES_USER: ${TORRENTIO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TORRENTIO_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TORRENTIO_DB_NAME:-torrentio}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} > /dev/null 2>&1 || exit 1",
        ]
      interval: ${TORRENTIO_DB_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${TORRENTIO_DB_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${TORRENTIO_DB_HEALTHCHECK_RETRIES:-5}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
      labels:
        deunhealth.restart.on.unhealthy: "true"
    restart: always
  riven:
    depends_on:
      - riven-core
    image: spoked/riven-frontend:latest
    hostname: ${RIVEN_HOSTNAME:-riven}
    networks:
      - overlay_publicnet
    tty: true
    volumes:
      - ${CONFIG_PATH:-./configs}/plex/riven/config:/riven/config
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      ORIGIN: http://${RIVEN_HOSTNAME:-riven}:3000
      BACKEND_URL: http://${RIVEN_CORE_HOSTNAME:-riven-core}:8080
      DIALECT: postgres
      DATABASE_URL: ${RIVEN_DATABASE_URL:-postgres://postgres:postgres@${RIVEN_DB_HOSTNAME:-riven-db}:5432/riven}
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.riven.rule: Host(`riven.${DOMAIN}`) || Host(`riven.${DUCKDNS_DOMAIN}`) || Host(`riven.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.riven.loadbalancer.server.port: 3000
      homepage.group: Media
      homepage.name: Riven
      homepage.icon: riven.png
      homepage.href: https://riven.${DOMAIN}/
      homepage.description: Debrid service for Plex.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: ${RIVEN_FRONTEND_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${RIVEN_FRONTEND_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${RIVEN_FRONTEND_HEALTHCHECK_RETRIES:-3}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
      labels:
        deunhealth.restart.on.unhealthy: "true"
        traefik.enable: "true"
        traefik.http.routers.riven.rule: Host(`riven.${DOMAIN}`) || Host(`riven.${DUCKDNS_DOMAIN}`) || Host(`riven.${TS_SUBDOMAIN}.duckdns.org`)
        traefik.http.services.riven.loadbalancer.server.port: 3000
        homepage.group: Media
        homepage.name: Riven
        homepage.icon: riven.png
        homepage.href: https://riven.${DOMAIN}/
    restart: always
  riven-core:
    depends_on:
      - riven-db
    image: spoked/riven:latest
    hostname: ${RIVEN_CORE_HOSTNAME:-riven-core}
    networks:
      - overlay_publicnet
    tty: true
    volumes:
      - ${CONFIG_PATH:-./configs}/plex/riven/data:/riven/data
      - /mnt:/mnt
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      RIVEN_DATABASE_HOST: ${RIVEN_DATABASE_HOST:-postgresql+psycopg2://postgres:postgres@riven-db/riven}
      RIVEN_FORCE_ENV: ${RIVEN_FORCE_ENV:-false}
      HARD_RESET: ${HARD_RESET:-false}
      API_KEY: ${RIVEN_API_KEY:-cb2dbb5ee282f0a447b203270273ca9e}
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:8080 >/dev/null || exit 1"]
      interval: ${RIVEN_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${RIVEN_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${RIVEN_HEALTHCHECK_RETRIES:-10}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
      labels:
        deunhealth.restart.on.unhealthy: "true"
        traefik.enable: "true"
        traefik.http.routers.riven-core.rule: Host(`riven-core.${DOMAIN}`) || Host(`riven-core.${DUCKDNS_DOMAIN}`) || Host(`riven-core.${TS_SUBDOMAIN}.duckdns.org`)
        traefik.http.services.riven-core.loadbalancer.server.port: 8080
        homepage.group: Media
        homepage.name: Riven
        homepage.icon: riven.png
        homepage.href: https://riven.${DOMAIN}/
    restart: unless-stopped
  riven-db:
    image: postgres:17.4
    hostname: ${RIVEN_DB_HOSTNAME:-riven-db}
    networks:
      - overlay_publicnet
    volumes:
      - ${CONFIG_PATH:-./configs}/plex/riven/pgdata:${RIVEN_PGDATA:-/var/lib/postgresql/data/pgdata}
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-989}
      UMASK: ${UMASK:-002}
      PGDATA: ${RIVEN_PGDATA:-/var/lib/postgresql/data/pgdata}
      POSTGRES_USER: ${RIVEN_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${RIVEN_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${RIVEN_DB_NAME:-riven}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: ${RIVEN_DB_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${RIVEN_DB_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${RIVEN_DB_HEALTHCHECK_RETRIES:-5}
    deploy:
      restart_policy:
        condition: on-failure
      mode: replicated
      labels:
        deunhealth.restart.on.unhealthy: "true"
        traefik.enable: "true"
        traefik.http.routers.riven-db.rule: Host(`riven-db.${DOMAIN}`) || Host(`riven-db.${DUCKDNS_DOMAIN}`) || Host(`riven-db.${TS_SUBDOMAIN}.duckdns.org`)
        traefik.http.services.riven-db.loadbalancer.server.port: 5432
        homepage.group: Media
        homepage.name: Riven
        homepage.icon: riven.png
        homepage.href: https://riven.${DOMAIN}/
    restart: always
networks:
