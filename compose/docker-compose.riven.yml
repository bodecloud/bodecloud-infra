      homepage.icon: zurg.png
      homepage.href: https://zurg.${DOMAIN}/
      homepage.description: Real-Debrid WebDAV proxy for seamless streaming
    cpu_shares: 10
    mem_reservation: 32M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 32M
        limits:
          cpus: 1
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999/http/version.txt || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

networks:
  publicnet:  # https://docs.docker.com/engine/network/drivers/bridge/#differences-between-user-defined-bridges-and-the-default-bridge
    external: true  # docker network create --driver=bridge --attachable publicnet --subnet=${PUBLICNET_SUBNET:-10.76.0.0/16} --gateway=${PUBLICNET_GATEWAY:-10.76.0.1} --ip-range=${PUBLICNET_IP_RANGE:-10.76.0.0/16} -o com.docker.network.bridge.name=br_publicnet
    attachable: true
    name: publicnet
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "br_publicnet"
    ipam:
      config:
        - subnet: ${PUBLICNET_SUBNET:-10.76.0.0/16}
          gateway: ${PUBLICNET_GATEWAY:-10.76.0.1}
          ip_range: ${PUBLICNET_IP_RANGE:-10.76.0.0/16}
  vpn-network:
    external: true
    name: vpn-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "br_vpn-network"
  vpn-docker-network:
    external: true
    name: vpn-docker-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "br_vpn-docker-network"

volumes:
  meili_data:
  qdrant_storage:
  container_configs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CONFIG_PATH:-./configs}
  container_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BACKUP_PATH:-./backup}
  tmp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=100g
  shared:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=100m
  gluetun_scripts:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
