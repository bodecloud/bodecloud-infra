services:
  authentik-server:
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    image: 'ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.6.4}'
    container_name: authentik-server
    hostname: authentik-server
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    environment:
      AUTHENTIK_REDIS__HOST: 'authentik-redis'
      AUTHENTIK_POSTGRESQL__HOST: 'authentik-postgresql'
      AUTHENTIK_POSTGRESQL__USER: 'authentik'
      AUTHENTIK_POSTGRESQL__NAME: 'authentik'
      AUTHENTIK_POSTGRESQL__PASSWORD: 'authentik'
      AUTHENTIK_SECRET_KEY: 'fd14e752f651b2a0b31daf49247766e9856aa93b57a479b3f6f12ae477d78b3d'
      AUTHENTIK_ERROR_REPORTING__ENABLED: 'true'
      AUTHENTIK_EMAIL__HOST: 'smtp.gmail.com'
      AUTHENTIK_EMAIL__PORT: '587'
      AUTHENTIK_EMAIL__USERNAME: 'boden.crouch@gmail.com'
      AUTHENTIK_EMAIL__PASSWORD: '${SUDO_PASSWORD}'
      AUTHENTIK_EMAIL__USE_TLS: 'true'
      AUTHENTIK_EMAIL__USE_SSL: 'false'
      AUTHENTIK_EMAIL__TIMEOUT: '10'
      AUTHENTIK_EMAIL__FROM: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP__EMAIL: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP__PASSWORD: '${SUDO_PASSWORD}'
      AUTHENTIK_BOOTSTRAP_EMAIL: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP_PASSWORD: '${SUDO_PASSWORD}'
    volumes:
      - '${CONFIG_PATH:-./configs}/authentik/media:/media'
      - '${CONFIG_PATH:-./configs}/authentik/custom-templates:/templates'
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.gzip.compress: "true"
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: "https"
      traefik.http.routers.http-authentik-server.entryPoints: "web"
      traefik.http.routers.http-authentik-server.middlewares: "redirect-to-https"
      traefik.http.routers.http-authentik-server.rule: "Host(`authentikserver.${DOMAIN}`) || Host(`authentikserver.${TS_HOSTNAME}.${DOMAIN}`) && PathPrefix(`/`)"
      traefik.http.routers.http-authentik-server.service: "http-authentik-server"
      traefik.http.routers.https-authentik-server.entryPoints: "websecure"
      traefik.http.routers.https-authentik-server.middlewares: "gzip"
      traefik.http.routers.https-authentik-server.rule: "Host(`authentikserver.${DOMAIN}`) || Host(`authentikserver.${TS_HOSTNAME}.${DOMAIN}`) && PathPrefix(`/`)"
      traefik.http.routers.https-authentik-server.service: "https-authentik-server"
      traefik.http.routers.https-authentik-server.tls.certresolver: "letsencrypt"
      traefik.http.routers.https-authentik-server.tls: "true"
      traefik.http.services.http-authentik-server.loadbalancer.server.port: "9000"
      traefik.http.services.https-authentik-server.loadbalancer.server.port: "9000"
    command: server
    restart: always
  authentik-worker:
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    image: 'ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.6.4}'
    container_name: authentik-worker
    hostname: authentik-worker
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    user: root
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - '${CONFIG_PATH:-./configs}/authentik/media:/media'
      - '${CONFIG_PATH:-./configs}/authentik/certs:/certs'
      - '${CONFIG_PATH:-./configs}/authentik/custom-templates:/templates'
    environment:
      AUTHENTIK_REDIS__HOST: 'authentik-redis'
      AUTHENTIK_POSTGRESQL__HOST: 'authentik-postgresql'
      AUTHENTIK_POSTGRESQL__USER: 'authentik'
      AUTHENTIK_POSTGRESQL__NAME: 'authentik'
      AUTHENTIK_POSTGRESQL__PASSWORD: 'authentik'
      AUTHENTIK_SECRET_KEY: 'fd14e752f651b2a0b31daf49247766e9856aa93b57a479b3f6f12ae477d78b3d'
      AUTHENTIK_ERROR_REPORTING__ENABLED: 'true'
      AUTHENTIK_EMAIL__HOST: 'smtp.gmail.com'
      AUTHENTIK_EMAIL__PORT: '587'
      AUTHENTIK_EMAIL__USERNAME: 'boden.crouch@gmail.com'
      AUTHENTIK_EMAIL__PASSWORD: '${SUDO_PASSWORD}'
      AUTHENTIK_EMAIL__USE_TLS: 'true'
      AUTHENTIK_EMAIL__USE_SSL: 'false'
      AUTHENTIK_EMAIL__TIMEOUT: '10'
      AUTHENTIK_EMAIL__FROM: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP__EMAIL: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP__PASSWORD: '${SUDO_PASSWORD}'
      AUTHENTIK_BOOTSTRAP_EMAIL: 'boden.crouch@gmail.com'
      AUTHENTIK_BOOTSTRAP_PASSWORD: '${SUDO_PASSWORD}'
    command: worker
    restart: always
  authentik-postgresql:
    image: 'docker.io/postgres:16.3-alpine'
    container_name: authentik-postgresql
    hostname: authentik-postgresql
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    volumes:
      - '${CONFIG_PATH:-./configs}/authentik/postgresql:/var/lib/postgresql/data'
    environment:
      POSTGRES_PASSWORD: 'authentik'
      POSTGRES_USER: 'authentik'
      POSTGRES_DB: authentik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 2s
      timeout: 10s
      retries: 15
    restart: always
  authentik-redis:
    image: 'docker.io/redis:alpine'
    container_name: authentik-redis
    hostname: authentik-redis
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    volumes:
      - '${CONFIG_PATH:-./configs}/authentik/redis:/data'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 2s
      timeout: 10s
      retries: 15
    command: '--save 60 1 --loglevel warning'
    restart: always
volumes:
  authentik-db:
    name: authentik-db
  authentik-redis:
    name: authentik-redis
configs: {  }
secrets: {  }
