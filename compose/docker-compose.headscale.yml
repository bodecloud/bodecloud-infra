# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json



# Headscale config is rendered to ${CONFIG_PATH}/headscale/config/config.yaml by
# arbitrary-scripts/bootstrap/generate-implicit-env.sh (implicit DNS, ACL, extra records).
services:
  headscale-server:
    image: docker.io/headscale/headscale
    container_name: headscale-server
    hostname: headscale-server
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - backend
      - publicnet
    expose:
      - ${HEADSCALE_STUN_PORT:-3478}
      - ${HEADSCALE_HTTP_PORT:-8081}
      - ${HEADSCALE_METRICS_PORT:-8080}
    volumes:
      - ${CONFIG_PATH:-./volumes}/headscale/config:/etc/headscale:ro
      - ${CONFIG_PATH:-./volumes}/headscale/lib:/var/lib/headscale
      - ${CONFIG_PATH:-./volumes}/headscale/run:/var/run/headscale
    labels:
      traefik.enable: true
      # Redirect tailscale's expected /admin to headscale ui's /web for seamless transition
      traefik.http.middlewares.headscale-admin-redirect.redirectRegex.regex: '^https?://headscale(-server)?\.($DOMAIN|$TS_HOSTNAME\.$DOMAIN)/admin(.*)$'
      traefik.http.middlewares.headscale-admin-redirect.redirectRegex.replacement: https://headscale.$DOMAIN/web$3
      traefik.http.middlewares.headscale-admin-redirect.redirectRegex.permanent: false
      traefik.http.middlewares.headscale-server-redirect.redirectRegex.regex: '^https?://headscale-server\.((?:$DOMAIN|$TS_HOSTNAME\.$DOMAIN))(.*)$'
      traefik.http.middlewares.headscale-server-redirect.redirectRegex.replacement: https://headscale.$1$2
      traefik.http.middlewares.headscale-server-redirect.redirectRegex.permanent: false
      traefik.http.routers.headscale-server.service: headscale-server@docker
      traefik.http.routers.headscale-server.rule: Host(`headscale-server.$DOMAIN`) || Host(`headscale-server.$TS_HOSTNAME.$DOMAIN`) || Host(`headscale.$DOMAIN`) || Host(`headscale.$TS_HOSTNAME.$DOMAIN`)
      traefik.http.routers.headscale-server.middlewares: headscale-admin-redirect@docker,headscale-server-redirect@docker
      traefik.http.services.headscale-server.loadbalancer.server.port: ${HEADSCALE_HTTP_PORT:-8081}
      traefik.http.routers.headscale-metrics.service: headscale-metrics@docker
      traefik.http.routers.headscale-metrics.rule: (Host(`headscale.$DOMAIN`) || Host(`headscale.$TS_HOSTNAME.$DOMAIN`)) && PathPrefix(`/metrics`)
      traefik.http.services.headscale-metrics.loadbalancer.server.port: ${HEADSCALE_METRICS_PORT:-8080}
    command: serve --config /etc/headscale/config.yaml
    restart: always
  headscale:
    depends_on:
      - headscale-server
    #pull_policy: always
    image: ghcr.io/gurucomputing/headscale-ui
    container_name: headscale
    hostname: headscale
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - backend
      - publicnet
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 2606:4700:4700::1111
      - 2606:4700:4700::1001
      - 9.9.9.9
      - 2620:fe::fe
      - 8.8.8.8
      - 2001:4860:4860::8888
      - 2001:4860:4860::8844
    labels:
      traefik.enable: true
      traefik.http.routers.headscale.service: headscale
      traefik.http.routers.headscale.rule: (Host(`headscale.$DOMAIN`) || Host(`headscale.$TS_HOSTNAME.$DOMAIN`)) && (PathPrefix(`/web`) || PathPrefix(`/web/users.html`) || PathPrefix(`/web/groups.html`) || PathPrefix(`/web/devices.html`) || PathPrefix(`/web/settings.html`))
      traefik.http.services.headscale.loadbalancer.server.port: 8080
      homepage.group: Networking
      homepage.name: Headscale UI
      homepage.icon: headscale.png
      homepage.href: https://headscale.$DOMAIN/
      homepage.description: Headscale UI is a web interface for Headscale, an open source implementation of Tailscale's Admin control panel.
    restart: always
