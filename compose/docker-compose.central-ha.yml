version: '3.8'

x-common-env: &common-env
  TZ: ${TZ:-America/Chicago}
  PUID: ${PUID:-1001}
  PGID: ${PGID:-989}
  UMASK: ${UMASK:-002}

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-logging: &common-logging
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"

services:
  # Consul servers in HA mode with 3 nodes
  consul-server1:
    image: hashicorp/consul:latest
    container_name: consul-server1
    hostname: consul-server1
    networks:
      centralnet:
        ipv4_address: ${CONSUL_SERVER1_IPV4_ADDRESS:-10.78.0.10}
    ports:
      - "${CONSUL_SERVER1_HTTP_PORT:-8500}:8500"
      - "${CONSUL_SERVER1_DNS_PORT:-8600}:8600/tcp"
      - "${CONSUL_SERVER1_DNS_PORT:-8600}:8600/udp"
      - "${CONSUL_SERVER1_SERF_LAN_PORT:-8301}:8301/tcp"
      - "${CONSUL_SERVER1_SERF_LAN_PORT:-8301}:8301/udp"
      - "${CONSUL_SERVER1_SERF_WAN_PORT:-8302}:8302/tcp"
      - "${CONSUL_SERVER1_SERF_WAN_PORT:-8302}:8302/udp"
      - "${CONSUL_SERVER1_SERVER_PORT:-8300}:8300"
    volumes:
      - ${CONFIG_PATH:-./configs}/consul/server1/data:/consul/data
      - ${CONFIG_PATH:-./configs}/consul/server1/config:/consul/config
    environment:
      <<: *common-env
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_CLIENT_INTERFACE: eth0
    command: >
      agent -server -ui 
      -bootstrap-expect=3
      -node=consul-server1
      -client=0.0.0.0
      -data-dir=/consul/data
      -config-dir=/consul/config
      -retry-join=consul-server1
      -retry-join=consul-server2
      -retry-join=consul-server3
      -domain=consul
    <<: [*resource-limits, *common-logging]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  consul-server2:
    image: hashicorp/consul:latest
    container_name: consul-server2
    hostname: consul-server2
    networks:
      centralnet:
        ipv4_address: ${CONSUL_SERVER2_IPV4_ADDRESS:-10.78.0.11}
    ports:
      - "${CONSUL_SERVER2_HTTP_PORT:-8501}:8500"
      - "${CONSUL_SERVER2_DNS_PORT:-8601}:8600/tcp"
      - "${CONSUL_SERVER2_DNS_PORT:-8601}:8600/udp"
      - "${CONSUL_SERVER2_SERF_LAN_PORT:-8311}:8301/tcp"
      - "${CONSUL_SERVER2_SERF_LAN_PORT:-8311}:8301/udp"
      - "${CONSUL_SERVER2_SERF_WAN_PORT:-8312}:8302/tcp"
      - "${CONSUL_SERVER2_SERF_WAN_PORT:-8312}:8302/udp"
      - "${CONSUL_SERVER2_SERVER_PORT:-8310}:8300"
    volumes:
      - ${CONFIG_PATH:-./configs}/consul/server2/data:/consul/data
      - ${CONFIG_PATH:-./configs}/consul/server2/config:/consul/config
    environment:
      <<: *common-env
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_CLIENT_INTERFACE: eth0
    command: >
      agent -server 
      -bootstrap-expect=3
      -node=consul-server2
      -client=0.0.0.0
      -data-dir=/consul/data
      -config-dir=/consul/config
      -retry-join=consul-server1
      -retry-join=consul-server2
      -retry-join=consul-server3
      -domain=consul
    <<: [*resource-limits, *common-logging]
    depends_on:
      - consul-server1
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  consul-server3:
    image: hashicorp/consul:latest
    container_name: consul-server3
    hostname: consul-server3
    networks:
      centralnet:
        ipv4_address: ${CONSUL_SERVER3_IPV4_ADDRESS:-10.78.0.12}
    ports:
      - "${CONSUL_SERVER3_HTTP_PORT:-8502}:8500"
      - "${CONSUL_SERVER3_DNS_PORT:-8602}:8600/tcp"
      - "${CONSUL_SERVER3_DNS_PORT:-8602}:8600/udp"
      - "${CONSUL_SERVER3_SERF_LAN_PORT:-8321}:8301/tcp"
      - "${CONSUL_SERVER3_SERF_LAN_PORT:-8321}:8301/udp"
      - "${CONSUL_SERVER3_SERF_WAN_PORT:-8322}:8302/tcp"
      - "${CONSUL_SERVER3_SERF_WAN_PORT:-8322}:8302/udp"
      - "${CONSUL_SERVER3_SERVER_PORT:-8320}:8300"
    volumes:
      - ${CONFIG_PATH:-./configs}/consul/server3/data:/consul/data
      - ${CONFIG_PATH:-./configs}/consul/server3/config:/consul/config
    environment:
      <<: *common-env
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_CLIENT_INTERFACE: eth0
    command: >
      agent -server 
      -bootstrap-expect=3
      -node=consul-server3
      -client=0.0.0.0
      -data-dir=/consul/data
      -config-dir=/consul/config
      -retry-join=consul-server1
      -retry-join=consul-server2
      -retry-join=consul-server3
      -domain=consul
    <<: [*resource-limits, *common-logging]
    depends_on:
      - consul-server1
      - consul-server2
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # Redis for shared storage between Traefik instances
  redis:
    image: redis:alpine
    container_name: redis
    hostname: redis
    networks:
      centralnet:
        ipv4_address: ${REDIS_IPV4_ADDRESS:-10.78.0.20}
    volumes:
      - ${CONFIG_PATH:-./configs}/redis/data:/data
    command: redis-server --appendonly yes
    <<: [*resource-limits, *common-logging]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # Load balancer in front of Traefik instances
  haproxy:
    image: haproxy:latest
    container_name: haproxy
    hostname: haproxy
    networks:
      centralnet:
        ipv4_address: ${HAPROXY_IPV4_ADDRESS:-10.78.0.5}
    ports:
      - "80:80"  # HTTP
      - "443:443"  # HTTPS
    volumes:
      - ${CONFIG_PATH:-./configs}/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    <<: [*resource-limits, *common-logging]
    restart: always
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Multiple Traefik instances for high availability
  central-traefik1:
    depends_on:
      - consul-server1
      - redis
      - traefik-error-pages
    image: traefik:latest
    container_name: central-traefik1
    hostname: central-traefik1
    networks:
      centralnet:
        ipv4_address: ${CENTRAL_TRAEFIK1_IPV4_ADDRESS:-10.78.0.30}
    expose:
      - 80
      - 443
      - 8080
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - ${CERTS_PATH:-./certs}:/certs:ro
      - ${CONFIG_PATH:-./configs}/central-traefik/config:/config
      - ${CONFIG_PATH:-./configs}/central-traefik/plugins-local:/plugins-local
    environment:
      <<: *common-env
      CONSUL_HTTP_ADDR: "consul-server1:8500"
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL}
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-}
    <<: [*resource-limits, *common-logging]
    labels:
      deunhealth.restart.on.unhealthy: "true"
    command: >
      --configFile=/config/traefik.yaml
      --providers.redis.endpoints=redis:6379
      --providers.redis.rootKey=traefik
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  central-traefik2:
    depends_on:
      - consul-server1
      - redis
      - traefik-error-pages
      - central-traefik1
    image: traefik:latest
    container_name: central-traefik2
    hostname: central-traefik2
    networks:
      centralnet:
        ipv4_address: ${CENTRAL_TRAEFIK2_IPV4_ADDRESS:-10.78.0.31}
    expose:
      - 80
      - 443
      - 8080
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - ${CERTS_PATH:-./certs}:/certs:ro
      - ${CONFIG_PATH:-./configs}/central-traefik/config:/config
      - ${CONFIG_PATH:-./configs}/central-traefik/plugins-local:/plugins-local
    environment:
      <<: *common-env
      CONSUL_HTTP_ADDR: "consul-server1:8500"
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL}
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-}
    <<: [*resource-limits, *common-logging]
    labels:
      deunhealth.restart.on.unhealthy: "true"
    command: >
      --configFile=/config/traefik.yaml
      --providers.redis.endpoints=redis:6379
      --providers.redis.rootKey=traefik
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  traefik-error-pages:
    image: httpd:alpine
    container_name: central-traefik-error-pages
    hostname: central-error-pages
    networks:
      centralnet:
    volumes:
      - ${CONFIG_PATH:-./configs}/central-traefik/error-pages:/usr/local/apache2/htdocs/:ro
    restart: always

networks:
  centralnet:
    driver: bridge
    attachable: true
    ipam:
      config:
        - subnet: ${CENTRALNET_SUBNET:-10.78.0.0/16}
          gateway: ${CENTRALNET_GATEWAY:-10.78.0.1}
    driver_opts:
      com.docker.network.bridge.name: centralnet 