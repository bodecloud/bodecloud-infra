    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.gptr.rule: Host(`gptr.${DOMAIN}`) || Host(`gptr.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`gptr.${TS_HOSTNAME}.duckdns.org`) || Host(`gptr.${TS_HOSTNAME}.${DOMAIN}`) || Host(`gptr.${TS_HOSTNAME}.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.gptr.loadbalancer.server.port: 8000
    healthcheck:  # docker exec gptr ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
    restart: always
  lobechat:
    image: lobehub/lobe-chat:latest
    container_name: lobechat
    hostname: ${LOBECHAT_HOSTNAME:-lobechat}
    extra_hosts: *common-hostname-aliases
    networks:
      publicnet:
        ipv4_address: ${LOBECHAT_IPV4_ADDRESS:-10.76.128.46}
    expose:
      - 3210
    volumes:
      - ${CONFIG_PATH:-./configs}/lobechat/host_config:/configs/lobechat/host_config
    env_file:
      - ${ROOT_DIR:-.}/.env
    environment:
      <<: *common-env
      ACCESS_CODE: ${LOBECHAT_ACCESS_CODE:-brunner56}
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.lobechat.middlewares: nginx-auth@file
      traefik.http.routers.lobechat.rule: Host(`lobechat.${DOMAIN}`) || Host(`lobechat.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`lobechat.${TS_HOSTNAME}.duckdns.org`) || Host(`lobechat.${TS_HOSTNAME}.${DOMAIN}`) || Host(`lobechat.${TS_HOSTNAME}.${DUCKDNS_SUBDOMAIN}.duckdns.org`)
      traefik.http.services.lobechat.loadbalancer.server.port: 3210
      homepage.group: AI
      homepage.name: Lobe Chat
      homepage.icon: lobechat.png
      homepage.href: https://lobechat.${DOMAIN}/
      homepage.description: A chatbot for your applications.
    healthcheck:  # docker exec lobechat ls -la /bin /usr/bin | grep -E 'curl|wget|nc|telnet|http|python|ncat|nmap'
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3210 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
  nginx-auth:
    # 🔹🔹 Nginx Authentication Middleware 🔹🔹
    # Acts as forwardAuth service for traefik middleware
    image: nginx:alpine
    container_name: nginx-auth
    hostname: nginx-auth
    extra_hosts: *common-hostname-aliases
    networks:
      publicnet:
        ipv4_address: ${NGINX_AUTH_IPV4_ADDRESS:-10.76.128.94}
    expose:
      - 80
    volumes:
      - ${CONFIG_PATH:-./configs}/nginx-middlewares/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${CONFIG_PATH:-./configs}/nginx-middlewares/auth:/etc/nginx/auth:ro
      - ${CONFIG_PATH:-./configs}/nginx-middlewares/cache:/var/cache/nginx
      - ${CONFIG_PATH:-./configs}/nginx-middlewares/logs:/var/log/nginx
    environment:
      <<: *common-env
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.services.nginx-auth.loadbalancer.server.port: 80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always

networks:
  publicnet:  # https://docs.docker.com/engine/network/drivers/bridge/#differences-between-user-defined-bridges-and-the-default-bridge
#    external: true  # docker network create --driver=bridge --attachable publicnet --subnet=${PUBLICNET_SUBNET:-10.76.0.0/16} --gateway=${PUBLICNET_GATEWAY:-10.76.0.1} --ip-range=${PUBLICNET_IP_RANGE:-10.76.0.0/16}
    attachable: true
    name: publicnet
    ipam:
      config:
        - subnet: ${PUBLICNET_SUBNET:-10.76.0.0/16}
          gateway: ${PUBLICNET_GATEWAY:-10.76.0.1}
          ip_range: ${PUBLICNET_IP_RANGE:-10.76.0.0/16}
  warpnet:
    driver: bridge
    ipam:
      config:
        - subnet: ${WARP_SUBNET:-172.20.0.0/16}
          gateway: ${WARP_GATEWAY_IPV4_ADDRESS:-172.20.0.1}

volumes:
  github-runner-arm64-work:
    driver: local