# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

x-common-env: &common-env
  PGID: ${PGID:-988} # 'docker' Group ID
  PUID: ${PUID:-1001} # A non-root user ID
  TZ: ${TZ:-America/Chicago} # Your Timezone

x-resource-limits: &resource-limits
  cpu_shares: 1024 # CPU share weight (relative, 2-262144). Higher = more CPU *if competing*.
  #  mem_limit: 512m        # Max RAM usage (e.g., 64m, 1g). Exceeding = container kill.
  #  mem_reservation: 325m  # Soft RAM limit (e.g., 32m, 512m).  Best effort, not guaranteed.
  #  mem_swappiness: 30      # Swap usage (0-100). 0 = off. Higher = more swap, may slow down container.
  #memswap_limit: 1024m    # Max RAM + Swap.  Usually same as mem_limit.
  labels:
    autoheal: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 1024M
#    reservations:
#     cpus: '0.05'
#    memory:  256M

x-common-deploy: &common-deploy
  placement:
    preferences:
      - spread: node.labels.worker_priority
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"
#  resources:
#    limits:
#      cpus: '0.10'
#      memory: 128M
#    reservations:
#      cpus: '0.10'
#      memory: 64M

x-cadvisor-labels: &cadvisor-labels
  traefik.enable: "true"
  traefik.http.services.cadvisor.loadbalancer.server.port: 8080

x-dozzle-labels: &dozzle-labels
  traefik.enable: "true"
  traefik.http.services.dozzle.loadbalancer.server.port: 8080

services:
  autoheal:
    # 🔹🔹 Autoheal 🔹🔹
    # Monitor and restart unhealthy docker containers.
    image: willfarrell/autoheal
    container_name: autoheal
    hostname: autoheal
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      <<: *common-env
      AUTOHEAL_CONTAINER_LABEL: ${AUTOHEAL_CONTAINER_LABEL:-all} # set to existing label name that has the value `true`
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: ${AUTOHEAL_DEFAULT_STOP_TIMEOUT:-10} # Docker waits max 10 seconds (the Docker default) for a container to stop before killing during restarts (container overridable via label, see below)
      AUTOHEAL_ONLY_MONITOR_RUNNING: ${AUTOHEAL_ONLY_MONITOR_RUNNING:-false} # All containers monitored by default. Set this to true to only monitor running containers. This will result in Paused contaners being ignored.
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL:-5} #
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD:-30}
      CURL_TIMEOUT: ${CURL_TIMEOUT:-30}
      DOCKER_SOCK: ${DOCKER_SOCK:-/var/run/docker.sock}
      WEBHOOK_URL: ""
    labels:
      autoheal.stop.timeout: 20 # Per containers override for stop timeout seconds during restart
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      replicas: 1
    restart: unless-stopped

  cadvisor:
    # 🔹🔹 Cadvisor 🔹🔹  # https://github.com/google/cadvisor
    depends_on:
      - prometheus
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    hostname: cadvisor
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    networks:
      - traefik_public
    ports:
      - ${CADVISOR_PORT:-8080}:8080
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    labels:
      <<: *cadvisor-labels
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *cadvisor-labels
    restart: unless-stopped

  deunhealth:
    # 🔹🔹 DeUnhealth 🔹🔹
    # Restart your unhealthy containers safely (e.g. containers depending on VPN and VPN reconnects)
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    environment:
      LOG_LEVEL: ${DEUNHEALTH_LOG_LEVEL:-info}
      HEALTH_SERVER_ADDRESS: ${DEUNHEALTH_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  dozzle:
    # 🔹🔹 Dozzle 🔹🔹
    image: amir20/dozzle
    container_name: dozzle
    hostname: dozzle
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    networks:
      - traefik_public
    ports:
      - ${DOZZLE_PORT:-9998}:8080
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    labels:
      <<: *dozzle-labels
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN}/
      homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dozzle-labels
    restart: unless-stopped
