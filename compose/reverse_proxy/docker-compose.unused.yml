
x-common-env: &common-env
  TZ: ${TZ:-America/Chicago} # Your Timezone
  PUID: ${PUID:-1001}
  PGID: ${PGID:-988}
  UMASK: ${UMASK:-002}

x-common-uidgid: &common-uidgid
  user: ${PUID:-1001}:${PGID:-988}

x-resource-limits: &resource-limits
  cpu_shares: 1024
  labels:
    autoheal: "true"

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 1024M

x-swarm-preferences-worker-priority: &swarm-preferences-worker-priority
  placement:
    preferences:
      - spread: node.labels.worker_priority

x-swarm-constraints-worker-only: &swarm-constraints-worker-only
  placement:
    constraints:
      - node.role == worker

x-swarm-constraints-manager-only: &swarm-constraints-manager-only
  placement:
    constraints:
      - node.role == manager

services:
#   # Optional: Caddy reverse proxy. See https://github.com/nextcloud/all-in-one/discussions/575
#   # Alternatively, use Tailscale if you don't have a domain yet. See https://github.com/nextcloud/all-in-one/discussions/5439
#   # Hint: You need to uncomment APACHE_PORT: 11000 above, adjust cloud.example.com to your domain and uncomment the necessary docker volumes at the bottom of this file in order to make it work
#   # You can find further examples here: https://github.com/nextcloud/all-in-one/discussions/588
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: caddy
    hostname: caddy
    ports:
      - ${CADDY_PORT:-80}:80
      - ${CADDY_PORT:-443}:443
    networks:
      - infranet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
      - ${CONFIG_PATH:-./configs}/caddy/config:/config
      - ${CONFIG_PATH:-./configs}/caddy/data:/data
      - ${CONFIG_PATH:-./configs}/caddy/sites:/srv
      - ${ROOT_DIR:-.}/certs/caddy:/certs
    environment:
      <<: *common-env
#      CADDY_CONTROLLER_NETWORK: <string>
#      CADDY_DOCKER_APIS_VERSION: <string>
#      CADDY_DOCKER_CADDYFILE_PATH: <string>
#      CADDY_DOCKER_CERTS_PATH: <string>
#      CADDY_DOCKER_ENVFILE: <string>
#      CADDY_DOCKER_LABEL_PREFIX: <string>
#      CADDY_DOCKER_MODE: <string>
#      CADDY_DOCKER_NO_SCOPE: <bool, default scope used>
#      CADDY_DOCKER_POLLING_INTERVAL: <duration>
#      CADDY_DOCKER_PROCESS_CADDYFILE: <bool>
#      CADDY_DOCKER_PROXY_SERVICE_TASKS: <bool>
#      CADDY_DOCKER_SCAN_STOPPED_CONTAINERS: <bool>
#      CADDY_DOCKER_SOCKETS: <string>
      CADDY_INGRESS_NETWORKS: infranet
    configs:
      - source: ${CONFIG_PATH:-./configs}/caddy/Caddyfile
        target: /etc/caddy/Caddyfile
    deploy:
      labels:
        caddy.email: ${CADDY_EMAIL:-you@example.com}
      placement:
        constraints:
          - node.role == manager
      replicas: 1
      restart_policy:
        condition: any
      resources:
        reservations:
          cpus: "0.1"
          memory: 200M
    restart: always

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager'
    container_name: nginx-proxy-manager
    hostname: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - 80:80
      - 81:81
      - 443:443
    volumes:
      - ${BASE_PATH:-.}/npm_data:/data
      - ${BASE_PATH:-.}/npm_ssl:/etc/nginx/certs
      - ${BASE_PATH:-.}/letsencrypt:/etc/letsencrypt
      - ${BASE_PATH:-.}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      <<: *common-env
      DUCKDNS_SUBDOMAIN: ${DUCKDNS_SUBDOMAIN:-yourmediaserver}
      DB_MYSQL_HOST: ${DB_MYSQL_HOST:-npm-db}
      DB_MYSQL_PORT: ${DB_MYSQL_PORT:-3306}
      DB_MYSQL_USER: ${DB_MYSQL_USER:-npm}
      DB_MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD:-npm}
      DB_MYSQL_NAME: ${DB_MYSQL_NAME:-npm}

  npm-db:
    image: 'jc21/mariadb-aria'
    container_name: npm-db
    hostname: npm-db
    volumes:
      - ${BASE_PATH:-.}/npm_data:/var/lib/mysql
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    restart: unless-stopped