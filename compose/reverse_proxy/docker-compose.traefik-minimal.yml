
# Simply set the environment variables:
# - DOMAIN
# - LETS_ENCRYPT_EMAIL
# - DUCKDNS_TOKEN
# and you're good to go.

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    hostname: traefik
    networks:
      - publicnet
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    volumes:
      - ${CERTS_PATH:-./certs}:/certs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - LETS_ENCRYPT_EMAIL=${LETS_ENCRYPT_EMAIL:?not set}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN:?not set}
    command:
      - --accesslog=true
      - --api.dashboard=true
      - --api.debug=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.asdefault=false
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.observability.accesslogs=true
      - --entrypoints.web.observability.metrics=true
      - --entrypoints.web.observability.tracing=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.asdefault=true
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN:?not set}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN:?not set}
      - --entrypoints.websecure.http.tls.certresolver=myresolver
      - --entrypoints.websecure.observability.accesslogs=true
      - --entrypoints.websecure.observability.metrics=true
      - --entrypoints.websecure.observability.tracing=true
      - --certificatesresolvers.myresolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.myresolver.acme.dnschallenge.provider=duckdns
      - --certificatesresolvers.myresolver.acme.dnschallenge=true
      - --certificatesresolvers.myresolver.acme.tlsChallenge=true
      - --log.level=INFO
      - --providers.docker.defaultrule=Host(`{{ .ContainerName }}.${DOMAIN:?not set}`)
      - --providers.docker=true
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: Host(`traefik.${DOMAIN:?not set}`)
      traefik.http.services.traefik.loadbalancer.server.port: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080 > /dev/null || exit 1"]
      start_period: 20s
      timeout: 15s
      interval: 30s
    restart: always

networks:
  publicnet:
    driver: bridge
