  mediafusion-nginx-config:
    content: |
      user  nginx;
      worker_processes  1;

      events {
          worker_connections  1024;
      }

      http {
          include       mime.types;
          default_type  application/octet-stream;
          sendfile        on;
          keepalive_timeout  65;

          server {
              listen 443 ssl;
              server_name mediafusion.local;

              ssl_certificate     /etc/ssl/certs/mediafusion.local.pem;
              ssl_certificate_key /etc/ssl/private/mediafusion.local-key.pem;

              ssl_session_cache   shared:SSL:10m;
              ssl_session_timeout 10m;

              location / {
                  proxy_pass ${MEDIAFUSION_INTERNAL_URL:-http://mediafusion:8000};
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
          }
      }
  nginx-proxy-config.conf:
    content: |
      # Custom nginx configuration for nginx-proxy
      client_max_body_size 100m;
      proxy_connect_timeout 600s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      proxy_buffering off;
      proxy_request_buffering off;
      # Enable gzip compression
      gzip on;
      gzip_vary on;
      gzip_min_length 1024;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
      # Security headers
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  setup-prowlarr-indexers.sh:
    content: |
      #!/bin/bash

      # Ensure the script exits on failure
      set -e

      # Ensure the script is run from the correct directory
      cd "$$(dirname "$$0")"

      # Set the repo root directory
      REPO_ROOT="$$(pwd)/../.."

      # Load the environment variables
      source "$$REPO_ROOT/.env"

      # Ensure the required environment variables are set
      PROWLARR_API_KEY=${PROWLARR_API_KEY:?}
      if [[ -z "$$PROWLARR_API_KEY" ]]; then
        echo "PROWLARR_API_KEY is not set. Please set it in the .env file."
        exit 1
      fi

      # Function to handle curl requests
      handle_curl() {
        skip_on_failure=$$1
        shift
        response=$$(curl -s -o response.txt -w "%{http_code}" "$$@")
        if [[ $$response -ge 200 && $$response -lt 300 ]]; then
          rm response.txt
        else
          echo "Request failed with status code $$response"
          cat response.txt
          rm response.txt
          if [[ "$$skip_on_failure" != "true" ]]; then
            exit 1
          fi
        fi
      }

      # Wait for Prowlarr to be ready
      echo "Waiting for Prowlarr to be ready..."
      until curl -s -o /dev/null -w "%{http_code}" -H "X-API-KEY: $$PROWLARR_API_KEY" http://127.0.0.1:9696/api/v1/health | grep -q '^2'; do
        sleep 5
      done

      # Create tag "flaresolverr"
      handle_curl true -X POST -H 'Content-Type: application/json' -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw '{"label":"flaresolverr"}' 'http://127.0.0.1:9696/api/v1/tag'

      # Create FlareSolverr proxy using the JSON file
      PROXY_DATA=$$(cat "$$REPO_ROOT/resources/json/prowlarr_indexer_proxy.json")
      PROXY_DATA=$$(echo "$$PROXY_DATA" | sed "s#\\\$$FLARESOLVERR_HOST#$$FLARESOLVERR_HOST#g")
      handle_curl true -X POST -H 'Content-Type: application/json' -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw "$$PROXY_DATA" 'http://127.0.0.1:9696/api/v1/indexerProxy?'

      # Configure indexers using the JSON file
      INDEXERS=$$(jq -c '.[]' "$$REPO_ROOT/resources/json/prowlarr-indexers.json")
      echo "$$INDEXERS" | while read -r indexer; do
        indexer_name=$$(echo "$$indexer" | jq -r '.name')
        echo "Adding indexer named: $$indexer_name"

        # Check for cardigannCaptcha field
        if echo "$$indexer" | jq -e '.fields[] | select(.name == "cardigannCaptcha")' > /dev/null; then
          echo "Indexer $$indexer_name requires captcha"
          handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" -d "$$indexer" "http://127.0.0.1:9696/api/v1/indexer"
          handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw "$$indexer" "http://127.0.0.1:9696/api/v1/indexer/action/checkCaptcha"
        fi

        handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" -d "$$indexer" "http://127.0.0.1:9696/api/v1/indexer"
      done

      echo "Indexers setup complete."
  prowlarr_indexer_proxy.json:
    content: |
      {
        "onHealthIssue": false,
        "supportsOnHealthIssue": false,
        "includeHealthWarnings": false,
        "name": "FlareSolverr",
        "fields": [
          {
            "name": "host",
            "value": "${FLARESOLVERR_INTERNAL_URL:-http://flaresolverr:8191}"
          },
          {
            "name": "requestTimeout",
            "value": 60
          }
        ],
        "implementationName": "FlareSolverr",
        "implementation": "FlareSolverr",
        "configContract": "FlareSolverrSettings",
        "infoLink": "https://wiki.servarr.com/prowlarr/supported#flaresolverr",
        "tags": [
          1
        ]
      }

  setup-prowlarr.sh:
    content: |
      #!/bin/bash

      # Ensure the script exits on failure
      set -e

      # Ensure the script is run from the correct directory
      cd "$$(dirname "$$0")"

      # Set the repo root directory
      REPO_ROOT="$$(pwd)/../.."

      # Generate PROWLARR_API_KEY and add to .env file
      PROWLARR_API_KEY=${PROWLARR_API_KEY:-$$(openssl rand -hex 16)}
      echo "PROWLARR_API_KEY=" >> .env

      # Stop & delete Prowlarr container if it's running
      docker compose rm -sf prowlarr

      # delete the volume if it exists
      docker volume rm -f docker-compose_prowlarr-config

      # Ensure the volume is available
      docker volume create docker-compose_prowlarr-config

      # Copy the configuration file to the volume
      docker run --rm -v "$$REPO_ROOT/resources/xml/prowlarr-config.xml:/prowlarr-config/config.xml" -v docker-compose_prowlarr-config:/config alpine /bin/sh -c "
        cp /prowlarr-config/config.xml /config/config.xml;
        sed -i 's/\$${PROWLARR_API_KEY}/'"$${PROWLARR_API_KEY}"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_USER}/'"$$PROWLARR__POSTGRES_USER"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_PASSWORD}/'"$$PROWLARR__POSTGRES_PASSWORD"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_PORT}/'"$$PROWLARR__POSTGRES_PORT"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_HOST}/'"$$PROWLARR__POSTGRES_HOST"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_MAIN_DB}/'"$$PROWLARR__POSTGRES_MAIN_DB"'/g' /config/config.xml;
        sed -i 's/\$${PROWLARR__POSTGRES_LOG_DB}/'"$$PROWLARR__POSTGRES_LOG_DB"'/g' /config/config.xml;
        chmod 664 /config/config.xml;
        echo 'Prowlarr config setup complete.';
      "

      # pull the latest images
      docker compose pull prowlarr flaresolverr

      # Start Prowlarr and FlareSolverr containers
      docker compose up -d prowlarr flaresolverr

      # Function to handle curl requests
      handle_curl() {
        skip_on_failure=$$1
        shift
        response=$$(curl -s -o response.txt -w "%{http_code}" "$@")
        if [[ $$response -ge 200 && $$response -lt 300 ]]; then
          rm response.txt
        else
          echo "Request failed with status code $$response"
          cat response.txt
          rm response.txt
          if [[ "$$skip_on_failure" != "true" ]]; then
            exit 1
          fi
        fi
      }

      # Wait for Prowlarr to be ready
      echo "Waiting for Prowlarr to be ready..."
      until curl -s -o /dev/null -w "%{http_code}" -H "X-API-KEY: $$PROWLARR_API_KEY" http://127.0.0.1:9696/api/v1/health | grep -q '^2'; do
        sleep 5
      done

      # Create tag "flaresolverr"
      handle_curl false -X POST -H 'Content-Type: application/json' -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw '{"label":"flaresolverr"}' 'http://127.0.0.1:9696/api/v1/tag'

      # Create FlareSolverr proxy using the JSON file
      PROXY_DATA=$(cat "$$REPO_ROOT/resources/json/prowlarr_indexer_proxy.json")
      PROXY_DATA=$(echo "$$PROXY_DATA" | sed "s#\\\${FLARESOLVERR_HOST}#${FLARESOLVERR_HOST}#g")
      handle_curl false -X POST -H 'Content-Type: application/json' -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw "$PROXY_DATA" 'http://127.0.0.1:9696/api/v1/indexerProxy?'

      # Configure indexers using the JSON file
      INDEXERS=$$(jq -c '.[]' "$REPO_ROOT/resources/json/prowlarr-indexers.json")
      echo "$$INDEXERS" | while read -r indexer; do
        indexer_name=$$(echo "$$indexer" | jq -r '.name')
        echo "Adding indexer named: $$indexer_name"

        # Check for cardigannCaptcha field
        if echo "$$indexer" | jq -e '.fields[] | select(.name == "cardigannCaptcha")' > /dev/null; then
          echo "Indexer $$indexer_name requires captcha"
          handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" -d "$$indexer" "http://127.0.0.1:9696/api/v1/indexer"
          handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" --data-raw "$$indexer" "http://127.0.0.1:9696/api/v1/indexer/action/checkCaptcha"
        fi

        handle_curl true -X POST -H "Content-Type: application/json" -H "X-API-KEY: $$PROWLARR_API_KEY" -d "$$indexer" "http://127.0.0.1:9696/api/v1/indexer"
      done

      echo "Indexers setup complete."

services:

  stremio:
    # 🔹🔹 Stremio 🔹🔹
    # Stream Movies/TV over debrid instantly.
    image: ghcr.io/tsaridas/stremio-docker:main
    container_name: stremio
    hostname: stremio
    networks:
      publicnet: {}
      warp-network:
        gw_priority: 1
    ports:
      - 12470:12470/tcp
    volumes:
      - ${CONFIG_PATH:-./configs}/stremio/root/.stremio-server:/root/.stremio-server
    #  - ${SRC_PATH:-./src}/stremio-docker/build:/srv/stremio-server/build
    environment:
      IPADDRESS: 127.0.0.1
      AUTO_SERVER_URL: 1
      SERVER_URL: https://stremio.${DOMAIN}/
      #WEBUI_LOCATION: https://stremio-web.${DOMAIN}/shell/
      WEBUI_LOCATION: https://stremio-web.${DOMAIN}/shell/
      NO_CORS: 0
      CASTING_DISABLED: 0
    labels:
      traefik.enable: "true"
      traefik.docker.network: publicnet
      traefik.http.routers.stremio-web.service: stremio-web
      traefik.http.routers.stremio-web.rule: "Host(`stremio-web.${DOMAIN}`) || Host(`stremio-web.${TS_HOSTNAME}.${DOMAIN}`)"
      traefik.http.routers.stremio-web.priority: 10
      traefik.http.services.stremio-web.loadbalancer.server.scheme: https
      traefik.http.services.stremio-web.loadbalancer.server.port: 8080
      # Stremio HTTPS Streaming Server (port 12470)
      traefik.http.routers.stremio-https-server.service: stremio-https-server
      traefik.http.routers.stremio-https-server.rule: 'Host(`stremio.${DOMAIN}`) || Host(`stremio.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.routers.stremio-https-server.priority: 100
      traefik.http.services.stremio-https-server.loadbalancer.server.scheme: https
      traefik.http.services.stremio-https-server.loadbalancer.server.port: 12470
      homepage.group: Media Streaming Platforms
      homepage.name: Stremio
      homepage.icon: stremio.png
      homepage.href: https://stremio.${DOMAIN}/
      homepage.description: A one-stop hub for video content aggregation, allowing you to stream movies, series, and more from various sources.
    healthcheck:
      test: ["CMD-SHELL", "(curl -fs http://127.0.0.1:11470 > /dev/null 2>&1 || curl -fs https://127.0.0.1:12470 > /dev/null 2>&1) || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1m30s
    cpu_shares: 10  # potentially should be 1
    mem_reservation: 256M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 256M
        limits:
          cpus: 2
          memory: 2G
    restart: always
  flaresolverr:
    # 🔹🔹 Flaresolverr 🔹🔹  # https://github.com/flaresolverr/flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    #image: ghcr.io/thephaseless/byparr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - publicnet
    expose:
      - ${FLARESOLVERR_PORT:-8191}
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-988}
      UMASK: ${UMASK:-002}
      # FlareSolverr Environment Variables
      LOG_LEVEL: debug  # Verbosity of the logging. Use LOG_LEVEL=debug for more information.
      LOG_HTML: "false"  # Only for debugging. If true all HTML that passes through the proxy will be logged to the console in debug level.
      CAPTCHA_SOLVER: none  # Captcha solving method. It is used when a captcha is encountered.  Note: none of the captcha solvers work with the current version of Flaresolverr.
      PORT: ${FLARESOLVERR_PORT:-8191}  # Listening port.
      HOST: 0.0.0.0  # Listening interface.
      HEADLESS: ${FLARESOLVERR_HEADLESS:-true}  # Only for debugging. To run the web browser in headless mode or visible.
      BROWSER_TIMEOUT: ${FLARESOLVERR_BROWSER_TIMEOUT:-120000}  # If you are experiencing errors/timeouts because your system is slow, you can try to increase this value.
      TEST_URL: ${FLARESOLVERR_TEST_URL:-https://www.google.com}  # FlareSolverr makes a request on start to make sure the web browser is working.
      PROMETHEUS_ENABLED: ${FLARESOLVERR_PROMETHEUS_ENABLED:-true}  # Enable Prometheus exporter
      PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}  # Listening port for Prometheus exporter
    labels:
      traefik.enable: true
      traefik.http.routers.flaresolverr.middlewares: nginx-auth@docker
      traefik.http.routers.flaresolverr.rule: 'Host(`flaresolverr.${DOMAIN}`) || Host(`flaresolverr.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.flaresolverr.loadbalancer.server.port: ${FLARESOLVERR_PORT:-8191}
      homepage.group: Infrastructure
      homepage.name: Flaresolverr
      homepage.icon: flaresolverr.png
      homepage.href: https://flaresolverr.${DOMAIN}/
      homepage.description: Headless anti-bot proxy to bypass Cloudflare/JS challenges for indexers and scrapers
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:${FLARESOLVERR_PORT:-8191}/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    cpus: 0.6
    mem_reservation: 64M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 64M
        limits:
          cpus: 0.6
          memory: 1G
    restart: always
  jackett:
    # 🔹🔹 Jackett 🔹🔹
    depends_on:
      flaresolverr:
        condition: service_healthy
    image: docker.io/linuxserver/jackett
    container_name: jackett
    hostname: jackett
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      publicnet: {}
      warp-network:
        gw_priority: 1
    volumes:
      - ${CONFIG_PATH:-./configs}/jackett/config:/config
      - /mnt/remote/blackhole:/blackhole
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1001}
      PGID: ${PGID:-988}
      UMASK: ${UMASK:-002}
      AUTO_UPDATE: ${JACKETT_AUTO_UPDATE:-true}
      RUN_OPTS: "${JACKETT_RUN_OPTS:-}"
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    labels:
      traefik.enable: true
      traefik.docker.network: publicnet
      traefik.http.routers.jackett.rule: 'Host(`jackett.${DOMAIN}`) || Host(`jackett.${TS_HOSTNAME}.${DOMAIN}`)'
      traefik.http.services.jackett.loadbalancer.server.port: 9117
      homepage.group: Source Aggregator
      homepage.name: Jackett Indexer
      homepage.icon: jackett.png
      homepage.href: https://jackett.${DOMAIN}/
      homepage.description: Connects your download applications with various source providers and indexers, making it easier to find and download content through your download clients.
      homepage.weight: 1
      homepage.widget.type: jackett
      homepage.widget.url: ${JACKETT_INTERNAL_URL:-http://jackett:9117}
      homepage.widget.key: ${JACKETT_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:9117/api/v2.0/indexers/all/results/torznab?t=indexers&apikey=${JACKETT_API_KEY} > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
    cpu_shares: 10
    mem_reservation: 128M
    deploy:
      resources:
        reservations:
          cpus: 0
          memory: 128M
        limits:
          cpus: 1
          memory: 1024M
    restart: always
