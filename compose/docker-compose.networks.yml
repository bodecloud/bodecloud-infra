  gluetun-premiumize-us:  # United States, P2P NOT ALLOWED.
    # 🔹🔹 Gluetun 🔹🔹  # https://github.com/qdm12/gluetun
    # Gluetun is a VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun-premiumize-us
    hostname: gluetun-premiumize-us
    extra_hosts: *gluetun-hosts-workaround
    networks:
      publicnet:
        ipv4_address: ${GLUETUN_PREMIUMIZE_US_IPV4_ADDRESS:-10.76.128.98}
    expose:
      - 8001  # Gluetun WebUI
      - 9999  # Gluetun Health Check
      - 1056  # Tailscale SOCKS5
      - 8886  # Tailscale HTTP Proxy
      - 41642  # Tailscale Health Check
    cap_add:
      - NET_ADMIN
    environment:
      <<: *common-env
      # VPN provider to use.
      VPN_SERVICE_PROVIDER: "custom"
      OPENVPN_CUSTOM_CONFIG: /etc/openvpn/target.ovpn
      OPENVPN_CIPHERS: "AES-256-CBC"
      OPENVPN_FLAGS: --auth-user-pass /config/auth.conf
      BLOCK_ADS: "on"  # Uses ads hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_MALICIOUS: "on"  # Uses malicious hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_SURVEILLANCE: "on"  # Uses surveillance hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      DNS_ADDRESS: "127.0.0.1"  # IP address to use as DNS resolver. It defaults to localhost to use the DNS over TLS Unbound server. Tip: use 127.0.0.11 to use the Docker DNS server.
      DOT_IPV6: "off"  # DNS IPv6 resolution
      # firewall references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/routing.md
      FIREWALL_OUTBOUND_SUBNETS: "10.76.0.0/16,172.17.0.0/16,100.72.149.123/32"  # Comma separated subnets that Gluetun and the containers sharing its network stack are allowed to access. This involves firewall and routing modifications.
      OPENVPN_IPV6: "off"  # Enable/disable IPv6
      VERSION_INFORMATION: "on"  # Logs a message indicating if a newer version is available once the VPN is connected
      VPN_TYPE: "openvpn"  # VPN type to use, only two choices available: `openvpn` and `wireguard`
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${CONFIG_PATH:-./configs}/gluetun/auth:/gluetun/auth
      - ${CONFIG_PATH:-./configs}/gluetun/premiumize/us/etc/openvpn:/etc/openvpn
      - ${CONFIG_PATH:-./configs}/gluetun/premiumize/gluetun:/gluetun
      - ${CONFIG_PATH:-./configs}/gluetun/premiumize/config:/config
    labels:
      deunhealth.restart.on.unhealthy: "true"
    restart: always

