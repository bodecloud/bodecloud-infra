services:
  gluetun-airvpn:
    # 🔹🔹 Gluetun 🔹🔹  # https://github.com/qdm12/gluetun
    # Gluetun is a VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun-airvpn
    hostname: gluetun-airvpn
    extra_hosts: *gluetun-hosts-workaround
    networks:
      publicnet:
        ipv4_address: ${GLUETUN_AIRVPN_IPV4_ADDRESS:-10.76.89.128}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    expose:
      - 8000  # Gluetun WebUI
      - 9999  # Gluetun Health Check
      - 1055  # Tailscale SOCKS5
      - 8885  # Tailscale HTTP Proxy
      - 41641  # Tailscale Health Check
    devices:
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/tun.md
      - "${GLUETUN_AIRVPN_TUN_DEVICE:-/dev/net/tun}:/dev/net/tun"
    volumes:
      - ${CONFIG_PATH:-./configs}/gluetun/auth:/gluetun/auth
      - ${CONFIG_PATH:-./configs}/gluetun/airvpn:/gluetun
    environment:
      <<: *common-env
      OPENVPN_CIPHERS: aes-256-gcm
      FIREWALL_VPN_INPUT_PORTS: 20027,23936,36175,42162,52065
      SERVER_COUNTRIES: Austria,Belgium,Brazil,Bulgaria,Canada,Czech Republic,Estonia,Germany,Ireland,Japan,Latvia,Netherlands,New Zealand,Norway,Romania,Serbia,Singapore,Spain,Sweden,Switzerland,United Kingdom,United States,China,Isle of Man
      VPN_SERVICE_PROVIDER: airvpn
      BLOCK_ADS: on
      BLOCK_MALICIOUS: on
      BLOCK_SURVEILLANCE: on
      STORAGE_FILEPATH: /gluetun/servers.json
      FIREWALL_OUTBOUND_SUBNETS: 10.76.0.0/16,172.16.0.0/16,100.64.0.0/10
      HEALTH_SERVER_ADDRESS: 127.0.0.1:9999
      HEALTH_SUCCESS_WAIT_DURATION: 5s
      HEALTH_TARGET_ADDRESS: cloudflare.com:443
      HEALTH_VPN_DURATION_ADDITION: 5s
      HEALTH_VPN_DURATION_INITIAL: 6s
      #HTTP_CONTROL_SERVER_ADDRESS: :8000
      #HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: /gluetun/auth/config.toml
      #HTTP_CONTROL_SERVER_LOG: on
      OPENVPN_IPV6: off
      VERSION_INFORMATION: on
      VPN_TYPE: openvpn
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  tailscale-airvpn:
    depends_on:
      gluetun-airvpn:
        condition: service_healthy
    image: tailscale/tailscale
    container_name: tailscale-airvpn
    network_mode: service:gluetun-airvpn
    devices:
      - ${GLUETUN_AIRVPN_TUN_DEVICE:-/dev/net/tun}:/dev/net/tun
    volumes:
      - ${CONFIG_PATH:-./configs}/tailscale/airvpn/volumes/var/lib/tailscale:/var/lib/tailscale
      - ${CONFIG_PATH:-./configs}/tailscale/airvpn/volumes/tmp:/tmp
    environment:
      <<: *common-env
      TS_ACCEPT_DNS: "false"  # Accept DNS configuration from the admin console. Not accepted by default.
      TS_AUTH_ONCE: "true"  # Attempt to log in only if not already logged in. False by default, to forcibly log in every time the container starts.
      TS_AUTHKEY: ${TS_AUTHKEY:?not set}  # An auth key used to authenticate the container. This is equivalent to what you'd pass to tailscale login --auth-key=.
#      TS_DEST_IP: ${TS_DEST_IP:-}  # Proxy all incoming Tailscale traffic to the specified destination IP.
      TS_ENABLE_HEALTH_CHECK: "true"  # Set to true to enable an unauthenticated /healthz endpoint at the address specified by TS_LOCAL_ADDR_PORT.
      TS_ENABLE_METRICS: "true"  # Set to true to enable an unauthenticated /metrics endpoint at the address specified by TS_LOCAL_ADDR_PORT.
      TS_HOSTNAME: tailscale-airvpn-${TS_HOSTNAME}-docker  # Use the specified hostname for the node. This is equivalent to tailscale set --hostname=.
#      TS_KUBE_SECRET: ${TS_KUBE_SECRET:-}  # If running in Kubernetes, the Kubernetes secret name where Tailscale state is stored. The default is tailscale.
      TS_LOCAL_ADDR_PORT: "0.0.0.0:41641"  # Specifies the [<addr>]:<port> on which to serve local metrics and health check HTTP endpoints if enabled through TS_ENABLE_METRICS or TS_ENABLE_HEALTH_CHECK.
      TS_OUTBOUND_HTTP_PROXY_LISTEN: "0.0.0.0:8885"  # Set an address and port for the HTTP proxy. This will be passed to tailscaled --outbound-http-proxy-listen=.
      TS_ROUTES: "${TS_ROUTES:-${PUBLICNET_SUBNET:-10.76.0.0/16},172.17.0.0/16,${TAILSCALE_CIDR:-100.64.0.0/10}}"  # Advertise subnet routes. This is equivalent to tailscale set --advertise-routes=.
#      TS_SERVE_CONFIG: ${TS_SERVE_CONFIG:-}  # Accepts a JSON file to programmatically configure Serve and Funnel functionality.
      TS_SOCKET: "/tmp/tailscaled.sock"  # Unix socket path used by the Tailscale binary, where the tailscaled LocalAPI socket is created.
      TS_SOCKS5_SERVER: ":1055"  # Set an address and port for the SOCKS5 proxy. This will be passed to tailscaled --socks5-server=.
      TS_STATE_DIR: "/var/lib/tailscale"  # Directory where the state of tailscaled is stored. This needs to persist across container restarts.
      TS_EXTRA_ARGS: "--accept-routes --advertise-exit-node"  # Any other flags to pass in to the Tailscale CLI in a tailscale up command.
#      TS_TAILSCALED_EXTRA_ARGS: ${TS_TAILSCALED_EXTRA_ARGS:-}  # Any other flags to pass in to tailscaled.
      TS_USERSPACE: "true"  # Enable userspace networking, instead of kernel networking. Enabled by default.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:41641/healthz > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
