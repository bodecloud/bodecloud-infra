      - ${ROOT_DIR:-.}/configs/jellyseerr/config:/app/config
    environment:
      <<: *common-env
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    labels:
      <<: *jellyseerr-labels
      homepage.group: Media Requests
      homepage.name: Jellyseerr Requests
      homepage.icon: jellyseerr.png
      homepage.href: https://jellyseerr.${DOMAIN}/
      homepage.description: Allows you and others to request new movies and TV shows to be added to your Jellyfin media server.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *jellyseerr-labels
    restart: unless-stopped

  lidarr-exporter:
    # 🔹🔹 Lidarr Exporter 🔹🔹  # https://github.com/onedr0p/exportarr
    # Lidarr metrics for Prometheus
    # use this one with arm:
    # image: ghcr.io/onedr0p/exportarr:master@sha256:22bc953901430c69d4b489fe071b16c9eba9d80ed1963e1c5bf2d08e11b4e70a
    image: ghcr.io/onedr0p/exportarr
    container_name: lidarr-exporter
    hostname: lidarr-exporter
    networks:
      - infranet
    security_opt:
      - no-new-privileges:true
    ports:
      - ${LIDARR_EXPORTER_PORT:-9709}:${LIDARR_EXPORTER_PORT:-9709}
    environment:
      <<: *common-env
      APIKEY: ${LIDARR_API_KEY}
      ENABLE_ADDITIONAL_METRICS: ${LIDARR_EXPORTER_ENABLE_ADDITIONAL_METRICS:-true}
      PORT: ${LIDARR_EXPORTER_PORT:-9709}
      URL: https://lidarr.${DOMAIN}
    command: ["lidarr"]
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  radarr-exporter:
    # 🔹🔹 Radarr Exporter 🔹🔹  # https://github.com/onedr0p/exportarr
    # Radarr metrics for Prometheus
    # use this one with arm:
    # image: ghcr.io/onedr0p/exportarr:master@sha256:22bc953901430c69d4b489fe071b16c9eba9d80ed1963e1c5bf2d08e11b4e70a
