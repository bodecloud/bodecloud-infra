  homeassistant:
    # 🔹🔹 Home Assistant 🔹🔹  # https://github.com/home-assistant/home-assistant
    # Home Assistant is a home automation platform that allows you to control your home from your phone or computer.
    image: ghcr.io/home-assistant/home-assistant:stable
