    image: adrienpoupa/rclone-backup
    container_name: homeassistant-backup
    hostname: homeassistant-backup
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    volumes:
      - ${ROOT_DIR:-.}/configs/homeassistant/backups:/backups
      - ${ROOT_DIR:-.}/configs/homeassistant/backup:/config
    environment:
      <<: *common-env
      BACKUP_FOLDER_NAME: ${BACKUP_FOLDER_NAME:-backups}
      BACKUP_FOLDER_PATH: ${BACKUP_FOLDER_PATH:-/backups}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  mosquitto: 
    # 🔹🔹 Mosquitto 🔹🔹
    image: eclipse-mosquitto
    container_name: mosquitto
    hostname: mosquitto
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    volumes:
      - ${ROOT_DIR:-.}/configs/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ${ROOT_DIR:-.}/configs/mosquitto/data:/mosquitto/data
      - ${ROOT_DIR:-.}/configs/mosquitto/log:/mosquitto/log
    ports:
      - ${MOSQUITTO_PORT:-1883}:1883
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  speedtest:
    # 🔹🔹 Speedtest 🔹🔹
    image: linuxserver/speedtest-tracker
    container_name: speedtest
    hostname: speedtest
    networks:
      - infranet
    ports:
      - ${SPEEDTEST_TRACKER_PORT:-8765}:80
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/speedtest-tracker/config:/config
      - ${ROOT_DIR:-.}/certs/speedtest-tracker/keys:/config/keys
    <<: *resource-limits
    secrets:
      - speedtest_admin_password
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL} # Email of the initial admin user. Note: Only effective during initial setup.
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME} # Name of the initial admin user. Note: Only effective during initial setup.
      ADMIN_PASSWORD: /run/secrets/speedtest_admin_password # Password of the initial admin user. Note: Only effective during initial setup.
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60} # Number of requests per minute to the API. Default: 60
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY} # Key used to encrypt and decrypt data. You can generate a key at https://speedtest-tracker.dev.
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker} # Used to define the application's name in the dashboard and in notifications.
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}} # Application timezone should be set if your database does not use UTC as its  timezone.
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-} # URL used for links in emails and notifications.
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-} # URL used for assets, needed when using a reverse proxy.
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true} # Begin the dashboard axis charts at zero. Default: true
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i} # Set the formatting of timestamps in charts.
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl} # Width of the content section of each page. Can be set to any value found in the Filament docs. Default: 7xl
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s} # Set the formatting of timestamps in tables and notifications.
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}} # Display timestamps in your local time.
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0} # Set the value to greater than zero to prune stored results. This value should be represented in days.
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true} # Enables the public dashboard for guest (unauthenticated) users. Default: false
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-} # Comma separated list of server IDs that should not be used when running speedtests.
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-} # Set the network interface to use for the test. This need to be the network interface available inside the container
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-6 */2 * * *} # Cron expression used to run speedtests on a scheduled basis.
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-} # Comma separated list of server IDs to randomly use for speedtest.
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-} # A comma separated list of public IP addresses where tests will be skipped when present.
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900} # Set the Download Threshold. Note: Only effective during initial setup.
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true} # Enable the thresholds. Note: Only effective during initial setup.
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25} # Set the Ping Threshold. Note: Only effective during initial setup.
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900} # Set the Upload Threshold. Note: Only effective during initial setup.
    labels:
      <<: *speedtest-labels
      homepage.group: Network Monitoring
      homepage.name: Speedtest
      homepage.icon: speedtest.png
      homepage.href: https://speedtest.${DOMAIN}
      homepage.description: Regularly tests your internet speed and tracks performance over time, helping you monitor your connection quality.
      homepage.widget.type: speedtest
      homepage.widget.url: https://speedtest.${DOMAIN}
      homepage.widget.fields: '["download", "upload", "ping", "speedtest"]'
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *speedtest-labels
    healthcheck:
      test: curl -fSs http://localhost:80 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
    restart: unless-stopped

  # Multiple DNS challenge provider are not supported with Traefik,
  # but you can use CNAME to handle that. For example, if you have example.org (account foo) and
  # example.com (account bar) you can create a CNAME on example.org called _acme-challenge.example.org
  # pointing to challenge.example.com. This way, you can obtain certificates for example.org with the bar account.
  traefik:
    # 🔹🔹 Traefik 🔹🔹
    image: traefik
    container_name: traefik
    hostname: traefik
    networks:
      - infranet
    ports:
      # Listen on port 80, default for HTTP, necessary to redirect to HTTPS
      - ${TRAEFIK_WEB_PORT:-80}:${TRAEFIK_WEB_PORT:-80}
      # Listen on port 443, default for HTTPS
      - ${TRAEFIK_WEBSECURE_PORT:-443}:${TRAEFIK_WEBSECURE_PORT:-443}
      # Listen on port 8099, default for the Traefik API and Dashboard
      - ${TRAEFIK_DASHBOARD_PORT:-8099}:${TRAEFIK_DASHBOARD_PORT:-8099}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ${ROOT_DIR:-.}/configs/traefik/config:/config
      - ${ROOT_DIR:-.}/configs/traefik/config:/etc/traefik
      - ${ROOT_DIR:-.}/certs:/certs
    #      - /etc/localtime:/etc/localtime:ro
    <<: [*common-uidgid, *common-logging, *resource-limits]
    secrets:
      - cloudflare_dns_api_token
      - cloudflare_zone_api_token
      - traefik_acme_eab_hmacencoded
      - traefik_acme_eab_kid
    environment:
      <<: *common-env
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: /run/secrets/cloudflare_dns_api_token
      CLOUDFLARE_ZONE_API_TOKEN: /run/secrets/cloudflare_zone_api_token
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL:-} # Email address used for Letsencrypt registration.
      # CNAME are supported (and sometimes even encouraged), but there are a few cases where they can be problematic.
      # If needed, CNAME support can be disabled with the following environment variable:
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false} # Disable CNAME support for DNS challenges. (Default: false)
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-} # ZeroSSL API key.
    # Note: The environment variable names can be suffixed by _FILE to reference a file instead of a value
    command:
      - --accesslog=${TRAEFIK_ACCESSLOG:-true} # Enable the access log, with HTTP requests
      - --api=${TRAEFIK_API:-true} # Enable api/dashboard. When set to true, its sub option api.dashboard is also set to true.
      - --api.dashboard=${TRAEFIK_API_DASHBOARD:-true} # Enable dashboard (: false)
      - --api.debug=${TRAEFIK_API_DEBUG:-true} # Enable additional endpoints for debugging and profiling (: false)
      - --api.disabledashboardad=${TRAEFIK_API_DISABLEDASHBOARDAD:-true} # Disable the advertisement from the dashboard (: false)
      - --api.insecure=${TRAEFIK_API_INSECURE:-true} # Enable the API and the dashboard on the entryPoint named traefik (: false)
      - --entrypoints.web.address=${TRAEFIK_ENTRYPOINTS_WEB_ADDRESS:-":80"}
      - --entrypoints.web.asdefault=${TRAEFIK_ENTRYPOINTS_WEB_AS_DEFAULT:-false} # Adds this EntryPoint to the list of  EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.web.http.redirections.entrypoint.scheme=https # The redirection target scheme (optional, : https)
      - --entrypoints.web.http.redirections.entrypoint.to=websecure # The redirection target entry point.
      - --entrypoints.web.observability.accesslogs=${TRAEFIK_ENTRYPOINTS_WEB_OBSERVABILITY_ACCESSLOGS:-true}
      - --entrypoints.web.observability.metrics=${TRAEFIK_ENTRYPOINTS_WEB_OBSERVABILITY_METRICS:-true}
      - --entrypoints.web.observability.tracing=${TRAEFIK_ENTRYPOINTS_WEB_OBSERVABILITY_TRACING:-false}
      - --entrypoints.websecure.address=${TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS:-":443"}
      - --entrypoints.websecure.asdefault=${TRAEFIK_ENTRYPOINTS_WEBSECURE_AS_DEFAULT:-true} # Adds this EntryPoint to the list of  EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.websecure.http.tls.certresolver=myresolver
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}
      - --entrypoints.websecure.http.tls=${TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS:-true}
#      - --certificatesresolvers.myresolver.acme.caserver=${ACME_RESOLVER_CASERVER:-https://acme-staging-v02.api.letsencrypt.org/directory} # Let's Encrypt has a limit: 5 certs generated a week. Use staging when breaking things. See https://doc.traefik.io/traefik/https/acme/#caserver
      - --certificatesresolvers.myresolver.acme.caserver=${ACME_RESOLVER_CASERVER:-https://acme.zerossl.com/v2/DV90} # Let's Encrypt has a limit: 5 certs generated a week. Use staging when breaking things (specifically https://acme-staging-v02.api.letsencrypt.org/directory). see https://doc.traefik.io/traefik/https/acme/#caserver
      - --certificatesresolvers.myresolver.acme.certificatesDuration=${TRAEFIK_ACME_RESOLVER_CERTIFICATES_DURATION:-2160} # The certificates' duration in hours, exclusively used to determine renewal dates. (Default: 2160)
      - --certificatesresolvers.myresolver.acme.dnschallenge=${TRAEFIK_ACME_RESOLVER_DNS_CHALLENGE:-true} # Use the DNS challenges instead of HTTP/TLS challenges. (Default: false)
      - --certificatesresolvers.myresolver.acme.dnschallenge.delaybeforecheck=${TRAEFIK_ACME_RESOLVER_DNS_CHALLENGE_DELAY_BEFORE_CHECK:-60} # The delay before checking for DNS propagation. (Default: 0)
      - --certificatesresolvers.myresolver.acme.dnschallenge.provider=${TRAEFIK_ACME_RESOLVER_DNS_CHALLENGE_PROVIDER:-cloudflare}
      - --certificatesresolvers.myresolver.acme.eab.hmacencoded=/run/secrets/traefik_acme_eab_hmacencoded # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Base64 encoded HMAC key from External CA.
      - --certificatesresolvers.myresolver.acme.eab.kid=/run/secrets/traefik_acme_eab_kid # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Key identifier from External CA.
      - --certificatesresolvers.myresolver.acme.email=${ACME_RESOLVER_EMAIL} # Email address used for registration.
      - --certificatesresolvers.myresolver.acme.httpChallenge=${TRAEFIK_ACME_RESOLVER_HTTP_CHALLENGE:-true} # Activate HTTP-01 Challenge. (Default: false)
      - --certificatesresolvers.myresolver.acme.httpChallenge.entryPoint=web
      - --certificatesresolvers.myresolver.acme.storage=${TRAEFIK_ACME_RESOLVER_STORAGE:-/certs/acme.json} # Storage to use. (Default: /certs/acme.json)
      - --certificatesresolvers.myresolver.acme.tlsChallenge=${TRAEFIK_ACME_RESOLVER_TLS_CHALLENGE:-true} # Use the TLS-ALPN-01 challenge to generate and renew ACME certificates by provisioning a TLS certificate.  As described on the Let's Encrypt community forum, when using the TLS-ALPN-01 challenge, Traefik must be reachable by Let's Encrypt through port 443.
      - --global.checknewversion=${TRAEFIK_GLOBAL_CHECKNEWVERSION:-true} # Periodically check if a new version has been released. (Default: true)
      - --global.sendanonymoususage=${TRAEFIK_GLOBAL_SENDANONYMOUSUSAGE:-false} # Periodically send anonymous usage statistics. If the option is not specified, it will be disabled by default. (Default: false)
      - --log=${TRAEFIK_LOG:-true} # Enable the Traefik log, for configurations and errors (Default: true)
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO} # Log level. (Default: INFO)
      - --ping.terminatingstatuscode=${TRAEFIK_PING_TERMINATINGSTATUSCODE:-503} # Terminating status code (Default: 503)
      - --ping=${TRAEFIK_PING:-true} # Enable the ping endpoint. (Default: true)
      - --providers.docker.allowEmptyServices=${TRAEFIK_PROVIDERS_DOCKER_ALLOW_EMPTY_SERVICES:-true} # Instructs the provider to create any servers load balancer defined for Docker containers regardless of the healthiness of the corresponding containers. (: false)
      - --providers.docker.defaultrule=${TRAEFIK_PROVIDERS_DOCKER_DEFAULT_RULE:-Host(`{{ .ContainerName }}.${DOMAIN}`)} # Default rule. (Default: Host(`{{ normalize .Name }}`)
      - --providers.docker.endpoint=${SOCK_PREFIX:-unix://}${DOCKER_SOCK:-/var/run/docker.sock} # Docker server endpoint. Can be a TCP or a Unix socket endpoint. (Default: unix:///var/run/docker.sock)
      - --providers.docker.exposedbydefault=${TRAEFIK_PROVIDERS_DOCKER_EXPOSED_BY_DEFAULT:-false}
      - --providers.docker.network=${TRAEFIK_PROVIDERS_DOCKER_NETWORK:-default} # Default Docker network used.
      - --providers.file.directory=${TRAEFIK_PROVIDERS_FILE_DIRECTORY:-/config}
      - --providers.docker=${TRAEFIK_PROVIDERS_DOCKER_ENABLED:-true} # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker.exposedbydefault=${TRAEFIK_DOCKER_EXPOSED_BY_DEFAULT:-false}  # Don't expose services by default, only the ones that have the label "traefik.expose=true"
      - --providers.swarm=${TRAEFIK_PROVIDERS_SWARM_ENABLED:-true} # Enable the Swarm provider, so that it reads labels from Docker services
      - --providers.swarm.exposedbydefault=${TRAEFIK_PROVIDERS_SWARM_EXPOSED_BY_DEFAULT:-false} # Don't expose services by default, only the ones that have the label "traefik.expose=true"
      # Plugins
      ##########################################
      # - --experimental.localplugins.<your-plugin-name>  # Local plugins configuration. (Default: false)
      # - --experimental.localplugins.<your-plugin-name>.modulename=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_MODULE_NAME:-github.com/Miromani4/traefik-plugin-AdminAPI_WebUI}  # Plugin's module name.
      # - --experimental.localplugins.<your-plugin-name>.settings=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS:-}  # Plugin's settings (works only for wasm plugins).
      # - --experimental.localplugins.<your-plugin-name>.settings.envs=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS_ENVS:-}  # Environment variables to forward to the wasm guest.
      # - --experimental.localplugins.<your-plugin-name>.settings.mounts=${TRAEFIK_EXPERIMENTAL_LOCAL_PLUGINS_SETTINGS_MOUNTS:-}  # Directory to mount to the wasm guest.
      # A plugin to block abusive clients based on IP address.
      # - --experimental.plugins.fail2ban.modulename=github.com/tomMoulard/fail2ban
      # - --experimental.plugins.fail2ban.version=v0.8.3
      # A free and open-source software to start workloads on demand and stop them after a period of inactivity.
      # Think of it a bit like a serverless platform, but for your own servers.
      # - --experimental.plugins.sablier.modulename=github.com/sablierapp/sablier
      # - --experimental.plugins.sablier.version=v1.8.4
      # A plugin to cache responses from your services, written in Go.
      # https://plugins.traefik.io/plugins/6294728cffc0cd18356a97c2/souin
      # - --experimental.plugins.souin.modulename=github.com/darkweak/souin
      # - --experimental.plugins.souin.version=v1.7.5
      # This plugin aims to implement a Crowdsec Bouncer in a Traefik plugin.
      # CrowdSec is an open-source and collaborative IPS (Intrusion Prevention System) and a security suite. We leverage local behavior analysis and crowd power to build the largest CTI network in the world.
      # The purpose is to enable Traefik to authorize or block requests from IPs based on their reputation and behavior.
      # https://plugins.traefik.io/plugins/6335346ca4caa9ddeffda116/crowdsec-bouncer-traefik-plugin
      # - --experimental.plugins.crowdsec-bouncer-traefik-plugin.modulename=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      # - --experimental.plugins.crowdsec-bouncer-traefik-plugin.version=v1.4.1
      # If Traefik is behind a Cloudflare Proxy/Tunnel, it won't be able to get the real IP from the external client as well as other information.
      # This plugin solves this issue by overwriting the X-Real-IP and X-Forwarded-For with an IP from the CF-Connecting-IP header.
      # The real IP will be the Cf-Connecting-IP if request is come from cloudflare ( truest ip in configuration file).
      # The plugin also writes the CF-Visitor scheme to the X-Forwarded-Proto. (This fixes an infinite redirect issue for wordpress when using CF[443]->PROXY/TUNNEL->Traefik[80]->WP[80])
      # https://plugins.traefik.io/plugins/62e97498e2bf06d4675b9443/real-ip-from-cloudflare-proxy-tunnel
