
x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-portainer-labels: &portainer-labels
  traefik.enable: "true"
  traefik.http.services.portainer.loadbalancer.server.port: 9443
  homepage.group: System Monitoring
  homepage.name: Portainer
  homepage.icon: portainer.png
  homepage.href: https://portainer.${DOMAIN}/
  homepage.description: Portainer is a tool that allows you to manage your Docker containers and images.

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    hostname: portainer
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - portainer_agent_network
    ports:
      - ${PORTAINER_HTTP_PORT:-9000}:9000    # serve http frontend
      - ${PORTAINER_HTTPS_PORT:-9443}:9443   # serve https frontend
      - ${PORTAINER_API_PORT:-7999}:8000     # serve api
    volumes:
      - ${ROOT_DIR:-.}/configs/portainer/data:/data
#      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    <<: *resource-limits
    labels:
      <<: *portainer-labels
    command: -H tcp://${PORTAINER_AGENT_CLUSTER_ADDR:-tasks.agent}:${PORTAINER_AGENT_PORT:-9001} --tlsskipverify
    deploy:
      <<: *common-deploy
      replicas: 1
      placement:
        constraints: [node.role == manager]
      labels:
        <<: *portainer-labels
  portainer_agent:
    image: portainer/agent:lts
    container_name: portainer_agent
#    hostname: portainer_agent  # do not use here, breaks everything.
    extra_hosts:
      - host.docker.internal:172.17.0.1
    networks:
      - portainer_agent_network
    ports:
      - ${PORTAINER_AGENT_PORT:-9001}:9001/tcp
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ${DOCKER_VOLUMES:-/var/lib/docker/volumes}:/var/lib/docker/volumes
    <<: *resource-limits
    deploy:
      <<: *common-deploy
      mode: global
      placement:
        constraints: [node.platform.os == linux]

networks:
  swarm_public:  # docker network create -d overlay --attachable swarm_public
    name: swarm_public
    driver: overlay
    external: true
  portainer_agent_network:  # docker network create -d overlay --attachable portainer_agent_network
    name: portainer_agent_network
    driver: overlay
    external: true
#    driver_opts:
#      parent: tailscale0
#    ipam:
