x-common-env: &common-env
  PGID: ${PGID:-988} # 'docker' Group ID
  PUID: ${PUID:-1002} # A non-root user ID
  TZ: ${TZ:-America/Chicago} # Your Timezone

x-resource-limits: &resource-limits
  cpu_shares: 1024 # CPU share weight (relative, 2-262144). Higher = more CPU *if competing*.
  #  mem_limit: 512m        # Max RAM usage (e.g., 64m, 1g). Exceeding = container kill.
  #  mem_reservation: 325m  # Soft RAM limit (e.g., 32m, 512m).  Best effort, not guaranteed.
  #  mem_swappiness: 30      # Swap usage (0-100). 0 = off. Higher = more swap, may slow down container.
  #memswap_limit: 1024m    # Max RAM + Swap.  Usually same as mem_limit.
  labels:
    autoheal: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 1024M
#    reservations:
#     cpus: '0.05'
#    memory:  256M

x-common-deploy: &common-deploy
  placement:
    preferences:
      - spread: node.labels.worker_priority
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"
#  resources:
#    limits:
#      cpus: '0.10'
#      memory: 128M
#    reservations:
#      cpus: '0.10'
#      memory: 64M

x-dashy-labels: &dashy-labels
  traefik.enable: "true"
  traefik.http.services.dashy.loadbalancer.server.port: 8080

x-homepage-labels: &homepage-labels
  traefik.enable: "true"
  traefik.http.services.homepage.loadbalancer.server.port: 3000

services:
  dashy:
    # 🔹🔹 Dashy 🔹🔹  https://github.com/lissy93/dashy
    # A homepage for your end users
    image: lissy93/dashy
    container_name: dashy
    hostname: dashy
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    networks:
      - traefik_public
    volumes:
      - ${ROOT_DIR:-.}/configs/dashy:/app/user-data
    ports:
      - ${DASHY_PORT:-4000}:8080
    environment:
      <<: *common-env
      NODE_ENV: ${DASHY_NODE_ENV:-production}
    labels:
      <<: *dashy-labels
      homepage.group: Dashboards
      homepage.name: Dashy
      homepage.icon: dashy.png
      homepage.href: https://dashy.${DOMAIN}/
      homepage.description: A self-hosted start page for your server, providing easy access to all your services and applications.
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dashy-labels
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s

  homepage:
    # 🔹🔹 Homepage 🔹🔹  # https://github.com/gethomepage/homepage
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    hostname: homepage
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    networks:
      - traefik_public
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    environment:
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE:-Homepage}
      - HOMEPAGE_VAR_SEARCH_PROVIDER=${HOMEPAGE_VAR_SEARCH_PROVIDER:-google}
      - HOMEPAGE_VAR_HEADER_STYLE=${HOMEPAGE_VAR_HEADER_STYLE:-default}
      - HOMEPAGE_VAR_WEATHER_CITY=${HOMEPAGE_VAR_WEATHER_CITY:-Chicago}
      - HOMEPAGE_VAR_WEATHER_LAT=${HOMEPAGE_VAR_WEATHER_LAT:-41.8781}
      - HOMEPAGE_VAR_WEATHER_LONG=${HOMEPAGE_VAR_WEATHER_LONG:--87.6298}
      - HOMEPAGE_VAR_WEATHER_TIME=${HOMEPAGE_VAR_WEATHER_TIME:-}
      - HOMEPAGE_VAR_WEATHER_UNIT=${HOMEPAGE_VAR_WEATHER_UNIT:-fahrenheit}
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
      - ${ROOT_DIR:-.}/configs/homepage:/app/config
      - ${ROOT_DIR:-.}/data:/data
    labels:
      <<: *homepage-labels
    <<: *resource-limits
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *homepage-labels
    restart: unless-stopped


