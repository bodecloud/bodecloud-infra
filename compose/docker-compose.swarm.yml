x-common-env: &common-env
  TZ: ${TZ:-America/Chicago} # Your Timezone
  PUID: ${PUID:-1001}
  PGID: ${PGID:-988}
  UMASK: ${UMASK:-002}

x-common-uidgid: &common-uidgid
  user: ${PUID:-1001}:${PGID:-988}

x-common-logging: &common-logging
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"

x-socket-proxy: &socket-proxy
  image: ghcr.io/wollomatic/socket-proxy:1
  read_only: true
  mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-64M}
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges
  <<: *common-uidgid
  volumes:
    - ${SOCKET_PROXY_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
  labels:
    com.centurylinklabs.watchtower.enable: "false" # if watchtower would try to update the proxy, it would just stop
  networks:
    - swarm_infranet
  healthcheck:
    test:
      - "CMD"
      - "./healthcheck"
    interval: ${SOCKET_PROXY_HEALTHCHECK_INTERVAL:-10s}
    timeout: ${SOCKET_PROXY_HEALTHCHECK_TIMEOUT:-5s}
    retries: ${SOCKET_PROXY_HEALTHCHECK_RETRIES:-2}
  restart: unless-stopped

x-commonKeys: &commonOptions
  restart: unless-stopped
  stdin_open: true
  tty: true

x-dnsServers: &dnsServers
  dns:
    - ${DNS_SERVER1:-1.0.0.1}
    - ${DNS_SERVER2:-1.1.1.1}

x-dependsOnVPN: &dependsOnVPN
  network_mode: service:vpn
  depends_on:
    - vpn

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-deploy: &common-deploy
  mode: replicated # Deploys the service in replicated mode
  replicas: 1 # Specifies that only one replica of the service should be running
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 60s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 512M

x-constraints-storage-only: &constraints-storage-only
  constraints:
    - node.labels.storage == true

x-preferences-worker-priority: &preferences-worker-priority
  preferences:
    - spread: node.labels.worker_priority

