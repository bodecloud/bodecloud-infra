services:
  jellyseerr:
    # 🔹🔹 Jellyseerr 🔹🔹
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    hostname: jellyseerr
    networks:
      - swarm_infranet
    ports:
      - ${JELLYSEERR_PORT:-5055}:5055
    volumes:
      - ${ROOT_DIR:-.}/configs/jellyseerr/config:/app/config
    environment:
      <<: *common-env
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    labels:
      <<: *jellyseerr-labels
      homepage.group: Media Requests
      homepage.name: Jellyseerr Requests
      homepage.icon: jellyseerr.png
      homepage.href: https://jellyseerr.${DOMAIN:-bolabaden.org}/
      homepage.description: Allows you and others to request new movies and TV shows to be added to your Jellyfin media server.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *jellyseerr-labels
    restart: unless-stopped

  bazarr:
    # 🔹🔹 Bazarr 🔹🔹
    image: linuxserver/bazarr
    container_name: bazarr
    hostname: bazarr
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${BAZARR_PORT:-6767}:6767
    volumes:
      - ${ROOT_DIR:-.}/configs/bazarr/config:/config
      - ${ROOT_DIR:-.}/data/media/anime:/media/anime
      - ${ROOT_DIR:-.}/data/media/movies:/media/movies
      - ${ROOT_DIR:-.}/data/media/tv:/media/tv
      - ${ROOT_DIR:-.}/data/downloads/bazarr:/downloads
      - ${ROOT_DIR:-.}/data/downloads/complete:/downloads/complete
      - ${ROOT_DIR:-.}/data/downloads/incomplete:/downloads/incomplete
    environment:
      <<: *common-env
    labels:
      <<: *bazarr-labels
      homepage.group: Media Management
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: https://bazarr.${DOMAIN:-bolabaden.org}/
      homepage.description: Companion application to Sonarr and Radarr for automatic subtitle downloading and management in multiple languages.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *bazarr-labels
    healthcheck:
      test: curl -fSs http://127.0.0.1:6767
      interval: ${BAZARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${BAZARR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${BAZARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${BAZARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  checkrr:
    # 🔹🔹 Checkrr 🔹🔹  https://github.com/aetaric/checkrr
    # Scan your library files for corrupt media and replace the files via sonarr and radarr
    image: aetaric/checkrr:3.4.0
    container_name: checkrr
    hostname: checkrr
    networks:
      - swarm_infranet
    ports:
      - ${CHECKRR_PORT:-8585}:8585
    volumes:
#      - ${ROOT_DIR:-.}/configs/certs:/certs
      - ${ROOT_DIR:-.}/configs/checkrr/config/checkrr.db:/checkrr.db
      - ${ROOT_DIR:-.}/configs/checkrr/config/checkrr.yaml:/checkrr.yaml
      - ${ROOT_DIR:-.}/configs/checkrr/logs:/logs
      - ${ROOT_DIR:-.}/data/media:/media
    environment:
      <<: *common-env
      GIN_MODE: release
    labels:
      <<: *checkrr-labels
      homepage.group: System Monitoring
      homepage.name: Checkrr
      homepage.icon: checkrr.png
      homepage.href: https://checkrr.${DOMAIN:-bolabaden.org}/
      homepage.description: A comprehensive system monitoring tool that checks the health and status of your various services and applications.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *checkrr-labels
    restart: unless-stopped

  lidarr:
    # 🔹🔹 Lidarr 🔹🔹
    image: linuxserver/lidarr
    container_name: lidarr
    hostname: lidarr
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${LIDARR_PORT:-8686}:8686
    volumes:
      - ${ROOT_DIR:-.}/data/media/music/videos:/media/music/videos
      - ${ROOT_DIR:-.}/data/media/music:/media/music
      - ${ROOT_DIR:-.}/configs/lidarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *lidarr-labels
      homepage.group: Music Management
      homepage.name: Lidarr Music
      homepage.icon: lidarr.png
      homepage.href: https://lidarr.${DOMAIN:-bolabaden.org}
      homepage.description: Helps you automatically download and organize your music collection, ensuring correct metadata and album art.
      homepage.weight: 2
      homepage.widget.type: lidarr
      homepage.widget.url: https://lidarr.${DOMAIN:-bolabaden.org}
      homepage.widget.key: ${LIDARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *lidarr-labels
    healthcheck:
      test: curl -fSs http://localhost:8686 > /dev/null || exit 1
      interval: ${LIDARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${LIDARR_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${LIDARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${LIDARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  rsshub:
    # 🔹🔹 RSSHub 🔹🔹
    # World's largest RSS network, consisting of over 5,000 global instances.
    # Delivers millions of contents aggregated from all kinds of sources
    depends_on:
      - redis
    image: diygod/rsshub:chromium-bundled
    container_name: rsshub
    hostname: rsshub
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
    ports:
      - ${RSSHUB_PORT:-1200}:1200
    environment:
      <<: *common-env
      CACHE_TYPE: ${RSSHUB_CACHE_TYPE:-redis}
      NODE_ENV: ${RSSHUB_NODE_ENV:-production}
      REDIS_URL: ${RSSHUB_REDIS_URL:-redis://redis:${REDIS_PORT:-6379}}
    labels:
      <<: *rsshub-labels
      homepage.group: RSS Feeds
      homepage.name: RSSHub
      homepage.icon: rsshub.png
      homepage.href: https://rsshub.${DOMAIN}
      homepage.description: World's largest RSS network, consisting of over 5,000 global instances.  Delivers millions of contents aggregated from all kinds of sources
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *rsshub-labels
    restart: unless-stopped

  tandoor-postgres:
    # 🔹🔹 Tandoor Database 🔹🔹
    image: postgres:17.4
    container_name: tandoor-postgres
    hostname: ${TANDOOR_POSTGRES_HOSTNAME:-tandoor-postgres}
    networks:
      - swarm_infranet
    ports:
      - ${TANDOOR_POSTGRES_PORT:-5434}:${TANDOOR_POSTGRES_INTERNAL_PORT:-5432}
    volumes:
      - ${ROOT_DIR:-.}/configs/tandoor/db/data:/var/lib/postgresql/data
      - ${ROOT_DIR:-.}/configs/tandoor/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_DB: ${TANDOOR_POSTGRES_DB:-tandoor}
      POSTGRES_USER: ${TANDOOR_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TANDOOR_DB_PASSWORD:-docker}
      POSTGRES_ROOT_PASSWORD: ${TANDOOR_POSTGRES_ROOT_PASSWORD:-ubuntu}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *tandoor-labels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${TANDOOR_POSTGRES_DB:-tandoor} -U ${TANDOOR_DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tandoor:
    depends_on:
      - tandoor-postgres
    image: docker.io/vabene1111/recipes:latest
    container_name: tandoor
    hostname: ${TANDOOR_HOSTNAME:-tandoor}
    <<: [*common-uidgid, *common-logging]
    read_only: true
    cap_drop:
      - ALL
    environment:
      SECRET_KEY: ${TANDOOR_SECRET_KEY}
      DB_ENGINE: ${TANDOOR_DB_ENGINE:-django.db.backends.postgresql}
      POSTGRES_HOST: ${TANDOOR_POSTGRES_HOSTNAME:-tandoor-postgres}
      POSTGRES_PORT: ${TANDOOR_POSTGRES_INTERNAL_PORT:-5432}
      POSTGRES_USER: ${TANDOOR_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TANDOOR_DB_PASSWORD:-docker}
      POSTGRES_DB: ${TANDOOR_DB_DATABASE:-tandoor}
      REMOTE_USER_AUTH: ${TANDOOR_REMOTE_USER_AUTH:-1}
    volumes:
      - ${ROOT_DIR:-.}/configs/tandoor/db/data:/var/lib/postgresql/data
      - ${ROOT_DIR:-.}/configs/tandoor/staticfiles:/opt/recipes/staticfiles
      - ${ROOT_DIR:-.}/configs/tandoor/mediafiles:/opt/recipes/mediafiles
    tmpfs:
      - /tmp:mode=770,size=10M,uid=${PUID:-1001},gid=${PGID:-988}
    networks:
      - swarm_infranet
    labels:
      <<: *tandoor-labels
    deploy:
      <<: *common-deploy
      labels:
        <<: *tandoor-labels

  # netdata, server monitoring
  netdata:
    image: docker.io/netdata/netdata:latest
    container_name: netdata
    hostname: netdata
    networks:
      - swarm_infranet
    ports:
      - ${NETDATA_PORT:-19999}:19999
    pid: host
    volumes:
      # touch ${ROOT_DIR:-.}/configs/netdata/health_alarm_notify.conf
      - ${ROOT_DIR:-.}/configs/netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf
      - ${ROOT_DIR:-.}/configs/netdata/cache:/var/cache/netdata
      - ${ROOT_DIR:-.}/configs/netdata/netdatalib:/var/lib/netdata
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /run/dbus:/run/dbus:ro
      # NOTE: see https://learn.netdata.cloud/docs/netdata-agent/installation/docker#change-the-default-hostname
      - /etc/hostname:/host/etc/hostname:ro
    <<: *common-logging
    environment:
      <<: *common-env
      NETDATA_DISABLE_TELEMETRY: ${NETDATA_DISABLE_TELEMETRY:-1}
      DISABLE_TELEMETRY: ${NETDATA_DISABLE_TELEMETRY:-1}
      DO_NOT_TRACK: ${NETDATA_DO_NOT_TRACK:-1}
      NETDATA_DISABLE_CLOUD: ${NETDATA_DISABLE_CLOUD:-1}
    labels:
      <<: *netdata-labels
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    deploy:
      <<: *common-deploy
      labels:
        <<: *netdata-labels

  scrutiny:
    image: ghcr.io/analogj/scrutiny:latest
    container_name: scrutiny
    hostname: scrutiny
    networks:
      - swarm_infranet
    <<: [*common-logging, *resource-limits]
    cap_add:
      - SYS_RAWIO
    devices:
      - /dev/sda
    volumes:
      - /run/udev:/run/udev:ro
      - ${ROOT_DIR:-.}/configs/scrutiny/scrutiny:/opt/scrutiny/config
      - ${ROOT_DIR:-.}/configs/scrutiny/influxdb:/opt/scrutiny/influxdb
    environment:
      <<: *common-env
      SCRUTINY_INFLUXDB_HOST: ${SCRUTINY_INFLUXDB_HOST:-http://influxdb:8086}
      SCRUTINY_INFLUXDB_TOKEN: ${SCRUTINY_INFLUXDB_TOKEN}
      SCRUTINY_INFLUXDB_ORG: ${SCRUTINY_INFLUXDB_ORG}
      SCRUTINY_INFLUXDB_BUCKET: ${SCRUTINY_INFLUXDB_BUCKET}
    labels:
      <<: *scrutiny-labels
    deploy:
      <<: *common-deploy
      labels:
        <<: *scrutiny-labels
    healthcheck:
      test: curl -sSf http://localhost:8080
      interval: ${SCRUTINY_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${SCRUTINY_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${SCRUTINY_HEALTHCHECK_RETRIES:-4}
      start_period: ${SCRUTINY_HEALTHCHECK_START_PERIOD:-60s}

  # watchtower container to update images
  # NOTE to update the containers images' watchtower needs to restart the containers this implies some downtime when it does
  # NOTE watchtower also updates itself
  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    read_only: true
    cap_drop:
      - ALL
    <<: [*common-uidgid, *common-logging, *resource-limits]
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    networks:
      - swarm_infranet
    command:
      - "--cleanup"
      - "--schedule"
      - "0 0 5 * * *"

  librespeed:
    image: ghcr.io/librespeed/speedtest-rust
    container_name: librespeed
    hostname: librespeed
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${LIBRE_SPEED_PORT:-8088}:8080
    <<: [*common-uidgid, *common-logging]
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - ${ROOT_DIR:-.}/configs/librespeed-rs/config.toml:/usr/local/bin/configs.toml:ro
    labels:
      <<: *librespeed-labels
      homepage.group: Utilities
      homepage.name: Librespeed
      homepage.icon: librespeed.png
      homepage.href: https://librespeed.${DOMAIN:-bolabaden.org}/
      homepage.description: A simple, fast, and reliable speed test tool for measuring internet connection speed.
    deploy:
      <<: *common-deploy
      labels:
        <<: *librespeed-labels

  radarr:
