      - ${ROOT_DIR:-.}/configs/midarr/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_USER: ${MIDARR_DB_USERNAME:-ubuntu}
      POSTGRES_PASSWORD: ${MIDARR_DB_PASSWORD:-docker}
      POSTGRES_DB: ${MIDARR_DB_DATABASE:-midarr}
    healthcheck:
      test: "exit 0"
    restart: unless-stopped

  prowlarr:
    # 🔹🔹 Prowlarr 🔹🔹
    image: linuxserver/prowlarr
    container_name: prowlarr
    network_mode: service:gluetun-openvpn
    volumes:
      - ${ROOT_DIR:-.}/configs/prowlarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      homepage.group: Source Aggregator
      homepage.name: Prowlarr Indexer
      homepage.icon: prowlarr.png
      homepage.href: https://prowlarr.${DOMAIN:-bolabaden.org}
      homepage.description: Manages multiple torrent indexers, making it easier to find and download content through your download clients.
      homepage.weight: 1
