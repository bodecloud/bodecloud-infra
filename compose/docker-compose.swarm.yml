    volumes:
      - ${ROOT_DIR:-.}/configs/sabnzbd:/config
      - ${ROOT_DIR:-.}/data/downloads:/downloads
    environment:
      <<: *common-env
    labels:
      homepage.group: Source Aggregator
      homepage.name: Sabnzbd Downloader
      homepage.icon: sabnzbd.png
      homepage.href: https://sabnzbd.${DOMAIN:-bolabaden.org}
      homepage.description: Downloads files from Usenet newsgroups, providing a fast and reliable way to access a wide range of content.
      homepage.weight: 3
      homepage.widget.type: sabnzbd
      homepage.widget.url: https://sabnzbd.${DOMAIN:-bolabaden.org}
      homepage.widget.key: ${SABNZBD_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  lldap:
    depends_on:
      - lldap-postgres
    image: "docker.io/lldap/lldap:latest"
    container_name: lldap
    hostname: lldap
    ports:
      - ${LLDAP_HTTP_PORT:-17170}:${LLDAP_HTTP_PORT:-17170}
      - ${LLDAP_LDAP_PORT:-3890}:${LLDAP_LDAP_PORT:-3890}
    networks:
      - swarm_infranet
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - ${ROOT_DIR:-.}/configs/lldap/data:/data
    environment:
      <<: *common-env
      LLDAP_LDAP_HOST: "${LLDAP_LDAP_HOST:-::}"
      LLDAP_LDAP_PORT: ${LLDAP_LDAP_PORT:-3890}
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET}
      LLDAP_KEY_SEED: ${LLDAP_KEY_SEED}
      LLDAP_LDAP_BASE_DN: ${LLDAP_LDAP_BASE_DN}
      LLDAP_LDAP_USER_PASS: "${LLDAP_LDAP_USER_PASS:-docker}"
      LLDAP_DATABASE_URL: "postgres://${LLDAP_DB_USERNAME:-postgres}:${LLDAP_DB_PASSWORD:-docker}@${LLDAP_POSTGRES_HOSTNAME:-lldap-postgres}:${LLDAP_POSTGRES_PORT:-5435}/${LLDAP_DB_DATABASE:-lldap}"
      LLDAP_HTTP_URL: https://lldap.${DOMAIN:-bolabaden.org}
      LLDAP_HTTP_PORT: ${LLDAP_HTTP_PORT:-17170}
      LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET: ${LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET:-true}
      LLDAP_SMTP_OPTIONS__SERVER: ${LLDAP_SMTP_OPTIONS__SERVER:-smtp.sendgrid.net}
      LLDAP_SMTP_OPTIONS__PORT: ${LLDAP_SMTP_OPTIONS__PORT:-465}
      LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION: ${LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION:-TLS}
      LLDAP_SMTP_OPTIONS__USER: ${LLDAP_SMTP_OPTIONS__USER:-apikey}
      LLDAP_SMTP_OPTIONS__PASSWORD: ${SENDGRID_PASS}
      LLDAP_SMTP_OPTIONS__FROM: "lldap <lldap@${DOMAIN:-bolabaden.org}>"
      LLDAP_SMTP_OPTIONS__TO: ${ACME_RESOLVER_EMAIL}
    labels:
      <<: *lldap-labels
    deploy:
      <<: *common-deploy
    restart: unless-stopped

  lldap-postgres:
    # 🔹🔹 LLDAP Database 🔹🔹
    image: postgres:17.4
    container_name: lldap-postgres
    hostname: ${LLDAP_POSTGRES_HOSTNAME:-lldap-postgres}
    networks:
      - swarm_infranet
    ports:
      - ${LLDAP_POSTGRES_PORT:-5435}:${LLDAP_POSTGRES_INTERNAL_PORT:-5432}
    volumes:
      - ${ROOT_DIR:-.}/configs/lldap/db/data:/var/lib/postgresql/data
      - ${ROOT_DIR:-.}/configs/lldap/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_DB: ${LLDAP_POSTGRES_DB:-lldap}
      POSTGRES_USER: ${LLDAP_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${LLDAP_DB_PASSWORD:-docker}
      POSTGRES_ROOT_PASSWORD: ${LLDAP_POSTGRES_ROOT_PASSWORD:-ubuntu}
      POSTGRES_PORT: ${LLDAP_POSTGRES_INTERNAL_PORT:-5432}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *lldap-labels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${LLDAP_POSTGRES_DB:-lldap} -U ${LLDAP_DB_USERNAME:-postgres}"]
      interval: ${LLDAP_POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${LLDAP_POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${LLDAP_POSTGRES_HEALTHCHECK_RETRIES:-5}
    restart: unless-stopped
  # Multiple DNS challenge provider are not supported with Traefik,
  # but you can use CNAME to handle that. For example, if you have example.org (account foo) and
  # example.com (account bar) you can create a CNAME on example.org called _acme-challenge.example.org
  # pointing to challenge.example.com. This way, you can obtain certificates for example.org with the bar account.
  traefik:
    # 🔹🔹 Traefik 🔹🔹
    image: traefik:latest
    container_name: traefik
    hostname: traefik
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      # Listen on port 80, default for HTTP, necessary to redirect to HTTPS
      - ${TRAEFIK_WEB_PORT:-80}:${TRAEFIK_WEB_PORT:-80}
      # Listen on port 443, default for HTTPS
      - ${TRAEFIK_WEBSECURE_PORT:-443}:${TRAEFIK_WEBSECURE_PORT:-443}
      # Listen on port 8099, default for the Traefik API and Dashboard
      - ${TRAEFIK_DASHBOARD_PORT:-8099}:${TRAEFIK_DASHBOARD_PORT:-8099}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    volumes:
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${ROOT_DIR:-.}/configs/traefik/config:/config
      - ${ROOT_DIR:-.}/configs/traefik/config:/etc/traefik
      - ${ROOT_DIR:-.}/certs:/certs
    #      - /etc/localtime:/etc/localtime:ro
    <<: *common-uidgid
    environment:
      <<: *common-env
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
      CLOUDFLARE_ZONE_API_TOKEN: ${CLOUDFLARE_ZONE_API_TOKEN}
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL} # Email address used for Letsencrypt registration.
      # CNAME are supported (and sometimes even encouraged), but there are a few cases where they can be problematic.
      # If needed, CNAME support can be disabled with the following environment variable:
      LEGO_DISABLE_CNAME_SUPPORT: ${LEGO_DISABLE_CNAME_SUPPORT:-false} # Disable CNAME support for DNS challenges. (Default: false)
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-} # ZeroSSL API key.
    labels:
      <<: *traefik-labels
      homepage.group: Infrastructure
      homepage.name: Traefik
      homepage.icon: traefik
      homepage.href: https://${DOMAIN:-bolabaden.org}/api/
      homepage.description: Reverse proxy
      homepage.widget.type: traefik
      homepage.widget.url: https://${DOMAIN:-bolabaden.org}/dashboard/
      homepage.widget.fields: '["routers", "services", "middleware"]'
    command:
      - --accessLog=true # Enable the access log, with HTTP requests
      - --api # Enable api/dashboard. When set to true, its sub option api.dashboard is also set to true.
      - --api.dashboard=true # Enable dashboard (default: false)
      - --api.debug=true # Enable additional endpoints for debugging and profiling (default: false)
      - --api.disableDashboardad=true # Disable the advertisement from the dashboard (default: false)
      - --api.insecure=true # Enable the API and the dashboard on the entryPoint named traefik (default: false)
      - --entrypoints.web.address=:${TRAEFIK_WEB_PORT:-80}
      - --entrypoints.web.asDefault=true # Adds this EntryPoint to the list of default EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.web.http.redirections.entrypoint.scheme=https # The redirection target scheme (optional, default: https)
      - --entrypoints.web.http.redirections.entrypoint.to=websecure # The redirection target entry point.
      - --entrypoints.web.observability.accessLogs=true
      - --entrypoints.web.observability.metrics=true
      - --entrypoints.web.observability.tracing=true
      - --entrypoints.websecure.address=:${TRAEFIK_WEBSECURE_PORT:-443}
      - --entrypoints.websecure.asDefault=true # Adds this EntryPoint to the list of default EntryPoints to be used on routers that don't have any Entrypoint defined. (Default: false)
      - --entrypoints.websecure.http.tls.certResolver=myresolver
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN:-bolabaden.org}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN:-bolabaden.org}
      - --entrypoints.websecure.http.tls.domains[1].main=${DUCKDNS_SUBDOMAIN}.duckdns.org
      - --entrypoints.websecure.http.tls.domains[1].sans=*.${DUCKDNS_SUBDOMAIN}.duckdns.org
      - --entrypoints.websecure.http.tls.domains[2].main=${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}
      - --entrypoints.websecure.http.tls.domains[2].sans=*.${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}
      - --entrypoints.websecure.http.tls=true
      - --certificatesresolvers.myresolver.acme.caServer=https://acme.zerossl.com/v2/DV90 # Let's Encrypt has a limit: 5 certs generated a week. Use staging when breaking things (specifically https://acme-staging-v02.api.letsencrypt.org/directory). see https://doc.traefik.io/traefik/https/acme/#caserver
      - --certificatesresolvers.myresolver.acme.certificatesDuration=2160 # The certificates' duration in hours, exclusively used to determine renewal dates. (Default: 2160)
      - --certificatesresolvers.myresolver.acme.dnsChallenge.provider=cloudflare
      - --certificatesresolvers.myresolver.acme.dnsChallenge=true # Use the DNS challenges instead of HTTP/TLS challenges. (Default: false)
      - --certificatesresolvers.myresolver.acme.eab.hmacEncoded=${TRAEFIK_ACME_EAB_HMAC_ENCODED} # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Base64 encoded HMAC key from External CA.
      - --certificatesresolvers.myresolver.acme.eab.kid=${TRAEFIK_ACME_EAB_KID} # Uncomment this line to use ZeroSSL (no rate limits) over Let's Encrypt.  # Key identifier from External CA.
      - --certificatesresolvers.myresolver.acme.email=${ACME_RESOLVER_EMAIL} # Email address used for registration.
      - --certificatesresolvers.myresolver.acme.httpChallenge.entryPoint=web
      - --certificatesresolvers.myresolver.acme.httpChallenge=true # Activate HTTP-01 Challenge. (Default: false)
      - --certificatesresolvers.myresolver.acme.storage=/certs/acme.json # Storage to use. (Default: acme.json)
      - --certificatesresolvers.myresolver.acme.tlsChallenge=true # Use the TLS-ALPN-01 challenge to generate and renew ACME certificates by provisioning a TLS certificate.  As described on the Let's Encrypt community forum, when using the TLS-ALPN-01 challenge, Traefik must be reachable by Let's Encrypt through port 443.
      - --global.checkNewVersion=true # Periodically check if a new version has been released. (Default: true)
      - --global.sendAnonymousUsage=false # Periodically send anonymous usage statistics. If the option is not specified, it will be disabled by default. (Default: false)
      - --log # Enable the Traefik log, for configurations and errors
      - --log.level=INFO # Log level. (Default: INFO)
      - --ping.terminatingStatusCode=503 # Terminating status code (Default: 503)
      - --ping=true # Enable the ping endpoint. (Default: true)
      - --providers.docker.allowEmptyServices=true # Instructs the provider to create any servers load balancer defined for Docker containers regardless of the healthiness of the corresponding containers. (default: false)
      - --providers.docker.defaultRule=Host(`${DOMAIN:-bolabaden.org}`) || Host(`${DUCKDNS_DOMAIN:-bolabaden.duckdns.org}`) || Host(`${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}`) || Host(`{{ .ContainerName }}.${DOMAIN:-bolabaden.org}`) || Host(`{{ .ContainerName }}.${DUCKDNS_DOMAIN:-bolabaden.duckdns.org}`) || Host(`{{ .ContainerName }}.${TS_HOSTNAME}.${TS_BASE_DOMAIN:-noodlefish-pound.ts.net}`) # Default rule. (Default: Host(`{{ normalize .Name }}`)
      - --providers.docker.endpoint=unix:///var/run/docker.sock # Docker server endpoint. Can be a TCP or a Unix socket endpoint. (Default: unix:///var/run/docker.sock)
      - --providers.docker.exposedByDefault=false  # Don't expose services by default, only the ones that have the label "traefik.expose=true"
      - --providers.docker.network=swarm_public # Default Docker network used.
      - --providers.docker=true # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.file.directory=/config
      - --providers.swarm.exposedByDefault=false # Don't expose services by default, only the ones that have the label "traefik.expose=true"
      - --providers.swarm=true # Enable the Swarm provider, so that it reads labels from Docker services
    deploy:
      <<: *common-deploy
      # While in Swarm Mode, Traefik uses labels found on services, not on individual containers.
      # Therefore, if you use a compose file with Swarm Mode, labels should be defined in the deploy part of your service
      # as shown:
      labels:
        <<: *traefik-labels
    healthcheck:
      test: curl -fSs http://localhost:8099 > /dev/null || exit 1
      interval: ${TRAEFIK_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${TRAEFIK_HEALTHCHECK_TIMEOUT:-15s}
      retries: ${TRAEFIK_HEALTHCHECK_RETRIES:-4}
      start_period: ${TRAEFIK_HEALTHCHECK_START_PERIOD:-60s}
    restart: always

  # homer is a homepage container
  homer:
    image: docker.io/b4bz/homer:latest
    container_name: homer
    hostname: ${HOMER_HOSTNAME:-homer}
    <<: *common-uidgid
    read_only: true
    cap_drop:
      - ALL
    networks:
      - swarm_infranet
    volumes:  # touch ${ROOT_DIR:-.}/configs/homer/config.yml
      - ${ROOT_DIR:-.}/configs/homer/assets:/www/assets
    labels:
      <<: *homer-labels
    deploy:
      <<: *common-deploy
      labels:
        <<: *homer-labels

  robots:
    image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine-slim
    container_name: robots
    hostname: robots
    read_only: true
    cap_drop:
      - ALL
    <<: *common-uidgid
    tmpfs:
      - /var/cache/nginx:mode=770,size=5M,uid=${PUID},gid=${PGID}
      - /var/run:mode=770,size=5M,uid=${PUID},gid=${PGID}
      - /tmp:mode=770,size=5M,uid=${PUID},gid=${PGID}
    volumes:
      - ${ROOT_DIR:-.}/configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${ROOT_DIR:-.}/configs/nginx/robots.txt:/usr/share/nginx/html/robots.txt:ro
    networks:
      - swarm_infranet
    labels:
      <<: *robots-labels
    healthcheck:
      test: nc -vz 127.0.0.1 8080
      start_period: ${ROBOTS_HEALTHCHECK_START_PERIOD:-3s}
      interval: ${ROBOTS_HEALTHCHECK_INTERVAL:-1s}
      timeout: ${ROBOTS_HEALTHCHECK_TIMEOUT:-1s}
      retries: ${ROBOTS_HEALTHCHECK_RETRIES:-5}

networks:
  swarm_infranet:
    name: swarm_infranet
    external: true
    driver: overlay
#    driver_opts:
#      parent: tailscale0
#    ipam:
#      config:
#        - subnet: 172.21.0.0/16
#          gateway: 172.21.0.1
#          ip_range: 172.21.0.0/16
  # if you prefer an external network, use the following command:
  # docker network create -d overlay -o parent=${TS_INTERFACE_NAME:-tailscale0} --subnet ${TS_SUBNET:-172.21.0.0/16} --ip-range ${TS_IP_RANGE:-172.21.0.0/16} --gateway ${TS_HOST_IP:-172.21.0.1} swarm_infranet
  swarm_public:
    name: swarm_public
    external: true  # docker network create -d overlay --attachable swarm_public
  gluenet:
    driver: overlay
    name: gluenet
    ipam:
      config:
        - subnet: ${GLUETUN_FIREWALL_OUTBOUND_SUBNETS:-192.50.8.0/24}


