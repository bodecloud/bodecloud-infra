      UN_SONARR_0_DELETE_DELAY: ${UN_SONARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_SONARR_0_DELETE_ORIG: ${UN_SONARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_SONARR_0_PATHS_0: ${UN_SONARR_0_PATHS_0:-/downloads/anime}
      UN_SONARR_0_PATHS_1: ${UN_SONARR_0_PATHS_1:-/downloads/tv}
      UN_SONARR_0_PROTOCOLS: ${UN_SONARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_SONARR_0_SYNCTHING: ${UN_SONARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_SONARR_0_TIMEOUT: ${UN_SONARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_SONARR_0_URL: http://sonarr:${SONARR_PORT:-8989} # What is the address of the app on your system (open it in the browser and copy it)
      # Whisparr
      UN_WHISPARR_0_API_KEY: ${WHISPARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_WHISPARR_0_DELETE_DELAY: ${UN_WHISPARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_WHISPARR_0_DELETE_ORIG: ${UN_WHISPARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_WHISPARR_0_PATHS_0: ${UN_WHISPARR_0_PATHS_0:-/downloads/xxx}
      UN_WHISPARR_0_PROTOCOLS: ${UN_WHISPARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_WHISPARR_0_SYNCTHING: ${UN_WHISPARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_WHISPARR_0_TIMEOUT: ${UN_WHISPARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_WHISPARR_0_URL: http://whisparr:${WHISPARR_PORT:-6969} # What is the address of the app on your system (open it in the browser and copy it)
      ## Web Hooks
      #UN_WEBHOOK_0_URL: ${UN_WEBHOOK_0_URL:-}  # e.g. https://notifiarr.com/api/v1/notification/unpackerr/api_key_from_notifiarr_com
      #UN_WEBHOOK_0_NAME: ${UN_WEBHOOK_0_NAME:-}  # Set this to hide the URL in logs.
      #UN_WEBHOOK_0_SILENT: ${UN_WEBHOOK_0_SILENT:-true}  # Turns off success logs (less log spam)
      #UN_WEBHOOK_0_EVENTS_0: ${UN_WEBHOOK_0_EVENTS_0:-1}  # list of event ids to include, 0 == all. Example: 1,2,3,4
      #UN_WEBHOOK_0_EVENTS_1: ${UN_WEBHOOK_0_EVENTS_1:-4}  # 1 = download started, 2 = download finished, 3 = extraction started
      #UN_WEBHOOK_0_EVENTS_2: ${UN_WEBHOOK_0_EVENTS_2:-6}  # 4 = extraction finished, 5 = download failed, 6 = extraction failed
      #UN_WEBHOOK_0_NICKNAME: ${UN_WEBHOOK_0_NICKNAME:-Unpackerr}  # Used in Discord and Slack templates as bot name, in Telegram as chat_id.
      #UN_WEBHOOK_0_CHANNEL: ${UN_WEBHOOK_0_CHANNEL:-}  # Also passed into templates. Used in Slack templates for destination channel.
      #UN_WEBHOOK_0_EXCLUDE_0: ${UN_WEBHOOK_0_EXCLUDE_0:-}  # List of apps to exclude, Example: radarr, lidarr
      #UN_WEBHOOK_0_EXCLUDE_1: ${UN_WEBHOOK_0_EXCLUDE_1:-}
      #UN_WEBHOOK_0_TEMPLATE_PATH: ${UN_WEBHOOK_0_TEMPLATE_PATH:-}  # Override internal webhook template for discord.com or other hooks.
      #UN_WEBHOOK_0_TEMPLATE: ${UN_WEBHOOK_0_TEMPLATE:-}  # Override automatic template detection. Values: notifiarr, discord, telegram, gotify, pushover, slack
      #UN_WEBHOOK_0_IGNORE_SSL: ${UN_WEBHOOK_0_IGNORE_SSL:-true}  # Set this to true to ignore the SSL certificate on the server.
      #UN_WEBHOOK_0_TIMEOUT: ${UN_WEBHOOK_0_TIMEOUT:-10s}  # You can adjust how long to wait for a server response.
      #UN_WEBHOOK_0_CONTENT_TYPE: ${UN_WEBHOOK_0_CONTENT_TYPE:-application/json}  # If your custom template uses another MIME type, set this.
      ## Command Hooks
      #UN_CMDHOOK_0_COMMAND: ${UN_CMDHOOK_0_COMMAND:-/downloads/scripts/command.sh}  # Path to command or script.
      #UN_CMDHOOK_0_EVENTS_0: ${UN_CMDHOOK_0_EVENTS_0:-1}  # list of event ids to include, 0 == all. Example: 1,2,3,4
      #UN_CMDHOOK_0_EVENTS_1: ${UN_CMDHOOK_0_EVENTS_1:-4}  # 1 = download started, 2 = download finished, 3 = extraction started
      #UN_CMDHOOK_0_EVENTS_2: ${UN_CMDHOOK_0_EVENTS_2:-7}  # 4 = extraction finished, 5 = download failed, 6 = extraction failed
      #UN_CMDHOOK_0_EXCLUDE_0: ${UN_CMDHOOK_0_EXCLUDE_0:-}  # list of apps to
      #UN_CMDHOOK_0_EXCLUDE_1: ${UN_CMDHOOK_0_EXCLUDE_1:-}  # exclude, Example: radarr, lidarr
      #UN_CMDHOOK_0_NAME: ${UN_CMDHOOK_0_NAME:-}  # Provide an optional name for logging.
      #UN_CMDHOOK_0_SHELL: ${UN_CMDHOOK_0_SHELL:-false}  # Runs the command inside /bin/sh ('nix) or cmd.exe (Windows).
      #UN_CMDHOOK_0_SILENT: ${UN_CMDHOOK_0_SILENT:-false}  # Hides command output from logs.
      #UN_CMDHOOK_0_TIMEOUT: ${UN_CMDHOOK_0_TIMEOUT:-10s}  # You can adjust how long to wait for a server response.
    labels:
      <<: *unpackerr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *unpackerr-labels
    restart: unless-stopped

  whisparr:
    # 🔹🔹 Whisparr 🔹🔹  https://github.com/thespad/whisparr
    # Whisparr is a fork of Sonarr for managing and downloading adult content.
    image: ghcr.io/thespad/whisparr
    container_name: whisparr
    hostname: whisparr
    networks:
      - swarm_infranet
    ports:
      - ${WHISPARR_PORT:-6969}:6969
    volumes:
      - ${ROOT_DIR:-.}/configs/whisparr/config:/config
      - ${ROOT_DIR:-.}/data/downloads/xxx:/downloads/xxx
      - ${ROOT_DIR:-.}/data/downloads/complete:/downloads/complete
      - ${ROOT_DIR:-.}/data/downloads/incomplete:/downloads/incomplete
      - ${ROOT_DIR:-.}/data/media/xxx:/xxx
    <<: [*resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *whisparr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *whisparr-labels
    healthcheck:
      test: curl -fSs http://localhost:6969 > /dev/null || exit 1
      interval: ${WHISPARR_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${WHISPARR_HEALTHCHECK_TIMEOUT:-15s}
      start_period: ${WHISPARR_HEALTHCHECK_START_PERIOD:-60s}
    restart: unless-stopped

  ddns-updater:
    image: qmcgaw/ddns-updater
    container_name: ddns-updater
    network_mode: bridge
    ports:
      - "0.0.0.0${DDNS_UPDATER_LISTENING_ADDRESS:-:7998}${DDNS_UPDATER_LISTENING_ADDRESS:-:7998}/tcp"
    volumes:
      - ${ROOT_DIR:-.}/configs/ddns-updater/updater/data:/updater/data
    environment:
      - CONFIG_FILEPATH=${DDNS_UPDATER_CONFIG_FILEPATH:-/updater/data/config.json}
      - PERIOD=${DDNS_UPDATER_PERIOD:-5m}
      - UPDATE_COOLDOWN_PERIOD=${DDNS_UPDATER_UPDATE_COOLDOWN_PERIOD:-5m}
      - PUBLICIP_FETCHERS=${DDNS_UPDATER_PUBLICIP_FETCHERS:-all}
      - PUBLICIP_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIP_HTTP_PROVIDERS:-all}
      - PUBLICIPV4_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIPV4_HTTP_PROVIDERS:-all}
      - PUBLICIPV6_HTTP_PROVIDERS=${DDNS_UPDATER_PUBLICIPV6_HTTP_PROVIDERS:-all}
      - PUBLICIP_DNS_PROVIDERS=${DDNS_UPDATER_PUBLICIP_DNS_PROVIDERS:-all}
      - PUBLICIP_DNS_TIMEOUT=${DDNS_UPDATER_PUBLICIP_DNS_TIMEOUT:-3s}
      - HTTP_TIMEOUT=${DDNS_UPDATER_HTTP_TIMEOUT:-10s}

      # Web UI
      - LISTENING_ADDRESS="${DDNS_UPDATER_LISTENING_ADDRESS:-:7998}"
      - ROOT_URL=${DDNS_UPDATER_ROOT_URL:-/}

      # Backup
      - BACKUP_PERIOD=${DDNS_UPDATER_BACKUP_PERIOD:-0} # 0 to disable
      - BACKUP_DIRECTORY=${DDNS_UPDATER_BACKUP_DIRECTORY:-/updater/data}

      # Other
      - LOG_LEVEL=${DDNS_UPDATER_LOG_LEVEL:-info}
      - LOG_CALLER=${DDNS_UPDATER_LOG_CALLER:-hidden}
      - SHOUTRRR_ADDRESSES=${DDNS_UPDATER_SHOUTRRR_ADDRESSES:-}
    restart: unless-stopped

  keycloak:
    # 🔹🔹 Keycloak 🔹🔹
    depends_on:
      - keycloak-postgres
      - traefik
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    hostname: ${KEYCLOAK_HOSTNAME:-keycloak}
    command: start-dev
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${KEYCLOAK_PORT:-8075}:8080
    volumes:
      - ${ROOT_DIR:-.}/configs/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      KC_HEALTH_ENABLED: ${KEYCLOAK_HEALTH_ENABLED:-true}
      KC_METRICS_ENABLED: ${KEYCLOAK_METRICS_ENABLED:-true}
      KC_DB: ${KEYCLOAK_DB:-postgres}
      KC_DB_URL: ${KEYCLOAK_DB_URL:-jdbc:postgresql://${KEYCLOAK_POSTGRES_HOSTNAME:-keycloak-postgres}:${KEYCLOAK_POSTGRES_PORT:-5431}/${KEYCLOAK_POSTGRES_DB:-keycloak}}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_LOG_LEVEL: ${KEYCLOAK_LOGLEVEL:-INFO}
      KC_PROXY: ${KEYCLOAK_PROXY:-edge}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      PROXY_ADDRESS_FORWARDING: ${KEYCLOAK_PROXY_ADDRESS_FORWARDING:-true}
    labels:
      <<: *keycloak-labels
#    entrypoint: ["/opt/keycloak/bin/kc.sh"]
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      placement:
        <<: *constraints-storage-only
      labels:
        <<: *keycloak-labels
    restart: unless-stopped

  keycloak-postgres:
    # 🔹🔹 Keycloak Database 🔹🔹
    image: postgres:17.4
    container_name: keycloak-postgres
    hostname: ${KEYCLOAK_POSTGRES_HOSTNAME:-keycloak-postgres}
    networks:
      - swarm_infranet
    ports:
      - ${KEYCLOAK_POSTGRES_PORT:-5431}:5432
    volumes:
      - ${ROOT_DIR:-.}/configs/keycloak/db/data:/var/lib/postgresql/data
      - ${ROOT_DIR:-.}/configs/keycloak/db/run/postgresql:/var/run/postgresql
    <<: *resource-limits
    environment:
      <<: *common-env
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_ROOT_PASSWORD: ${KEYCLOAK_POSTGRES_ROOT_PASSWORD:-postgres}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *keycloak-labels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${KEYCLOAK_POSTGRES_DB:-keycloak} -U ${KEYCLOAK_DB_USERNAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  deluge:
    # 🔹🔹 Deluge 🔹🔹
    depends_on:
      - gluetun-openvpn
    image: linuxserver/deluge
    container_name: deluge
    network_mode: service:gluetun-openvpn
    volumes:
      - ${ROOT_DIR:-.}/data/downloads:/downloads:rw
      - ${ROOT_DIR:-.}/configs/deluge:/config:rw
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      DELUGE_LOGLEVEL: ${DELUGE_LOGLEVEL:-info}
    labels:
      homepage.group: Download Clients
      homepage.name: Deluge
      homepage.icon: deluge.png
      homepage.href: https://deluge.${DOMAIN:-bolabaden.org}/
      homepage.description: A lightweight, cross-platform BitTorrent client designed for downloading files efficiently and securely from the internet.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  qbittorrent:
    # 🔹🔹 qBittorrent 🔹🔹
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    hostname: qbittorrent
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
    ports:
      - ${QB_WEBUI_PORT:-8084}:${QB_WEBUI_PORT:-8084}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}/udp
    volumes:
      - ${ROOT_DIR:-.}/data/downloads:/downloads
      - ${ROOT_DIR:-.}/configs/qbittorrent/config:/config
      - ${ROOT_DIR:-.}/configs/qbittorrent/scripts:/scripts
    environment:
      <<: *common-env
      TORRENTING_PORT: ${QB_TORRENTING_PORT:-6881}
      WEBUI_PORT: ${QB_WEBUI_PORT:-8084}
    labels:
      <<: *qbittorrent-labels
      #com.centurylinklabs.watchtower.depends-on: /vpn
      homepage.group: Download Clients
      homepage.name: qBittorrent Downloader
      homepage.icon: qbittorrent.png
      homepage.href: https://qbittorrent.${DOMAIN:-bolabaden.org}
      homepage.description: A user-friendly torrent client for downloading and managing files via BitTorrent, offering a clean interface and powerful features.
      homepage.weight: 2
      homepage.widget.type: qbittorrent
      homepage.widget.url: https://qbittorrent.${DOMAIN:-bolabaden.org}
      homepage.widget.username: ${QBITTORRENT_USERNAME:-admin}
      homepage.widget.password: ${QBITTORRENT_PASSWORD:-adminadmin}
      com.centurylinklabs.watchtower.depends-on: bolabaden-wireguard-1
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *qbittorrent-labels
    restart: unless-stopped

  organizr:
    depends_on:
      - radarr
      - sonarr
    image: organizr/organizr
    container_name: organizr
    hostname: ${ORGANIZR_HOSTNAME:-organizr}
    networks:
      - swarm_infranet
    ports:
      - ${ORGANIZR_PORT:-8004}:80
    <<: [*dnsServers, *commonOptions, *resource-limits=, *common-logging]
    environment:
      <<: *common-env
    volumes:
      - ${ROOT_DIR:-.}/configs/organizr:/config
    labels:
      <<: *organizr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *organizr-labels

  transmission:
    # 🔹🔹 Transmission 🔹🔹
    depends_on:
      - gluetun-openvpn
    image: linuxserver/transmission
    container_name: transmission
    network_mode: service:gluetun-openvpn
    volumes:
      - ${ROOT_DIR:-.}/configs/transmission/data:/config
      - ${ROOT_DIR:-.}/data/watch:/watch
      - ${ROOT_DIR:-.}/data/downloads/complete:/downloads/complete
      - ${ROOT_DIR:-.}/data/downloads/incomplete:/downloads/incomplete
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      HOST_WHITELIST: ${TRANSMISSION_HOST_WHITELIST:-}
      USER: ${TRANSMISSION_USER:-admin}
      PASS: ${TRANSMISSION_PASS:-admin}
      PEERPORT: ${TRANSMISSION_PEERPORT:-51413}
      TRANSMISSION_WEB_HOME: ${TRANSMISSION_WEB_HOME:-}
    labels:
      homepage.group: Download Clients
      homepage.name: Transmission Downloader
      homepage.icon: transmission.png
      homepage.href: https://transmission.${DOMAIN:-bolabaden.org}
      homepage.description: A lightweight and efficient BitTorrent client for downloading and managing torrent files, known for its simplicity and speed.
      homepage.weight: 2
      homepage.widget.type: transmission
      homepage.widget.url: https://transmission.${DOMAIN:-bolabaden.org}
      homepage.widget.username: ${TRANSMISSION_USERNAME:-admin}
      homepage.widget.password: ${TRANSMISSION_PASSWORD:-admin}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  prometheus:
    # 🔹🔹 Prometheus 🔹🔹  https://github.com/prometheus/prometheus
    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    <<: *resource-limits
    networks:
      - swarm_infranet
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ${ROOT_DIR:-.}/configs/prometheus/prometheus.yml:${PROMETHEUS_INTERNAL_CONFIG_FILEPATH:-/etc/prometheus/prometheus.yml}
      - ${ROOT_DIR:-.}/configs/prometheus/console_libraries:${PROMETHEUS_INTERNAL_WEB_CONSOLE_LIBRARIES:-/etc/prometheus/console_libraries}
      - ${ROOT_DIR:-.}/configs/prometheus/consoles:${PROMETHEUS_INTERNAL_WEB_CONSOLE_TEMPLATES:-/etc/prometheus/consoles}
    command: [
        "--config.file=${PROMETHEUS_INTERNAL_CONFIG_FILEPATH:-/etc/prometheus/prometheus.yml}", # Specifies the path to the Prometheus configuration file
        "--storage.tsdb.retention.size=${PROMETHEUS_STORAGE_TSDB_RETENTION_SIZE:-1GB}", # Sets the maximum size of the time series database to 1GB
        "--web.console.libraries=${PROMETHEUS_INTERNAL_WEB_CONSOLE_LIBRARIES:-/etc/prometheus/console_libraries}", # Path to console libraries for the web UI
        "--web.console.templates=${PROMETHEUS_INTERNAL_WEB_CONSOLE_TEMPLATES:-/etc/prometheus/consoles}", # Path to console templates for the web UI
        "--web.enable-lifecycle", # Enables lifecycle management for the web interface (e.g., for graceful shutdown)
      ]
    labels:
      homepage.group: Server Monitoring
      homepage.name: Prometheus Monitoring
      homepage.icon: prometheus.png
      homepage.href: https://prometheus.${DOMAIN:-bolabaden.org}
      homepage.description: Monitors your server's performance and resource usage, providing detailed metrics and alerts to help you maintain system health.
    environment:
      <<: *common-env
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped

  redis:
    #image: redis:alpine
    image: docker.io/library/redis:alpine
    container_name: redis
    hostname: ${REDIS_HOSTNAME:-redis}
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    networks:
      - swarm_infranet
    ports:
      - ${REDIS_PORT:-6379}:6379
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/redis:/data
      - ${ROOT_DIR:-.}/configs/redis/etc/sysctl.conf:/etc/sysctl.conf
    command: --save ${REDIS_SAVE:-60 1} --loglevel ${REDIS_LOGLEVEL:-warning}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: ${REDIS_HEALTHCHECK_START_PERIOD:-20s}
      interval: ${REDIS_HEALTHCHECK_INTERVAL:-30s}
      retries: ${REDIS_HEALTHCHECK_RETRIES:-5}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT:-3s}
    restart: unless-stopped

  searxng:
    # 🔹🔹 SearxNG 🔹🔹  # https://hub.docker.com/r/searxng/searxng
    # SearxNG is a privacy-respecting, hackable, open-source metasearch engine.
    image: docker.io/searxng/searxng
    container_name: searxng
    hostname: ${SEARXNG_HOSTNAME:-searxng}
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
    ports:
      - ${SEARXNG_PORT:-8077}:8080
    volumes:
      # touch ${ROOT_DIR:-.}/configs/searxng/limiter.toml
      - ${ROOT_DIR:-.}/configs/searxng:/etc/searxng
    environment:
      <<: *common-env
      SEARXNG_BASE_URL: http://searxng.${DOMAIN:-bolabaden.org}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  autoheal:
    # 🔹🔹 Autoheal 🔹🔹
    # Monitor and restart unhealthy docker containers.
    image: willfarrell/autoheal
    container_name: autoheal
    hostname: ${AUTOHEAL_HOSTNAME:-autoheal}
    <<: [*common-uidgid, *common-logging, *resource-limits]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      <<: *common-env
      AUTOHEAL_CONTAINER_LABEL: ${AUTOHEAL_CONTAINER_LABEL:-all}
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: ${AUTOHEAL_DEFAULT_STOP_TIMEOUT:-10}
      AUTOHEAL_ONLY_MONITOR_RUNNING: ${AUTOHEAL_ONLY_MONITOR_RUNNING:-false}
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL:-5}
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD:-30}
      CURL_TIMEOUT: ${CURL_TIMEOUT:-30}
      DOCKER_SOCK: ${DOCKER_SOCK:-/var/run/docker.sock}
      WEBHOOK_URL: ${AUTOHEAL_WEBHOOK_URL:-}
    labels:
      autoheal.stop.timeout: ${AUTOHEAL_STOP_TIMEOUT:-20} # Per containers override for stop timeout seconds during restart
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      replicas: ${AUTOHEAL_REPLICAS:-1}
    restart: unless-stopped

  deunhealth:
    # 🔹🔹 DeUnhealth 🔹🔹
    # Restart your unhealthy containers safely (e.g. containers depending on VPN and VPN reconnects)
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: none
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      LOG_LEVEL: ${DEUNHEALTH_LOG_LEVEL:-info}
      HEALTH_SERVER_ADDRESS: ${DEUNHEALTH_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  cadvisor:
    # 🔹🔹 Cadvisor 🔹🔹  # https://github.com/google/cadvisor
    depends_on:
      - prometheus
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    hostname: cadvisor
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
    ports:
      - ${CADVISOR_PORT:-8080}:8080
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    labels:
      <<: *cadvisor-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *cadvisor-labels
    restart: unless-stopped

  dozzle:
    # 🔹🔹 Dozzle 🔹🔹
    image: amir20/dozzle
    container_name: dozzle
    hostname: dozzle
    networks:
      - swarm_infranet
    ports:
      - ${DOZZLE_PORT:-9998}:8080
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    <<: [*common-uidgid, *common-logging, *resource-limits]
    labels:
      <<: *dozzle-labels
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN:-bolabaden.org}/
      homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dozzle-labels
    restart: unless-stopped

  cloudflare-ddns:
    image: oznu/cloudflare-ddns
    container_name: cloudflare-ddns
    hostname: cloudflare-ddns
    <<: *resource-limits
    environment:
      API_KEY: ${CLOUDFLARE_API_TOKEN}
      ZONE: ${DOMAIN:-bolabaden.org}  # Your naked domain.
      # DUCKDNS_SUBDOMAIN: ${DUCKDNS_SUBDOMAIN}  # The particular DNS record to update with an A record for dyndns
      DNS_SERVER: ${CLOUDFLARE_DNS_SERVER:-1.1.1.1}
    dns: ${CLOUDFLARE_CONTAINER_DNS_IPS:-1.0.0.1}
    restart: unless-stopped

  code-server:
    # 🔹🔹 Code Server 🔹🔹
    image: linuxserver/code-server:latest
    container_name: code-server
    hostname: code-server
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
    ports:
      - ${CODE_SERVER_PORT:-8443}:8443
    volumes:
      - ${ROOT_DIR:-.}:/workspace
    environment:
      <<: *common-env
      PASSWORD: ${CODESERVER_PASSWORD}
      CODE_SERVER_HASHED_PASSWORD: ${CODE_SERVER_HASHED_PASSWORD}
      SUDO_PASSWORD: ${SUDO_PASSWORD}
      CODE_SERVER_SUDO_HASHED_PASSWORD: ${CODE_SERVER_SUDO_HASHED_PASSWORD}
      PROXY_DOMAIN: ${CODE_SERVER_PROXY_DOMAIN:-}
      DEFAULT_WORKSPACE: /workspace
    labels:
      <<: *code-server-labels
      homepage.group: Development
      homepage.name: Code Server
      homepage.icon: code-server.png
      homepage.href: https://code-server.${DOMAIN:-bolabaden.org}/
      homepage.description: A web-based IDE for coding, editing, and debugging code, with support for multiple languages and frameworks.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *code-server-labels
    restart: unless-stopped

  homepage:
    # 🔹🔹 Homepage 🔹🔹  # https://github.com/gethomepage/homepage
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    hostname: homepage
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    environment:
      <<: *common-env
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-0.0.0.0/0,${DOMAIN:-bolabaden.org},*.${DOMAIN:-bolabaden.org}}
      HOMEPAGE_VAR_TITLE: ${HOMEPAGE_VAR_TITLE:-Homepage}
      HOMEPAGE_VAR_SEARCH_PROVIDER: ${HOMEPAGE_VAR_SEARCH_PROVIDER:-google}
      HOMEPAGE_VAR_HEADER_STYLE: ${HOMEPAGE_VAR_HEADER_STYLE:-}
      HOMEPAGE_VAR_WEATHER_CITY: ${HOMEPAGE_VAR_WEATHER_CITY:-Chicago}
      HOMEPAGE_VAR_WEATHER_LAT: ${HOMEPAGE_VAR_WEATHER_LAT:-41.8781}
      HOMEPAGE_VAR_WEATHER_LONG: ${HOMEPAGE_VAR_WEATHER_LONG:--87.6298}
      HOMEPAGE_VAR_WEATHER_TIME: ${HOMEPAGE_VAR_WEATHER_TIME:-}
      HOMEPAGE_VAR_WEATHER_UNIT: ${HOMEPAGE_VAR_WEATHER_UNIT:-fahrenheit}
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
      - ${ROOT_DIR:-.}/configs/homepage:/app/config
      - ${ROOT_DIR:-.}/data:/data
    labels:
      <<: *homepage-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *homepage-labels
    restart: unless-stopped

  dashy:
    # 🔹🔹 Dashy 🔹🔹  https://github.com/lissy93/dashy
    # A homepage for your end users
    image: lissy93/dashy
    container_name: dashy
    hostname: dashy
    <<: [*common-logging, *resource-limits]
    networks:
      - swarm_infranet
      - swarm_public
    volumes:
      - ${ROOT_DIR:-.}/configs/dashy/app/user-data:/app/user-data
      - ${ROOT_DIR:-.}/configs/dashy/.yarn:/.yarn
      - ${ROOT_DIR:-.}/configs/dashy/.cache:/.cache
    ports:
      - ${DASHY_PORT:-4000}:8080
    environment:
      <<: *common-env
      NODE_ENV: ${DASHY_NODE_ENV:-production}
    labels:
      <<: *dashy-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dashy-labels
    restart: unless-stopped

  speedtest:
    # 🔹🔹 Speedtest 🔹🔹
    image: linuxserver/speedtest-tracker
    container_name: speedtest
    hostname: speedtest
    networks:
      - swarm_infranet
      - swarm_public
    ports:
      - ${SPEEDTEST_TRACKER_PORT:-8765}:80
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/speedtest-tracker/config:/config
      - ${ROOT_DIR:-.}/certs/speedtest-tracker/keys:/config/keys
    <<: *resource-limits
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL} # Email of the initial admin user. Note: Only effective during initial setup.
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME} # Name of the initial admin user. Note: Only effective during initial setup.
      ADMIN_PASSWORD: ${SPEEDTEST_TRACKER_ADMIN_PASSWORD:-b00tstr4p} # Password of the initial admin user. Note: Only effective during initial setup.
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60} # Number of requests per minute to the API. Default: 60
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY} # Key used to encrypt and decrypt data. You can generate a key at https://speedtest-tracker.dev.
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker} # Used to define the application's name in the dashboard and in notifications.
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}} # Application timezone should be set if your database does not use UTC as its  timezone.
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-} # URL used for links in emails and notifications.
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-} # URL used for assets, needed when using a reverse proxy.
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true} # Begin the dashboard axis charts at zero. Default: true
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i} # Set the formatting of timestamps in charts.
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl} # Width of the content section of each page. Can be set to any value found in the Filament docs. Default: 7xl
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s} # Set the formatting of timestamps in tables and notifications.
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}} # Display timestamps in your local time.
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0} # Set the value to greater than zero to prune stored results. This value should be represented in days.
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true} # Enables the public dashboard for guest (unauthenticated) users. Default: false
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-} # Comma separated list of server IDs that should not be used when running speedtests.
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-} # Set the network interface to use for the test. This need to be the network interface available inside the container
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-6 */2 * * *} # Cron expression used to run speedtests on a scheduled basis.
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-} # Comma separated list of server IDs to randomly use for speedtest.
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-} # A comma separated list of public IP addresses where tests will be skipped when present.
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900} # Set the Download Threshold. Note: Only effective during initial setup.
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true} # Enable the thresholds. Note: Only effective during initial setup.
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25} # Set the Ping Threshold. Note: Only effective during initial setup.
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900} # Set the Upload Threshold. Note: Only effective during initial setup.
    labels:
      <<: *speedtest-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *speedtest-labels
    healthcheck:
      test: curl -fSs http://localhost:80 > /dev/null || exit 1
      start_period: ${SPEEDTEST_TRACKER_HEALTHCHECK_START_PERIOD:-20s}
      timeout: ${SPEEDTEST_TRACKER_HEALTHCHECK_TIMEOUT:-15s}
      interval: ${SPEEDTEST_TRACKER_HEALTHCHECK_INTERVAL:-30s}
    restart: unless-stopped

  gluetun-openvpn:
    # 🔹🔹 Gluetun 🔹🔹  # https://github.com/qdm12/gluetun
    # Gluetun is a VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    # use this one with arm:
    # image: ghcr.io/qdm12/gluetun-openvpn:latest@sha256:f035267182d3928d6d8351eb1b21f74dce0f97c1a521ffe4c18ce6376614806d
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun-openvpn
    hostname: gluetun-openvpn
    networks:
      gluenet:
        #ipv4_address: ${GLUETUN_GATEWAY:-192.51.0.1}
      swarm_infranet:
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    ports:
      - "8000${GLUETUN_HTTP_CONTROL_SERVER_ADDRESS:-:8000}"
      - "8888${GLUETUN_HTTPPROXY_LISTENING_ADDRESS:-:8888}"
      - "8388${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388}/tcp"
      - "8388${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388}/udp"
      - "9999${GLUETUN_HEALTH_SERVER_ADDRESS:-:9999}/tcp"
      - "${AIOSTREAMS_PORT:-3005}:3000"
      - "${AUTOBRR__METRICS_PORT:-9092}:${AUTOBRR__METRICS_PORT:-9092}"
      - "${AUTOBRR__PORT:-7474}:${AUTOBRR__PORT:-7474}"
      - "${AUTOBRR__POSTGRES_PORT:-5430}:${AUTOBRR__POSTGRES_PORT:-5430}"
      - "${DELUGE_EXT_PORT:-58846}:58846"
      - "${DELUGE_PORT:-8112}:8112"
      - "${FLARESOLVERR_PORT:-8191}:8191"
      - "${JACKETT_PORT:-9117}:9117"
      - "${PROWLARR_PORT:-9696}:9696"
      - "${SABNZBD_PORT:-8085}:8080"
      - "${STREMIO_PORT:-8086}:8080"
      - "${TRANSMISSION_EXT_PORT:-51413}:51413"
      - "${TRANSMISSION_EXT_PORT:-51413}:51413/udp"
      - "${TRANSMISSION_PORT:-9094}:9091"
    devices:
      - "${GLUETUN_TUN_DEVICE:-/dev/net/tun}:/dev/net/tun" # https://github.com/qdm12/gluetun-wiki/blob/main/errors/tun.md
    volumes:
      - "${ROOT_DIR:-.}/configs/gluetun:/gluetun"
      - "${ROOT_DIR:-.}/configs/gluetun/servers:${GLUETUN_STORAGE_FILEPATH:-/gluetun/servers}"
    environment:
      <<: *common-env
      # HTTP Control Panel section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/control-server.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/control-server.md
      HTTP_CONTROL_SERVER_ADDRESS: "${GLUETUN_HTTP_CONTROL_SERVER_ADDRESS:-:8000}" # Listening address for the HTTP control server
      HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: "${GLUETUN_HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH:-}" # Path to a TOML file containing authentication configuration. There is no default.
      HTTP_CONTROL_SERVER_LOG: "${GLUETUN_HTTP_CONTROL_SERVER_LOG:-on}" # Enable logging of HTTP requests
      # DNS reference: https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/dns.md
      BLOCK_ADS: "${GLUETUN_BLOCK_ADS:-off}" # Uses ads hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_MALICIOUS: "${GLUETUN_BLOCK_MALICIOUS:-on}" # Uses malicious hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_SURVEILLANCE: "${GLUETUN_BLOCK_SURVEILLANCE:-off}" # Uses surveillance hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      DNS_ADDRESS: "${GLUETUN_DNS_ADDRESS:-127.0.0.1}" # IP address to use as DNS resolver. It defaults to localhost to use the DNS over TLS Unbound server.
      DNS_KEEP_NAMESERVER: "${GLUETUN_DNS_KEEP_NAMESERVER:-off}" # Keep /etc/resolv.conf untouched. ⚠️ this will likely leak DNS traffic outside the VPN through your default container DNS. This imples DOT=off and ignores DNS_ADDRESS
      DNS_UPDATE_PERIOD: "${GLUETUN_DNS_UPDATE_PERIOD:-24h}" # Period to update block lists and cryptographic files and restart Unbound. Set to 0 to deactivate updates. This does a burst of DNS over TLS requests, which may be blocked if you set BLOCK_MALICIOUS=on for example. examples: `0`, `30s`, `5m`, `24h`
      DOT_CACHING: "${GLUETUN_DOT_CACHING:-on}" # Enable caching of DNS over TLS responses
      DOT_IPV6: "${GLUETUN_DOT_IPV6:-off}" # DNS IPv6 resolution
      DOT_PRIVATE_ADDRESS: "${GLUETUN_DOT_PRIVATE_ADDRESS:-}" # Comma separated list of CIDRs or single IP addresses Unbound won't resolve to. Note that the setting prevents DNS rebinding
      DOT_PROVIDERS: "${GLUETUN_DOT_PROVIDERS:-cloudflare}" # DNS over TLS providers to use.
      DOT: "${GLUETUN_DOT:-on}" # Activate DNS over TLS with Unbound. If DOT=off, Unbound won't run and therefore no file will be downloaded by the program at all. If DOT=on, after tunneling, it downloads at start (and periodically if DNS_UPDATE_PERIOD is not 0):
      UNBLOCK: "${GLUETUN_UNBLOCK:-off}" # Comma separated list of domain names to leave unblocked with Unbound, e.g. `domain1.com,x.domain2.co.uk`
      # firewall references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/routing.md
      FIREWALL_OUTBOUND_SUBNETS: "${GLUETUN_FIREWALL_OUTBOUND_SUBNETS:-192.50.8.0/24}" # Comma separated subnets that Gluetun and the containers sharing its network stack are allowed to access. This involves firewall and routing modifications.
      FIREWALL_VPN_INPUT_PORTS: "${GLUETUN_FIREWALL_VPN_INPUT_PORTS:-20027,23936,36175,42162,52065}" # Comma separated list of ports that you've forwarded on airvpn's control panel.
      HEALTH_SERVER_ADDRESS: "${GLUETUN_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}" # Internal health check server listening address
      HEALTH_SUCCESS_WAIT_DURATION: "${GLUETUN_HEALTH_SUCCESS_WAIT_DURATION:-5s}" # Duration to wait after a success check to perform another check
      HEALTH_TARGET_ADDRESS: "${GLUETUN_HEALTH_TARGET_ADDRESS:-cloudflare.com:443}" # Address to ping on every internal health check
      HEALTH_VPN_DURATION_ADDITION: "${GLUETUN_HEALTH_VPN_DURATION_ADDITION:-5s}" # Additional duration to add to the wait time for each consecutive failure of the VPN
      HEALTH_VPN_DURATION_INITIAL: "${GLUETUN_HEALTH_VPN_DURATION_INITIAL:-6s}" # Initial duration to wait for the VPN to be ready before restarting it
      # HTTP Proxy section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/http-proxy.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/http-proxy.md
      HTTPPROXY_LISTENING_ADDRESS: "${GLUETUN_HTTPPROXY_LISTENING_ADDRESS:-:8888}" # Internal listening address for the HTTP proxy
      HTTPPROXY_LOG: "${GLUETUN_HTTPPROXY_LOG:-off}" # Logs every tunnel requests
      HTTPPROXY_PASSWORD: "${GLUETUN_HTTPPROXY_PASSWORD:-proxypassword}" # Password to use to connect to the HTTP proxy
      HTTPPROXY_STEALTH: "${GLUETUN_HTTPPROXY_STEALTH:-on}" # Stealth mode means HTTP proxy headers are not added to your requests
      HTTPPROXY_USER: "${GLUETUN_HTTPPROXY_USER:-proxyuser}" # Username to use to connect to the HTTP proxy
      HTTPPROXY: "${GLUETUN_HTTPPROXY:-off}" # Enable the internal HTTP proxy
      # OpenVPN section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/openvpn.md
      OPENVPN_AUTH: ${GLUETUN_OPENVPN_AUTH:-sha256} # Specify a custom auth algorithm to use
      OPENVPN_CERT: ${GLUETUN_OPENVPN_CERT:-} # OpenVPN certificate content (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-encrypted-key.md
      OPENVPN_CIPHERS: ${GLUETUN_OPENVPN_CIPHERS:-aes-256-gcm} # Specify a custom cipher to use. It will also set ncp-disable if using AES GCM for PIA
      OPENVPN_CUSTOM_CONFIG: ${GLUETUN_OPENVPN_CUSTOM_CONFIG:-} # Specify a custom OpenVPN configuration file to use for the custom VPN provider.
      OPENVPN_ENCRYPTED_KEY: ${GLUETUN_OPENVPN_ENCRYPTED_KEY:-} # OpenVPN encrypted key (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-encrypted-key.md
      OPENVPN_ENDPOINT_IP: ${GLUETUN_OPENVPN_ENDPOINT_IP:-} # Specify a generally optional target VPN server IP address to use
      OPENVPN_ENDPOINT_PORT: ${GLUETUN_OPENVPN_ENDPOINT_PORT:-} # Specify a generally optional target VPN server port number to use
      OPENVPN_FLAGS: ${GLUETUN_OPENVPN_FLAGS:-} # Space delimited openvpn flags to pass to openvpn
      OPENVPN_IPV6: ${GLUETUN_OPENVPN_IPV6:-off} # Enable/disable IPv6
      OPENVPN_KEY_PASSPHRASE: ${GLUETUN_OPENVPN_KEY_PASSPHRASE:-} # Specify a key passphrase to decrypt an encrypted key
      OPENVPN_KEY: ${GLUETUN_OPENVPN_KEY:-} # OpenVPN key (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-key.md
      OPENVPN_MSSFIX: ${GLUETUN_OPENVPN_MSSFIX:-0} # Set the MSS fix parameter. Set to 0 to use the defaults.
      OPENVPN_PROCESS_USER: ${GLUETUN_OPENVPN_PROCESS_USER:-root} # Specify a user to run the OpenVPN subprocess. root is default.
      OPENVPN_PROTOCOL: ${GLUETUN_OPENVPN_PROTOCOL:-tcp} # Network protocol to use, only valid for OpenVPN
      OPENVPN_ROOT: ${GLUETUN_OPENVPN_ROOT:-no} # Run OpenVPN as root
      OPENVPN_VERBOSITY: ${GLUETUN_OPENVPN_VERBOSITY:-1} # Openvpn verbosity level
      OPENVPN_VERSION: ${GLUETUN_OPENVPN_VERSION:-2.6} # Set the OpenVPN version to run
      PUBLICIP_API_KEY: ${GLUETUN_PUBLICIP_API_KEY:-} # Optional API token for the public IP echo service to increase rate limiting
      PUBLICIP_API: ${GLUETUN_PUBLICIP_API:-ipinfo} # Public IP echo service API to use or an echoip URL in the form `echoip#https://xyz`.
      PUBLICIP_ENABLED: ${GLUETUN_PUBLICIP_ENABLED:-on} # Check for public IP address information on VPN connection
      PUBLICIP_FILE: ${GLUETUN_PUBLICIP_FILE:-/gluetun/publicip.txt} # Filepath to store the public IP address assigned. This will be removed in the v4 program, instead you might want to use the control server
      SERVER_COUNTRIES: ${GLUETUN_SERVER_COUNTRIES:-Austria,Belgium,Brazil,Bulgaria,Canada,Czech Republic,Estonia,Germany,Ireland,Japan,Latvia,Netherlands,New Zealand,Norway,Romania,Serbia,Singapore,Spain,Sweden,Switzerland,United Kingdom,United States,China,Isle of Man} # List of countries to filter servers by.  # todo: add more, i gave up halfway through there were so many.
      SHADOWSOCKS_ADDRESS: ${GLUETUN_SHADOWSOCKS_ADDRESS:-:8388} # Internal listening address for Shadowsocks
      SHADOWSOCKS_CIPHER: ${GLUETUN_SHADOWSOCKS_CIPHER:-chacha20-ietf-poly1305} # AEAD Cipher to use for Shadowsocks. Choose between `chacha20-ietf-poly1305`, `aes-128-gcm`, or `aes-256-gcm`
      SHADOWSOCKS_LISTENING_ADDRESS: ${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388} # Internal listening address for Shadowsocks
      SHADOWSOCKS_LOG: ${GLUETUN_SHADOWSOCKS_LOG:-off} # Logs every tunnel requests
      SHADOWSOCKS_PASSWORD: ${GLUETUN_SHADOWSOCKS_PASSWORD:-password} # Password to use to connect to Shadowsocks
      SHADOWSOCKS: ${GLUETUN_SHADOWSOCKS:-off} # Enable the internal Shadowsocks proxy
      STORAGE_FILEPATH: ${GLUETUN_STORAGE_FILEPATH:-/gluetun/servers/servers.json} # Path to the file that will store the VPN servers data.
      UPDATER_MIN_RATIO: ${GLUETUN_UPDATER_MIN_RATIO:-0} # Ratio of servers to be found for the update to succeed, compared to the servers already built in the program
      UPDATER_PERIOD: ${GLUETUN_UPDATER_PERIOD:-24h} # Period to update the VPN servers data in memory and to /gluetun/servers.json. Set to 0 to disable. This does a burst of DNS over TLS requests, which may be blocked if you set BLOCK_MALICIOUS=on for example.
      UPDATER_VPN_SERVICE_PROVIDERS: ${GLUETUN_UPDATER_VPN_SERVICE_PROVIDERS:-airvpn} # List of providers to update servers data for, when the updater triggers periodically. If left empty, it defaults to the current VPN provider used at start.
      VERSION_INFORMATION: ${GLUETUN_VERSION_INFORMATION:-on} # Logs a message indicating if a newer version is available once the VPN is connected
      # Port Forwarding section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/port-forwarding.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/vpn-port-forwarding.md
      VPN_PORT_FORWARDING_LISTENING_PORTS: ${GLUETUN_VPN_PORT_FORWARDING_LISTENING_PORTS:-8388} # Port redirection for the VPN server side port forwarded.
      VPN_PORT_FORWARDING_STATUS_FILE: ${GLUETUN_VPN_PORT_FORWARDING_STATUS_FILE:-/tmp/gluetun/forwarded_port} # File path to use for writing the forwarded port obtained.
      VPN_PORT_FORWARDING: ${GLUETUN_VPN_PORT_FORWARDING:-off} # Enable custom port forwarding code for supported providers
      VPN_SERVICE_PROVIDER: ${GLUETUN_VPN_SERVICE_PROVIDER:-airvpn} # VPN provider to use.
      VPN_TYPE: ${GLUETUN_VPN_TYPE:-openvpn} # VPN type to use, only two choices available: `openvpn` and `wireguard`
    labels:
      <<: *gluetun-labels
      homepage.group: Network
      homepage.name: Gluetun
      homepage.icon: gluetun.png
      homepage.href: https://gluetun.${DOMAIN:-bolabaden.org}/
      homepage.description: VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    deploy:
      <<: *swarm-resource-limits
      labels:
        <<: *gluetun-labels
    #entrypoint: rm -rf configs/gluetun/servers.json && touch configs/gluetun/servers.json && ./gluetun-entrypoint
    restart: unless-stopped

  autobrr:
    # 🔹🔹 Autobrr 🔹🔹  # https://github.com/autobrr/autobrr
    # Modern, easy to use download automation for torrents and usenet.
    image: ghcr.io/autobrr/autobrr
