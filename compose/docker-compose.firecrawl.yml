name: firecrawl

x-common-firecrawl-env: &common-firecrawl-env
  # This is now autoconfigured by the docker-compose.yaml. You shouldn't need to set it.
  PLAYWRIGHT_MICROSERVICE_URL: '${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright-service:3000/scrape}'
  REDIS_URL: '${REDIS_URL:-redis://redis:6379}'
  REDIS_RATE_LIMIT_URL: '${REDIS_URL:-redis://redis:6379}'
  # To turn on DB authentication, you need to set up Supabase.
  USE_DB_AUTHENTICATION: '${FIRECRAWL_USE_DB_AUTHENTICATION:-false}'  # supabase is required
  # Supabase Setup (used to support DB authentication, advanced logging, etc.)
  SUPABASE_ANON_TOKEN: '${SUPABASE_ANON_TOKEN:-}'
  SUPABASE_URL: '${SUPABASE_URL:-}'
  SUPABASE_SERVICE_TOKEN: '${SUPABASE_SERVICE_TOKEN:-}'
  # Provide your OpenAI API key here to enable AI features
  OPENAI_API_KEY: '${OPENAI_API_KEY}'
  OPENAI_BASE_URL: '${OPENAI_BASE_URL:-}'  # e.g. http://localhost:11434/api
  MODEL_NAME: '${MODEL_NAME:-}'  # e.g. deepseek-r1:7b
  MODEL_EMBEDDING_NAME: '${MODEL_EMBEDDING_NAME:-}'  # e.g. nomic-embed-text
  # Experimental: Use Ollama
  OLLAMA_BASE_URL: '${OLLAMA_BASE_URL:-}'  # e.g. https://example.com/v1
  # PROXY_SERVER can be a full URL (e.g. http://0.1.2.3:1234) or just an IP and port combo (e.g. 0.1.2.3:1234)
  # Do not uncomment PROXY_USERNAME and PROXY_PASSWORD if your proxy is unauthenticated
  PROXY_USERNAME: '${FIRECRAWL_PROXY_USERNAME:-}'
  PROXY_PASSWORD: '${FIRECRAWL_PROXY_PASSWORD:-}'
  SLACK_WEBHOOK_URL: '${SLACK_WEBHOOK_URL:-}'
  POSTHOG_API_KEY: '${POSTHOG_API_KEY:-}'
  POSTHOG_HOST: '${POSTHOG_HOST:-}'
  SELF_HOSTED_WEBHOOK_URL: '${SELF_HOSTED_WEBHOOK_URL:-}'
  SERPER_API_KEY: '${SERPER_API_KEY}'
  SEARCHAPI_API_KEY: '${SEARCHAPI_API_KEY}'
  # You can specify a SearXNG server with the JSON format enabled, if you'd like to use that instead of direct Google.
  # You can also customize the engines and categories parameters, but the defaults should also work just fine.
  # SEARXNG_ENDPOINT: http://your.searxng.server
  SEARXNG_ENDPOINT: '${SEARXNG_ENDPOINT}'
  SEARXNG_ENGINES: '${SEARXNG_ENGINES:-}'
  SEARXNG_CATEGORIES: '${SEARXNG_CATEGORIES:-}'
  # This key lets you access the queue admin panel. Change this if your deployment is publicly accessible.
  BULL_AUTH_KEY: '${FIRECRAWL_BULL_AUTH_KEY}'
  # Use if you've set up authentication and want to test with a real API key
  TEST_API_KEY: '${FIRECRAWL_TEST_API_KEY:-}'
  LOGGING_LEVEL: '${FIRECRAWL_LOGGING_LEVEL:-}'
  PROXY_SERVER: '${FIRECRAWL_PROXY_SERVER:-}'


services:
  playwright-service:
    build:
      context: 'https://github.com/mendableai/firecrawl.git#main:/apps/playwright-service-ts'
      dockerfile: Dockerfile
    image: docker.io/th3w1zard1/playwright-service-arm64:latest
    container_name: playwright-service
    hostname: playwright-service
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - backend
    environment:
      PORT: 3000
      PROXY_SERVER: '${FIRECRAWL_PROXY_SERVER}'
      PROXY_USERNAME: '${FIRECRAWL_PROXY_USERNAME}'
      PROXY_PASSWORD: '${FIRECRAWL_PROXY_PASSWORD}'
      BLOCK_MEDIA: '${FIRECRAWL_BLOCK_MEDIA}'
    restart: always
  firecrawl-api:
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_started
    build:
      context: 'https://github.com/mendableai/firecrawl.git#main:/apps/api'
      dockerfile: Dockerfile
    image: docker.io/th3w1zard1/firecrawl-api-worker:latest
    container_name: firecrawl-api
    hostname: firecrawl-api
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - backend
      - publicnet
    expose:
      - ${FIRECRAWL_INTERNAL_PORT:-3002}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      <<: *common-firecrawl-env
      HOST: "0.0.0.0"
      PORT: ${FIRECRAWL_INTERNAL_PORT:-3002}
      FLY_PROCESS_GROUP: app
      ENV: local
    labels:
      traefik.enable: 'true'
      traefik.http.routers.firecrawl-api.rule: Host(`firecrawl-api.${DOMAIN}`) || Host(`firecrawl-api.${TS_HOSTNAME}.${DOMAIN}`)
      traefik.http.routers.firecrawl-api.service: firecrawl-api
      traefik.http.services.firecrawl-api.loadbalancer.server.port: ${FIRECRAWL_INTERNAL_PORT:-3002}
    command: pnpm run start:production
    restart: always
  firecrawl-worker:
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_started
      firecrawl-api:
        condition: service_started
    build:
      context: 'https://github.com/mendableai/firecrawl.git#main:/apps/api'
      dockerfile: Dockerfile
    image: docker.io/th3w1zard1/firecrawl-api-worker:latest
    container_name: firecrawl-worker
    hostname: firecrawl-worker
    networks:
      - backend
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      <<: *common-firecrawl-env
      FLY_PROCESS_GROUP: worker
      ENV: local
    command: pnpm run workers
    restart: always
