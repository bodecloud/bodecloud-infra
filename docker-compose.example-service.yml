version: '3.8'

services:
  example-service:
    image: nginx:alpine
    container_name: example-service
    hostname: example-service
    networks:
      - publicnet
    expose:
      - 80
    restart: always
    # Labels for Consul registration via Registrator
    labels:
      # Service metadata for Consul
      SERVICE_NAME: "example-service"
      SERVICE_TAGS: "web,nginx,exposed"
      SERVICE_80_NAME: "example-service"
      SERVICE_80_CHECK_HTTP: "/"
      SERVICE_80_CHECK_INTERVAL: "15s"
      SERVICE_REGION: "${VPS_REGION:-us-east}"
      SERVICE_VPS: "${VPS_NAME:-node1}"
      
      # Traefik-specific labels for the central instance
      SERVICE_80_TRAEFIK_ENABLE: "true"
      SERVICE_80_TRAEFIK_HTTP_ROUTERS_EXAMPLE_RULE: "Host(`example.${DOMAIN}`)"
      SERVICE_80_TRAEFIK_HTTP_ROUTERS_EXAMPLE_MIDDLEWARES: "ipallowlist-private@file"
      SERVICE_80_TRAEFIK_HTTP_SERVICES_EXAMPLE_LOADBALANCER_SERVER_PORT: "80"
      
      # Additional metadata
      SERVICE_DESCRIPTION: "Example service for Consul registration"
      SERVICE_VERSION: "1.0.0"

networks:
  publicnet:
    external: true 