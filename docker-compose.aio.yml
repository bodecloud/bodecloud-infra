services:
  jellyfin:
    # 🔹🔹 Jellyfin 🔹🔹
    image: linuxserver/jellyfin
    container_name: jellyfin
    hostname: jellyfin
    networks:
      - infranet
      - traefik_public
    ports:
      - ${JELLYFIN_PORT:-8096}:8096
      - ${JELLYFIN_PORT2:-8920}:8920
      - ${JELLYFIN_DLNA_PORT:-1901}:1900/udp
      - ${JELLYFIN_PORT3:-7359}:7359/udp
    volumes:
      - ${ROOT_DIR:-.}/data/media/anime:/media/anime
      - ${ROOT_DIR:-.}/data/media/books:/media/books
      - ${ROOT_DIR:-.}/data/media/movies:/media/movies
      - ${ROOT_DIR:-.}/data/media/music:/media/music
      - ${ROOT_DIR:-.}/data/media/music/videos:/media/music/videos
      - ${ROOT_DIR:-.}/data/media/tv:/media/tv
      - ${ROOT_DIR:-.}/data/media/xxx:/media/xxx
      - ${ROOT_DIR:-.}/configs/jellyfin/data:/data
      - ${ROOT_DIR:-.}/configs/jellyfin/cache:/cache
      - ${ROOT_DIR:-.}/configs/jellyfin/config:/config
      - ${ROOT_DIR:-.}/configs/jellyfin/transcode:/transcode
      - ${ROOT_DIR:-.}/configs/jellyfin/log:/config/log
      - ${ROOT_DIR:-.}/configs/jellyfin/temp:/tmp/jellyfin
    environment:
      <<: *common-env
      JELLYFIN_PublishedServerUrl: https://jellyfin.${DOMAIN}
    labels:
      <<: *jellyfin-labels
      homepage.group: Media Streaming
      homepage.name: Jellyfin Media Server
      homepage.icon: jellyfin.png
      homepage.href: https://jellyfin.${DOMAIN}/
      homepage.description: Organize and stream your movies, TV shows, and music to any device, creating your own personal media center.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *jellyfin-labels
    restart: unless-stopped

  bazarr:
    # 🔹🔹 Bazarr 🔹🔹
    image: linuxserver/bazarr
    container_name: bazarr
    hostname: bazarr
    networks:
      - infranet
      - traefik_public
    ports:
      - ${BAZARR_PORT:-6767}:6767
    volumes:
      - ${ROOT_DIR:-.}/configs/bazarr/config:/config
      - ${ROOT_DIR:-.}/data/media/anime:/media/anime
      - ${ROOT_DIR:-.}/data/media/movies:/media/movies
      - ${ROOT_DIR:-.}/data/media/tv:/media/tv
      - ${ROOT_DIR:-.}/data/downloads/bazarr:/downloads
    environment:
      <<: *common-env
    labels:
      <<: *bazarr-labels
      homepage.group: Media Management
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: https://bazarr.${DOMAIN}/
      homepage.description: Companion application to Sonarr and Radarr for automatic subtitle downloading and management in multiple languages.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *bazarr-labels
    restart: unless-stopped

  checkrr:
    # 🔹🔹 Checkrr 🔹🔹  https://github.com/aetaric/checkrr
    # Scan your library files for corrupt media and replace the files via sonarr and radarr
    image: aetaric/checkrr:3.4.0
    container_name: checkrr
    hostname: checkrr
    networks:
      - infranet
    ports:
      - ${CHECKRR_PORT:-8585}:8585
    volumes:
#      - ${ROOT_DIR:-.}/configs/certs:/certs
      - ${ROOT_DIR:-.}/configs/checkrr/config/checkrr.db:/checkrr.db
      - ${ROOT_DIR:-.}/configs/checkrr/config/checkrr.yaml:/checkrr.yaml
      - ${ROOT_DIR:-.}/configs/checkrr/logs:/logs
      - ${ROOT_DIR:-.}/data/media:/media
    environment:
      <<: *common-env
      GIN_MODE: release
    labels:
      <<: *checkrr-labels
      homepage.group: System Monitoring
      homepage.name: Checkrr
      homepage.icon: checkrr.png
      homepage.href: https://checkrr.${DOMAIN}/
      homepage.description: A comprehensive system monitoring tool that checks the health and status of your various services and applications.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *checkrr-labels
    restart: unless-stopped

  lidarr:
    # 🔹🔹 Lidarr 🔹🔹
    image: linuxserver/lidarr
    container_name: lidarr
    hostname: lidarr
    networks:
      - infranet
      - traefik_public
    ports:
      - ${LIDARR_PORT:-8686}:8686
    volumes:
      - ${ROOT_DIR:-.}/data/media/music/videos:/media/music/videos
      - ${ROOT_DIR:-.}/data/media/music:/media/music
      - ${ROOT_DIR:-.}/configs/lidarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *lidarr-labels
      homepage.group: Music Management
      homepage.name: Lidarr Music
      homepage.icon: lidarr.png
      homepage.href: https://lidarr.${DOMAIN}
      homepage.description: Helps you automatically download and organize your music collection, ensuring correct metadata and album art.
      homepage.weight: 2
      homepage.widget.type: lidarr
      homepage.widget.url: https://lidarr.${DOMAIN}
      homepage.widget.key: ${LIDARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *lidarr-labels
    healthcheck:
      test: curl -fSs http://localhost:8686 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
    restart: unless-stopped

  radarr:
    # 🔹🔹 Radarr 🔹🔹
    image: linuxserver/radarr
    container_name: radarr
    hostname: ${RADARR_HOSTNAME:-radarr}
    networks:
      - infranet
      - traefik_public
    ports:
      - ${RADARR_PORT:-7878}:7878
    volumes:
      - ${ROOT_DIR:-.}/data/media/movies:/movies
      - ${ROOT_DIR:-.}/data/downloads/movies:/downloads/movies
      - ${ROOT_DIR:-.}/configs/radarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *radarr-labels
      homepage.group: Movie Management
      homepage.name: Radarr Movies
      homepage.icon: radarr.png
      homepage.href: https://radarr.${DOMAIN:-bolabaden.org}
      homepage.description: Automates your movie downloads, finding and adding new releases to your collection as they become available.
      homepage.weight: 1
      homepage.widget.type: radarr
      homepage.widget.url: https://radarr.${DOMAIN:-bolabaden.org}
      homepage.widget.key: ${RADARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *radarr-labels
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=${RADARR_HEALTHCHECK_TIMEOUT:-4s}
        - --tries=${RADARR_HEALTHCHECK_INTERNAL_RETRIES:-1}
        - --spider
        - http://localhost:7878/ping
      interval: ${RADARR_HEALTHCHECK_INTERVAL:-5s}
      timeout: ${RADARR_HEALTHCHECK_TIMEOUT:-4s}
      retries: ${RADARR_HEALTHCHECK_RETRIES:-4}
      start_period: ${RADARR_HEALTHCHECK_START_PERIOD:-5s}
    restart: unless-stopped

  readarr:
    # 🔹🔹 Readarr 🔹🔹
    image: linuxserver/readarr:develop
    container_name: readarr
    hostname: readarr
    networks:
      - infranet
      - traefik_public
    ports:
      - ${READARR_PORT:-8787}:8787
    volumes:
      - ${ROOT_DIR:-.}/configs/readarr/config:/config
      - ${ROOT_DIR:-.}/data/media/books:/books
      - ${ROOT_DIR:-.}/data/media/comics:/comics
      - ${ROOT_DIR:-.}/data/media/manga:/manga
      - ${ROOT_DIR:-.}/data/downloads:/downloads
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *readarr-labels
      homepage.group: E-books & Comics
      homepage.name: Readarr
      homepage.icon: readarr.png
      homepage.href: https://readarr.${DOMAIN}
      homepage.description: Manages and automates the downloading of ebooks and audiobooks, ensuring your digital library is always up-to-date.
      homepage.weight: 5
      homepage.widget.type: readarr
      homepage.widget.url: https://readarr.${DOMAIN}
      homepage.widget.key: ${READARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *readarr-labels
    restart: unless-stopped

  requestrr:
    image: thomst08/requestrr
    container_name: requestrr
    hostname: requestrr
    networks:
      - infranet
    ports:
      - ${REQUESTRR_PORT:-4545}:4545
    volumes:
      - ${ROOT_DIR:-.}/configs/requestrr/config:/root/config
    <<: *resource-limits
    environment:
      <<: *common-env
    restart: unless-stopped

  sonarr:
    # 🔹🔹 Sonarr 🔹🔹
    # Sonarr is a PVR for Usenet and BitTorrent users. It's a sleek Web UI that integrates seamlessly with your various PVR apps.
    image: linuxserver/sonarr
    container_name: sonarr
    hostname: sonarr
    networks:
      - infranet
      - traefik_public
    ports:
      - ${SONARR_PORT:-8989}:8989
    volumes:
      - ${ROOT_DIR:-.}/data/media/anime:/anime
      - ${ROOT_DIR:-.}/data/media/tv:/tv
      - ${ROOT_DIR:-.}/data/downloads/anime:/downloads/anime
      - ${ROOT_DIR:-.}/data/downloads/tv:/downloads/tv
      - ${ROOT_DIR:-.}/configs/sonarr/config:/config
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *sonarr-labels
      homepage.group: TV Management
      homepage.name: Sonarr TV
      homepage.icon: sonarr.png
      homepage.href: https://sonarr.${DOMAIN}
      homepage.description: Manages your TV show downloads, automatically finding and adding new episodes as they air, keeping your library organized.
      homepage.weight: 0
      homepage.widget.type: sonarr
      homepage.widget.url: https://sonarr.${DOMAIN}
      homepage.widget.key: ${SONARR_API_KEY}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *sonarr-labels
    restart: unless-stopped

  tdarr:
    # 🔹🔹 Tdarr 🔹🔹  # https://github.com/haveagitgat/tdarr
    # Library Optimizer
    # use this one with arm:
    # image: ghcr.io/haveagitgat/tdarr:2.35.02@sha256:14a86431d9d86070915d8ff444e6d56ec4e5fb78b0bd664e07d67e5f3b93e839
    image: ghcr.io/haveagitgat/tdarr
    container_name: tdarr
    hostname: tdarr
    networks:
      - infranet
    ports:
      - ${TDARR_WEBUI_PORT:-8265}:${TDARR_WEBUI_PORT:-8265} # WebUI port
      - ${TDARR_SERVER_PORT:-8266}:${TDARR_SERVER_PORT:-8266} # Server port
    volumes:
      - ${ROOT_DIR:-.}/configs/tdarr/configs:/app/configs
      - ${ROOT_DIR:-.}/configs/tdarr/logs:/app/logs
      - ${ROOT_DIR:-.}/configs/tdarr/server:/app/server
      - ${ROOT_DIR:-.}/configs/tdarr/transcode_cache:/temp
      - ${ROOT_DIR:-.}/data/media/anime:/media/anime
      - ${ROOT_DIR:-.}/data/media/movies:/media/movies
      - ${ROOT_DIR:-.}/data/media/tv:/media/tv
    #      devices:
    #      - driver: nvidia
    #        count: all
    #        capabilities: [gpu]
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      UMASK_SET: 002
      ffmpegVersion: ${TDARR_FFMPEG_VERSION:-6}
      inContainer: ${TDARR_IN_CONTAINER:-true}
      internalNode: ${TDARR_INTERNAL_NODE:-true}
      nodeName: ${TDARR_NODE_NAME:-MyInternalNode}
      serverIP: ${TDARR_SERVER_IP:-0.0.0.0}
      serverPort: ${TDARR_SERVER_PORT:-8266}
      webUIPort: ${TDARR_WEBUI_PORT:-8265}
      #NVIDIA_DRIVER_CAPABILITIES: all
      #NVIDIA_VISIBLE_DEVICES: all
    labels:
      <<: *tdarr-labels
      homepage.group: Media Processing
      homepage.name: Tdarr
      homepage.icon: tdarr.png
      homepage.href: https://tdarr.${DOMAIN}
      homepage.description: Transcodes and processes your media files, ensuring they are optimized for playback on various devices and platforms.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *tdarr-labels
    restart: unless-stopped

  unpackerr:
    # 🔹🔹 Unpackerr 🔹🔹
    # Extracts downloads for Radarr, Sonarr, Lidarr, Readarr, and/or a Watch folder - Deletes extracted files after import
    image: golift/unpackerr
    container_name: unpackerr
    hostname: unpackerr
    networks:
      - infranet
    ports:
      - ${UN_WEBSERVER_PORT:-5656}:${UN_WEBSERVER_PORT:-5656}
    security_opt:
      - no-new-privileges:true
    <<: [*common-uidgid, *common-logging, *resource-limits]
    # Uncomment the devices section for tv tuners and intel gpus
    #devices:
    #- /dev/dri/card0:/dev/dri/card0
    #- /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      # You need at least this one volume mapped so Unpackerr can find your files to extract.
      # Make sure this matches your Starr apps; the folder mount (/downloads or /data) should be identical.
      - ${ROOT_DIR:-.}/data/downloads:/downloads
      # Feel free to change the config and logs paths to match your host system.
      - ${ROOT_DIR:-.}/configs/unpackerr/config:/config
      - ${ROOT_DIR:-.}/configs/unpackerr/logs:/logs
      - ${ROOT_DIR:-.}/certs:/certs
    # What you see below are defaults mixed with examples where examples make more sense than the .
    # You only need to modify things specific to your environment.
    # Remove apps and feature configs you do not use or need.
    # ie. Remove all lines that begin with UN_CMDHOOK, UN_WEBHOOK,
    #     UN_FOLDER, UN_WEBSERVER, and other apps you do not use.
    environment:
      <<: *common-env
      ## General Config
      UN_ACTIVITY: ${UN_ACTIVITY:-false} # Setting activity to true will silence all app queue log lines with only zeros.
      UN_DEBUG: ${UN_DEBUG:-true} # Turn on debug messages in the output. Recommend trying this so you know what it looks like. I personally leave it on.
      UN_DIR_MODE: ${UN_DIR_MODE:-0755} # What mode to create directories with
      UN_ERROR_STDERR: ${UN_ERROR_STDERR:-false} # Send error output to stderr instead of stdout by setting error_stderr to true.
      UN_FILE_MODE: ${UN_FILE_MODE:-0644} # What mode to create files with
      UN_INTERVAL: ${UN_INTERVAL:-2m} # How often to poll sonarr and radarr.
      UN_LOG_FILE_MB: ${UN_LOG_FILE_MB:-10} # How large to make each log file
      UN_LOG_FILE: ${UN_LOG_FILE:-/logs/unpackerr_main.log} # Log file path
      UN_LOG_FILES: ${UN_LOG_FILES:-10} # How many log files to keep
      UN_LOG_QUEUES: ${UN_LOG_QUEUES:-1m} # The Starr-application activity queue is logged on an interval.
      UN_MAX_RETRIES: ${UN_MAX_RETRIES:-3} # How many times to retry a failed extraction. Pauses `UN_RETRY_DELAY` between attempts.
      UN_PARALLEL: ${UN_PARALLEL:-1} # How many files may be extracted in parallel. 1 works fine. Raise this only if you have fast disks and CPU.
      UN_QUIET: ${UN_QUIET:-false} # Disable writing messages to stdout/stderr. This silences the app.
      UN_RETRY_DELAY: ${UN_RETRY_DELAY:-5m} # How long to wait before removing the history for a failed extraction.
      UN_START_DELAY: ${UN_START_DELAY:-1m} # How long an item must be queued (download complete) before extraction will start.
      # Webserver Config
      UN_WEBSERVER_LISTEN_ADDR: ${UN_WEBSERVER_LISTEN_IP_ADDR:-0.0.0.0}:${UN_WEBSERVER_PORT:-5656} # The address and port to listen on.
      UN_WEBSERVER_LOG_FILE_MB: ${UN_WEBSERVER_LOG_FILE_MB:-1} # How large to make each log file
      UN_WEBSERVER_LOG_FILE: ${UN_WEBSERVER_LOG_FILE:-/logs/unpackerr_webserver.log} # Log file path
      UN_WEBSERVER_LOG_FILES: ${UN_WEBSERVER_LOG_FILES:-10} # How many log files to keep
      UN_WEBSERVER_METRICS: ${UN_WEBSERVER_METRICS:-false} # Enable metrics collection.
      UN_WEBSERVER_SSL_CERT_FILE: ${UN_WEBSERVER_SSL_CERT_FILE:-/certs/cert.pem} # Path to the SSL certificate file
      UN_WEBSERVER_SSL_KEY_FILE: ${UN_WEBSERVER_SSL_KEY_FILE:-/certs/key.pem} # Path to the SSL key file
      UN_WEBSERVER_UPSTREAMS: ${UN_WEBSERVER_UPSTREAMS:-} # [] / List of upstream proxy CIDRs or IPs to trust.
      UN_WEBSERVER_URLBASE: ${UN_WEBSERVER_URLBASE:-} # The base URL to use for the webserver.
      ## Folder Config
      UN_FOLDER_0_DELETE_AFTER: ${UN_FOLDER_0_DELETE_AFTER:-10m} # The  is 0. Set to 0 to disable all deletes. Uncomment it to enable deletes. Uses Go Duration.
      UN_FOLDER_0_DELETE_FILES: ${UN_FOLDER_0_DELETE_FILES:-false} # Delete extracted files after successful extraction? true/false, no quotes. Honors delete_after.
      UN_FOLDER_0_DELETE_ORIGINAL: ${UN_FOLDER_0_DELETE_ORIGINAL:-true} # Delete original items after successful extraction? true/false, no quotes. Honors delete_after.
      UN_FOLDER_0_DISABLE_LOG: ${UN_FOLDER_0_DISABLE_LOG:-false} # Disable extraction log (unpackerred.txt) file creation? true/false, no quotes.
      UN_FOLDER_0_DISABLE_RECURSION: ${UN_FOLDER_0_DISABLE_RECURSION:-false} # Unpackerr extracts archives inside archives. Set this to true to disable recursive extractions.
      UN_FOLDER_0_EXTRACT_ISOS: ${UN_FOLDER_0_EXTRACT_ISOS:-false} # Set this to true if you want this app to extract ISO files with .iso extension.
      UN_FOLDER_0_EXTRACT_PATH: ${UN_FOLDER_0_EXTRACT_PATH:-} # No Default / Where to extract to. Uses UN_FOLDER_0_PATH if not set.
      UN_FOLDER_0_MOVE_BACK: ${UN_FOLDER_0_MOVE_BACK:-true} # Move extracted files into original folder? If `false`, files go into an '_unpackerred' folder.
      UN_FOLDER_0_PATH: ${UN_FOLDER_0_PATH:-/downloads/auto_extract} # No Default / Folder to watch for archives. Not for Starr apps.
      UN_FOLDERS_INTERVAL: ${UN_FOLDERS_INTERVAL:-2m} # "0s" / How often poller checks for new folders. Use 1ms to disable it.
      # Lidarr
      UN_LIDARR_0_API_KEY: ${LIDARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_LIDARR_0_DELETE_DELAY: ${UN_LIDARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_LIDARR_0_DELETE_ORIG: ${UN_LIDARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_LIDARR_0_PATHS_0: ${UN_LIDARR_0_PATHS_0:-/downloads/music}
      UN_LIDARR_0_PROTOCOLS: ${UN_LIDARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_LIDARR_0_SYNCTHING: ${UN_LIDARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_LIDARR_0_TIMEOUT: ${UN_LIDARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_LIDARR_0_URL: http://lidarr:${LIDARR_PORT:-8686} # What is the address of the app on your system (open it in the browser and copy it)
      # Radarr
      UN_RADARR_0_API_KEY: ${RADARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_RADARR_0_DELETE_DELAY: ${UN_RADARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_RADARR_0_DELETE_ORIG: ${UN_RADARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_RADARR_0_PATHS_0: ${UN_RADARR_0_PATHS_0:-/downloads/movies}
      UN_RADARR_0_PROTOCOLS: ${UN_RADARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_RADARR_0_SYNCTHING: ${UN_RADARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_RADARR_0_TIMEOUT: ${UN_RADARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_RADARR_0_URL: http://radarr:${RADARR_PORT:-7878} # What is the address of the app on your system (open it in the browser and copy it)
      # Readarr
      UN_READARR_0_API_KEY: ${READARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_READARR_0_DELETE_DELAY: ${UN_READARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_READARR_0_DELETE_ORIG: ${UN_READARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_READARR_0_PATHS_0: ${UN_READARR_0_PATHS_0:-/downloads/books}
      UN_READARR_0_PATHS_1: ${UN_READARR_0_PATHS_1:-/downloads/comics}
      UN_READARR_0_PATHS_2: ${UN_READARR_0_PATHS_2:-/downloads/manga}
      UN_READARR_0_PROTOCOLS: ${UN_READARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_READARR_0_SYNCTHING: ${UN_READARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_READARR_0_TIMEOUT: ${UN_READARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_READARR_0_URL: http://readarr:${READARR_PORT:-8787} # What is the address of the app on your system (open it in the browser and copy it)
      # Sonarr
      UN_SONARR_0_API_KEY: ${SONARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_SONARR_0_DELETE_DELAY: ${UN_SONARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_SONARR_0_DELETE_ORIG: ${UN_SONARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_SONARR_0_PATHS_0: ${UN_SONARR_0_PATHS_0:-/downloads/anime}
      UN_SONARR_0_PATHS_1: ${UN_SONARR_0_PATHS_1:-/downloads/tv}
      UN_SONARR_0_PROTOCOLS: ${UN_SONARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_SONARR_0_SYNCTHING: ${UN_SONARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_SONARR_0_TIMEOUT: ${UN_SONARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_SONARR_0_URL: http://sonarr:${SONARR_PORT:-8989} # What is the address of the app on your system (open it in the browser and copy it)
      # Whisparr
      UN_WHISPARR_0_API_KEY: ${WHISPARR_API_KEY} # What is the app apikey, Settings -> General (Feel free to leave this blank here and add it to your generated config later)
      UN_WHISPARR_0_DELETE_DELAY: ${UN_WHISPARR_0_DELETE_DELAY:-5m} # How long to wait after import before deleting the extracted items.
      UN_WHISPARR_0_DELETE_ORIG: ${UN_WHISPARR_0_DELETE_ORIG:-true} # Setting this to true deletes the entire original download folder after import.
      UN_WHISPARR_0_PATHS_0: ${UN_WHISPARR_0_PATHS_0:-/downloads/xxx}
      UN_WHISPARR_0_PROTOCOLS: ${UN_WHISPARR_0_PROTOCOLS:-torrent,usenet} # Default protocols is torrent. Alternative: torrent,usenet
      UN_WHISPARR_0_SYNCTHING: ${UN_WHISPARR_0_SYNCTHING:-false} # If you use Syncthing, setting this to true will make unpackerr wait for syncs to finish.
      UN_WHISPARR_0_TIMEOUT: ${UN_WHISPARR_0_TIMEOUT:-10s} # How long to wait for a reply from the backend.
      UN_WHISPARR_0_URL: http://whisparr:${WHISPARR_PORT:-6969} # What is the address of the app on your system (open it in the browser and copy it)
      ## Web Hooks
      #UN_WEBHOOK_0_URL: ${UN_WEBHOOK_0_URL:-}  # e.g. https://notifiarr.com/api/v1/notification/unpackerr/api_key_from_notifiarr_com
      #UN_WEBHOOK_0_NAME: ${UN_WEBHOOK_0_NAME:-}  # Set this to hide the URL in logs.
      #UN_WEBHOOK_0_SILENT: ${UN_WEBHOOK_0_SILENT:-true}  # Turns off success logs (less log spam)
      #UN_WEBHOOK_0_EVENTS_0: ${UN_WEBHOOK_0_EVENTS_0:-1}  # list of event ids to include, 0 == all. Example: 1,2,3,4
      #UN_WEBHOOK_0_EVENTS_1: ${UN_WEBHOOK_0_EVENTS_1:-4}  # 1 = download started, 2 = download finished, 3 = extraction started
      #UN_WEBHOOK_0_EVENTS_2: ${UN_WEBHOOK_0_EVENTS_2:-6}  # 4 = extraction finished, 5 = download failed, 6 = extraction failed
      #UN_WEBHOOK_0_NICKNAME: ${UN_WEBHOOK_0_NICKNAME:-Unpackerr}  # Used in Discord and Slack templates as bot name, in Telegram as chat_id.
      #UN_WEBHOOK_0_CHANNEL: ${UN_WEBHOOK_0_CHANNEL:-}  # Also passed into templates. Used in Slack templates for destination channel.
      #UN_WEBHOOK_0_EXCLUDE_0: ${UN_WEBHOOK_0_EXCLUDE_0:-}  # List of apps to exclude, Example: radarr, lidarr
      #UN_WEBHOOK_0_EXCLUDE_1: ${UN_WEBHOOK_0_EXCLUDE_1:-}
      #UN_WEBHOOK_0_TEMPLATE_PATH: ${UN_WEBHOOK_0_TEMPLATE_PATH:-}  # Override internal webhook template for discord.com or other hooks.
      #UN_WEBHOOK_0_TEMPLATE: ${UN_WEBHOOK_0_TEMPLATE:-}  # Override automatic template detection. Values: notifiarr, discord, telegram, gotify, pushover, slack
      #UN_WEBHOOK_0_IGNORE_SSL: ${UN_WEBHOOK_0_IGNORE_SSL:-true}  # Set this to true to ignore the SSL certificate on the server.
      #UN_WEBHOOK_0_TIMEOUT: ${UN_WEBHOOK_0_TIMEOUT:-10s}  # You can adjust how long to wait for a server response.
      #UN_WEBHOOK_0_CONTENT_TYPE: ${UN_WEBHOOK_0_CONTENT_TYPE:-application/json}  # If your custom template uses another MIME type, set this.
      ## Command Hooks
      #UN_CMDHOOK_0_COMMAND: ${UN_CMDHOOK_0_COMMAND:-/downloads/scripts/command.sh}  # Path to command or script.
      #UN_CMDHOOK_0_EVENTS_0: ${UN_CMDHOOK_0_EVENTS_0:-1}  # list of event ids to include, 0 == all. Example: 1,2,3,4
      #UN_CMDHOOK_0_EVENTS_1: ${UN_CMDHOOK_0_EVENTS_1:-4}  # 1 = download started, 2 = download finished, 3 = extraction started
      #UN_CMDHOOK_0_EVENTS_2: ${UN_CMDHOOK_0_EVENTS_2:-7}  # 4 = extraction finished, 5 = download failed, 6 = extraction failed
      #UN_CMDHOOK_0_EXCLUDE_0: ${UN_CMDHOOK_0_EXCLUDE_0:-}  # list of apps to
      #UN_CMDHOOK_0_EXCLUDE_1: ${UN_CMDHOOK_0_EXCLUDE_1:-}  # exclude, Example: radarr, lidarr
      #UN_CMDHOOK_0_NAME: ${UN_CMDHOOK_0_NAME:-}  # Provide an optional name for logging.
      #UN_CMDHOOK_0_SHELL: ${UN_CMDHOOK_0_SHELL:-false}  # Runs the command inside /bin/sh ('nix) or cmd.exe (Windows).
      #UN_CMDHOOK_0_SILENT: ${UN_CMDHOOK_0_SILENT:-false}  # Hides command output from logs.
      #UN_CMDHOOK_0_TIMEOUT: ${UN_CMDHOOK_0_TIMEOUT:-10s}  # You can adjust how long to wait for a server response.
    labels:
      <<: *unpackerr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *unpackerr-labels
    restart: unless-stopped

  whisparr:
    # 🔹🔹 Whisparr 🔹🔹  https://github.com/thespad/whisparr
    # Whisparr is a fork of Sonarr for managing and downloading adult content.
    image: ghcr.io/thespad/whisparr
    container_name: whisparr
    hostname: whisparr
    networks:
      - infranet
    ports:
      - ${WHISPARR_PORT:-6969}:6969
    volumes:
      - ${ROOT_DIR:-.}/configs/whisparr/config:/config
      - ${ROOT_DIR:-.}/data/downloads/xxx:/downloads/xxx
      - ${ROOT_DIR:-.}/data/media/xxx:/xxx
    <<: [*resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *whisparr-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *whisparr-labels
    healthcheck:
      test: curl -fSs http://localhost:6969 > /dev/null || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
    restart: unless-stopped

  keycloak:
    # 🔹🔹 Keycloak 🔹🔹
    depends_on:
      - keycloak-postgres
      - traefik
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    hostname: keycloak
    command: start-dev
    networks:
      - infranet
      - traefik_public
    ports:
      - ${KEYCLOAK_PORT:-8075}:8080
    volumes:
      - ${ROOT_DIR:-.}/configs/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    secrets:
      - keycloak_admin_password
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      KC_DB: ${KEYCLOAK_DB:-postgres}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_postgres}
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:${KEYCLOAK_POSTGRES_PORT:-5431}/${KEYCLOAK_POSTGRES_DB:-keycloak}
      KC_HOSTNAME: keycloak-postgres
      KC_LOG_LEVEL: ${KEYCLOAK_LOGLEVEL:-INFO}
      KC_PROXY: ${KEYCLOAK_PROXY:-edge}
      KEYCLOAK_ADMIN_PASSWORD: /run/secrets/keycloak_admin_password
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      PROXY_ADDRESS_FORWARDING: ${KEYCLOAK_PROXY_ADDRESS_FORWARDING:-true}
    labels:
      <<: *keycloak-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      placement:
        <<: *constraints-storage-only
      labels:
        <<: *keycloak-labels
    restart: unless-stopped

  keycloak-postgres:
    # 🔹🔹 Keycloak Database 🔹🔹
    depends_on:
      - redis
    image: postgres:17.4
    container_name: keycloak-postgres
    hostname: keycloak-postgres
    networks:
      - infranet
    ports:
      - ${KEYCLOAK_POSTGRES_PORT:-5431}:5432
    volumes:
      - ${ROOT_DIR:-.}/configs/keycloak/db:/var/lib/postgresql/data
    <<: [*common-uidgid, *common-logging, *resource-limits]
    secrets:
      - keycloak_postgres_password
      - keycloak_postgres_root_password
    environment:
      <<: *common-env
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: /run/secrets/keycloak_postgres_password
      POSTGRES_ROOT_PASSWORD: /run/secrets/keycloak_postgres_root_password
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *keycloak-labels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB:-keycloak} -U $${POSTGRES_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  deluge:
    # 🔹🔹 Deluge 🔹🔹
    depends_on:
      - gluetun-openvpn
    image: linuxserver/deluge
    container_name: deluge
    <<: [*common-uidgid, *common-logging, *resource-limits]
    network_mode: service:gluetun-openvpn
    volumes:
      - ${ROOT_DIR:-.}/data/downloads:/downloads:rw
      - ${ROOT_DIR:-.}/configs/deluge:/config:rw
    environment:
      <<: *common-env
      DELUGE_LOGLEVEL: ${DELUGE_LOGLEVEL:-info}
    labels:
      homepage.group: Download Clients
      homepage.name: Deluge
      homepage.icon: deluge.png
      homepage.href: https://deluge.${DOMAIN}/
      homepage.description: A lightweight, cross-platform BitTorrent client designed for downloading files efficiently and securely from the internet.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  qbittorrent:
    # 🔹🔹 qBittorrent 🔹🔹
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    hostname: qbittorrent
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${QB_WEBUI_PORT:-8084}:${QB_WEBUI_PORT:-8084}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}
      - ${QB_TORRENTING_PORT:-6881}:${QB_TORRENTING_PORT:-6881}/udp
    volumes:
      - ${ROOT_DIR:-.}/data/downloads:/downloads
      - ${ROOT_DIR:-.}/configs/qbittorrent/config:/config
      - ${ROOT_DIR:-.}/configs/qbittorrent/scripts:/scripts
    environment:
      <<: *common-env
      TORRENTING_PORT: ${QB_TORRENTING_PORT:-6881}
      WEBUI_PORT: ${QB_WEBUI_PORT:-8084}
    labels:
      <<: *qbittorrent-labels
      #com.centurylinklabs.watchtower.depends-on: /vpn
      homepage.group: Download Clients
      homepage.name: qBittorrent Downloader
      homepage.icon: qbittorrent.png
      homepage.href: https://qbittorrent.${DOMAIN}
      homepage.description: A user-friendly torrent client for downloading and managing files via BitTorrent, offering a clean interface and powerful features.
      homepage.weight: 2
      homepage.widget.type: qbittorrent
      homepage.widget.url: https://qbittorrent.${DOMAIN}
      homepage.widget.username: ${QBITTORRENT_USERNAME:-admin}
      homepage.widget.password: ${QBITTORRENT_PASSWORD:-adminadmin}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *qbittorrent-labels
    restart: unless-stopped

  transmission:
    # 🔹🔹 Transmission 🔹🔹
    depends_on:
      - gluetun-openvpn
    image: linuxserver/transmission
    container_name: transmission
    <<: [*common-uidgid, *common-logging, *resource-limits]
    network_mode: service:gluetun-openvpn
    volumes:
      - ${ROOT_DIR:-.}/configs/transmission/data:/config
      - ${ROOT_DIR:-.}/data/watch:/watch
      - ${ROOT_DIR:-.}/data/downloads/complete:/downloads/complete
      - ${ROOT_DIR:-.}/data/downloads/incomplete:/downloads/incomplete
    environment:
      <<: *common-env
      HOST_WHITELIST: ${TRANSMISSION_HOST_WHITELIST:-}
      USER: ${TRANSMISSION_USER:-admin}
      PASS: ${TRANSMISSION_PASS:-admin}
      PEERPORT: ${TRANSMISSION_PEERPORT:-51413}
      TRANSMISSION_WEB_HOME: ${TRANSMISSION_WEB_HOME:-}
    labels:
      homepage.group: Download Clients
      homepage.name: Transmission Downloader
      homepage.icon: transmission.png
      homepage.href: https://transmission.${DOMAIN}
      homepage.description: A lightweight and efficient BitTorrent client for downloading and managing torrent files, known for its simplicity and speed.
      homepage.weight: 2
      homepage.widget.type: transmission
      homepage.widget.url: https://transmission.${DOMAIN}
      homepage.widget.username: ${TRANSMISSION_USERNAME:-admin}
      homepage.widget.password: ${TRANSMISSION_PASSWORD:-admin}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  prometheus:
    # 🔹🔹 Prometheus 🔹🔹  https://github.com/prometheus/prometheus
    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    <<: *resource-limits
    networks:
      - infranet
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ${ROOT_DIR:-.}/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command: [
        "--config.file=/etc/prometheus/prometheus.yml", # Specifies the path to the Prometheus configuration file
        "--storage.tsdb.retention.size=1GB", # Sets the maximum size of the time series database to 1GB
        "--web.console.libraries=/etc/prometheus/console_libraries", # Path to console libraries for the web UI
        "--web.console.templates=/etc/prometheus/consoles", # Path to console templates for the web UI
        "--web.enable-lifecycle", # Enables lifecycle management for the web interface (e.g., for graceful shutdown)
      ]
    labels:
      homepage.group: Server Monitoring
      homepage.name: Prometheus Monitoring
      homepage.icon: prometheus.png
      homepage.href: https://prometheus.${DOMAIN}
      homepage.description: Monitors your server's performance and resource usage, providing detailed metrics and alerts to help you maintain system health.
    environment:
      <<: *common-env
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      resources:
        limits:
          cpus: "0.50" # Sets a limit of 0.5 CPU for the service
          memory: 512M # Sets a limit of 1024 MB of memory for the service
        reservations:
          cpus: "0.50" # Reserves 0.5 CPU for the service
          memory: 128M # Reserves 128 MB of memory for the service
    restart: unless-stopped

  redis:
    #image: redis:alpine
    image: docker.io/library/redis:alpine
    container_name: redis
    hostname: redis
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${REDIS_PORT:-6379}:6379
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/redis:/data
      - ${ROOT_DIR:-.}/configs/redis/etc/sysctl.conf:/etc/sysctl.conf
    command: --save 60 1 --loglevel warning
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    restart: unless-stopped

  searxng:
    # 🔹🔹 SearxNG 🔹🔹  # https://hub.docker.com/r/searxng/searxng
    # SearxNG is a privacy-respecting, hackable, open-source metasearch engine.
    image: docker.io/searxng/searxng
    container_name: searxng
    hostname: searxng
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${SEARXNG_PORT:-8077}:8080
    volumes:
      - ${ROOT_DIR:-.}/configs/searxng:/etc/searxng
    environment:
      <<: *common-env
      SEARXNG_BASE_URL: http://searxng.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://searxng.${DOMAIN}/health"]
      interval: 30s
      timeout: 10s
      retries: 2
    restart: unless-stopped

  autoheal:
    # 🔹🔹 Autoheal 🔹🔹
    # Monitor and restart unhealthy docker containers.
    image: willfarrell/autoheal
    container_name: autoheal
    hostname: autoheal
    <<: [*common-uidgid, *common-logging, *resource-limits]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      <<: *common-env
      AUTOHEAL_CONTAINER_LABEL: ${AUTOHEAL_CONTAINER_LABEL:-all}
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: ${AUTOHEAL_DEFAULT_STOP_TIMEOUT:-10}
      AUTOHEAL_ONLY_MONITOR_RUNNING: ${AUTOHEAL_ONLY_MONITOR_RUNNING:-false}
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL:-5}
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD:-30}
      CURL_TIMEOUT: ${CURL_TIMEOUT:-30}
      DOCKER_SOCK: ${DOCKER_SOCK:-/var/run/docker.sock}
      WEBHOOK_URL: ${AUTOHEAL_WEBHOOK_URL:-}
    labels:
      autoheal.stop.timeout: 20 # Per containers override for stop timeout seconds during restart
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      replicas: 1
    restart: unless-stopped

  deunhealth:
    # 🔹🔹 DeUnhealth 🔹🔹
    # Restart your unhealthy containers safely (e.g. containers depending on VPN and VPN reconnects)
    image: qmcgaw/deunhealth
    container_name: deunhealth
    <<: [*common-uidgid, *common-logging, *resource-limits]
    network_mode: none
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    environment:
      <<: *common-env
      LOG_LEVEL: ${DEUNHEALTH_LOG_LEVEL:-info}
      HEALTH_SERVER_ADDRESS: ${DEUNHEALTH_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  cadvisor:
    # 🔹🔹 Cadvisor 🔹🔹  # https://github.com/google/cadvisor
    depends_on:
      - prometheus
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    hostname: cadvisor
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${CADVISOR_PORT:-8080}:8080
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
    labels:
      <<: *cadvisor-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *cadvisor-labels
    restart: unless-stopped

  dozzle:
    # 🔹🔹 Dozzle 🔹🔹
    image: amir20/dozzle
    container_name: dozzle
    hostname: dozzle
    networks:
      - infranet
    ports:
      - ${DOZZLE_PORT:-9998}:8080
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
    <<: [*common-uidgid, *common-logging, *resource-limits]
    labels:
      <<: *dozzle-labels
      homepage.group: System Monitoring
      homepage.name: Dozzle
      homepage.icon: dozzle.png
      homepage.href: https://dozzle.${DOMAIN}/
      homepage.description: Real-time log viewer for Docker containers, providing an easy way to monitor application logs and troubleshoot issues.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dozzle-labels
    restart: unless-stopped

  autoindex:
    # 🔹🔹 Autoindex 🔹🔹
    # Simple Directory Index
    image: dceoy/nginx-autoindex
    container_name: autoindex
    hostname: autoindex
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    security_opt:
      - no-new-privileges:true
    ports:
      - ${AUTOINDEX_PORT:-8089}:80
    volumes:
      - ${ROOT_DIR:-.}/data/media:/var/lib/nginx/html:ro # Location you want to index
    environment:
      <<: *common-env
    labels:
      <<: *autoindex-labels
      homepage.group: File Management
      homepage.name: AutoIndex
      homepage.icon: autoindex.png
      homepage.href: https://autoindex.${DOMAIN}/
      homepage.description: A self-hosted file indexer and search engine, providing a simple way to browse and search your files.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *autoindex-labels
    restart: unless-stopped

  cloudflare-ddns:
    image: oznu/cloudflare-ddns
    container_name: cloudflare-ddns
    hostname: cloudflare-ddns
    secrets:
      - cloudflare_api_key
    <<: *resource-limits
    environment:
      - "API_KEY=${CLOUDFLARE_API_KEY}"
      - "ZONE=${CF_ZONE_ID}"  # Your naked domain.
      - "DUCKDNS_SUBDOMAIN=${DUCKDNS_SUBDOMAIN}"  # The particular DNS record to update with an A record for dyndns
      - "DNS_SERVER=${CLOUDFLARE_DNS_SERVER:-1.0.0.1}"
    dns: ${CLOUDFLARE_DNS_SERVER:-1.0.0.1}
    restart: unless-stopped

  code-server:
    # 🔹🔹 Code Server 🔹🔹
    image: linuxserver/code-server:latest
    container_name: code-server
    hostname: code-server
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${CODE_SERVER_PORT:-8443}:8443
    volumes:
      - ${ROOT_DIR:-.}:/workspace
    environment:
      <<: *common-env
      PASSWORD: ${CODESERVER_PASSWORD}
      CODE_SERVER_HASHED_PASSWORD: ${CODE_SERVER_HASHED_PASSWORD}
      SUDO_PASSWORD: ${SUDO_PASSWORD}
      CODE_SERVER_SUDO_HASHED_PASSWORD: ${CODE_SERVER_SUDO_HASHED_PASSWORD}
      PROXY_DOMAIN: ${CODE_SERVER_PROXY_DOMAIN:-}
      DEFAULT_WORKSPACE: /workspace
    secrets:
      - code-server-password
      - code-server-sudo-password
    labels:
      <<: *code-server-labels
      homepage.group: Development
      homepage.name: Code Server
      homepage.icon: code-server.png
      homepage.href: https://code-server.${DOMAIN}/
      homepage.description: A web-based IDE for coding, editing, and debugging code, with support for multiple languages and frameworks.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *code-server-labels
    restart: unless-stopped

  fileflows:
    # 🔹🔹 FileFlows 🔹🔹
    image: revenz/fileflows
    container_name: fileflows
    hostname: fileflows
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${FILEFLOWS_PORT:-19200}:5000
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ${ROOT_DIR:-.}/configs/fileflows/temp:/temp
      - ${ROOT_DIR:-.}/configs/fileflows/data:/Data
      - ${ROOT_DIR:-.}/configs/fileflows/logs:/Logs
    environment:
      <<: *common-env
      TempPathHost: ${TempPathHost:-${ROOT_DIR:-.}/configs/fileflows/temp}
    labels:
      <<: *fileflows-labels
      homepage.group: File Management
      homepage.name: FileFlows
      homepage.icon: fileflows.png
      homepage.href: https://fileflows.${DOMAIN}/
      homepage.description: A web-based file manager and viewer, with support for multiple file types and formats.
      homepage.widget.type: fileflows
      homepage.widget.url: http://fileflows.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *fileflows-labels
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
  karakeep:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep
    hostname: karakeep
    networks:
      - infranet
    volumes:
      # By default, the data is stored in a docker volume called "data".
      # If you want to mount a custom directory, change the volume mapping to:
      # - /path/to/your/directory:/data
      - ${CONFIG_PATH:-./configs}/karakeep/data:/data
    ports:
      - ${KARAKEEP_PORT:-3005}:3000
    environment:
      MEILI_ADDR: http://karakeep-meilisearch:7700
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      # OPENAI_API_KEY: ...

      # You almost never want to change the value of the DATA_DIR variable.
      # If you want to mount a custom directory, change the volume mapping above instead.
      DATA_DIR: /data # DON'T CHANGE THIS
    restart: unless-stopped
  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:123
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    hostname: rclone
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    volumes:
      - ${RCLONE_CACHE_DIR:-/tmp/rclone/cache}:${RCLONE_INTERNAL_CACHE_DIR:-/mnt/cache}
      - ${CONFIG_PATH:-./configs}/rclone/rclone.conf:/config/rclone/rclone.conf
      - ${DATA_DIR:-./data}:${RCLONE_INTERNAL_MOUNT_PATH:-/data}:rshared
    <<: [*common-logging, *resource-limits]
    environment:
      <<: *common-env
    command: |
      mount ${RCLONE_MOUNT_NAME:-bolabaden}: ${RCLONE_INTERNAL_MOUNT_PATH:-/data} \
        --allow-other \
        --allow-non-empty \
        --dir-cache-time=${RCLONE_DIR_CACHE_TIME:-5s} \
        --buffer-size=${RCLONE_BUFFER_SIZE:-64M} \
        --poll-interval=${RCLONE_POLL_INTERVAL:-15s} \
        --use-mmap \
        --vfs-read-ahead=${RCLONE_VFS_READ_AHEAD:-128M} \
        --vfs-read-chunk-size=${RCLONE_VFS_READ_CHUNK_SIZE:-64M} \
        --vfs-read-chunk-size-limit=${RCLONE_VFS_READ_CHUNK_SIZE_LIMIT:-2048M} \
        --vfs-cache-max-age=${RCLONE_VFS_CACHE_MAX_AGE:-48h} \
        --vfs-cache-mode=${RCLONE_VFS_CACHE_MODE:-full} \
        --vfs-cache-poll-interval=${RCLONE_VFS_CACHE_POLL_INTERVAL:-30s} \
        --vfs-cache-max-size=${RCLONE_VFS_CACHE_MAX_SIZE:-10G} \
        --cache-dir=${RCLONE_INTERNAL_CACHE_DIR:-/mnt/cache} \
        --umask=${UMASK:-002} \
        --uid=${PUID:-1002} \
        --gid=${PGID:-988} \
        --exclude "*.accdb" --exclude "*.cdb" --exclude "*.db" --exclude "*.dbf" \
        --exclude "*.dta" --exclude "*.fdb" --exclude "*.frm" --exclude "*.gdb" \
        --exclude "*.h2.db" --exclude "*.ibd" --exclude "*.kexi" --exclude "*.ldf" \
        --exclude "*.mdb" --exclude "*.mdf" --exclude "*.mv.db" --exclude "*.myd" \
        --exclude "*.myi" --exclude "*.ndf" --exclude "*.nsf" --exclude "*.odb" \
        --exclude "*.ora" --exclude "*.pdx" --exclude "*.rdb" --exclude "*.sdb" \
        --exclude "*.sdf" --exclude "*.sqlite" --exclude "*.sqlite3" \
        --exclude "*.sqlitedb" --exclude "*.wdb"
    restart: always

  qdirstat:
    # 🔹🔹 qDirStat 🔹🔹
    # Directory Statistics
    image: jlesage/qdirstat
    container_name: qdirstat
    hostname: qdirstat
    networks:
      - infranet
    security_opt:
      - no-new-privileges:true
    ports:
      - ${QDIRSTAT_PORT:-5800}:5800
    volumes:
      - /volume1:/storage:ro
      - ${ROOT_DIR:-.}/configs/qdirstat/config:/config:rw
      - ${ROOT_DIR:-.}/configs/qdirstat/logs:/config/log
    secrets:
      - qdirstat_vnc_password
    <<: *resource-limits
    environment:
      <<: *common-env
      CLEAN_TMP_DIR: ${QDIRSTAT_CLEAN_TMP_DIR:-1}
      DISPLAY_HEIGHT: ${QDIRSTAT_DISPLAY_HEIGHT:-960}
      DISPLAY_WIDTH: ${QDIRSTAT_DISPLAY_WIDTH:-1600}
      KEEP_APP_RUNNING: ${QDIRSTAT_KEEP_APP_RUNNING:-1}
      UMASK: ${UMASK_SET:-002}
      VNC_PASSWORD: /run/secrets/qdirstat_vnc_password
    labels:
      <<: *qdirstat-labels
      homepage.group: File Management
      homepage.name: QDirStat
      homepage.icon: qdirstat.png
      homepage.href: https://qdirstat.${DOMAIN}
      homepage.description: A tool for visualizing and analyzing directory structures, helping you manage your files more efficiently.
      homepage.weight: 4
      homepage.widget.type: qdirstat
      homepage.widget.url: https://qdirstat.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *qdirstat-labels
    restart: unless-stopped

  homepage:
    # 🔹🔹 Homepage 🔹🔹  # https://github.com/gethomepage/homepage
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    hostname: homepage
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
      - traefik_public
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    environment:
      <<: *common-env
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-0.0.0.0/0,${DOMAIN},*.${DOMAIN}}
      HOMEPAGE_VAR_TITLE: ${HOMEPAGE_VAR_TITLE:-Homepage}
      HOMEPAGE_VAR_SEARCH_PROVIDER: ${HOMEPAGE_VAR_SEARCH_PROVIDER:-google}
      HOMEPAGE_VAR_HEADER_STYLE: ${HOMEPAGE_VAR_HEADER_STYLE:-}
      HOMEPAGE_VAR_WEATHER_CITY: ${HOMEPAGE_VAR_WEATHER_CITY:-Chicago}
      HOMEPAGE_VAR_WEATHER_LAT: ${HOMEPAGE_VAR_WEATHER_LAT:-41.8781}
      HOMEPAGE_VAR_WEATHER_LONG: ${HOMEPAGE_VAR_WEATHER_LONG:--87.6298}
      HOMEPAGE_VAR_WEATHER_TIME: ${HOMEPAGE_VAR_WEATHER_TIME:-}
      HOMEPAGE_VAR_WEATHER_UNIT: ${HOMEPAGE_VAR_WEATHER_UNIT:-fahrenheit}
    volumes:
      - ${SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock:z
      - ${ROOT_DIR:-.}/configs/homepage:/app/config
      - ${ROOT_DIR:-.}/data:/data
    labels:
      <<: *homepage-labels
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *homepage-labels
    restart: unless-stopped

  dashy:
    # 🔹🔹 Dashy 🔹🔹  https://github.com/lissy93/dashy
    # A homepage for your end users
    image: lissy93/dashy
    container_name: dashy
    hostname: dashy
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
      - traefik_public
    volumes:
      - ${ROOT_DIR:-.}/configs/dashy:/app/user-data
    ports:
      - ${DASHY_PORT:-4000}:8080
    environment:
      <<: *common-env
      NODE_ENV: ${DASHY_NODE_ENV:-production}
    labels:
      <<: *dashy-labels
      homepage.group: Dashboards
      homepage.name: Dashy
      homepage.icon: dashy.png
      homepage.href: https://dashy.${DOMAIN}/
      homepage.description: A self-hosted start page for your server, providing easy access to all your services and applications.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *dashy-labels
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck"]
      interval: 1m30s
      timeout: 10s
      start_period: 40s

  speedtest:
    # 🔹🔹 Speedtest 🔹🔹
    image: linuxserver/speedtest-tracker
    container_name: speedtest
    hostname: speedtest
    networks:
      - infranet
      - traefik_public
    ports:
      - ${SPEEDTEST_TRACKER_PORT:-8765}:80
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ROOT_DIR:-.}/configs/speedtest-tracker/config:/config
      - ${ROOT_DIR:-.}/certs/speedtest-tracker/keys:/config/keys
    <<: *resource-limits
    secrets:
      - speedtest_admin_password
    environment:
      <<: *common-env
      ADMIN_EMAIL: ${SPEEDTEST_TRACKER_ADMIN_EMAIL} # Email of the initial admin user. Note: Only effective during initial setup.
      ADMIN_NAME: ${SPEEDTEST_TRACKER_ADMIN_NAME} # Name of the initial admin user. Note: Only effective during initial setup.
      ADMIN_PASSWORD: /run/secrets/speedtest_admin_password # Password of the initial admin user. Note: Only effective during initial setup.
      API_RATE_LIMIT: ${SPEEDTEST_TRACKER_API_RATE_LIMIT:-60} # Number of requests per minute to the API. Default: 60
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY} # Key used to encrypt and decrypt data. You can generate a key at https://speedtest-tracker.dev.
      APP_NAME: ${SPEEDTEST_TRACKER_APP_NAME:-Speedtest Tracker} # Used to define the application's name in the dashboard and in notifications.
      APP_TIMEZONE: ${SPEEDTEST_TRACKER_APP_TIMEZONE:-${TZ:-America/Chicago}} # Application timezone should be set if your database does not use UTC as its  timezone.
      APP_URL: ${SPEEDTEST_TRACKER_APP_URL:-} # URL used for links in emails and notifications.
      ASSET_URL: ${SPEEDTEST_TRACKER_ASSET_URL:-} # URL used for assets, needed when using a reverse proxy.
      CHART_BEGIN_AT_ZERO: ${SPEEDTEST_TRACKER_CHART_BEGIN_AT_ZERO:-true} # Begin the dashboard axis charts at zero. Default: true
      CHART_DATETIME_FORMAT: ${SPEEDTEST_TRACKER_CHART_DATETIME_FORMAT:-j/m G:i} # Set the formatting of timestamps in charts.
      CONTENT_WIDTH: ${SPEEDTEST_TRACKER_CONTENT_WIDTH:-7xl} # Width of the content section of each page. Can be set to any value found in the Filament docs. Default: 7xl
      DATETIME_FORMAT: ${SPEEDTEST_TRACKER_DATETIME_FORMAT:-j M Y, G:i:s} # Set the formatting of timestamps in tables and notifications.
      DB_CONNECTION: ${SPEEDTEST_TRACKER_DB_CONNECTION:-sqlite}
      DISPLAY_TIMEZONE: ${SPEEDTEST_TRACKER_DISPLAY_TIMEZONE:-${TZ:-America/Chicago}} # Display timestamps in your local time.
      PRUNE_RESULTS_OLDER_THAN: ${SPEEDTEST_TRACKER_PRUNE_RESULTS_OLDER_THAN:-0} # Set the value to greater than zero to prune stored results. This value should be represented in days.
      PUBLIC_DASHBOARD: ${SPEEDTEST_TRACKER_PUBLIC_DASHBOARD:-true} # Enables the public dashboard for guest (unauthenticated) users. Default: false
      SPEEDTEST_BLOCKED_SERVERS: ${SPEEDTEST_TRACKER_BLOCKED_SERVERS:-} # Comma separated list of server IDs that should not be used when running speedtests.
      SPEEDTEST_INTERFACE: ${SPEEDTEST_TRACKER_INTERFACE:-} # Set the network interface to use for the test. This need to be the network interface available inside the container
      SPEEDTEST_SCHEDULE: ${SPEEDTEST_TRACKER_SCHEDULE:-6 */2 * * *} # Cron expression used to run speedtests on a scheduled basis.
      SPEEDTEST_SERVERS: ${SPEEDTEST_TRACKER_SERVERS:-} # Comma separated list of server IDs to randomly use for speedtest.
      SPEEDTEST_SKIP_IPS: ${SPEEDTEST_TRACKER_SKIP_IPS:-} # A comma separated list of public IP addresses where tests will be skipped when present.
      THRESHOLD_DOWNLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_DOWNLOAD:-900} # Set the Download Threshold. Note: Only effective during initial setup.
      THRESHOLD_ENABLED: ${SPEEDTEST_TRACKER_THRESHOLD_ENABLED:-true} # Enable the thresholds. Note: Only effective during initial setup.
      THRESHOLD_PING: ${SPEEDTEST_TRACKER_THRESHOLD_PING:-25} # Set the Ping Threshold. Note: Only effective during initial setup.
      THRESHOLD_UPLOAD: ${SPEEDTEST_TRACKER_THRESHOLD_UPLOAD:-900} # Set the Upload Threshold. Note: Only effective during initial setup.
    labels:
      <<: *speedtest-labels
      homepage.group: Network Monitoring
      homepage.name: Speedtest
      homepage.icon: speedtest.png
      homepage.href: https://speedtest.${DOMAIN}
      homepage.description: Regularly tests your internet speed and tracks performance over time, helping you monitor your connection quality.
      homepage.widget.type: speedtest
      homepage.widget.url: https://speedtest.${DOMAIN}
      homepage.widget.fields: '["download", "upload", "ping", "speedtest"]'
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *speedtest-labels
    healthcheck:
      test: curl -fSs http://localhost:80 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
    restart: unless-stopped

  komga:
    # 🔹🔹 Komga 🔹🔹
    # Komga is a web application for managing your digital comic books.
    image: gotson/komga
    container_name: komga
    hostname: komga
    networks:
      - infranet
      - traefik_public
    ports:
      - ${KOMGA_PORT:-25600}:25600
    volumes:
      - ${ROOT_DIR:-.}/configs/komga:/config
      - ${ROOT_DIR:-.}/data/media/books:/media/books
      - ${ROOT_DIR:-.}/data/media/comics:/media/comics
      - ${ROOT_DIR:-.}/data/media/manga:/media/manga
    environment:
      <<: *common-env
    labels:
      <<: *komga-labels
      homepage.group: E-books & Comics
      homepage.name: Komga Library
      homepage.icon: komga.png
      homepage.href: https://komga.${DOMAIN}/
      homepage.description: Manages and streams your digital comics, manga, and books, providing a clean and organized reading experience.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *komga-labels
    restart: unless-stopped

  plex:
    # 🔹🔹 Plex Media Server 🔹🔹
    image: plexinc/pms-docker
    container_name: plex
    hostname: plex
    networks:
      - infranet
      - traefik_public
    ports:
      - ${PLEX_PORT:-32400}:32400/tcp
      - ${PLEX_DLNA_PORT:-1900}:1900/udp
      - ${PLEX_PORT2:-8324}:8324/tcp
      - ${PLEX_PORT3:-32410}:32410/udp
      - ${PLEX_PORT4:-32412}:32412/udp
      - ${PLEX_PORT5:-32413}:32413/udp
      - ${PLEX_PORT6:-32414}:32414/udp
      - ${PLEX_PORT7:-32469}:32469/tcp
    # Uncomment below line if you have an embedded intel GPU
    #devices:
    #  - /dev/dri:/dev/dri
    volumes:
      - "${ROOT_DIR:-.}/data/media/anime:/media/anime"
      - "${ROOT_DIR:-.}/data/media/movies:/media/movies"
      - "${ROOT_DIR:-.}/data/media/music:/media/music"
      - "${ROOT_DIR:-.}/data/media/music/videos:/media/music/videos"
      - "${ROOT_DIR:-.}/data/media/tv:/media/tv"
      - "${ROOT_DIR:-.}/configs/plex:/config"
      - "${ROOT_DIR:-.}/configs/plex/config/osx-config:/config/Library/Application Support/Plex Media Server"
    <<: *resource-limits
    environment:
      <<: *common-env
      PLEX_CLAIM: ${PLEX_CLAIM}
    labels:
      <<: *plex-labels
      homepage.group: Media Streaming
      homepage.name: Plex Media Server
      homepage.icon: plex.png
      homepage.href: https://plex.${DOMAIN}
      homepage.description: Stream your movies, TV shows, music, and photos to any device, providing a centralized media hub for all your content.
      homepage.weight: 4
      homepage.widget.type: plex
      homepage.widget.url: https://plex.${DOMAIN}
      homepage.widget.key: ${PLEX_TOKEN}  # see instructions here: https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *plex-labels
    restart: unless-stopped

  navidrome:
    # 🔹🔹 Navidrome 🔹🔹
    # open source web-based music collection server and streamer.
    # It gives you freedom to listen to your music collection from any browser or mobile device.
    # It's like your personal Spotify!
    image: deluan/navidrome:latest
    container_name: navidrome
    hostname: navidrome
    networks:
      - publicnet
    volumes:
      - ${CONFIG_PATH:-./configs}/navidrome:/data
      - ${DATA_PATH:-./data}/media/music:/music:ro
    <<: [*common-logging, *resource-limits]
    environment:
      ND_LOGLEVEL: ${NAVIDROME_LOGLEVEL:-debug}
    labels:
      deunhealth.restart.on.unhealthy: "true"
      traefik.enable: "true"
      traefik.http.routers.navidrome.rule: Host(`navidrome.${DOMAIN}`) || Host(`navidrome.${DUCKDNS_SUBDOMAIN}.duckdns.org`) || Host(`navidrome.${TS_SUBDOMAIN}.duckdns.org`)
      traefik.http.routers.navidrome.middlewares: navidrome-stripprefix
      traefik.http.middlewares.navidrome-stripprefix.stripprefix.prefixes: /navidrome
      traefik.http.services.navidrome.loadbalancer.server.port: 4533
      homepage.group: Media Streaming
      homepage.name: Navidrome
      homepage.icon: navidrome.png
      homepage.href: https://navidrome.${DOMAIN}/
      homepage.description: Navidrome is a web-based music collection server and streamer.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4533/health > /dev/null 2>&1 || exit 1"]
      interval: ${NAVIDROME_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${NAVIDROME_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${NAVIDROME_HEALTHCHECK_RETRIES:-3}
      start_period: ${NAVIDROME_HEALTHCHECK_START_PERIOD:-40s}
    restart: always

  gluetun-openvpn:
    # 🔹🔹 Gluetun 🔹🔹  # https://github.com/qdm12/gluetun
    # Gluetun is a VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    # use this one with arm:
    # image: ghcr.io/qdm12/gluetun-openvpn:latest@sha256:f035267182d3928d6d8351eb1b21f74dce0f97c1a521ffe4c18ce6376614806d
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun-openvpn
    hostname: gluetun-openvpn
    networks:
      gluenet:
        #ipv4_address: ${GLUETUN_GATEWAY:-192.51.0.1}
      infranet:
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
    ports:
      - "8000${GLUETUN_HTTP_CONTROL_SERVER_ADDRESS:-:8000}"
      - "8888${GLUETUN_HTTPPROXY_LISTENING_ADDRESS:-:8888}"
      - "8388${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388}/tcp"
      - "8388${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388}/udp"
      - "9999${GLUETUN_HEALTH_SERVER_ADDRESS:-:9999}/tcp"
      - "${AIOSTREAMS_PORT:-3005}:3000"
      - "${AUTOBRR__METRICS_PORT:-9092}:${AUTOBRR__METRICS_PORT:-9092}"
      - "${AUTOBRR__PORT:-7474}:${AUTOBRR__PORT:-7474}"
      - "${AUTOBRR__POSTGRES_PORT:-5430}:${AUTOBRR__POSTGRES_PORT:-5430}"
      - "${DELUGE_EXT_PORT:-58846}:58846"
      - "${DELUGE_PORT:-8112}:8112"
      - "${FLARESOLVERR_PORT:-8191}:8191"
      - "${JACKETT_PORT:-9117}:9117"
      - "${PROWLARR_PORT:-9696}:9696"
      - "${SABNZBD_PORT:-8085}:8080"
      - "${STREMIO_PORT:-8086}:8080"
      - "${TRANSMISSION_EXT_PORT:-51413}:51413"
      - "${TRANSMISSION_EXT_PORT:-51413}:51413/udp"
      - "${TRANSMISSION_PORT:-9094}:9091"
    devices:
      - "${GLUETUN_TUN_DEVICE:-/dev/net/tun}:/dev/net/tun" # https://github.com/qdm12/gluetun-wiki/blob/main/errors/tun.md
    volumes:
      - "${ROOT_DIR:-.}/configs/gluetun:/gluetun"
      - "${ROOT_DIR:-.}/configs/gluetun/servers:${GLUETUN_STORAGE_FILEPATH:-/gluetun/servers}"
    environment:
      <<: *common-env
      # HTTP Control Panel section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/control-server.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/control-server.md
      HTTP_CONTROL_SERVER_ADDRESS: "${GLUETUN_HTTP_CONTROL_SERVER_ADDRESS:-:8000}" # Listening address for the HTTP control server
      HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: "${GLUETUN_HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH:-}" # Path to a TOML file containing authentication configuration. There is no default.
      HTTP_CONTROL_SERVER_LOG: "${GLUETUN_HTTP_CONTROL_SERVER_LOG:-on}" # Enable logging of HTTP requests
      # DNS reference: https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/dns.md
      BLOCK_ADS: "${GLUETUN_BLOCK_ADS:-off}" # Uses ads hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_MALICIOUS: "${GLUETUN_BLOCK_MALICIOUS:-on}" # Uses malicious hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      BLOCK_SURVEILLANCE: "${GLUETUN_BLOCK_SURVEILLANCE:-off}" # Uses surveillance hostnames and IP addresses block lists for Unbound: https://github.com/qdm12/files
      DNS_ADDRESS: "${GLUETUN_DNS_ADDRESS:-127.0.0.1}" # IP address to use as DNS resolver. It defaults to localhost to use the DNS over TLS Unbound server.
      DNS_KEEP_NAMESERVER: "${GLUETUN_DNS_KEEP_NAMESERVER:-off}" # Keep /etc/resolv.conf untouched. ⚠️ this will likely leak DNS traffic outside the VPN through your default container DNS. This imples DOT=off and ignores DNS_ADDRESS
      DNS_UPDATE_PERIOD: "${GLUETUN_DNS_UPDATE_PERIOD:-24h}" # Period to update block lists and cryptographic files and restart Unbound. Set to 0 to deactivate updates. This does a burst of DNS over TLS requests, which may be blocked if you set BLOCK_MALICIOUS=on for example. examples: `0`, `30s`, `5m`, `24h`
      DOT_CACHING: "${GLUETUN_DOT_CACHING:-on}" # Enable caching of DNS over TLS responses
      DOT_IPV6: "${GLUETUN_DOT_IPV6:-off}" # DNS IPv6 resolution
      DOT_PRIVATE_ADDRESS: "${GLUETUN_DOT_PRIVATE_ADDRESS:-}" # Comma separated list of CIDRs or single IP addresses Unbound won't resolve to. Note that the setting prevents DNS rebinding
      DOT_PROVIDERS: "${GLUETUN_DOT_PROVIDERS:-cloudflare}" # DNS over TLS providers to use.
      DOT: "${GLUETUN_DOT:-on}" # Activate DNS over TLS with Unbound. If DOT=off, Unbound won't run and therefore no file will be downloaded by the program at all. If DOT=on, after tunneling, it downloads at start (and periodically if DNS_UPDATE_PERIOD is not 0):
      UNBLOCK: "${GLUETUN_UNBLOCK:-off}" # Comma separated list of domain names to leave unblocked with Unbound, e.g. `domain1.com,x.domain2.co.uk`
      # firewall references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/firewall.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/routing.md
      FIREWALL_OUTBOUND_SUBNETS: "${GLUETUN_FIREWALL_OUTBOUND_SUBNETS:-192.50.8.0/24}" # Comma separated subnets that Gluetun and the containers sharing its network stack are allowed to access. This involves firewall and routing modifications.
      FIREWALL_VPN_INPUT_PORTS: "${GLUETUN_FIREWALL_VPN_INPUT_PORTS:-20027,23936,36175,42162,52065}" # Comma separated list of ports that you've forwarded on airvpn's control panel.
      HEALTH_SERVER_ADDRESS: "${GLUETUN_HEALTH_SERVER_ADDRESS:-127.0.0.1:9999}" # Internal health check server listening address
      HEALTH_SUCCESS_WAIT_DURATION: "${GLUETUN_HEALTH_SUCCESS_WAIT_DURATION:-5s}" # Duration to wait after a success check to perform another check
      HEALTH_TARGET_ADDRESS: "${GLUETUN_HEALTH_TARGET_ADDRESS:-cloudflare.com:443}" # Address to ping on every internal health check
      HEALTH_VPN_DURATION_ADDITION: "${GLUETUN_HEALTH_VPN_DURATION_ADDITION:-5s}" # Additional duration to add to the wait time for each consecutive failure of the VPN
      HEALTH_VPN_DURATION_INITIAL: "${GLUETUN_HEALTH_VPN_DURATION_INITIAL:-6s}" # Initial duration to wait for the VPN to be ready before restarting it
      # HTTP Proxy section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/http-proxy.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/http-proxy.md
      HTTPPROXY_LISTENING_ADDRESS: "${GLUETUN_HTTPPROXY_LISTENING_ADDRESS:-:8888}" # Internal listening address for the HTTP proxy
      HTTPPROXY_LOG: "${GLUETUN_HTTPPROXY_LOG:-off}" # Logs every tunnel requests
      HTTPPROXY_PASSWORD: "${GLUETUN_HTTPPROXY_PASSWORD:-proxypassword}" # Password to use to connect to the HTTP proxy
      HTTPPROXY_STEALTH: "${GLUETUN_HTTPPROXY_STEALTH:-on}" # Stealth mode means HTTP proxy headers are not added to your requests
      HTTPPROXY_USER: "${GLUETUN_HTTPPROXY_USER:-proxyuser}" # Username to use to connect to the HTTP proxy
      HTTPPROXY: "${GLUETUN_HTTPPROXY:-off}" # Enable the internal HTTP proxy
      # OpenVPN section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/errors/openvpn.md
      OPENVPN_AUTH: ${GLUETUN_OPENVPN_AUTH:-sha256} # Specify a custom auth algorithm to use
      OPENVPN_CERT: ${GLUETUN_OPENVPN_CERT:-} # OpenVPN certificate content (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-encrypted-key.md
      OPENVPN_CIPHERS: ${GLUETUN_OPENVPN_CIPHERS:-aes-256-gcm} # Specify a custom cipher to use. It will also set ncp-disable if using AES GCM for PIA
      OPENVPN_CUSTOM_CONFIG: ${GLUETUN_OPENVPN_CUSTOM_CONFIG:-} # Specify a custom OpenVPN configuration file to use for the custom VPN provider.
      OPENVPN_ENCRYPTED_KEY: ${GLUETUN_OPENVPN_ENCRYPTED_KEY:-} # OpenVPN encrypted key (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-encrypted-key.md
      OPENVPN_ENDPOINT_IP: ${GLUETUN_OPENVPN_ENDPOINT_IP:-} # Specify a generally optional target VPN server IP address to use
      OPENVPN_ENDPOINT_PORT: ${GLUETUN_OPENVPN_ENDPOINT_PORT:-} # Specify a generally optional target VPN server port number to use
      OPENVPN_FLAGS: ${GLUETUN_OPENVPN_FLAGS:-} # Space delimited openvpn flags to pass to openvpn
      OPENVPN_IPV6: ${GLUETUN_OPENVPN_IPV6:-off} # Enable/disable IPv6
      OPENVPN_KEY_PASSPHRASE: ${GLUETUN_OPENVPN_KEY_PASSPHRASE:-} # Specify a key passphrase to decrypt an encrypted key
      OPENVPN_KEY: ${GLUETUN_OPENVPN_KEY:-} # OpenVPN key (base64 part only). More info found here: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/openvpn-client-key.md
      OPENVPN_MSSFIX: ${GLUETUN_OPENVPN_MSSFIX:-0} # Set the MSS fix parameter. Set to 0 to use the defaults.
      OPENVPN_PROCESS_USER: ${GLUETUN_OPENVPN_PROCESS_USER:-root} # Specify a user to run the OpenVPN subprocess. root is default.
      OPENVPN_PROTOCOL: ${GLUETUN_OPENVPN_PROTOCOL:-tcp} # Network protocol to use, only valid for OpenVPN
      OPENVPN_ROOT: ${GLUETUN_OPENVPN_ROOT:-no} # Run OpenVPN as root
      OPENVPN_VERBOSITY: ${GLUETUN_OPENVPN_VERBOSITY:-1} # Openvpn verbosity level
      OPENVPN_VERSION: ${GLUETUN_OPENVPN_VERSION:-2.6} # Set the OpenVPN version to run
      PUBLICIP_API_KEY: ${GLUETUN_PUBLICIP_API_KEY:-} # Optional API token for the public IP echo service to increase rate limiting
      PUBLICIP_API: ${GLUETUN_PUBLICIP_API:-ipinfo} # Public IP echo service API to use or an echoip URL in the form `echoip#https://xyz`.
      PUBLICIP_ENABLED: ${GLUETUN_PUBLICIP_ENABLED:-on} # Check for public IP address information on VPN connection
      PUBLICIP_FILE: ${GLUETUN_PUBLICIP_FILE:-/gluetun/publicip.txt} # Filepath to store the public IP address assigned. This will be removed in the v4 program, instead you might want to use the control server
      SERVER_COUNTRIES: ${GLUETUN_SERVER_COUNTRIES:-Austria,Belgium,Brazil,Bulgaria,Canada,Czech Republic,Estonia,Germany,Ireland,Japan,Latvia,Netherlands,New Zealand,Norway,Romania,Serbia,Singapore,Spain,Sweden,Switzerland,United Kingdom,United States,China,Isle of Man} # List of countries to filter servers by.  # todo: add more, i gave up halfway through there were so many.
      SHADOWSOCKS_ADDRESS: ${GLUETUN_SHADOWSOCKS_ADDRESS:-:8388} # Internal listening address for Shadowsocks
      SHADOWSOCKS_CIPHER: ${GLUETUN_SHADOWSOCKS_CIPHER:-chacha20-ietf-poly1305} # AEAD Cipher to use for Shadowsocks. Choose between `chacha20-ietf-poly1305`, `aes-128-gcm`, or `aes-256-gcm`
      SHADOWSOCKS_LISTENING_ADDRESS: ${GLUETUN_SHADOWSOCKS_LISTENING_ADDRESS:-:8388} # Internal listening address for Shadowsocks
      SHADOWSOCKS_LOG: ${GLUETUN_SHADOWSOCKS_LOG:-off} # Logs every tunnel requests
      SHADOWSOCKS_PASSWORD: ${GLUETUN_SHADOWSOCKS_PASSWORD:-password} # Password to use to connect to Shadowsocks
      SHADOWSOCKS: ${GLUETUN_SHADOWSOCKS:-off} # Enable the internal Shadowsocks proxy
      STORAGE_FILEPATH: ${GLUETUN_STORAGE_FILEPATH:-/gluetun/servers/servers.json} # Path to the file that will store the VPN servers data.
      UPDATER_MIN_RATIO: ${GLUETUN_UPDATER_MIN_RATIO:-0} # Ratio of servers to be found for the update to succeed, compared to the servers already built in the program
      UPDATER_PERIOD: ${GLUETUN_UPDATER_PERIOD:-24h} # Period to update the VPN servers data in memory and to /gluetun/servers.json. Set to 0 to disable. This does a burst of DNS over TLS requests, which may be blocked if you set BLOCK_MALICIOUS=on for example.
      UPDATER_VPN_SERVICE_PROVIDERS: ${GLUETUN_UPDATER_VPN_SERVICE_PROVIDERS:-airvpn} # List of providers to update servers data for, when the updater triggers periodically. If left empty, it defaults to the current VPN provider used at start.
      VERSION_INFORMATION: ${GLUETUN_VERSION_INFORMATION:-on} # Logs a message indicating if a newer version is available once the VPN is connected
      # Port Forwarding section references:
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/options/port-forwarding.md
      # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/vpn-port-forwarding.md
      VPN_PORT_FORWARDING_LISTENING_PORTS: ${GLUETUN_VPN_PORT_FORWARDING_LISTENING_PORTS:-8388} # Port redirection for the VPN server side port forwarded.
      VPN_PORT_FORWARDING_STATUS_FILE: ${GLUETUN_VPN_PORT_FORWARDING_STATUS_FILE:-/tmp/gluetun/forwarded_port} # File path to use for writing the forwarded port obtained.
      VPN_PORT_FORWARDING: ${GLUETUN_VPN_PORT_FORWARDING:-off} # Enable custom port forwarding code for supported providers
      VPN_SERVICE_PROVIDER: ${GLUETUN_VPN_SERVICE_PROVIDER:-airvpn} # VPN provider to use.
      VPN_TYPE: ${GLUETUN_VPN_TYPE:-openvpn} # VPN type to use, only two choices available: `openvpn` and `wireguard`
    labels:
      <<: *gluetun-labels
      homepage.group: Network
      homepage.name: Gluetun
      homepage.icon: gluetun.png
      homepage.href: https://gluetun.${DOMAIN}/
      homepage.description: VPN client that supports various VPN protocols, providing secure and private internet access for your applications.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *gluetun-labels
    #entrypoint: rm -rf configs/gluetun/servers.json && touch configs/gluetun/servers.json && ./gluetun-entrypoint
    restart: unless-stopped

  jellystat:
    # 🔹🔹 Jellystat 🔹🔹
    depends_on:
      - jellystat-postgresql
    image: cyfershepard/jellystat
    container_name: jellystat
    hostname: jellystat
    networks:
      - infranet
    ports:
      - ${JELLYSTAT_PORT:-3003}:3000
    volumes:
      - ${ROOT_DIR:-.}/configs/jellystat/backup-data:/app/backend/backup-data
    environment:
      <<: *common-env
      POSTGRES_DB: ${JELLYSTAT_POSTGRES_DB:-jellystat}
      POSTGRES_PASSWORD: ${JELLYSTAT_POSTGRES_PASSWORD:-jellystat}
      POSTGRES_USER: ${JELLYSTAT_POSTGRES_USER:-jellystat}
      POSTGRES_IP: ${JELLYSTAT_POSTGRES_IP:-jellystat-postgresql}
      POSTGRES_PORT: ${JELLYSTAT_POSTGRES_PORT:-5432}
      JWT_SECRET_FILE: /run/secrets/jellystat_jwt_secret
    labels:
      <<: *jellystat-labels
      homepage.group: Media Statistics
      homepage.name: Jellystat Analytics
      homepage.icon: jellystat.png
      homepage.href: https://jellystat.${DOMAIN}
      homepage.description: Tracks and displays statistics about your Jellyfin media server usage, showing you what's being watched and how often.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *jellystat-labels
    secrets:
      - jellystat_jwt_secret
    restart: unless-stopped

  decluttarr:
    # 🔹🔹 Decluttarr 🔹🔹  https://github.com/manimatter/decluttarr
    # Watches radarr, sonarr, lidarr, readarr and whisparr download queues and removes downloads if they become stalled or no longer needed.
    image: ghcr.io/manimatter/decluttarr
    container_name: decluttarr
    hostname: decluttarr
    networks:
      - infranet
    <<: *common-uidgid
    environment:
      <<: *common-env
      TEST_RUN: ${DECLUTTARR_TEST_RUN:-false}
      SSL_VERIFICATION: ${DECLUTTARR_SSL_VERIFICATION:-false}
      FAILED_IMPORT_MESSAGE_PATTERNS: '["Not a Custom Format upgrade for existing", "Not an upgrade for existing"]' # TODO: add more patterns
      IGNORED_DOWNLOAD_CLIENTS: '["emulerr"]'
      LOG_LEVEL: ${DECLUTTARR_LOG_LEVEL:-VERBOSE}
      MIN_DOWNLOAD_SPEED: ${DECLUTTARR_MIN_DOWNLOAD_SPEED:-100} # 100 KB/s
      NO_STALLED_REMOVAL_QBIT_TAG: ${DECLUTTARR_NO_STALLED_REMOVAL_QBIT_TAG:-Don't Kill}
      PERMITTED_ATTEMPTS: ${DECLUTTARR_PERMITTED_ATTEMPTS:-3}
      LIDARR_KEY: ${LIDARR_API_KEY}
      LIDARR_URL: https://lidarr.${DOMAIN}
      RADARR_KEY: ${RADARR_API_KEY}
      RADARR_URL: https://radarr.${DOMAIN}
      READARR_KEY: ${READARR_API_KEY}
      READARR_URL: https://readarr.${DOMAIN}
      SONARR_KEY: ${SONARR_API_KEY}
      SONARR_URL: https://sonarr.${DOMAIN}
      WHISPARR_URL: https://whisparr.${DOMAIN}
      WHISPARR_KEY: ${WHISPARR_API_KEY}
      QBITTORRENT_URL: https://qbittorrent.${DOMAIN}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      REMOVE_FAILED: ${DECLUTTARR_REMOVE_FAILED:-false}
      REMOVE_FAILED_IMPORTS: ${DECLUTTARR_REMOVE_FAILED_IMPORTS:-true}
      REMOVE_METADATA_MISSING: ${DECLUTTARR_REMOVE_METADATA_MISSING:-false}
      REMOVE_MISSING_FILES: ${DECLUTTARR_REMOVE_MISSING_FILES:-false}
      REMOVE_ORPHANS: ${DECLUTTARR_REMOVE_ORPHANS:-true}
      REMOVE_SLOW: ${DECLUTTARR_REMOVE_SLOW:-true}
      REMOVE_STALLED: ${DECLUTTARR_REMOVE_STALLED:-true}
      REMOVE_TIMER: ${DECLUTTARR_REMOVE_TIMER:-10} # 10 seconds
      REMOVE_UNMONITORED: ${DECLUTTARR_REMOVE_UNMONITORED:-false}
      RUN_PERIODIC_RESCANS: '{
        "RADARR": {"MISSING": true, "CUTOFF_UNMET": true, "MAX_CONCURRENT_SCANS": 3, "MIN_DAYS_BEFORE_RESCAN": 1},
        "SONARR": {"MISSING": true, "CUTOFF_UNMET": true, "MAX_CONCURRENT_SCANS": 3, "MIN_DAYS_BEFORE_RESCAN": 1}
        }'
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  janitorr:
    # 🔹🔹 Janitorr 🔹🔹  # https://github.com/Schaka/janitorr
    # Cleans your Radarr, Sonarr, Jellyseerr and Jellyfin before you run out of space
    image: ghcr.io/schaka/janitorr
    container_name: janitorr
    hostname: janitorr
    ports:
      - ${JANITORR_THC_PORT:-8079}:${JANITORR_THC_PORT:-8079}
      - ${JANITORR_PORT:-8978}:8978
    volumes:
      - ${ROOT_DIR:-.}/configs/janitorr/config/application.yml:/workspace/application.yml
      - ${ROOT_DIR:-.}/configs/janitorr/logs:/logs
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      EXCLUDE_RESOURCES: ${JANITORR_EXCLUDE_RESOURCES:-}
      HOUR_OF_DAY_END: ${JANITORR_HOUR_OF_DAY_END:-23}
      HOUR_OF_DAY_START: ${JANITORR_HOUR_OF_DAY_START:-20}
      PRUNE_VOLUMES: ${JANITORR_PRUNE_VOLUMES:-true}
      RUN_ON_STARTUP: ${JANITORR_RUN_ON_STARTUP:-true}
      SKIP_RANDOM_BACKOFF: ${JANITORR_SKIP_RANDOM_BACKOFF:-true}
      THC_PATH: /health
      THC_PORT: ${JANITORR_THC_PORT:-8079}
      TIME_BETWEEN_RUNS: ${JANITORR_TIME_BETWEEN_RUNS:-86400}
      UNUSED_TIME: ${JANITORR_UNUSED_TIME:-24h}
      DEBUG: ${JANITORR_DEBUG:-true}
    labels:
      <<: *janitorr-labels
      homepage.group: Server Management
      homepage.name: Janitorr Cleaner
      homepage.icon: janitorr.png
      homepage.href: https://janitorr.${DOMAIN}/
      homepage.description: Helps keep your server tidy by automatically removing old and unused Docker components, freeing up valuable storage space.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *janitorr-labels
    restart: unless-stopped

  prefetcharr-jellyfin:
    # 🔹🔹 Prefetcharr 🔹🔹  https://github.com/phueber/prefetcharr
    # Let Sonarr fetch the next season of a show you are watching on Jellyfin.
    image: phueber/prefetcharr
    container_name: prefetcharr-jellyfin
    hostname: prefetcharr-jellyfin
    volumes:
      - ${ROOT_DIR:-.}/configs/prefetcharr/jellyfin/log:${PREFETCHARR_JELLYFIN_INTERNAL_LOG_DIR:-/log}
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      MEDIA_SERVER_TYPE: jellyfin  # `jellyfin`, `emby` or `plex`
      INTERVAL: ${PREFETCHARR_JELLYFIN_INTERVAL:-900}  # Polling interval in seconds
      LOG_DIR: ${PREFETCHARR_JELLYFIN_INTERNAL_LOG_DIR:-/log}
      MEDIA_SERVER_API_KEY: ${JELLYFIN_API_KEY}
      MEDIA_SERVER_URL: http://host.docker.internal:${JELLYFIN_PORT:-8096}
      REMAINING_EPISODES: ${PREFETCHARR_JELLYFIN_REMAINING_EPISODES:-3}  # The last <NUM> episodes trigger a search
      RUST_LOG: ${PREFETCHARR_JELLYFIN_LOG_LEVEL:-debug}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_URL: https://sonarr.${DOMAIN}
      # Optional: Only monitor sessions for specific user IDs or names
      # - USERS=john,12345,alex
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  prefetcharr-plex:
    # 🔹🔹 Prefetcharr 🔹🔹
    # Let Sonarr fetch the next season of a show you are watching on Plex.
    image: phueber/prefetcharr
    container_name: prefetcharr-plex
    hostname: prefetcharr-plex
    networks:
      - infranet
    volumes:
      - ${ROOT_DIR:-.}/configs/prefetcharr/plex/log:${PREFETCHARR_PLEX_INTERNAL_LOG_DIR:-/log}
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      MEDIA_SERVER_TYPE: plex # `jellyfin`, `emby` or `plex`
      INTERVAL: ${PREFETCHARR_PLEX_INTERVAL:-900} # 15 minutes
      LOG_DIR: ${PREFETCHARR_PLEX_INTERNAL_LOG_DIR:-/log}
      MEDIA_SERVER_API_KEY: ${PLEX_TOKEN}
      MEDIA_SERVER_URL: https://plex.${DOMAIN}
      REMAINING_EPISODES: ${PREFETCHARR_PLEX_REMAINING_EPISODES:-3} # The last <NUM> episodes trigger a search
      RUST_LOG: ${PREFETCHARR_PLEX_LOG_LEVEL:-debug}
      RADARR_API_KEY: ${RADARR_API_KEY}
      RADARR_URL: https://radarr.${DOMAIN}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_URL: https://sonarr.${DOMAIN}
      # Optional: Only monitor sessions for specific user IDs or names
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  recyclarr:
    # 🔹🔹 Recyclarr 🔹🔹  # https://github.com/recyclarr/recyclarr
    # command-line application that will automatically synchronize recommended settings from the TRaSH guides to your Sonarr/Radarr instances.
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    hostname: recyclarr
    networks:
      - infranet
    ports:
      - ${RECYCLARR_PORT:-32888}:32888
    init: true
    volumes:
      - ${ROOT_DIR:-.}/configs/recyclarr:/config
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
      TINI_SUBREAPER: "false"
      RADARR_API_KEY: ${RADARR_API_KEY}
      RADARR_BASE_URL: https://radarr.${DOMAIN}
      SONARR_API_KEY: ${SONARR_API_KEY}
      SONARR_BASE_URL: https://sonarr.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  suggestarr:
    # 🔹🔹 Suggestarr 🔹🔹
    # Suggestarr is a tool that helps you manage your media library by suggesting new content to add to it.
    image: ciuse99/suggestarr
    container_name: suggestarr
    hostname: suggestarr
    networks:
      - infranet
    ports:
      - ${SUGGESTARR_PORT:-5003}:5000
    volumes:
      - ${ROOT_DIR:-.}/configs/suggestarr:/app/config/config_files
    <<: [*resource-limits, *common-uidgid]
    environment:
      <<: *common-env
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    healthcheck:
      test: curl -fSs http://localhost:5000 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    hostname: alertmanager
    volumes:
      - ${ROOT_DIR:-.}/configs/alertmanager/data:/data
      - ${ROOT_DIR:-.}/configs/alertmanager/config:/config
    environment:
      <<: *common-env
    <<: [*common-uidgid, *common-logging, *resource-limits]
    command: '--config.file=/config/alertmanager.yml'
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  changedetection:
    # 🔹🔹 Changedetection 🔹🔹  https://github.com/dgtlmoon/changedetection.io
    # Detect website content changes and perform
    # meaningful actions - trigger notifications via
    #  Discord, Email, Slack, Telegram, API calls and many more.
    image: ghcr.io/dgtlmoon/changedetection.io
    container_name: changedetection
    hostname: changedetection
    networks:
      - infranet
    volumes:
      - ${ROOT_DIR:-.}/configs/changedetection/datastore:/datastore
    environment:
      <<: *common-env
    <<: [*common-uidgid, *common-logging, *resource-limits]
    labels:
      <<: *changedetection-labels
      homepage.group: Utilities
      homepage.name: Change Detection
      homepage.icon: changedetection.png
      homepage.href: https://changedetection.${DOMAIN}/
      homepage.description: Monitor websites for changes and receive notifications, ensuring you're always up-to-date with the latest information.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *changedetection-labels
    restart: unless-stopped

  notifiarr:
    # 🔹🔹 Notifiarr 🔹🔹
    # Client for Notifiarr.com
    image: golift/notifiarr
    container_name: notifiarr
    hostname: notifiarr
    security_opt:
      - no-new-privileges:true
    privileged: true
    ports:
      - ${NOTIFIARR_PORT:-5454}:5454
    volumes:
      - ${ROOT_DIR:-.}/configs/notifiarr/notifiarr.conf:/config/notifiarr.conf
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      DN_AUTO_UPDATE: ${NOTIFIARR_AUTO_UPDATE:-"off"}
    labels:
      <<: *notifiarr-labels
      homepage.group: Notifications
      homepage.name: Notifiarr
      homepage.icon: notifiarr.png
      homepage.href: https://notifiarr.${DOMAIN}
      homepage.description: Centralized notification system for various services, keeping you informed in real-time.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *notifiarr-labels
    restart: unless-stopped

  ntfy:
    # 🔹🔹 Ntfy 🔹🔹
    image: binwiederhier/ntfy
    container_name: ntfy
    hostname: ntfy
    networks:
      - infranet
    ports:
      - ${NTFY_PORT:-8586}:80
    command:
      - serve
    volumes:
      - ${ROOT_DIR:-.}/configs/ntfy/cache:/var/cache/ntfy
      - ${ROOT_DIR:-.}/configs/ntfy:/etc/ntfy
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
    labels:
      <<: *ntfy-labels
      homepage.group: Notifications
      homepage.name: Ntfy
      homepage.icon: ntfy.png
      homepage.href: https://ntfy.${DOMAIN}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      labels:
        <<: *ntfy-labels
    healthcheck: # optional: remember to adapt the host:port to your environment
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://ntfy:${NTFY_PORT:-8586}/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      start_period: 40s
    restart: unless-stopped

  prowlarr-exporter:
    # 🔹🔹 Prowlarr Exporter 🔹🔹  # https://github.com/onedr0p/exportarr
    # Prowlarr metrics for Prometheus
    # use this one with arm:
    # image: ghcr.io/onedr0p/exportarr:master@sha256:22bc953901430c69d4b489fe071b16c9eba9d80ed1963e1c5bf2d08e11b4e70a
    image: ghcr.io/onedr0p/exportarr
    container_name: prowlarr-exporter
    hostname: prowlarr-exporter
    networks:
      - gluenet
    security_opt:
      - no-new-privileges:true
    ports:
      - ${PROWLARR_EXPORTER_PORT:-9705}:${PROWLARR_EXPORTER_PORT:-9705}
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      PORT: ${PROWLARR_EXPORTER_PORT:-9705}
      URL: "http://gluetun-openvpn:${PROWLARR_PORT:-9696}"
      APIKEY: ${PROWLARR_API_KEY}
      ENABLE_ADDITIONAL_METRICS: ${PROWLARR_EXPORTER_ENABLE_ADDITIONAL_METRICS:-true}
    command: "prowlarr"
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  sabnzbd-exporter:
    # 🔹🔹 SABnzbd Exporter 🔹🔹  # https://github.com/onedr0p/exportarr
    # SABnzbd metrics for Prometheus
    # use this one with arm:
    # image: ghcr.io/onedr0p/exportarr:master@sha256:22bc953901430c69d4b489fe071b16c9eba9d80ed1963e1c5bf2d08e11b4e70a
    image: ghcr.io/onedr0p/exportarr
    container_name: sabnzbd-exporter
    hostname: sabnzbd-exporter
    networks:
      - gluenet
    ports:
      - ${SABNZBD_EXPORTER_PORT:-9712}:9705
    security_opt:
      - no-new-privileges:true
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      APIKEY: ${SABNZBD_API_KEY}
      ENABLE_ADDITIONAL_METRICS: ${SABNZBD_EXPORTER_ENABLE_ADDITIONAL_METRICS:-true}
      URL: "http://gluetun-openvpn:${SABNZBD_PORT:-8085}"
    command: "sabnzbd"
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  flaresolverr:
    # 🔹🔹 Flaresolverr 🔹🔹  # https://github.com/flaresolverr/flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    network_mode: service:gluetun-openvpn
    security_opt:
      - no-new-privileges:true
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      CAPTCHA_SOLVER: ${FLARESOLVERR_CAPTCHA_SOLVER:-none}
      LOG_HTML: ${FLARESOLVERR_LOG_HTML:-false}
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
    labels:
      homepage.group: Utilities
      homepage.name: FlareSolverr
      homepage.icon: flaresolverr.png
      homepage.href: https://flaresolverr.${DOMAIN}/
      homepage.description: Proxy server to bypass Cloudflare protection, enabling access to websites that are protected by anti-bot measures.
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  meilisearch:
    # 🔹🔹 Meilisearch 🔹🔹
    image: getmeili/meilisearch
    container_name: meilisearch
    hostname: meilisearch
    networks:
      - infranet
    ports:
      - ${MEILI_PORT:-7700}:7700
    volumes:
      - ${ROOT_DIR:-.}/configs/meilisearch:/data.ms
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      http_proxy:
      https_proxy:
      MEILI_DB_PATH: ${MEILI_DB_PATH:-/data.ms}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_LOG_LEVEL: ${MEILI_LOG_LEVEL:-info}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: ${MEILI_NO_ANALYTICS:-true}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    healthcheck:
      test: curl -fSs http://localhost:7700 > /dev/null || exit 1
      start_period: 20s
      timeout: 5s
      interval: 5s
    restart: unless-stopped

  playwright:
    # 🔹🔹 Playwright 🔹🔹
    # Fast and reliable end-to-end testing for modern web apps
    image: mcr.microsoft.com/playwright
    container_name: playwright
    hostname: playwright
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${PLAYWRIGHT_PORT:-2999}:${PLAYWRIGHT_PORT:-2999}
    environment:
      <<: *common-env
      BLOCK_MEDIA: ${PLAYWRIGHT_BLOCK_MEDIA:-false}
      DEBUG: ${PLAYWRIGHT_DEBUG:-false}
      LOG_LEVEL: ${PLAYWRIGHT_LOG_LEVEL:-info}
      PORT: ${PLAYWRIGHT_PORT:-2999}
      PROXY_PASSWORD: ${PLAYWRIGHT_PROXY_PASSWORD}
#      PROXY_SERVER: ${PLAYWRIGHT_PROXY_SERVER}
      PROXY_USERNAME: ${PLAYWRIGHT_PROXY_USERNAME}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  mariadb:
    image: mariadb:11.7.2
    container_name: mariadb
    hostname: mariadb
    ports:
      - ${MARIADB_PORT:-3306}:3306
    networks:
      - infranet
    volumes:
      - ${ROOT_DIR:-.}/configs/mariadb:/var/lib/mysql
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      MYSQL_DATABASE: ${MARIADB_DB_NAME:-glauthui}
      MYSQL_USER: ${MARIADB_DB_USER:-glauthui}
      MYSQL_PASSWORD: ${MARIADB_DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${MARIADB_DB_ROOT_PASSWORD:-rootpassword}
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  mongodb:
    # 🔹🔹 MongoDB 🔹🔹
    image: mongo
    container_name: mongodb
    hostname: mongodb
    <<: [*common-uidgid, *common-logging, *resource-limits]
    networks:
      - infranet
    ports:
      - ${MONGODB_PORT:-27017}:27017
    volumes:
      - ${ROOT_DIR:-.}/configs/mongodb/data-node:/data/db
    command: mongod --noauth
    environment:
      <<: *common-env
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
    restart: unless-stopped

  jellystat-postgresql:
    # 🔹🔹 PostgreSQL 🔹🔹
    image: postgres:17.4
    container_name: jellystat-postgresql
    hostname: jellystat-postgresql
    networks:
      - infranet
    volumes:
      - ${ROOT_DIR:-.}/configs/jellystat/postgresql:/var/lib/postgresql/data
    <<: [*common-uidgid, *common-logging, *resource-limits]
    environment:
      <<: *common-env
      POSTGRES_DB: ${JELLYSTAT_POSTGRES_DB:-jellystat}
      POSTGRES_PASSWORD: ${JELLYSTAT_POSTGRES_PASSWORD:-jellystat}
      POSTGRES_USER: ${JELLYSTAT_POSTGRES_USER:-jellystat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB:-jellystat} -U $${POSTGRES_USER:-jellystat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      <<: [*common-deploy, *swarm-resource-limits]
      placement:
        <<: *constraints-storage-only
    restart: unless-stopped

  rsshub:
    # 🔹🔹 RSSHub 🔹🔹
    # World's largest RSS network, consisting of over 5,000 global instances.
