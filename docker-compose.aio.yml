x-common-env: &common-env
  TZ: ${TZ:-America/Chicago} # Your Timezone
  PUID: ${PUID:-1002}
  PGID: ${PGID:-988}
  UMASK: ${UMASK:-002}

x-common-uidgid: &common-uidgid
  user: ${PUID:-1002}:${PGID:-988}

x-resource-limits: &resource-limits
  labels:
    autoheal: "true"

x-common-deploy: &common-deploy
  mode: replicated # Deploys the service in replicated mode
  replicas: 1 # Specifies that only one replica of the service should be running
  restart_policy:
    condition: on-failure
    delay: 5s
    window: 120s
  labels:
    autoheal: "true"
    swarm.autoscaler: "true"

x-swarm-resource-limits: &swarm-resource-limits
  resources:
    limits:
      cpus: "0.10"
      memory: 512M

x-constraints-storage-only: &constraints-storage-only
  constraints:
    - node.labels.storage == true

x-preferences-worker-priority: &preferences-worker-priority
  preferences:
    - spread: node.labels.worker_priority

x-autoindex-labels: &autoindex-labels
  traefik.enable: "true"
  traefik.http.services.autoindex.loadbalancer.server.port: 80

x-code-server-labels: &code-server-labels
  traefik.enable: "true"
  traefik.docker.network: infranet
  traefik.http.services.code-server.loadbalancer.server.port: 8443

x-fileflows-labels: &fileflows-labels
  traefik.enable: "true"
  traefik.http.services.fileflows.loadbalancer.server.port: 5000

x-qdirstat-labels: &qdirstat-labels
