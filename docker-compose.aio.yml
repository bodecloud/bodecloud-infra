x-keycloak-labels: &keycloak-labels
  traefik.enable: "true"
  traefik.http.services.keycloak.loadbalancer.server.port: 8080
  # Shield Authentication Portal Configuration
  traefik.http.middlewares.shield.plugin.traefik-shield.adminPanel: "true"
  traefik.http.middlewares.shield.plugin.traefik-shield.adminListenAddr: ":8080"
  # Shield Auth Portal Router Configuration
  traefik.http.routers.shield-portal.rule: "Host(`auth.${DOMAIN}`)"
  traefik.http.routers.shield-portal.tls: "true"
  traefik.http.routers.shield-portal.tls.certresolver: myresolver
  traefik.http.routers.shield-portal.service: "shield-portal-service"
  traefik.http.services.shield-portal-service.loadbalancer.server.port: "8080"

