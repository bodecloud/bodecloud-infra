version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      # Keycloak Base Settings
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - KC_HOSTNAME=${DOMAIN:-localhost}
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY=edge
      
      # SSO Identity Providers
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-}
      
      # Client Settings
      - CLIENT_SECRET=${CLIENT_SECRET:-change-me}
      - TRAEFIK_AUTH_SECRET=${TRAEFIK_AUTH_SECRET:-change-me}
      - DOMAIN=${DOMAIN:-localhost}
      
      # SMTP Settings
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM=${SMTP_FROM:-keycloak@mediastack.local}
      - SMTP_FROM_DISPLAY_NAME=${SMTP_FROM_DISPLAY_NAME:-Media Stack Services}
      - SMTP_REPLY_TO=${SMTP_REPLY_TO:-no-reply@mediastack.local}
      - SMTP_REPLY_TO_DISPLAY_NAME=${SMTP_REPLY_TO_DISPLAY_NAME:-Media Stack Services}
      - SMTP_SSL=${SMTP_SSL:-false}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-false}
      - SMTP_AUTH=${SMTP_AUTH:-false}
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./realm.json:/opt/keycloak/data/import/realm.json
    restart: unless-stopped
    depends_on:
      - keycloak-db
    networks:
      - traefik_network
      - keycloak_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.http.routers.keycloak.middlewares=headers-add-cors-for-stremio"
      - "traefik.http.middlewares.keycloak-rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.keycloak-rate-limit.ratelimit.burst=50"
      - "traefik.http.middlewares.keycloak-rate-limit.ratelimit.period=1m"
      - "traefik.http.routers.keycloak.middlewares=keycloak-rate-limit"

  keycloak-db:
    image: postgres:14-alpine
    container_name: keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KEYCLOAK_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - keycloak_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik-forward-auth:
    image: thomseddon/traefik-forward-auth:latest
    container_name: traefik-forward-auth
    environment:
      - DEFAULT_PROVIDER=oidc
      - PROVIDERS_OIDC_ISSUER_URL=https://auth.${DOMAIN:-localhost}/realms/MediaStack
      - PROVIDERS_OIDC_CLIENT_ID=traefik-forward-auth
      - PROVIDERS_OIDC_CLIENT_SECRET=${TRAEFIK_AUTH_SECRET:-change-me}
      - SECRET=${FORWARD_AUTH_SECRET:-something-random}
      - INSECURE_COOKIE=false
      - COOKIE_DOMAIN=${DOMAIN:-localhost}
      - AUTH_HOST=auth.${DOMAIN:-localhost}
      - URL_PATH=/_oauth
      - COOKIE_NAME=mediastack_auth
      - LIFETIME=3600
      - WHITELIST=${AUTH_WHITELIST:-}
      - LOG_LEVEL=debug
    restart: unless-stopped
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forward-auth.rule=Host(`auth.${DOMAIN:-localhost}`) && PathPrefix(`/_oauth`)"
      - "traefik.http.routers.forward-auth.entrypoints=websecure"
      - "traefik.http.routers.forward-auth.tls=true"
      - "traefik.http.services.forward-auth.loadbalancer.server.port=4181"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.address=http://traefik-forward-auth:4181"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.authResponseHeaders=X-Forwarded-User, X-Auth-User, X-Auth-Name, X-Auth-Email, X-Auth-Role"
      - "traefik.http.middlewares.traefik-forward-auth.forwardauth.trustForwardHeader=true"

volumes:
  keycloak_db_data:
    name: keycloak_db_data

networks:
  traefik_network:
    external: true
  keycloak_network:
    name: keycloak_network 