global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: true
  debug: true
  disableDashboardAd: true
  insecure: true

log:
  level: INFO

ping:
  terminatingStatusCode: 503

# Entry points configuration
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    forwardedHeaders:
      insecure: true
    http:
      middlewares:
        - error-pages@file
      tls:
        certResolver: myresolver
        domains:
          - main: "${DOMAIN}"
            sans:
              - "*.${DOMAIN}"
          - main: "${DUCKDNS_DOMAIN}"
            sans:
              - "*.${DUCKDNS_DOMAIN}"
          - main: "${TS_SUBDOMAIN}.duckdns.org"
            sans:
              - "*.${TS_SUBDOMAIN}.duckdns.org"

# Provider configuration
providers:
  # Local file provider for middlewares and static routes
  file:
    directory: /config
    watch: true

  # Docker provider to discover services in the same Docker host
  docker:
    exposedByDefault: false
    watch: true

  # Consul Catalog provider - primary method for multi-host service discovery
  consulCatalog:
    prefix: "traefik"
    exposedByDefault: false
    refreshInterval: "10s"
    endpoint:
      address: "consul-server1:8500"
      scheme: "http"
    connectAware: true
    connectByDefault: false
    serviceName: "central-traefik"
    constraints: "tag==exposed"
    watch: true

    # Map service metadata to Traefik endpoints and routers
    defaultRule: "Host(`{{ .Name }}.${DOMAIN}`)"

  # Redis provider for configuration sharing in HA setup
  redis:
    endpoints:
      - "redis:6379"
    rootKey: "traefik"
    # Optional: Redis authentication
    # password: "${REDIS_PASSWORD}"
    # username: "${REDIS_USERNAME}"
    # tls configuration if needed

# Middlewares configuration
middlewares:
  error-pages:
    errors:
      status:
        - "400-499"
        - "500-599"
      service: traefik-error-pages
      query: "/{status}.html"

  ipallowlist-private:
    ipAllowList:
      sourceRange:
        - "127.0.0.1/32" # localhost
        - "10.0.0.0/8" # private network
        - "172.16.0.0/12" # private network
        - "192.168.0.0/16" # private network
        - "100.64.0.0/10" # Tailscale network
        - "fd7a:115c:a1e0::/48" # Tailscale IPv6 network

  secure-headers:
    headers:
      sslRedirect: true
      forceSTSHeader: true
      stsIncludeSubdomains: true
      stsPreload: true
      stsSeconds: 31536000
      contentTypeNosniff: true
      browserXssFilter: true
      customFrameOptionsValue: "SAMEORIGIN"
      contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"

# Certificate resolvers configuration
certificatesResolvers:
  myresolver:
    acme:
      email: ${LETS_ENCRYPT_EMAIL}
      # Store certificates in Redis for HA setup
      storage: redis://redis:6379
      keyType: "RSA4096"
      dnsChallenge:
        provider: duckdns
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"
      httpChallenge:
        entryPoint: web
      tlsChallenge: {}
      caServer: https://acme-v02.api.letsencrypt.org/directory

# Metrics configuration
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Access log configuration
accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop

