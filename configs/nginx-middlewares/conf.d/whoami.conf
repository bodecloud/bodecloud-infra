server {
    listen 80;
    server_name nginx-whoami.bolabaden.org nginx-whoami.bolabaden.duckdns.org nginx-whoami.micklethefickle.duckdns.org;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 10;

    # Custom middleware logic
    location / {
        # Basic auth (optional)
        # auth_basic "Restricted Area";
        # auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Custom headers
        add_header X-Served-By "nginx-middleware" always;
        add_header X-Request-ID "$request_id" always;

        # IP whitelist example
        # allow 10.76.0.0/16;
        # allow 100.64.0.0/10;
        # deny all;

        # Custom request processing
        set $upstream_host whoami_backend;
        
        # Log custom information
        access_log /var/log/nginx/whoami_access.log main;

        # Proxy to backend
        proxy_pass http://$upstream_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check for this specific service
    location /nginx-health {
        access_log off;
        return 200 "whoami service healthy\n";
        add_header Content-Type text/plain;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
        return 404 "Not found via nginx middleware\n";
        add_header Content-Type text/plain;
    }
    
    location = /50x.html {
        internal;
        return 500 "Server error via nginx middleware\n";
        add_header Content-Type text/plain;
    }
} 