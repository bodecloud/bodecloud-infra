# Advanced authentication and middleware example
server {
    listen 80;
    server_name protected.bolabaden.org protected.bolabaden.duckdns.org;

    # Different rate limits for different endpoints
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        limit_conn addr 20;

        # API key authentication example
        set $api_key_valid 0;
        if ($http_x_api_key = "your-api-key-here") {
            set $api_key_valid 1;
        }
        if ($api_key_valid = 0) {
            return 401 "Invalid API key\n";
        }

        # Add API-specific headers
        add_header X-API-Version "v1" always;
        add_header X-Rate-Limit-Remaining "100" always;

        proxy_pass http://homepage_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        limit_req zone=auth burst=5 nodelay;

        # Custom authentication logic
        # This could call out to an external auth service
        access_by_lua_block {
            -- Custom Lua authentication logic could go here
            -- For now, just pass through
        }

        proxy_pass http://homepage_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Protected area with basic auth
    location /admin/ {
        auth_basic "Admin Area";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        # Additional security for admin
        limit_req zone=general burst=5 nodelay;
        
        # IP whitelist for admin (uncomment and configure as needed)
        # allow 10.76.0.0/16;
        # allow 100.64.0.0/10;
        # deny all;

        proxy_pass http://homepage_backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-User $remote_user;
    }

    # Default location with general rate limiting
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 10;

        # Custom request modification
        # Remove sensitive headers
        proxy_set_header Authorization "";
        
        # Add custom headers
        add_header X-Served-By "nginx-middleware" always;
        add_header X-Processing-Time "$upstream_response_time" always;

        proxy_pass http://homepage_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
} 