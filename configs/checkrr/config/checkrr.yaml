lang: "en-us"
checkrr:
  checkpath:
    - "/media/anime"
    - "/media/books"
    - "/media/comics"
    - "/media/manga"
    - "/media/movies"
    - "/media/music"
    - "/media/music/videos"
    - "/media/tv"
    - "/media/xxx"
  database: /checkrr.db
  debug: false
  csvfile: /badfiles.csv
  cron: "@daily"
  ignorehidden: true
  ignorepaths:
    - '/media/xxx'
#  removevideo:
#    - "avi"
#    - "avc"
#    - "h265"
  removelang:
    - unknown
#  removeaudio:
#    - "DTS - 5.1"
  ignoreexts:
    - .nfo
    - .nfo-orig
    - .nzb
    - .txt
    - .url
logs:
  stdout:
    out: stdout
    formatter: default
  file:
    out: file
    path: /logs/checkrr.log
    formatter: default
  jsonfile:
    out: file
    path: /logs/checkrr.json
    formatter: json
#  syslog:
#    out: syslog
#    formatter: default
#    protocol: udp
#    addr: "localhost:514"
arr:
  lidarr:
    process: false
    service: lidarr
    address: "http://lidarr:8686"
    apikey: "c47f31fc9f934800aa3023668e999923"
    baseurl: /
    port: 8686
    ssl: false
    mappings:
      "/media/music/": "/music/"
  radarr:
    process: false
    service: radarr # should be one of: sonarr radarr lidarr
    address: "http://radarr:7878"
    apikey: "fc44a10e3c7c4c0582cf99f1d7ff0f18"
    baseurl: /
    port: 7878
    ssl: false
    mappings: # maps directories between docker and arr services
      "/media/movies/": "/movies/" # what radarr sees: what checkrr sees
  readarr:
    process: false
    service: readarr
    address: "http://readarr:8787"
    apikey: "e5ae49d7512a41548588c9b5456d7010"
    baseurl: /
    port: 8787
    ssl: false
    mappings:
      "/media/books/": "/books/"
  sonarr:
    process: false
    service: sonarr
    address: "http://sonarr:8989"
    apikey: "5fa91e23f1ce4bfda1159fb0d717b70e"
    baseurl: /
    port: 8989
    ssl: false
    mappings:
      "/media/anime/": "/anime/"
      "/media/tv/": "/tv/"
  whisparr:
    process: false
    service: whisparr
    address: "http://whisparr:6969"
    apikey: "6106f2a1c6604cbbac336b58835f2d41"
    baseurl: /
    port: 6969
    ssl: false
    mappings:
      "/media/xxx/": "/xxx/"
