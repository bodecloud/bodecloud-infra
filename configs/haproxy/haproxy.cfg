global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Default ciphers to use on SSL-enabled listening sockets
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-server-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Frontend for HTTP - Redirect to HTTPS
frontend http-in
    bind *:80
    mode http
    option forwardfor
    http-request set-header X-Forwarded-Proto http
    # Redirect all HTTP traffic to HTTPS
    http-request redirect scheme https code 301 unless { ssl_fc }
    
    # Except for ACME HTTP-01 challenge
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend traefik-backend if is_acme

# Frontend for HTTPS
frontend https-in
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/ alpn h2,http/1.1
    mode http
    
    # Add X-Forwarded headers
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    
    # Traefik dashboard access
    acl is_traefik_dashboard hdr(host) -i traefik-dashboard.example.com
    use_backend traefik-dashboard if is_traefik_dashboard
    
    # Default backend
    default_backend traefik-backend

# Traefik backend for services
backend traefik-backend
    mode http
    balance roundrobin
    option httpchk GET /ping
    default-server check maxconn 20
    
    # Sticky session using consistent hash based on client IP
    hash-type consistent
    
    # Traefik instances (add all your instances)
    server traefik1 central-traefik1:80 check
    server traefik2 central-traefik2:80 check backup
    
    # Health check
    option httpchk GET /ping
    http-check expect status 200

# Traefik dashboard backend
backend traefik-dashboard
    mode http
    balance roundrobin
    option httpchk GET /ping
    
    # Traefik dashboard port (8080)
    server traefik1-dashboard central-traefik1:8080 check
    server traefik2-dashboard central-traefik2:8080 check backup
    
    # Health check
    option httpchk GET /ping
    http-check expect status 200

# Stats page
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats auth admin:AdminSecurePassword 