# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    catchall:
      service: failover-proxy@file
      rule: Host(`bolabaden.org`) || Host(`micklethefickle.bolabaden.org`) || HostRegexp(`^(.+)$`)
      priority: -1000
      middlewares:
        - strip-www@file
        - http-to-https-redirect-simple@file
    nginx-traefik-extensions:
      service: nginx-traefik-extensions
      rule: Host(`nginx-traefik-extensions.bolabaden.org`) || Host(`nginx-traefik-extensions.micklethefickle.bolabaden.org`)
    whoami-with-failover:
      service: whoami-with-failover@file
      rule: Host(`whoami.bolabaden.org`)
    whoami-direct:
      service: whoami-direct@file
      rule: Host(`whoami.micklethefickle.bolabaden.org`)
  services:
    failover-proxy:
      loadBalancer:
        servers:
          - url: http://failover-proxy:80
    whoami-direct:
      loadBalancer:
        servers:
          - url: http://whoami:80
        healthCheck:
          path: "/"
          interval: "15s"
          timeout: "5s"
    whoami-with-failover:
      failover:
        service: whoami-direct@file
        fallback: whoami-servers@file
    whoami-servers:
      loadBalancer:
        servers:
          - url: http://whoami:80
          - url: https://whoami.micklethefickle.bolabaden.org
          - url: https://whoami.beatapostapita.bolabaden.org
          - url: https://whoami.vractormania.bolabaden.org
          - url: https://whoami.arnialtrashlid.bolabaden.org
          - url: https://whoami.cloudserver1.bolabaden.org
          - url: https://whoami.cloudserver2.bolabaden.org
          - url: https://whoami.cloudserver3.bolabaden.org
        healthCheck:
          path: "/"
          interval: "15s"
          timeout: "5s"
    nginx-traefik-extensions:
      loadBalancer:
        servers:
          - url: http://nginx-traefik-extensions:80
  middlewares:
    nginx-auth:
      forwardAuth:
        address: "http://nginx-traefik-extensions:80/auth"
        trustForwardHeader: true
        authResponseHeaders: "X-Auth-Method,X-Auth-Passed,X-Middleware-Name"
    strip-www:
      redirectRegex:
        regex: '^(http|https)?://www\.(.+)$'
        replacement: '${1}://${2}'
        permanent: false
    http-to-https-redirect-simple:
      redirectScheme:
        scheme: https
        permanent: false
    crowdsec:
      plugin:
        bouncer:
          enabled: true
          defaultDecisionSeconds: 60
          crowdsecMode: live
          crowdsecAppsecEnabled: true  # <--- here you can enable appsec waf
          crowdsecAppsecHost: crowdsec:7422
          crowdsecAppsecFailureBlock: true
          crowdsecAppsecUnreachableBlock: true
          crowdsecLapiKey: W8wm5+qx9PiotCVSoS5hNQsNbg2D5HWsRRzh8wjdomc
          crowdsecLapiHost: crowdsec:8080
          crowdsecLapiScheme: http
          crowdsecLapiTLSInsecureVerify: false
          forwardedHeadersTrustedIPs: &trustedIps
            - "10.0.0.0/8"
            - "100.64.0.0/10"
            - "103.21.244.0/22"
            - "103.22.200.0/22"
            - "103.31.4.0/22"
            - "104.16.0.0/13"
            - "104.24.0.0/14"
            - "108.162.192.0/18"
            - "127.0.0.0/8"
            - "131.0.72.0/22"
            - "141.101.64.0/18"
            - "162.158.0.0/15"
            - "169.254.0.0/16"
            - "172.16.0.0/12"
            - "172.64.0.0/13"
            - "173.245.48.0/20"
            - "188.114.96.0/20"
            - "190.93.240.0/20"
            - "192.168.0.0/16"
            - "197.234.240.0/22"
            - "198.41.128.0/17"
            - "::1/128"
            - "2002::/16"
            - "2400:cb00::/32"
            - "2405:8100::/32"
            - "2405:b500::/32"
            - "2606:4700::/32"
            - "2803:f800::/32"
            - "2a06:98c0::/29"
            - "2c0f:f248::/32"
            - "fc00::/7"
            - "fe80::/10"
          clientTrustedIPs: *trustedIps
