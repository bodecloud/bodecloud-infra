<!DOCTYPE html><html ng-app="stremio" ng-keypress="keypress($event)"><head><meta name="robots" content="noindex"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="images/stremio.ico" type="image/x-icon"><title>Stremio - Freedom to Stream</title><script type="text/ng-template" id="discoverTpl"><div id="discover" ng-controller="discoverCtrl" ng-class="{ loading: loading }"><div ng-show="!loading" ng-class="{ full: messages.label }" class="content"><div id="discover-filters" spatial-nav-section="{ id: 'discover-filters' }" spatial-nav-section-active="$state.includes('discover') &amp;&amp; resp.metas.length &gt; 0" class="filters"><div tabindex="-1" class="custom-select type"><svg icon="caret-down" class="icon"></svg><select name="type" ng-model="selectedType" ng-change="updateType()"> <option ng-repeat="entry in getTypes()" value="{{entry.catalog.type}}">{{translate(plural(entry.catalog.type))}}</option></select></div><div tabindex="-1" class="custom-select catalog"><svg icon="caret-down" class="icon"></svg><select name="catalog" ng-model="selectedCatalog" ng-change="updateCatalog()"> <option ng-repeat="entry in getEntries()" value="{{entry.id}}">{{translate(entry.name)}}</option></select></div><div tabindex="-1" class="custom-select genre"><svg icon="caret-down" class="icon"></svg><select name="genre" ng-model="selectedGenre" ng-change="updateGenre()"> <option ng-if="selectedEntry.defaultGenre == null" value="{{null}}">{{translate('DISCOVER_TOP')}}</option><option ng-repeat="genre in getGenreOptions(selectedEntry.catalog)" value="{{genre}}">{{translate(genre)}}</option></select></div></div><div ng-show="missingAddon" class="missing-addon"><div class="message">{{::translate("ERR_ADDON_NOT_INSTALLED")}}</div><a ng-click="openAddonsPage('discover', { addon: selectedEntry.addon.transportUrl})" class="install">{{::translate("ADDON_INSTALL")}}</a></div><div id="discover-backdrop" ng-show="messages.label" spatial-nav-section="{ id: 'discover-backdrop', defaultElement: '#discover-backdrop &gt; .no-button', enterTo: 'default-element' }" spatial-nav-section-active="$state.includes('discover') &amp;&amp; !!messages.label"><div class="heading"><img ng-src="{{getMessageImage(messages.image)}}"><div class="header">{{::translate("DISCOVER_WARNING_TITLE")}}</div><div class="info-text">{{translate(messages.label)}}</div></div><div class="buttons"><div tabindex="-1" ng-show="adultContent" onclick="window.history.back()" class="no-button button-s">{{::translate("NO")}}</div><div tabindex="-1" ng-show="adultContent" ng-click="showContent()" class="yes-button button-s">{{::translate("YES")}}</div><div tabindex="-1" ng-if="messages.promptRemoveAddon" ng-click="messages.promptRemoveAddon()" class="yes-button button-s">{{::translate("UNINSTALL_THIS_ADDON")}}</div></div></div><ul id="discover-items" ng-show="!messages.label" ng-class="resp.metas[0].posterShape" scroll-direction="vertical" reached-viewport-end="resp.loadNextPage()" spatial-nav-section="{ id: 'discover-items', defaultElement: '#discover-items &gt; .selected', enterTo: 'default-element' }" spatial-nav-section-active="$state.includes('discover') &amp;&amp; resp.metas.length &gt; 0 &amp;&amp; !messages.label" class="items scroll-pane"><li ng-repeat="item in resp.metas track by item._id" ng-click="selectItem(item)" ng-class="{ inLib: libraryItem.byId[item.id], selected: item._id == info._id }" spatial-nav-enter="open({ metaItem: item })" spatial-nav-focus="$parent.info = item" tabindex="-1" class="item"><div class="name">{{::item.name}}</div><div class="thumb"><img stremio-image="::{ url: item.poster }"></div><div ng-if="::item.featured" class="notification bottom"><div class="icon icon-ic_star"></div><a translate="DISCOVER_FEATURED"></a></div><div ng-if="::!item.featured &amp;&amp; item.isInTheaterOnly()" class="notification in-cinema"><svg icon="in-cinema" class="icon"></svg><a translate="IN_THEATER"></a></div></li></ul></div><div ng-show="!!info &amp;&amp; !adultContent" class="info-box"><div stremio-image="{ url: info.poster }" class="bkg"></div><div class="overlay"></div><div class="content"><div class="details"><div ng-if="!info.logo &amp;&amp; !getFeaturedVid()" class="logo"><h1>{{info.name}}</h1></div><div ng-show="info.logo &amp;&amp; info.logoShape != 'hidden'" class="logo"><img ng-src="{{info.logo}}" alt="{{info.name}}" onerror="this.className='missing'"></div><div ng-if="!info.logo" class="title">{{info.name}}</div><ul class="info"><li ng-show="info.runtime">{{info.runtime}}</li><li ng-show="info.releaseInfo">{{info.releaseInfo}}</li><li ng-show="info.imdbRating" ng-click="openExternal('http://www.imdb.com/title/'+info.imdb_id)" class="external">{{info.imdbRating}}<svg icon="imdb" class="icon imdb"></svg></li></ul><div ng-show="info.description" ng-bind-html="info.descriptionHTML()" class="description"></div><div class="section"><div translate="LINKS_GENRES" class="title"></div><div ng-if="shouldOpenGenre(info.id)" class="links"><a ng-repeat="genre in info.genres" ng-click="openGenre(genre, 'movie')" ng-bind-html="genre | translate" tabindex="-1" class="link"></a></div><div ng-if="!shouldOpenGenre(info.id)" class="links"><div ng-repeat="genre in info.genres" ng-bind-html="genre | translate" class="link"></div></div></div><div ng-if="info.director.length" class="section"><div translate="LINKS_DIRECTORS" class="title"></div><div class="links"><a ng-repeat="director in info.director" ng-click="openActor(director)" tabindex="-1" class="link">{{::director}}</a></div></div><div ng-if="info.cast.length" class="section"><div translate="LINKS_CAST" class="title"></div><div class="links"><a ng-repeat="actor in info.cast" ng-click="openActor(actor)" tabindex="-1" class="link">{{::actor}}</a></div></div></div><div ng-class="{ two: !info.trailers.length }" class="actions"><div ng-show="info.trailers.length" ng-click="openTrailer(info)" tabindex="-1" class="button"><svg icon="trailer" class="icon"></svg></div><div ng-click="ifRegistered(libraryItem.addToLibrary, libraryItem, [info])" ng-hide="libraryItem.byId[info._id]" tabindex="-1" class="button"> <svg icon="add-to-library" class="icon"></svg></div><div ng-click="libraryItem.removeFromLibrary(info)" ng-show="libraryItem.byId[info._id]" tabindex="-1" class="button"><svg icon="remove-from-library" class="icon"></svg></div><div ng-click="open({ metaItem: info })" tabindex="-1" class="button play"><div translate="SHOW" class="label"></div><div class="icon-container"><svg icon="play" class="icon"></svg></div></div></div></div></div><div ng-show="loading" class="loading-container"><div class="loading"><div class="ripple"></div><div class="ripple"></div></div></div></div></script><script type="text/ng-template" id="detailTpl"><div id="detail" ng-cloak ng-controller="detailCtrl" ng-class="{visible: $state.is('detail')}" spatial-nav-section="{ id: 'detail', defaultElement: '#detail .defaultFocus', enterTo: 'default-element' }" spatial-nav-section-active="$state.includes('detail') &amp;&amp; !settingsOpen"><div class="background"><div class="overlay"></div><div stremio-image="{ url: info.background }" class="image"></div></div><div ng-show="error" class="detail-error"><img ng-src="images/empty.png"><div class="info-text">{{translate(error)}}</div></div><div ng-class="{ hidden: moreInfo }" ng-hide="loading" class="content"><div ng-if="!info.logo &amp;&amp; !getFeaturedVid()" class="logo"><h1>{{info.name}}</h1></div><div ng-show="info.logo &amp;&amp; info.logoShape != 'hidden'" class="logo"><img ng-src="{{info.logo}}" alt="{{info.name}}" onerror="this.className='missing'"></div><div ng-show="getFeaturedVid()" class="logo"><img ng-src="{{getFeaturedVid().thumbnailMax}}" ng-click="open({ libItem: item, video: getFeaturedVid(), intent: 'player' })" style="height:calc(100% - 20px);cursor:pointer"><div>{{getFeaturedVid().title}}</div></div><div class="details"><ul class="info"><li>{{info.runtime}}</li><li>{{info.releaseInfo}}</li><li ng-show="info.imdbRating &amp;&amp; info.imdbRating != '0.0'" ng-click="openExternal('http://www.imdb.com/title/'+info.imdb_id)" class="external">{{ info.imdbRating == '0.0' ? '-' : (info.imdbRating | number:1) }}<svg icon="imdb" class="icon imdb"></svg></li></ul><div ng-if="info.genres.length" class="section"><div translate="LINKS_GENRES" class="title"></div><div ng-if="shouldOpenGenre(info.id)" class="links"><a ng-repeat="genre in info.genres" ng-click="openGenre(genre, 'movie')" ng-bind-html="genre | translate" tabindex="-1" class="link"></a></div><div ng-if="!shouldOpenGenre(info.id)" class="links"><div ng-repeat="genre in info.genres" ng-bind-html="genre | translate" class="link"></div></div></div><div ng-if="info.director.length" class="section"><div translate="LINKS_DIRECTORS" class="title"></div><div class="links"><a ng-repeat="director in info.director" ng-click="openActor(director)" tabindex="-1" class="link">{{::director}}</a></div></div><div ng-if="info.cast.length" class="section"><div translate="LINKS_CAST" class="title"></div><div class="links"><a ng-repeat="actor in info.cast" ng-click="openActor(actor)" tabindex="-1" class="link">{{::actor}}</a></div></div><div ng-if="info.description" class="section"><div translate="SUMMARY" class="title"></div><div title="{{selected.video.overview || info.description}}" ng-bind-html="selected.video.overview || info.descriptionHTML()" class="text"></div></div></div><div class="spacing"></div><div class="action-buttons"><div ng-show="info.trailers.length" ng-click="openTrailer(info)" title="{{translate('WATCH_TRAILER')}}" tabindex="-1" class="button-b"><svg icon="trailer" class="icon"></svg>{{translate("WATCH_TRAILER")}}</div><div ng-if="item.type != 'other' &amp;&amp; !libraryItem.byId[item._id]" ng-click="ifRegistered(libraryItem.addToLibrary, libraryItem, [info])" title="{{translate('ADD_TO_LIB')}}" tabindex="-1" class="button-b"><svg icon="add-to-library" class="icon"></svg>{{translate("ADD_TO_LIB")}}</div><div ng-if="item.type != 'other' &amp;&amp; libraryItem.byId[item._id]" ng-click="libraryItem.removeFromLibrary(info)" title="{{translate('REMOVE_FROM_LIB')}}" tabindex="-1" class="button-b remove-lib"><svg icon="remove-from-library" class="icon"></svg>{{translate("REMOVE_FROM_LIB")}}</div></div></div><div ng-controller="sidebarCtrl" ng-hide="loading" class="sidebar"><div ng-if="info.videos.length" class="sidebar-content"><div ng-show="showHead &amp;&amp; (selected.item &amp;&amp; info.videos &lt; 2 || info.hasSeasons(info))" class="head"><div stremio-image="{ url: info.getLogo() }" class="logo"><div class="fallback">{{info.name}}</div></div></div><div ng-if="showHead" class="details"><ul class="info"><li ng-show="info.runtime">{{info.runtime}}</li><li ng-show="info.releaseInfo">{{info.releaseInfo}}</li><li ng-show="info.imdbRating">{{info.imdbRating}}<svg icon="imdb" class="icon imdb"></svg></li></ul><div ng-show="info.description" ng-bind-html="info.descriptionHTML()" ng-if="displayType === 'movie'" class="description"></div><div ng-if="displayType === 'movie'" class="section"><div translate="LINKS_GENRES" class="title"></div><div ng-if="shouldOpenGenre(info.id)" class="links"><a ng-repeat="genre in info.genres" ng-click="openGenre(genre, 'movie')" ng-bind-html="genre | translate" tabindex="-1" class="link"></a></div><div ng-if="!shouldOpenGenre(info.id)" class="links"><div ng-repeat="genre in info.genres" ng-bind-html="genre | translate" class="link"></div></div></div><div ng-if="displayType === 'movie' &amp;&amp; info.director.length" class="section"><div translate="LINKS_DIRECTORS" class="title"></div><div class="links"><a ng-repeat="director in info.director" ng-click="openActor(director)" tabindex="-1" class="link">{{::director}}</a></div></div><div ng-if="displayType === 'movie' &amp;&amp; info.cast.length" class="section"><div translate="LINKS_CAST" class="title"></div><div class="links"><a ng-repeat="actor in info.cast" ng-click="openActor(actor)" tabindex="-1" class="link">{{::actor}}</a></div></div></div><div ng-if="showStreamPicker()" spatial-nav-section="{ id: 'streamPicker', restrict: 'self-only', defaultElement: '.button.show-streams', enterTo: 'default-element'}" spatial-nav-section-active="showStreamPicker()" class="stream-picker"><section><span translate="SEASON" class="title"></span><number-picker min="0" ng-model="seasonPicker"></number-picker></section><section><span translate="EPISODE" class="title"></span><number-picker min="1" ng-model="episodePicker"></number-picker></section><section><div tabindex="-1" ng-click="showPickedStreams(seasonPicker, episodePicker)" class="button show-streams">{{ 'SIDEBAR_SHOW_STREAMS' | translate }}</div></section></div><ul ng-if="displayType === 'tv'" class="tvguide"><li ng-repeat="item in info.currentTvGuide().slice(0,5)"><span>{{::selected.item.starts | date:"HH:mm"}}</span><h4>{{::selected.item.name}}</h4></li></ul><div ng-if="displayType === 'series'" class="episodes"><div class="heading"><div ng-show="showReceiveNotifCheckbox()" ng-click="item.state.noNotif = !item.state.noNotif; item.save(); $event.stopPropagation();" class="showNotifs"><input type="checkbox" ng-checked="!item.state.noNotif"><span>{{item.type === 'series' ? 'DETAIL_RECEIVE_NOTIF_SERIES' : 'DETAIL_RECEIVE_NOTIF_VIDEOS' | translate}}</span></div><div tabindex="-1" class="custom-select"><svg icon="caret-down" class="icon"></svg><select name="season" ng-model="sidebarSel.season"> <option ng-repeat="seasonNumber in info.getSeasons()" value="{{seasonNumber}}">{{translate('SEASON')}} {{seasonNumber}}</option><option ng-if="info.specialEpisodes.length" value="{{0}}">{{translate('special')}}</option></select></div></div><ul class="episodes-list"><li ng-repeat="episode in episodesBySeason(info, sidebarSel.season) | orderBy:&quot;number&quot; track by episode._id" ng-click="open({ libItem: item, metaItem: info, video: episode, intent: 'player' })" ng-class="getVidClasses(item, episode)" ng-right-click="!isUpcoming(episode) &amp;&amp; contextMenuVideo(item, info, episode, $event)" title="{{episode.title ? episode.title+': ' : ''}}{{episode.season ? 'Season ' + episode.season : 'special' }}, Episode {{episode.episode}}" tabindex="-1"><div class="thumbnail"><img stremio-image="::{ url: episode.thumbnail }"><svg icon="hourglass" class="icon upcoming"></svg></div><div class="episode-details"><div class="title">{{::episode.episode}}. {{::episode.title || "TBA"}}</div><div class="footer"><div timestamp-to-date="episode.released.getTime()" class="date"></div><div class="watched"><svg icon="eye" class="icon"></svg>{{translate('WATCHED')}}</div></div></div></li></ul></div><div ng-class="{ noThumb: info.videos[0] &amp;&amp; !info.videos[0].thumbnail }" ng-if="displayType === 'channel'" class="episodes"><div class="heading"><div ng-show="showReceiveNotifCheckbox()" ng-click="item.state.noNotif = !item.state.noNotif; item.save(); $event.stopPropagation();" class="showNotifs"><input type="checkbox" ng-checked="!item.state.noNotif"><span>{{item.type === 'series' ? 'DETAIL_RECEIVE_NOTIF_SERIES' : 'DETAIL_RECEIVE_NOTIF_VIDEOS' | translate}}</span></div><div class="search"><input ng-model="info.search" placeholder="{{ 'SEARCH_VIDEOS' | translate }}" ng-focus="onInputFocus()" ng-blur="onInputBlur()"><svg icon="search" class="icon"></svg></div></div><ul scroll-pane-to="li.playing" class="episodes-list"><li ng-repeat="video in info.videos | filter:info.search | orderBy:reverse:'released' track by video._id" ng-class="getVidClasses(item, video)" ng-click="open({ libItem: item, metaItem: info, video: video, intent: 'player' })" ng-right-click="contextMenuVideo(item, info, video, $event)" title="{{::video.title}}" tabindex="-1"><div class="thumbnail"><img stremio-image="::{ url: video.thumbnail }"></div><div class="episode-details"><div class="title">{{::video.title}}</div><div ng-if="::video.released.getTime()" class="date">{{::video.released | date:"d MMM yyyy"}}</div></div></li></ul></div></div><div stream-select-scroll ng-show="currentStreamsView()" class="streams-container"><div ng-if="info.isInTheaterOnly()" class="movie-notavailable"><svg icon="in-cinema" class="icon"></svg><div class="message"><h3 translate="STILL_IN_THEATER"></h3><h4 translate="WATCH_IN_CINEMA"></h4></div><div ng-show="info.externalUrls.cinema" ng-click="openExternal(info.externalUrls.cinema)" class="button-b cinema-tickets defaultFocus"><span class="icon icon-ic_cinema"></span><span translate="GET_TICKETS"></span></div></div><div ng-if="selected.video" ng-show="isUpcoming(selected.video)" class="ep-details upcomming"><svg icon="hourglass" class="icon"></svg><div class="text-container"><div translate="UPCOMING_EPISODE" class="title"></div><div class="message">{{ 'UPCOMING_EPISODE_MESSAGE' | translate }} {{ ' ' }}<span timestamp-to-date="selected.video.released.getTime()" class="date"></span></div></div></div><div ng-show="hasMissingDate(selected.video)" class="ep-details missingdate"><div class="icon icon-ic_ghost"></div><div class="text-container"><div translate="MISSING_DATE_EPISODE" class="title"></div><div translate="MISSING_DATE_EPISODE_MESSAGE" class="message"></div></div></div><div ng-show="showProgress" class="streams-loader"><div class="progress-bar-header">{{loadingAddonsCount === 1 ? 'add-on ' + (loadingAddonsNames + ' is still loading') : (loadingAddonsCount + ' add-ons are still loading')}}</div><div class="progress-bar"></div></div><div ng-show="isStreamsView('noStreams')" translate="{{::'NO_STREAM'}}" class="no-streams">{{::'NO_STREAM'}}</div><div ng-if="addons.length" tabindex="-1" class="custom-select addons-select"><svg icon="caret-down" class="icon"></svg><select name="addon" ng-model="selected.addon"> <option value="ALL">All</option><option ng-repeat="addon in addons" value="{{addon.value}}">{{addon.label}}</option></select></div><ul ng-hide="isStreamsView('noStreams')" class="streams"><li ng-repeat="streamItem in streams | filter: filteredStreams" ng-class="::{ inactive: item.stream.isGeoRestricted() }" title="{{::translate(item.stream.isGeoRestricted() ? 'ADDON_STREAM_GEORESTRICTED' : '')}}" ng-click="pickStream(streamItem.stream)" tabindex="-1" class="stream defaultFocus"><div class="stream-content"><div class="name">{{::displayName(streamItem.stream, streamItem.addon) | translate}}<div ng-if="streamItem.stream.identifier() == selected.lastStreamId" class="progress"><div ng-style="{'width': (item.state.timeOffset / item.state.duration * 100) + '%'}" class="bar"></div></div></div><div class="description"><div class="inner">{{::streamItem.stream.displayTitle().split(', ').join('\n')}}</div></div></div><div class="stream-play"><svg icon="play" class="icon"></svg></div></li></ul><div ng-click="openAddonsPage('stream-select', { cat: 'community', type: $state.params.type })" tabindex="-1" translate="ADDON_CATALOGUE" class="button-s more-addons"></div></div></div><div ng-show="loading" class="loading-container"><div class="loading"><div class="ripple"></div><div class="ripple"></div></div></div></div></script><script type="text/ng-template" id="boardTpl"><div id="board" ng-controller="boardCtrl" spatial-nav-section="{ id: 'board', straightOnly: true, enterTo: 'default-element', defaultElement: '#board .selected' }" spatial-nav-section-active="$state.includes('board') &amp;&amp; !settingsOpen"><ul board-carousel-holder="true" class="board-container board-4-container scroll-pane"><li ng-repeat="category in groups track by category.id" ng-focused="false" ng-class="{ 'board-notif-holder': !!category.notifs }"> <div ng-if="!category.showExplanation()" board-carousel-arrow="right"></div><div ng-if="!category.showExplanation()" board-carousel-arrow="left"></div><div class="heading"><div ng-class="::getHeadlineClasses(category)" ng-click="onHeadlineClick(category)" class="heading-title"><div ng-if="category.level == LEVELS.ADDON &amp;&a pan translate="UPGRADE"></span>.</div><div ng-click="update(needRestart)" translate="RELAUNCH" class="call-to-action"></div><div ng-click="needRestart = null" class="close icon icon-ic_x"></div></div></div><div ng-show="needReload &amp;&amp; needReload != PRODUCT_VERSION &amp;&amp; ! needRestart &amp;&amp; ($state.is('board') || $state.is('discover') || $state.is('library') || $state.is('calendar'))" ng-cloak class="bottom-notification ng-hide"><div class="right"><div class="icon icon-ic_stremio_tray"></div><div class="message"><span translate="UPGRADE"></span>.</div><div ng-click="reloadUI(needReload)" translate="RELOAD_UI" class="call-to-action"></div><div ng-click="needReload = PRODUCT_VERSION" class="close icon icon-ic_x"></div></div></div><div id="updateModal" ng-class="{'visible': !needRestart &amp;&amp; needDownload &amp;&amp; !$state.includes('player')}" spatial-nav-section="{ id: 'updateModal', restrict: 'self-only', defaultElement: '#updateModal .button:first', enterTo: 'default-element'}" spatial-nav-section-active="!needRestart &amp;&amp; needDownload &amp;&amp; !$state.includes('player')" class="modalWrap modal-light-center-container"><div ng-click="$event.stopPropagation()" class="modal-light-center"><img src="images/error.png" class="modal-cat"><div class="modal-bg"><div translate="MANUAL_UPDATE_TITLE" class="title"></div><p translate="MANUAL_UPDATE_LINE1"></p><p translate="MANUAL_UPDATE_LINE2"></p><div class="buttons"><div tabindex="-1" ng-click="needDownload = null" class="button"><span translate="BUTTON_UPDATE_LATTER"></span></div><div tabindex="-1" ng-click="openExternal('https://www.stremio.com/downloads')" class="button install-button"><span translate="BUTTON_UPDATE_NOW"></span></div></div></div></div></div><script type="text/javascript" async src="https://www.google-analytics.com/analytics.js"></script></body></html>
